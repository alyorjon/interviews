yniqsa Markaziy bankning ochiq banking tashabbuslarini. Naqd pul ustunligidan raqamli to'lovlarga o'tish tezlashmoqda va muvofiqlik, KYC va real vaqtli hisob-kitoblarni boshqaradigan backend tizimlar muhim bo'lib bormoqda.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"66-how-do-you-build-relationships-with-stakeholders-manfaatdor-tomonlar-bilan-munosabatlarni-qanday-qurasiz\">66. How do you build relationships with stakeholders? / Manfaatdor tomonlar bilan munosabatlarni qanday qurasiz?</h2>\n<p><strong>EN:</strong> Show proactive engagement, not just reactive updates.</p>\n<blockquote>\n<p><em>\"I schedule monthly informal check-ins — not just crisis calls. I send concise progress summaries before anyone asks. Stakeholders trust you when they're never surprised — I make that my standard.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Faqat reaktiv yangilanishlar emas, proaktiv muloqotni ko'rsating.</p>\n<blockquote>\n<p><em>\"Oylik norasmiy muloqotlar rejalashtirarman — faqat inqiroz qo'ng'iroqlari emas. Hech kim so'ramasdan oldin qisqacha taraqqiyot xulosalari yuboraman. Manfaatdor tomonlar hech qachon hayron qolmasligingizda sizga ishonadi — buni standartim qilaman.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"67-how-do-you-handle-high-pressure-situations-yuqori-bosimli-vaziyatlarni-qanday-boshqarasiz\">67. How do you handle high-pressure situations? / Yuqori bosimli vaziyatlarni qanday boshqarasiz?</h2>\n<p><strong>EN:</strong> Show a concrete stress response protocol.</p>\n<blockquote>\n<p><em>\"I use a 3-step protocol: pause 60 seconds to assess, communicate status to stakeholders, then work the problem systematically. In a live DB outage during a bank's peak hours, this kept the team focused and we restored service in 23 minutes.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Aniq stress javob protokolini ko'rsating.</p>\n<blockquote>\n<p><em>\"3 bosqichli protokoldan foydalanaman: baholash uchun 60 soniya to'xtash, manfaatdor tomonlarga holat haqida xabar berish, keyin tizimli ravishda muammoni hal qilish. Bank cho'qqisida jonli DB uzilishi paytida bu jamoani yo'naltirib turdi va biz 23 daqiqada xizmatni tiklandik.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"68-describe-a-time-when-you-had-to-adapt-quickly-tezda-moslashishingiz-kerak-bolgan-vaqtingizni-tasvirlab-bering\">68. Describe a time when you had to adapt quickly. / Tezda moslashishingiz kerak bo'lgan vaqtingizni tasvirlab bering.</h2>\n<p><strong>EN:</strong> Show cognitive flexibility under pressure.</p>\n<blockquote>\n<p><em>\"A client switched from REST to GraphQL requirements 2 days before delivery. I learned Strawberry (Python GraphQL) overnight, refactored the API layer, and delivered on time — with docs. That client cited the turnaround in their testimonial.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Bosim ostida kognitiv moslashuvchanlikni ko'rsating.</p>\n<blockquote>\n<p><em>\"Bir mijoz yetkazishdan 2 kun oldin REST dan GraphQL talablariga o'tdi. Kechasi Strawberry (Python GraphQL) o'rgandim, API qatlamini qayta ishladim va hujjatlar bilan o'z vaqtida yetkazib berdim. U mijoz bu o'zgarishni tavsiyasida ta'kidladi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"69-what-sets-you-apart-from-other-candidates-boshqa-nomzodlardan-nimasi-bilan-ajralib-turasiz\">69. What sets you apart from other candidates? / Boshqa nomzodlardan nimasi bilan ajralib turasiz?</h2>\n<p><strong>EN:</strong> Be concrete and memorable — not humble-braggy.</p>\n<blockquote>\n<p><em>\"Most backend developers either know databases OR business logic. I've done both: built complex multi-database architectures AND managed SAP B1 ERP implementation as project lead. That dual lens makes me a developer who thinks in business outcomes.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Aniq va esda qoladigan bo'ling — kamtarona maqtanish emas.</p>\n<blockquote>\n<p><em>\"Ko'pchilik backend dasturchilар yoki ma'lumotlar bazalarini yoki biznes mantiqni biladi. Men ikkalasini ham bajardim: murakkab ko'p bazali arxitekturalar qurdim VA loyiha rahbari sifatida SAP B1 ERP joriy etishni boshqardim. Bu ikki tomonlama ko'rinish meni biznes natijalarida fikrlaydigan dasturchi qiladi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"70-do-you-have-any-questions-for-us-bizga-savollaringiz-bormi\">70. Do you have any questions for us? / Bizga savollaringiz bormi?</h2>\n<p><strong>EN:</strong> Always have 2–3 smart questions ready. It shows genuine interest and preparation.</p>\n<blockquote>\n<p><em>\"1. What does the onboarding process look like for senior engineers?</em><br />\n<em>2. What's the biggest technical challenge the backend team is currently facing?</em><br />\n<em>3. How do you measure engineering success — velocity, quality, or impact?\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Har doim 2–3 ta aqlli savolni tayyor turing. Bu haqiqiy qiziqish va tayyorgarlikni ko'rsatadi.</p>\n<blockquote>\n<p><em>\"1. Senior muhandislar uchun onboarding jarayoni qanday ko'rinadi?</em><br />\n<em>2. Backend jamoasi hozir duch kelayotgan eng katta texnik muammo nima?</em><br />\n<em>3. Muhandislik muvaffaqiyatini qanday o'lchaybsiz — tezlik, sifat yoki ta'sir?\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"star-usuli-star-method\">📌 STAR Usuli / STAR Method</h2>\n<p>Behavioral savollarga javob berishda <strong>STAR</strong> usulidan foydalaning:</p>\n<table>\n<thead>\n<tr>\n<th>Harf</th>\n<th>Ma'no (UZB)</th>\n<th>Meaning (EN)</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>S</strong></td>\n<td>Vaziyat — kontekstni tushuntiring</td>\n<td>Situation — set the context</td>\n</tr>\n<tr>\n<td><strong>T</strong></td>\n<td>Vazifa — sizning rolингизни aniqlang</td>\n<td>Task — define your role</td>\n</tr>\n<tr>\n<td><strong>A</strong></td>\n<td>Harakat — nima qilganingizni batafsil ayting</td>\n<td>Action — detail what YOU did</td>\n</tr>\n<tr>\n<td><strong>R</strong></td>\n<td>Natija — o'lchanadigan natijani ko'rsating</td>\n<td>Result — show measurable outcome</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h2 id=\"asosiy-maslahatlar-key-tips\">💡 Asosiy maslahatlar / Key Tips</h2>\n<ul>\n<li><strong>Raqamlar ishlating</strong> / Use numbers: \"40% faster\", \"saved $800/month\", \"3 days early\"</li>\n<li><strong>\"Biz\" o'rniga \"Men\" deyin</strong> / Say \"I\" not \"we\" — own your contribution</li>\n<li><strong>Oldindan 5–7 ta kuchli hikoyani tayyorlang</strong> / Prepare 5–7 strong stories in advance — reuse across questions</li>\n<li><strong>Muloqot ikkala tomon uchun</strong> / Interview is two-way — evaluate them too</li>\n<li><strong>Kompaniyani tadqiq qiling</strong> / Research the company — specific knowledge impresses</li>\n</ul>\n<hr />\n<p><em>Muvaffaqiyat tilayman! / Good luck!</em> 🎯</p>"}, "backend": {"label": "🖥️ Backend & Frontend", "body": "<h1 id=\"backend-frontend-interview-tayyorlov-zametkalari-study-notes\">🖥️ Backend &amp; Frontend Interview — Tayyorlov Zametkalari / Study Notes</h1>\n<blockquote>\n<p><strong>Manba / Source:</strong> 100 Backend/Frontend Interview Q&amp;A (50+50)<br />\n<strong>Tillar / Languages:</strong> O'zbek 🇺🇿 | English 🇬🇧<br />\n<strong>Maqsad / Goal:</strong> Intervyuga tayyorgarlik uchun qisqacha konspekt / Quick reference for interview prep</p>\n</blockquote>\n<hr />\n<h2 id=\"backend-50-ta-savol-javob-50-qa\">📦 BACKEND — 50 ta savol-javob / 50 Q&amp;A</h2>\n<h3 id=\"asosiy-tushunchalar-core-concepts\">🌐 Asosiy tushunchalar / Core Concepts</h3>\n<table>\n<thead>\n<tr>\n<th>#</th>\n<th>Savol / Question</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>1</td>\n<td><strong>Server nima? / What is a server?</strong></td>\n<td>Tarmoq orqali boshqa kompyuterlarga resurs, ma'lumot yoki xizmat taqdim etuvchi tizim</td>\n<td>A computer or system that provides resources, data, or services to other computers (clients) over a network</td>\n</tr>\n<tr>\n<td>2</td>\n<td><strong>REST nima? / What is REST?</strong></td>\n<td>Tarmoq ilovalarini loyihalash arxitektura uslubi; stateless client-server muloqotiga asoslanadi</td>\n<td>An architectural style for designing networked applications, relying on stateless client-server communication</td>\n</tr>\n<tr>\n<td>3</td>\n<td><strong>API nima? / What is an API?</strong></td>\n<td>Turli dasturiy ilovalar o'rtasida muloqotni ta'minlovchi interfeys</td>\n<td>Allows different software applications to communicate with each other (Application Programming Interface)</td>\n</tr>\n<tr>\n<td>4</td>\n<td><strong>CRUD nima? / Explain CRUD</strong></td>\n<td>Ma'lumotlar bazasi bilan ishlashning 4 asosiy operatsiyasi: <strong>C</strong>reate, <strong>R</strong>ead, <strong>U</strong>pdate, <strong>D</strong>elete</td>\n<td>Basic database operations: <strong>C</strong>reate, <strong>R</strong>ead, <strong>U</strong>pdate, <strong>D</strong>elete</td>\n</tr>\n<tr>\n<td>5</td>\n<td><strong>Database nima? / What is a database?</strong></td>\n<td>Tuzilgan ma'lumotlar yig'indisi; odatda elektron ko'rinishda saqlanadi</td>\n<td>An organized collection of structured information or data, typically stored electronically</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h3 id=\"malumotlar-bazasi-database\">🗄️ Ma'lumotlar bazasi / Database</h3>\n<table>\n<thead>\n<tr>\n<th>#</th>\n<th>Savol / Question</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>6</td>\n<td><strong>SQL nima?</strong></td>\n<td>Relyatsion MBlarni boshqarish va manipulyatsiya qilish tili</td>\n<td>Used for managing and manipulating relational databases (Structured Query Language)</td>\n</tr>\n<tr>\n<td>7</td>\n<td><strong>NoSQL nima?</strong></td>\n<td>Katta hajmli ma'lumotlar va real-time ilovalar uchun relyatsion bo'lmagan MB</td>\n<td>Non-relational databases designed for large-scale data storage and real-time web applications</td>\n</tr>\n<tr>\n<td>8</td>\n<td><strong>Indexing nima?</strong></td>\n<td>Ma'lumot qidirish tezligini oshirish; qo'shimcha xotira evaziga ishlaydi</td>\n<td>Improves speed of data retrieval at the cost of additional storage space</td>\n</tr>\n<tr>\n<td>9</td>\n<td><strong>Normalizatsiya nima?</strong></td>\n<td>Ma'lumot takrorlanishini kamaytirish va yaxlitlikni ta'minlash jarayoni</td>\n<td>Organizing data to reduce redundancy and improve data integrity</td>\n</tr>\n<tr>\n<td>10</td>\n<td><strong>ACID nima?</strong></td>\n<td><strong>A</strong>tomicity, <strong>C</strong>onsistency, <strong>I</strong>solation, <strong>D</strong>urability — tranzaksiya ishonchliligini ta'minlovchi 4 xususiyat</td>\n<td>Ensures reliable transaction processing: Atomicity, Consistency, Isolation, Durability</td>\n</tr>\n<tr>\n<td>11</td>\n<td><strong>Primary key nima?</strong></td>\n<td>Jadvaldagi har bir yozuvni yagona identifikatsiya qiluvchi maydon</td>\n<td>A unique identifier for a record in a database table</td>\n</tr>\n<tr>\n<td>12</td>\n<td><strong>Foreign key nima?</strong></td>\n<td>Ikki jadval o'rtasida bog'liq yaratuvchi maydon</td>\n<td>A field in a table that creates a link between two tables</td>\n</tr>\n<tr>\n<td>13</td>\n<td><strong>ORM nima?</strong></td>\n<td>Ob'ektga yo'naltirilgan kod va relyatsion MB o'rtasida ko'prik (masalan, SQLAlchemy)</td>\n<td>Technique for converting data between incompatible type systems in object-oriented programming</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h3 id=\"arxitektura-infratuzilma-architecture-infrastructure\">🏗️ Arxitektura &amp; Infratuzilma / Architecture &amp; Infrastructure</h3>\n<table>\n<thead>\n<tr>\n<th>#</th>\n<th>Savol / Question</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>14</td>\n<td><strong>Microservice nima?</strong></td>\n<td>Ilova kichik, mustaqil servislar to'plamidan iborat arxitektura</td>\n<td>Software development technique where an application is composed of small, loosely coupled services</td>\n</tr>\n<tr>\n<td>15</td>\n<td><strong>Docker nima?</strong></td>\n<td>Ilovalarni konteynerda ishlab chiqish va ishga tushirish platformasi</td>\n<td>A platform for developing, shipping, and running applications in containers</td>\n</tr>\n<tr>\n<td>16</td>\n<td><strong>Container nima?</strong></td>\n<td>Dasturni ishga tushirish uchun hamma narsani o'z ichiga olgan yengil, ko'chma muhit</td>\n<td>A lightweight, portable, self-sufficient environment that includes everything needed to run software</td>\n</tr>\n<tr>\n<td>17</td>\n<td><strong>Kubernetes nima?</strong></td>\n<td>Konteynerli ilovalarni avtomatik deploy, scale va boshqarish uchun ochiq platforma</td>\n<td>Open-source platform for automating deployment, scaling, and management of containerized applications</td>\n</tr>\n<tr>\n<td>18</td>\n<td><strong>Load balancing nima?</strong></td>\n<td>Kiruvchi trafikni bir nechta server o'rtasida taqsimlash</td>\n<td>Distributes incoming network traffic across multiple servers so no single server is overwhelmed</td>\n</tr>\n<tr>\n<td>19</td>\n<td><strong>Reverse proxy nima?</strong></td>\n<td>Client so'rovlarini backend serverga yo'naltiruvchi oraliq server</td>\n<td>Forwards client requests to backend servers and returns the server's response to the client</td>\n</tr>\n<tr>\n<td>20</td>\n<td><strong>Middleware nima?</strong></td>\n<td>Client va server o'rtasida turuvchi dastur; logging, auth kabi vazifalar uchun</td>\n<td>Software between client and server, handling requests/responses; used for logging, authentication, etc.</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h3 id=\"xavfsizlik-autentifikatsiya-security-authentication\">🔐 Xavfsizlik &amp; Autentifikatsiya / Security &amp; Authentication</h3>\n<table>\n<thead>\n<tr>\n<th>#</th>\n<th>Savol / Question</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>21</td>\n<td><strong>Web server nima?</strong></td>\n<td>Foydalanuvchi so'roviga javoban veb-sahifalarni taqdim etuvchi dastur</td>\n<td>Software that serves web pages to users in response to their requests</td>\n</tr>\n<tr>\n<td>22</td>\n<td><strong>Caching nima?</strong></td>\n<td>Ma'lumotlarga kirish vaqtini qisqartirish uchun nusxani vaqtinchalik saqlash</td>\n<td>Stores copies of files or data in temporary storage to reduce data access time</td>\n</tr>\n<tr>\n<td>23</td>\n<td><strong>Session nima?</strong></td>\n<td>Bir nechta sahifa bo'ylab foydalaniladigan ma'lumotlarni o'zgaruvchilarda saqlash</td>\n<td>A way to store information (in variables) to be used across multiple pages</td>\n</tr>\n<tr>\n<td>24</td>\n<td><strong>Token-based auth nima?</strong></td>\n<td>Har bir so'rovda token yuboriladigan autentifikatsiya usuli</td>\n<td>Involves generating a token that the user sends with each request for access to protected resources</td>\n</tr>\n<tr>\n<td>25</td>\n<td><strong>JWT nima?</strong></td>\n<td>Tomonlar o'rtasida ma'lumotni xavfsiz uzatish uchun ochiq standart</td>\n<td>JSON Web Token — open standard for securely transmitting information between parties as a JSON object</td>\n</tr>\n<tr>\n<td>26</td>\n<td><strong>OAuth nima?</strong></td>\n<td>Kirish huquqlarini delegatsiya qilish uchun ochiq standart</td>\n<td>Open standard for access delegation, commonly used for token-based authentication and authorization</td>\n</tr>\n<tr>\n<td>27</td>\n<td><strong>HTTPS nima?</strong></td>\n<td>HTTP ning xavfsiz kengaytmasi</td>\n<td>HTTP extension for secure communication over a computer network</td>\n</tr>\n<tr>\n<td>28</td>\n<td><strong>Firewall nima?</strong></td>\n<td>Tarmoq trafikini xavfsizlik qoidalari asosida nazorat qiluvchi tizim</td>\n<td>Network security system that monitors and controls incoming and outgoing traffic based on security rules</td>\n</tr>\n<tr>\n<td>29</td>\n<td><strong>SSL/TLS nima?</strong></td>\n<td>Ma'lumotlarni tranzitda shifrlash orqali xavfsiz muloqotni ta'minlovchi protokollar</td>\n<td>Protocols that provide secure communication over a network by encrypting data in transit</td>\n</tr>\n<tr>\n<td>30</td>\n<td><strong>VPN nima?</strong></td>\n<td>Ommaviy tarmoq orqali xavfsiz masofaviy kirishni ta'minlaydi</td>\n<td>Extends a private network across a public network, allowing secure remote access</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h3 id=\"hujumlar-kriptografiya-attacks-cryptography\">🛡️ Hujumlar &amp; Kriptografiya / Attacks &amp; Cryptography</h3>\n<table>\n<thead>\n<tr>\n<th>#</th>\n<th>Savol / Question</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>31</td>\n<td><strong>SQL injection nima?</strong></td>\n<td>Ilovaga zararli SQL so'rovlar qo'shish orqali hujum</td>\n<td>Code injection technique that exploits vulnerabilities by inserting malicious SQL statements</td>\n</tr>\n<tr>\n<td>32</td>\n<td><strong>XSS nima?</strong></td>\n<td>Boshqa foydalanuvchilar ko'radigan sahifalarga zararli skript joylash</td>\n<td>Cross-Site Scripting — security vulnerability that allows attackers to inject malicious scripts into web pages</td>\n</tr>\n<tr>\n<td>33</td>\n<td><strong>CSRF nima?</strong></td>\n<td>Autentifikatsiya qilingan foydalanuvchini istamaydigan amallarni bajarishga majburlash</td>\n<td>Cross-Site Request Forgery — forces a user to execute unwanted actions on a web app where they're authenticated</td>\n</tr>\n<tr>\n<td>34</td>\n<td><strong>Hashing nima?</strong></td>\n<td>Kirish ma'lumotini belgilangan uzunlikdagi satrga (digest) aylantirish</td>\n<td>Transforms input data into a fixed-size string of characters that uniquely identifies the input</td>\n</tr>\n<tr>\n<td>35</td>\n<td><strong>Encryption nima?</strong></td>\n<td>Ma'lumotni ruxsatsiz kirishdan himoya qilish uchun kodlangan shaklga o'tkazish</td>\n<td>Converts data into a coded form to prevent unauthorized access</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h3 id=\"api-protokollar-api-protocols\">🔌 API &amp; Protokollar / API &amp; Protocols</h3>\n<table>\n<thead>\n<tr>\n<th>#</th>\n<th>Savol / Question</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>36</td>\n<td><strong>RESTful API nima?</strong></td>\n<td>REST tamoyillariga amal qiladigan API</td>\n<td>An API that adheres to REST principles and is used to interact with RESTful web services</td>\n</tr>\n<tr>\n<td>37</td>\n<td><strong>GraphQL nima?</strong></td>\n<td>APIlar uchun so'rov tili; o'z tip tizimingizni belgilab so'rovlarni bajarasiz</td>\n<td>A query language for APIs and a runtime for executing queries using a type system you define</td>\n</tr>\n<tr>\n<td>38</td>\n<td><strong>JSON nima?</strong></td>\n<td>Insonlar ham, mashinalar ham osongina o'qiy oladigan yengil ma'lumot almashish formati</td>\n<td>Lightweight data interchange format that's easy for humans to read and for machines to parse</td>\n</tr>\n<tr>\n<td>39</td>\n<td><strong>RPC nima?</strong></td>\n<td>Boshqa manzil yoki mashina ustida protsedura bajarilishini ta'minlash</td>\n<td>Remote Procedure Call — allows a program to cause a procedure to execute on another address space</td>\n</tr>\n<tr>\n<td>40</td>\n<td><strong>gRPC nima?</strong></td>\n<td>Yuqori unumli, ochiq manbali RPC freymvorki</td>\n<td>High-performance, open-source framework for making remote procedure calls with features like auth and load balancing</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h3 id=\"messaging-async\">📨 Messaging &amp; Async</h3>\n<table>\n<thead>\n<tr>\n<th>#</th>\n<th>Savol / Question</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>41</td>\n<td><strong>Message queue nima?</strong></td>\n<td>Microservices arxitekturasida asinxron servis-servis muloqot shakli</td>\n<td>A form of asynchronous service-to-service communication used in serverless and microservices architectures</td>\n</tr>\n<tr>\n<td>42</td>\n<td><strong>RabbitMQ nima?</strong></td>\n<td>Ilovalar o'rtasida xabar almashishni osonlashtiruvchi ochiq manbali message broker</td>\n<td>Open-source message broker software that facilitates the exchange of messages between applications</td>\n</tr>\n<tr>\n<td>43</td>\n<td><strong>Kafka nima?</strong></td>\n<td>Kuniga trillionlab hodisalarni qayta ishlay oladigan taqsimlangan event streaming platformasi</td>\n<td>Distributed event streaming platform capable of handling trillions of events a day</td>\n</tr>\n<tr>\n<td>44</td>\n<td><strong>Sync vs Async?</strong></td>\n<td>Sync — oldingi tugashini kutadi; Async — kutmasdan keyingisi boshlanishi mumkin</td>\n<td>Synchronous waits for tasks to complete; asynchronous can move to the next task before the previous one finishes</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h3 id=\"qoshimcha-miscellaneous\">🧩 Qo'shimcha / Miscellaneous</h3>\n<table>\n<thead>\n<tr>\n<th>#</th>\n<th>Savol / Question</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>45</td>\n<td><strong>Middleware (Express.js)?</strong></td>\n<td>Server so'rov lifecycle'i davomida ishga tushadigan funksiya</td>\n<td>A function that executes during the lifecycle of a request to the server</td>\n</tr>\n<tr>\n<td>46</td>\n<td><strong>RESTful endpoint nima?</strong></td>\n<td>RESTful veb-xizmat client so'rovlarini qabul qiladigan URL</td>\n<td>A URL at which a RESTful web service accepts requests from clients and provides responses</td>\n</tr>\n<tr>\n<td>47</td>\n<td><strong>MVC nima?</strong></td>\n<td>Model-View-Controller — ilovani uchta o'zaro bog'liq komponentga ajratadigan dizayn namuna</td>\n<td>Software design pattern dividing an application into three interconnected components</td>\n</tr>\n<tr>\n<td>48</td>\n<td><strong>SSR nima?</strong></td>\n<td>Veb-sahifalarni serverda render qilib, tayyor sahifani clientga yuborish</td>\n<td>Process of rendering web pages on the server and sending the fully rendered page to the client</td>\n</tr>\n<tr>\n<td>49</td>\n<td><strong>WebSocket nima?</strong></td>\n<td>Bitta TCP ulanish orqali real-time to'liq dupleks muloqot protokoli</td>\n<td>Protocol that provides full-duplex communication channels over a single TCP connection</td>\n</tr>\n<tr>\n<td>50</td>\n<td><strong>Rate limiting nima?</strong></td>\n<td>Foydalanuvchi serverga qancha so'rov yuborishi mumkinligini cheklash</td>\n<td>Controls the rate at which a user can make requests to a server, preventing abuse</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<hr />\n<h2 id=\"frontend-50-ta-savol-javob-50-qa\">🎨 FRONTEND — 50 ta savol-javob / 50 Q&amp;A</h2>\n<h3 id=\"html-css-asoslari-fundamentals\">🧱 HTML &amp; CSS Asoslari / Fundamentals</h3>\n<table>\n<thead>\n<tr>\n<th>#</th>\n<th>Savol / Question</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>1</td>\n<td><strong>HTML nima?</strong></td>\n<td>Veb-sahifadagi kontent va elementlarni tuzilmalash tili</td>\n<td>HyperText Markup Language — structures web content and elements on a webpage</td>\n</tr>\n<tr>\n<td>2</td>\n<td><strong>DOM nima?</strong></td>\n<td>HTML/XML hujjatlar uchun dasturlash interfeysi; tuzilma, uslub va kontentni o'zgartirish imkonini beradi</td>\n<td>Programming interface for HTML and XML documents; represents the page so programs can change structure, style, and content</td>\n</tr>\n<tr>\n<td>3</td>\n<td><strong>CSS nima?</strong></td>\n<td>HTML yoki XML hujjat ko'rinishini tavsiflaydi</td>\n<td>Cascading Style Sheets — describes the presentation of a document written in HTML or XML</td>\n</tr>\n<tr>\n<td>4</td>\n<td><strong>Box model nima?</strong></td>\n<td>Margin, border, padding va actual content — element egallagan joyni belgilovchi model</td>\n<td>Includes margins, borders, padding, and actual content — defines the space an element occupies</td>\n</tr>\n<tr>\n<td>5</td>\n<td><strong>Flexbox nima?</strong></td>\n<td>Elementlarni konteyner ichida samarali joylash va bo'shliqni taqsimlash CSS layout modeli</td>\n<td>CSS layout model that allows items to align and distribute space within a container efficiently</td>\n</tr>\n<tr>\n<td>6</td>\n<td><strong>CSS preprocessor nima?</strong></td>\n<td>SASS, LESS — CSS ni o'zgaruvchilar, nested qoidalar va funksiyalar bilan kengaytiruvchi vosita</td>\n<td>Tools like SASS and LESS that extend CSS with variables, nested rules, and functions</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h3 id=\"javascript\">⚡ JavaScript</h3>\n<table>\n<thead>\n<tr>\n<th>#</th>\n<th>Savol / Question</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>7</td>\n<td><strong>JavaScript nima?</strong></td>\n<td>Dinamik veb-kontent yaratish uchun dasturlash tili</td>\n<td>Programming language for creating dynamic web content such as interactive forms and animations</td>\n</tr>\n<tr>\n<td>8</td>\n<td><strong>Event delegation nima?</strong></td>\n<td>Ko'p child elementlar hodisalarini boshqarish uchun bitta event listener ni parent ga biriktirish</td>\n<td>Attaching a single event listener to a parent element to manage events for multiple child elements</td>\n</tr>\n<tr>\n<td>9</td>\n<td><strong>AJAX nima?</strong></td>\n<td>Sahifa orqasida server bilan ma'lumot almashib veb-sahifalarni asinxron yangilash</td>\n<td>Enables web pages to update asynchronously by exchanging data with a server behind the scenes</td>\n</tr>\n<tr>\n<td>32</td>\n<td><strong>== va === farqi?</strong></td>\n<td><code>==</code> tip konversiyasi bilan; <code>===</code> tip konversiyasisiz tenglikni tekshiradi</td>\n<td><code>==</code> checks equality with type coercion; <code>===</code> checks equality without type coercion</td>\n</tr>\n<tr>\n<td>33</td>\n<td><strong>Closure nima?</strong></td>\n<td>O'z leksik qamroviga kirish huquqini saqlaydigan funksiya</td>\n<td>A function that retains access to its lexical scope even when called outside that scope</td>\n</tr>\n<tr>\n<td>34</td>\n<td><strong><code>this</code> nima?</strong></td>\n<td>Funksiya chaqirilgan kontekstga ishora qiladi; qo'llanish usuliga qarab o'zgaradi</td>\n<td>Refers to the context in which a function is called; can vary based on how the function is invoked</td>\n</tr>\n<tr>\n<td>35</td>\n<td><strong>Event loop nima?</strong></td>\n<td>Call stack bo'sh bo'lganda navbatdagi callbacklarni bajariladigan asinxron boshqaruv mexanizmi</td>\n<td>Handles asynchronous operations by executing callbacks in the queue when the call stack is empty</td>\n</tr>\n<tr>\n<td>36</td>\n<td><strong>async/await nima?</strong></td>\n<td>Promise lar bilan ishlashni soddalashtiradigan sintaksis</td>\n<td>Simplifies working with promises, allowing asynchronous code to be written in a synchronous style</td>\n</tr>\n<tr>\n<td>40</td>\n<td><strong>localStorage vs sessionStorage?</strong></td>\n<td><code>localStorage</code> — aniq o'chirilmaguncha; <code>sessionStorage</code> — faqat sessiya davomida saqlanadi</td>\n<td><code>localStorage</code> persists indefinitely until deleted; <code>sessionStorage</code> persists only for the page session</td>\n</tr>\n<tr>\n<td>42</td>\n<td><strong>IIFE nima?</strong></td>\n<td>Aniqlangan zahoti ishga tushadigan funksiya; global scope'ni himoya qiladi</td>\n<td>Immediately Invoked Function Expression — runs as soon as it is defined; avoids polluting global scope</td>\n</tr>\n<tr>\n<td>50</td>\n<td><strong>let vs const farqi?</strong></td>\n<td><code>let</code> — qayta tayinlash mumkin; <code>const</code> — qayta tayinlab bo'lmaydi</td>\n<td><code>let</code> allows variable reassignment; <code>const</code> declares constants whose values cannot be reassigned</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h3 id=\"react\">⚛️ React</h3>\n<table>\n<thead>\n<tr>\n<th>#</th>\n<th>Savol / Question</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>10</td>\n<td><strong>React nima?</strong></td>\n<td>Komponent-asosli arxitektura va state boshqaruviga e'tibor qaratgan JavaScript UI kutubxonasi</td>\n<td>JavaScript library for building user interfaces, focusing on component-based architecture and state management</td>\n</tr>\n<tr>\n<td>11</td>\n<td><strong>JSX nima?</strong></td>\n<td>React da UI elementlarini tavsiflash uchun JavaScript sintaksis kengaytmasi</td>\n<td>Syntax extension for JavaScript used in React to describe UI elements</td>\n</tr>\n<tr>\n<td>12</td>\n<td><strong>Virtual DOM nima?</strong></td>\n<td>Haqiqiy DOM ning yengil nusxasi; React yangilash va renderingni optimallashtirish uchun ishlatadi</td>\n<td>Lightweight copy of the actual DOM; React uses it to optimize updates and rendering</td>\n</tr>\n<tr>\n<td>13</td>\n<td><strong>Hooks nima?</strong></td>\n<td>Funksional komponentlarda state va lifecycle xususiyatlarini ishlatishga imkon beruvchi funksiyalar</td>\n<td>Functions that let you use state and lifecycle features in functional components</td>\n</tr>\n<tr>\n<td>14</td>\n<td><strong>Redux nima?</strong></td>\n<td>JavaScript ilovalar uchun state boshqaruv kutubxonasi; holatni yagona \"store\"da markazlashtiradi</td>\n<td>State management library for JavaScript apps; centralizes application state in a single store</td>\n</tr>\n<tr>\n<td>15</td>\n<td><strong>Props vs State?</strong></td>\n<td>Props — parent dan child ga faqat o'qiladigan ma'lumot; State — komponent ichida o'zgaruvchan</td>\n<td>Props: read-only data from parent to child; State: mutable data managed within a component</td>\n</tr>\n<tr>\n<td>48</td>\n<td><strong>HOC nima?</strong></td>\n<td>Komponent qabul qilib, qo'shimcha funksionallik bilan yangi komponent qaytaruvchi funksiya</td>\n<td>A function that takes a component and returns a new component with additional functionality</td>\n</tr>\n<tr>\n<td>49</td>\n<td><strong>Memoization nima?</strong></td>\n<td>Qimmat funksiya natijalarini kesh qiluvchi optimallashtirish texnikasi</td>\n<td>Optimization technique where results of expensive function calls are cached to improve performance</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h3 id=\"angular\">🅰️ Angular</h3>\n<table>\n<thead>\n<tr>\n<th>#</th>\n<th>Savol / Question</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>16</td>\n<td><strong>Angular nima?</strong></td>\n<td>HTML va TypeScript yordamida single-page ilovalar yaratish uchun platforma</td>\n<td>Platform and framework for building single-page client applications using HTML and TypeScript</td>\n</tr>\n<tr>\n<td>17</td>\n<td><strong>Directive nima?</strong></td>\n<td>Angular da HTML ni yangi xulq-atvor bilan kengaytirish uchun DOM dagi maxsus belgilar</td>\n<td>Special markers in the DOM that tell Angular to extend HTML with new behavior</td>\n</tr>\n<tr>\n<td>18</td>\n<td><strong>Data binding nima?</strong></td>\n<td>Angular da model va view o'rtasidagi ma'lumot sinxronizatsiyasi</td>\n<td>Synchronizes data between the model and the view using one-way and two-way binding techniques</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h3 id=\"vuejs\">💚 Vue.js</h3>\n<table>\n<thead>\n<tr>\n<th>#</th>\n<th>Savol / Question</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>19</td>\n<td><strong>Vue.js nima?</strong></td>\n<td>UI va single-page ilovalar yaratish uchun progressiv JavaScript freymvorki</td>\n<td>Progressive JavaScript framework for building user interfaces and single-page applications</td>\n</tr>\n<tr>\n<td>20</td>\n<td><strong>Vue instance nima?</strong></td>\n<td>Vue ilovasining ildizi; app lifecycle'ini boshqaradi</td>\n<td>The root of a Vue application, controlling the lifecycle of the Vue app</td>\n</tr>\n<tr>\n<td>21</td>\n<td><strong>Single-file component?</strong></td>\n<td>HTML, CSS va JavaScript ni bitta <code>.vue</code> faylda kapsulalaydigan komponentlar</td>\n<td>Encapsulates HTML, CSS, and JavaScript in a single <code>.vue</code> file</td>\n</tr>\n<tr>\n<td>22</td>\n<td><strong>Lifecycle hooks (Vue)?</strong></td>\n<td>Vue komponent lifecycle'ining muayyan bosqichlarida ishlaydigan metodlar</td>\n<td>Methods that run at specific stages of a Vue component's lifecycle: <code>created</code>, <code>mounted</code>, <code>destroyed</code></td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h3 id=\"tooling-zamonaviy-web-modern-web\">🔧 Tooling &amp; Zamonaviy Web / Modern Web</h3>\n<table>\n<thead>\n<tr>\n<th>#</th>\n<th>Savol / Question</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>23</td>\n<td><strong>TypeScript nima?</strong></td>\n<td>JavaScript ning superset'i; statik tiplar qo'shib kod sifatini oshiradi</td>\n<td>Superset of JavaScript that adds static types, enhancing code quality and developer productivity</td>\n</tr>\n<tr>\n<td>24</td>\n<td><strong>TypeScript afzalliklari?</strong></td>\n<td>Kod o'qilishini yaxshilash, xatolarni erta aniqlash, yaxshiroq tooling</td>\n<td>Improved code readability, early error detection, and better tooling support</td>\n</tr>\n<tr>\n<td>25</td>\n<td><strong>Webpack nima?</strong></td>\n<td>JavaScript ilovalar uchun modul bundler</td>\n<td>Module bundler for JavaScript applications; transforms and packages code for deployment</td>\n</tr>\n<tr>\n<td>26</td>\n<td><strong>Lazy loading nima?</strong></td>\n<td>Kerak bo'lguncha muhim bo'lmagan resurslar yuklanishini kechiktirish</td>\n<td>Delays loading of non-critical resources until they are needed, improving initial load time</td>\n</tr>\n<tr>\n<td>27</td>\n<td><strong>Service worker nima?</strong></td>\n<td>Fonda ishlaydigan skriptlar; offline imkoniyatlar va fon sinxronizatsiyasini ta'minlaydi</td>\n<td>Scripts that run in the background, enabling offline capabilities and background syncing</td>\n</tr>\n<tr>\n<td>28</td>\n<td><strong>PWA nima?</strong></td>\n<td>Offline kirish va push notification lar bilan native app tajribasini taqdim etuvchi veb-ilova</td>\n<td>Web applications that provide native app-like experiences, including offline access and push notifications</td>\n</tr>\n<tr>\n<td>29</td>\n<td><strong>Responsive design nima?</strong></td>\n<td>Veb-kontentni turli ekran o'lchami va yo'nalishlariga moslashtirib optimal ko'rinishni ta'minlash</td>\n<td>Ensures web content adapts to different screen sizes and orientations for optimal viewing on any device</td>\n</tr>\n<tr>\n<td>30</td>\n<td><strong>Media query nima?</strong></td>\n<td>Ekran kengligi kabi qurilma xususiyatlariga qarab uslublar qo'llash CSS texnikasi</td>\n<td>CSS techniques used to apply styles based on device characteristics such as screen width</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h3 id=\"ilgor-css-web-advanced-css-web\">🧩 Ilg'or CSS &amp; Web / Advanced CSS &amp; Web</h3>\n<table>\n<thead>\n<tr>\n<th>#</th>\n<th>Savol / Question</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>31</td>\n<td><strong>CSS Grid nima?</strong></td>\n<td>Murakkab layoutlarni osonroq yaratishga imkon beruvchi ikki o'lchamli CSS layout tizimi</td>\n<td>Two-dimensional layout system for the web, allowing designers to create complex layouts more easily</td>\n</tr>\n<tr>\n<td>37</td>\n<td><strong>CORS nima?</strong></td>\n<td>Boshqa domendan so'ralgan resurslarga ruxsat beruvchi yoki cheklovchi xavfsizlik xususiyati</td>\n<td>Security feature that allows or restricts resources on a web page requested from another domain</td>\n</tr>\n<tr>\n<td>38</td>\n<td><strong>REST API nima?</strong></td>\n<td>CRUD operatsiyalarini bajarish uchun HTTP so'rovlaridan foydalanadigan arxitektura uslubi</td>\n<td>Architectural style for designing networked applications, using HTTP requests to perform CRUD operations</td>\n</tr>\n<tr>\n<td>39</td>\n<td><strong>GraphQL (Frontend)?</strong></td>\n<td>Clientlarga bitta so'rovda aniq ma'lumot so'rash va agregatsiyalashga imkon beruvchi so'rov tili</td>\n<td>Query language for APIs, enabling clients to request specific data and aggregate responses in a single request</td>\n</tr>\n<tr>\n<td>43</td>\n<td><strong>Shadow DOM nima?</strong></td>\n<td>DOM daraxtining bir qismini kapsulalaydi; scoped styling va xulq-atvorni ta'minlaydi</td>\n<td>Encapsulates a part of the DOM tree, allowing for scoped styling and behavior</td>\n</tr>\n<tr>\n<td>44</td>\n<td><strong>CSS transition nima?</strong></td>\n<td>CSS xususiyatlardagi o'zgarishlar tezligini boshqarish; silliq animatsiyalar</td>\n<td>Provides a way to control the speed of changes to CSS properties, enabling smooth animations</td>\n</tr>\n<tr>\n<td>45</td>\n<td><strong>Polyfill nima?</strong></td>\n<td>Eski brauzerlar uchun zamonaviy funksionallikni ta'minlovchi kod</td>\n<td>Code that provides modern functionality on older browsers that do not natively support it</td>\n</tr>\n<tr>\n<td>46</td>\n<td><strong>BEM nima?</strong></td>\n<td>Block Element Modifier — CSS sinflarini nomlash konventsiyasi</td>\n<td>Naming convention for CSS classes, aiming to make CSS more maintainable and scalable</td>\n</tr>\n<tr>\n<td>47</td>\n<td><strong>CSS variable nima?</strong></td>\n<td>Hujjat bo'ylab qayta ishlatish uchun belgilangan custom properties</td>\n<td>Custom properties defined by CSS authors that contain specific values to be reused throughout the document</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h2 id=\"eslatmalar-notes\">💡 Eslatmalar / Notes</h2>\n<blockquote>\n<p><strong>🔧 Backend intervyu uchun / For Backend interviews:</strong>\n- ACID, Indexing, Normalization — DB savollari ko'p chiqadi / DB questions appear frequently\n- JWT + OAuth autentifikatsiya zanjiri / authentication chain\n- Async/Sync farqi — FastAPI bilan ishlaganda juda muhim / very important for FastAPI\n- Docker, Kubernetes asosiy tushunchalari / basic concepts</p>\n<p><strong>🎨 Frontend intervyu uchun / For Frontend interviews:</strong>\n- Virtual DOM va React Hooks\n- JavaScript: Closure, Event loop, async/await\n- CSS: Box model, Flexbox, Grid\n- TypeScript afzalliklari / advantages</p>\n</blockquote>\n<hr />\n<p><em>Tayyorlagan / Prepared by: Alyorjon | Manba / Source: 100 Backend &amp; Frontend Interview Q&amp;A PDF</em></p>"}};

let currentPage = 'python';

function showPage(key) {
  if (!PAGES[key]) return;

  // Update nav
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`[data-page="${key}"]`);
  if (btn) btn.classList.add('active');

  // Set content
  currentPage = key;
  const body = document.getElementById('page-body');
  body.innerHTML = PAGES[key].body;

  // Syntax highlight
  body.querySelectorAll('pre code').forEach(el => {
    hljs.highlightElement(el);
  });

  // Scroll to top
  document.getElementById('main').scrollTo(0, 0);

  // Update title
  document.title = PAGES[key].label + ' — Interview Prep';

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');

  // Update URL hash
  history.pushState(null, '', '#' + key);
}

// Progress bar
document.getElementById('main').addEventListener('scroll', function() {
  const el = this;
  const progress = el.scrollTop / (el.scrollHeight - el.clientHeight);
  document.getElementById('progress').style.transform = `scaleX(${progress})`;
  const topBtn = document.getElementById('top-btn');
  el.scrollTop > 300 ? topBtn.classList.add('visible') : topBtn.classList.remove('visible');
});

function scrollToTop() {
  document.getElementById('main').scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
}

// Search
function searchContent(q) {
  const navList = document.getElementById('navList');
  const buttons = navList.querySelectorAll('.nav-btn');
  q = q.toLowerCase().trim();
  buttons.forEach(btn => {
    const label = btn.textContent.toLowerCase();
    btn.style.display = (q === '' || label.includes(q)) ? '' : 'none';
  });
}

// Init
const hash = location.hash.replace('#', '');
showPage(hash && PAGES[hash] ? hash : 'python');
</script>
