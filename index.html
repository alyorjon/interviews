t</td>\n</tr>\n<tr>\n<td>UZ: Tezlik</td>\n<td>🐢 Sekin</td>\n<td>⚡ Tez</td>\n</tr>\n<tr>\n<td>EN: Branching</td>\n<td>Complex</td>\n<td>Simple</td>\n</tr>\n<tr>\n<td>UZ: Branching</td>\n<td>Murakkab</td>\n<td>Oddiy</td>\n</tr>\n<tr>\n<td>EN: Full backup</td>\n<td>❌ Server only</td>\n<td>✅ Every developer</td>\n</tr>\n<tr>\n<td>UZ: To'liq zaxira</td>\n<td>❌ Faqat server</td>\n<td>✅ Har bir developer</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h2 id=\"60-how-to-lock-a-branch-why-we-need-to-lock-a-branch-branchni-qanday-bloklash-mumkin-nima-uchun-kerak\">60. How to Lock a branch? Why we need to lock a branch? | Branchni qanday bloklash mumkin? Nima uchun kerak?</h2>\n<p><strong>EN:</strong> Branch protection rules prevent accidental direct pushes to important branches like <code>main</code>.</p>\n<p><strong>UZ:</strong> Branch protection qoidalari <code>main</code> kabi muhim branchlarga tasodifiy to'g'ridan-to'g'ri push qilishni oldini oladi.</p>\n<pre><code>GitHub UI:\nRepository → Settings → Branches → Add branch protection rule\n\nEN: Recommended settings | UZ: Tavsiya etilgan sozlamalar:\n✅ Require pull request reviews before merging\n✅ Require status checks to pass before merging\n✅ Include administrators\n✅ Restrict who can push to matching branches\n</code></pre>\n<hr />\n<h2 id=\"61-how-to-delete-repository-in-github-githubda-repositoryni-qanday-ochirish-mumkin\">61. How to delete Repository in GitHub? | GitHub'da Repository'ni qanday o'chirish mumkin?</h2>\n<p><strong>EN:</strong> Delete through repository settings. This action is permanent and irreversible.</p>\n<p><strong>UZ:</strong> Repository sozlamalari orqali o'chirish. Bu amal qaytarib bo'lmaydi.</p>\n<pre><code>Repository → Settings → Scroll to bottom (Pastga aylantiring)\n→ Danger Zone → Delete this repository\n→ Type repository name (Repo nomini yozing)\n→ &quot;I understand the consequences, delete the repository&quot;\n\n⚠️ EN: Cannot be undone! | UZ: Qaytarib bo'lmaydi!\n</code></pre>\n<hr />\n<h2 id=\"62-how-to-give-an-access-to-a-specific-person-to-repository-repositoryga-malum-odamga-qanday-kirish-huquqi-berish-mumkin\">62. How to give an access to a specific person to repository? | Repository'ga ma'lum odamga qanday kirish huquqi berish mumkin?</h2>\n<p><strong>EN:</strong> Add collaborators through repository settings. They'll receive an email invitation.</p>\n<p><strong>UZ:</strong> Repository sozlamalari orqali collaborator qo'shing. Ular email taklif oladi.</p>\n<pre><code>Repository → Settings → Collaborators → Add people\n→ Enter username or email (Username yoki email kiriting)\n→ Add collaborator\n→ EN: User accepts invitation via email | UZ: Foydalanuvchi emaildagi taklifni qabul qiladi\n</code></pre>\n<pre><code class=\"language-bash\"># EN: After accepting, collaborator can:\n# UZ: Qabul qilgach, collaborator qila oladi:\ngit clone https://github.com/your-username/repo.git\ngit push origin feature/their-work\ngit pull\n</code></pre>\n<hr />\n<h2 id=\"quick-reference-tez-qollanma\">📌 Quick Reference | Tez Qo'llanma</h2>\n<pre><code class=\"language-bash\"># ═══ SETUP | SOZLASH ═══\ngit init                            # New repo | Yangi repo\ngit clone &lt;url&gt;                     # Download repo | Repo yuklab olish\ngit config --global user.name &quot;&quot;    # Set name | Ism o'rnatish\ngit config --global user.email &quot;&quot;   # Set email | Email o'rnatish\n\n# ═══ DAILY WORKFLOW | KUNLIK ISH OQIMI ═══\ngit status                          # Check status | Holat tekshirish\ngit add &lt;file&gt;                      # Stage file | Staging\ngit add .                           # Stage all | Hammasini stage qilish\ngit commit -m &quot;message&quot;             # Commit | Commit\ngit push origin main                # Upload | Yuklash\ngit pull                            # Download + merge | Yuklab birlashtirish\n\n# ═══ BRANCHING ═══\ngit branch &lt;name&gt;                   # Create | Yaratish\ngit checkout &lt;name&gt;                 # Switch | O'tish\ngit checkout -b &lt;name&gt;             # Create + Switch | Yaratib o'tish\ngit merge &lt;branch&gt;                  # Merge | Birlashtirish\ngit branch -d &lt;name&gt;               # Delete | O'chirish\ngit push origin -d &lt;name&gt;          # Delete remote | Remote'dan o'chirish\n\n# ═══ HISTORY | TARIX ═══\ngit log --oneline                   # Short log | Qisqa log\ngit diff &lt;id1&gt;..&lt;id2&gt;              # Compare commits | Commitlarni solishtirish\ngit reset --soft &lt;id&gt;              # Undo to staging | Staging'ga qaytarish\ngit reset --mixed &lt;id&gt;             # Undo to working | Working'ga qaytarish\ngit reset --hard &lt;id&gt;              # ⚠️ Delete changes | O'zgarishlarni o'chirish\ngit revert &lt;id&gt;                    # Safe undo | Xavfsiz bekor qilish\n\n# ═══ STASH ═══\ngit stash save &quot;message&quot;           # Save temp | Vaqtincha saqlash\ngit stash list                     # View stashes | Ko'rish\ngit stash pop                      # Restore + delete | Qaytarish + o'chirish\ngit stash apply                    # Restore only | Faqat qaytarish\n\n# ═══ REMOTE ═══\ngit remote -v                      # Show remotes | Remote'larni ko'rish\ngit remote set-url origin &lt;url&gt;    # Change URL | URL o'zgartirish\ngit fetch origin                   # Download only | Faqat yuklab olish\ngit branch -a                      # All branches | Barcha branchlar\n</code></pre>\n<hr />\n<p><em>Prepared by | Tayyorlagan: Alyorjon</em><br />\n<em>Source | Manba: GIT Interview Q&amp;A</em></p>"}, "sql": {"label": "🗄️ SQL Commands", "body": "<h1 id=\"100-sql-commands-bilingual-reference-ikki-tilli-qollanma\">🗄️ 100 SQL Commands — Bilingual Reference / Ikki tilli qo'llanma</h1>\n<blockquote>\n<p><strong>Manba / Source:</strong> 100 SQL Commands PDF<br />\n<strong>Tillar / Languages:</strong> O'zbek 🇺🇿 | English 🇬🇧<br />\n<strong>Maqsad / Goal:</strong> SQL buyruqlarini tez esga olish uchun / Quick SQL reference</p>\n</blockquote>\n<hr />\n<h2 id=\"1-dml-malumot-boshqaruvi-data-manipulation\">📌 1. DML — Ma'lumot boshqaruvi / Data Manipulation</h2>\n<blockquote>\n<p>Mavjud ma'lumotlar ustida amal bajaradi / Works on existing data</p>\n</blockquote>\n<table>\n<thead>\n<tr>\n<th>Buyruq / Command</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>SELECT</code></td>\n<td>Ma'lumotlar bazasidan ma'lumot oladi</td>\n<td>Retrieves data from a database</td>\n</tr>\n<tr>\n<td><code>INSERT</code></td>\n<td>Ma'lumotlar bazasiga yangi ma'lumot qo'shadi</td>\n<td>Inserts new data into a database</td>\n</tr>\n<tr>\n<td><code>UPDATE</code></td>\n<td>Ma'lumotlar bazasidagi mavjud ma'lumotni yangilaydi</td>\n<td>Updates existing data in a database</td>\n</tr>\n<tr>\n<td><code>DELETE</code></td>\n<td>Ma'lumotlar bazasidan ma'lumot o'chiradi</td>\n<td>Deletes data from a database</td>\n</tr>\n</tbody>\n</table>\n<pre><code class=\"language-sql\">-- Misol / Example\nSELECT name, age FROM users WHERE age &gt; 18;\nINSERT INTO users (name, age) VALUES ('Ali', 25);\nUPDATE users SET age = 26 WHERE name = 'Ali';\nDELETE FROM users WHERE name = 'Ali';\n</code></pre>\n<hr />\n<h2 id=\"2-ddl-tuzilma-boshqaruvi-data-definition\">📌 2. DDL — Tuzilma boshqaruvi / Data Definition</h2>\n<blockquote>\n<p>Jadval va ma'lumotlar bazasi tuzilmasini yaratish/o'zgartirish / Creates and modifies structure</p>\n</blockquote>\n<table>\n<thead>\n<tr>\n<th>Buyruq / Command</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>CREATE DATABASE</code></td>\n<td>Yangi ma'lumotlar bazasi yaratadi</td>\n<td>Creates a new database</td>\n</tr>\n<tr>\n<td><code>CREATE TABLE</code></td>\n<td>Ma'lumotlar bazasida yangi jadval yaratadi</td>\n<td>Creates a new table in a database</td>\n</tr>\n<tr>\n<td><code>ALTER TABLE</code></td>\n<td>Mavjud jadval tuzilmasini o'zgartiradi</td>\n<td>Modifies an existing table structure</td>\n</tr>\n<tr>\n<td><code>DROP TABLE</code></td>\n<td>Ma'lumotlar bazasidan jadvalni o'chiradi</td>\n<td>Deletes a table from a database</td>\n</tr>\n<tr>\n<td><code>TRUNCATE TABLE</code></td>\n<td>Jadvaldagi barcha yozuvlarni o'chiradi (tuzilma saqlanadi)</td>\n<td>Removes all records from a table (structure remains)</td>\n</tr>\n<tr>\n<td><code>CREATE INDEX</code></td>\n<td>Jadvalda indeks yaratadi</td>\n<td>Creates an index on a table</td>\n</tr>\n<tr>\n<td><code>DROP INDEX</code></td>\n<td>Jadvaldan indeksni o'chiradi</td>\n<td>Deletes an index from a table</td>\n</tr>\n</tbody>\n</table>\n<pre><code class=\"language-sql\">-- Misol / Example\nCREATE DATABASE mydb;\nCREATE TABLE users (id SERIAL PRIMARY KEY, name VARCHAR(100));\nALTER TABLE users ADD COLUMN email VARCHAR(255);\nDROP TABLE old_users;\nTRUNCATE TABLE logs;\nCREATE INDEX idx_name ON users(name);\n</code></pre>\n<hr />\n<h2 id=\"3-join-jadvallarni-birlashtirish-joining-tables\">📌 3. JOIN — Jadvallarni birlashtirish / Joining Tables</h2>\n<blockquote>\n<p>Ikki yoki undan ko'p jadvaldagi ma'lumotlarni birlashtiradi / Combines rows from multiple tables</p>\n</blockquote>\n<table>\n<thead>\n<tr>\n<th>Buyruq / Command</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>JOIN</code></td>\n<td>Bog'liq ustun asosida ikki yoki ko'p jadvaldagi satrlarni birlashtiradi</td>\n<td>Combines rows from two or more tables based on a related column</td>\n</tr>\n<tr>\n<td><code>INNER JOIN</code></td>\n<td>Ikkala jadvalda ham mos keladigan satrlarni qaytaradi</td>\n<td>Returns rows when there is a match in both tables</td>\n</tr>\n<tr>\n<td><code>LEFT JOIN</code></td>\n<td>Chap jadvaldagi barcha satrlar + o'ng jadvaldan mos kelganlar</td>\n<td>Returns all rows from left table + matched rows from right</td>\n</tr>\n<tr>\n<td><code>RIGHT JOIN</code></td>\n<td>O'ng jadvaldagi barcha satrlar + chap jadvaldan mos kelganlar</td>\n<td>Returns all rows from right table + matched rows from left</td>\n</tr>\n<tr>\n<td><code>FULL JOIN</code></td>\n<td>Jadvallardan birida mos kelganda barcha satrlarni qaytaradi</td>\n<td>Returns rows when there is a match in one of the tables</td>\n</tr>\n</tbody>\n</table>\n<pre><code class=\"language-sql\">-- Misol / Example\nSELECT u.name, o.total\nFROM users u\nINNER JOIN orders o ON u.id = o.user_id;\n\nSELECT u.name, o.total\nFROM users u\nLEFT JOIN orders o ON u.id = o.user_id;\n</code></pre>\n<hr />\n<h2 id=\"4-set-operatorlari-set-operators\">📌 4. SET operatorlari / SET Operators</h2>\n<blockquote>\n<p>Bir nechta SELECT natijalarini birlashtiradi / Combines results of multiple SELECT statements</p>\n</blockquote>\n<table>\n<thead>\n<tr>\n<th>Buyruq / Command</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>UNION</code></td>\n<td>Ikki yoki ko'p SELECT natijalarini birlashtiradi (takrorlanmaslar)</td>\n<td>Combines results of two or more SELECT statements (no duplicates)</td>\n</tr>\n<tr>\n<td><code>UNION ALL</code></td>\n<td>Ikki yoki ko'p SELECT natijalarini birlashtiradi (takrorlanishlar bilan)</td>\n<td>Combines results including duplicates</td>\n</tr>\n<tr>\n<td><code>INTERSECT</code></td>\n<td>Ikki natija to'plamining kesishmasini qaytaradi</td>\n<td>Returns the intersection of two result sets</td>\n</tr>\n<tr>\n<td><code>EXCEPT</code></td>\n<td>Ikki natija to'plami o'rtasidagi farqni qaytaradi</td>\n<td>Returns the difference between two result sets</td>\n</tr>\n</tbody>\n</table>\n<pre><code class=\"language-sql\">-- Misol / Example\nSELECT name FROM employees\nUNION\nSELECT name FROM managers;\n\nSELECT name FROM employees\nINTERSECT\nSELECT name FROM managers;\n</code></pre>\n<hr />\n<h2 id=\"5-filtrlash-saralash-filtering-sorting\">📌 5. Filtrlash &amp; Saralash / Filtering &amp; Sorting</h2>\n<blockquote>\n<p>Ma'lumotlarni filtrlash va tartiblash uchun / For filtering and ordering data</p>\n</blockquote>\n<table>\n<thead>\n<tr>\n<th>Buyruq / Command</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>WHERE</code></td>\n<td>Belgilangan shartlar asosida yozuvlarni filtrlaydi</td>\n<td>Filters records based on specified conditions</td>\n</tr>\n<tr>\n<td><code>AND</code></td>\n<td>WHERE shartida bir nechta shartni birlashtiradi</td>\n<td>Combines multiple conditions in a WHERE clause</td>\n</tr>\n<tr>\n<td><code>OR</code></td>\n<td>WHERE shartida bir nechta muqobil shartni belgilaydi</td>\n<td>Specifies multiple alternative conditions in a WHERE clause</td>\n</tr>\n<tr>\n<td><code>NOT</code></td>\n<td>WHERE shartidagi shartni inkor etadi</td>\n<td>Negates a condition in a WHERE clause</td>\n</tr>\n<tr>\n<td><code>BETWEEN</code></td>\n<td>Belgilangan oraliq ichidagi qiymatlarni tanlaydi</td>\n<td>Selects values within a specified range</td>\n</tr>\n<tr>\n<td><code>IN</code></td>\n<td>Ustun uchun bir nechta qiymat belgilaydi</td>\n<td>Specifies multiple values for a column</td>\n</tr>\n<tr>\n<td><code>LIKE</code></td>\n<td>Namunaga mos keladigan qiymatlarni qidiradi</td>\n<td>Searches for a pattern in a column</td>\n</tr>\n<tr>\n<td><code>ORDER BY</code></td>\n<td>Natija to'plamini o'suvchi yoki kamayuvchi tartibda saralaydi</td>\n<td>Sorts the result set in ascending or descending order</td>\n</tr>\n<tr>\n<td><code>LIMIT</code></td>\n<td>So'rov qaytaradigan satrlar sonini cheklaydi (PostgreSQL/MySQL)</td>\n<td>Limits the number of rows returned by a query</td>\n</tr>\n<tr>\n<td><code>OFFSET</code></td>\n<td>Satrlarni qaytarishdan oldin o'tkazib yuboriladigan satrlar sonini belgilaydi</td>\n<td>Specifies number of rows to skip before returning rows</td>\n</tr>\n<tr>\n<td><code>TOP</code></td>\n<td>So'rov qaytaradigan satrlar sonini cheklaydi (SQL Server)</td>\n<td>Limits the number of rows returned (SQL Server)</td>\n</tr>\n<tr>\n<td><code>FETCH</code></td>\n<td>Natija to'plamidan satrlarni bittadan oladi</td>\n<td>Retrieves rows from a result set one at a time</td>\n</tr>\n<tr>\n<td><code>DISTINCT</code></td>\n<td>Ustundan yagona (takrorlanmaydigan) qiymatlarni tanlaydi</td>\n<td>Selects unique values from a column</td>\n</tr>\n</tbody>\n</table>\n<pre><code class=\"language-sql\">-- Misol / Example\nSELECT * FROM products\nWHERE price BETWEEN 10 AND 100\n  AND category IN ('Electronics', 'Books')\nORDER BY price DESC\nLIMIT 10 OFFSET 20;\n</code></pre>\n<hr />\n<h2 id=\"6-agregat-funksiyalar-aggregate-functions\">📌 6. Agregat funksiyalar / Aggregate Functions</h2>\n<blockquote>\n<p>Guruhlar bo'yicha hisob-kitob qiladi / Performs calculations across groups</p>\n</blockquote>\n<table>\n<thead>\n<tr>\n<th>Buyruq / Command</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>COUNT</code></td>\n<td>Shartni qanoatlantiradigan satrlar sonini qaytaradi</td>\n<td>Returns the number of rows that satisfy the condition</td>\n</tr>\n<tr>\n<td><code>SUM</code></td>\n<td>Qiymatlar to'plamining yig'indisini hisoblaydi</td>\n<td>Calculates the sum of a set of values</td>\n</tr>\n<tr>\n<td><code>AVG</code></td>\n<td>Qiymatlar to'plamining o'rtachasini hisoblaydi</td>\n<td>Calculates the average of a set of values</td>\n</tr>\n<tr>\n<td><code>MIN</code></td>\n<td>Qiymatlar to'plamidagi eng kichik qiymatni qaytaradi</td>\n<td>Returns the smallest value in a set of values</td>\n</tr>\n<tr>\n<td><code>MAX</code></td>\n<td>Qiymatlar to'plamidagi eng katta qiymatni qaytaradi</td>\n<td>Returns the largest value in a set of values</td>\n</tr>\n<tr>\n<td><code>GROUP BY</code></td>\n<td>Bir xil qiymatlarga ega satrlarni xulosaviy satrlarga guruhlaydi</td>\n<td>Groups rows with the same values into summary rows</td>\n</tr>\n<tr>\n<td><code>HAVING</code></td>\n<td>Belgilangan shart asosida yozuvlarni filtrlaydi (GROUP BY dan keyin)</td>\n<td>Filters records based on a condition (used after GROUP BY)</td>\n</tr>\n</tbody>\n</table>\n<pre><code class=\"language-sql\">-- Misol / Example\nSELECT department, COUNT(*) as total, AVG(salary) as avg_salary\nFROM employees\nGROUP BY department\nHAVING COUNT(*) &gt; 5\nORDER BY avg_salary DESC;\n</code></pre>\n<hr />\n<h2 id=\"7-null-tekshiruvi-null-checks\">📌 7. NULL tekshiruvi / NULL Checks</h2>\n<table>\n<thead>\n<tr>\n<th>Buyruq / Command</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>IS NULL</code></td>\n<td>Ustundagi NULL qiymatlarni tekshiradi</td>\n<td>Checks for NULL values in a column</td>\n</tr>\n<tr>\n<td><code>IS NOT NULL</code></td>\n<td>Ustundagi NULL bo'lmagan qiymatlarni tekshiradi</td>\n<td>Checks for non-NULL values in a column</td>\n</tr>\n<tr>\n<td><code>EXISTS</code></td>\n<td>Subquery'da birorta yozuv mavjudligini tekshiradi</td>\n<td>Tests for the existence of any record in a subquery</td>\n</tr>\n<tr>\n<td><code>COALESCE</code></td>\n<td>Ro'yxatdagi birinchi NULL bo'lmagan ifodasini qaytaradi</td>\n<td>Returns the first non-NULL expression in a list</td>\n</tr>\n<tr>\n<td><code>NULLIF</code></td>\n<td>Ikki ifoda teng bo'lsa NULL qaytaradi, aks holda birinchisini</td>\n<td>Returns NULL if two expressions are equal, otherwise returns the first</td>\n</tr>\n</tbody>\n</table>\n<pre><code class=\"language-sql\">-- Misol / Example\nSELECT name, COALESCE(phone, 'N/A') as phone\nFROM users\nWHERE email IS NOT NULL;\n\nSELECT NULLIF(salary, 0) FROM employees;\n</code></pre>\n<hr />\n<h2 id=\"8-shartli-mantiq-conditional-logic\">📌 8. Shartli mantiq / Conditional Logic</h2>\n<table>\n<thead>\n<tr>\n<th>Buyruq / Command</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>CASE</code></td>\n<td>SQL iboralarida shartli mantiqni bajaradi</td>\n<td>Performs conditional logic in SQL statements</td>\n</tr>\n<tr>\n<td><code>WHEN</code></td>\n<td>CASE iborasida shartlarni belgilaydi</td>\n<td>Specifies conditions in a CASE statement</td>\n</tr>\n<tr>\n<td><code>THEN</code></td>\n<td>CASE da shart to'g'ri bo'lganda natijani belgilaydi</td>\n<td>Specifies result if a condition is true in CASE</td>\n</tr>\n<tr>\n<td><code>ELSE</code></td>\n<td>CASE da hech bir shart to'g'ri bo'lmasa natijani belgilaydi</td>\n<td>Specifies result if no condition is true in CASE</td>\n</tr>\n<tr>\n<td><code>END</code></td>\n<td>CASE iborasini tugatadi</td>\n<td>Ends the CASE statement</td>\n</tr>\n<tr>\n<td><code>CASE WHEN</code></td>\n<td>SELECT iboralarida shartli ifoda</td>\n<td>Conditional expression in SELECT statements</td>\n</tr>\n<tr>\n<td><code>IIF</code></td>\n<td>Boolean ifodaga asoslanib ikki qiymatdan birini qaytaradi</td>\n<td>Returns one of two values based on a Boolean expression</td>\n</tr>\n</tbody>\n</table>\n<pre><code class=\"language-sql\">-- Misol / Example\nSELECT name,\n  CASE\n    WHEN salary &gt; 5000000 THEN 'Yuqori / High'\n    WHEN salary &gt; 2000000 THEN 'O''rta / Medium'\n    ELSE 'Past / Low'\n  END as salary_level\nFROM employees;\n</code></pre>\n<hr />\n<h2 id=\"9-cheklovlar-constraints\">📌 9. Cheklovlar / Constraints</h2>\n<blockquote>\n<p>Ma'lumot yaxlitligini ta'minlaydi / Ensures data integrity</p>\n</blockquote>\n<table>\n<thead>\n<tr>\n<th>Buyruq / Command</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>PRIMARY KEY</code></td>\n<td>Jadvaldagi har bir yozuvni yagona identifikatsiya qiladi</td>\n<td>Uniquely identifies each record in a table</td>\n</tr>\n<tr>\n<td><code>FOREIGN KEY</code></td>\n<td>Jadvallar o'rtasida munosabat o'rnatadi</td>\n<td>Establishes a relationship between tables</td>\n</tr>\n<tr>\n<td><code>CONSTRAINT</code></td>\n<td>Jadvaldagi ma'lumotlar uchun qoidalarni joriy qiladi</td>\n<td>Enforces rules for data in a table</td>\n</tr>\n<tr>\n<td><code>NOT NULL</code></td>\n<td>Ustun NULL qiymat qabul qila olmasligini ta'minlaydi</td>\n<td>Ensures that a column cannot contain NULL values</td>\n</tr>\n<tr>\n<td><code>UNIQUE</code></td>\n<td>Ustundagi barcha qiymatlar yagona bo'lishini ta'minlaydi</td>\n<td>Ensures that all values in a column are unique</td>\n</tr>\n<tr>\n<td><code>CHECK</code></td>\n<td>Ustundagi qiymatlarga shart joriy qiladi</td>\n<td>Enforces a condition on the values in a column</td>\n</tr>\n</tbody>\n</table>\n<pre><code class=\"language-sql\">-- Misol / Example\nCREATE TABLE orders (\n    id        SERIAL PRIMARY KEY,\n    user_id   INT NOT NULL REFERENCES users(id),\n    amount    DECIMAL CHECK (amount &gt; 0),\n    status    VARCHAR(20) DEFAULT 'pending',\n    CONSTRAINT uq_order UNIQUE (user_id, created_at)\n);\n</code></pre>\n<hr />\n<h2 id=\"10-foreign-key-harakatlari-foreign-key-actions\">📌 10. Foreign Key harakatlari / Foreign Key Actions</h2>\n<table>\n<thead>\n<tr>\n<th>Buyruq / Command</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>CASCADE</code></td>\n<td>Bog'liq yozuvlarda belgilangan amalni avtomatik bajaradi</td>\n<td>Automatically performs a specified action on related records</td>\n</tr>\n<tr>\n<td><code>SET NULL</code></td>\n<td>Havola qilingan yozuv o'chirilganda FK ustunlarini NULL ga o'rnatadi</td>\n<td>Sets FK columns to NULL when referenced record is deleted</td>\n</tr>\n<tr>\n<td><code>SET DEFAULT</code></td>\n<td>Havola qilingan yozuv o'chirilganda FK ustunlarini default qiymatga o'rnatadi</td>\n<td>Sets FK columns to default value when referenced record is deleted</td>\n</tr>\n<tr>\n<td><code>NO ACTION</code></td>\n<td>Havola qilingan yozuv o'chirilganda bog'liq yozuvlarda hech narsa qilmaydi</td>\n<td>Specifies no action on related records when referenced is deleted</td>\n</tr>\n<tr>\n<td><code>RESTRICT</code></td>\n<td>Bog'liq yozuvlar mavjud bo'lsa havola qilingan yozuvni o'chirishni cheklaydi</td>\n<td>Restricts deletion if there are related records</td>\n</tr>\n</tbody>\n</table>\n<pre><code class=\"language-sql\">-- Misol / Example\nCREATE TABLE orders (\n    user_id INT REFERENCES users(id) ON DELETE CASCADE,\n    dept_id INT REFERENCES departments(id) ON DELETE SET NULL\n);\n</code></pre>\n<hr />\n<h2 id=\"11-window-funksiyalar-window-functions\">📌 11. Window funksiyalar / Window Functions</h2>\n<blockquote>\n<p>Hisob-kitobni qatorlar guruhi bo'yicha bajaradi / Performs calculations across a set of rows</p>\n</blockquote>\n<table>\n<thead>\n<tr>\n<th>Buyruq / Command</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>ROW_NUMBER()</code></td>\n<td>Natija to'plamidagi har bir satrga yagona ketma-ket son beradi</td>\n<td>Assigns a unique sequential integer to each row</td>\n</tr>\n<tr>\n<td><code>RANK()</code></td>\n<td>Natija to'plamidagi har bir satrga rank beradi (oraliqlar bo'lishi mumkin)</td>\n<td>Assigns a rank with possible gaps in sequence</td>\n</tr>\n<tr>\n<td><code>DENSE_RANK()</code></td>\n<td>Natija to'plamidagi har bir satrga rank beradi (oraliqsiz)</td>\n<td>Assigns a rank with no gaps in sequence</td>\n</tr>\n<tr>\n<td><code>NTILE()</code></td>\n<td>Natija to'plamini teng o'lchamli guruhlarga bo'ladi</td>\n<td>Divides the result set into equally sized groups</td>\n</tr>\n<tr>\n<td><code>LEAD()</code></td>\n<td>Natija to'plamidagi keyingi satrdan qiymat oladi</td>\n<td>Retrieves the value from the next row in a result set</td>\n</tr>\n<tr>\n<td><code>LAG()</code></td>\n<td>Natija to'plamidagi oldingi satrdan qiymat oladi</td>\n<td>Retrieves the value from the previous row in a result set</td>\n</tr>\n<tr>\n<td><code>PARTITION BY</code></td>\n<td>Natija to'plamini window funksiya alohida qo'llaniladigan bo'limlarga ajratadi</td>\n<td>Divides result set into partitions for window functions</td>\n</tr>\n<tr>\n<td><code>ROWS</code></td>\n<td>Window funksiyalar uchun window freymini belgilaydi</td>\n<td>Specifies the window frame for window functions</td>\n</tr>\n<tr>\n<td><code>RANGE</code></td>\n<td>Qatorlar emas, qiymatlar asosida window freymini belgilaydi</td>\n<td>Specifies window frame based on values rather than rows</td>\n</tr>\n</tbody>\n</table>\n<pre><code class=\"language-sql\">-- Misol / Example\nSELECT name, salary, department,\n    ROW_NUMBER() OVER (PARTITION BY department ORDER BY salary DESC) as rank_in_dept,\n    LAG(salary) OVER (ORDER BY salary) as prev_salary,\n    LEAD(salary) OVER (ORDER BY salary) as next_salary\nFROM employees;\n</code></pre>\n<hr />\n<h2 id=\"12-cte-subquery\">📌 12. CTE &amp; Subquery</h2>\n<table>\n<thead>\n<tr>\n<th>Buyruq / Command</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>WITH</code></td>\n<td>Umumiy jadval ifodasini (CTE) belgilaydi</td>\n<td>Defines a common table expression (CTE)</td>\n</tr>\n<tr>\n<td><code>INTO</code></td>\n<td>SELECT natija to'plami uchun maqsadli jadvalni belgilaydi</td>\n<td>Specifies a target table for a SELECT result set</td>\n</tr>\n</tbody>\n</table>\n<pre><code class=\"language-sql\">-- Misol / Example (CTE)\nWITH top_earners AS (\n    SELECT name, salary, department\n    FROM employees\n    WHERE salary &gt; 3000000\n)\nSELECT department, COUNT(*) as count\nFROM top_earners\nGROUP BY department;\n</code></pre>\n<hr />\n<h2 id=\"13-sana-vaqt-funksiyalari-date-time-functions\">📌 13. Sana &amp; Vaqt funksiyalari / Date &amp; Time Functions</h2>\n<table>\n<thead>\n<tr>\n<th>Buyruq / Command</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>CURRENT_TIMESTAMP</code></td>\n<td>Joriy sana va vaqtni qaytaradi</td>\n<td>Returns the current date and time</td>\n</tr>\n<tr>\n<td><code>CURRENT_DATE</code></td>\n<td>Joriy sanani qaytaradi</td>\n<td>Returns the current date</td>\n</tr>\n<tr>\n<td><code>CURRENT_TIME</code></td>\n<td>Joriy vaqtni qaytaradi</td>\n<td>Returns the current time</td>\n</tr>\n<tr>\n<td><code>DATEADD</code></td>\n<td>Sanaga belgilangan vaqt oralig'ini qo'shadi</td>\n<td>Adds a specified time interval to a date</td>\n</tr>\n<tr>\n<td><code>DATEDIFF</code></td>\n<td>Ikki sana o'rtasidagi farqni hisoblaydi</td>\n<td>Calculates the difference between two dates</td>\n</tr>\n<tr>\n<td><code>DATEPART</code></td>\n<td>Sananing ma'lum bir qismini ajratib oladi</td>\n<td>Extracts a specific part of a date</td>\n</tr>\n<tr>\n<td><code>GETDATE</code></td>\n<td>Joriy sana va vaqtni qaytaradi (CURRENT_TIMESTAMP ga o'xshash)</td>\n<td>Returns the current date and time (similar to CURRENT_TIMESTAMP)</td>\n</tr>\n</tbody>\n</table>\n<pre><code class=\"language-sql\">-- Misol / Example\nSELECT CURRENT_DATE, CURRENT_TIME, CURRENT_TIMESTAMP;\n\n-- PostgreSQL\nSELECT created_at, AGE(NOW(), created_at) as age FROM users;\n</code></pre>\n<hr />\n<h2 id=\"14-string-funksiyalari-string-functions\">📌 14. String funksiyalari / String Functions</h2>\n<table>\n<thead>\n<tr>\n<th>Buyruq / Command</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>CONCAT</code></td>\n<td>Ikki yoki ko'p satrni birlashtiradi</td>\n<td>Concatenates two or more strings</td>\n</tr>\n<tr>\n<td><code>SUBSTRING</code></td>\n<td>Satrdan qism satr ajratib oladi</td>\n<td>Extracts a substring from a string</td>\n</tr>\n<tr>\n<td><code>REPLACE</code></td>\n<td>Satr ichidagi belgilangan qism satrning barcha uchrashuvchanlarini boshqasi bilan almashtiradi</td>\n<td>Replaces all occurrences of a substring with another</td>\n</tr>\n<tr>\n<td><code>LEN</code></td>\n<td>Satr uzunligini qaytaradi</td>\n<td>Returns the length of a string</td>\n</tr>\n<tr>\n<td><code>UPPER</code></td>\n<td>Satrni katta harflarga aylantiradi</td>\n<td>Converts a string to uppercase</td>\n</tr>\n<tr>\n<td><code>LOWER</code></td>\n<td>Satrni kichik harflarga aylantiradi</td>\n<td>Converts a string to lowercase</td>\n</tr>\n<tr>\n<td><code>TRIM</code></td>\n<td>Satrdan bosh va oxiridagi bo'shliqlarni olib tashlaydi</td>\n<td>Removes leading and trailing spaces from a string</td>\n</tr>\n<tr>\n<td><code>ROUND</code></td>\n<td>Sonni belgilangan kasr raqamlariga yaxlitlaydi</td>\n<td>Rounds a numeric value to a specified number of decimal places</td>\n</tr>\n</tbody>\n</table>\n<pre><code class=\"language-sql\">-- Misol / Example\nSELECT\n    CONCAT(first_name, ' ', last_name) as full_name,\n    UPPER(email) as email_upper,\n    TRIM(phone) as phone_clean,\n    SUBSTRING(description, 1, 100) as short_desc\nFROM users;\n</code></pre>\n<hr />\n<h2 id=\"15-guruhlash-kengaytmalari-grouping-extensions\">📌 15. Guruhlash kengaytmalari / Grouping Extensions</h2>\n<table>\n<thead>\n<tr>\n<th>Buyruq / Command</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>GROUPING SETS</code></td>\n<td>Agregatsiya uchun bir nechta guruhlanishni belgilaydi</td>\n<td>Specifies multiple groupings for aggregation</td>\n</tr>\n<tr>\n<td><code>CUBE</code></td>\n<td>Agregatsiya uchun guruhlanish to'plamlarining barcha mumkin kombinatsiyalarini yaratadi</td>\n<td>Generates all possible combinations of grouping sets</td>\n</tr>\n<tr>\n<td><code>ROLLUP</code></td>\n<td>Qiymatlar ierarxiyasi uchun oraliq yig'indisini yaratadi</td>\n<td>Generates subtotal values for a hierarchy of values</td>\n</tr>\n</tbody>\n</table>\n<pre><code class=\"language-sql\">-- Misol / Example\nSELECT department, job_title, SUM(salary)\nFROM employees\nGROUP BY ROLLUP (department, job_title);\n</code></pre>\n<hr />\n<h2 id=\"16-ilgor-operatsiyalar-advanced-operations\">📌 16. Ilg'or operatsiyalar / Advanced Operations</h2>\n<table>\n<thead>\n<tr>\n<th>Buyruq / Command</th>\n<th>O'zbek / Uzbek</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>MERGE</code></td>\n<td>Manba jadval bilan join natijasiga asosan maqsadli jadvalda INSERT/UPDATE/DELETE bajaradi</td>\n<td>Performs insert, update, or delete based on join with a source table</td>\n</tr>\n<tr>\n<td><code>PIVOT</code></td>\n<td>Bir ustundagi yagona qiymatlarni chiqishdagi bir nechta ustunlarga aylantiradi</td>\n<td>Rotates unique values from one column into multiple columns</td>\n</tr>\n<tr>\n<td><code>UNPIVOT</code></td>\n<td>Bir nechta ustunlarni chiqishdagi yagona satrlarga aylantiradi</td>\n<td>Turns multiple columns into unique rows in the output</td>\n</tr>\n<tr>\n<td><code>CROSS APPLY</code></td>\n<td>Tashqi jadvalning har bir satriga nisbatan bog'liq subquery bajaradi</td>\n<td>Performs a correlated subquery against each row of the outer table</td>\n</tr>\n<tr>\n<td><code>OUTER APPLY</code></td>\n<td>CROSS APPLY ga o'xshash, lekin ichki jadvalda mos qatorlar bo'lmasa ham tashqi jadvaldan satrlar qaytaradi</td>\n<td>Like CROSS APPLY, but also returns rows with no matching inner rows</td>\n</tr>\n</tbody>\n</table>\n<pre><code class=\"language-sql\">-- Misol / Example (MERGE)\nMERGE INTO target_table AS t\nUSING source_table AS s ON t.id = s.id\nWHEN MATCHED THEN UPDATE SET t.name = s.name\nWHEN NOT MATCHED THEN INSERT (id, name) VALUES (s.id, s.name);\n</code></pre>\n<hr />\n<h2 id=\"tezkor-eslatma-quick-reference\">💡 Tezkor eslatma / Quick Reference</h2>\n<h3 id=\"sql-buyruqlari-tartibi-sql-execution-order\">SQL buyruqlari tartibi / SQL Execution Order</h3>\n<pre><code class=\"language-sql\">-- Yozilish tartibi / Writing order:\nSELECT → FROM → JOIN → WHERE → GROUP BY → HAVING → ORDER BY → LIMIT\n\n-- Bajarilish tartibi / Execution order:\nFROM → JOIN → WHERE → GROUP BY → HAVING → SELECT → ORDER BY → LIMIT\n</code></pre>\n<h3 id=\"postgresql-fastapi-stack-uchun-muhim-farqlar\">PostgreSQL (FastAPI stack uchun) muhim farqlar</h3>\n<table>\n<thead>\n<tr>\n<th>SQL Standard</th>\n<th>PostgreSQL</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>TOP N</code></td>\n<td><code>LIMIT N</code></td>\n</tr>\n<tr>\n<td><code>GETDATE()</code></td>\n<td><code>NOW()</code> yoki <code>CURRENT_TIMESTAMP</code></td>\n</tr>\n<tr>\n<td><code>LEN()</code></td>\n<td><code>LENGTH()</code></td>\n</tr>\n<tr>\n<td><code>ISNULL()</code></td>\n<td><code>COALESCE()</code></td>\n</tr>\n<tr>\n<td><code>AUTO_INCREMENT</code></td>\n<td><code>SERIAL</code> yoki <code>GENERATED ALWAYS AS IDENTITY</code></td>\n</tr>\n</tbody>\n</table>\n<hr />\n<p><em>Tayyorlagan / Prepared by: Alyorjon | Manba / Source: 100 SQL Commands PDF</em></p>"}, "postgresql": {"label": "🐘 PostgreSQL", "body": "<h1 id=\"postgresql-100-interview-questions-answers\">🐘 PostgreSQL — 100 Interview Questions &amp; Answers</h1>\n<h3 id=\"ikki-tilli-qollanma-bilingual-reference\">Ikki tilli qo'llanma / Bilingual Reference</h3>\n<blockquote>\n<p><strong>Daraja / Level:</strong> Boshlang'ich → O'rta → Ilg'or → Ekspert<br />\n<strong>Tillar / Languages:</strong> O'zbek 🇺🇿 | English 🇬🇧<br />\n<strong>Maqsad / Goal:</strong> PostgreSQL intervyusiga to'liq tayyorgarlik</p>\n</blockquote>\n<hr />\n<h2 id=\"mundarija-table-of-contents\">📚 Mundarija / Table of Contents</h2>\n<ol>\n<li><a href=\"#1-asosiy-tushunchalar--basics\">Asosiy tushunchalar / Basics (1–25)</a></li>\n<li><a href=\"#2-orta-daraja--intermediate\">O'rta daraja / Intermediate (26–55)</a></li>\n<li><a href=\"#3-ilgor-daraja--advanced\">Ilg'or daraja / Advanced (56–80)</a></li>\n<li><a href=\"#4-ekspert-daraja--expert\">Ekspert daraja / Expert (81–100)</a></li>\n</ol>\n<hr />\n<h2 id=\"1-asosiy-tushunchalar-basics\">1. Asosiy tushunchalar / Basics</h2>\n<p><strong>1. PostgreSQL nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> PostgreSQL — kuchli, ochiq manbali ob'ektga-relyatsion ma'lumotlar bazasi tizimi. 30+ yillik faol rivojlanishga ega va ishonchlilik, xususiyatlar to'plami va unumdorlik jihatidan yuqori obro'ga ega.<br />\n<strong>EN:</strong> PostgreSQL is a powerful, open-source object-relational database system with over 30 years of active development. It is known for reliability, feature richness, and performance.</p>\n</blockquote>\n<hr />\n<p><strong>2. PostgreSQL va MySQL o'rtasidagi asosiy farqlar?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> PostgreSQL to'liq ACID muvofiq, murakkab so'rovlar, JSON, CTE, window funksiyalar, full-text search va kengaytmalarni yaxshiroq qo'llab-quvvatlaydi. MySQL sodda CRUD ilovalar uchun tezroq, lekin ilg'or funksiyalarda orqada qoladi.<br />\n<strong>EN:</strong> PostgreSQL is fully ACID-compliant, better supports complex queries, JSON, CTEs, window functions, full-text search, and extensions. MySQL is faster for simple CRUD apps but lags in advanced features.</p>\n</blockquote>\n<table>\n<thead>\n<tr>\n<th></th>\n<th>PostgreSQL</th>\n<th>MySQL</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Litsenziya</td>\n<td>PostgreSQL (MIT-like)</td>\n<td>GPL / Commercial</td>\n</tr>\n<tr>\n<td>JSON</td>\n<td>To'liq qo'llab-quvvatlash</td>\n<td>Cheklangan</td>\n</tr>\n<tr>\n<td>Window funksiyalar</td>\n<td>✅</td>\n<td>Cheklangan</td>\n</tr>\n<tr>\n<td>Full ACID</td>\n<td>✅</td>\n<td>Faqat InnoDB</td>\n</tr>\n<tr>\n<td>Kengaytmalar</td>\n<td>Ko'p (PostGIS, pg_trgm)</td>\n<td>Kam</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<p><strong>3. ACID nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> ACID — ma'lumotlar bazasi tranzaksiyalarining 4 xususiyati:\n- <strong>A</strong>tomicity — tranzaksiya ya to'liq bajariladi, yo umuman bajarilmaydi\n- <strong>C</strong>onsistency — tranzaksiya MBni bir to'g'ri holatdan ikkinchisiga o'tkazadi\n- <strong>I</strong>solation — bir vaqtda bajarilayotgan tranzaksiyalar bir-birini ko'rmaydi\n- <strong>D</strong>urability — tranzaksiya tasdiqlangandan keyin, tizim ishlamay qolsa ham, ma'lumotlar saqlanadi<br />\n<strong>EN:</strong> ACID — 4 properties ensuring reliable database transactions: <strong>Atomicity</strong> (all or nothing), <strong>Consistency</strong> (valid state transition), <strong>Isolation</strong> (concurrent transactions don't interfere), <strong>Durability</strong> (committed data persists despite failures).</p>\n</blockquote>\n<hr />\n<p><strong>4. PostgreSQL da ma'lumot turlari (Data Types)?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Asosiy turlar: <code>INTEGER</code>, <code>BIGINT</code>, <code>NUMERIC</code>, <code>FLOAT</code>, <code>VARCHAR(n)</code>, <code>TEXT</code>, <code>BOOLEAN</code>, <code>DATE</code>, <code>TIMESTAMP</code>, <code>TIMESTAMPTZ</code>, <code>UUID</code>, <code>JSON</code>, <code>JSONB</code>, <code>ARRAY</code>, <code>BYTEA</code>, <code>SERIAL</code>.<br />\n<strong>EN:</strong> Key types: <code>INTEGER</code>, <code>BIGINT</code>, <code>NUMERIC</code>, <code>FLOAT</code>, <code>VARCHAR(n)</code>, <code>TEXT</code>, <code>BOOLEAN</code>, <code>DATE</code>, <code>TIMESTAMP</code>, <code>TIMESTAMPTZ</code>, <code>UUID</code>, <code>JSON</code>, <code>JSONB</code>, <code>ARRAY</code>, <code>BYTEA</code>, <code>SERIAL</code>.</p>\n</blockquote>\n<pre><code class=\"language-sql\">CREATE TABLE example (\n    id          SERIAL PRIMARY KEY,\n    name        VARCHAR(100) NOT NULL,\n    salary      NUMERIC(12, 2),\n    is_active   BOOLEAN DEFAULT TRUE,\n    created_at  TIMESTAMPTZ DEFAULT NOW(),\n    metadata    JSONB,\n    tags        TEXT[]\n);\n</code></pre>\n<hr />\n<p><strong>5. PRIMARY KEY va UNIQUE farqi?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>PRIMARY KEY</code> — jadvalda faqat bitta bo'lishi mumkin, NULL qabul qilmaydi, avtomatik indeks yaratadi. <code>UNIQUE</code> — bir jadvalda bir nechta bo'lishi mumkin, NULL qabul qiladi (har bir NULL yagona hisoblanadi).<br />\n<strong>EN:</strong> <code>PRIMARY KEY</code> — only one per table, no NULLs, auto-creates index. <code>UNIQUE</code> — multiple per table, allows NULLs (each NULL is considered unique).</p>\n</blockquote>\n<hr />\n<p><strong>6. NULL nima va qanday ishlaydi?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> NULL — qiymat yo'qligini bildiradi, nol yoki bo'sh satr emas. NULL bilan har qanday taqqoslash (<code>=</code>, <code>&lt;</code>, <code>&gt;</code>) <code>NULL</code> qaytaradi. Tekshirish uchun <code>IS NULL</code> yoki <code>IS NOT NULL</code> ishlatiladi.<br />\n<strong>EN:</strong> NULL means the absence of a value — not zero or empty string. Any comparison with NULL (<code>=</code>, <code>&lt;</code>, <code>&gt;</code>) returns NULL. Use <code>IS NULL</code> or <code>IS NOT NULL</code> to check.</p>\n</blockquote>\n<pre><code class=\"language-sql\">SELECT * FROM users WHERE phone IS NULL;\nSELECT COALESCE(phone, 'N/A') FROM users;  -- NULL o'rniga default qiymat\n</code></pre>\n<hr />\n<p><strong>7. Schema nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Schema — PostgreSQL da ma'lumotlar bazasi ichidagi mantiqiy nom maydoni. Jadvallar, ko'rinishlar, funksiyalar va boshqa ob'ektlarni guruhlaydi. Default schema <code>public</code>.<br />\n<strong>EN:</strong> A schema is a logical namespace within a PostgreSQL database that groups tables, views, functions, and other objects. Default schema is <code>public</code>.</p>\n</blockquote>\n<pre><code class=\"language-sql\">CREATE SCHEMA hr;\nCREATE TABLE hr.employees (...);\nSET search_path TO hr, public;\n</code></pre>\n<hr />\n<p><strong>8. Sequence nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Sequence — ketma-ket yagona raqamlar yaratuvchi ob'ekt. <code>SERIAL</code> va <code>BIGSERIAL</code> ma'lumot turlari ichida avtomatik sequence yaratadi. <code>nextval()</code>, <code>currval()</code>, <code>setval()</code> funksiyalari bilan boshqariladi.<br />\n<strong>EN:</strong> A sequence generates unique sequential numbers. <code>SERIAL</code>/<code>BIGSERIAL</code> types create sequences automatically. Controlled via <code>nextval()</code>, <code>currval()</code>, <code>setval()</code>.</p>\n</blockquote>\n<pre><code class=\"language-sql\">CREATE SEQUENCE order_seq START 1000 INCREMENT 1;\nSELECT nextval('order_seq');  -- 1000, 1001, ...\n\n-- Yoki SERIAL orqali\nCREATE TABLE orders (id SERIAL PRIMARY KEY);\n</code></pre>\n<hr />\n<p><strong>9. INDEX nima va nima uchun kerak?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Index — ma'lumotlarni tezroq qidirish uchun yaratilgan qo'shimcha ma'lumot tuzilmasi. WHERE, JOIN, ORDER BY da tezlikni oshiradi, lekin yozish operatsiyalari (<code>INSERT</code>, <code>UPDATE</code>, <code>DELETE</code>) ni biroz sekinlashtiradi.<br />\n<strong>EN:</strong> An index is an auxiliary data structure for faster data retrieval. Speeds up WHERE, JOIN, ORDER BY but slightly slows write operations.</p>\n</blockquote>\n<pre><code class=\"language-sql\">-- Oddiy index\nCREATE INDEX idx_users_email ON users(email);\n\n-- Ko'p ustunli index\nCREATE INDEX idx_orders_user_date ON orders(user_id, created_at DESC);\n\n-- Unikal index\nCREATE UNIQUE INDEX idx_users_email_unique ON users(email);\n</code></pre>\n<hr />\n<p><strong>10. Index turlari PostgreSQL da?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Asosiy index turlari:\n- <strong>B-tree</strong> (default) — tenglik va oraliq so'rovlar uchun\n- <strong>Hash</strong> — faqat tenglik (<code>=</code>) so'rovlari uchun\n- <strong>GiST</strong> — geometrik, to'liq matn qidirish uchun\n- <strong>GIN</strong> — massivlar, JSONB, to'liq matn uchun\n- <strong>BRIN</strong> — juda katta, fizik tartibda saqlangan jadvallar uchun<br />\n<strong>EN:</strong> Key index types: <strong>B-tree</strong> (default, range+equality), <strong>Hash</strong> (equality only), <strong>GiST</strong> (geometric, full-text), <strong>GIN</strong> (arrays, JSONB, full-text), <strong>BRIN</strong> (large physically-ordered tables).</p>\n</blockquote>\n<pre><code class=\"language-sql\">CREATE INDEX idx_gin ON documents USING GIN(content_tsvector);\nCREATE INDEX idx_hash ON sessions USING HASH(session_token);\n</code></pre>\n<hr />\n<p><strong>11. VIEW nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> View — saqlangan SELECT so'rovi. Real ma'lumot saqlamaydi (oddiy view da), lekin jadval kabi so'ralishi mumkin. Murakkab so'rovlarni soddalashtiradi va xavfsizlik qatlamini ta'minlaydi.<br />\n<strong>EN:</strong> A view is a stored SELECT query. Regular views don't store data but can be queried like tables. They simplify complex queries and provide a security layer.</p>\n</blockquote>\n<pre><code class=\"language-sql\">CREATE VIEW active_users AS\nSELECT id, name, email\nFROM users\nWHERE is_active = TRUE;\n\nSELECT * FROM active_users;\n</code></pre>\n<hr />\n<p><strong>12. Materialized View nima va oddiy View dan farqi?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Materialized View so'rov natijasini diskda saqlaydi — tez o'qish imkonini beradi, lekin ma'lumotlar eskirishi mumkin. <code>REFRESH MATERIALIZED VIEW</code> bilan yangilanadi.<br />\n<strong>EN:</strong> Materialized View physically stores the query result on disk — fast reads but data can become stale. Refreshed with <code>REFRESH MATERIALIZED VIEW</code>.</p>\n</blockquote>\n<pre><code class=\"language-sql\">CREATE MATERIALIZED VIEW sales_summary AS\nSELECT date_trunc('month', created_at) as month,\n       SUM(total) as revenue\nFROM orders GROUP BY 1;\n\n-- Yangilash / Refresh\nREFRESH MATERIALIZED VIEW CONCURRENTLY sales_summary;\n</code></pre>\n<hr />\n<p><strong>13. JOIN turlari?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Asosiy JOIN turlari:\n- <strong>INNER JOIN</strong> — ikkala jadvalda mos yozuvlar\n- <strong>LEFT JOIN</strong> — chap jadvalning barcha yozuvlari + o'ngdan mos kelganlar\n- <strong>RIGHT JOIN</strong> — o'ng jadvalning barcha yozuvlari + chapdan mos kelganlar\n- <strong>FULL OUTER JOIN</strong> — ikkala jadvalning barcha yozuvlari\n- <strong>CROSS JOIN</strong> — kartezian ko'paytma<br />\n<strong>EN:</strong> <strong>INNER JOIN</strong> (matching rows in both), <strong>LEFT JOIN</strong> (all left + matching right), <strong>RIGHT JOIN</strong> (all right + matching left), <strong>FULL OUTER JOIN</strong> (all from both), <strong>CROSS JOIN</strong> (cartesian product).</p>\n</blockquote>\n<pre><code class=\"language-sql\">SELECT u.name, o.total\nFROM users u\nLEFT JOIN orders o ON u.id = o.user_id\nWHERE o.created_at &gt;= NOW() - INTERVAL '30 days';\n</code></pre>\n<hr />\n<p><strong>14. Subquery (Ichki so'rov) nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Subquery — boshqa so'rov ichida joylashtirilgan so'rov. WHERE, FROM, SELECT, HAVING da ishlatilishi mumkin. Korrelyatsiyalangan (correlated) va korrelyatsiyalanmagan turlari bor.<br />\n<strong>EN:</strong> A subquery is a query nested inside another query. Can be used in WHERE, FROM, SELECT, HAVING. Can be correlated (references outer query) or non-correlated.</p>\n</blockquote>\n<pre><code class=\"language-sql\">-- WHERE da subquery\nSELECT name FROM users\nWHERE id IN (SELECT user_id FROM orders WHERE total &gt; 1000000);\n\n-- FROM da subquery (derived table)\nSELECT dept, AVG(salary) FROM (\n    SELECT department as dept, salary FROM employees WHERE is_active = TRUE\n) sub GROUP BY dept;\n</code></pre>\n<hr />\n<p><strong>15. CTE (Common Table Expression) nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> CTE — <code>WITH</code> kalit so'zi bilan aniqlangan vaqtinchalik nomli natija to'plami. Murakkab so'rovlarni o'qilishi oson bo'laklarga ajratadi. Rekursiv CTE ham mumkin.<br />\n<strong>EN:</strong> CTE is a temporary named result set defined with <code>WITH</code>. Breaks complex queries into readable parts. Recursive CTEs are also supported.</p>\n</blockquote>\n<pre><code class=\"language-sql\">WITH monthly_sales AS (\n    SELECT date_trunc('month', created_at) AS month,\n           SUM(total) AS revenue\n    FROM orders\n    GROUP BY 1\n),\nranked AS (\n    SELECT *, RANK() OVER (ORDER BY revenue DESC) AS rank\n    FROM monthly_sales\n)\nSELECT * FROM ranked WHERE rank &lt;= 3;\n</code></pre>\n<hr />\n<p><strong>16. Window funksiyalar nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Window funksiyalar qatorlar guruhida hisob-kitob qiladi, lekin guruhlarni birlashtirmaydi (GROUP BY dan farqi). <code>OVER()</code> clause bilan ishlatiladi. <code>ROW_NUMBER()</code>, <code>RANK()</code>, <code>DENSE_RANK()</code>, <code>LAG()</code>, <code>LEAD()</code>, <code>SUM() OVER()</code> kabilar.<br />\n<strong>EN:</strong> Window functions perform calculations across a set of rows without collapsing them (unlike GROUP BY). Used with <code>OVER()</code> clause.</p>\n</blockquote>\n<pre><code class=\"language-sql\">SELECT\n    name,\n    department,\n    salary,\n    RANK() OVER (PARTITION BY department ORDER BY salary DESC) AS dept_rank,\n    LAG(salary) OVER (ORDER BY salary) AS prev_salary,\n    SUM(salary) OVER (PARTITION BY department) AS dept_total\nFROM employees;\n</code></pre>\n<hr />\n<p><strong>17. HAVING va WHERE farqi?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>WHERE</code> — GROUP BY dan oldin individual qatorlarni filtrlaydi. <code>HAVING</code> — GROUP BY dan keyin guruhlarni filtrlaydi. Agregat funksiyalar (<code>COUNT</code>, <code>SUM</code>) faqat <code>HAVING</code> da ishlatilishi mumkin.<br />\n<strong>EN:</strong> <code>WHERE</code> filters individual rows before GROUP BY. <code>HAVING</code> filters groups after GROUP BY. Aggregate functions can only be used in <code>HAVING</code>.</p>\n</blockquote>\n<pre><code class=\"language-sql\">SELECT department, COUNT(*) AS count, AVG(salary) AS avg_sal\nFROM employees\nWHERE is_active = TRUE          -- avval filtrlash / filter first\nGROUP BY department\nHAVING COUNT(*) &gt; 5             -- guruhni filtrlash / filter group\nORDER BY avg_sal DESC;\n</code></pre>\n<hr />\n<p><strong>18. DISTINCT qanday ishlaydi?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>DISTINCT</code> — natija to'plamidagi takrorlanuvchi qatorlarni olib tashlaydi. <code>DISTINCT ON (ustun)</code> — ma'lum ustun bo'yicha birinchi qatorni qaytaradi (PostgreSQL xususiyati).<br />\n<strong>EN:</strong> <code>DISTINCT</code> removes duplicate rows from the result. <code>DISTINCT ON (column)</code> returns the first row for each distinct value of the specified column (PostgreSQL-specific).</p>\n</blockquote>\n<pre><code class=\"language-sql\">-- Barcha yagona shaharlar\nSELECT DISTINCT city FROM users;\n\n-- Har bir foydalanuvchining oxirgi buyurtmasi\nSELECT DISTINCT ON (user_id)\n    user_id, order_id, created_at\nFROM orders\nORDER BY user_id, created_at DESC;\n</code></pre>\n<hr />\n<p><strong>19. LIMIT va OFFSET nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>LIMIT</code> — qaytariladigan qatorlar sonini cheklaydi. <code>OFFSET</code> — ma'lum miqdordagi qatorlarni o'tkazib yuboradi. Sahifalash (pagination) uchun ishlatiladi, lekin katta OFFSET larda sekin ishlaydi.<br />\n<strong>EN:</strong> <code>LIMIT</code> caps the number of returned rows. <code>OFFSET</code> skips a number of rows. Used for pagination, but large OFFSET values are slow.</p>\n</blockquote>\n<pre><code class=\"language-sql\">-- 2-sahifa, har sahifada 10 ta\nSELECT * FROM products\nORDER BY id\nLIMIT 10 OFFSET 10;\n</code></pre>\n<hr />\n<p><strong>20. EXPLAIN va EXPLAIN ANALYZE nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>EXPLAIN</code> — so'rov bajarish rejasini ko'rsatadi (haqiqatan bajarmasdan). <code>EXPLAIN ANALYZE</code> — rejani ko'rsatadi VA so'rovni bajarib, haqiqiy vaqtni o'lchaydi. So'rovlarni optimallashtirish uchun muhim vosita.<br />\n<strong>EN:</strong> <code>EXPLAIN</code> shows the query execution plan without running it. <code>EXPLAIN ANALYZE</code> shows the plan AND executes the query, measuring actual time. Essential for query optimization.</p>\n</blockquote>\n<pre><code class=\"language-sql\">EXPLAIN ANALYZE\nSELECT u.name, COUNT(o.id)\nFROM users u\nLEFT JOIN orders o ON u.id = o.user_id\nGROUP BY u.id, u.name;\n</code></pre>\n<hr />\n<p><strong>21. Transaction (Tranzaksiya) nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Tranzaksiya — yagona mantiqiy birlik sifatida bajarilishi kerak bo'lgan SQL operatsiyalar ketma-ketligi. <code>BEGIN</code>/<code>START TRANSACTION</code> bilan boshlanadi, <code>COMMIT</code> yoki <code>ROLLBACK</code> bilan tugaydi.<br />\n<strong>EN:</strong> A transaction is a sequence of SQL operations executed as a single logical unit. Starts with <code>BEGIN</code>/<code>START TRANSACTION</code>, ends with <code>COMMIT</code> or <code>ROLLBACK</code>.</p>\n</blockquote>\n<pre><code class=\"language-sql\">BEGIN;\n\nUPDATE accounts SET balance = balance - 500000 WHERE id = 1;\nUPDATE accounts SET balance = balance + 500000 WHERE id = 2;\n\n-- Agar xato bo'lsa / If error:\nROLLBACK;\n\n-- Agar hammasi yaxshi / If all good:\nCOMMIT;\n</code></pre>\n<hr />\n<p><strong>22. SAVEPOINT nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> SAVEPOINT — tranzaksiya ichidagi belgi nuqtasi. Tranzaksiyaning faqat bir qismini orqaga qaytarish (<code>ROLLBACK TO SAVEPOINT</code>) imkonini beradi, butun tranzaksiyani bekor qilmasdan.<br />\n<strong>EN:</strong> SAVEPOINT is a marker within a transaction allowing partial rollback (<code>ROLLBACK TO SAVEPOINT</code>) without canceling the entire transaction.</p>\n</blockquote>\n<pre><code class=\"language-sql\">BEGIN;\nINSERT INTO logs (...) VALUES (...);\nSAVEPOINT sp1;\n\nUPDATE orders SET status = 'shipped' WHERE id = 5;\n-- Agar bu xato bo'lsa / If this fails:\nROLLBACK TO SAVEPOINT sp1;\n\nCOMMIT;\n</code></pre>\n<hr />\n<p><strong>23. FOREIGN KEY va CASCADE?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Foreign Key ikki jadval o'rtasidagi bog'liqlikni ta'minlaydi. <code>ON DELETE CASCADE</code> — asosiy yozuv o'chirilganda bog'liq yozuvlar ham o'chadi. <code>ON DELETE SET NULL</code> — NULL ga o'rnatadi. <code>ON DELETE RESTRICT</code> — o'chirishni bloklaydi.<br />\n<strong>EN:</strong> Foreign Key enforces referential integrity. <code>ON DELETE CASCADE</code> deletes related rows. <code>ON DELETE SET NULL</code> sets FK to NULL. <code>ON DELETE RESTRICT</code> blocks deletion.</p>\n</blockquote>\n<pre><code class=\"language-sql\">CREATE TABLE orders (\n    id      SERIAL PRIMARY KEY,\n    user_id INT NOT NULL REFERENCES users(id) ON DELETE CASCADE,\n    ...\n);\n</code></pre>\n<hr />\n<p><strong>24. CHECK constraint nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> CHECK — ustun qiymatiga shart qo'yadi. Shart yolg'on bo'lsa, yozuv rad etiladi.<br />\n<strong>EN:</strong> CHECK enforces a condition on column values. If the condition is false, the row is rejected.</p>\n</blockquote>\n<pre><code class=\"language-sql\">CREATE TABLE employees (\n    id      SERIAL PRIMARY KEY,\n    salary  NUMERIC CHECK (salary &gt; 0),\n    age     INT CHECK (age BETWEEN 18 AND 65),\n    email   TEXT CHECK (email LIKE '%@%')\n);\n</code></pre>\n<hr />\n<p><strong>25. DEFAULT qiymatlar?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>DEFAULT</code> — yangi yozuv qo'shilganda qiymat ko'rsatilmasa, avtomatik beriladigan qiymat. Statik qiymat, funksiya chaqiruvi yoki ifoda bo'lishi mumkin.<br />\n<strong>EN:</strong> <code>DEFAULT</code> assigns a value automatically when none is provided. Can be a static value, function call, or expression.</p>\n</blockquote>\n<pre><code class=\"language-sql\">CREATE TABLE tasks (\n    id         SERIAL PRIMARY KEY,\n    status     TEXT DEFAULT 'pending',\n    created_at TIMESTAMPTZ DEFAULT NOW(),\n    priority   INT DEFAULT 3,\n    uuid       UUID DEFAULT gen_random_uuid()\n);\n</code></pre>\n<hr />\n<h2 id=\"2-orta-daraja-intermediate\">2. O'rta daraja / Intermediate</h2>\n<p><strong>26. JSONB va JSON farqi?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>JSON</code> — matnni aynan saqlaydi (kalit tartibi va bo'sh joylar saqlanadi), har safar so'ralganda parse qilinadi. <code>JSONB</code> — ikkilik (binary) formatda saqlaydi, parse qilingan holda, indekslash mumkin, so'rovlar tezroq. Odatda <code>JSONB</code> afzal.<br />\n<strong>EN:</strong> <code>JSON</code> stores text as-is (preserves key order, whitespace), parsed on every query. <code>JSONB</code> stores in binary format, already parsed, supports indexing, faster queries. Prefer <code>JSONB</code>.</p>\n</blockquote>\n<pre><code class=\"language-sql\">-- JSONB so'rovlari / JSONB queries\nSELECT metadata-&gt;&gt;'name' AS name,           -- matn sifatida / as text\n       metadata-&gt;'address'-&gt;&gt;'city' AS city, -- ichki qiymat / nested value\n       metadata @&gt; '{&quot;role&quot;: &quot;admin&quot;}'::jsonb  -- mavjudligi / contains\nFROM users;\n\n-- JSONB indeksi / JSONB index\nCREATE INDEX idx_metadata ON users USING GIN(metadata);\n</code></pre>\n<hr />\n<p><strong>27. ARRAY turlari va so'rovlari?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> PostgreSQL massivlarni nativ qo'llab-quvvatlaydi. <code>TEXT[]</code>, <code>INT[]</code> kabi turlar. Massiv elementlariga <code>[n]</code> bilan kiriladi (1 dan boshlanadi), <code>ANY</code>, <code>ALL</code>, <code>@&gt;</code>, <code>&amp;&amp;</code> operatorlari bilan so'raladi.<br />\n<strong>EN:</strong> PostgreSQL natively supports arrays. Access elements with <code>[n]</code> (1-indexed). Use <code>ANY</code>, <code>ALL</code>, <code>@&gt;</code>, <code>&amp;&amp;</code> operators for querying.</p>\n</blockquote>\n<pre><code class=\"language-sql\">CREATE TABLE posts (\n    id    SERIAL PRIMARY KEY,\n    tags  TEXT[]\n);\n\nINSERT INTO posts (tags) VALUES (ARRAY['python', 'fastapi', 'postgresql']);\n\n-- Massiv so'rovlari / Array queries\nSELECT * FROM posts WHERE 'python' = ANY(tags);\nSELECT * FROM posts WHERE tags @&gt; ARRAY['python', 'fastapi'];\nSELECT * FROM posts WHERE tags &amp;&amp; ARRAY['python', 'go'];  -- kesishma / overlap\n</code></pre>\n<hr />\n<p><strong>28. Full-Text Search (To'liq matn qidirish)?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> PostgreSQL <code>tsvector</code> va <code>tsquery</code> orqali to'liq matn qidirishni qo'llab-quvvatlaydi. <code>to_tsvector()</code> matnni tokenizatsiya qiladi, <code>to_tsquery()</code> so'rovni yaratadi, <code>@@</code> operatori mos kelishni tekshiradi.<br />\n<strong>EN:</strong> PostgreSQL supports full-text search via <code>tsvector</code> and <code>tsquery</code>. <code>to_tsvector()</code> tokenizes text, <code>to_tsquery()</code> creates search queries, <code>@@</code> checks for matches.</p>\n</blockquote>\n<pre><code class=\"language-sql\">-- Ustun qo'shish va indeks / Add column and index\nALTER TABLE articles ADD COLUMN search_vector tsvector;\nUPDATE articles SET search_vector = to_tsvector('english', title || ' ' || body);\nCREATE INDEX idx_fts ON articles USING GIN(search_vector);\n\n-- Qidirish / Search\nSELECT title, ts_rank(search_vector, query) AS rank\nFROM articles, to_tsquery('english', 'postgresql &amp; performance') query\nWHERE search_vector @@ query\nORDER BY rank DESC;\n</code></pre>\n<hr />\n<p><strong>29. pg_trgm kengaytmasi nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>pg_trgm</code> — trigram asosida matn o'xshashligini hisoblash kengaytmasi. <code>LIKE '%...%'</code> so'rovlarini tezlashtirish uchun GIN/GiST indeksi yaratishga imkon beradi.<br />\n<strong>EN:</strong> <code>pg_trgm</code> is an extension for trigram-based text similarity. Enables GIN/GiST indexes for <code>LIKE '%...%'</code> queries.</p>\n</blockquote>\n<pre><code class=\"language-sql\">CREATE EXTENSION IF NOT EXISTS pg_trgm;\n\nCREATE INDEX idx_trgm ON users USING GIN(name gin_trgm_ops);\n\n-- Tez ILIKE so'rovi / Fast ILIKE query\nSELECT * FROM users WHERE name ILIKE '%ali%';\n\n-- O'xshashlik / Similarity\nSELECT name, similarity(name, 'Alisher') AS sim\nFROM users ORDER BY sim DESC LIMIT 5;\n</code></pre>\n<hr />\n<p><strong>30. Partial Index (Qisman indeks) nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Partial Index — faqat ma'lum shartni qanoatlantiruvchi qatorlarga yaratilgan indeks. Kichikroq hajm, tezroq so'rovlar, kam xotira sarfi.<br />\n<strong>EN:</strong> Partial Index is built only on rows satisfying a condition — smaller size, faster queries, less memory.</p>\n</blockquote>\n<pre><code class=\"language-sql\">-- Faqat faol foydalanuvchilar uchun / Only for active users\nCREATE INDEX idx_active_users ON users(email) WHERE is_active = TRUE;\n\n-- Faqat to'lanmagan buyurtmalar / Only unpaid orders\nCREATE INDEX idx_unpaid ON orders(user_id, created_at)\nWHERE status = 'pending';\n</code></pre>\n<hr />\n<p><strong>31. Composite Index (Ko'p ustunli indeks) qachon samarali?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Ko'p ustunli indeks WHERE da bir nechta ustun filtrlanganda yoki ORDER BY da samarali. Ustunlar tartibi muhim: eng ko'p filtrlangan ustun birinchi bo'lishi kerak. \"Leftmost prefix rule\" — chapdan o'ngga ishlatilishi kerak.<br />\n<strong>EN:</strong> Effective when filtering on multiple columns in WHERE or ORDER BY. Column order matters — most selective column first. \"Leftmost prefix rule\" — used left-to-right.</p>\n</blockquote>\n<pre><code class=\"language-sql\">CREATE INDEX idx_orders_compound ON orders(user_id, status, created_at DESC);\n\n-- Bu indeksdan foydalanadi / Uses index:\nSELECT * FROM orders WHERE user_id = 5 AND status = 'pending';\n\n-- Bu ham foydalanadi / Also uses:\nSELECT * FROM orders WHERE user_id = 5;\n\n-- Bu foydalanmaydi / Does NOT use (status birinchi emas / status not first):\nSELECT * FROM orders WHERE status = 'pending';\n</code></pre>\n<hr />\n<p><strong>32. Covering Index nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Covering Index — so'rov uchun zarur barcha ustunlarni o'z ichiga olgan indeks. PostgreSQL asosiy jadval sahifalariga murojaat qilmasdan (<code>heap fetch</code> yo'q) to'g'ridan-to'g'ri indeksdan javob qaytaradi.<br />\n<strong>EN:</strong> A Covering Index includes all columns needed by a query, allowing PostgreSQL to answer directly from the index without fetching table rows (index-only scan).</p>\n</blockquote>\n<pre><code class=\"language-sql\">-- name va email ham indeksda / name and email also in index\nCREATE INDEX idx_covering ON users(id) INCLUDE (name, email);\n</code></pre>\n<hr />\n<p><strong>33. Table Partitioning nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Partitioning — katta jadvalni kichik fizik qismlarga (partition) bo'lish. So'rovlar faqat tegishli partition da qidiriladi (partition pruning). PostgreSQL da <code>RANGE</code>, <code>LIST</code>, <code>HASH</code> partitioning turlari bor.<br />\n<strong>EN:</strong> Partitioning splits a large table into smaller physical pieces. Queries only search relevant partitions (partition pruning). Types: <code>RANGE</code>, <code>LIST</code>, <code>HASH</code>.</p>\n</blockquote>\n<pre><code class=\"language-sql\">CREATE TABLE orders (\n    id         BIGINT,\n    created_at TIMESTAMPTZ,\n    total      NUMERIC\n) PARTITION BY RANGE (created_at);\n\nCREATE TABLE orders_2024 PARTITION OF orders\n    FOR VALUES FROM ('2024-01-01') TO ('2025-01-01');\n\nCREATE TABLE orders_2025 PARTITION OF orders\n    FOR VALUES FROM ('2025-01-01') TO ('2026-01-01');\n</code></pre>\n<hr />\n<p><strong>34. VACUUM va AUTOVACUUM nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> PostgreSQL MVCC tufayli o'chirilgan/yangilangan qatorlarni fizik o'chirmasdan \"o'lik\" (dead tuple) sifatida belgilaydi. <code>VACUUM</code> ushbu o'lik tuplellarni tozalaydi. <code>AUTOVACUUM</code> — fon jarayoni bo'lib, buni avtomatik bajaradi.<br />\n<strong>EN:</strong> PostgreSQL MVCC marks deleted/updated rows as \"dead tuples\" without physically removing them. <code>VACUUM</code> reclaims space from dead tuples. <code>AUTOVACUUM</code> does this automatically in the background.</p>\n</blockquote>\n<pre><code class=\"language-sql\">-- Qo'lda vacuum / Manual vacuum\nVACUUM ANALYZE users;\n\n-- To'liq tozalash (lock talab qiladi) / Full vacuum (requires lock)\nVACUUM FULL orders;\n\n-- Jadval statistikasini yangilash / Update table statistics\nANALYZE employees;\n</code></pre>\n<hr />\n<p><strong>35. MVCC (Multi-Version Concurrency Control) nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> MVCC — PostgreSQL da bir vaqtda o'qish va yozishni lock qilmasdan ta'minlovchi mexanizm. Har bir tranzaksiya ma'lumotlarning o'z \"snapshotini\" ko'radi. Bu o'quvchilar yozuvchilarni bloklamasligini ta'minlaydi.<br />\n<strong>EN:</strong> MVCC allows concurrent reads and writes without locking. Each transaction sees its own \"snapshot\" of data, ensuring readers don't block writers and vice versa.</p>\n</blockquote>\n<hr />\n<p><strong>36. Isolation Level (Izolyatsiya darajasi) turlari?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> PostgreSQL 4 ta izolyatsiya darajasini qo'llab-quvvatlaydi:\n- <strong>Read Uncommitted</strong> — PostgreSQL da Read Committed kabi ishlaydi\n- <strong>Read Committed</strong> (default) — faqat tasdiqlangan ma'lumotlarni ko'radi\n- <strong>Repeatable Read</strong> — tranzaksiya davomida bir xil o'qishni kafolatlaydi\n- <strong>Serializable</strong> — to'liq izolyatsiya, xuddi ketma-ket bajariladigan kabi<br />\n<strong>EN:</strong> PostgreSQL supports 4 isolation levels: <strong>Read Uncommitted</strong> (acts as Read Committed), <strong>Read Committed</strong> (default, sees only committed data), <strong>Repeatable Read</strong>, <strong>Serializable</strong> (full isolation).</p>\n</blockquote>\n<pre><code class=\"language-sql\">BEGIN;\nSET TRANSACTION ISOLATION LEVEL REPEATABLE READ;\n-- so'rovlar / queries\nCOMMIT;\n</code></pre>\n<hr />\n<p><strong>37. Lock (Qulf) turlari PostgreSQL da?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Asosiy lock turlari: <strong>ROW-level</strong> (SELECT FOR UPDATE, SELECT FOR SHARE), <strong>TABLE-level</strong> (ALTER TABLE, DROP TABLE), <strong>Advisory Locks</strong> (dastur tomonidan boshqariladigan). <code>pg_locks</code> jadvalidan joriy locklar ko'riladi.<br />\n<strong>EN:</strong> Key lock types: <strong>ROW-level</strong> (SELECT FOR UPDATE/SHARE), <strong>TABLE-level</strong> (ALTER/DROP), <strong>Advisory Locks</strong> (application-controlled). View current locks in <code>pg_locks</code>.</p>\n</blockquote>\n<pre><code class=\"language-sql\">-- Qator uchun lock / Row-level lock\nSELECT * FROM orders WHERE id = 5 FOR UPDATE;\n\n-- Boshqalar o'qiy oladi, lekin o'zgartira olmaydi / Others can read but not modify\nSELECT * FROM orders WHERE id = 5 FOR SHARE;\n\n-- Advisory lock\nSELECT pg_advisory_lock(12345);\n-- ishlar / work\nSELECT pg_advisory_unlock(12345);\n</code></pre>\n<hr />\n<p><strong>38. Deadlock nima va qanday oldini olish?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Deadlock — ikki tranzaksiya bir-birining resurslarini kutib qolishi. PostgreSQL deadlockni avtomatik aniqlaydi va birini bekor qiladi. Oldini olish: bir xil tartibda locklar olish, tranzaksiyalarni qisqa saqlash.<br />\n<strong>EN:</strong> Deadlock occurs when two transactions wait for each other's resources. PostgreSQL auto-detects and resolves by aborting one. Prevention: acquire locks in consistent order, keep transactions short.</p>\n</blockquote>\n<hr />\n<p><strong>39. TRIGGER nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Trigger — jadvalda ma'lum hodisa (<code>INSERT</code>, <code>UPDATE</code>, <code>DELETE</code>) sodir bo'lganda avtomatik chaqiriladigan funksiya. <code>BEFORE</code> yoki <code>AFTER</code> hodisaga bog'liq ishga tushadi.<br />\n<strong>EN:</strong> A trigger is a function automatically called when a specific event (<code>INSERT</code>, <code>UPDATE</code>, <code>DELETE</code>) occurs on a table. Fires <code>BEFORE</code> or <code>AFTER</code> the event.</p>\n</blockquote>\n<pre><code class=\"language-sql\">CREATE OR REPLACE FUNCTION update_timestamp()\nRETURNS TRIGGER AS $$\nBEGIN\n    NEW.updated_at = NOW();\n    RETURN NEW;\nEND;\n$$ LANGUAGE plpgsql;\n\nCREATE TRIGGER set_timestamp\n    BEFORE UPDATE ON users\n    FOR EACH ROW\n    EXECUTE FUNCTION update_timestamp();\n</code></pre>\n<hr />\n<p><strong>40. Stored Procedure va Function farqi PostgreSQL da?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <strong>Function</strong> — qiymat qaytaradi, SELECT da ishlatilishi mumkin, tranzaksiyani boshqara olmaydi. <strong>Procedure</strong> (PostgreSQL 11+) — qiymat qaytarmaydi, <code>CALL</code> bilan chaqiriladi, <code>COMMIT</code>/<code>ROLLBACK</code> ni o'zi boshqara oladi.<br />\n<strong>EN:</strong> <strong>Function</strong> — returns a value, usable in SELECT, cannot control transactions. <strong>Procedure</strong> (PG 11+) — no return value, called with <code>CALL</code>, can manage its own <code>COMMIT</code>/<code>ROLLBACK</code>.</p>\n</blockquote>\n<pre><code class=\"language-sql\">-- Function\nCREATE OR REPLACE FUNCTION get_user_orders(p_user_id INT)\nRETURNS TABLE(order_id INT, total NUMERIC) AS $$\nBEGIN\n    RETURN QUERY\n    SELECT id, total FROM orders WHERE user_id = p_user_id;\nEND;\n$$ LANGUAGE plpgsql;\n\nSELECT * FROM get_user_orders(5);\n\n-- Procedure\nCREATE PROCEDURE process_payment(p_order_id INT)\nLANGUAGE plpgsql AS $$\nBEGIN\n    UPDATE orders SET status = 'paid' WHERE id = p_order_id;\n    COMMIT;\nEND;\n$$;\n\nCALL process_payment(42);\n</code></pre>\n<hr />\n<p><strong>41. plpgsql nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> plpgsql — PostgreSQL ning protsessual dasturlash tili. IF/ELSE, LOOP, EXCEPTION bloklari, o'zgaruvchilar, kursorlar va boshqa dasturlash konstruksiyalarini qo'llab-quvvatlaydi. Trigger va funksiyalar yozish uchun ishlatiladi.<br />\n<strong>EN:</strong> plpgsql is PostgreSQL's procedural programming language. Supports IF/ELSE, LOOP, EXCEPTION blocks, variables, cursors. Used to write triggers and functions.</p>\n</blockquote>\n<hr />\n<p><strong>42. UPSERT (<code>INSERT ... ON CONFLICT</code>) nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> UPSERT — yozuv mavjud bo'lsa yangilash, yo'q bo'lsa qo'shish. PostgreSQL da <code>INSERT ... ON CONFLICT DO UPDATE</code> yoki <code>ON CONFLICT DO NOTHING</code> bilan amalga oshiriladi.<br />\n<strong>EN:</strong> UPSERT inserts if the row doesn't exist, updates if it does. PostgreSQL uses <code>INSERT ... ON CONFLICT DO UPDATE</code> or <code>ON CONFLICT DO NOTHING</code>.</p>\n</blockquote>\n<pre><code class=\"language-sql\">INSERT INTO users (email, name, updated_at)\nVALUES ('ali@example.com', 'Ali Karimov', NOW())\nON CONFLICT (email)\nDO UPDATE SET\n    name = EXCLUDED.name,\n    updated_at = EXCLUDED.updated_at;\n</code></pre>\n<hr />\n<p><strong>43. RETURNING clause nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>RETURNING</code> — <code>INSERT</code>, <code>UPDATE</code>, <code>DELETE</code> operatsiyasidan keyin o'zgartirilgan qatorlarni qaytaradi. Qo'shimcha SELECT so'rovisiz yangi ID yoki qiymatlarni olish imkonini beradi.<br />\n<strong>EN:</strong> <code>RETURNING</code> returns modified rows after <code>INSERT</code>, <code>UPDATE</code>, or <code>DELETE</code> — gets new IDs or values without an extra SELECT.</p>\n</blockquote>\n<pre><code class=\"language-sql\">-- Yangi ID ni olish / Get new ID\nINSERT INTO users (name, email) VALUES ('Bobur', 'bobur@test.com')\nRETURNING id, created_at;\n\n-- O'chirilgan yozuvni olish / Get deleted row\nDELETE FROM sessions WHERE expires_at &lt; NOW()\nRETURNING session_token, user_id;\n</code></pre>\n<hr />\n<p><strong>44. Recursive CTE nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Rekursiv CTE — o'z-o'ziga murojaat qiladigan CTE. Ierarxik ma'lumotlar (daraxt tuzilmalari, kategoriya ierarxiyalari, graflar) bilan ishlash uchun ishlatiladi.<br />\n<strong>EN:</strong> Recursive CTE references itself, used for hierarchical data (tree structures, category hierarchies, graphs).</p>\n</blockquote>\n<pre><code class=\"language-sql\">WITH RECURSIVE category_tree AS (\n    -- Boshlang'ich qator / Base case\n    SELECT id, name, parent_id, 0 AS depth\n    FROM categories WHERE parent_id IS NULL\n\n    UNION ALL\n\n    -- Rekursiv qism / Recursive part\n    SELECT c.id, c.name, c.parent_id, ct.depth + 1\n    FROM categories c\n    JOIN category_tree ct ON c.parent_id = ct.id\n)\nSELECT * FROM category_tree ORDER BY depth, name;\n</code></pre>\n<hr />\n<p><strong>45. COPY buyrug'i nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>COPY</code> — PostgreSQL da katta hajmdagi ma'lumotlarni CSV/text fayldan tez import/export qilish buyrug'i. <code>INSERT</code> dan 10-100x tezroq ishlaydi.<br />\n<strong>EN:</strong> <code>COPY</code> is PostgreSQL's fast bulk data import/export from/to CSV/text files — 10-100x faster than <code>INSERT</code>.</p>\n</blockquote>\n<pre><code class=\"language-sql\">-- Fayldan import / Import from file\nCOPY users(name, email, created_at)\nFROM '/tmp/users.csv'\nWITH (FORMAT csv, HEADER true, DELIMITER ',');\n\n-- Faylga export / Export to file\nCOPY (SELECT * FROM users WHERE is_active = TRUE)\nTO '/tmp/active_users.csv'\nWITH (FORMAT csv, HEADER true);\n</code></pre>\n<hr />\n<p><strong>46. pg_stat_statements nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>pg_stat_statements</code> — PostgreSQL kengaytmasi bo'lib, barcha so'rovlar statistikasini (bajarilish sonи, umumiy vaqt, o'rtacha vaqt) kuzatadi. Sekin so'rovlarni topish uchun muhim vosita.<br />\n<strong>EN:</strong> <code>pg_stat_statements</code> is an extension tracking statistics for all queries (execution count, total time, average time). Essential for finding slow queries.</p>\n</blockquote>\n<pre><code class=\"language-sql\">CREATE EXTENSION IF NOT EXISTS pg_stat_statements;\n\n-- Eng sekin so'rovlar / Slowest queries\nSELECT query, calls, total_exec_time/calls AS avg_ms,\n       rows/calls AS avg_rows\nFROM pg_stat_statements\nORDER BY avg_ms DESC\nLIMIT 10;\n</code></pre>\n<hr />\n<p><strong>47. Connection Pooling nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Connection Pooling — ma'lumotlar bazasi ulanishlarini qayta ishlatish mexanizmi. Har safar yangi ulanish yaratish qimmat. <code>PgBouncer</code> yoki <code>pgpool-II</code> eng ko'p ishlatiladigan PostgreSQL connection pooler lar. FastAPI da <code>asyncpg</code> + <code>SQLAlchemy</code> async engine ham pooling qiladi.<br />\n<strong>EN:</strong> Connection Pooling reuses database connections instead of creating new ones each time (expensive). PgBouncer and pgpool-II are popular PostgreSQL poolers.</p>\n</blockquote>\n<hr />\n<p><strong>48. WAL (Write-Ahead Log) nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> WAL — PostgreSQL ning o'zgarishlarni jadval sahifalaridan oldin jurnal faylga yozadigan mexanizmi. Crash recovery, streaming replication va Point-in-Time Recovery (PITR) uchun asos.<br />\n<strong>EN:</strong> WAL (Write-Ahead Log) writes changes to a log file before applying them to table pages. Foundation for crash recovery, streaming replication, and PITR.</p>\n</blockquote>\n<hr />\n<p><strong>49. Replication (Replikatsiya) nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> PostgreSQL replikatsiya turlari:\n- <strong>Streaming Replication</strong> — WAL orqali real-time sinxronizatsiya (primary → standby)\n- <strong>Logical Replication</strong> — jadval darajasida selektiv replikatsiya\n- <strong>Synchronous</strong> — primary standby tasdiqlaguncha kutadi\n- <strong>Asynchronous</strong> — primary kutmaydi (tezroq, lekin ma'lumot yo'qotish xavfi)<br />\n<strong>EN:</strong> Replication types: <strong>Streaming</strong> (real-time via WAL, primary→standby), <strong>Logical</strong> (selective table-level), <strong>Synchronous</strong> (primary waits for standby ACK), <strong>Asynchronous</strong> (primary doesn't wait, faster but risk of data loss).</p>\n</blockquote>\n<hr />\n<p><strong>50. Point-in-Time Recovery (PITR) nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> PITR — WAL arxivlari yordamida ma'lumotlar bazasini ixtiyoriy o'tgan vaqt nuqtasiga tiklash imkoniyati. \"Ertaga soat 14:30 gacha tiklash kerak\" kabi stsenariylar uchun.<br />\n<strong>EN:</strong> PITR allows restoring the database to any past point in time using WAL archives — for scenarios like \"restore to yesterday 14:30.\"</p>\n</blockquote>\n<hr />\n<p><strong>51. Table Inheritance (Jadval meros olishi) nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> PostgreSQL jadvallarga meros olishni qo'llab-quvvatlaydi. Parent jadvalga so'rov yuborilganda, barcha child jadval ma'lumotlari ham qaytariladi. Partitioning dan oldin ishlatilgan, hozir asosan deklarativ partitioning afzal.<br />\n<strong>EN:</strong> PostgreSQL supports table inheritance. Querying the parent returns data from all child tables. Largely replaced by declarative partitioning in modern PostgreSQL.</p>\n</blockquote>\n<hr />\n<p><strong>52. UUID va SERIAL/BIGSERIAL o'rtasidagi tanlash?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>SERIAL</code>/<code>BIGSERIAL</code> — ketma-ket, kichik (4/8 bayt), JOIN da tezroq. <code>UUID</code> — global yagona (16 bayt), tarqatilgan tizimlar uchun ideal, lekin indeks hajmi kattaroq, tasodifiy tartib tufayli indeks fragmentatsiyasi ko'p.<br />\n<strong>EN:</strong> <code>SERIAL</code>/<code>BIGSERIAL</code> — sequential, small (4/8 bytes), faster in JOINs. <code>UUID</code> — globally unique (16 bytes), ideal for distributed systems, but larger index size and more fragmentation due to random ordering.</p>\n</blockquote>\n<pre><code class=\"language-sql\">-- UUID v4 (tasodifiy / random)\nCREATE TABLE events (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    ...\n);\n\n-- UUID v7 (vaqt tartiblangan / time-ordered) — PostgreSQL 17+\n-- yoki pgcrypto kengaytmasi bilan\n</code></pre>\n<hr />\n<p><strong>53. Generated Columns nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Generated Columns — boshqa ustunlar ifodasi asosida avtomatik hisoblanadigan ustun. <code>STORED</code> — diskda saqlanadi, <code>VIRTUAL</code> — PostgreSQL hali qo'llab-quvvatlamaydi.<br />\n<strong>EN:</strong> Generated Columns are automatically computed from other column expressions. <code>STORED</code> saves to disk; <code>VIRTUAL</code> (not yet in PostgreSQL) computes on read.</p>\n</blockquote>\n<pre><code class=\"language-sql\">CREATE TABLE products (\n    price      NUMERIC,\n    tax_rate   NUMERIC DEFAULT 0.12,\n    price_with_tax NUMERIC GENERATED ALWAYS AS (price * (1 + tax_rate)) STORED\n);\n</code></pre>\n<hr />\n<p><strong>54. Table Statistics va pg_statistic?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> PostgreSQL query planneri jadval statistikasiga asoslanib eng yaxshi bajarish rejasini tanlaydi. <code>ANALYZE</code> statistikani yangilaydi. <code>pg_stats</code> ko'rinishi statistikani ko'rsatadi. Noto'g'ri statistika sekin so'rovlarga olib keladi.<br />\n<strong>EN:</strong> PostgreSQL's query planner uses table statistics to choose the best execution plan. <code>ANALYZE</code> updates statistics. <code>pg_stats</code> view shows them. Stale statistics lead to slow queries.</p>\n</blockquote>\n<pre><code class=\"language-sql\">-- Statistikani yangilash / Update statistics\nANALYZE users;\n\n-- Statistikani ko'rish / View statistics\nSELECT attname, n_distinct, correlation\nFROM pg_stats\nWHERE tablename = 'orders';\n</code></pre>\n<hr />\n<p><strong>55. Lateral Join nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>LATERAL</code> — subquery ning tashqi so'rovning har bir qatoriga murojaat qilishiga imkon beradi. Har bir qator uchun boshqa qiymat bilan subquery ni chaqirish kerak bo'lganda ishlatiladi.<br />\n<strong>EN:</strong> <code>LATERAL</code> allows a subquery to reference columns from the outer query's current row — useful for calling a subquery with different values per row.</p>\n</blockquote>\n<pre><code class=\"language-sql\">-- Har bir foydalanuvchining oxirgi 3 ta buyurtmasi\nSELECT u.name, o.id, o.total\nFROM users u\nCROSS JOIN LATERAL (\n    SELECT id, total FROM orders\n    WHERE user_id = u.id\n    ORDER BY created_at DESC\n    LIMIT 3\n) o;\n</code></pre>\n<hr />\n<h2 id=\"3-ilgor-daraja-advanced\">3. Ilg'or daraja / Advanced</h2>\n<p><strong>56. Query Planner qanday ishlaydi?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Query Planner statistika (jadval hajmi, ustun kardinaliyasi, korrelyatsiya), mavjud indekslar va konfiguratsiya parametrlari asosida eng arzon bajarish rejasini tanlaydi. <code>EXPLAIN</code> orqali rejani ko'rish mumkin.<br />\n<strong>EN:</strong> The Query Planner uses statistics (table size, column cardinality, correlation), available indexes, and config parameters to choose the cheapest execution plan, viewable via <code>EXPLAIN</code>.</p>\n</blockquote>\n<hr />\n<p><strong>57. Parallel Query nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> PostgreSQL katta so'rovlarni bir nechta CPU yadroda parallel bajarishini qo'llab-quvvatlaydi. <code>max_parallel_workers_per_gather</code>, <code>parallel_setup_cost</code>, <code>parallel_tuple_cost</code> parametrlari bilan boshqariladi.<br />\n<strong>EN:</strong> PostgreSQL supports executing large queries across multiple CPU cores. Controlled by <code>max_parallel_workers_per_gather</code>, <code>parallel_setup_cost</code>, <code>parallel_tuple_cost</code>.</p>\n</blockquote>\n<pre><code class=\"language-sql\">-- Parallel so'rovni tekshirish / Check parallel query\nEXPLAIN SELECT COUNT(*), AVG(total) FROM orders;\n-- &quot;Gather&quot; node ko'rsatsa, parallel ishlayapti / &quot;Gather&quot; node = parallel\n</code></pre>\n<hr />\n<p><strong>58. pg_cron kengaytmasi nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>pg_cron</code> — PostgreSQL ichida cron-uslubida vazifalarni rejalashtirish imkonini beruvchi kengaytma. Tashqi cron yoki task scheduler kerak emas, to'g'ridan-to'g'ri SQL yoki stored procedure ni jadvallab ishga tushirish mumkin.<br />\n<strong>EN:</strong> <code>pg_cron</code> is an extension for scheduling cron-style jobs inside PostgreSQL — no external cron needed, run SQL or stored procedures on a schedule.</p>\n</blockquote>\n<pre><code class=\"language-sql\">CREATE EXTENSION pg_cron;\n\n-- Har kuni tunda / Every night at midnight\nSELECT cron.schedule('nightly-cleanup', '0 0 * * *',\n    'DELETE FROM sessions WHERE expires_at &lt; NOW()');\n</code></pre>\n<hr />\n<p><strong>59. Tablespace nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Tablespace — PostgreSQL ob'ektlari (jadvallar, indekslar) saqlanadigan disk joyi. Katta, tez-tez foydalaniladigan jadvallarni SS
