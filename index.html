 nima va FastAPI uni qanday ishlatadi?</h2>\n<p><strong>EN:</strong> <code>anyio</code> is an async networking library that supports both <code>asyncio</code> and <code>trio</code>. FastAPI/Starlette use it under the hood for backend-agnostic async operations.</p>\n<p><strong>UZ:</strong> <code>anyio</code> — <code>asyncio</code> va <code>trio</code> ni qo'llab-quvvatlaydigan async tarmoq kutubxonasi. FastAPI/Starlette backend-agnostik async operatsiyalar uchun uni ichki ishlatadi.</p>\n<pre><code class=\"language-python\">import anyio\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\n@app.get(&quot;/run-tasks/&quot;)\nasync def run_concurrent_tasks():\n    results = []\n\n    # anyio.create_task_group — asyncio.gather'ga muqobil | Alternative to asyncio.gather\n    async with anyio.create_task_group() as tg:\n        async def fetch(n: int):\n            await anyio.sleep(0.1)\n            results.append(n)\n\n        for i in range(10):\n            tg.start_soon(fetch, i)\n\n    return {&quot;results&quot;: results}\n\n# anyio.to_thread.run_sync — sync funksiyani async'da | Sync function in async\n@app.get(&quot;/sync-in-async/&quot;)\nasync def sync_in_async():\n    result = await anyio.to_thread.run_sync(blocking_function)\n    return {&quot;result&quot;: result}\n</code></pre>\n<hr />\n<h2 id=\"q72-what-are-server-side-streaming-responses-server-tomonidan-oqimli-javoblar-nima\">Q72. What are Server-side Streaming responses? | Server tomonidan oqimli javoblar nima?</h2>\n<p><strong>EN:</strong> Streaming responses send data in chunks, allowing the client to start processing before the full response is ready. Ideal for large files or real-time data.</p>\n<p><strong>UZ:</strong> Oqimli javoblar ma'lumotlarni bo'laklarda yuboradi, clientga to'liq javob tayyor bo'lmasdan ishlov berishni boshlash imkonini beradi. Katta fayllar yoki real-vaqt ma'lumotlari uchun ideal.</p>\n<pre><code class=\"language-python\">from fastapi import FastAPI\nfrom fastapi.responses import StreamingResponse\nimport asyncio\n\napp = FastAPI()\n\nasync def generate_csv(data_size: int):\n    yield &quot;id,name,email\\n&quot;  # Header\n    for i in range(data_size):\n        await asyncio.sleep(0)  # Boshqa koroutinlarga imkon | Allow other coroutines\n        yield f&quot;{i},User{i},user{i}@example.com\\n&quot;\n\n@app.get(&quot;/export/csv&quot;)\nasync def export_csv(size: int = 10000):\n    return StreamingResponse(\n        generate_csv(size),\n        media_type=&quot;text/csv&quot;,\n        headers={&quot;Content-Disposition&quot;: &quot;attachment; filename=users.csv&quot;}\n    )\n\n# Katta fayl stream | Large file streaming\n@app.get(&quot;/files/{filename}&quot;)\nasync def stream_file(filename: str):\n    async def file_generator():\n        async with aiofiles.open(f&quot;files/{filename}&quot;, &quot;rb&quot;) as f:\n            while chunk := await f.read(8192):  # 8KB bo'laklar | 8KB chunks\n                yield chunk\n\n    return StreamingResponse(file_generator(), media_type=&quot;application/octet-stream&quot;)\n</code></pre>\n<hr />\n<h2 id=\"q73-how-to-implement-requestresponse-logging-in-fastapi-fastapida-sorovjavob-loglashtirish-qanday-amalga-oshiriladi\">Q73. How to implement request/response logging in FastAPI? | FastAPI'da so'rov/javob loglashtirish qanday amalga oshiriladi?</h2>\n<p><strong>EN:</strong> Use middleware to log all requests and responses centrally.</p>\n<p><strong>UZ:</strong> Barcha so'rov va javoblarni markaziy loglash uchun middleware ishlatiladi.</p>\n<pre><code class=\"language-python\">from fastapi import FastAPI, Request\nimport logging\nimport time\nimport uuid\nimport json\n\nlogger = logging.getLogger(__name__)\n\napp = FastAPI()\n\n@app.middleware(&quot;http&quot;)\nasync def logging_middleware(request: Request, call_next):\n    request_id = str(uuid.uuid4())[:8]\n    start_time = time.time()\n\n    # So'rov logi | Request log\n    logger.info(\n        f&quot;[{request_id}] → {request.method} {request.url.path} &quot;\n        f&quot;| client: {request.client.host}&quot;\n    )\n\n    response = await call_next(request)\n    duration = time.time() - start_time\n\n    # Javob logi | Response log\n    logger.info(\n        f&quot;[{request_id}] ← {response.status_code} &quot;\n        f&quot;| {duration:.3f}s&quot;\n    )\n\n    response.headers[&quot;X-Request-ID&quot;] = request_id\n    response.headers[&quot;X-Process-Time&quot;] = f&quot;{duration:.3f}&quot;\n    return response\n</code></pre>\n<hr />\n<h2 id=\"q74-what-is-asynciolock-and-when-to-use-it-in-fastapi-asynciolock-nima-va-fastapida-qachon-ishlatish-kerak\">Q74. What is <code>asyncio.Lock</code> and when to use it in FastAPI? | <code>asyncio.Lock</code> nima va FastAPI'da qachon ishlatish kerak?</h2>\n<p><strong>EN:</strong> <code>asyncio.Lock</code> prevents race conditions when multiple coroutines access shared state concurrently.</p>\n<p><strong>UZ:</strong> <code>asyncio.Lock</code> — bir vaqtda bir nechta koroutin umumiy holatga kirganda poyga sharoitlarini (race conditions) oldini oladi.</p>\n<pre><code class=\"language-python\">import asyncio\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\n# Muammo — umumiy holat | Problem — shared state\ncounter = 0\nlock = asyncio.Lock()\n\n@app.post(&quot;/increment/&quot;)\nasync def increment():\n    global counter\n    async with lock:  # Faqat bitta koroutin bir vaqtda | Only one coroutine at a time\n        temp = counter\n        await asyncio.sleep(0)  # Simulyatsiya | Simulate async work\n        counter = temp + 1\n    return {&quot;counter&quot;: counter}\n\n# Amaliy holat — rate limiter | Practical case — rate limiter\nclass RateLimiter:\n    def __init__(self, max_calls: int, period: float):\n        self.max_calls = max_calls\n        self.period = period\n        self.calls = []\n        self.lock = asyncio.Lock()\n\n    async def is_allowed(self) -&gt; bool:\n        async with self.lock:\n            now = time.time()\n            self.calls = [c for c in self.calls if now - c &lt; self.period]\n            if len(self.calls) &lt; self.max_calls:\n                self.calls.append(now)\n                return True\n            return False\n</code></pre>\n<hr />\n<h2 id=\"q75-how-to-implement-database-connection-retry-logic-malumotlar-bazasiga-ulanish-qayta-urinish-logikasini-qanday-amalga-oshirish-kerak\">Q75. How to implement database connection retry logic? | Ma'lumotlar bazasiga ulanish qayta urinish logikasini qanday amalga oshirish kerak?</h2>\n<p><strong>EN:</strong> Implement exponential backoff retry for transient DB connection failures.</p>\n<p><strong>UZ:</strong> Vaqtinchalik DB ulanish xatolar uchun exponential backoff qayta urinish logikasini amalga oshiring.</p>\n<pre><code class=\"language-python\">import asyncio\nimport logging\nfrom sqlalchemy.exc import OperationalError\n\nasync def with_retry(func, max_retries: int = 3, base_delay: float = 1.0):\n    for attempt in range(max_retries):\n        try:\n            return await func()\n        except OperationalError as e:\n            if attempt == max_retries - 1:\n                raise\n            delay = base_delay * (2 ** attempt)  # Exponential backoff\n            logging.warning(f&quot;DB xato, {delay}s dan keyin qayta urinish | Retry in {delay}s: {e}&quot;)\n            await asyncio.sleep(delay)\n\n# Ishlatish | Usage\nasync def get_users_with_retry(db: AsyncSession):\n    return await with_retry(lambda: get_users(db))\n\n# tenacity kutubxonasi bilan | With tenacity library\nfrom tenacity import retry, stop_after_attempt, wait_exponential\n\n@retry(\n    stop=stop_after_attempt(3),\n    wait=wait_exponential(multiplier=1, min=1, max=10)\n)\nasync def reliable_db_call(db: AsyncSession):\n    return await db.execute(select(User))\n</code></pre>\n<hr />\n<h1 id=\"auth-security-q76q85\">🔐 AUTH &amp; SECURITY (Q76–Q85)</h1>\n<hr />\n<h2 id=\"q76-how-to-implement-jwt-authentication-in-fastapi-fastapida-jwt-autentifikatsiyani-qanday-amalga-oshirish-kerak\">Q76. How to implement JWT Authentication in FastAPI? | FastAPI'da JWT autentifikatsiyani qanday amalga oshirish kerak?</h2>\n<p><strong>EN:</strong> Use <code>python-jose</code> for JWT and <code>passlib</code> for password hashing. Implement login endpoint that returns access token.</p>\n<p><strong>UZ:</strong> JWT uchun <code>python-jose</code>, parol xeshlash uchun <code>passlib</code> ishlatiladi. Kirish tokenini qaytaradigan login endpoint yaratiladi.</p>\n<pre><code class=\"language-python\">from datetime import datetime, timedelta\nfrom typing import Optional\nfrom jose import JWTError, jwt\nfrom passlib.context import CryptContext\nfrom fastapi import Depends, HTTPException, status\nfrom fastapi.security import OAuth2PasswordBearer, OAuth2PasswordRequestForm\nfrom pydantic import BaseModel\n\nSECRET_KEY = &quot;your-secret-key&quot;\nALGORITHM = &quot;HS256&quot;\nACCESS_TOKEN_EXPIRE_MINUTES = 30\n\npwd_context = CryptContext(schemes=[&quot;bcrypt&quot;], deprecated=&quot;auto&quot;)\noauth2_scheme = OAuth2PasswordBearer(tokenUrl=&quot;/auth/token&quot;)\n\nclass Token(BaseModel):\n    access_token: str\n    token_type: str\n\ndef verify_password(plain: str, hashed: str) -&gt; bool:\n    return pwd_context.verify(plain, hashed)\n\ndef get_password_hash(password: str) -&gt; str:\n    return pwd_context.hash(password)\n\ndef create_access_token(data: dict, expires_delta: Optional[timedelta] = None) -&gt; str:\n    to_encode = data.copy()\n    expire = datetime.utcnow() + (expires_delta or timedelta(minutes=ACCESS_TOKEN_EXPIRE_MINUTES))\n    to_encode.update({&quot;exp&quot;: expire})\n    return jwt.encode(to_encode, SECRET_KEY, algorithm=ALGORITHM)\n\nasync def get_current_user(\n    token: str = Depends(oauth2_scheme),\n    db: AsyncSession = Depends(get_db)\n) -&gt; User:\n    credentials_exception = HTTPException(\n        status_code=status.HTTP_401_UNAUTHORIZED,\n        detail=&quot;Hisob ma'lumotlari tasdiqlanmadi | Could not validate credentials&quot;,\n        headers={&quot;WWW-Authenticate&quot;: &quot;Bearer&quot;},\n    )\n    try:\n        payload = jwt.decode(token, SECRET_KEY, algorithms=[ALGORITHM])\n        user_id: int = payload.get(&quot;sub&quot;)\n        if user_id is None:\n            raise credentials_exception\n    except JWTError:\n        raise credentials_exception\n    user = await get_user(db, user_id)\n    if user is None:\n        raise credentials_exception\n    return user\n\n@app.post(&quot;/auth/token&quot;, response_model=Token)\nasync def login(\n    form_data: OAuth2PasswordRequestForm = Depends(),\n    db: AsyncSession = Depends(get_db)\n):\n    user = await get_user_by_email(db, form_data.username)\n    if not user or not verify_password(form_data.password, user.hashed_password):\n        raise HTTPException(status_code=401, detail=&quot;Noto'g'ri login yoki parol&quot;)\n    token = create_access_token(data={&quot;sub&quot;: str(user.id)})\n    return Token(access_token=token, token_type=&quot;bearer&quot;)\n\n@app.get(&quot;/me&quot;)\nasync def get_me(current_user: User = Depends(get_current_user)):\n    return current_user\n</code></pre>\n<hr />\n<h2 id=\"q77-how-to-implement-role-based-access-control-rbac-in-fastapi-fastapida-rbac-qanday-amalga-oshiriladi\">Q77. How to implement Role-Based Access Control (RBAC) in FastAPI? | FastAPI'da RBAC qanday amalga oshiriladi?</h2>\n<p><strong>EN:</strong> RBAC restricts access based on user roles. Create role-checking dependencies.</p>\n<p><strong>UZ:</strong> RBAC — foydalanuvchi rollariga asoslanib kirishni cheklaydi. Rol tekshiruv dependency'larini yarating.</p>\n<pre><code class=\"language-python\">from enum import Enum\nfrom fastapi import Depends, HTTPException\n\nclass Role(str, Enum):\n    ADMIN = &quot;admin&quot;\n    MANAGER = &quot;manager&quot;\n    USER = &quot;user&quot;\n\ndef require_role(*roles: Role):\n    async def role_checker(current_user: User = Depends(get_current_user)):\n        if current_user.role not in roles:\n            raise HTTPException(\n                status_code=403,\n                detail=f&quot;Ruxsat yo'q | Access forbidden. Required roles: {[r.value for r in roles]}&quot;\n            )\n        return current_user\n    return role_checker\n\n# Ishlatish | Usage\n@app.get(&quot;/admin/users/&quot;)\nasync def admin_list_users(\n    current_user: User = Depends(require_role(Role.ADMIN))\n):\n    return await get_all_users(db)\n\n@app.delete(&quot;/products/{id}&quot;)\nasync def delete_product(\n    id: int,\n    current_user: User = Depends(require_role(Role.ADMIN, Role.MANAGER))\n):\n    return await delete_product(db, id)\n\n@app.get(&quot;/my-profile/&quot;)\nasync def my_profile(\n    current_user: User = Depends(require_role(Role.ADMIN, Role.MANAGER, Role.USER))\n):\n    return current_user\n</code></pre>\n<hr />\n<h2 id=\"q78-how-to-implement-refresh-token-refresh-token-qanday-amalga-oshiriladi\">Q78. How to implement Refresh Token? | Refresh Token qanday amalga oshiriladi?</h2>\n<p><strong>EN:</strong> Use short-lived access tokens (15-30 min) and long-lived refresh tokens (days/weeks). Store refresh tokens in DB or Redis for revocation support.</p>\n<p><strong>UZ:</strong> Qisqa muddatli access token (15-30 daqiqa) va uzoq muddatli refresh token (kunlar/haftalar) ishlatiladi. Bekor qilish imkoniyati uchun refresh tokenlarni DB yoki Redis'da saqlang.</p>\n<pre><code class=\"language-python\">from fastapi import FastAPI, Cookie, Response\n\nREFRESH_TOKEN_EXPIRE_DAYS = 7\n\ndef create_refresh_token(user_id: int) -&gt; str:\n    return create_access_token(\n        data={&quot;sub&quot;: str(user_id), &quot;type&quot;: &quot;refresh&quot;},\n        expires_delta=timedelta(days=REFRESH_TOKEN_EXPIRE_DAYS)\n    )\n\n@app.post(&quot;/auth/login&quot;)\nasync def login(response: Response, form_data: OAuth2PasswordRequestForm = Depends()):\n    user = await authenticate_user(form_data.username, form_data.password)\n    if not user:\n        raise HTTPException(401, &quot;Noto'g'ri ma'lumotlar | Invalid credentials&quot;)\n\n    access_token = create_access_token({&quot;sub&quot;: str(user.id)})\n    refresh_token = create_refresh_token(user.id)\n\n    # Refresh token'ni HTTP-only cookie'da saqlash | Store in HTTP-only cookie\n    response.set_cookie(\n        key=&quot;refresh_token&quot;,\n        value=refresh_token,\n        httponly=True,      # JS kirish imkoni yo'q | No JS access\n        secure=True,        # Faqat HTTPS | HTTPS only\n        samesite=&quot;strict&quot;,\n        max_age=REFRESH_TOKEN_EXPIRE_DAYS * 86400\n    )\n    return {&quot;access_token&quot;: access_token, &quot;token_type&quot;: &quot;bearer&quot;}\n\n@app.post(&quot;/auth/refresh&quot;)\nasync def refresh_token(refresh_token: str = Cookie(None)):\n    if not refresh_token:\n        raise HTTPException(401, &quot;Refresh token yo'q | No refresh token&quot;)\n    try:\n        payload = jwt.decode(refresh_token, SECRET_KEY, algorithms=[ALGORITHM])\n        if payload.get(&quot;type&quot;) != &quot;refresh&quot;:\n            raise HTTPException(401, &quot;Noto'g'ri token turi | Invalid token type&quot;)\n        user_id = payload.get(&quot;sub&quot;)\n        new_access_token = create_access_token({&quot;sub&quot;: user_id})\n        return {&quot;access_token&quot;: new_access_token}\n    except JWTError:\n        raise HTTPException(401, &quot;Yaroqsiz token | Invalid token&quot;)\n</code></pre>\n<hr />\n<h2 id=\"q79-what-are-common-security-vulnerabilities-in-fastapi-apps-fastapi-ilovalarida-keng-tarqalgan-xavfsizlik-zaifliklari-nima\">Q79. What are common security vulnerabilities in FastAPI apps? | FastAPI ilovalarida keng tarqalgan xavfsizlik zaifliklari nima?</h2>\n<p><strong>EN / UZ:</strong></p>\n<pre><code class=\"language-python\"># 1. SQL Injection — SQLAlchemy ORM ishlatish | Use SQLAlchemy ORM\n# ❌ Xavfli | Dangerous\nawait db.execute(text(f&quot;SELECT * FROM users WHERE email = '{user_input}'&quot;))\n\n# ✅ Xavfsiz | Safe (parameterized)\nawait db.execute(select(User).where(User.email == user_input))\n\n# 2. Parolni ochiq saqlash | Store password in plain text\n# ❌ Xavfli\nuser.password = password\n\n# ✅ bcrypt hashing\nuser.hashed_password = pwd_context.hash(password)\n\n# 3. Maxfiy ma'lumotlarni logga yozish | Logging secrets\n# ❌ Xavfli\nlogger.info(f&quot;Login: {email}, Password: {password}&quot;)\n\n# ✅ Xavfsiz\nlogger.info(f&quot;Login attempt: {email}&quot;)\n\n# 4. CORS xato sozlash | Incorrect CORS\n# ❌ Production'da\napp.add_middleware(CORSMiddleware, allow_origins=[&quot;*&quot;])\n\n# ✅ Production'da\napp.add_middleware(CORSMiddleware, allow_origins=[&quot;https://myapp.com&quot;])\n\n# 5. Rate limiting yo'q | No rate limiting\n# ✅ slowapi qo'shing | Add slowapi\n@limiter.limit(&quot;5/minute&quot;)\nasync def login_endpoint(request: Request): ...\n\n# 6. Sensitive data response'da | Sensitive data in response\n# ❌ Xavfli\nreturn user  # hashed_password ham qaytariladi | returns hashed_password too\n\n# ✅ Response model ishlatish | Use response_model\n@app.get(&quot;/me&quot;, response_model=UserPublic)\nasync def get_me(current_user: User = Depends(get_current_user)):\n    return current_user\n</code></pre>\n<hr />\n<h2 id=\"q80-how-to-validate-request-data-and-prevent-xss-sorov-malumotlarini-tekshirish-va-xss-ni-oldini-olish\">Q80. How to validate request data and prevent XSS? | So'rov ma'lumotlarini tekshirish va XSS ni oldini olish?</h2>\n<p><strong>EN:</strong> Pydantic automatically validates types. For HTML content, sanitize using <code>bleach</code>. Use <code>Content-Security-Policy</code> headers.</p>\n<p><strong>UZ:</strong> Pydantic turlarni avtomatik tekshiradi. HTML kontent uchun <code>bleach</code> yordamida tozalang. <code>Content-Security-Policy</code> headerlarini ishlating.</p>\n<pre><code class=\"language-python\">import bleach\nfrom pydantic import BaseModel, field_validator\n\nclass CommentCreate(BaseModel):\n    content: str\n    author: str\n\n    @field_validator(&quot;content&quot;)\n    @classmethod\n    def sanitize_html(cls, v: str) -&gt; str:\n        # Faqat xavfsiz teglariga ruxsat | Allow only safe tags\n        allowed_tags = [&quot;b&quot;, &quot;i&quot;, &quot;u&quot;, &quot;em&quot;, &quot;strong&quot;, &quot;p&quot;]\n        return bleach.clean(v, tags=allowed_tags, strip=True)\n\n    @field_validator(&quot;author&quot;)\n    @classmethod\n    def no_html(cls, v: str) -&gt; str:\n        return bleach.clean(v, tags=[], strip=True)\n\n# Security headers middleware | Xavfsizlik header'lari middleware\n@app.middleware(&quot;http&quot;)\nasync def security_headers(request: Request, call_next):\n    response = await call_next(request)\n    response.headers[&quot;X-Content-Type-Options&quot;] = &quot;nosniff&quot;\n    response.headers[&quot;X-Frame-Options&quot;] = &quot;DENY&quot;\n    response.headers[&quot;X-XSS-Protection&quot;] = &quot;1; mode=block&quot;\n    response.headers[&quot;Strict-Transport-Security&quot;] = &quot;max-age=31536000; includeSubDomains&quot;\n    return response\n</code></pre>\n<hr />\n<h2 id=\"q81-how-to-implement-api-key-authentication-api-key-autentifikatsiyasini-qanday-amalga-oshirish-kerak\">Q81. How to implement API Key authentication? | API Key autentifikatsiyasini qanday amalga oshirish kerak?</h2>\n<p><strong>EN:</strong> Accept API keys via header or query parameter. Store hashed keys in the database.</p>\n<p><strong>UZ:</strong> Header yoki query parametr orqali API kalitlarini qabul qiling. Xeshlangan kalitlarni ma'lumotlar bazasida saqlang.</p>\n<pre><code class=\"language-python\">from fastapi import Security, HTTPException\nfrom fastapi.security import APIKeyHeader, APIKeyQuery\n\nAPI_KEY_HEADER = APIKeyHeader(name=&quot;X-API-Key&quot;, auto_error=False)\nAPI_KEY_QUERY = APIKeyQuery(name=&quot;api_key&quot;, auto_error=False)\n\nasync def get_api_key(\n    header_key: str = Security(API_KEY_HEADER),\n    query_key: str = Security(API_KEY_QUERY),\n    db: AsyncSession = Depends(get_db)\n):\n    api_key = header_key or query_key\n    if not api_key:\n        raise HTTPException(401, &quot;API kalit taqdim etilmagan | No API key provided&quot;)\n\n    # DB'dan tekshirish | Check in DB\n    result = await db.execute(\n        select(APIKey).where(APIKey.key_hash == hash_key(api_key))\n    )\n    key_obj = result.scalar_one_or_none()\n    if not key_obj or not key_obj.is_active:\n        raise HTTPException(403, &quot;Noto'g'ri API kalit | Invalid API key&quot;)\n\n    return key_obj\n\n@app.get(&quot;/protected/&quot;)\nasync def protected_endpoint(api_key: APIKey = Depends(get_api_key)):\n    return {&quot;data&quot;: &quot;Protected data&quot;, &quot;key_owner&quot;: api_key.owner}\n</code></pre>\n<hr />\n<h2 id=\"q82-how-to-implement-two-factor-authentication-2fa-ikki-bosqichli-autentifikatsiyani-qanday-amalga-oshirish-kerak\">Q82. How to implement Two-Factor Authentication (2FA)? | Ikki bosqichli autentifikatsiyani qanday amalga oshirish kerak?</h2>\n<p><strong>EN:</strong> Use TOTP (Time-based One-Time Password) with <code>pyotp</code> library. Generate a secret, display QR code, verify 6-digit codes.</p>\n<p><strong>UZ:</strong> <code>pyotp</code> kutubxonasi bilan TOTP (Vaqtga asoslangan bir martalik parol) ishlatiladi. Maxfiy kalit yaratiladi, QR kod ko'rsatiladi, 6 xonali kodlar tekshiriladi.</p>\n<pre><code class=\"language-python\">import pyotp\nimport qrcode\nfrom io import BytesIO\nfrom fastapi.responses import StreamingResponse\n\n@app.post(&quot;/auth/2fa/enable&quot;)\nasync def enable_2fa(current_user: User = Depends(get_current_user), db: AsyncSession = Depends(get_db)):\n    # Maxfiy kalit yaratish | Generate secret\n    secret = pyotp.random_base32()\n    current_user.totp_secret = secret\n    await db.commit()\n\n    totp = pyotp.TOTP(secret)\n    uri = totp.provisioning_uri(current_user.email, issuer_name=&quot;MyApp&quot;)\n\n    return {&quot;secret&quot;: secret, &quot;otpauth_url&quot;: uri}\n\n@app.get(&quot;/auth/2fa/qr&quot;)\nasync def get_2fa_qr(current_user: User = Depends(get_current_user)):\n    totp = pyotp.TOTP(current_user.totp_secret)\n    uri = totp.provisioning_uri(current_user.email, issuer_name=&quot;MyApp&quot;)\n    img = qrcode.make(uri)\n    buf = BytesIO()\n    img.save(buf, format=&quot;PNG&quot;)\n    buf.seek(0)\n    return StreamingResponse(buf, media_type=&quot;image/png&quot;)\n\n@app.post(&quot;/auth/2fa/verify&quot;)\nasync def verify_2fa(code: str, current_user: User = Depends(get_current_user)):\n    totp = pyotp.TOTP(current_user.totp_secret)\n    if not totp.verify(code):\n        raise HTTPException(400, &quot;Noto'g'ri kod | Invalid code&quot;)\n    return {&quot;verified&quot;: True}\n</code></pre>\n<hr />\n<h2 id=\"q83-what-is-oauth2-and-how-to-implement-it-in-fastapi-oauth2-nima-va-fastapida-uni-qanday-amalga-oshirish-kerak\">Q83. What is OAuth2 and how to implement it in FastAPI? | OAuth2 nima va FastAPI'da uni qanday amalga oshirish kerak?</h2>\n<p><strong>EN:</strong> OAuth2 is an authorization framework. FastAPI has built-in <code>OAuth2PasswordBearer</code> for password flow. For social login (Google, GitHub), use <code>authlib</code> or <code>python-social-auth</code>.</p>\n<p><strong>UZ:</strong> OAuth2 — vakolat berish tizimi. FastAPI parol oqimi uchun o'rnatilgan <code>OAuth2PasswordBearer</code>ga ega. Ijtimoiy login (Google, GitHub) uchun <code>authlib</code> yoki <code>python-social-auth</code> ishlatiladi.</p>\n<pre><code class=\"language-python\">from authlib.integrations.starlette_client import OAuth\nfrom starlette.config import Config\n\nconfig = Config(&quot;.env&quot;)\noauth = OAuth(config)\noauth.register(\n    name=&quot;google&quot;,\n    client_id=config(&quot;GOOGLE_CLIENT_ID&quot;),\n    client_secret=config(&quot;GOOGLE_CLIENT_SECRET&quot;),\n    server_metadata_url=&quot;https://accounts.google.com/.well-known/openid-configuration&quot;,\n    client_kwargs={&quot;scope&quot;: &quot;openid email profile&quot;}\n)\n\n@app.get(&quot;/auth/google&quot;)\nasync def google_login(request: Request):\n    redirect_uri = request.url_for(&quot;google_callback&quot;)\n    return await oauth.google.authorize_redirect(request, redirect_uri)\n\n@app.get(&quot;/auth/google/callback&quot;)\nasync def google_callback(request: Request, db: AsyncSession = Depends(get_db)):\n    token = await oauth.google.authorize_access_token(request)\n    user_info = token.get(&quot;userinfo&quot;)\n    # Foydalanuvchi yaratish yoki topish | Create or find user\n    user = await get_or_create_user(db, email=user_info[&quot;email&quot;], name=user_info[&quot;name&quot;])\n    access_token = create_access_token({&quot;sub&quot;: str(user.id)})\n    return {&quot;access_token&quot;: access_token}\n</code></pre>\n<hr />\n<h2 id=\"q84-how-to-implement-request-validation-middleware-sorov-tekshiruv-middlewareini-qanday-amalga-oshirish-kerak\">Q84. How to implement request validation middleware? | So'rov tekshiruv middleware'ini qanday amalga oshirish kerak?</h2>\n<p><strong>EN:</strong> Add custom validation middleware to check request size, content type, and custom business rules.</p>\n<p><strong>UZ:</strong> So'rov hajmini, kontent turini va maxsus biznes qoidalarini tekshirish uchun maxsus tekshiruv middleware qo'shing.</p>\n<pre><code class=\"language-python\">from fastapi import FastAPI, Request\nfrom fastapi.responses import JSONResponse\n\napp = FastAPI()\n\nMAX_REQUEST_SIZE = 10 * 1024 * 1024  # 10MB\n\n@app.middleware(&quot;http&quot;)\nasync def validate_request(request: Request, call_next):\n    # Hajm tekshiruvi | Size check\n    content_length = request.headers.get(&quot;content-length&quot;)\n    if content_length and int(content_length) &gt; MAX_REQUEST_SIZE:\n        return JSONResponse(\n            status_code=413,\n            content={&quot;detail&quot;: &quot;So'rov hajmi juda katta | Request too large&quot;}\n        )\n\n    # Content-Type tekshiruvi | Content-Type check\n    if request.method in [&quot;POST&quot;, &quot;PUT&quot;, &quot;PATCH&quot;]:\n        content_type = request.headers.get(&quot;content-type&quot;, &quot;&quot;)\n        if not any(ct in content_type for ct in [&quot;application/json&quot;, &quot;multipart/form-data&quot;]):\n            return JSONResponse(\n                status_code=415,\n                content={&quot;detail&quot;: &quot;Qo'llab-quvvatlanmaydigan kontent turi | Unsupported content type&quot;}\n            )\n\n    return await call_next(request)\n</code></pre>\n<hr />\n<h2 id=\"q85-what-is-https-and-how-to-configure-it-https-nima-va-uni-qanday-sozlash-kerak\">Q85. What is HTTPS and how to configure it? | HTTPS nima va uni qanday sozlash kerak?</h2>\n<p><strong>EN:</strong> HTTPS encrypts traffic using TLS/SSL. In production, use Nginx as a reverse proxy with Let's Encrypt certificates. Uvicorn also supports TLS directly.</p>\n<p><strong>UZ:</strong> HTTPS — TLS/SSL yordamida trafikni shifrlaydi. Productionda Let's Encrypt sertifikatlari bilan Nginx'ni reverse proxy sifatida ishlatiladi. Uvicorn ham TLS ni to'g'ridan-to'g'ri qo'llab-quvvatlaydi.</p>\n<pre><code class=\"language-bash\"># Uvicorn bilan TLS | TLS with Uvicorn (dev)\nuvicorn main:app --ssl-keyfile key.pem --ssl-certfile cert.pem\n\n# Nginx konfiguratsiyasi | Nginx config (production)\n# /etc/nginx/sites-available/myapp\nserver {\n    listen 443 ssl;\n    server_name myapp.com;\n\n    ssl_certificate /etc/letsencrypt/live/myapp.com/fullchain.pem;\n    ssl_certificate_key /etc/letsencrypt/live/myapp.com/privkey.pem;\n\n    location / {\n        proxy_pass http://127.0.0.1:8000;\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n    }\n}\n\n# HTTP → HTTPS yo'naltirish | HTTP → HTTPS redirect\nserver {\n    listen 80;\n    server_name myapp.com;\n    return 301 https://$host$request_uri;\n}\n</code></pre>\n<hr />\n<h1 id=\"testing-q86q92\">🧪 TESTING (Q86–Q92)</h1>\n<hr />\n<h2 id=\"q86-how-to-test-fastapi-endpoints-fastapi-endpointlarini-qanday-sinash-mumkin\">Q86. How to test FastAPI endpoints? | FastAPI endpointlarini qanday sinash mumkin?</h2>\n<p><strong>EN:</strong> Use <code>TestClient</code> (sync) or <code>AsyncClient</code> (async) from <code>httpx</code> with pytest.</p>\n<p><strong>UZ:</strong> pytest bilan <code>httpx</code> dan <code>TestClient</code> (sinxron) yoki <code>AsyncClient</code> (asinxron) ishlatiladi.</p>\n<pre><code class=\"language-python\"># pip install pytest pytest-asyncio httpx\n\n# tests/test_users.py\nimport pytest\nfrom httpx import AsyncClient, ASGITransport\nfrom main import app\n\n@pytest.fixture\nasync def client():\n    async with AsyncClient(\n        transport=ASGITransport(app=app),\n        base_url=&quot;http://test&quot;\n    ) as ac:\n        yield ac\n\n@pytest.mark.asyncio\nasync def test_create_user(client: AsyncClient):\n    response = await client.post(\n        &quot;/api/v1/users/&quot;,\n        json={&quot;name&quot;: &quot;Ali&quot;, &quot;email&quot;: &quot;ali@test.com&quot;, &quot;password&quot;: &quot;secret123&quot;}\n    )\n    assert response.status_code == 201\n    data = response.json()\n    assert data[&quot;email&quot;] == &quot;ali@test.com&quot;\n    assert &quot;id&quot; in data\n    assert &quot;password&quot; not in data  # Parol yashirilishi kerak | Password should be hidden\n\n@pytest.mark.asyncio\nasync def test_get_nonexistent_user(client: AsyncClient):\n    response = await client.get(&quot;/api/v1/users/99999&quot;)\n    assert response.status_code == 404\n\n@pytest.mark.asyncio\nasync def test_unauthorized_access(client: AsyncClient):\n    response = await client.get(&quot;/api/v1/admin/users/&quot;)\n    assert response.status_code == 401\n</code></pre>\n<hr />\n<h2 id=\"q87-how-to-mock-dependencies-in-fastapi-tests-fastapi-testlarida-dependencylarni-qanday-mock-qilish-kerak\">Q87. How to mock dependencies in FastAPI tests? | FastAPI testlarida dependency'larni qanday mock qilish kerak?</h2>\n<p><strong>EN:</strong> Use <code>app.dependency_overrides</code> to replace real dependencies with mock ones during testing.</p>\n<p><strong>UZ:</strong> Test vaqtida haqiqiy dependency'larni mock narsalar bilan almashtirish uchun <code>app.dependency_overrides</code> ishlatiladi.</p>\n<pre><code class=\"language-python\">import pytest\nfrom unittest.mock import AsyncMock, patch\nfrom main import app, get_db, get_current_user\n\n# DB dependency'ni o'zgartirish | Override DB dependency\n@pytest.fixture\nasync def client_with_mock_db():\n    mock_db = AsyncMock()\n\n    async def mock_get_db():\n        yield mock_db\n\n    app.dependency_overrides[get_db] = mock_get_db\n    async with AsyncClient(transport=ASGITransport(app=app), base_url=&quot;http://test&quot;) as ac:\n        yield ac, mock_db\n    app.dependency_overrides.clear()\n\n# Auth dependency'ni o'zgartirish | Override auth dependency\n@pytest.fixture\nasync def authenticated_client():\n    fake_user = User(id=1, name=&quot;Test User&quot;, email=&quot;test@test.com&quot;, role=&quot;admin&quot;)\n\n    async def mock_current_user():\n        return fake_user\n\n    app.dependency_overrides[get_current_user] = mock_current_user\n    async with AsyncClient(transport=ASGITransport(app=app), base_url=&quot;http://test&quot;) as ac:\n        yield ac\n    app.dependency_overrides.clear()\n\n@pytest.mark.asyncio\nasync def test_admin_endpoint(authenticated_client: AsyncClient):\n    response = await authenticated_client.get(&quot;/api/v1/admin/users/&quot;)\n    assert response.status_code == 200\n</code></pre>\n<hr />\n<h2 id=\"q88-how-to-set-up-test-database-test-malumotlar-bazasini-qanday-sozlash-kerak\">Q88. How to set up test database? | Test ma'lumotlar bazasini qanday sozlash kerak?</h2>\n<p><strong>EN:</strong> Use a separate test database with Alembic migrations. Use <code>pytest-asyncio</code> and transaction rollback to keep tests isolated.</p>\n<p><strong>UZ:</strong> Alembic migratsiyalari bilan alohida test ma'lumotlar bazasini ishlating. Testlarni izolyatsiyalangan holda saqlash uchun <code>pytest-asyncio</code> va tranzaksiya rollback ishlatiladi.</p>\n<pre><code class=\"language-python\"># tests/conftest.py\nimport pytest_asyncio\nfrom sqlalchemy.ext.asyncio import create_async_engine, AsyncSession, async_sessionmaker\nfrom app.database import Base\nfrom app.main import app\nfrom app.dependencies import get_db\n\nTEST_DATABASE_URL = &quot;postgresql+asyncpg://user:pass@localhost/testdb&quot;\n\n@pytest_asyncio.fixture(scope=&quot;session&quot;)\nasync def test_engine():\n    engine = create_async_engine(TEST_DATABASE_URL)\n    async with engine.begin() as conn:\n        await conn.run_sync(Base.metadata.create_all)  # Jadvallar yaratish | Create tables\n    yield engine\n    async with engine.begin() as conn:\n        await conn.run_sync(Base.metadata.drop_all)    # Tozalash | Clean up\n    await engine.dispose()\n\n@pytest_asyncio.fixture\nasync def db_session(test_engine):\n    async with test_engine.begin() as conn:\n        async with AsyncSession(conn) as session:\n            yield session\n            await session.rollback()  # Har test dan keyin bekor qilish | Rollback after each test\n\n@pytest_asyncio.fixture\nasync def client(db_session: AsyncSession):\n    async def override_get_db():\n        yield db_session\n\n    app.dependency_overrides[get_db] = override_get_db\n    async with AsyncClient(transport=ASGITransport(app=app), base_url=&quot;http://test&quot;) as ac:\n        yield ac\n    app.dependency_overrides.clear()\n</code></pre>\n<hr />\n<h2 id=\"q89-how-to-write-integration-tests-for-db-operations-db-operatsiyalari-uchun-integratsiya-testlarini-qanday-yozish-kerak\">Q89. How to write integration tests for DB operations? | DB operatsiyalari uchun integratsiya testlarini qanday yozish kerak?</h2>\n<p><strong>EN:</strong> Integration tests check the full stack — FastAPI endpoint + DB. Use test fixtures with real (test) DB.</p>\n<p><strong>UZ:</strong> Integratsiya testlari to'liq stekni tekshiradi — FastAPI endpoint + DB. Haqiqiy (test) DB bilan test fixture'larini ishlating.</p>\n<pre><code class=\"language-python\"># tests/test_integration.py\nimport pytest\nfrom tests.conftest import client, db_session\nfrom app.models import User\nfrom app.crud import create_user\n\n@pytest.mark.asyncio\nasync def test_full_user_flow(client: AsyncClient, db_session: AsyncSession):\n    # 1. Foydalanuvchi yaratish | Create user\n    response = await client.post(&quot;/api/v1/users/&quot;, json={\n        &quot;name&quot;: &quot;Ali&quot;,\n        &quot;email&quot;: &quot;ali@test.com&quot;,\n        &quot;password&quot;: &quot;password123&quot;\n    })\n    assert response.status_code == 201\n    user_id = response.json()[&quot;id&quot;]\n\n    # 2. Foydalanuvchini olish | Get user\n    response = await client.get(f&quot;/api/v1/users/{user_id}&quot;)\n    assert response.status_code == 200\n    assert response.json()[&quot;email&quot;] == &quot;ali@test.com&quot;\n\n    # 3. Login | Login\n    response = await client.post(&quot;/api/v1/auth/token&quot;, data={\n        &quot;username&quot;: &quot;ali@test.com&quot;,\n        &quot;password&quot;: &quot;password123&quot;\n    })\n    assert response.status_code == 200\n    token = response.json()[&quot;access_token&quot;]\n\n    # 4. Himoyalangan endpoint | Protected endpoint\n    response = await client.get(\n        &quot;/api/v1/me&quot;,\n        headers={&quot;Authorization&quot;: f&quot;Bearer {token}&quot;}\n    )\n    assert response.status_code == 200\n    assert response.json()[&quot;id&quot;] == user_id\n\n    # 5. DB'da tekshirish | Check in DB\n    from sqlalchemy import select\n    result = await db_session.execute(select(User).where(User.id == user_id))\n    user = result.scalar_one()\n    assert user.email == &quot;ali@test.com&quot;\n    assert user.hashed_password != &quot;password123&quot;  # Xeshlangan | Hashed\n</code></pre>\n<hr />\n<h2 id=\"q90-how-to-test-pydantic-models-pydantic-modellarini-qanday-sinash-kerak\">Q90. How to test Pydantic models? | Pydantic modellarini qanday sinash kerak?</h2>\n<p><strong>EN:</strong> Test validation logic, field validators, and edge cases directly with Pydantic models.</p>\n<p><strong>UZ:</strong> Validatsiya logikasi, maydon validatorlari va chegaraviy holatlarni Pydantic modellari bilan to'g'ridan-to'g'ri sinab ko'ring.</p>\n<pre><code class=\"language-python\">import pytest\nfrom pydantic import ValidationError\nfrom app.schemas import UserCreate, UserUpdate\n\ndef test_user_create_valid():\n    user = UserCreate(\n        name=&quot;Ali&quot;,\n        email=&quot;ali@example.com&quot;,\n        password=&quot;password123&quot;\n    )\n    assert user.name == &quot;Ali&quot;\n    assert user.email == &quot;ali@example.com&quot;\n\ndef test_user_create_invalid_email():\n    with pytest.raises(ValidationError) as exc_info:\n        UserCreate(name=&quot;Ali&quot;, email=&quot;not-an-email&quot;, password=&quot;pass123&quot;)\n    errors = exc_info.value.errors()\n    assert any(e[&quot;loc&quot;] == (&quot;email&quot;,) for e in errors)\n\ndef test_user_create_short_password():\n    with pytest.raises(ValidationError):\n        UserCreate(name=&quot;Ali&quot;, email=&quot;ali@ex.com&quot;, password=&quot;short&quot;)\n\ndef test_user_update_partial():\n    # PATCH — faqat berilgan maydonlar | Only provided fields\n    update = UserUpdate(name=&quot;Vali&quot;)\n    dumped = update.model_dump(exclude_unset=True)\n    assert dumped == {&quot;name&quot;: &quot;Vali&quot;}  # email yo'q | no email field\n\ndef test_user_name_normalized():\n    user = UserCreate(name=&quot;  ali  &quot;, email=&quot;ali@ex.com&quot;, password=&quot;pass123456&quot;)\n    assert user.name == &quot;Ali&quot;  # Normalize qilingan | Normalized\n</code></pre>\n<hr />\n<h2 id=\"q91-what-is-pytest-asyncio-and-how-to-configure-it-pytest-asyncio-nima-va-uni-qanday-sozlash-kerak\">Q91. What is <code>pytest-asyncio</code> and how to configure it? | <code>pytest-asyncio</code> nima va uni qanday sozlash kerak?</h2>\n<p><strong>EN:</strong> <code>pytest-asyncio</code> enables running async test functions with pytest. Configure it in <code>pytest.ini</code> or <code>pyproject.toml</code>.</p>\n<p><strong>UZ:</strong> <code>pytest-asyncio</code> — pytest bilan async test funksiyalarini ishga tushirishga imkon beradi. <code>pytest.ini</code> yoki <code>pyproject.toml</code> da sozlanadi.</p>\n<pre><code class=\"language-toml\"># pyproject.toml\n[tool.pytest.ini_options]\nasyncio_mode = &quot;auto&quot;   # Barcha async funksiyalar avtomatik | All async auto\ntestpaths = [&quot;tests&quot;]\npython_files = [&quot;test_*.py&quot;]\npython_classes = [&quot;Test*&quot;]\npython_functions = [&quot;test_*&quot;]\n\n# Yoki | Or: pytest.ini\n# [pytest]\n# asyncio_mode = auto\n</code></pre>\n<pre><code class=\"language-python\"># pytest.ini yoki pyproject.toml asyncio_mode=auto bilan | with asyncio_mode=auto\n# @pytest.mark.asyncio kerak emas | @pytest.mark.asyncio not needed\n\nasync def test_something():  # Avtomatik | Automatically async\n    result = await some_async_func()\n    assert result == expected\n\n# asyncio_mode=strict bilan | with asyncio_mode=strict\n@pytest.mark.asyncio\nasync def test_something_strict():\n    result = await some_async_func()\n    assert result == expected\n</code></pre>\n<hr />\n<h2 id=\"q92-how-to-measure-test-coverage-test-qamrovini-qanday-olchash-mumkin\">Q92. How to measure test coverage? | Test qamrovini qanday o'lchash mumkin?</h2>\n<p><strong>EN:</strong> Use <code>pytest-cov</code> to measure code coverage and identify untested parts.</p>\n<p><strong>UZ:</strong> Kod qamrovini o'lchash va sinovdan o'tmagan qismlarni aniqlash uchun <code>pytest-cov</code> ishlatiladi.</p>\n<pre><code class=\"language-bash\"># O'rnatish | Install\npip install pytest-cov\n\n# Coverage bilan test bajarish | Run tests with coverage\npytest --cov=app --cov-report=html --cov-report=term-missing\n\n# Natija | Output:\n# Name                    Stmts   Miss  Cover\n# -------------------------------------------\n# app/main.py                50      5    90%\n# app/models.py              30      0   100%\n# app/crud.py                80     10    88%\n# app/routers/users.py       60      3    95%\n# -------------------------------------------\n# TOTAL                     220     18    92%\n\n# Minimal qamrov talabi | Minimum coverage requirement\npytest --cov=app --cov-fail-under=80\n\n# pyproject.toml da | In pyproject.toml\n# [tool.coverage.run]\n# source = [&quot;app&quot;]\n# omit = [&quot;*/tests/*&quot;, &quot;*/migrations/*&quot;]\n#\n# [tool.coverage.report]\n# fail_under = 80\n</code></pre>\n<hr />\n<h1 id=\"deploy-best-practices-q93q100\">🚀 DEPLOY &amp; BEST PRACTICES (Q93–Q100)</h1>\n<hr />\n<h2 id=\"q93-how-to-deploy-fastapi-with-docker-in-production-fastapini-docker-bilan-productionda-qanday-deploy-qilish-kerak\">Q93. How to deploy FastAPI with Docker in production? | FastAPI'ni Docker bilan production'da qanday deploy qilish kerak?</h2>\n<p><strong>EN:</strong> Use multi-stage Docker build, Gunicorn + Uvicorn workers, and Docker Compose for orchestration.</p>\n<p><strong>UZ:</strong> Ko'p bosqichli Docker build, Gunicorn + Uvicorn worker'lar va orkestratsiya uchun Docker Compose ishlatiladi.</p>\n<pre><code class=\"language-dockerfile\"># Dockerfile — Production\nFROM python:3.11-slim AS base\n\nWORKDIR /app\nENV PYTHONDONTWRITEBYTECODE=1 \\\n    PYTHONUNBUFFERED=1 \\\n    PIP_NO_CACHE_DIR=1\n\n# Dependencies\nCOPY requirements.txt .\nRUN pip install --no-cache-dir -r requirements.txt\n\n# App kodi | App code\nCOPY . .\n\n# Non-root foydalanuvchi | Non-root user\nRUN useradd -ms /bin/bash appuser &amp;&amp; chown -R appuser:appuser /app\nUSER appuser\n\nEXPOSE 8000\n\n# Gunicorn + Uvicorn workers\nCMD [&quot;gunicorn&quot;, &quot;main:app&quot;,\n     &quot;--worker-class&quot;, &quot;uvicorn.workers.UvicornWorker&quot;,\n     &quot;--workers&quot;, &quot;4&quot;,\n     &quot;--bind&quot;, &quot;0.0.0.0:8000&quot;,\n     &quot;--timeout&quot;, &quot;120&quot;,\n     &quot;--graceful-timeout&quot;, &quot;30&quot;,\n     &quot;--log-level&quot;, &quot;info&quot;]\n</code></pre>\n<pre><code class=\"language-yaml\"># docker-compose.prod.yml\nversion: &quot;3.9&quot;\nservices:\n  api:\n    build: .\n    restart: unless-stopped\n    env_file: .env.prod\n    depends_on:\n      db:\n        condition: service_healthy\n    healthcheck:\n      test: [&quot;CMD&quot;, &quot;curl&quot;, &quot;-f&quot;, &quot;http://localhost:8000/health&quot;]\n      interval: 30s\n      retries: 3\n\n  db:\n    image: postgres:15-alpine\n    restart: unless-stopped\n    volumes:\n      - postgres_data:/var/lib/postgresql/data\n    healthcheck:\n      test: [&quot;CMD-SHELL&quot;, &quot;pg_isready -U $POSTGRES_USER&quot;]\n      interval: 5s\n      retries: 5\n\n  nginx:\n    image: nginx:alpine\n    ports:\n      - &quot;80:80&quot;\n      - &quot;443:443&quot;\n    volumes:\n      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro\n      - /etc/letsencrypt:/etc/letsencrypt:ro\n    depends_on:\n      - api\n\nvolumes:\n  postgres_data:\n</code></pre>\n<hr />\n<h2 id=\"q94-what-is-uvicorn-and-gunicorn-and-when-to-use-which-uvicorn-va-gunicorn-nima-qachon-qaysinisini-ishlatish-kerak\">Q94. What is Uvicorn and Gunicorn and when to use which? | Uvicorn va Gunicorn nima, qachon qaysinisini ishlatish kerak?</h2>\n<p><strong>EN:</strong> Uvicorn is an ASGI server (single process). Gunicorn is a process manager. In production: Gunicorn manages multiple Uvicorn workers for multi-core utilization.</p>\n<p><strong>UZ:</strong> Uvicorn — ASGI server (bitta jarayon). Gunicorn — jarayon menejeri. Productionda: Gunicorn ko'p yadroli protsessordan foydalanish uchun bir nechta Uvicorn worker'larini boshqaradi.</p>\n<pre><code class=\"language-bash\"># Development | Dasturlash\nuvicorn main:app --reload --host 0.0.0.0 --port 8000\n\n# Production — Gunicorn + Uvicorn\ngunicorn main:app \\\n    --worker-class uvicorn.workers.UvicornWorker \\\n    --workers 4 \\               # 2 * CPU + 1 qoida | Rule: 2 * CPU + 1\n    --bind 0.0.0.0:8000 \\\n    --timeout 120 \\             # Uzoq so'rovlar uchun | For long requests\n    --keep-alive 5 \\\n    --access-logfile - \\        # stdout'ga | To stdout\n    --error-logfile - \\\n    --log-level info\n\n# Worker soni hisoblash | Calculate workers\n# workers = 2 * multiprocessing.cpu_count() + 1\n# 4 yadroli server → 9 worker | 4-core server → 9 workers\n</code></pre>\n<hr />\n<h2 id=\"q95-what-is-nginx-and-how-to-configure-it-as-reverse-proxy-nginx-nima-va-uni-reverse-proxy-sifatida-qanday-sozlash-kerak\">Q95. What is Nginx and how to configure it as reverse proxy? | Nginx nima va uni reverse proxy sifatida qanday sozlash kerak?</h2>\n<p><strong>EN:</strong> Nginx acts as a reverse proxy, handling SSL termination, load balancing, static files, and request buffering.</p>\n<p><strong>UZ:</strong> Nginx — SSL terminatsiya, load balancing, statik fayllar va so'rov bufferingini boshqaradigan reverse proxy sifatida ishlaydi.</p>\n<pre><code class=\"language-nginx\"># /etc/nginx/sites-available/myapp.conf\n\nupstream fastapi {\n    server 127.0.0.1:8000;\n    # Load balancing | Yuklama taqsimlash\n    # server 127.0.0.1:8001;\n    # server 127.0.0.1:8002;\n}\n\nserver {\n    listen 443 ssl http2;\n    server_name myapp.com www.myapp.com;\n\n    # SSL\n    ssl_certificate /etc/letsencrypt/live/myapp.com/fullchain.pem;\n    ssl_certificate_key /etc/letsencrypt/live/myapp.com/privkey.pem;\n    ssl_protocols TLSv1.2 TLSv1.3;\n\n    # So'rov hajmi chegarasi | Request size limit\n    client_max_body_size 10M;\n\n    # FastAPI'ga yo'naltirish | Proxy to FastAPI\n    location /api/ {\n        proxy_pass http://fastapi;\n        proxy_http_version 1.1;\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n        proxy_read_timeout 300;\n    }\n\n    # Statik fayllar | Static files\n    location /static/ {\n        alias /app/static/;\n        expires 30d;\n        add_header Cache-Control &quot;public, no-transform&quot;;\n    }\n\n    # GZip siqish | GZip compression\n    gzip on;\n    gzip_types text/plain application/json application/javascript text/css;\n}\n\nserver {\n    listen 80;\n    server_name myapp.com www.myapp.com;\n    return 301 https://$host$request_uri;\n}\n</code></pre>\n<hr />\n<h2 id=\"q96-what-is-cicd-and-how-to-set-it-up-for-fastapi-cicd-nima-va-fastapi-uchun-qanday-sozlash-kerak\">Q96. What is CI/CD and how to set it up for FastAPI? | CI/CD nima va FastAPI uchun qanday sozlash kerak?</h2>\n<p><strong>EN:</strong> CI/CD automates testing and deployment. GitHub Actions example for FastAPI.</p>\n<p><strong>UZ:</strong> CI/CD — testlash va deploymentni avtomatlashtiradi. FastAPI uchun GitHub Actions namunasi.</p>\n<pre><code class=\"language-yaml\"># .github/workflows/ci-cd.yml\nname: FastAPI CI/CD\n\non:\n  push:\n    branches: [main, develop]\n  pull_request:\n    branches: [main]\n\njobs:\n  test:\n    runs-on: ubuntu-latest\n\n    services:\n      postgres:\n        image: postgres:15\n        env:\n          POSTGRES_DB: testdb\n          POSTGRES_USER: testuser\n          POSTGRES_PASSWORD: testpass\n        ports:\n          - 5432:5432\n        options: --health-cmd pg_isready --health-interval 10s\n\n    steps:\n      - uses: actions/checkout@v3\n\n      - name: Set up Python\n        uses: actions/setup-python@v4\n        with:\n          python-version: &quot;3.11&quot;\n\n      - name: Install dependencies\n        run: pip install -r requirements.txt -r requirements-test.txt\n\n      - name: Run migrations\n        run: alembic upgrade head\n        env:\n          DATABASE_URL: postgresql+asyncpg://testuser:testpass@localhost/testdb\n\n      - name: Run tests with coverage\n        run: pytest --cov=app --cov-fail-under=80\n        env:\n          DATABASE_URL: postgresql+asyncpg://testuser:testpass@localhost/testdb\n          SECRET_KEY: test-secret-key\n\n  deploy:\n    needs: test\n    runs-on: ubuntu-latest\n    if: github.ref == 'refs/heads/main'\n\n    steps:\n      - name: Deploy to server\n        uses: appleboy/ssh-action@master\n        with:\n          host: ${{ secrets.SERVER_HOST }}\n          username: ${{ secrets.SERVER_USER }}\n          key: ${{ secrets.SSH_PRIVATE_KEY }}\n          script: |\n            cd /app\n            git pull origin main\n            docker compose -f docker-compose.prod.yml up -d --build\n            docker compose exec api alembic upgrade head\n</code></pre>\n<hr />\n<h2 id=\"q97-what-are-fastapi-project-structure-best-practices-fastapi-loyiha-tuzilmasi-boyicha-eng-yaxshi-amaliyotlar-nima\">Q97. What are FastAPI project structure best practices? | FastAPI loyiha tuzilmasi bo'yicha eng yaxshi amaliyotlar nima?</h2>\n<p><strong>EN / UZ:</strong></p>\n<pre><code>my-fastapi-app/\n├── app/\n│   ├── __init__.py\n│   ├── main.py              # FastAPI app | FastAPI ilovasi\n│   ├── config.py            # Settings | Sozlamalar\n│   ├── database.py          # DB connection | DB ulanish\n│   │\n│   ├── models/              # SQLAlchemy models | SQLAlchemy modellari\n│   │   ├── __init__.py\n│   │   ├── user.py\n│   │   └── order.py\n│   │\n│   ├── schemas/             # Pydantic schemas | Pydantic sxemalari\n│   │   ├── __init__.py\n│   │   ├── user.py          # UserCreate, UserPublic, UserUpdate\n│   │   └── order.py\n│   │\n│   ├── routers/             # API routers | API router'lari\n│   │   ├── __init__.py\n│   │   ├── users.py\n│   │   ├── orders.py\n│   │   └── auth.py\n│   │\n│   ├── crud/                # DB operations | DB operatsiyalari\n│   │   ├── __init__.py\n│   │   ├── users.py\n│   │   └── orders.py\n│   │\n│   ├── dependencies/        # FastAPI dependencies\n│   │   ├── __init__.py\n│   │   ├── auth.py          # get_current_user\n│   │   └── database.py      # get_db\n│   │\n│   ├── services/            # Business logic | Biznes mantiq\n│   │   ├── __init__.py\n│   │   ├── email.py\n│   │   └── payment.py\n│   │\n│   └── utils/               # Utilities | Yordamchi funksiyalar\n│       ├── security.py      # JWT, password hashing\n│       └── pagination.py\n│\n├── alembic/                 # DB migrations | DB migratsiyalari\n│   ├── env.py\n│   └── versions/\n│\n├── tests/                   # Testlar\n│   ├── conftest.py\n│   ├── test_users.py\n│   └── test_orders.py\n│\n├── .env                     # Environment variables (gitignore!)\n├── .env.example             # Template\n├── .gitignore\n├── alembic.ini\n├── docker-compose.yml\n├── docker-compose.prod.yml\n├── Dockerfile\n├── requirements.txt\n├── requirements-test.txt\n└── pyproject.toml\n</code></pre>\n<hr />\n<h2 id=\"q98-what-is-the-repository-pattern-and-how-to-use-it-with-fastapi-repository-pattern-nima-va-fastapi-bilan-qanday-ishlatish-kerak\">Q98. What is the Repository Pattern and how to use it with FastAPI? | Repository Pattern nima va FastAPI bilan qanday ishlatish kerak?</h2>\n<p><strong>EN:</strong> Repository pattern abstracts data access layer, making business logic independent of the database implementation.</p>\n<p><strong>UZ:</strong> Repository pattern — ma'lumotlarga kirish qatlamini abstraksiyalaydi, biznes mantiqini ma'lumotlar bazasi implementatsiyasidan mustaqil qiladi.</p>\n<pre><code class=\"language-python\"># repositories/user_repo.py\nfrom abc import ABC, abstractmethod\nfrom typing import Optional, List\nfrom sqlalchemy.ext.asyncio import AsyncSession\nfrom sqlalchemy import select\nfrom app.models import User\n\nclass AbstractUserRepository(ABC):\n    @abstractmethod\n    async def get_by_id(self, user_id: int) -&gt; Optional[User]: ...\n\n    @abstractmethod\n    async def get_by_email(self, email: str) -&gt; Optional[User]: ...\n\n    @abstractmethod\n    async def create(self, **kwargs) -&gt; User: ...\n\n    @abstractmethod\n    async def update(self, user_id: int, **kwargs) -&gt; Optional[User]: ...\n\nclass SQLAlchemyUserRepository(AbstractUserRepository):\n    def __init__(self, session: AsyncSession):\n        self.session = session\n\n    async def get_by_id(self, user_id: int) -&gt; Optional[User]:\n        result = await self.session.execute(\n            select(User).where(User.id == user_id)\n        )\n        return result.scalar_one_or_none()\n\n    async def get_by_email(self, email: str) -&gt; Optional[User]:\n        result = await self.session.execute(\n            select(User).where(User.email == email)\n        )\n        return result.scalar_one_or_none()\n\n    async def create(self, **kwargs) -&gt; User:\n        user = User(**kwargs)\n        self.session.add(user)\n        await self.session.commit()\n        await self.session.refresh(user)\n        return user\n\n# FastAPI dependency | FastAPI bog'liqlik\ndef get_user_repo(db: AsyncSession = Depends(get_db)) -&gt; AbstractUserRepository:\n    return SQLAlchemyUserRepository(db)\n\n# Router'da ishlatish | Usage in router\n@router.get(&quot;/{user_id}&quot;)\nasync def get_user(\n    user_id: int,\n    repo: AbstractUserRepository = Depends(get_user_repo)\n):\n    user = await repo.get_by_id(user_id)\n    if not user:\n        raise HTTPException(404, &quot;Foydalanuvchi topilmadi&quot;)\n    return user\n</code></pre>\n<hr />\n<h2 id=\"q99-what-is-opentelemetry-and-how-to-add-observability-to-fastapi-opentelemetry-nima-va-fastapiga-kuzatuvchanlikni-qanday-qoshish-kerak\">Q99. What is OpenTelemetry and how to add observability to FastAPI? | OpenTelemetry nima va FastAPI'ga kuzatuvchanlikni qanday qo'shish kerak?</h2>\n<p><strong>EN:</strong> OpenTelemetry provides tracing, metrics, and logging. Use <code>opentelemetry-instrumentation-fastapi</code> for automatic instrumentation.</p>\n<p><strong>UZ:</strong> OpenTelemetry — tracing, metrikalar va loglashtirish imkoniyatini beradi. Avtomatik instrumentatsiya uchun <code>opentelemetry-instrumentation-fastapi</code> ishlatiladi.</p>\n<pre><code class=\"language-python\"># pip install opentelemetry-instrumentation-fastapi\n# pip install opentelemetry-exporter-otlp\n\nfrom opentelemetry import trace\nfrom opentelemetry.sdk.trace import TracerProvider\nfrom opentelemetry.sdk.trace.export import BatchSpanProcessor\nfrom opentelemetry.exporter.otlp.proto.grpc.trace_exporter import OTLPSpanExporter\nfrom opentelemetry.instrumentation.fastapi import FastAPIInstrumentor\nfrom opentelemetry.instrumentation.sqlalchemy import SQLAlchemyInstrumentor\n\n# Tracer sozlash | Setup tracer\nprovider = TracerProvider()\notlp_exporter = OTLPSpanExporter(endpoint=&quot;http://jaeger:4317&quot;)\nprovider.add_span_processor(BatchSpanProcessor(otlp_exporter))\ntrace.set_tracer_provider(provider)\n\n# FastAPI avtomatik instrumentatsiya | Auto-instrument FastAPI\napp = FastAPI()\nFastAPIInstrumentor.instrument_app(app)\n\n# SQLAlchemy instrumentatsiya | SQLAlchemy instrumentation\nSQLAlchemyInstrumentor().instrument(engine=engine)\n\n# Qo'lda span yaratish | Custom span\ntracer = trace.get_tracer(__name__)\n\n@app.get(&quot;/users/{user_id}&quot;)\nasync def get_user(user_id: int):\n    with tracer.start_as_current_span(&quot;get_user&quot;) as span:\n        span.set_attribute(&quot;user.id&quot;, user_id)\n        user = await db_get_user(user_id)\n        span.set_attribute(&quot;user.found&quot;, user is not None)\n        return user\n</code></pre>\n<hr />\n<h2 id=\"q100-what-are-the-most-important-fastapi-best-practices-fastapi-boyicha-eng-muhim-amaliyotlar-nima\">Q100. What are the most important FastAPI best practices? | FastAPI bo'yicha eng muhim amaliyotlar nima?</h2>\n<p><strong>EN / UZ:</strong> Summary of all critical best practices.</p>\n<pre><code class=\"language-python\"># ✅ 1. Async I/O ishlatish | Use async I/O\n@app.get(&quot;/users/&quot;)\nasync def list_users(db: AsyncSession = Depends(get_db)):\n    return await crud.get_users(db)\n\n# ✅ 2. Response model bilan maxfiy ma'lumotlarni yashirish | Hide sensitive data\n@app.get(&quot;/users/{id}&quot;, response_model=UserPublic)\nasync def get_user(id: int): ...\n\n# ✅ 3. Dependency Injection ishlatish | Use DI\nDBDep = Annotated[AsyncSession, Depends(get_db)]\nCurrentUser = Annotated[User, Depends(get_current_user)]\n\n# ✅ 4. Pydantic v2 ishlatish | Use Pydantic v2\nclass UserCreate(BaseModel):\n    model_config = ConfigDict(str_strip_whitespace=True)\n    name: str = Field(..., min_length=2)\n\n# ✅ 5. Versioning | Versiyalash\napp.include_router(v1_router, prefix=&quot;/api/v1&quot;)\n\n# ✅ 6. Error handling | Xato boshqaruvi\n@app.exception_handler(Exception)\nasync def global_handler(request, exc): ...\n\n# ✅ 7. Settings | Sozlamalar\n@lru_cache()\ndef get_settings() -&gt; Settings: return Settings()\n\n# ✅ 8. Loglar | Logging\nimport logging\nlogger = logging.getLogger(__name__)\n\n# ✅ 9. Health check\n@app.get(&quot;/health&quot;)\nasync def health(): return {&quot;status&quot;: &quot;ok&quot;}\n\n# ✅ 10. Rate limiting | Cheklash\n@limiter.limit(&quot;100/minute&quot;)\nasync def endpoint(request: Request): ...\n\n# ✅ 11. Eager loading — N+1 ni oldini olish | Prevent N+1\nselect(User).options(selectinload(User.orders))\n\n# ✅ 12. Testlar | Tests\n# pytest --cov=app --cov-fail-under=80\n\n# ✅ 13. CORS sozlamalari | CORS settings\napp.add_middleware(CORSMiddleware, allow_origins=[&quot;https://myapp.com&quot;])\n\n# ✅ 14. Pagination\n@app.get(&quot;/items/&quot;)\nasync def list_items(skip: int = 0, limit: int = Query(default=20, le=100)):\n    ...\n\n# ✅ 15. Docker + Nginx + Gunicorn production stack\n# gunicorn main:app -k uvicorn.workers.UvicornWorker -w 4\n</code></pre>\n<hr />\n<h2 id=\"quick-reference-tez-qollanma\">📌 Quick Reference | Tez Qo'llanma</h2>\n<pre><code class=\"language-bash\"># FastAPI\npip install fastapi uvicorn[standard] pydantic-settings python-multipart\n\n# Database\npip install sqlalchemy asyncpg alembic aiofiles\n\n# Auth\npip install python-jose[cryptography] passlib[bcrypt] authlib\n\n# Cache\npip install fastapi-cache2 redis\n\n# Rate limiting\npip install slowapi\n\n# Testing\npip install pytest pytest-asyncio httpx pytest-cov\n\n# Background tasks\npip install celery redis flower\n\n# Monitoring\npip install opentelemetry-instrumentation-fastapi\n\n# Run\nuvicorn main:app --reload                              # Development\ngunicorn main:app -k uvicorn.workers.UvicornWorker -w 4  # Production\n\n# Alembic\nalembic init alembic\nalembic revision --autogenerate -m &quot;message&quot;\nalembic upgrade head\nalembic downgrade -1\nalembic current\nalembic history\n</code></pre>\n<hr />\n<p><em>Prepared by | Tayyorlagan: Alyorjon</em>\n<em>Sources | Manbalar: FastAPI Docs, SQLAlchemy Docs, Pydantic Docs, Alembic Docs, InterviewBit, DataCamp, GeeksforGeeks</em></p>"}, "docker": {"label": "🐳 Docker", "body": "<h1 id=\"docker-interview-questions-answers\">🐳 Docker Interview Questions &amp; Answers</h1>\n<h1 id=\"docker-intervyu-savol-va-javoblari\">🐳 Docker Intervyu Savol va Javoblari</h1>\n<blockquote>\n<p><strong>EN:</strong> Practical Docker interview questions with real examples — from basics to advanced.<br />\n<strong>UZ:</strong> Asosiydan murakkabgacha — amaliy misollar bilan Docker intervyu savollari.</p>\n</blockquote>\n<hr />\n<h2 id=\"mundarija-table-of-contents\">📑 Mundarija | Table of Contents</h2>\n<ol>\n<li><a href=\"#1-asoslar--basics\">Docker asoslari | Docker Basics</a></li>\n<li><a href=\"#2-image-va-container\">Image va Container</a></li>\n<li><a href=\"#3-dockerfile\">Dockerfile</a></li>\n<li><a href=\"#4-docker-compose\">Docker Compose</a></li>\n<li><a href=\"#5-networking--tarmoq\">Networking | Tarmoq</a></li>\n<li><a href=\"#6-volumes--maʼlumot-saqlash\">Volumes | Ma'lumot saqlash</a></li>\n<li><a href=\"#7-amaliy-buyruqlar--practical-commands\">Amaliy buyruqlar | Practical Commands</a></li>\n<li><a href=\"#8-advanced--ilgor-mavzular\">Advanced | Ilg'or mavzular</a></li>\n<li><a href=\"#-quick-reference--tez-qollanma\">Quick Reference | Tez Qo'llanma</a></li>\n</ol>\n<hr />\n<h2 id=\"1-asoslar-basics\">1. Asoslar | Basics</h2>\n<hr />\n<h3 id=\"q1-what-is-docker-docker-nima\">Q1. What is Docker? | Docker nima?</h3>\n<p><strong>EN:</strong> Docker is an open-source containerization platform used for building, shipping, and running applications inside isolated environments called containers. It ensures that software runs the same way regardless of where it is deployed.</p>\n<p><strong>UZ:</strong> Docker — ilovalarni izolyatsiyalangan muhitda (container) yaratish, yuborish va ishga tushirish uchun mo'ljallangan ochiq manbali platforma. Dastur qayerda ishga tushirilmasin, bir xil ishlashini kafolatlaydi.</p>\n<pre><code class=\"language-bash\"># Docker versiyasini tekshirish | Check Docker version\ndocker --version\n# Docker version 26.1.0, build 123456\n\n# Docker ma'lumotlari | Docker info\ndocker info\n</code></pre>\n<hr />\n<h3 id=\"q2-what-is-a-container-container-nima\">Q2. What is a Container? | Container nima?</h3>\n<p><strong>EN:</strong> A container is a lightweight, standalone, executable package that includes everything needed to run an application — code, runtime, libraries, environment variables, and config files. Containers share the host OS kernel, making them much lighter than VMs.</p>\n<p><strong>UZ:</strong> Container — ilovani ishga tushirish uchun zarur bo'lgan hamma narsani (kod, runtime, kutubxonalar, o'zgaruvchilar, konfiguratsiya) o'z ichiga olgan yengil, mustaqil paket. Containerlar host OS kernelini ulashadilar — shuning uchun VM'larga qaraganda ancha yengildir.</p>\n<pre><code>[Container]              [Virtual Machine]\n┌─────────────┐         ┌─────────────┐\n│ App         │         │ App         │\n│ Libraries   │         │ Libraries   │\n│ Runtime     │         │ Guest OS    │\n├─────────────┤         │ (full OS)   │\n│ Docker      │         ├─────────────┤\n│ Engine      │         │ Hypervisor  │\n├─────────────┤         ├─────────────┤\n│ Host OS     │         │ Host OS     │\n│ Kernel      │         │             │\n└─────────────┘         └─────────────┘\nLightweight ✅           Heavy ❌\nFast start ✅            Slow start ❌\n</code></pre>\n<hr />\n<h3 id=\"q3-what-is-the-difference-between-docker-and-a-virtual-machine-docker-va-virtual-machine-farqi-nima\">Q3. What is the difference between Docker and a Virtual Machine? | Docker va Virtual Machine farqi nima?</h3>\n<p><strong>EN:</strong> Containers share the host OS kernel and are lightweight. VMs include a full guest OS and are heavier and slower to start.</p>\n<p><strong>UZ:</strong> Containerlar host OS kernelini ulashadi va yengildir. VM'lar to'liq guest OS ni o'z ichiga oladi — og'irroq va sekinroq ishga tushadi.</p>\n<table>\n<thead>\n<tr>\n<th>Feature</th>\n<th>Docker Container</th>\n<th>Virtual Machine</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>EN: OS</td>\n<td>Shares host kernel</td>\n<td>Full guest OS</td>\n</tr>\n<tr>\n<td>UZ: OS</td>\n<td>Host kernelni ulashadi</td>\n<td>To'liq guest OS</td>\n</tr>\n<tr>\n<td>EN: Size</td>\n<td>MBs</td>\n<td>GBs</td>\n</tr>\n<tr>\n<td>UZ: Hajm</td>\n<td>MB</td>\n<td>GB</td>\n</tr>\n<tr>\n<td>EN: Startup</td>\n<td>Seconds</td>\n<td>Minutes</td>\n</tr>\n<tr>\n<td>UZ: Ishga tushish</td>\n<td>Soniyalar</td>\n<td>Daqiqalar</td>\n</tr>\n<tr>\n<td>EN: Performance</td>\n<td>Near native</td>\n<td>Slower</td>\n</tr>\n<tr>\n<td>UZ: Unumdorlik</td>\n<td>Deyarli native</td>\n<td>Sekinroq</td>\n</tr>\n<tr>\n<td>EN: Isolation</td>\n<td>Process-level</td>\n<td>Hardware-level</td>\n</tr>\n<tr>\n<td>UZ: Izolyatsiya</td>\n<td>Jarayon darajasida</td>\n<td>Hardware darajasida</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h3 id=\"q4-what-is-docker-architecture-docker-arxitekturasi-nima\">Q4. What is Docker Architecture? | Docker Arxitekturasi nima?</h3>\n<p><strong>EN:</strong> Docker uses a client-server architecture consisting of: Docker Client, Docker Daemon, Docker Registry, and Docker Objects (images, containers, volumes, networks).</p>\n<p><strong>UZ:</strong> Docker client-server arxitekturasidan foydalanadi: Docker Client, Docker Daemon, Docker Registry va Docker Objects (image, container, volume, network).</p>\n<pre><code>[Docker Client]  ---REST API---&gt;  [Docker Daemon (dockerd)]\n  docker build                         |\n  docker run                    ┌──────┴──────┐\n  docker pull                   │             │\n                            [Images]    [Containers]\n                                         |\n                            [Docker Registry (Docker Hub)]\n</code></pre>\n<pre><code class=\"language-bash\"># Client daemon bilan muloqot | Client talks to daemon\ndocker ps       # Client daemon'ga so'rov yuboradi | Client sends request to daemon\n</code></pre>\n<hr />\n<h3 id=\"q5-what-is-docker-hub-docker-hub-nima\">Q5. What is Docker Hub? | Docker Hub nima?</h3>\n<p><strong>EN:</strong> Docker Hub is a cloud-based public registry where Docker images are stored and shared. It's like GitHub but for Docker images.</p>\n<p><strong>UZ:</strong> Docker Hub — Docker image'larni saqlash va ulashish uchun bulut asosidagi ommaviy registry. GitHub'ga o'xshash, lekin Docker image'lari uchun.</p>\n<pre><code class=\"language-bash\"># Docker Hub'dan image yuklash | Pull image from Docker Hub\ndocker pull nginx\n\n# Docker Hub'ga login | Login to Docker Hub\ndocker login\n\n# O'z image'ingizni push qilish | Push your image\ndocker push username/my-app:1.0\n</code></pre>\n<hr />\n<h3 id=\"q6-what-are-the-main-features-of-docker-dockerning-asosiy-xususiyatlari-nima\">Q6. What are the main features of Docker? | Docker'ning asosiy xususiyatlari nima?</h3>\n<p><strong>EN:</strong> Containerization, portability, resource efficiency, isolation, versioning, and rapid deployment.</p>\n<p><strong>UZ:</strong> Konteynerizatsiya, ko'chma muvofiqligi, resurs samaradorligi, izolyatsiya, versiyalash va tez deployment.</p>\n<pre><code class=\"language-bash\"># Portability namoyon | Portability demonstrated\n# Dev mashinada build qiling | Build on dev machine\ndocker build -t my-app .\n\n# Production serverda ishga tushiring | Run on production server\ndocker run -d -p 80:8000 my-app\n# EN: Works exactly the same! | UZ: Aynan bir xil ishlaydi!\n</code></pre>\n<hr />\n<h3 id=\"q7-what-is-a-docker-namespace-docker-namespace-nima\">Q7. What is a Docker Namespace? | Docker Namespace nima?</h3>\n<p><strong>EN:</strong> Namespaces are a Linux kernel feature that Docker uses to provide isolation between containers. Each container gets its own namespace for PIDs, network, file system, users, etc.</p>\n<p><strong>UZ:</strong> Namespace — Docker containerlar orasida izolyatsiyani ta'minlash uchun foydalanadigan Linux kernel xususiyati. Har bir container PID, tarmoq, fayl tizimi, foydalanuvchilar uchun o'z namespace'ini oladi.</p>\n<table>\n<thead>\n<tr>\n<th>Namespace</th>\n<th>EN</th>\n<th>UZ</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>PID</td>\n<td>Process isolation</td>\n<td>Jarayon izolyatsiyasi</td>\n</tr>\n<tr>\n<td>NET</td>\n<td>Network isolation</td>\n<td>Tarmoq izolyatsiyasi</td>\n</tr>\n<tr>\n<td>MNT</td>\n<td>Filesystem isolation</td>\n<td>Fayl tizimi izolyatsiyasi</td>\n</tr>\n<tr>\n<td>UTS</td>\n<td>Hostname isolation</td>\n<td>Hostname izolyatsiyasi</td>\n</tr>\n<tr>\n<td>IPC</td>\n<td>Inter-process comm.</td>\n<td>Jarayonlar aro muloqot</td>\n</tr>\n<tr>\n<td>USER</td>\n<td>User isolation</td>\n<td>Foydalanuvchi izolyatsiyasi</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h3 id=\"q8-what-is-cgroups-in-docker-dockerda-cgroups-nima\">Q8. What is cgroups in Docker? | Docker'da cgroups nima?</h3>\n<p><strong>EN:</strong> Control Groups (cgroups) is a Linux kernel feature that limits, accounts for, and isolates resource usage (CPU, memory, disk I/O) of containers.</p>\n<p><strong>UZ:</strong> Control Groups (cgroups) — containerlarga ajratiladigan resurslarni (CPU, xotira, disk I/O) cheklash va nazorat qiluvchi Linux kernel xususiyati.</p>\n<pre><code class=\"language-bash\"># Container uchun memory va CPU chegaralash | Limit memory and CPU for container\ndocker run -d \\\n  --memory=&quot;512m&quot; \\\n  --cpus=&quot;0.5&quot; \\\n  --name my-limited-app \\\n  nginx\n\n# EN: Container can use max 512MB RAM and 50% of one CPU core\n# UZ: Container max 512MB RAM va 1 CPU core'ning 50%ini ishlatishi mumkin\n</code></pre>\n<hr />\n<h2 id=\"2-image-va-container\">2. Image va Container</h2>\n<hr />\n<h3 id=\"q9-what-is-a-docker-image-docker-image-nima\">Q9. What is a Docker Image? | Docker Image nima?</h3>\n<p><strong>EN:</strong> A Docker image is a read-only template used to create containers. It contains the application code, runtime, libraries, and all dependencies. Images are built in layers.</p>\n<p><strong>UZ:</strong> Docker image — containerlar yaratish uchun ishlatiladigan faqat o'qish (read-only) shabloni. U dastur kodi, runtime, kutubxonalar va barcha bog'liqliklarni o'z ichiga oladi. Image'lar qatlamlar (layers) orqali quriladi.</p>\n<pre><code class=\"language-bash\"># Barcha image'larni ko'rish | List all images\ndocker images\n\n# REPOSITORY    TAG       IMAGE ID       CREATED        SIZE\n# nginx         latest    a99a39d070bf   2 weeks ago    192MB\n# python        3.11      abc123def456   1 month ago    920MB\n\n# Image haqida batafsil ma'lumot | Detailed image info\ndocker inspect nginx\n</code></pre>\n<hr />\n<h3 id=\"q10-what-is-the-difference-between-docker-image-and-docker-container-docker-image-va-docker-container-farqi-nima\">Q10. What is the difference between Docker Image and Docker Container? | Docker Image va Docker Container farqi nima?</h3>\n<p><strong>EN:</strong> An image is a static blueprint (like a class in OOP). A container is a running instance of an image (like an object).</p>\n<p><strong>UZ:</strong> Image — statik shablon (OOP'dagi classga o'xshash). Container — image'ning ishlaydigan nusxasi (objectga o'xshash).</p>\n<table>\n<thead>\n<tr>\n<th></th>\n<th>Image</th>\n<th>Container</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>EN</td>\n<td>Read-only template</td>\n<td>Running instance</td>\n</tr>\n<tr>\n<td>UZ</td>\n<td>Faqat o'qish shabloni</td>\n<td>Ishlaydigan nusxa</td>\n</tr>\n<tr>\n<td>EN</td>\n<td>Static, blueprint</td>\n<td>Dynamic, real</td>\n</tr>\n<tr>\n<td>UZ</td>\n<td>Statik, loyiha</td>\n<td>Dinamik, haqiqiy</td>\n</tr>\n<tr>\n<td>EN</td>\n<td>Stored in registry</td>\n<td>Runs on host</td>\n</tr>\n<tr>\n<td>UZ</td>\n<td>Registry'da saqlanadi</td>\n<td>Hostda ishlaydi</td>\n</tr>\n</tbody>\n</table>\n<pre><code class=\"language-bash\"># Image'dan container yaratish | Create container from image\ndocker run nginx               # image → container\n\n# Bir image'dan ko'p container | Multiple containers from one image\ndocker run --name web1 nginx\ndocker run --name web2 nginx\ndocker run --name web3 nginx\n</code></pre>\n<hr />\n<h3 id=\"q11-what-are-the-states-of-a-docker-container-docker-container-holatlari-qanday\">Q11. What are the states of a Docker Container? | Docker Container holatlari qanday?</h3>\n<p><strong>EN:</strong> A container can be in one of six states: Created, Running, Paused, Restarting, Exited, Dead.</p>\n<p><strong>UZ:</strong> Container oltita holatdan birida bo'lishi mumkin: Created, Running, Paused, Restarting, Exited, Dead.</p>\n<pre><code class=\"language-bash\"># Container holati | Container state\ndocker ps       # Faqat ishlaydigan | Only running\ndocker ps -a    # Barcha holatlar | All states\n\n# CONTAINER ID   IMAGE   STATUS\n# abc123         nginx   Up 2 hours        &lt;- Running\n# def456         redis   Exited (0)        &lt;- Exited\n# ghi789         mysql   Paused            &lt;- Paused\n\n# Holatlarni boshqarish | Manage states\ndocker start  &lt;id&gt;    # Created/Exited → Running\ndocker pause  &lt;id&gt;    # Running → Paused\ndocker unpause &lt;id&gt;   # Paused → Running\ndocker stop   &lt;id&gt;    # Running → Exited (graceful)\ndocker kill   &lt;id&gt;    # Running → Exited (force)\ndocker rm     &lt;id&gt;    # Exited → deleted\n</code></pre>\n<hr />\n<h3 id=\"q12-how-to-create-and-run-a-docker-container-docker-container-qanday-yaratiladi-va-ishga-tushiriladi\">Q12. How to create and run a Docker Container? | Docker Container qanday yaratiladi va ishga tushiriladi?</h3>\n<p><strong>EN:</strong> Use <code>docker run</code> to create and start a container from an image.</p>\n<p><strong>UZ:</strong> Image'dan container yaratib ishga tushirish uchun <code>docker run</code> ishlatiladi.</p>\n<pre><code class=\"language-bash\"># Asosiy | Basic\ndocker run nginx\n\n# Fonda ishlatish | Run in background (detached)\ndocker run -d nginx\n\n# Port mapping bilan | With port mapping\ndocker run -d -p 8080:80 nginx\n# host:8080 → container:80\n\n# Nom berish | With name\ndocker run -d -p 8080:80 --name my-nginx nginx\n\n# Muhit o'zgaruvchilari | Environment variables\ndocker run -d \\\n  -e POSTGRES_DB=mydb \\\n  -e POSTGRES_USER=admin \\\n  -e POSTGRES_PASSWORD=secret \\\n  -p 5432:5432 \\\n  --name my-postgres \\\n  postgres:15\n\n# Interaktiv terminal | Interactive terminal\ndocker run -it ubuntu /bin/bash\n</code></pre>\n<hr />\n<h3 id=\"q13-how-to-build-a-docker-image-docker-image-qanday-quriladi\">Q13. How to build a Docker Image? | Docker Image qanday quriladi?</h3>\n<p><strong>EN:</strong> Write a Dockerfile and use <code>docker build</code> to create an image from it.</p>\n<p><strong>UZ:</strong> Dockerfile yozing va <code>docker build</code> bilan image qurishingiz mumkin.</p>\n<pre><code class=\"language-bash\"># Image qurish | Build image\ndocker build -t my-app:1.0 .\n\n# -t = tag (nom:version | name:version)\n# .  = Dockerfile shu papkada | Dockerfile is in current dir\n\n# Boshqa nom bilan | Different Dockerfile name\ndocker build -f Dockerfile.prod -t my-app:prod .\n\n# Build argumentlari bilan | With build arguments\ndocker build --build-arg ENV=production -t my-app:prod .\n\n# Qurilgan image'larni ko'rish | See built images\ndocker images | grep my-app\n</code></pre>\n<hr />\n<h3 id=\"q14-can-you-remove-a-paused-container-paused-containerni-ochirish-mumkinmi\">Q14. Can you remove a paused container? | Paused containerni o'chirish mumkinmi?</h3>\n<p><strong>EN:</strong> No. A container must be in the <strong>stopped (Exited)</strong> state before it can be removed.</p>\n<p><strong>UZ:</strong> Yo'q. Container o'chirilishidan oldin <strong>to'xtatilgan (Exited)</strong> holatda bo'lishi kerak.</p>\n<pre><code class=\"language-bash\"># Noto'g'ri | Wrong — paused containerni o'chirish | delete paused container\ndocker rm my-container   # Error!\n\n# To'g'ri | Correct\ndocker unpause my-container   # Paused → Running\ndocker stop my-container      # Running → Exited\ndocker rm my-container        # Exited → deleted\n\n# yoki to'g'ridan-to'g'ri | or directly\ndocker stop my-container &amp;&amp; docker rm my-container\n\n# Barcha to'xtatilgan containerlarni o'chirish | Remove all stopped containers\ndocker container prune\n</code></pre>\n<hr />\n<h3 id=\"q15-will-you-lose-data-when-a-docker-container-exits-container-toxtasa-malumotlar-yoqoladimi\">Q15. Will you lose data when a Docker container exits? | Container to'xtasa ma'lumotlar yo'qoladimi?</h3>\n<p><strong>EN:</strong> No. Data written to the container filesystem persists until the container is explicitly deleted. However, for permanent data storage, use <strong>volumes</strong>.</p>\n<p><strong>UZ:</strong> Yo'q. Container fayl tizimiga yozilgan ma'lumotlar container aniq o'chirilmaguncha saqlanadi. Lekin doimiy saqlash uchun <strong>volume</strong> ishlatish kerak.</p>\n<pre><code class=\"language-bash\"># Container qayta ishga tushirilganda ma'lumot qoladi | Data persists on restart\ndocker restart my-container   # ✅ Data safe\n\n# Container o'chirilganda ma'lumot yo'qoladi | Data lost when removed\ndocker rm my-container        # ❌ Data gone\n\n# Doimiy saqlash uchun volume | For permanent storage use volume\ndocker run -d \\\n  -v my-data:/var/lib/postgresql/data \\\n  postgres:15\n</code></pre>\n<hr />\n<h3 id=\"q16-how-to-copy-files-between-host-and-container-host-va-container-orasida-fayllarni-qanday-kochirish-mumkin\">Q16. How to copy files between host and container? | Host va container orasida fayllarni qanday ko'chirish mumkin?</h3>\n<p><strong>EN:</strong> Use <code>docker cp</code> to copy files in both directions.</p>\n<p><strong>UZ:</strong> Ikki yo'nalishda ham fayl ko'chirish uchun <code>docker cp</code> ishlatiladi.</p>\n<pre><code class=\"language-bash\"># Host → Container\ndocker cp ./config.py my-container:/app/config.py\n\n# Container → Host\ndocker cp my-container:/app/logs/app.log ./local-logs/\n\n# EN: Useful for debugging without rebuilding image\n# UZ: Image'ni qayta qurmasdan debug qilishda foydali\n</code></pre>\n<hr />\n<h2 id=\"3-dockerfile\">3. Dockerfile</h2>\n<hr />\n<h3 id=\"q17-what-is-a-dockerfile-dockerfile-nima\">Q17. What is a Dockerfile? | Dockerfile nima?</h3>\n<p><strong>EN:</strong> A Dockerfile is a text script containing instructions to build a Docker image. Each instruction creates a new layer in the image.</p>\n<p><strong>UZ:</strong> Dockerfile — Docker image qurish bo'yicha ko'rsatmalar to'plamini o'z ichiga olgan matn fayli. Har bir ko'rsatma image'da yangi qatlam (layer) yaratadi.</p>\n<pre><code class=\"language-dockerfile\"># Dockerfile namunasi | Dockerfile example (FastAPI app)\n\n# 1. Base image | Asosiy image\nFROM python:3.11-slim\n\n# 2. Metadata\nLABEL maintainer=&quot;alyorjon@example.com&quot;\nLABEL version=&quot;1.0&quot;\n\n# 3. Muhit o'zgaruvchisi | Environment variable\nENV PYTHONDONTWRITEBYTECODE=1 \\\n    PYTHONUNBUFFERED=1\n\n# 4. Ish papkasi | Working directory\nWORKDIR /app\n\n# 5. Bog'liqliklarni ko'chirish va o'rnatish | Copy and install dependencies\nCOPY requirements.txt .\nRUN pip install --no-cache-dir -r requirements.txt\n\n# 6. Dastur kodini ko'chirish | Copy app code\nCOPY . .\n\n# 7. Port ochish | Expose port\nEXPOSE 8000\n\n# 8. Ishga tushirish | Start command\nCMD [&quot;uvicorn&quot;, &quot;main:app&quot;, &quot;--host&quot;, &quot;0.0.0.0&quot;, &quot;--port&quot;, &quot;8000&quot;]\n</code></pre>\n<hr />\n<h3 id=\"q18-what-are-common-dockerfile-instructions-dockerfiledagi-asosiy-korsatmalar-nima\">Q18. What are common Dockerfile instructions? | Dockerfile'dagi asosiy ko'rsatmalar nima?</h3>\n<p><strong>EN / UZ:</strong></p>\n<table>\n<thead>\n<tr>\n<th>Instruction</th>\n<th>EN</th>\n<th>UZ</th>\n<th>Example</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>FROM</code></td>\n<td>Base image</td>\n<td>Asosiy image</td>\n<td><code>FROM python:3.11</code></td>\n</tr>\n<tr>\n<td><code>RUN</code></td>\n<td>Execute command during build</td>\n<td>Qurish paytida buyruq</td>\n<td><code>RUN pip install flask</code></td>\n</tr>\n<tr>\n<td><code>CMD</code></td>\n<td>Default command at runtime</td>\n<td>Ishga tushirish buyrug'i</td>\n<td><code>CMD [\"python\", \"app.py\"]</code></td>\n</tr>\n<tr>\n<td><code>ENTRYPOINT</code></td>\n<td>Fixed executable</td>\n<td>Asosiy ijrochi</td>\n<td><code>ENTRYPOINT [\"gunicorn\"]</code></td>\n</tr>\n<tr>\n<td><code>COPY</code></td>\n<td>Copy files from host</td>\n<td>Hostdan fayl ko'chirish</td>\n<td><code>COPY . /app</code></td>\n</tr>\n<tr>\n<td><code>ADD</code></td>\n<td>Like COPY + URL + tar support</td>\n<td>COPY + URL + tar</td>\n<td><code>ADD archive.tar.gz /app</code></td>\n</tr>\n<tr>\n<td><code>ENV</code></td>\n<td>Set environment variable</td>\n<td>Muhit o'zgaruvchisi</td>\n<td><code>ENV PORT=8000</code></td>\n</tr>\n<tr>\n<td><code>EXPOSE</code></td>\n<td>Document port</td>\n<td>Port hujj
