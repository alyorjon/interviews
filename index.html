&quot;&quot;&quot;\n    def pay(self, amount_uzs: float) -&gt; bool: pass\n\nclass PaymentAdapter(ModernPaymentInterface):\n    &quot;&quot;&quot;EN: Adapter — bridges old and new | UZB: Adapter — eskini yangiga ko'prik qiladi&quot;&quot;&quot;\n    def __init__(self, legacy: LegacyPaymentSystem):\n        self.legacy = legacy\n\n    def pay(self, amount_uzs: float) -&gt; bool:\n        tiyin = int(amount_uzs * 100)            # EN: unit conversion | UZB: birlik aylantirish\n        result = self.legacy.make_payment_in_tiyin(tiyin)\n        print(f&quot;Paid {amount_uzs:,} UZS via adapter | adapter orqali to'landi&quot;)\n        return result[&quot;status&quot;] == &quot;ok&quot;\n\ndef checkout(payment: ModernPaymentInterface, amount: float):\n    success = payment.pay(amount)\n    print(f&quot;EN: Payment {'succeeded' if success else 'failed'} | &quot;\n          f&quot;UZB: To'lov {'muvaffaqiyatli' if success else 'muvaffaqiyatsiz'}&quot;)\n\nlegacy = LegacyPaymentSystem()\nadapter = PaymentAdapter(legacy)\ncheckout(adapter, 500_000)\n</code></pre>\n<hr />\n<h3 id=\"84-what-is-a-singleton-pattern-singleton-pattern-nima\">84. What is a singleton pattern? | Singleton pattern nima?</h3>\n<p><strong>EN:</strong> Ensures a class has <strong>only one instance</strong> and provides a global access point.</p>\n<p><strong>UZB:</strong> Klassning <strong>faqat bitta nusxasini</strong> ta'minlaydi va global kirish nuqtasini beradi.</p>\n<pre><code class=\"language-python\">import threading\n\nclass AppLogger:\n    &quot;&quot;&quot;EN: Thread-safe Singleton Logger | UZB: Thread-xavfsiz Singleton Logger&quot;&quot;&quot;\n    _instance = None\n    _lock = threading.Lock()\n\n    def __new__(cls):\n        if cls._instance is None:\n            with cls._lock:            # EN: thread-safe | UZB: thread-xavfsiz\n                if cls._instance is None:\n                    cls._instance = super().__new__(cls)\n                    cls._instance._logs = []\n                    print(&quot;EN: Logger initialized | UZB: Logger ishga tushirildi&quot;)\n        return cls._instance\n\n    def log(self, level: str, message: str):\n        entry = f&quot;[{level.upper()}] {message}&quot;\n        self._logs.append(entry)\n        print(entry)\n\n    def get_logs(self) -&gt; list:\n        return self._logs.copy()\n\n# EN: Always the same instance | UZB: Har doim bir xil nusxa\nlogger1 = AppLogger()\nlogger2 = AppLogger()\nlogger3 = AppLogger()\n\nlogger1.log(&quot;info&quot;, &quot;Server started | Server ishga tushdi&quot;)\nlogger2.log(&quot;warning&quot;, &quot;High memory | Xotira yuqori&quot;)\n\nprint(f&quot;EN: Same? | UZB: Bir xilmi? {logger1 is logger2 is logger3}&quot;)  # True\nprint(f&quot;Total logs | Jami yozuvlar: {len(logger3.get_logs())}&quot;)  # 2\n</code></pre>\n<hr />\n<h3 id=\"85-what-is-the-factory-pattern-factory-pattern-nima\">85. What is the factory pattern? | Factory pattern nima?</h3>\n<p><strong>EN:</strong> Provides an <strong>interface for creating objects</strong> but lets subclasses decide which type to instantiate.</p>\n<p><strong>UZB:</strong> Obyektlar yaratish uchun <strong>interfeys ta'minlaydi</strong>, lekin qaysi turni yaratishni subklasslarga qoldiradi.</p>\n<pre><code class=\"language-python\">from abc import ABC, abstractmethod\n\nclass DatabaseDriver(ABC):\n    @abstractmethod\n    def connect(self) -&gt; str: pass\n\n    @abstractmethod\n    def execute(self, query: str) -&gt; list: pass\n\nclass PostgreSQLDriver(DatabaseDriver):\n    def connect(self): return &quot;Connected to PostgreSQL | PostgreSQL ga ulandi&quot;\n    def execute(self, query): return [{&quot;result&quot;: f&quot;PG: {query}&quot;}]\n\nclass FirebirdDriver(DatabaseDriver):\n    def connect(self): return &quot;Connected to Firebird | Firebird ga ulandi&quot;\n    def execute(self, query): return [{&quot;result&quot;: f&quot;FB: {query}&quot;}]\n\nclass SQLiteDriver(DatabaseDriver):\n    def connect(self): return &quot;Connected to SQLite | SQLite ga ulandi&quot;\n    def execute(self, query): return [{&quot;result&quot;: f&quot;SL: {query}&quot;}]\n\nclass DatabaseFactory:\n    &quot;&quot;&quot;EN: Factory — creates right driver without knowing details | UZB: Factory — tafsilotlarsiz to'g'ri driver yaratadi&quot;&quot;&quot;\n    _drivers = {\n        &quot;postgresql&quot;: PostgreSQLDriver,\n        &quot;firebird&quot;: FirebirdDriver,\n        &quot;sqlite&quot;: SQLiteDriver,\n    }\n\n    @classmethod\n    def create(cls, db_type: str) -&gt; DatabaseDriver:\n        driver_class = cls._drivers.get(db_type.lower())\n        if not driver_class:\n            raise ValueError(f&quot;EN: Unknown DB type: {db_type} | UZB: Noma'lum DB turi&quot;)\n        return driver_class()\n\nfor db in [&quot;postgresql&quot;, &quot;firebird&quot;, &quot;sqlite&quot;]:\n    driver = DatabaseFactory.create(db)\n    print(driver.connect())\n    print(driver.execute(&quot;SELECT 1&quot;))\n</code></pre>\n<hr />\n<h3 id=\"86-what-is-the-decorator-pattern-decorator-pattern-nima\">86. What is the decorator pattern? | Decorator pattern nima?</h3>\n<p><strong>EN:</strong> Allows <strong>behavior to be added to an object</strong> dynamically without changing its structure.</p>\n<p><strong>UZB:</strong> Strukturasini o'zgartirmasdan obyektga <strong>dinamik ravishda xatti-harakat qo'shish</strong> imkonini beradi.</p>\n<pre><code class=\"language-python\">from functools import wraps\nimport time\n\n# EN: Decorator pattern using Python decorators (perfect match!)\n# UZB: Python decoratorlari yordamida decorator pattern (mukammal mos!)\n\ndef timer(func):\n    &quot;&quot;&quot;EN: Adds timing behavior | UZB: Vaqt o'lchash xatti-harakatini qo'shadi&quot;&quot;&quot;\n    @wraps(func)\n    def wrapper(*args, **kwargs):\n        start = time.perf_counter()\n        result = func(*args, **kwargs)\n        elapsed = time.perf_counter() - start\n        print(f&quot;[TIMER] {func.__name__}: {elapsed:.4f}s&quot;)\n        return result\n    return wrapper\n\ndef retry(max_attempts: int = 3, delay: float = 0.1):\n    &quot;&quot;&quot;EN: Adds retry behavior | UZB: Qayta urinish xatti-harakatini qo'shadi&quot;&quot;&quot;\n    def decorator(func):\n        @wraps(func)\n        def wrapper(*args, **kwargs):\n            for attempt in range(1, max_attempts + 1):\n                try:\n                    return func(*args, **kwargs)\n                except Exception as e:\n                    if attempt == max_attempts:\n                        raise\n                    print(f&quot;[RETRY] Attempt {attempt} failed: {e}&quot;)\n                    time.sleep(delay)\n        return wrapper\n    return decorator\n\ndef log(func):\n    &quot;&quot;&quot;EN: Adds logging | UZB: Logging qo'shadi&quot;&quot;&quot;\n    @wraps(func)\n    def wrapper(*args, **kwargs):\n        print(f&quot;[LOG] Calling {func.__name__} | Chaqirilmoqda: {func.__name__}&quot;)\n        result = func(*args, **kwargs)\n        print(f&quot;[LOG] Done {func.__name__} | Tugadi: {func.__name__}&quot;)\n        return result\n    return wrapper\n\n@timer\n@log\n@retry(max_attempts=2)\ndef fetch_data(url: str) -&gt; dict:\n    return {&quot;url&quot;: url, &quot;data&quot;: &quot;success&quot;}\n\nresult = fetch_data(&quot;https://api.example.com/users&quot;)\nprint(result)\n</code></pre>\n<hr />\n<h3 id=\"87-what-is-a-proxy-pattern-proxy-pattern-nima\">87. What is a proxy pattern? | Proxy pattern nima?</h3>\n<p><strong>EN:</strong> An object <strong>represents and controls access</strong> to another object.</p>\n<p><strong>UZB:</strong> Obyekt boshqa obyektga <strong>kirishni ifodalaydi va nazorat qiladi</strong>.</p>\n<pre><code class=\"language-python\">from abc import ABC, abstractmethod\nfrom functools import lru_cache\n\nclass ImageLoader(ABC):\n    @abstractmethod\n    def load(self, path: str) -&gt; bytes: pass\n\nclass RealImageLoader(ImageLoader):\n    &quot;&quot;&quot;EN: Real loader — expensive operation | UZB: Haqiqiy yuklash — qimmat operatsiya&quot;&quot;&quot;\n    def load(self, path: str) -&gt; bytes:\n        print(f&quot;[LOAD] Loading image from disk: {path} | diskdan yuklanmoqda&quot;)\n        return f&quot;&lt;image data: {path}&gt;&quot;.encode()\n\nclass CachingImageProxy(ImageLoader):\n    &quot;&quot;&quot;EN: Proxy — caches to avoid repeated loading | UZB: Proxy — takroriy yuklashni oldini olish uchun keshlaydi&quot;&quot;&quot;\n    def __init__(self, real_loader: RealImageLoader):\n        self._real = real_loader\n        self._cache: dict[str, bytes] = {}\n        self._access_count: dict[str, int] = {}\n\n    def load(self, path: str) -&gt; bytes:\n        self._access_count[path] = self._access_count.get(path, 0) + 1\n\n        if path in self._cache:\n            print(f&quot;[CACHE HIT] {path} (access #{self._access_count[path]})&quot;)\n            return self._cache[path]\n\n        data = self._real.load(path)\n        self._cache[path] = data\n        print(f&quot;[CACHE STORED] {path}&quot;)\n        return data\n\nloader = CachingImageProxy(RealImageLoader())\nloader.load(&quot;avatar.png&quot;)      # EN: disk load | UZB: diskdan yuklash\nloader.load(&quot;avatar.png&quot;)      # EN: cache hit! | UZB: keshdan!\nloader.load(&quot;banner.jpg&quot;)      # EN: disk load | UZB: diskdan\nloader.load(&quot;avatar.png&quot;)      # EN: cache hit! | UZB: keshdan!\n</code></pre>\n<hr />\n<h3 id=\"88-what-is-the-strategy-pattern-strategy-pattern-nima\">88. What is the strategy pattern? | Strategy pattern nima?</h3>\n<p><strong>EN:</strong> Defines a <strong>family of algorithms</strong> and makes them <strong>interchangeable</strong> at runtime.</p>\n<p><strong>UZB:</strong> <strong>Algoritmlar oilasini</strong> belgilaydi va ularni runtime'da <strong>almashtirib ishlatish</strong> imkonini beradi.</p>\n<pre><code class=\"language-python\">from abc import ABC, abstractmethod\n\nclass SortStrategy(ABC):\n    @abstractmethod\n    def sort(self, data: list) -&gt; list: pass\n\n    @abstractmethod\n    def name(self) -&gt; str: pass\n\nclass BubbleSort(SortStrategy):\n    def sort(self, data: list) -&gt; list:\n        d = data.copy()\n        n = len(d)\n        for i in range(n):\n            for j in range(n - i - 1):\n                if d[j] &gt; d[j + 1]:\n                    d[j], d[j + 1] = d[j + 1], d[j]\n        return d\n\n    def name(self): return &quot;Bubble Sort&quot;\n\nclass MergeSort(SortStrategy):\n    def sort(self, data: list) -&gt; list:\n        if len(data) &lt;= 1: return data\n        mid = len(data) // 2\n        left = self.sort(data[:mid])\n        right = self.sort(data[mid:])\n        return self._merge(left, right)\n\n    def _merge(self, l, r):\n        result = []\n        i = j = 0\n        while i &lt; len(l) and j &lt; len(r):\n            if l[i] &lt;= r[j]: result.append(l[i]); i += 1\n            else: result.append(r[j]); j += 1\n        return result + l[i:] + r[j:]\n\n    def name(self): return &quot;Merge Sort&quot;\n\nclass DataProcessor:\n    def __init__(self, strategy: SortStrategy):\n        self.strategy = strategy\n\n    def set_strategy(self, strategy: SortStrategy):\n        self.strategy = strategy              # EN: swap at runtime | UZB: runtime'da almashtirish\n\n    def process(self, data: list) -&gt; list:\n        print(f&quot;EN: Using {self.strategy.name()} | UZB: Ishlatilmoqda: {self.strategy.name()}&quot;)\n        return self.strategy.sort(data)\n\ndata = [5, 2, 8, 1, 9, 3]\nprocessor = DataProcessor(BubbleSort())\nprint(processor.process(data))\n\nprocessor.set_strategy(MergeSort())\nprint(processor.process(data))\n</code></pre>\n<hr />\n<h3 id=\"89-what-is-the-observer-pattern-observer-pattern-nima\">89. What is the observer pattern? | Observer pattern nima?</h3>\n<p><strong>EN:</strong> Subject <strong>maintains a list of observers</strong> and notifies them automatically of state changes.</p>\n<p><strong>UZB:</strong> Subject <strong>kuzatuvchilar ro'yxatini saqlaydi</strong> va holat o'zgarganda ularni avtomatik xabardor qiladi.</p>\n<pre><code class=\"language-python\">from abc import ABC, abstractmethod\nfrom typing import Any\n\nclass Observer(ABC):\n    @abstractmethod\n    def update(self, event: str, data: Any): pass\n\nclass Observable:\n    def __init__(self):\n        self._observers: dict[str, list[Observer]] = {}\n\n    def on(self, event: str, observer: Observer):\n        self._observers.setdefault(event, []).append(observer)\n\n    def off(self, event: str, observer: Observer):\n        if event in self._observers:\n            self._observers[event].remove(observer)\n\n    def emit(self, event: str, data: Any = None):\n        for obs in self._observers.get(event, []):\n            obs.update(event, data)\n\nclass AuditLogger(Observer):\n    def update(self, event, data):\n        print(f&quot;[AUDIT] {event}: {data}&quot;)\n\nclass EmailNotifier(Observer):\n    def __init__(self, email: str):\n        self.email = email\n    def update(self, event, data):\n        print(f&quot;[EMAIL → {self.email}] {event}: {data}&quot;)\n\nclass StockMonitor(Observer):\n    def __init__(self, threshold: float):\n        self.threshold = threshold\n    def update(self, event, data):\n        if event == &quot;price_change&quot; and data.get(&quot;price&quot;, 0) &gt; self.threshold:\n            print(f&quot;[ALERT] Price {data['price']} exceeded threshold {self.threshold} | chegara oshib ketdi!&quot;)\n\nclass Stock(Observable):\n    def __init__(self, symbol: str, price: float):\n        super().__init__()\n        self.symbol = symbol\n        self._price = price\n\n    @property\n    def price(self): return self._price\n\n    @price.setter\n    def price(self, value: float):\n        old = self._price\n        self._price = value\n        self.emit(&quot;price_change&quot;, {&quot;symbol&quot;: self.symbol, &quot;old&quot;: old, &quot;price&quot;: value})\n\ntesla = Stock(&quot;TSLA&quot;, 200.0)\ntesla.on(&quot;price_change&quot;, AuditLogger())\ntesla.on(&quot;price_change&quot;, EmailNotifier(&quot;investor@example.com&quot;))\ntesla.on(&quot;price_change&quot;, StockMonitor(threshold=250.0))\n\ntesla.price = 180.0\ntesla.price = 260.0\n</code></pre>\n<hr />\n<h3 id=\"90-what-is-a-constructor-delegation-konstruktor-delegatsiyasi-nima\">90. What is a constructor delegation? | Konstruktor delegatsiyasi nima?</h3>\n<p><strong>EN:</strong> When <strong>one constructor calls another</strong> constructor of the same class.</p>\n<p><strong>UZB:</strong> <strong>Bir konstruktor bir xil klassning boshqa konstruktorini chaqirishi</strong>.</p>\n<pre><code class=\"language-python\">class HttpResponse:\n    def __init__(self, status: int, body: str, headers: dict = None, content_type: str = &quot;application/json&quot;):\n        self.status = status\n        self.body = body\n        self.headers = headers or {&quot;Content-Type&quot;: content_type}\n        self.content_type = content_type\n\n    # EN: Constructor delegation via classmethods\n    # UZB: Classmethod orqali konstruktor delegatsiyasi\n    @classmethod\n    def ok(cls, body: str) -&gt; 'HttpResponse':\n        return cls(200, body)               # EN: delegates to main constructor\n                                             # UZB: asosiy konstruktorga topshiradi\n\n    @classmethod\n    def not_found(cls, resource: str) -&gt; 'HttpResponse':\n        return cls(404, f&quot;'{resource}' not found | topilmadi&quot;)\n\n    @classmethod\n    def error(cls, message: str) -&gt; 'HttpResponse':\n        return cls(500, f&quot;Error | Xatolik: {message}&quot;)\n\n    def __repr__(self):\n        return f&quot;HttpResponse({self.status}, body='{self.body[:30]}...')&quot;\n\n# EN: Using delegated constructors\n# UZB: Delegatsiya qilingan konstruktorlardan foydalanish\nprint(HttpResponse.ok('{&quot;user&quot;: &quot;Alyorjon&quot;}'))\nprint(HttpResponse.not_found(&quot;User&quot;))\nprint(HttpResponse.error(&quot;Database connection failed | DB ulanishi xato&quot;))\n</code></pre>\n<hr />\n<h3 id=\"91-what-is-covariance-kovariyantlik-nima\">91. What is covariance? | Kovariyantlik nima?</h3>\n<p><strong>EN:</strong> The ability to use a <strong>more derived type</strong> where a base type is expected.</p>\n<p><strong>UZB:</strong> Asosiy tur kutilgan joyda <strong>ko'proq hosila tur</strong> ishlatish qobiliyati.</p>\n<pre><code class=\"language-python\">from typing import List\n\nclass Animal:\n    def __init__(self, name: str):\n        self.name = name\n\nclass Dog(Animal):\n    def fetch(self): return f&quot;{self.name} fetches!&quot;\n\nclass Cat(Animal):\n    def purr(self): return f&quot;{self.name} purrs!&quot;\n\n# EN: Covariance — Dog is-a Animal, so Dog list can be used as Animal list\n# UZB: Kovariyantlik — Dog Animal ekan, Dog ro'yxatini Animal ro'yxati sifatida ishlatish\n\ndef count_animals(animals: List[Animal]) -&gt; int:\n    return len(animals)\n\ndogs: List[Dog] = [Dog(&quot;Rex&quot;), Dog(&quot;Buddy&quot;)]\ncats: List[Cat] = [Cat(&quot;Whiskers&quot;)]\n\n# EN: Covariant use — subtype list works where base type list expected\n# UZB: Kovariyas foydalanish — kichik tur ro'yxati katta tur ro'yxati kerak bo'lganda ishlaydi\nprint(count_animals(dogs))   # 2\nprint(count_animals(cats))   # 1\n</code></pre>\n<hr />\n<h3 id=\"92-what-is-contravariance-kontravarianslik-nima\">92. What is contravariance? | Kontravarianslik nima?</h3>\n<p><strong>EN:</strong> The ability to use a <strong>less derived (base) type</strong> where a derived type is expected.</p>\n<p><strong>UZB:</strong> Hosila tur kutilgan joyda <strong>kamroq hosila (asosiy) tur</strong> ishlatish qobiliyati.</p>\n<pre><code class=\"language-python\">from typing import Callable\n\n# EN: Contravariance — handler for broad type works for specific type too\n# UZB: Kontravarianslik — keng turdagi ishlovchi tor tur uchun ham ishlaydi\n\nclass Animal:\n    def breathe(self): return &quot;breathing&quot;\n\nclass Dog(Animal):\n    def bark(self): return &quot;Woof!&quot;\n\n# EN: Function accepting Animal works for Dog (contravariance in parameters)\n# UZB: Animal qabul qiladigan funksiya Dog uchun ham ishlaydi\n\ndef handle_animal(animal: Animal):\n    print(f&quot;Handling: {type(animal).__name__} | Boshqarilmoqda: {type(animal).__name__}&quot;)\n    print(animal.breathe())\n\ndef process_dog_with(handler: Callable[[Animal], None], dog: Dog):\n    handler(dog)                # EN: Dog is-a Animal — safe | UZB: Dog Animal hisoblanadi\n\nprocess_dog_with(handle_animal, Dog())\n</code></pre>\n<hr />\n<h3 id=\"93-what-is-function-composition-funksiya-kompozitsiyasi-nima\">93. What is function composition? | Funksiya kompozitsiyasi nima?</h3>\n<p><strong>EN:</strong> Combining functions where the <strong>output of one becomes the input</strong> of the next.</p>\n<p><strong>UZB:</strong> Funksiyalarni birlashtirish — <strong>birining chiqishi keyingisining kirishiga</strong> aylanadi.</p>\n<pre><code class=\"language-python\">from typing import Callable, TypeVar\n\nT = TypeVar('T')\n\ndef compose(*funcs: Callable) -&gt; Callable:\n    &quot;&quot;&quot;EN: Right-to-left composition: compose(f, g, h)(x) = f(g(h(x)))\n    UZB: O'ngdan chapga kompozitsiya&quot;&quot;&quot;\n    from functools import reduce\n    return reduce(lambda f, g: lambda x: f(g(x)), funcs)\n\ndef pipe(*funcs: Callable) -&gt; Callable:\n    &quot;&quot;&quot;EN: Left-to-right: pipe(f, g, h)(x) = h(g(f(x)))\n    UZB: Chapdan o'ngga&quot;&quot;&quot;\n    return compose(*reversed(funcs))\n\n# EN: Text processing pipeline\n# UZB: Matn qayta ishlash quvuri\nstrip = str.strip\nlower = str.lower\ndef remove_extra_spaces(s: str) -&gt; str: return &quot; &quot;.join(s.split())\ndef capitalize_words(s: str) -&gt; str: return s.title()\n\n# EN: Compose into single transform function\n# UZB: Bir transformatsiya funksiyasiga birlashtirish\nclean_text = pipe(strip, lower, remove_extra_spaces, capitalize_words)\n\ntexts = [\n    &quot;  HELLO   WORLD  &quot;,\n    &quot;   python  OOP   CONCEPTS   &quot;,\n    &quot; TOSHKENT   UZBEKISTAN  &quot;\n]\n\nfor text in texts:\n    print(clean_text(text))\n# Hello World\n# Python Oop Concepts\n# Toshkent Uzbekistan\n</code></pre>\n<hr />\n<h3 id=\"94-what-is-the-bridge-pattern-bridge-pattern-nima\">94. What is the bridge pattern? | Bridge pattern nima?</h3>\n<p><strong>EN:</strong> Separates an object's <strong>abstraction from its implementation</strong> so they vary independently.</p>\n<p><strong>UZB:</strong> Obyektning <strong>abstraktsiyasini amalga oshirishidan ajratadi</strong> — ular mustaqil o'zgaradi.</p>\n<pre><code class=\"language-python\">from abc import ABC, abstractmethod\n\n# EN: Implementation hierarchy\n# UZB: Amalga oshirish ierarxiyasi\nclass MessageFormatter(ABC):\n    @abstractmethod\n    def format(self, title: str, body: str) -&gt; str: pass\n\nclass HTMLFormatter(MessageFormatter):\n    def format(self, title, body):\n        return f&quot;&lt;h1&gt;{title}&lt;/h1&gt;&lt;p&gt;{body}&lt;/p&gt;&quot;\n\nclass PlainTextFormatter(MessageFormatter):\n    def format(self, title, body):\n        return f&quot;{'='*20}\\n{title}\\n{'='*20}\\n{body}&quot;\n\nclass MarkdownFormatter(MessageFormatter):\n    def format(self, title, body):\n        return f&quot;# {title}\\n\\n{body}&quot;\n\n# EN: Abstraction hierarchy\n# UZB: Abstraktsiya ierarxiyasi\nclass Notification(ABC):\n    def __init__(self, formatter: MessageFormatter):\n        self.formatter = formatter   # EN: bridge to implementation | UZB: amalga oshirishga ko'prik\n\n    @abstractmethod\n    def send(self, recipient: str, title: str, body: str): pass\n\nclass EmailNotification(Notification):\n    def send(self, recipient, title, body):\n        content = self.formatter.format(title, body)\n        print(f&quot;[EMAIL → {recipient}]\\n{content}\\n&quot;)\n\nclass PushNotification(Notification):\n    def send(self, recipient, title, body):\n        content = self.formatter.format(title, body)\n        print(f&quot;[PUSH → {recipient}]\\n{content}\\n&quot;)\n\n# EN: Mix and match — 2 abstractions × 3 implementations = 6 combinations!\n# UZB: Aralashtirish — 2 abstraktsiya × 3 amalga oshirish = 6 kombinatsiya!\nEmailNotification(HTMLFormatter()).send(&quot;a@ex.com&quot;, &quot;Welcome | Xush kelibsiz&quot;, &quot;Your account is ready | Hisobingiz tayyor&quot;)\nPushNotification(MarkdownFormatter()).send(&quot;@alyorjon&quot;, &quot;New Order | Yangi buyurtma&quot;, &quot;Your order #1001 is confirmed | tasdiqlandi&quot;)\n</code></pre>\n<hr />\n<h2 id=\"9-other-concepts-boshqa-tushunchalar\">9. Other Concepts | Boshqa Tushunchalar</h2>\n<hr />\n<h3 id=\"95-what-is-a-facade-pattern-facade-pattern-nima\">95. What is a facade pattern? | Facade pattern nima?</h3>\n<p><strong>EN:</strong> Provides a <strong>simplified interface</strong> to a complex subsystem.</p>\n<p><strong>UZB:</strong> Murakkab quyi tizimga <strong>soddalashtirilgan interfeys</strong> beradi.</p>\n<pre><code class=\"language-python\"># EN: Facade — hide complexity behind simple interface\n# UZB: Facade — murakkablikni oddiy interfeys ortida yashirish\n\nclass VideoDecoder:\n    def decode(self, file: str) -&gt; str:\n        print(f&quot;  [Decoder] Decoding {file} | Dekodlanmoqda&quot;)\n        return f&quot;decoded:{file}&quot;\n\nclass AudioExtractor:\n    def extract(self, video_data: str) -&gt; str:\n        print(f&quot;  [Audio] Extracting audio | Audio ajratilmoqda&quot;)\n        return f&quot;audio:{video_data}&quot;\n\nclass SubtitleProcessor:\n    def process(self, language: str) -&gt; str:\n        print(f&quot;  [Subtitle] Processing {language} subtitles | Subtitrlar&quot;)\n        return f&quot;subtitles:{language}&quot;\n\nclass VideoCompressor:\n    def compress(self, data: str, quality: str) -&gt; str:\n        print(f&quot;  [Compress] Compressing at {quality} | Siqilmoqda&quot;)\n        return f&quot;compressed:{data}&quot;\n\nclass VideoConverter:\n    &quot;&quot;&quot;EN: Facade — single simple interface for complex process\n    UZB: Facade — murakkab jarayon uchun bitta oddiy interfeys&quot;&quot;&quot;\n\n    def __init__(self):\n        self.decoder = VideoDecoder()\n        self.audio = AudioExtractor()\n        self.subtitle = SubtitleProcessor()\n        self.compressor = VideoCompressor()\n\n    def convert(self, input_file: str, output_format: str, lang: str = &quot;uz&quot;, quality: str = &quot;720p&quot;) -&gt; str:\n        print(f&quot;EN: Converting {input_file} to {output_format} | UZB: Konvertatsiya boshlandi&quot;)\n        video = self.decoder.decode(input_file)\n        audio = self.audio.extract(video)\n        subs = self.subtitle.process(lang)\n        result = self.compressor.compress(f&quot;{video}+{audio}+{subs}&quot;, quality)\n        print(f&quot;EN: Done! | UZB: Tayyor! → output.{output_format}&quot;)\n        return result\n\n# EN: User only sees ONE method — complexity is hidden\n# UZB: Foydalanuvchi faqat BIR metodini ko'radi — murakkablik yashirilgan\nconverter = VideoConverter()\nconverter.convert(&quot;lecture.avi&quot;, &quot;mp4&quot;, lang=&quot;uz&quot;, quality=&quot;1080p&quot;)\n</code></pre>\n<hr />\n<h3 id=\"96-what-is-lazy-initialization-dangasa-ishga-tushirish-nima\">96. What is lazy initialization? | Dangasa ishga tushirish nima?</h3>\n<p><strong>EN:</strong> An object is <strong>not created until it is actually needed</strong> — saves resources.</p>\n<p><strong>UZB:</strong> Obyekt <strong>haqiqatan kerak bo'lgunga qadar yaratilmaydi</strong> — resurslarni tejaydi.</p>\n<pre><code class=\"language-python\"># EN: Lazy initialization — create only when needed\n# UZB: Dangasa ishga tushirish — faqat kerak bo'lganda yaratish\n\nclass HeavyMLModel:\n    &quot;&quot;&quot;EN: Expensive to load — large model file | UZB: Yuklash qimmat — katta model fayli&quot;&quot;&quot;\n    def __init__(self):\n        print(&quot;[ML] Loading model (500MB)... | Model yuklanmoqda... (500MB)&quot;)\n        self.weights = list(range(10_000))   # EN: simulate large model | UZB: katta modelni simulyatsiya\n\n    def predict(self, input_data: str) -&gt; str:\n        return f&quot;Prediction for: {input_data} | Bashorat: {input_data}&quot;\n\nclass MLService:\n    def __init__(self):\n        self._model = None                   # EN: not loaded yet! | UZB: hali yuklanmagan!\n        print(&quot;MLService created | MLService yaratildi&quot;)\n\n    @property\n    def model(self) -&gt; HeavyMLModel:\n        if self._model is None:              # EN: lazy — create only on first use\n            print(&quot;[LAZY] First access — loading model | Birinchi kirish — model yuklanmoqda&quot;)\n            self._model = HeavyMLModel()    # UZB: dangasa — birinchi ishlatishda yaratish\n        return self._model\n\n    def predict(self, data: str) -&gt; str:\n        return self.model.predict(data)      # EN: model loaded here if needed\n                                             # UZB: kerak bo'lsa model shu yerda yuklanadi\n\nservice = MLService()                        # EN: fast! model not loaded | UZB: tez! model yuklanmadi\nprint(&quot;EN: Doing other work | UZB: Boshqa ishlar...&quot;)\nprint(service.predict(&quot;image.jpg&quot;))          # EN: NOW model loads | UZB: ENDI model yuklanadi\nprint(service.predict(&quot;photo.png&quot;))          # EN: already loaded | UZB: allaqachon yuklangan\n</code></pre>\n<hr />\n<h3 id=\"97-what-is-method-chaining-metod-zanjiri-nima\">97. What is method chaining? | Metod zanjiri nima?</h3>\n<p><strong>EN:</strong> A technique where <strong>multiple methods are called in a single statement</strong> — each method returns <code>self</code>.</p>\n<p><strong>UZB:</strong> <strong>Bir operatorda bir nechta metod chaqiriladigan</strong> texnika — har bir metod <code>self</code> qaytaradi.</p>\n<pre><code class=\"language-python\"># EN: Method chaining — builder pattern / fluent interface\n# UZB: Metod zanjiri — builder pattern / ravon interfeys\n\nclass QueryBuilder:\n    def __init__(self, table: str):\n        self._table = table\n        self._select = [&quot;*&quot;]\n        self._conditions = []\n        self._order = None\n        self._limit_val = None\n        self._offset_val = 0\n\n    def select(self, *fields: str) -&gt; 'QueryBuilder':\n        self._select = list(fields)\n        return self                     # EN: return self for chaining | UZB: zanjir uchun self qaytarish\n\n    def where(self, condition: str) -&gt; 'QueryBuilder':\n        self._conditions.append(condition)\n        return self\n\n    def order_by(self, field: str, direction: str = &quot;ASC&quot;) -&gt; 'QueryBuilder':\n        self._order = f&quot;{field} {direction}&quot;\n        return self\n\n    def limit(self, n: int) -&gt; 'QueryBuilder':\n        self._limit_val = n\n        return self\n\n    def offset(self, n: int) -&gt; 'QueryBuilder':\n        self._offset_val = n\n        return self\n\n    def build(self) -&gt; str:\n        sql = f&quot;SELECT {', '.join(self._select)} FROM {self._table}&quot;\n        if self._conditions:\n            sql += f&quot; WHERE {' AND '.join(self._conditions)}&quot;\n        if self._order:\n            sql += f&quot; ORDER BY {self._order}&quot;\n        if self._limit_val:\n            sql += f&quot; LIMIT {self._limit_val}&quot;\n        if self._offset_val:\n            sql += f&quot; OFFSET {self._offset_val}&quot;\n        return sql\n\n# EN: Fluent, readable query building | UZB: Ravon, o'qilishi oson so'rov qurish\nquery = (QueryBuilder(&quot;employees&quot;)\n    .select(&quot;id&quot;, &quot;name&quot;, &quot;salary&quot;, &quot;department&quot;)\n    .where(&quot;department = 'IT'&quot;)\n    .where(&quot;salary &gt; 5000000&quot;)\n    .order_by(&quot;salary&quot;, &quot;DESC&quot;)\n    .limit(10)\n    .offset(20)\n    .build())\n\nprint(query)\n# SELECT id, name, salary, department FROM employees\n# WHERE department = 'IT' AND salary &gt; 5000000\n# ORDER BY salary DESC LIMIT 10 OFFSET 20\n</code></pre>\n<hr />\n<h3 id=\"98-what-is-reflection-in-oop-oopda-refleksiya-nima\">98. What is reflection in OOP? | OOP'da refleksiya nima?</h3>\n<p><strong>EN:</strong> The ability of a program to <strong>inspect and modify its own structure</strong> at runtime.</p>\n<p><strong>UZB:</strong> Dasturning runtime'da <strong>o'z tuzilishini tekshirish va o'zgartirish</strong> qobiliyati.</p>\n<pre><code class=\"language-python\">import inspect\n\nclass APIEndpoint:\n    &quot;&quot;&quot;EN: Example class for reflection | UZB: Refleksiya uchun namunа klass&quot;&quot;&quot;\n\n    base_url: str = &quot;/api/v1&quot;\n\n    def __init__(self, name: str, version: int = 1):\n        self.name = name\n        self.version = version\n\n    def get(self, id: int) -&gt; dict:\n        &quot;&quot;&quot;GET endpoint | GET so'rovi&quot;&quot;&quot;\n        return {&quot;id&quot;: id, &quot;name&quot;: self.name}\n\n    def post(self, data: dict) -&gt; dict:\n        &quot;&quot;&quot;POST endpoint | POST so'rovi&quot;&quot;&quot;\n        return {&quot;created&quot;: True, &quot;data&quot;: data}\n\n    @staticmethod\n    def validate(data: dict) -&gt; bool:\n        return bool(data)\n\nendpoint = APIEndpoint(&quot;users&quot;, 2)\n\n# EN: Reflection — inspect at runtime | UZB: Refleksiya — runtime'da tekshirish\nprint(&quot;EN: Class name | UZB: Klass nomi:&quot;, type(endpoint).__name__)\nprint(&quot;EN: Attributes | UZB: Atributlar:&quot;, vars(endpoint))\nprint(&quot;EN: Has 'get'? | UZB: 'get' bormi?:&quot;, hasattr(endpoint, 'get'))\n\n# EN: Dynamic method call | UZB: Dinamik metod chaqirish\nmethod_name = &quot;get&quot;\nif hasattr(endpoint, method_name):\n    method = getattr(endpoint, method_name)\n    print(method(42))           # EN: calls get(42) dynamically | UZB: dinamik get(42) chaqirish\n\n# EN: Inspect all methods | UZB: Barcha metodlarni ko'rish\nmethods = [(name, m) for name, m in inspect.getmembers(endpoint, predicate=inspect.ismethod)]\nprint(&quot;EN: Methods | UZB: Metodlar:&quot;, [name for name, _ in methods])\n\n# EN: Dynamically set attribute | UZB: Dinamik atribut o'rnatish\nsetattr(endpoint, 'rate_limit', 100)\nprint(&quot;Rate limit:&quot;, endpoint.rate_limit)\n</code></pre>\n<hr />\n<h3 id=\"99-what-is-an-event-driven-programming-model-hodisaga-asoslangan-dasturlash-modeli-nima\">99. What is an event-driven programming model? | Hodisaga asoslangan dasturlash modeli nima?</h3>\n<p><strong>EN:</strong> A model where the <strong>flow of the program is determined by events</strong> — user actions, messages, system events.</p>\n<p><strong>UZB:</strong> Dastur oqimi <strong>hodisalar bilan aniqlanadigan</strong> model — foydalanuvchi harakatlari, xabarlar, tizim hodisalari.</p>\n<pre><code class=\"language-python\"># EN: Event-driven model — pub/sub pattern\n# UZB: Hodisaga asoslangan model — pub/sub pattern\n\nfrom typing import Callable, Any\nfrom dataclasses import dataclass\nfrom datetime import datetime\n\n@dataclass\nclass Event:\n    name: str\n    data: Any\n    timestamp: str = &quot;&quot;\n\n    def __post_init__(self):\n        if not self.timestamp:\n            self.timestamp = datetime.now().isoformat()\n\nclass EventBus:\n    &quot;&quot;&quot;EN: Central event bus — mediator for all events | UZB: Markaziy hodisa avtobuси&quot;&quot;&quot;\n    def __init__(self):\n        self._handlers: dict[str, list[Callable]] = {}\n\n    def subscribe(self, event_name: str, handler: Callable):\n        self._handlers.setdefault(event_name, []).append(handler)\n        print(f&quot;[BUS] Subscribed to '{event_name}' | '{event_name}' ga obuna bo'lindi&quot;)\n\n    def publish(self, event: Event):\n        print(f&quot;\\n[EVENT] {event.name} at {event.timestamp}&quot;)\n        handlers = self._handlers.get(event.name, [])\n        if not handlers:\n            print(f&quot;[BUS] No handlers for '{event.name}' | handler yo'q&quot;)\n            return\n        for handler in handlers:\n            handler(event)\n\nbus = EventBus()\n\n# EN: Subscribe different services to events | UZB: Turli xizmatlarni hodisalarga obuna qilish\nbus.subscribe(&quot;order.created&quot;, lambda e: print(f&quot;  [WAREHOUSE] Preparing: {e.data} | Tayyorlanmoqda&quot;))\nbus.subscribe(&quot;order.created&quot;, lambda e: print(f&quot;  [EMAIL] Confirming order: {e.data} | Tasdiqlash xati&quot;))\nbus.subscribe(&quot;order.created&quot;, lambda e: print(f&quot;  [ANALYTICS] Tracking order | Kuzatilmoqda&quot;))\nbus.subscribe(&quot;payment.failed&quot;, lambda e: print(f&quot;  [ALERT] Payment failed! Notify: {e.data} | To'lov xato!&quot;))\n\n# EN: Publish events | UZB: Hodisalarni e'lon qilish\nbus.publish(Event(&quot;order.created&quot;, {&quot;id&quot;: 1001, &quot;item&quot;: &quot;MacBook&quot;, &quot;amount&quot;: 12_000_000}))\nbus.publish(Event(&quot;payment.failed&quot;, {&quot;order_id&quot;: 1002, &quot;user&quot;: &quot;Alyorjon&quot;}))\n</code></pre>\n<hr />\n<h3 id=\"100-what-is-the-dry-principle-in-oop-oopda-dry-tamoyili-nima\">100. What is the DRY principle in OOP? | OOP'da DRY tamoyili nima?</h3>\n<p><strong>EN:</strong> <strong>Don't Repeat Yourself</strong> — every piece of knowledge should have a single, authoritative representation.</p>\n<p><strong>UZB:</strong> <strong>O'zingizni takrorlamang</strong> — har bir bilim bo'lagi yagona, vakolatli ifodalashga ega bo'lishi kerak.</p>\n<pre><code class=\"language-python\"># EN: WET code — Write Everything Twice (anti-pattern)\n# UZB: WET kod — Hamma narsani ikki marta yozing (anti-pattern)\n\nclass WETExample:\n    def calculate_income_tax(self, income: float) -&gt; float:\n        if income &lt;= 5_000_000:\n            return income * 0.12\n        elif income &lt;= 20_000_000:\n            return income * 0.20\n        else:\n            return income * 0.23\n\n    def calculate_bonus_tax(self, bonus: float) -&gt; float:\n        # EN: SAME logic duplicated! | UZB: BIR XIL mantiq takrorlandi!\n        if bonus &lt;= 5_000_000:\n            return bonus * 0.12\n        elif bonus &lt;= 20_000_000:\n            return bonus * 0.20\n        else:\n            return bonus * 0.23\n\n# EN: DRY refactored — single source of truth\n# UZB: DRY qayta tuzilgan — yagona haqiqat manbai\n\nclass TaxSystem:\n    _BRACKETS = [\n        (5_000_000,  0.12),    # EN: up to 5M — 12% | UZB: 5M gacha — 12%\n        (20_000_000, 0.20),    # EN: 5M–20M — 20% | UZB: 5M-20M — 20%\n        (float('inf'), 0.23),  # EN: 20M+ — 23% | UZB: 20M+ — 23%\n    ]\n\n    @classmethod\n    def calculate_tax(cls, amount: float, label: str = &quot;Amount&quot;) -&gt; dict:\n        &quot;&quot;&quot;EN: Single tax calculation logic — reused everywhere\n        UZB: Yagona soliq hisoblash mantig'i — hamma joyda qayta ishlatiladi&quot;&quot;&quot;\n        for limit, rate in cls._BRACKETS:\n            if amount &lt;= limit:\n                tax = amount * rate\n                return {&quot;label&quot;: label, &quot;amount&quot;: amount, &quot;rate&quot;: rate, &quot;tax&quot;: tax, &quot;net&quot;: amount - tax}\n        return {}\n\n    @classmethod\n    def income_tax(cls, income: float) -&gt; dict:\n        return cls.calculate_tax(income, &quot;EN: Income | UZB: Maosh&quot;)\n\n    @classmethod\n    def bonus_tax(cls, bonus: float) -&gt; dict:\n        return cls.calculate_tax(bonus, &quot;EN: Bonus | UZB: Bonus&quot;)\n\n    @classmethod\n    def print_breakdown(cls, result: dict):\n        print(f&quot;  {result['label']}: {result['amount']:&gt;12,.0f} UZS&quot;)\n        print(f&quot;  Rate | Stavka: {result['rate']*100:.0f}%&quot;)\n        print(f&quot;  Tax | Soliq: {result['tax']:&gt;13,.0f} UZS&quot;)\n        print(f&quot;  Net | Sof: {result['net']:&gt;15,.0f} UZS&quot;)\n\nprint(&quot;=== EN: Salary Tax | UZB: Maosh Solig'i ===&quot;)\nTaxSystem.print_breakdown(TaxSystem.income_tax(8_000_000))\n\nprint(&quot;\\n=== EN: Bonus Tax | UZB: Bonus Solig'i ===&quot;)\nTaxSystem.print_breakdown(TaxSystem.bonus_tax(2_000_000))\n</code></pre>\n<hr />\n<h2 id=\"summary-xulosa\">📊 Summary | Xulosa</h2>\n<table>\n<thead>\n<tr>\n<th>#</th>\n<th>Topic / Mavzu</th>\n<th>Key Word EN</th>\n<th>Kalit So'z UZB</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>1–4</td>\n<td>OOP Basics</td>\n<td>Class, Object, Paradigm</td>\n<td>Klass, Obyekt, Paradigma</td>\n</tr>\n<tr>\n<td>5–8</td>\n<td>4 Pillars</td>\n<td>Encapsulation, Inheritance, Polymorphism, Abstraction</td>\n<td>Inkapsulatsiya, Meros, Polimorfizm, Abstraktsiya</td>\n</tr>\n<tr>\n<td>9–12</td>\n<td>Methods</td>\n<td>Overloading, Overriding, Constructor, Destructor</td>\n<td>Yuklash, Qayta yozish, Konstruktor, Destruktor</td>\n</tr>\n<tr>\n<td>13–16</td>\n<td>Keywords</td>\n<td>self, super, static, final</td>\n<td>self, super, statik, final</td>\n</tr>\n<tr>\n<td>17–24</td>\n<td>Inheritance</td>\n<td>Multiple, Abstract, Interface, Composition</td>\n<td>Ko'p meros, Abstrakt, Interfeys, Kompozitsiya</td>\n</tr>\n<tr>\n<td>25–28</td>\n<td>Relations</td>\n<td>Association, Coupling, Cohesion</td>\n<td>Assotsiatsiya, Qovushish, Koheziya</td>\n</tr>\n<tr>\n<td>29–36</td>\n<td>Patterns</td>\n<td>Copy, Singleton, Enum, Inner Class</td>\n<td>Nusxa, Singleton, Enum, Ichki klass</td>\n</tr>\n<tr>\n<td>37–60</td>\n<td>Advanced</td>\n<td>Access, Virtual, Abstract, Mixin</td>\n<td>Kirish, Virtual, Abstrakt, Mixin</td>\n</tr>\n<tr>\n<td>61–68</td>\n<td>Binding</td>\n<td>Dynamic, Static, MRO, Casting</td>\n<td>Dinamik, Statik, MRO, Konvertatsiya</td>\n</tr>\n<tr>\n<td>69–78</td>\n<td>Types</td>\n<td>ADT, Exception, Interface vs Class</td>\n<td>AMT, Istisno, Interfeys va Klass</td>\n</tr>\n<tr>\n<td>79–82</td>\n<td>SOLID</td>\n<td>SRP, OCP, ISP, DIP</td>\n<td>YMT, O/Y, IAS, BTT</td>\n</tr>\n<tr>\n<td>83–94</td>\n<td>Design Patterns</td>\n<td>Singleton, Factory, Observer, Strategy</td>\n<td>Singleton, Fabrika, Kuzatuvchi, Strategiya</td>\n</tr>\n<tr>\n<td>95–100</td>\n<td>Misc</td>\n<td>Facade, Lazy, Chaining, DRY</td>\n<td>Fasad, Dangasa, Zanjir, O'zni Takrorlama</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<blockquote>\n<p>📝 <strong>Source</strong>: <a href=\"https://t.me/coderss_world\">@CODERSS_WORLD</a>\n💻 <strong>Python Examples added</strong> | <strong>Python misollari qo'shildi</strong>\n🇬🇧 <strong>English</strong> + 🇺🇿 <strong>O'zbek</strong> | Bilingual Edition</p>\n</blockquote>"}, "fastapi": {"label": "🚀 FastAPI & SQLAlchemy", "body": "<h1 id=\"fastapi-sqlalchemy-pydantic-alembic\">🚀 FastAPI · SQLAlchemy · Pydantic · Alembic</h1>\n<h1 id=\"interview-questions-answers-intervyu-savol-va-javoblari\">Interview Questions &amp; Answers | Intervyu Savol va Javoblari</h1>\n<h2 id=\"part-1-of-2-questions-150\">Part 1 of 2 — Questions 1–50</h2>\n<blockquote>\n<p><strong>EN:</strong> 100 bilingual interview questions with real code examples covering FastAPI, SQLAlchemy, Pydantic, Alembic, async/await, JWT auth, testing, and deployment.\n<strong>UZ:</strong> FastAPI, SQLAlchemy, Pydantic, Alembic, async/await, JWT auth, testing va deployment bo'yicha 100 ta bilingual savol, real kod misollari bilan.</p>\n</blockquote>\n<hr />\n<h2 id=\"mundarija-table-of-contents\">📑 Mundarija | Table of Contents</h2>\n<table>\n<thead>\n<tr>\n<th>#</th>\n<th>Bo'lim</th>\n<th>Section</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>1–15</td>\n<td>FastAPI Asoslari</td>\n<td>FastAPI Basics</td>\n</tr>\n<tr>\n<td>16–25</td>\n<td>FastAPI Ilg'or</td>\n<td>FastAPI Advanced</td>\n</tr>\n<tr>\n<td>26–40</td>\n<td>Pydantic</td>\n<td>Pydantic</td>\n</tr>\n<tr>\n<td>41–55</td>\n<td>SQLAlchemy</td>\n<td>SQLAlchemy</td>\n</tr>\n<tr>\n<td>56–65</td>\n<td>Alembic</td>\n<td>Alembic</td>\n</tr>\n<tr>\n<td>66–75</td>\n<td>Async &amp; Performance</td>\n<td>Async &amp; Performance</td>\n</tr>\n<tr>\n<td>76–85</td>\n<td>Auth &amp; Security</td>\n<td>Auth &amp; Security</td>\n</tr>\n<tr>\n<td>86–92</td>\n<td>Testing</td>\n<td>Testing</td>\n</tr>\n<tr>\n<td>93–100</td>\n<td>Deploy &amp; Best Practices</td>\n<td>Deploy &amp; Best Practices</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h1 id=\"fastapi-asoslari-fastapi-basics-q1q15\">🔷 FASTAPI ASOSLARI | FASTAPI BASICS (Q1–Q15)</h1>\n<hr />\n<h2 id=\"q1-what-is-fastapi-fastapi-nima\">Q1. What is FastAPI? | FastAPI nima?</h2>\n<p><strong>EN:</strong> FastAPI is a modern, high-performance Python web framework for building APIs. It is built on top of <strong>Starlette</strong> (ASGI web framework) and <strong>Pydantic</strong> (data validation). It supports async/await natively and auto-generates OpenAPI (Swagger) documentation.</p>\n<p><strong>UZ:</strong> FastAPI — API'lar qurish uchun zamonaviy, yuqori unumli Python web freymvorki. <strong>Starlette</strong> (ASGI) va <strong>Pydantic</strong> (ma'lumot tekshiruvi) asosida qurilgan. Async/await ni tabiiy qo'llab-quvvatlaydi va OpenAPI (Swagger) hujjatlarini avtomatik yaratadi.</p>\n<pre><code class=\"language-python\"># Minimal FastAPI app | Minimal FastAPI ilovasi\nfrom fastapi import FastAPI\n\napp = FastAPI(title=&quot;My API&quot;, version=&quot;1.0.0&quot;)\n\n@app.get(&quot;/&quot;)\nasync def root():\n    return {&quot;message&quot;: &quot;Hello, World!&quot;}\n\n# Ishga tushirish | Run:\n# uvicorn main:app --reload\n# Swagger: http://localhost:8000/docs\n# ReDoc:   http://localhost:8000/redoc\n</code></pre>\n<hr />\n<h2 id=\"q2-what-is-the-difference-between-fastapi-flask-and-django-fastapi-flask-va-django-farqi-nima\">Q2. What is the difference between FastAPI, Flask, and Django? | FastAPI, Flask va Django farqi nima?</h2>\n<p><strong>EN:</strong> FastAPI is async-first, auto-validates data, and auto-generates docs. Flask is minimalist and sync-only. Django is a full-stack framework with its own ORM, admin panel, and many built-in features.</p>\n<p><strong>UZ:</strong> FastAPI — async-birinchi, ma'lumotlarni avtomatik tekshiradi, hujjatlarni avtomatik yaratadi. Flask — minimalist va faqat sync. Django — o'z ORM'i, admin paneli va ko'p o'rnatilgan xususiyatlari bo'lgan to'liq freymvork.</p>\n<table>\n<thead>\n<tr>\n<th>Feature</th>\n<th>FastAPI</th>\n<th>Flask</th>\n<th>Django</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>EN: Speed</td>\n<td>⚡ Very fast</td>\n<td>🐢 Moderate</td>\n<td>🐢 Moderate</td>\n</tr>\n<tr>\n<td>UZ: Tezlik</td>\n<td>⚡ Juda tez</td>\n<td>🐢 O'rtacha</td>\n<td>🐢 O'rtacha</td>\n</tr>\n<tr>\n<td>EN: Async</td>\n<td>✅ Native</td>\n<td>❌ No</td>\n<td>⚠️ Partial</td>\n</tr>\n<tr>\n<td>UZ: Async</td>\n<td>✅ Tabiiy</td>\n<td>❌ Yo'q</td>\n<td>⚠️ Qisman</td>\n</tr>\n<tr>\n<td>EN: Auto docs</td>\n<td>✅ Swagger/ReDoc</td>\n<td>❌ No</td>\n<td>❌ No</td>\n</tr>\n<tr>\n<td>UZ: Auto hujjat</td>\n<td>✅ Swagger/ReDoc</td>\n<td>❌ Yo'q</td>\n<td>❌ Yo'q</td>\n</tr>\n<tr>\n<td>EN: Validation</td>\n<td>✅ Pydantic</td>\n<td>❌ Manual</td>\n<td>⚠️ Forms only</td>\n</tr>\n<tr>\n<td>UZ: Tekshiruv</td>\n<td>✅ Pydantic</td>\n<td>❌ Qo'lda</td>\n<td>⚠️ Faqat formlar</td>\n</tr>\n<tr>\n<td>EN: ORM</td>\n<td>❌ (use SQLAlchemy)</td>\n<td>❌ (use SQLAlchemy)</td>\n<td>✅ Built-in</td>\n</tr>\n<tr>\n<td>UZ: ORM</td>\n<td>❌ (SQLAlchemy)</td>\n<td>❌ (SQLAlchemy)</td>\n<td>✅ O'rnatilgan</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h2 id=\"q3-what-is-asgi-and-wsgi-asgi-va-wsgi-nima\">Q3. What is ASGI and WSGI? | ASGI va WSGI nima?</h2>\n<p><strong>EN:</strong> WSGI (Web Server Gateway Interface) is a synchronous Python standard. ASGI (Asynchronous Server Gateway Interface) is its async successor — it supports WebSockets, long-polling, and concurrent requests. FastAPI uses ASGI via <strong>Uvicorn</strong>.</p>\n<p><strong>UZ:</strong> WSGI — sinxron Python standarti. ASGI — uning asinxron o'rnagi — WebSocket, long-polling va bir vaqtda so'rovlarni qo'llab-quvvatlaydi. FastAPI <strong>Uvicorn</strong> orqali ASGI ishlatadi.</p>\n<pre><code class=\"language-bash\"># WSGI server (Flask, Django)\ngunicorn app:app\n\n# ASGI server (FastAPI)\nuvicorn main:app --host 0.0.0.0 --port 8000 --workers 4\n\n# Production uchun Gunicorn + Uvicorn workers | Gunicorn + Uvicorn workers for prod\ngunicorn main:app -k uvicorn.workers.UvicornWorker -w 4\n</code></pre>\n<hr />\n<h2 id=\"q4-how-do-you-define-routes-path-operations-in-fastapi-fastapida-marshrutlarni-qanday-aniqlash-mumkin\">Q4. How do you define routes (path operations) in FastAPI? | FastAPI'da marshrutlarni qanday aniqlash mumkin?</h2>\n<p><strong>EN:</strong> Use decorators like <code>@app.get()</code>, <code>@app.post()</code>, <code>@app.put()</code>, <code>@app.patch()</code>, <code>@app.delete()</code> to define path operations.</p>\n<p><strong>UZ:</strong> Marshrutlarni aniqlash uchun <code>@app.get()</code>, <code>@app.post()</code>, <code>@app.put()</code>, <code>@app.patch()</code>, <code>@app.delete()</code> dekoratorlari ishlatiladi.</p>\n<pre><code class=\"language-python\">from fastapi import FastAPI\nfrom pydantic import BaseModel\n\napp = FastAPI()\n\nclass Item(BaseModel):\n    name: str\n    price: float\n\n# GET — ma'lumot olish | retrieve data\n@app.get(&quot;/items/{item_id}&quot;)\nasync def get_item(item_id: int):\n    return {&quot;item_id&quot;: item_id}\n\n# POST — yaratish | create\n@app.post(&quot;/items/&quot;, status_code=201)\nasync def create_item(item: Item):\n    return item\n\n# PUT — to'liq yangilash | full update\n@app.put(&quot;/items/{item_id}&quot;)\nasync def update_item(item_id: int, item: Item):\n    return {&quot;item_id&quot;: item_id, **item.model_dump()}\n\n# PATCH — qisman yangilash | partial update\n@app.patch(&quot;/items/{item_id}&quot;)\nasync def partial_update(item_id: int, item: Item):\n    return {&quot;item_id&quot;: item_id, &quot;updated&quot;: item.model_dump(exclude_unset=True)}\n\n# DELETE — o'chirish | delete\n@app.delete(&quot;/items/{item_id}&quot;, status_code=204)\nasync def delete_item(item_id: int):\n    return None\n</code></pre>\n<hr />\n<h2 id=\"q5-what-are-path-parameters-query-parameters-and-request-body-path-query-va-body-parametrlari-nima\">Q5. What are Path Parameters, Query Parameters, and Request Body? | Path, Query va Body parametrlari nima?</h2>\n<p><strong>EN:</strong> Path parameters are part of the URL path. Query parameters come after <code>?</code>. Request body is sent in the HTTP body (usually JSON).</p>\n<p><strong>UZ:</strong> Path parametrlar URL yo'lining bir qismi. Query parametrlar <code>?</code> dan keyin keladi. Request body HTTP tanasida (odatda JSON) yuboriladi.</p>\n<pre><code class=\"language-python\">from fastapi import FastAPI\nfrom pydantic import BaseModel\nfrom typing import Optional\n\napp = FastAPI()\n\nclass UserCreate(BaseModel):\n    name: str\n    email: str\n\n# Path param: /users/42\n# Query param: /users/42?active=true&amp;role=admin\n# Body: {&quot;name&quot;: &quot;Ali&quot;, &quot;email&quot;: &quot;ali@email.com&quot;}\n@app.post(&quot;/users/{user_id}&quot;)\nasync def create_user(\n    user_id: int,                   # Path param | Path parametr\n    active: bool = True,            # Query param | Query parametr\n    role: Optional[str] = None,     # Optional query param | Ixtiyoriy query\n    user: UserCreate = None         # Request body | So'rov tanasi\n):\n    return {\n        &quot;user_id&quot;: user_id,\n        &quot;active&quot;: active,\n        &quot;role&quot;: role,\n        &quot;user&quot;: user\n    }\n</code></pre>\n<hr />\n<h2 id=\"q6-what-is-dependency-injection-in-fastapi-fastapida-dependency-injection-nima\">Q6. What is Dependency Injection in FastAPI? | FastAPI'da Dependency Injection nima?</h2>\n<p><strong>EN:</strong> Dependency Injection (DI) is a pattern where FastAPI automatically creates and provides dependencies (like DB sessions, auth, config) to path operation functions via <code>Depends()</code>.</p>\n<p><strong>UZ:</strong> Dependency Injection — FastAPI <code>Depends()</code> orqali path operation funksiyalariga bog'liqliklarni (DB session, auth, config) avtomatik yaratib taqdim etadigan pattern.</p>\n<pre><code class=\"language-python\">from fastapi import FastAPI, Depends, HTTPException\nfrom sqlalchemy.ext.asyncio import AsyncSession\nfrom typing import Annotated\n\napp = FastAPI()\n\n# 1. Oddiy dependency | Simple dependency\ndef get_query_params(skip: int = 0, limit: int = 10):\n    return {&quot;skip&quot;: skip, &quot;limit&quot;: limit}\n\n@app.get(&quot;/items/&quot;)\nasync def list_items(params: dict = Depends(get_query_params)):\n    return params\n\n# 2. DB session dependency | DB session dependency\nasync def get_db() -&gt; AsyncSession:\n    async with AsyncSessionLocal() as session:\n        yield session          # yield = context manager | yield = context menejeri\n        # EN: session auto-closed after request | UZ: sessiya so'rovdan keyin avtomatik yopiladi\n\n# 3. Auth dependency | Auth dependency\nasync def get_current_user(\n    token: str = Depends(oauth2_scheme),\n    db: AsyncSession = Depends(get_db)\n):\n    user = await verify_token(token, db)\n    if not user:\n        raise HTTPException(status_code=401, detail=&quot;Invalid token&quot;)\n    return user\n\n# 4. Annotated sintaksisi (zamonaviy | modern)\nDBDep = Annotated[AsyncSession, Depends(get_db)]\nCurrentUser = Annotated[User, Depends(get_current_user)]\n\n@app.get(&quot;/me&quot;)\nasync def get_me(\n    db: DBDep,\n    current_user: CurrentUser\n):\n    return current_user\n</code></pre>\n<hr />\n<h2 id=\"q7-what-is-fastapi-router-fastapi-router-nima\">Q7. What is FastAPI Router? | FastAPI Router nima?</h2>\n<p><strong>EN:</strong> <code>APIRouter</code> is used to split a large application into multiple modules/files, each with its own routes. Similar to Flask Blueprints.</p>\n<p><strong>UZ:</strong> <code>APIRouter</code> — katta ilovani bir nechta modul/fayllarga bo'lish uchun ishlatiladi, har birining o'z marshrutlari bo'ladi. Flask Blueprint'iga o'xshash.</p>\n<pre><code class=\"language-python\"># routers/users.py\nfrom fastapi import APIRouter, Depends\n\nrouter = APIRouter(\n    prefix=&quot;/users&quot;,\n    tags=[&quot;Users&quot;],           # Swagger gruppa | Swagger group\n    dependencies=[Depends(get_current_user)]  # Barcha routerlarga | For all routes\n)\n\n@router.get(&quot;/&quot;)\nasync def list_users():\n    return [{&quot;id&quot;: 1, &quot;name&quot;: &quot;Ali&quot;}]\n\n@router.get(&quot;/{user_id}&quot;)\nasync def get_user(user_id: int):\n    return {&quot;id&quot;: user_id}\n\n@router.post(&quot;/&quot;, status_code=201)\nasync def create_user(user: UserCreate):\n    return user\n\n# main.py\nfrom fastapi import FastAPI\nfrom routers import users, items, auth\n\napp = FastAPI()\napp.include_router(users.router, prefix=&quot;/api/v1&quot;)\napp.include_router(items.router, prefix=&quot;/api/v1&quot;)\napp.include_router(auth.router, prefix=&quot;/api/v1&quot;)\n</code></pre>\n<hr />\n<h2 id=\"q8-what-is-middleware-in-fastapi-fastapida-middleware-nima\">Q8. What is Middleware in FastAPI? | FastAPI'da Middleware nima?</h2>\n<p><strong>EN:</strong> Middleware is a function that runs before and after every request. Used for logging, CORS, authentication, request timing, etc.</p>\n<p><strong>UZ:</strong> Middleware — har bir so'rovdan oldin va keyin ishlaydigan funksiya. Logging, CORS, autentifikatsiya, so'rov vaqtini o'lchash uchun ishlatiladi.</p>\n<pre><code class=\"language-python\">from fastapi import FastAPI, Request\nfrom fastapi.middleware.cors import CORSMiddleware\nimport time\nimport logging\n\napp = FastAPI()\n\n# 1. CORS Middleware\napp.add_middleware(\n    CORSMiddleware,\n    allow_origins=[&quot;http://localhost:3000&quot;, &quot;https://myapp.com&quot;],\n    allow_credentials=True,\n    allow_methods=[&quot;*&quot;],\n    allow_headers=[&quot;*&quot;],\n)\n\n# 2. Custom logging middleware | Maxsus logging middleware\n@app.middleware(&quot;http&quot;)\nasync def log_requests(request: Request, call_next):\n    start = time.time()\n    # EN: Before request | UZ: So'rovdan oldin\n    response = await call_next(request)\n    # EN: After request | UZ: So'rovdan keyin\n    duration = time.time() - start\n    logging.info(\n        f&quot;{request.method} {request.url.path} &quot;\n        f&quot;→ {response.status_code} ({duration:.3f}s)&quot;\n    )\n    response.headers[&quot;X-Process-Time&quot;] = str(duration)\n    return response\n</code></pre>\n<hr />\n<h2 id=\"q9-how-do-you-handle-errors-and-exceptions-in-fastapi-fastapida-xatolarni-qanday-boshqarish-mumkin\">Q9. How do you handle errors and exceptions in FastAPI? | FastAPI'da xatolarni qanday boshqarish mumkin?</h2>\n<p><strong>EN:</strong> Use <code>HTTPException</code> for standard HTTP errors, or create custom exception handlers with <code>@app.exception_handler()</code>.</p>\n<p><strong>UZ:</strong> Standart HTTP xatolari uchun <code>HTTPException</code>, maxsus xato ishlovchilar uchun <code>@app.exception_handler()</code> ishlatiladi.</p>\n<pre><code class=\"language-python\">from fastapi import FastAPI, HTTPException, Request\nfrom fastapi.responses import JSONResponse\n\napp = FastAPI()\n\n# 1. HTTPException — standart usul | standard way\n@app.get(&quot;/items/{item_id}&quot;)\nasync def get_item(item_id: int):\n    if item_id not in db:\n        raise HTTPException(\n            status_code=404,\n            detail=f&quot;Item {item_id} not found&quot;,\n            headers={&quot;X-Error&quot;: &quot;not-found&quot;}\n        )\n    return db[item_id]\n\n# 2. Custom exception | Maxsus istisno\nclass ItemNotFoundError(Exception):\n    def __init__(self, item_id: int):\n        self.item_id = item_id\n\n@app.exception_handler(ItemNotFoundError)\nasync def item_not_found_handler(request: Request, exc: ItemNotFoundError):\n    return JSONResponse(\n        status_code=404,\n        content={\n            &quot;error&quot;: &quot;item_not_found&quot;,\n            &quot;detail&quot;: f&quot;Item {exc.item_id} topilmadi&quot;,\n            &quot;path&quot;: str(request.url)\n        }\n    )\n\n# 3. Global 422 Validation Error handler\nfrom fastapi.exceptions import RequestValidationError\n\n@app.exception_handler(RequestValidationError)\nasync def validation_exception_handler(request: Request, exc: RequestValidationError):\n    return JSONResponse(\n        status_code=422,\n        content={&quot;detail&quot;: exc.errors(), &quot;body&quot;: exc.body}\n    )\n</code></pre>\n<hr />\n<h2 id=\"q10-what-are-background-tasks-in-fastapi-fastapida-background-tasks-nima\">Q10. What are Background Tasks in FastAPI? | FastAPI'da Background Tasks nima?</h2>\n<p><strong>EN:</strong> Background tasks run after the response is sent. Used for sending emails, logging, notifications, or heavy processing without blocking the response.</p>\n<p><strong>UZ:</strong> Background tasklari javob yuborilgandan keyin ishlaydi. Emaillar yuborish, logging, bildirishnomalar yoki og'ir hisob-kitoblar uchun javobni bloklamasdan ishlatiladi.</p>\n<pre><code class=\"language-python\">from fastapi import FastAPI, BackgroundTasks\nimport asyncio\n\napp = FastAPI()\n\n# 1. Sinxron background task | Sync background task\ndef send_email(email: str, message: str):\n    # Actual email sending logic\n    print(f&quot;Sending email to {email}: {message}&quot;)\n\n# 2. Asinxron background task | Async background task\nasync def update_analytics(user_id: int):\n    await asyncio.sleep(1)  # Simulate async work\n    print(f&quot;Analytics updated for user {user_id}&quot;)\n\n@app.post(&quot;/register/&quot;)\nasync def register_user(\n    email: str,\n    background_tasks: BackgroundTasks\n):\n    # EN: Save user first, then run tasks in background\n    # UZ: Avval foydalanuvchini saqlang, keyin background'da tasklarni bajaring\n    background_tasks.add_task(send_email, email, &quot;Welcome!&quot;)\n    background_tasks.add_task(update_analytics, user_id=1)\n    return {&quot;message&quot;: &quot;Registered! Email will be sent shortly.&quot;}\n\n# ⚠️ EN: For heavy tasks use Celery + Redis\n# ⚠️ UZ: Og'ir tasklar uchun Celery + Redis ishlatish yaxshiroq\n</code></pre>\n<hr />\n<h2 id=\"q11-what-are-websockets-in-fastapi-fastapida-websocket-nima\">Q11. What are WebSockets in FastAPI? | FastAPI'da WebSocket nima?</h2>\n<p><strong>EN:</strong> WebSockets provide full-duplex, real-time communication between client and server. FastAPI has built-in WebSocket support.</p>\n<p><strong>UZ:</strong> WebSocket — client va server orasida ikki tomonlama, real-vaqt muloqotni ta'minlaydi. FastAPI WebSocket uchun o'rnatilgan qo'llab-quvvatlashga ega.</p>\n<pre><code class=\"language-python\">from fastapi import FastAPI, WebSocket, WebSocketDisconnect\nfrom typing import List\n\napp = FastAPI()\n\n# Connection manager | Ulanish menejeri\nclass ConnectionManager:\n    def __init__(self):\n        self.active: List[WebSocket] = []\n\n    async def connect(self, ws: WebSocket):\n        await ws.accept()\n        self.active.append(ws)\n\n    def disconnect(self, ws: WebSocket):\n        self.active.remove(ws)\n\n    async def broadcast(self, message: str):\n        for ws in self.active:\n            await ws.send_text(message)\n\nmanager = ConnectionManager()\n\n@app.websocket(&quot;/ws/{client_id}&quot;)\nasync def websocket_endpoint(websocket: WebSocket, client_id: str):\n    await manager.connect(websocket)\n    try:\n        while True:\n            data = await websocket.receive_text()\n            await manager.broadcast(f&quot;{client_id}: {data}&quot;)\n    except WebSocketDisconnect:\n        manager.disconnect(websocket)\n        await manager.broadcast(f&quot;{client_id} left the chat&quot;)\n</code></pre>\n<hr />\n<h2 id=\"q12-what-is-the-lifespan-event-in-fastapi-fastapida-lifespan-event-nima\">Q12. What is the Lifespan event in FastAPI? | FastAPI'da Lifespan event nima?</h2>\n<p><strong>EN:</strong> Lifespan events allow you to run code on application <strong>startup</strong> and <strong>shutdown</strong> — for initializing DB connections, loading ML models, etc.</p>\n<p><strong>UZ:</strong> Lifespan eventlar ilova <strong>ishga tushganda</strong> va <strong>to'xtaganda</strong> kod bajarishga imkon beradi — DB ulanishlarni boshlash, ML modellarini yuklash uchun.</p>\n<pre><code class=\"language-python\">from fastapi import FastAPI\nfrom contextlib import asynccontextmanager\nimport asyncpg\n\n# Zamonaviy usul | Modern way (FastAPI 0.93+)\n@asynccontextmanager\nasync def lifespan(app: FastAPI):\n    # EN: Startup — runs before first request\n    # UZ: Startup — birinchi so'rovdan oldin ishlaydi\n    print(&quot;Starting up...&quot;)\n    app.state.db_pool = await asyncpg.create_pool(&quot;postgresql://...&quot;)\n    yield\n    # EN: Shutdown — runs after last request\n    # UZ: Shutdown — oxirgi so'rovdan keyin ishlaydi\n    print(&quot;Shutting down...&quot;)\n    await app.state.db_pool.close()\n\napp = FastAPI(lifespan=lifespan)\n\n# Eski usul | Old way (deprecated)\n# @app.on_event(&quot;startup&quot;)\n# @app.on_event(&quot;shutdown&quot;)\n</code></pre>\n<hr />\n<h2 id=\"q13-how-does-fastapi-auto-generate-documentation-fastapi-hujjatlarni-avtomatik-qanday-yaratadi\">Q13. How does FastAPI auto-generate documentation? | FastAPI hujjatlarni avtomatik qanday yaratadi?</h2>\n<p><strong>EN:</strong> FastAPI uses your Python type hints and Pydantic models to automatically generate an OpenAPI schema, which is rendered as interactive Swagger UI and ReDoc.</p>\n<p><strong>UZ:</strong> FastAPI Python type hint'lari va Pydantic modellarni ishlatib, OpenAPI sxemasini avtomatik yaratadi. U Swagger UI va ReDoc sifatida ko'rsatiladi.</p>\n<pre><code class=\"language-python\">from fastapi import FastAPI\nfrom pydantic import BaseModel, Field\n\napp = FastAPI(\n    title=&quot;My API&quot;,\n    description=&quot;Bu API foydalanuvchilarni boshqaradi&quot;,\n    version=&quot;2.0.0&quot;,\n    docs_url=&quot;/docs&quot;,      # Swagger UI\n    redoc_url=&quot;/redoc&quot;,    # ReDoc\n    openapi_url=&quot;/openapi.json&quot;\n)\n\nclass UserCreate(BaseModel):\n    name: str = Field(..., description=&quot;Foydalanuvchi ismi&quot;, example=&quot;Ali&quot;)\n    age: int = Field(..., ge=1, le=150, description=&quot;Yoshi&quot;)\n\n@app.post(\n    &quot;/users/&quot;,\n    summary=&quot;Foydalanuvchi yaratish&quot;,\n    description=&quot;Yangi foydalanuvchi yaratadi va ID qaytaradi&quot;,\n    response_description=&quot;Yaratilgan foydalanuvchi&quot;,\n    tags=[&quot;Users&quot;],\n    status_code=201\n)\nasync def create_user(user: UserCreate):\n    &quot;&quot;&quot;\n    EN: Create a new user with all required info.\n    UZ: Barcha kerakli ma'lumotlar bilan yangi foydalanuvchi yarating.\n    &quot;&quot;&quot;\n    return {&quot;id&quot;: 1, **user.model_dump()}\n\n# Docs: http://localhost:8000/docs\n</code></pre>\n<hr />\n<h2 id=\"q14-what-is-response-model-in-fastapi-fastapida-response-model-nima\">Q14. What is Response Model in FastAPI? | FastAPI'da Response Model nima?</h2>\n<p><strong>EN:</strong> <code>response_model</code> defines the shape of the response. FastAPI validates and filters the output — fields not in the model are excluded automatically. Useful for hiding internal fields like passwords.</p>\n<p><strong>UZ:</strong> <code>response_model</code> — javobning qanday bo'lishini belgilaydi. FastAPI chiqishni tekshiradi va filtrlaydi — modelda bo'lmagan maydonlar avtomatik chiqarib tashlanadi. Parollar kabi ichki maydonlarni yashirish uchun foydali.</p>\n<pre><code class=\"language-python\">from fastapi import FastAPI\nfrom pydantic import BaseModel\n\napp = FastAPI()\n\nclass UserInDB(BaseModel):\n    id: int\n    name: str\n    email: str\n    hashed_password: str    # ← Bu yashirilishi kerak | This should be hidden\n\nclass UserPublic(BaseModel):\n    id: int\n    name: str\n    email: str\n    # hashed_password yo'q | no hashed_password ✅\n\n@app.get(&quot;/users/{user_id}&quot;, response_model=UserPublic)\nasync def get_user(user_id: int):\n    # DB'dan to'liq ma'lumot | Full data from DB\n    user_from_db = UserInDB(\n        id=user_id,\n        name=&quot;Ali&quot;,\n        email=&quot;ali@example.com&quot;,\n        hashed_password=&quot;$2b$12$secret&quot;\n    )\n    # FastAPI avtomatik hashed_password ni olib tashlaydi | FastAPI auto-removes hashed_password\n    return user_from_db\n\n# response_model_exclude_unset=True — faqat o'rnatilgan maydonlar\n# response_model_exclude={&quot;field&quot;} — aniq maydonlarni chiqarish\n# response_model_include={&quot;field&quot;} — faqat shu maydonlarni kiritish\n</code></pre>\n<hr />\n<h2 id=\"q15-what-is-api-versioning-in-fastapi-fastapida-api-versioning-nima\">Q15. What is API Versioning in FastAPI? | FastAPI'da API Versioning nima?</h2>\n<p><strong>EN:</strong> API versioning keeps old API versions working while introducing new ones. Most common approach: URL path versioning (<code>/api/v1/</code>, <code>/api/v2/</code>).</p>\n<p><strong>UZ:</strong> API versioning — eski API versiyalarini ishlatib turgan holda yangilarini joriy etish imkonini beradi. Eng keng tarqalgan: URL path versioning (<code>/api/v1/</code>, <code>/api/v2/</code>).</p>\n<pre><code class=\"language-python\">from fastapi import FastAPI\nfrom fastapi import APIRouter\n\napp = FastAPI()\n\n# V1 Router\nv1_router = APIRouter(prefix=&quot;/api/v1&quot;, tags=[&quot;V1&quot;])\n\n@v1_router.get(&quot;/users/&quot;)\nasync def list_users_v1():\n    return [{&quot;id&quot;: 1, &quot;name&quot;: &quot;Ali&quot;}]\n\n# V2 Router — yangi maydon | New field added\nv2_router = APIRouter(prefix=&quot;/api/v2&quot;, tags=[&quot;V2&quot;])\n\n@v2_router.get(&quot;/users/&quot;)\nasync def list_users_v2():\n    return [{&quot;id&quot;: 1, &quot;name&quot;: &quot;Ali&quot;, &quot;avatar&quot;: &quot;url&quot;}]\n\napp.include_router(v1_router)\napp.include_router(v2_router)\n\n# GET /api/v1/users/ → old response\n# GET /api/v2/users/ → new response with avatar\n</code></pre>\n<hr />\n<h1 id=\"fastapi-ilgor-fastapi-advanced-q16q25\">🔶 FASTAPI ILGʻOR | FASTAPI ADVANCED (Q16–Q25)</h1>\n<hr />\n<h2 id=\"q16-what-is-the-difference-between-async-def-and-def-in-fastapi-fastapida-async-def-va-def-farqi-nima\">Q16. What is the difference between <code>async def</code> and <code>def</code> in FastAPI? | FastAPI'da <code>async def</code> va <code>def</code> farqi nima?</h2>\n<p><strong>EN:</strong> <code>async def</code> runs in the async event loop — for I/O-bound tasks (DB, HTTP calls). <code>def</code> runs in a thread pool — for CPU-bound or sync-only code. Never use blocking calls inside <code>async def</code>.</p>\n<p><strong>UZ:</strong> <code>async def</code> — async event loop'da ishlaydi — I/O-ga bog'liq ishlar uchun (DB, HTTP so'rovlar). <code>def</code> — thread pool'da ishlaydi — CPU-ga bog'liq yoki faqat sinxron kod uchun. <code>async def</code> ichida bloklayotgan chaqiruvlarni hech qachon ishlatmang.</p>\n<pre><code class=\"language-python\">from fastapi import FastAPI\nimport asyncio\nimport time\n\napp = FastAPI()\n\n# ✅ Async — I/O bound (DB, network)\n@app.get(&quot;/async-endpoint&quot;)\nasync def async_example():\n    await asyncio.sleep(1)   # Non-blocking | Bloklamaydigan\n    return {&quot;type&quot;: &quot;async&quot;}\n\n# ✅ Sync — CPU bound (hisob-kitob | computation)\n@app.get(&quot;/sync-endpoint&quot;)\ndef sync_example():\n    time.sleep(1)             # EN: OK in def, runs in threadpool\n                              # UZ: def'da OK, threadpool'da ishlaydi\n    return {&quot;type&quot;: &quot;sync&quot;}\n\n# ❌ Xato | Wrong — async def ichida sync bloklash | blocking sync inside async\n@app.get(&quot;/bad&quot;)\nasync def bad_endpoint():\n    time.sleep(1)  # ← Butun event loop'ni bloklaydi! | Blocks entire event loop!\n    return {&quot;bad&quot;: True}\n\n# ✅ To'g'ri usul | Correct way — run_in_executor\nimport asyncio\nfrom concurrent.futures import ThreadPoolExecutor\n\n@app.get(&quot;/correct&quot;)\nasync def correct_endpoint():\n    loop = asyncio.get_event_loop()\n    result = await loop.run_in_executor(None, sync_blocking_function)\n    return result\n</code></pre>\n<hr />\n<h2 id=\"q17-how-to-implement-pagination-in-fastapi-fastapida-pagination-qanday-amalga-oshiriladi\">Q17. How to implement Pagination in FastAPI? | FastAPI'da Pagination qanday amalga oshiriladi?</h2>\n<p><strong>EN:</strong> Implement pagination using query parameters <code>skip</code> and <code>limit</code>, or use cursor-based pagination for large datasets.</p>\n<p><strong>UZ:</strong> Pagination <code>skip</code> va <code>limit</code> query parametrlari yordamida, yoki katta ma'lumotlar uchun cursor-based pagination bilan amalga oshiriladi.</p>\n<pre><code class=\"language-python\">from fastapi import FastAPI, Depends, Query\nfrom pydantic import BaseModel\nfrom typing import List, Optional, Generic, TypeVar\n\napp = FastAPI()\n\nT = TypeVar(&quot;T&quot;)\n\nclass PaginatedResponse(BaseModel, Generic[T]):\n    items: List[T]\n    total: int\n    skip: int\n    limit: int\n    has_more: bool\n\n# Dependency sifatida | As dependency\ndef pagination_params(\n    skip: int = Query(default=0, ge=0, description=&quot;O'tkazib yuborish&quot;),\n    limit: int = Query(default=10, ge=1, le=100, description=&quot;Maksimum natijalar&quot;)\n):\n    return {&quot;skip&quot;: skip, &quot;limit&quot;: limit}\n\n@app.get(&quot;/users/&quot;, response_model=PaginatedResponse[dict])\nasync def list_users(\n    pagination: dict = Depends(pagination_params),\n    search: Optional[str] = None\n):\n    # DB query | DB so'rov\n    # total = await db.count(User)\n    # items = await db.query(User).offset(skip).limit(limit).all()\n    total = 100\n    items = [{&quot;id&quot;: i, &quot;name&quot;: f&quot;User {i}&quot;} for i in range(pagination[&quot;limit&quot;])]\n\n    return PaginatedResponse(\n        items=items,\n        total=total,\n        skip=pagination[&quot;skip&quot;],\n        limit=pagination[&quot;limit&quot;],\n        has_more=(pagination[&quot;skip&quot;] + pagination[&quot;limit&quot;]) &lt; total\n    )\n</code></pre>\n<hr />\n<h2 id=\"q18-how-to-implement-file-upload-in-fastapi-fastapida-fayl-yuklashni-qanday-amalga-oshirish-mumkin\">Q18. How to implement File Upload in FastAPI? | FastAPI'da fayl yuklashni qanday amalga oshirish mumkin?</h2>\n<p><strong>EN:</strong> Use <code>UploadFile</code> and <code>File</code> from FastAPI to handle file uploads.</p>\n<p><strong>UZ:</strong> Fayl yuklashni boshqarish uchun FastAPI'dan <code>UploadFile</code> va <code>File</code> ishlatiladi.</p>\n<pre><code class=\"language-python\">from fastapi import FastAPI, UploadFile, File, HTTPException\nfrom typing import List\nimport aiofiles\nimport os\n\napp = FastAPI()\n\nUPLOAD_DIR = &quot;uploads&quot;\nALLOWED_TYPES = {&quot;image/jpeg&quot;, &quot;image/png&quot;, &quot;application/pdf&quot;}\nMAX_SIZE = 5 * 1024 * 1024  # 5MB\n\n@app.post(&quot;/upload/&quot;)\nasync def upload_file(file: UploadFile = File(...)):\n    # Tur tekshiruvi | Type validation\n    if file.content_type not in ALLOWED_TYPES:\n        raise HTTPException(400, f&quot;Fayl turi qabul qilinmaydi: {file.content_type}&quot;)\n\n    # Hajm tekshiruvi | Size validation\n    content = await file.read()\n    if len(content) &gt; MAX_SIZE:\n        raise HTTPException(400, &quot;Fayl hajmi 5MB dan oshmasligi kerak&quot;)\n\n    # Saqlash | Save\n    os.makedirs(UPLOAD_DIR, exist_ok=True)\n    file_path = os.path.join(UPLOAD_DIR, file.filename)\n    async with aiofiles.open(file_path, &quot;wb&quot;) as f:\n        await f.write(content)\n\n    return {&quot;filename&quot;: file.filename, &quot;size&quot;: len(content)}\n\n# Ko'p fayl | Multiple files\n@app.post(&quot;/upload-multiple/&quot;)\nasync def upload_multiple(files: List[UploadFile] = File(...)):\n    results = []\n    for file in files:\n        content = await file.read()\n        results.append({&quot;filename&quot;: file.filename, &quot;size&quot;: len(content)})\n    return results\n</code></pre>\n<hr />\n<h2 id=\"q19-how-to-implement-caching-in-fastapi-fastapida-caching-qanday-amalga-oshiriladi\">Q19. How to implement Caching in FastAPI? | FastAPI'da Caching qanday amalga oshiriladi?</h2>\n<p><strong>EN:</strong> Use Redis for distributed caching, or in-memory caching for simple cases. <code>fastapi-cache2</code> library makes it easy.</p>\n<p><strong>UZ:</strong> Distributed caching uchun Redis, oddiy holatlar uchun in-memory caching ishlatiladi. <code>fastapi-cache2</code> kutubxonasi buni osonlashtiradi.</p>\n<pre><code class=\"language-python\">from fastapi import FastAPI\nfrom fastapi_cache import FastAPICache\nfrom fastapi_cache.backends.redis import RedisBackend\nfrom fastapi_cache.decorator import cache\nfrom redis import asyncio as aioredis\n\napp = FastAPI()\n\n@app.on_event(&quot;startup&quot;)\nasync def startup():\n    redis = aioredis.from_url(&quot;redis://localhost:6379&quot;)\n    FastAPICache.init(RedisBackend(redis), prefix=&quot;myapp-cache&quot;)\n\n# 60 soniya keshlash | Cache for 60 seconds\n@app.get(&quot;/users/{user_id}&quot;)\n@cache(expire=60)\nasync def get_user(user_id: int):\n    # DB'dan — faqat kesh eskirganda chaqiriladi | Called only when cache expires\n    return {&quot;id&quot;: user_id, &quot;name&quot;: &quot;Ali&quot;}\n\n# Qo'lda kesh | Manual caching\nfrom fastapi import Depends\nimport json\n\nasync def get_redis():\n    return aioredis.from_url(&quot;redis://localhost:6379&quot;)\n\n@app.get(&quot;/products/{product_id}&quot;)\nasync def get_product(product_id: int, redis=Depends(get_redis)):\n    cache_key = f&quot;product:{product_id}&quot;\n    cached = await redis.get(cache_key)\n    if cached:\n        return json.loads(cached)   # Keshdan | From cache\n\n    product = {&quot;id&quot;: product_id, &quot;name&quot;: &quot;Laptop&quot;}  # DB dan | From DB\n    await redis.setex(cache_key, 300, json.dumps(product))  # 5 daqiqa | 5 minutes\n    return product\n</code></pre>\n<hr />\n<h2 id=\"q20-how-to-implement-rate-limiting-in-fastapi-fastapida-rate-limiting-qanday-amalga-oshiriladi\">Q20. How to implement Rate Limiting in FastAPI? | FastAPI'da Rate Limiting qanday amalga oshiriladi?</h2>\n<p><strong>EN:</strong> Rate limiting restricts how many requests a client can make in a time window. Use <code>slowapi</code> library or custom Redis-based middleware.</p>\n<p><strong>UZ:</strong> Rate limiting — client ma'lum vaqt oralig'ida qancha so'rov qila olishini cheklaydi. <code>slowapi</code> kutubxonasi yoki maxsus Redis-based middleware ishlatiladi.</p>\n<pre><code class=\"language-python\">from fastapi import FastAPI, Request\nfrom slowapi import Limiter, _rate_limit_exceeded_handler\nfrom slowapi.util import get_remote_address\nfrom slowapi.errors import RateLimitExceeded\n\nlimiter = Limiter(key_func=get_remote_address)\napp = FastAPI()\napp.state.limiter = limiter\napp.add_exception_handler(RateLimitExceeded, _rate_limit_exceeded_handler)\n\n# Minutiga 5 ta | 5 per minute\n@app.get(&quot;/limited/&quot;)\n@limiter.limit(&quot;5/minute&quot;)\nasync def limited_endpoint(request: Request):\n    return {&quot;message&quot;: &quot;OK&quot;}\n\n# Soatiga 100 ta | 100 per hour\n@app.get(&quot;/api/data/&quot;)\n@limiter.limit(&quot;100/hour&quot;)\nasync def get_data(request: Request):\n    return {&quot;data&quot;: &quot;...&quot;}\n</code></pre>\n<hr />\n<h2 id=\"q21-how-to-implement-server-sent-events-sse-in-fastapi-fastapida-sse-qanday-amalga-oshiriladi\">Q21. How to implement Server-Sent Events (SSE) in FastAPI? | FastAPI'da SSE qanday amalga oshiriladi?</h2>\n<p><strong>EN:</strong> SSE allows the server to push real-time updates to clients over HTTP (one-directional). Good for notifications, dashboards, logs.</p>\n<p><strong>UZ:</strong> SSE — serverga HTTP orqali clientlarga real-vaqt yangilanishlarini yuborish imkonini beradi (bir yo'nalishli). Bildirishnomalar, dashboardlar, loglar uchun yaxshi.</p>\n<pre><code class=\"language-python\">from fastapi import FastAPI\nfrom fastapi.responses import StreamingResponse\nimport asyncio\n\napp = FastAPI()\n\nasync def event_generator(topic: str):\n    count = 0\n    while True:\n        count += 1\n        yield f&quot;data: {{'count': {count}, 'topic': '{topic}'}}\\n\\n&quot;\n        await asyncio.sleep(1)\n\n@app.get(&quot;/sse/{topic}&quot;)\nasync def sse_endpoint(topic: str):\n    return StreamingResponse(\n        event_generator(topic),\n        media_type=&quot;text/event-stream&quot;,\n        headers={\n            &quot;Cache-Control&quot;: &quot;no-cache&quot;,\n            &quot;X-Accel-Buffering&quot;: &quot;no&quot;   # Nginx uchun | For Nginx\n        }\n    )\n\n# JS client | JS mijoz:\n# const es = new EventSource('/sse/news');\n# es.onmessage = (e) =&gt; console.log(JSON.parse(e.data));\n</code></pre>\n<hr />\n<h2 id=\"q22-what-is-openapi-tags-and-how-to-organize-them-openapi-tags-nima-va-ularni-qanday-tartiblashtirish-kerak\">Q22. What is OpenAPI Tags and how to organize them? | OpenAPI Tags nima va ularni qanday tartiblashtirish kerak?</h2>\n<p><strong>EN:</strong> Tags group endpoints in Swagger UI, making documentation more readable.</p>\n<p><strong>UZ:</strong> Tags — Swagger UI'da endpointlarni guruhlaydi, hujjatlarni o'qilishi osonlashtiradi.</p>\n<pre><code class=\"language-python\">from fastapi import FastAPI\n\ntags_metadata = [\n    {\n        &quot;name&quot;: &quot;Users&quot;,\n        &quot;description&quot;: &quot;Foydalanuvchilar bilan operatsiyalar | User operations&quot;,\n    },\n    {\n        &quot;name&quot;: &quot;Items&quot;,\n        &quot;description&quot;: &quot;Mahsulotlar bilan operatsiyalar | Item operations&quot;,\n        &quot;externalDocs&quot;: {\n            &quot;description&quot;: &quot;Items documentation&quot;,\n            &quot;url&quot;: &quot;https://example.com/docs/items&quot;,\n        },\n    },\n]\n\napp = FastAPI(openapi_tags=tags_metadata)\n\n@app.get(&quot;/users/&quot;, tags=[&quot;Users&quot;])\nasync def list_users():\n    return []\n\n@app.get(&quot;/items/&quot;, tags=[&quot;Items&quot;])\nasync def list_items():\n    return []\n</code></pre>\n<hr />\n<h2 id=\"q23-how-to-add-custom-headers-to-fastapi-responses-fastapi-javoblariga-maxsus-headerlar-qanday-qoshish-mumkin\">Q23. How to add custom headers to FastAPI responses? | FastAPI javoblariga maxsus headerlar qanday qo'shish mumkin?</h2>\n<p><strong>EN:</strong> Use <code>Response</code> object or return <code>JSONResponse</code> with custom headers.</p>\n<p><strong>UZ:</strong> <code>Response</code> ob'ekti yoki maxsus headerlar bilan <code>JSONResponse</code> qaytarish orqali.</p>\n<pre><code class=\"language-python\">from fastapi import FastAPI, Response\nfrom fastapi.responses import JSONResponse\n\napp = FastAPI()\n\n# 1. Response parametri orqali | Via Response parameter\n@app.get(&quot;/items/{item_id}&quot;)\nasync def get_item(item_id: int, response: Response):\n    response.headers[&quot;X-Item-ID&quot;] = str(item_id)\n    response.headers[&quot;Cache-Control&quot;] = &quot;max-age=3600&quot;\n    return {&quot;id&quot;: item_id}\n\n# 2. JSONResponse orqali | Via JSONResponse\n@app.get(&quot;/direct/&quot;)\nasync def direct_response():\n    return JSONResponse(\n        content={&quot;message&quot;: &quot;Hello&quot;},\n        status_code=200,\n        headers={\n            &quot;X-Custom-Header&quot;: &quot;myvalue&quot;,\n            &quot;X-Process-Time&quot;: &quot;0.001&quot;\n        }\n    )\n</code></pre>\n<hr />\n<h2 id=\"q24-how-to-implement-health-check-endpoint-health-check-endpoint-qanday-amalga-oshiriladi\">Q24. How to implement Health Check endpoint? | Health Check endpoint qanday amalga oshiriladi?</h2>\n<p><strong>EN:</strong> Health check endpoints let orchestrators (Kubernetes, Docker) know if the app is alive and ready.</p>\n<p><strong>UZ:</strong> Health check endpointlar orkestratorlarga (Kubernetes, Docker) ilova tirik va tayyor ekanligini bildiradi.</p>\n<pre><code class=\"language-python\">from fastapi import FastAPI\nfrom pydantic
