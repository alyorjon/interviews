atlash</td>\n<td><code>EXPOSE 8000</code></td>\n</tr>\n<tr>\n<td><code>WORKDIR</code></td>\n<td>Set working directory</td>\n<td>Ish papkasi</td>\n<td><code>WORKDIR /app</code></td>\n</tr>\n<tr>\n<td><code>VOLUME</code></td>\n<td>Create mount point</td>\n<td>Ulash nuqtasi</td>\n<td><code>VOLUME /data</code></td>\n</tr>\n<tr>\n<td><code>ARG</code></td>\n<td>Build-time variable</td>\n<td>Qurish vaqti o'zgaruvchi</td>\n<td><code>ARG VERSION=1.0</code></td>\n</tr>\n<tr>\n<td><code>LABEL</code></td>\n<td>Add metadata</td>\n<td>Metadata qo'shish</td>\n<td><code>LABEL env=\"prod\"</code></td>\n</tr>\n<tr>\n<td><code>USER</code></td>\n<td>Set user</td>\n<td>Foydalanuvchi</td>\n<td><code>USER appuser</code></td>\n</tr>\n<tr>\n<td><code>HEALTHCHECK</code></td>\n<td>Container health check</td>\n<td>Sog'liq tekshiruvi</td>\n<td><code>HEALTHCHECK CMD curl -f http://localhost/</code></td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h3 id=\"q19-what-is-the-difference-between-cmd-and-entrypoint-cmd-va-entrypoint-farqi-nima\">Q19. What is the difference between CMD and ENTRYPOINT? | CMD va ENTRYPOINT farqi nima?</h3>\n<p><strong>EN:</strong> <code>ENTRYPOINT</code> defines the fixed executable. <code>CMD</code> provides default arguments that can be overridden. Together: <code>ENTRYPOINT</code> + <code>CMD</code> = full command.</p>\n<p><strong>UZ:</strong> <code>ENTRYPOINT</code> — o'zgarmas asosiy ijrochi. <code>CMD</code> — bekor qilinishi mumkin bo'lgan standart argumentlar. Birgalikda: <code>ENTRYPOINT</code> + <code>CMD</code> = to'liq buyruq.</p>\n<pre><code class=\"language-dockerfile\"># Faqat CMD | Only CMD\nCMD [&quot;python&quot;, &quot;app.py&quot;]\n# docker run my-app            → python app.py\n# docker run my-app server.py  → python server.py (CMD o'zgaradi | CMD overridden)\n\n# Faqat ENTRYPOINT | Only ENTRYPOINT\nENTRYPOINT [&quot;python&quot;]\n# docker run my-app            → python\n# docker run my-app app.py     → python app.py\n\n# Birgalikda | Together (tavsiya etiladi | recommended)\nENTRYPOINT [&quot;gunicorn&quot;]\nCMD [&quot;--workers=4&quot;, &quot;main:app&quot;]\n# docker run my-app                      → gunicorn --workers=4 main:app\n# docker run my-app --workers=2 main:app → gunicorn --workers=2 main:app\n</code></pre>\n<hr />\n<h3 id=\"q20-what-is-the-difference-between-copy-and-add-copy-va-add-farqi-nima\">Q20. What is the difference between COPY and ADD? | COPY va ADD farqi nima?</h3>\n<p><strong>EN:</strong> <code>COPY</code> simply copies files/dirs from host to container. <code>ADD</code> does the same but also supports downloading from URLs and auto-extracting tar archives. <strong>COPY is preferred</strong> unless you need ADD's extra features.</p>\n<p><strong>UZ:</strong> <code>COPY</code> faqat host'dan container'ga fayl/papka ko'chiradi. <code>ADD</code> xuddi shunday, lekin URL'dan yuklab olish va tar arxivlarini avtomatik ochish imkoniyatiga ham ega. ADD'ning qo'shimcha xususiyatlari kerak bo'lmasa <strong>COPY tavsiya etiladi</strong>.</p>\n<pre><code class=\"language-dockerfile\"># COPY — oddiy nusxa olish | simple copy\nCOPY ./app /app\nCOPY requirements.txt .\n\n# ADD — qo'shimcha imkoniyatlar | extra features\nADD https://example.com/config.json /app/config.json   # URL'dan | from URL\nADD archive.tar.gz /app/                               # Avtomatik ochadi | auto-extract\n\n# ✅ Tavsiya | Recommended: COPY for local files\nCOPY . /app\n\n# ✅ ADD faqat shu hollarda | ADD only when needed\nADD https://... /destination\nADD archive.tar.gz /destination\n</code></pre>\n<hr />\n<h3 id=\"q21-what-is-dockerignore-dockerignore-nima\">Q21. What is .dockerignore? | .dockerignore nima?</h3>\n<p><strong>EN:</strong> <code>.dockerignore</code> tells Docker which files to exclude from the build context, similar to <code>.gitignore</code>.</p>\n<p><strong>UZ:</strong> <code>.dockerignore</code> — <code>.gitignore</code>ga o'xshash, build context'dan qaysi fayllarni chiqarib tashlashni Docker'ga bildiradi.</p>\n<pre><code class=\"language-bash\"># .dockerignore fayli | .dockerignore file\n__pycache__/\n*.pyc\n*.pyo\n.git/\n.env\nvenv/\nnode_modules/\n*.log\n.DS_Store\ntests/\ndocs/\n\n# EN: Reduces build context size, speeds up builds, keeps secrets out of image\n# UZ: Build context hajmini kamaytiradi, qurishni tezlashtiradi, maxfiy ma'lumotlarni image'dan chiqaradi\n</code></pre>\n<hr />\n<h3 id=\"q22-what-is-a-multi-stage-build-multi-stage-build-nima\">Q22. What is a Multi-stage Build? | Multi-stage Build nima?</h3>\n<p><strong>EN:</strong> Multi-stage builds use multiple <code>FROM</code> statements in one Dockerfile. This lets you build in one stage (with all tools) and copy only the result to a lean final image.</p>\n<p><strong>UZ:</strong> Multi-stage build bitta Dockerfile'da bir nechta <code>FROM</code> iborasini ishlatadi. Bir bosqichda qurib (barcha toollar bilan), faqat natijani yengil yakuniy image'ga ko'chirishga imkon beradi.</p>\n<pre><code class=\"language-dockerfile\"># Multi-stage build namunasi | Multi-stage build example\n\n# Bosqich 1: Qurish | Stage 1: Build\nFROM python:3.11 AS builder\nWORKDIR /app\nCOPY requirements.txt .\nRUN pip install --user -r requirements.txt\nCOPY . .\n\n# Bosqich 2: Ishga tushirish (yengil image) | Stage 2: Runtime (lean image)\nFROM python:3.11-slim AS runtime\nWORKDIR /app\n# Faqat keraklisini ko'chirish | Copy only what's needed\nCOPY --from=builder /root/.local /root/.local\nCOPY --from=builder /app/main.py .\nCOPY --from=builder /app/app/ ./app/\n\nENV PATH=/root/.local/bin:$PATH\nCMD [&quot;uvicorn&quot;, &quot;main:app&quot;, &quot;--host&quot;, &quot;0.0.0.0&quot;, &quot;--port&quot;, &quot;8000&quot;]\n\n# Natija: 920MB → 180MB | Result: 920MB → 180MB ✅\n</code></pre>\n<pre><code class=\"language-bash\">docker build -t my-app:slim .\ndocker images\n# my-app   slim    ...   180MB   ← Juda kichik! | Very small!\n</code></pre>\n<hr />\n<h3 id=\"q23-what-is-docker-layer-caching-docker-qatlam-keshlash-nima\">Q23. What is Docker layer caching? | Docker qatlam keshlash nima?</h3>\n<p><strong>EN:</strong> Docker caches each Dockerfile instruction as a layer. If a layer hasn't changed, it reuses the cache, speeding up subsequent builds.</p>\n<p><strong>UZ:</strong> Docker har bir Dockerfile ko'rsatmasini qatlam sifatida keshlaydi. Qatlam o'zgarmasa, keshdan foydalanib keyingi qurishlarni tezlashtiradi.</p>\n<pre><code class=\"language-dockerfile\"># ❌ Noto'g'ri tartib — har safar pip install ishlaydi | Wrong order — pip runs every time\nCOPY . .\nRUN pip install -r requirements.txt\n\n# ✅ To'g'ri tartib — requirements o'zgarmasa pip keshdan | Correct — pip uses cache if req unchanged\nCOPY requirements.txt .\nRUN pip install -r requirements.txt   # ← keshlanadi | cached\nCOPY . .                              # ← bu o'zgarganda pip qayta ishlamaydi | pip won't re-run\n</code></pre>\n<hr />\n<h2 id=\"4-docker-compose\">4. Docker Compose</h2>\n<hr />\n<h3 id=\"q24-what-is-docker-compose-docker-compose-nima\">Q24. What is Docker Compose? | Docker Compose nima?</h3>\n<p><strong>EN:</strong> Docker Compose is a tool for defining and running multi-container applications using a single <code>docker-compose.yml</code> YAML file. One command starts all services.</p>\n<p><strong>UZ:</strong> Docker Compose — bitta <code>docker-compose.yml</code> YAML fayli yordamida ko'p containerni aniqlash va ishga tushirish uchun asbob. Bitta buyruq bilan barcha servicelar ishga tushadi.</p>\n<pre><code class=\"language-yaml\"># docker-compose.yml — FastAPI + PostgreSQL + Redis\n\nversion: &quot;3.9&quot;\n\nservices:\n  # FastAPI ilovasi | FastAPI application\n  api:\n    build: .\n    ports:\n      - &quot;8000:8000&quot;\n    environment:\n      - DATABASE_URL=postgresql://admin:secret@db:5432/mydb\n      - REDIS_URL=redis://redis:6379\n    depends_on:\n      - db\n      - redis\n    volumes:\n      - .:/app          # EN: Dev mode live reload | UZ: Dev rejimida tez yangilanish\n\n  # PostgreSQL\n  db:\n    image: postgres:15\n    environment:\n      POSTGRES_DB: mydb\n      POSTGRES_USER: admin\n      POSTGRES_PASSWORD: secret\n    volumes:\n      - postgres_data:/var/lib/postgresql/data\n\n  # Redis\n  redis:\n    image: redis:7-alpine\n    ports:\n      - &quot;6379:6379&quot;\n\nvolumes:\n  postgres_data:\n</code></pre>\n<pre><code class=\"language-bash\"># Barcha servicelarni ishga tushirish | Start all services\ndocker compose up -d\n\n# Loglarni ko'rish | View logs\ndocker compose logs -f api\n\n# To'xtatish | Stop\ndocker compose down\n\n# To'xtatib volumelarni o'chirish | Stop and remove volumes\ndocker compose down -v\n</code></pre>\n<hr />\n<h3 id=\"q25-what-is-depends_on-in-docker-compose-docker-composeda-depends_on-nima\">Q25. What is <code>depends_on</code> in Docker Compose? | Docker Compose'da <code>depends_on</code> nima?</h3>\n<p><strong>EN:</strong> <code>depends_on</code> defines the startup order. It ensures a service starts only after its dependencies are started. However, it doesn't wait for the service to be <strong>ready</strong>.</p>\n<p><strong>UZ:</strong> <code>depends_on</code> — ishga tushish tartibini belgilaydi. Service faqat bog'liqliklar ishga tushgandan keyin boshlanishini ta'minlaydi. Lekin service <strong>tayyor</strong> bo'lguncha kutmaydi.</p>\n<pre><code class=\"language-yaml\">services:\n  api:\n    build: .\n    depends_on:\n      db:\n        condition: service_healthy    # ← DB tayyor bo'lguncha kut | Wait until DB is healthy\n\n  db:\n    image: postgres:15\n    healthcheck:\n      test: [&quot;CMD-SHELL&quot;, &quot;pg_isready -U admin&quot;]\n      interval: 5s\n      timeout: 5s\n      retries: 5\n</code></pre>\n<hr />\n<h3 id=\"q26-how-to-scale-services-in-docker-compose-docker-composeda-servicelarni-qanday-scale-qilish-mumkin\">Q26. How to scale services in Docker Compose? | Docker Compose'da servicelarni qanday scale qilish mumkin?</h3>\n<p><strong>EN:</strong> Use <code>--scale</code> flag to run multiple instances of a service.</p>\n<p><strong>UZ:</strong> Bir service'ning bir nechta nusxasini ishga tushirish uchun <code>--scale</code> flagi ishlatiladi.</p>\n<pre><code class=\"language-bash\"># api service'dan 3 ta nusxa | Run 3 instances of api service\ndocker compose up -d --scale api=3\n\n# Ishlaydigan containerlarni ko'rish | Check running containers\ndocker compose ps\n# NAME           COMMAND   SERVICE   STATUS\n# myapp-api-1    ...       api       running\n# myapp-api-2    ...       api       running\n# myapp-api-3    ...       api       running\n# myapp-db-1     ...       db        running\n</code></pre>\n<hr />\n<h2 id=\"5-networking-tarmoq\">5. Networking | Tarmoq</h2>\n<hr />\n<h3 id=\"q27-what-are-docker-network-types-docker-tarmoq-turlari-nima\">Q27. What are Docker Network types? | Docker Tarmoq turlari nima?</h3>\n<p><strong>EN:</strong> Docker supports several network drivers: Bridge, Host, None, Overlay, Macvlan.</p>\n<p><strong>UZ:</strong> Docker bir nechta tarmoq drayverlarini qo'llab-quvvatlaydi: Bridge, Host, None, Overlay, Macvlan.</p>\n<table>\n<thead>\n<tr>\n<th>Network</th>\n<th>EN</th>\n<th>UZ</th>\n<th>Use case</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>bridge</strong></td>\n<td>Default. Isolated network on single host</td>\n<td>Standart. Bitta hostda izolyatsiyalangan</td>\n<td>Single host apps</td>\n</tr>\n<tr>\n<td><strong>host</strong></td>\n<td>Shares host network stack</td>\n<td>Host tarmoq stekini ulashadi</td>\n<td>High performance</td>\n</tr>\n<tr>\n<td><strong>none</strong></td>\n<td>No networking</td>\n<td>Tarmoqsiz</td>\n<td>Max isolation</td>\n</tr>\n<tr>\n<td><strong>overlay</strong></td>\n<td>Multi-host networking (Swarm)</td>\n<td>Ko'p host tarmoqi</td>\n<td>Docker Swarm</td>\n</tr>\n<tr>\n<td><strong>macvlan</strong></td>\n<td>Container gets MAC address</td>\n<td>Container MAC manzil oladi</td>\n<td>Legacy apps</td>\n</tr>\n</tbody>\n</table>\n<pre><code class=\"language-bash\"># Tarmoqlarni ko'rish | List networks\ndocker network ls\n\n# Yangi bridge network yaratish | Create custom bridge network\ndocker network create my-network\n\n# Containerni tarmoqqa ulash | Connect container to network\ndocker run -d --network my-network --name api nginx\ndocker run -d --network my-network --name db postgres:15\n\n# EN: Containers on same network can reach each other by name!\n# UZ: Bir tarmoqdagi containerlar bir-birini nom bilan topa oladi!\n# api → db:5432 ✅\n</code></pre>\n<hr />\n<h3 id=\"q28-how-do-containers-communicate-with-each-other-containerlar-bir-biri-bilan-qanday-muloqot-qiladi\">Q28. How do containers communicate with each other? | Containerlar bir-biri bilan qanday muloqot qiladi?</h3>\n<p><strong>EN:</strong> Containers on the same Docker network can communicate using their container names as hostnames.</p>\n<p><strong>UZ:</strong> Bir xil Docker tarmog'idagi containerlar bir-birini container nomi (hostname sifatida) orqali topishi mumkin.</p>\n<pre><code class=\"language-yaml\"># docker-compose.yml\nservices:\n  api:\n    build: .\n    environment:\n      # EN: Use service name as hostname | UZ: Service nomini hostname sifatida ishlating\n      - DB_HOST=db          # ← &quot;db&quot; bu yerda container nomi | &quot;db&quot; is container name\n      - REDIS_HOST=redis\n  db:\n    image: postgres:15\n  redis:\n    image: redis:7\n</code></pre>\n<pre><code class=\"language-python\"># Python kodida | In Python code\nimport psycopg2\nconn = psycopg2.connect(host=&quot;db&quot;, port=5432, ...)  # &quot;db&quot; → postgres container\n</code></pre>\n<hr />\n<h3 id=\"q29-what-is-port-mapping-port-mapping-nima\">Q29. What is Port Mapping? | Port Mapping nima?</h3>\n<p><strong>EN:</strong> Port mapping binds a port on the host to a port inside the container, allowing external access.</p>\n<p><strong>UZ:</strong> Port mapping — hostdagi portni container ichidagi portga bog'laydi, tashqi kirishga imkon beradi.</p>\n<pre><code class=\"language-bash\"># Sintaksis | Syntax: -p host_port:container_port\ndocker run -d -p 8080:80 nginx\n# host:8080 → container:80\n\n# Ko'p portlar | Multiple ports\ndocker run -d \\\n  -p 8000:8000 \\    # API\n  -p 5555:5555 \\    # Celery Flower\n  my-app\n\n# Barcha interfeyslarda | All interfaces\ndocker run -d -p 0.0.0.0:8080:80 nginx\n\n# Faqat localhost | Only localhost\ndocker run -d -p 127.0.0.1:8080:80 nginx\n\n# Portlarni ko'rish | View port mappings\ndocker port my-container\n</code></pre>\n<hr />\n<h2 id=\"6-volumes-malumot-saqlash\">6. Volumes | Ma'lumot saqlash</h2>\n<hr />\n<h3 id=\"q30-what-is-a-docker-volume-docker-volume-nima\">Q30. What is a Docker Volume? | Docker Volume nima?</h3>\n<p><strong>EN:</strong> Docker volumes are the preferred mechanism for persisting data generated by containers. Volumes are managed by Docker and stored at <code>/var/lib/docker/volumes/</code> on the host.</p>\n<p><strong>UZ:</strong> Docker volume'lar — containerlar tomonidan yaratilgan ma'lumotlarni saqlashning tavsiya etilgan usuli. Volume'lar Docker tomonidan boshqariladi va host'da <code>/var/lib/docker/volumes/</code> da saqlanadi.</p>\n<pre><code class=\"language-bash\"># Volume yaratish | Create volume\ndocker volume create my-data\n\n# Volume bilan container ishga tushirish | Run container with volume\ndocker run -d \\\n  -v my-data:/var/lib/postgresql/data \\\n  postgres:15\n\n# Volume'larni ko'rish | List volumes\ndocker volume ls\n\n# Volume haqida ma'lumot | Volume info\ndocker volume inspect my-data\n\n# Volume o'chirish | Remove volume\ndocker volume rm my-data\n\n# Ishlatilmayotgan volume'larni tozalash | Clean unused volumes\ndocker volume prune\n</code></pre>\n<hr />\n<h3 id=\"q31-what-is-the-difference-between-volumes-bind-mounts-and-tmpfs-volume-bind-mount-va-tmpfs-farqi-nima\">Q31. What is the difference between Volumes, Bind Mounts, and tmpfs? | Volume, Bind Mount va tmpfs farqi nima?</h3>\n<p><strong>EN:</strong> Three ways to mount data into containers, each with different use cases.</p>\n<p><strong>UZ:</strong> Container'ga ma'lumot ulashning uchta usuli, har biri turli hollarda qo'llaniladi.</p>\n<table>\n<thead>\n<tr>\n<th></th>\n<th>Volume</th>\n<th>Bind Mount</th>\n<th>tmpfs</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>EN: Managed by</td>\n<td>Docker</td>\n<td>Host OS</td>\n<td>Memory only</td>\n</tr>\n<tr>\n<td>UZ: Boshqaruvchi</td>\n<td>Docker</td>\n<td>Host OS</td>\n<td>Faqat xotira</td>\n</tr>\n<tr>\n<td>EN: Location</td>\n<td>/var/lib/docker/volumes/</td>\n<td>Anywhere on host</td>\n<td>RAM</td>\n</tr>\n<tr>\n<td>UZ: Joylashuv</td>\n<td>/var/lib/docker/volumes/</td>\n<td>Hostda istalgan joy</td>\n<td>RAM</td>\n</tr>\n<tr>\n<td>EN: Persistence</td>\n<td>Persistent</td>\n<td>Persistent</td>\n<td>Lost on stop</td>\n</tr>\n<tr>\n<td>UZ: Doimiylik</td>\n<td>Doimiy</td>\n<td>Doimiy</td>\n<td>To'xtasa yo'qoladi</td>\n</tr>\n<tr>\n<td>EN: Use case</td>\n<td>Production data</td>\n<td>Dev live reload</td>\n<td>Secrets, temp data</td>\n</tr>\n<tr>\n<td>UZ: Ishlatish</td>\n<td>Production data</td>\n<td>Dev rejimi</td>\n<td>Maxfiy, vaqtinchalik</td>\n</tr>\n</tbody>\n</table>\n<pre><code class=\"language-bash\"># Volume (tavsiya | recommended)\ndocker run -v my-volume:/data nginx\n\n# Bind Mount (dev uchun | for dev)\ndocker run -v $(pwd):/app my-app\n# EN: Live code changes reflected instantly | UZ: Kod o'zgarishi darhol aks etadi\n\n# tmpfs (xotira | memory)\ndocker run --tmpfs /tmp nginx\n</code></pre>\n<hr />\n<h3 id=\"q32-how-to-backup-a-docker-volume-docker-volumeni-qanday-zaxiralash-mumkin\">Q32. How to backup a Docker Volume? | Docker Volume'ni qanday zaxiralash mumkin?</h3>\n<p><strong>EN:</strong> Use a temporary container to tar the volume contents and save it to the host.</p>\n<p><strong>UZ:</strong> Volume tarkibini tar'lab host'ga saqlash uchun vaqtinchalik container ishlatiladi.</p>\n<pre><code class=\"language-bash\"># Volume'ni zaxiralash | Backup volume\ndocker run --rm \\\n  -v my-postgres-data:/source \\\n  -v $(pwd):/backup \\\n  ubuntu tar czf /backup/postgres-backup.tar.gz -C /source .\n\n# Zaxiradan tiklash | Restore from backup\ndocker run --rm \\\n  -v my-postgres-data:/target \\\n  -v $(pwd):/backup \\\n  ubuntu tar xzf /backup/postgres-backup.tar.gz -C /target\n</code></pre>\n<hr />\n<h2 id=\"7-amaliy-buyruqlar-practical-commands\">7. Amaliy buyruqlar | Practical Commands</h2>\n<hr />\n<h3 id=\"q33-what-are-the-most-important-docker-commands-eng-muhim-docker-buyruqlari-qaysilar\">Q33. What are the most important Docker commands? | Eng muhim Docker buyruqlari qaysilar?</h3>\n<p><strong>EN / UZ:</strong> Core commands every Docker user must know.</p>\n<pre><code class=\"language-bash\"># ═══ IMAGE ═══\ndocker images                      # Barcha image'lar | List images\ndocker pull nginx                  # Hub'dan yuklash | Pull from Hub\ndocker build -t app:1.0 .          # Image qurish | Build image\ndocker push user/app:1.0           # Hub'ga yuklash | Push to Hub\ndocker rmi nginx                   # Image o'chirish | Remove image\ndocker image prune                 # Keraksizlarni tozalash | Clean dangling\n\n# ═══ CONTAINER ═══\ndocker run -d -p 8080:80 nginx    # Ishga tushirish | Run\ndocker ps                         # Ishlaydigan | Running containers\ndocker ps -a                      # Barchasi | All containers\ndocker stop &lt;id&gt;                  # To'xtatish | Stop\ndocker start &lt;id&gt;                 # Ishga tushirish | Start\ndocker restart &lt;id&gt;               # Qayta ishga tushirish | Restart\ndocker rm &lt;id&gt;                    # O'chirish | Remove\ndocker rm -f &lt;id&gt;                 # Majburiy o'chirish | Force remove\n\n# ═══ LOGS &amp; DEBUG ═══\ndocker logs &lt;id&gt;                  # Loglarni ko'rish | View logs\ndocker logs -f &lt;id&gt;               # Jonli loglar | Follow logs\ndocker exec -it &lt;id&gt; /bin/bash    # Container ichiga kirish | Enter container\ndocker inspect &lt;id&gt;               # Batafsil ma'lumot | Detailed info\ndocker stats                      # CPU/Memory | Resources usage\ndocker top &lt;id&gt;                   # Jarayonlar | Running processes\n\n# ═══ SYSTEM ═══\ndocker system df                  # Disk ishlatilishi | Disk usage\ndocker system prune               # Keraksizlarni tozalash | Clean all unused\ndocker system prune -a --volumes  # ⚠️ Hammasini tozalash | Clean everything\n</code></pre>\n<hr />\n<h3 id=\"q34-how-to-enter-a-running-container-ishlaydigan-container-ichiga-qanday-kirish-mumkin\">Q34. How to enter a running container? | Ishlaydigan container ichiga qanday kirish mumkin?</h3>\n<p><strong>EN:</strong> Use <code>docker exec -it</code> to open an interactive shell inside a running container.</p>\n<p><strong>UZ:</strong> Ishlaydigan container ichida interaktiv shell ochish uchun <code>docker exec -it</code> ishlatiladi.</p>\n<pre><code class=\"language-bash\"># Bash bilan | With bash\ndocker exec -it my-container /bin/bash\n\n# sh bilan (bash yo'q bo'lsa | if no bash — alpine containers)\ndocker exec -it my-container /bin/sh\n\n# Bitta buyruq bajarish | Run single command\ndocker exec my-container python manage.py migrate\n\n# Root sifatida kirish | Enter as root\ndocker exec -it --user root my-container /bin/bash\n\n# EN: Useful for debugging, checking logs, running migrations\n# UZ: Debug, log tekshirish, migratsiya ishlatishda foydali\n</code></pre>\n<hr />\n<h3 id=\"q35-how-to-view-container-logs-container-loglarini-qanday-korish-mumkin\">Q35. How to view container logs? | Container loglarini qanday ko'rish mumkin?</h3>\n<p><strong>EN:</strong> Use <code>docker logs</code> to view output from a container.</p>\n<p><strong>UZ:</strong> Container chiqishini ko'rish uchun <code>docker logs</code> ishlatiladi.</p>\n<pre><code class=\"language-bash\">docker logs my-container              # Barcha loglar | All logs\ndocker logs -f my-container           # Jonli | Follow (tail -f)\ndocker logs --tail 100 my-container   # Oxirgi 100 qator | Last 100 lines\ndocker logs --since 1h my-container   # Oxirgi 1 soat | Last 1 hour\ndocker logs --until 2024-01-01 my-container\n\n# Docker Compose'da | In Docker Compose\ndocker compose logs -f api            # Faqat api loglar | Only api logs\ndocker compose logs -f                # Barcha servicelar | All services\n</code></pre>\n<hr />\n<h3 id=\"q36-how-to-monitor-docker-containers-docker-containerlarni-qanday-monitoring-qilish-mumkin\">Q36. How to monitor Docker containers? | Docker containerlarni qanday monitoring qilish mumkin?</h3>\n<p><strong>EN:</strong> Use <code>docker stats</code> for real-time resource monitoring, or integrate with tools like Prometheus + Grafana.</p>\n<p><strong>UZ:</strong> Real vaqtda resurs monitoringi uchun <code>docker stats</code>, yoki Prometheus + Grafana kabi toollar bilan integratsiya.</p>\n<pre><code class=\"language-bash\"># Real-time statistika | Real-time stats\ndocker stats\n# CONTAINER   CPU %  MEM USAGE / LIMIT     MEM %   NET I/O\n# my-api      2.3%   120MiB / 512MiB       23.4%   1.2MB/1.5MB\n\n# Bir marta ko'rish | One-time snapshot\ndocker stats --no-stream\n\n# Disk, image, container hajmi | Disk usage\ndocker system df\n\n# Container jarayonlari | Container processes\ndocker top my-container\n</code></pre>\n<hr />\n<h3 id=\"q37-how-to-clean-up-docker-resources-docker-resurslarini-qanday-tozalash-mumkin\">Q37. How to clean up Docker resources? | Docker resurslarini qanday tozalash mumkin?</h3>\n<p><strong>EN:</strong> Use prune commands to remove unused Docker objects.</p>\n<p><strong>UZ:</strong> Ishlatilmayotgan Docker ob'ektlarini o'chirish uchun prune buyruqlari ishlatiladi.</p>\n<pre><code class=\"language-bash\"># To'xtatilgan containerlar | Stopped containers\ndocker container prune\n\n# Keraksiz image'lar (dangling) | Dangling images\ndocker image prune\n\n# Barcha ishlatilmayotgan image'lar | All unused images\ndocker image prune -a\n\n# Ishlatilmayotgan volume'lar | Unused volumes\ndocker volume prune\n\n# Ishlatilmayotgan tarmoqlar | Unused networks\ndocker network prune\n\n# Hammasi bir vaqtda | Everything at once\ndocker system prune\n\n# Hammasi + volume'lar ⚠️ | Everything + volumes ⚠️\ndocker system prune -a --volumes\n</code></pre>\n<hr />\n<h2 id=\"8-advanced-ilgor-mavzular\">8. Advanced | Ilg'or mavzular</h2>\n<hr />\n<h3 id=\"q38-what-is-docker-swarm-docker-swarm-nima\">Q38. What is Docker Swarm? | Docker Swarm nima?</h3>\n<p><strong>EN:</strong> Docker Swarm is Docker's native container orchestration tool. It manages a cluster of Docker hosts as a single virtual host, enabling scaling, load balancing, and high availability.</p>\n<p><strong>UZ:</strong> Docker Swarm — Docker'ning o'z container orkestratsiya vositasi. Docker hostlar klasterini bitta virtual host sifatida boshqaradi — scale, load balancing va yuqori mavjudlikni ta'minlaydi.</p>\n<pre><code class=\"language-bash\"># Swarm boshlash (manager node) | Init swarm (manager node)\ndocker swarm init --advertise-addr 192.168.1.100\n\n# Worker node qo'shish | Add worker node\ndocker swarm join --token &lt;token&gt; 192.168.1.100:2377\n\n# Service deploy qilish | Deploy service\ndocker service create \\\n  --name my-api \\\n  --replicas 3 \\\n  -p 8000:8000 \\\n  my-app:1.0\n\n# Service'larni ko'rish | List services\ndocker service ls\n\n# Scale qilish | Scale\ndocker service scale my-api=5\n\n# Nodelarni ko'rish | List nodes\ndocker node ls\n</code></pre>\n<hr />\n<h3 id=\"q39-what-is-the-difference-between-docker-swarm-and-kubernetes-docker-swarm-va-kubernetes-farqi-nima\">Q39. What is the difference between Docker Swarm and Kubernetes? | Docker Swarm va Kubernetes farqi nima?</h3>\n<p><strong>EN:</strong> Both are container orchestration tools, but Kubernetes is more powerful and complex.</p>\n<p><strong>UZ:</strong> Ikkalasi ham container orkestratsiya vositalari, lekin Kubernetes kuchliroq va murakkabroq.</p>\n<table>\n<thead>\n<tr>\n<th>Feature</th>\n<th>Docker Swarm</th>\n<th>Kubernetes</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>EN: Complexity</td>\n<td>Simple</td>\n<td>Complex</td>\n</tr>\n<tr>\n<td>UZ: Murakkablik</td>\n<td>Oddiy</td>\n<td>Murakkab</td>\n</tr>\n<tr>\n<td>EN: Setup</td>\n<td>Easy (minutes)</td>\n<td>Harder (hours)</td>\n</tr>\n<tr>\n<td>UZ: O'rnatish</td>\n<td>Oson (daqiqalar)</td>\n<td>Qiyinroq (soatlar)</td>\n</tr>\n<tr>\n<td>EN: Scaling</td>\n<td>Manual</td>\n<td>Auto-scaling</td>\n</tr>\n<tr>\n<td>UZ: Scale</td>\n<td>Qo'lda</td>\n<td>Avtomatik</td>\n</tr>\n<tr>\n<td>EN: Load balancing</td>\n<td>Built-in</td>\n<td>Needs Ingress</td>\n</tr>\n<tr>\n<td>UZ: Load balancing</td>\n<td>Ichki</td>\n<td>Ingress kerak</td>\n</tr>\n<tr>\n<td>EN: Community</td>\n<td>Smaller</td>\n<td>Huge</td>\n</tr>\n<tr>\n<td>UZ: Hamjamiyat</td>\n<td>Kichik</td>\n<td>Katta</td>\n</tr>\n<tr>\n<td>EN: Best for</td>\n<td>Small clusters</td>\n<td>Large production</td>\n</tr>\n<tr>\n<td>UZ: Eng yaxshi</td>\n<td>Kichik klaster</td>\n<td>Katta production</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h3 id=\"q40-what-is-a-docker-registry-docker-registry-nima\">Q40. What is a Docker Registry? | Docker Registry nima?</h3>\n<p><strong>EN:</strong> A Docker registry is a storage system for Docker images. Docker Hub is the public registry. You can also run a private registry.</p>\n<p><strong>UZ:</strong> Docker registry — Docker image'larini saqlash tizimi. Docker Hub — ommaviy registry. Xususiy registry ham ishlatish mumkin.</p>\n<pre><code class=\"language-bash\"># Xususiy registry ishga tushirish | Run private registry\ndocker run -d \\\n  -p 5000:5000 \\\n  --name private-registry \\\n  -v registry-data:/var/lib/registry \\\n  registry:2\n\n# Xususiy registry'ga push qilish | Push to private registry\ndocker tag my-app localhost:5000/my-app:1.0\ndocker push localhost:5000/my-app:1.0\n\n# Xususiy registry'dan pull | Pull from private registry\ndocker pull localhost:5000/my-app:1.0\n</code></pre>\n<hr />\n<h3 id=\"q41-how-to-restart-a-container-automatically-containerni-avtomatik-qayta-ishga-tushirish-qanday\">Q41. How to restart a container automatically? | Container'ni avtomatik qayta ishga tushirish qanday?</h3>\n<p><strong>EN:</strong> Use <code>--restart</code> flag with restart policies.</p>\n<p><strong>UZ:</strong> Qayta ishga tushirish siyosatlari bilan <code>--restart</code> flagi ishlatiladi.</p>\n<table>\n<thead>\n<tr>\n<th>Policy</th>\n<th>EN</th>\n<th>UZ</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>no</code></td>\n<td>Never restart (default)</td>\n<td>Hech qachon qayta tushmasin (standart)</td>\n</tr>\n<tr>\n<td><code>always</code></td>\n<td>Always restart</td>\n<td>Doim qayta tushsin</td>\n</tr>\n<tr>\n<td><code>on-failure</code></td>\n<td>Only on non-zero exit</td>\n<td>Faqat xato bo'lganda</td>\n</tr>\n<tr>\n<td><code>unless-stopped</code></td>\n<td>Always, unless manually stopped</td>\n<td>Qo'lda to'xtatilmaguncha</td>\n</tr>\n</tbody>\n</table>\n<pre><code class=\"language-bash\"># Production uchun | For production\ndocker run -d \\\n  --restart unless-stopped \\\n  --name my-api \\\n  my-app:1.0\n\n# Faqat xato bo'lganda, max 5 marta | On failure, max 5 times\ndocker run -d \\\n  --restart on-failure:5 \\\n  my-app:1.0\n\n# Docker Compose'da | In Docker Compose\nservices:\n  api:\n    image: my-app:1.0\n    restart: unless-stopped\n</code></pre>\n<hr />\n<h3 id=\"q42-what-is-docker-healthcheck-docker-healthcheck-nima\">Q42. What is Docker HEALTHCHECK? | Docker HEALTHCHECK nima?</h3>\n<p><strong>EN:</strong> <code>HEALTHCHECK</code> lets Docker periodically test whether a container is working correctly. Status can be: starting, healthy, unhealthy.</p>\n<p><strong>UZ:</strong> <code>HEALTHCHECK</code> — Docker'ga container to'g'ri ishlayotganini davriy tekshirish imkonini beradi. Holat: starting, healthy, unhealthy bo'lishi mumkin.</p>\n<pre><code class=\"language-dockerfile\"># Dockerfile'da | In Dockerfile\nHEALTHCHECK --interval=30s --timeout=10s --retries=3 \\\n  CMD curl -f http://localhost:8000/health || exit 1\n</code></pre>\n<pre><code class=\"language-yaml\"># Docker Compose'da | In Docker Compose\nservices:\n  api:\n    build: .\n    healthcheck:\n      test: [&quot;CMD&quot;, &quot;curl&quot;, &quot;-f&quot;, &quot;http://localhost:8000/health&quot;]\n      interval: 30s\n      timeout: 10s\n      retries: 3\n      start_period: 40s\n</code></pre>\n<pre><code class=\"language-bash\"># Salomatlik holatini ko'rish | Check health status\ndocker inspect --format='{{.State.Health.Status}}' my-container\n# healthy ✅\n</code></pre>\n<hr />\n<h3 id=\"q43-what-are-docker-best-practices-docker-best-practices-nima\">Q43. What are Docker best practices? | Docker best practices nima?</h3>\n<p><strong>EN / UZ:</strong></p>\n<pre><code class=\"language-dockerfile\"># ✅ 1. Minimal base image ishlatish | Use minimal base image\nFROM python:3.11-slim    # ← slim/alpine ≈ 10x kichik | 10x smaller\n\n# ✅ 2. Non-root foydalanuvchi | Non-root user\nRUN useradd -ms /bin/bash appuser\nUSER appuser\n\n# ✅ 3. Bir RUN buyrug'ida qo'shib yozish | Combine RUN commands\nRUN apt-get update &amp;&amp; \\\n    apt-get install -y curl &amp;&amp; \\\n    rm -rf /var/lib/apt/lists/*    # ← tozalash | cleanup\n\n# ✅ 4. Layer keshdan foydalanish | Leverage layer caching\nCOPY requirements.txt .\nRUN pip install -r requirements.txt\nCOPY . .\n\n# ✅ 5. .dockerignore ishlatish | Use .dockerignore\n# (alohida fayl | separate file)\n\n# ✅ 6. COPY &gt; ADD (agar URL/tar kerak bo'lmasa | unless URL/tar needed)\nCOPY . /app\n\n# ✅ 7. Maxfiy ma'lumotlar uchun ENV emas, Docker secrets | Don't use ENV for secrets\n# docker secret create my_secret ./secret.txt\n\n# ✅ 8. Multi-stage build (production uchun | for production)\n# (yuqoridagi namunaga qarang | see example above)\n\n# ✅ 9. HEALTHCHECK qo'shish | Add HEALTHCHECK\nHEALTHCHECK CMD curl -f http://localhost:8000/health || exit 1\n\n# ✅ 10. Image'larni teglashtirish | Tag images properly\n# docker build -t my-app:1.2.3 .    ← versiyalash | versioning\n# docker build -t my-app:latest .\n</code></pre>\n<hr />\n<h3 id=\"q44-what-is-docker-commit-docker-commit-nima\">Q44. What is Docker <code>commit</code>? | Docker <code>commit</code> nima?</h3>\n<p><strong>EN:</strong> <code>docker commit</code> creates a new image from a running container's current state. Not recommended for production — use Dockerfiles instead.</p>\n<p><strong>UZ:</strong> <code>docker commit</code> — ishlaydigan container'ning hozirgi holatidan yangi image yaratadi. Production uchun tavsiya etilmaydi — Dockerfile ishlatish yaxshiroq.</p>\n<pre><code class=\"language-bash\"># Container ichiga kirish va o'zgartirish | Enter container and modify\ndocker run -it ubuntu /bin/bash\n# apt-get install -y curl\n# exit\n\n# Yangi image sifatida saqlash | Save as new image\ndocker commit &lt;container_id&gt; my-custom-ubuntu:1.0\n\n# ✅ Yaxshiroq usul | Better way: Dockerfile\n# FROM ubuntu\n# RUN apt-get update &amp;&amp; apt-get install -y curl\n</code></pre>\n<hr />\n<h3 id=\"q45-how-to-use-environment-variables-securely-in-docker-dockerda-muhit-ozgaruvchilarini-xavfsiz-ishlatish-qanday\">Q45. How to use environment variables securely in Docker? | Docker'da muhit o'zgaruvchilarini xavfsiz ishlatish qanday?</h3>\n<p><strong>EN:</strong> Avoid hardcoding secrets in Dockerfiles or compose files. Use <code>.env</code> files, Docker secrets, or external secret managers.</p>\n<p><strong>UZ:</strong> Dockerfile yoki compose fayllarida maxfiy ma'lumotlarni qattiq yozishdan saqlaning. <code>.env</code> fayllar, Docker secrets yoki tashqi secret managerlar ishlatiladi.</p>\n<pre><code class=\"language-bash\"># .env fayli | .env file\nPOSTGRES_PASSWORD=supersecret\nJWT_SECRET=myjwtsecret\nAPI_KEY=myapikey\n</code></pre>\n<pre><code class=\"language-yaml\"># docker-compose.yml\nservices:\n  api:\n    image: my-app\n    env_file:\n      - .env            # ← .gitignore'ga qo'shing! | Add to .gitignore!\n    environment:\n      - DEBUG=false     # ← Bu xavfsiz | This is safe (not secret)\n</code></pre>\n<pre><code class=\"language-bash\"># .gitignore\n.env\n*.env\nsecrets/\n\n# Docker secret (Swarm uchun | for Swarm)\necho &quot;supersecret&quot; | docker secret create db_password -\ndocker service create \\\n  --secret db_password \\\n  my-app\n</code></pre>\n<hr />\n<h2 id=\"quick-reference-tez-qollanma\">📌 Quick Reference | Tez Qo'llanma</h2>\n<pre><code class=\"language-bash\"># ═══ IMAGE ═══════════════════════════════════════════════\ndocker pull nginx                  # Hub'dan | From Hub\ndocker build -t app:1.0 .          # Qurish | Build\ndocker images                      # Ro'yxat | List\ndocker rmi nginx                   # O'chirish | Remove\ndocker image prune -a              # Tozalash | Clean\n\n# ═══ CONTAINER ═══════════════════════════════════════════\ndocker run -d -p 8080:80 nginx    # Ishga tushirish | Run\ndocker run -it ubuntu bash        # Interaktiv | Interactive\ndocker ps                         # Ishlaydigan | Running\ndocker ps -a                      # Barchasi | All\ndocker stop &lt;id&gt;                  # To'xtatish | Stop\ndocker start &lt;id&gt;                 # Boshlash | Start\ndocker rm &lt;id&gt;                    # O'chirish | Remove\ndocker rm -f &lt;id&gt;                 # Majburan | Force remove\n\n# ═══ DEBUG ════════════════════════════════════════════════\ndocker logs -f &lt;id&gt;               # Jonli log | Live logs\ndocker exec -it &lt;id&gt; bash         # Ichiga kirish | Enter\ndocker inspect &lt;id&gt;               # Batafsil | Detailed info\ndocker stats                      # Resurslar | Resources\ndocker top &lt;id&gt;                   # Jarayonlar | Processes\n\n# ═══ VOLUME ══════════════════════════════════════════════\ndocker volume create my-vol       # Yaratish | Create\ndocker volume ls                  # Ro'yxat | List\ndocker volume rm my-vol           # O'chirish | Remove\ndocker volume prune               # Tozalash | Clean\ndocker run -v my-vol:/data nginx  # Volume ulash | Mount\n\n# ═══ NETWORK ═════════════════════════════════════════════\ndocker network ls                 # Ro'yxat | List\ndocker network create my-net      # Yaratish | Create\ndocker network connect my-net &lt;id&gt; # Ulash | Connect\ndocker network rm my-net          # O'chirish | Remove\n\n# ═══ COMPOSE ═════════════════════════════════════════════\ndocker compose up -d              # Ishga tushirish | Start\ndocker compose down               # To'xtatish | Stop\ndocker compose down -v            # To'xtatib volumelarni o'chirish | Stop + volumes\ndocker compose logs -f            # Loglar | Logs\ndocker compose ps                 # Holat | Status\ndocker compose exec api bash      # Service ichiga | Enter service\ndocker compose build              # Qayta qurish | Rebuild\n\n# ═══ SYSTEM ══════════════════════════════════════════════\ndocker system df                  # Disk | Disk usage\ndocker system prune               # Tozalash | Clean unused\ndocker system prune -a --volumes  # ⚠️ Hammasi | Everything\ndocker info                       # Tizim ma'lumoti | System info\n</code></pre>\n<hr />\n<h2 id=\"real-world-fastapi-postgresql-redis-stack\">📝 Real World: FastAPI + PostgreSQL + Redis Stack</h2>\n<pre><code class=\"language-yaml\"># docker-compose.yml — Tayyor namuna | Ready example\n\nversion: &quot;3.9&quot;\n\nservices:\n  api:\n    build:\n      context: .\n      dockerfile: Dockerfile\n    container_name: fastapi_app\n    restart: unless-stopped\n    ports:\n      - &quot;8000:8000&quot;\n    environment:\n      - DATABASE_URL=postgresql+asyncpg://admin:secret@db:5432/mydb\n      - REDIS_URL=redis://redis:6379/0\n    env_file:\n      - .env\n    depends_on:\n      db:\n        condition: service_healthy\n      redis:\n        condition: service_started\n    volumes:\n      - .:/app    # Dev uchun | For dev\n    healthcheck:\n      test: [&quot;CMD&quot;, &quot;curl&quot;, &quot;-f&quot;, &quot;http://localhost:8000/health&quot;]\n      interval: 30s\n      timeout: 10s\n      retries: 3\n\n  db:\n    image: postgres:15-alpine\n    container_name: postgres_db\n    restart: unless-stopped\n    environment:\n      POSTGRES_DB: mydb\n      POSTGRES_USER: admin\n      POSTGRES_PASSWORD: secret\n    volumes:\n      - postgres_data:/var/lib/postgresql/data\n    healthcheck:\n      test: [&quot;CMD-SHELL&quot;, &quot;pg_isready -U admin -d mydb&quot;]\n      interval: 5s\n      timeout: 5s\n      retries: 5\n\n  redis:\n    image: redis:7-alpine\n    container_name: redis_cache\n    restart: unless-stopped\n    command: redis-server --appendonly yes\n    volumes:\n      - redis_data:/data\n\n  nginx:\n    image: nginx:alpine\n    container_name: nginx_proxy\n    restart: unless-stopped\n    ports:\n      - &quot;80:80&quot;\n      - &quot;443:443&quot;\n    volumes:\n      - ./nginx/nginx.conf:/etc/nginx/nginx.conf\n    depends_on:\n      - api\n\nvolumes:\n  postgres_data:\n  redis_data:\n</code></pre>\n<pre><code class=\"language-bash\"># Ishga tushirish | Start\ndocker compose up -d\n\n# Loglarni tekshirish | Check logs\ndocker compose logs -f api\n\n# DB migratsiyasini bajarish | Run DB migration\ndocker compose exec api alembic upgrade head\n\n# To'xtatish | Stop\ndocker compose down\n</code></pre>\n<hr />\n<p><em>Prepared by | Tayyorlagan: Alyorjon</em><br />\n<em>Sources | Manbalar: Docker Docs, GeeksforGeeks, DataCamp, InterviewBit, Edureka</em></p>"}, "git": {"label": "🧰 Git", "body": "<h1 id=\"git-interview-questions-answers\">🧰 GIT Interview Questions &amp; Answers</h1>\n<h1 id=\"git-intervyu-savol-va-javoblari\">🧰 GIT Intervyu Savol va Javoblari</h1>\n<blockquote>\n<p><strong>EN:</strong> Practical Git interview questions with examples.<br />\n<strong>UZ:</strong> Amaliy misollar bilan Git intervyu savollari.</p>\n</blockquote>\n<hr />\n<h2 id=\"1-what-is-git-git-nima\">1. What is GIT? | GIT nima?</h2>\n<p><strong>EN:</strong> GIT is a distributed version control system (DVCS) designed to handle projects of any size with speed and efficiency.</p>\n<p><strong>UZ:</strong> GIT — bu taqsimlangan versiyani boshqarish tizimi. Kichik va katta loyihalarni tezlik va samaradorlik bilan boshqarish uchun mo'ljallangan.</p>\n<pre><code class=\"language-bash\"># Check Git version | Git versiyasini tekshirish\ngit --version\n# git version 2.42.0\n</code></pre>\n<hr />\n<h2 id=\"2-what-is-distributed-control-system-taqsimlangan-boshqaruv-tizimi-nima\">2. What is Distributed Control System? | Taqsimlangan boshqaruv tizimi nima?</h2>\n<p><strong>EN:</strong> You work on your local machine and transfer code to a centralized repository (GitHub) later. You don't need a constant internet connection to work.</p>\n<p><strong>UZ:</strong> Siz o'z local mashinangizda ishlaysiz, keyin kodni markaziy repoga (GitHub) yuborasiz. Ishlash uchun doim internet kerak emas.</p>\n<pre><code>[Local Machine | Local Mashina]\n        |\n      push/pull\n        |\n[GitHub (Centralized | Markaziy)]\n</code></pre>\n<hr />\n<h2 id=\"3-what-is-git-version-control-git-versiyani-boshqarish-nima\">3. What is GIT version control? | GIT versiyani boshqarish nima?</h2>\n<p><strong>EN:</strong> Git tracks the history of your files. Each commit is a snapshot of your files at a specific point in time. You can revert to any snapshot.</p>\n<p><strong>UZ:</strong> Git fayllar tarixini kuzatib boradi. Har bir commit — fayllarning o'sha vaqtdagi \"surati\" (snapshot). Istalgan vaqtga qaytish mumkin.</p>\n<pre><code class=\"language-bash\">git log --oneline\n# a1b2c3d Add login feature     &lt;- snapshot 3\n# f4e5d6c Fix database bug      &lt;- snapshot 2\n# 9c8b7a6 Initial commit        &lt;- snapshot 1\n\n# Revert to a snapshot | Snapshotga qaytish\ngit checkout 9c8b7a6\n</code></pre>\n<hr />\n<h2 id=\"4-what-is-difference-between-svn-and-git-svn-va-git-farqi-nima\">4. What is difference between SVN and Git? | SVN va Git farqi nima?</h2>\n<p><strong>EN:</strong> SVN is centralized — you must be connected to the server. Git is distributed — you work locally and sync when ready.</p>\n<p><strong>UZ:</strong> SVN markazlashgan — serverga doim ulangan bo'lishingiz kerak. Git taqsimlangan — local ishlaysiz, tayyor bo'lganda sinxronlaysiz.</p>\n<table>\n<thead>\n<tr>\n<th>SVN</th>\n<th>GIT</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Centralized (Markazlashgan)</td>\n<td>Distributed (Taqsimlangan)</td>\n</tr>\n<tr>\n<td>Internet required always (Doim internet kerak)</td>\n<td>Works offline (Oflayn ishlaydi)</td>\n</tr>\n<tr>\n<td>Direct server connection (Server bilan to'g'ridan-to'g'ri)</td>\n<td>3 stages: workspace → staging → local repo</td>\n</tr>\n</tbody>\n</table>\n<pre><code class=\"language-bash\"># GIT 3 bosqichi | GIT 3 stages\n# [Workspace] --git add--&gt; [Staging] --git commit--&gt; [Local Repo] --git push--&gt; [GitHub]\n</code></pre>\n<hr />\n<h2 id=\"5-what-is-a-repository-in-git-gitda-repository-nima\">5. What is a repository in GIT? | GIT'da repository nima?</h2>\n<p><strong>EN:</strong> A Git repository contains the complete history of all files in a project.</p>\n<p><strong>UZ:</strong> Git repository — loyihaning barcha fayllari va ularning to'liq o'zgarish tarixini o'z ichiga oluvchi joy.</p>\n<pre><code class=\"language-bash\">ls -la my-project/\n# .git/        &lt;- tarix shu yerda | history is here\n# app.py\n# README.md\n</code></pre>\n<hr />\n<h2 id=\"6-how-can-you-create-a-local-repository-in-git-local-repository-qanday-yaratiladi\">6. How can you create a local repository in Git? | Local repository qanday yaratiladi?</h2>\n<p><strong>EN:</strong> Use <code>git init</code> to create a new local repository.</p>\n<p><strong>UZ:</strong> Yangi local repository yaratish uchun <code>git init</code> buyrug'i ishlatiladi.</p>\n<pre><code class=\"language-bash\">mkdir my-app\ncd my-app\ngit init\n# Initialized empty Git repository in /my-app/.git/\n</code></pre>\n<hr />\n<h2 id=\"7-what-is-bare-repository-in-git-gitda-bare-repository-nima\">7. What is 'bare repository' in GIT? | GIT'da 'bare repository' nima?</h2>\n<p><strong>EN:</strong> A bare repository contains only version control information — no working files, no <code>.git</code> subdirectory. Used on servers.</p>\n<p><strong>UZ:</strong> Bare repository faqat versiya ma'lumotlarini saqlaydi — working fayllar yo'q, <code>.git</code> papkasi yo'q. Serverda ishlatiladi.</p>\n<pre><code class=\"language-bash\">git init --bare my-project.git\n# Server tomonda ishlatiladi | Used on server side\n# Odatda GitHub/GitLab shu tarzda saqlaydi | GitHub/GitLab stores this way\n</code></pre>\n<hr />\n<h2 id=\"8-how-to-configure-github-repository-locally-github-repositoryni-local-sozlash-qanday\">8. How to configure GitHub repository locally? | GitHub repositoryni local sozlash qanday?</h2>\n<p><strong>EN:</strong> Set your global username and email before making commits.</p>\n<p><strong>UZ:</strong> Commit qilishdan oldin global ism va emailni sozlang.</p>\n<pre><code class=\"language-bash\">git config --global user.name &quot;Alyorjon&quot;\ngit config --global user.email &quot;alyorjon@example.com&quot;\n\n# Check settings | Sozlamalarni tekshirish\ngit config --list\n</code></pre>\n<hr />\n<h2 id=\"9-how-to-create-alias-to-git-commands-git-buyruqlariga-alias-qanday-yaratiladi\">9. How to Create Alias to git commands? | Git buyruqlariga Alias qanday yaratiladi?</h2>\n<p><strong>EN:</strong> Aliases let you create shortcuts for long Git commands.</p>\n<p><strong>UZ:</strong> Alias — uzun Git buyruqlariga qisqa nom berish imkoniyati.</p>\n<pre><code class=\"language-bash\"># Create alias | Alias yaratish\ngit config --global alias.lo &quot;log --oneline&quot;\n\n# Use it | Ishlatish\ngit lo\n# a1b2c3d Add login feature\n# f4e5d6c Fix bug\n\n# Remove alias | Aliasni o'chirish\ngit config --global --unset alias.lo\n\n# Remove username | Username o'chirish\ngit config --global --unset user.name\n</code></pre>\n<hr />\n<h2 id=\"10-what-is-the-git-clone-git-clone-nima\">10. What is the git clone? | git clone nima?</h2>\n<p><strong>EN:</strong> Download an existing repository from GitHub (or any remote) to your local machine.</p>\n<p><strong>UZ:</strong> GitHub'dagi mavjud reponi local mashinaga yuklab olish.</p>\n<pre><code class=\"language-bash\">git clone https://github.com/username/my-project.git\n\n# Clone to specific folder | Aniq papkaga clone qilish\ngit clone https://github.com/username/my-project.git ./my-folder\n</code></pre>\n<hr />\n<h2 id=\"11-what-is-git-add-git-add-nima\">11. What is 'git add'? | 'git add' nima?</h2>\n<p><strong>EN:</strong> Move files from the working area to the staging (index) area.</p>\n<p><strong>UZ:</strong> Fayllarni working area'dan staging (index) areaga o'tkazish.</p>\n<pre><code class=\"language-bash\"># Single file | Bitta fayl\ngit add index.py\n\n# Multiple files | Bir nechta fayl\ngit add index.py models.py\n\n# All files | Barcha fayllar\ngit add .\n</code></pre>\n<hr />\n<h2 id=\"12-what-is-staging-area-staging-area-nima\">12. What is Staging Area? | Staging Area nima?</h2>\n<p><strong>EN:</strong> The staging area is a \"holding area\" between working files and commits. You review and format changes here before committing.</p>\n<p><strong>UZ:</strong> Staging area — working fayllar va commitlar orasidagi \"kutish zonasi\". Commit qilishdan oldin o'zgarishlarni ko'rib chiqish va tartibga solish joyi.</p>\n<pre><code class=\"language-bash\">git status\n# Changes to be committed:       &lt;- Staging areada | In staging area\n#   new file:   app.py\n#\n# Changes not staged for commit: &lt;- Working areada | In working area\n#   modified:   config.py\n</code></pre>\n<hr />\n<h2 id=\"13-what-is-the-use-of-git-log-git-log-nima-uchun-ishlatiladi\">13. What is the use of 'git log'? | 'git log' nima uchun ishlatiladi?</h2>\n<p><strong>EN:</strong> View the commit history. Filter by author, date, message, and more.</p>\n<p><strong>UZ:</strong> Commitlar tarixini ko'rish. Muallif, sana, xabar bo'yicha filtrlash mumkin.</p>\n<pre><code class=\"language-bash\">git log                           # Full log | To'liq log\ngit log -5                        # Last 5 commits | Oxirgi 5 ta\ngit log --oneline                 # One line per commit | Har commit bir qatorda\ngit log --since=2024-01-01        # After date | Sanadan keyin\ngit log --until=2024-12-31        # Before date | Sanagacha\ngit log --author=&quot;Alyorjon&quot;       # By author | Muallif bo'yicha\ngit log --grep=&quot;login&quot;            # Search in message | Xabarda qidirish\ngit log --oneline --author=&quot;Alyorjon&quot;\n</code></pre>\n<hr />\n<h2 id=\"14-how-can-we-add-and-commit-at-the-same-time-qanday-qilib-bir-vaqtda-add-va-commit-qilish-mumkin\">14. How can we add and commit at the same time? | Qanday qilib bir vaqtda add va commit qilish mumkin?</h2>\n<p><strong>EN:</strong> Use <code>git commit -a -m</code> to stage all tracked files and commit in one step.</p>\n<p><strong>UZ:</strong> <code>git commit -a -m</code> buyrug'i track qilingan barcha fayllarni bir vaqtda staging va commit qiladi.</p>\n<pre><code class=\"language-bash\">git commit -a -m &quot;Update login logic&quot;\n\n# ⚠️ EN: New (untracked) files still need git add first!\n# ⚠️ UZ: Yangi (untracked) fayllar uchun avval git add kerak!\n</code></pre>\n<hr />\n<h2 id=\"15-how-to-edit-an-incorrect-commit-message-notogri-commit-xabarini-qanday-ozgartirish-mumkin\">15. How to edit an incorrect commit message? | Noto'g'ri commit xabarini qanday o'zgartirish mumkin?</h2>\n<p><strong>EN:</strong> Use <code>git commit --amend</code> to change the most recent commit message.</p>\n<p><strong>UZ:</strong> <code>git commit --amend</code> buyrug'i faqat oxirgi commit xabarini o'zgartiradi.</p>\n<pre><code class=\"language-bash\">git commit --amend -m &quot;Correct commit message here&quot;\n\n# ⚠️ EN: Only works on the last commit. Don't amend pushed commits!\n# ⚠️ UZ: Faqat oxirgi commitga ishlaydi. Push qilingan commitni amend qilmang!\n</code></pre>\n<hr />\n<h2 id=\"16-how-to-get-back-a-commit-to-staging-area-commitni-staging-areaga-qanday-qaytarish-mumkin\">16. How to get back a commit to staging area? | Commitni staging areaga qanday qaytarish mumkin?</h2>\n<p><strong>EN:</strong> Use <code>git reset --soft</code> to undo a commit while keeping changes in the staging area.</p>\n<p><strong>UZ:</strong> <code>git reset --soft</code> — commitni bekor qiladi, o'zgarishlar staging areada qoladi.</p>\n<pre><code class=\"language-bash\">git log --oneline\n# a1b2c3d Latest commit   &lt;- buni bekor qilamiz | undo this\n# f4e5d6c Previous commit &lt;- shunga qaytamiz | go back to this\n\ngit reset --soft f4e5d6c\n# a1b2c3d ning o'zgarishlari staging areada | changes are in staging\n</code></pre>\n<hr />\n<h2 id=\"17-how-to-get-back-a-file-from-staging-area-to-working-area-faylni-staging-areadan-working-areaga-qanday-qaytarish-mumkin\">17. How to get back a file from staging area to working area? | Faylni staging areadan working areaga qanday qaytarish mumkin?</h2>\n<p><strong>EN:</strong> Unstage a file without losing its changes.</p>\n<p><strong>UZ:</strong> O'zgarishlarni yo'qotmasdan faylni staging areadan chiqarish.</p>\n<pre><code class=\"language-bash\">git add config.py          # Staged | Staging areaga qo'shildi\ngit reset HEAD config.py   # Unstaged | Working areaga qaytdi\n\n# Modern way | Zamonaviy usul\ngit restore --staged config.py\n</code></pre>\n<hr />\n<h2 id=\"18-how-to-get-back-a-commit-to-work-area-commitni-work-areaga-qanday-qaytarish-mumkin\">18. How to get back a commit to work area? | Commitni work areaga qanday qaytarish mumkin?</h2>\n<p><strong>EN:</strong> Use <code>git reset --mixed</code> to undo commits and put changes back in the working area (not staged).</p>\n<p><strong>UZ:</strong> <code>git reset --mixed</code> — commitni bekor qiladi, o'zgarishlar working areaga tushadi (staged emas).</p>\n<pre><code class=\"language-bash\">git reset --mixed f4e5d6c\n# O'zgarishlar working areada, stage qilinmagan | Changes in working area, not staged\n</code></pre>\n<hr />\n<h2 id=\"19-what-is-git-reset-git-reset-nima\">19. What is git reset? | git reset nima?</h2>\n<p><strong>EN:</strong> Reset the current HEAD to a specific state.</p>\n<p><strong>UZ:</strong> HEAD holatini ma'lum commitga qaytarish.</p>\n<table>\n<thead>\n<tr>\n<th>Flag</th>\n<th>EN</th>\n<th>UZ</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>--soft</code></td>\n<td>Changes go to staging</td>\n<td>O'zgarishlar staging'ga</td>\n</tr>\n<tr>\n<td><code>--mixed</code></td>\n<td>Changes go to working area</td>\n<td>O'zgarishlar working area'ga</td>\n</tr>\n<tr>\n<td><code>--hard</code></td>\n<td>Changes are deleted ⚠️</td>\n<td>O'zgarishlar o'chadi ⚠️</td>\n</tr>\n</tbody>\n</table>\n<pre><code class=\"language-bash\">git reset --hard HEAD~1   # EN: Deletes last commit completely! | UZ: Oxirgi commitni butunlay o'chiradi!\n</code></pre>\n<hr />\n<h2 id=\"20-what-is-head-in-git-gitda-head-nima\">20. What is 'head' in git? | Git'da 'head' nima?</h2>\n<p><strong>EN:</strong> HEAD is a pointer to the current commit or branch. Default HEAD points to <code>main</code> (or <code>master</code>).</p>\n<p><strong>UZ:</strong> HEAD — hozirgi commit yoki branchga ishora. Default HEAD <code>main</code> (yoki <code>master</code>) branchiga ko'rsatadi.</p>\n<pre><code class=\"language-bash\">cat .git/HEAD\n# ref: refs/heads/main\n\ngit log --oneline\n# a1b2c3d (HEAD -&gt; main) Latest commit\n</code></pre>\n<hr />\n<h2 id=\"21-what-is-gitignore-file-gitignore-fayli-nima\">21. What is .gitignore file? | .gitignore fayli nima?</h2>\n<p><strong>EN:</strong> <code>.gitignore</code> lists files and folders that Git should not track.</p>\n<p><strong>UZ:</strong> <code>.gitignore</code> — Git kuzatmasligi kerak bo'lgan fayllar va papkalar ro'yxati.</p>\n<pre><code class=\"language-bash\"># .gitignore fayli tarkibi | .gitignore file content\n__pycache__/\n*.pyc\n.env           # Secret keys | Maxfiy kalitlar\nvenv/          # Virtual environment\n.idea/         # IDE files | IDE fayllari\n*.log          # Log files | Log fayllar\n\n# Add to git | Git'ga qo'shish\ngit add .gitignore\ngit commit -m &quot;Add .gitignore&quot;\n</code></pre>\n<hr />\n<h2 id=\"22-how-to-see-the-difference-between-2-commits-2-commit-orasidagi-farqni-qanday-korish-mumkin\">22. How to see the difference between 2 commits? | 2 commit orasidagi farqni qanday ko'rish mumkin?</h2>\n<p><strong>EN:</strong> Use <code>git diff</code> with two commit IDs to see what changed between them.</p>\n<p><strong>UZ:</strong> Ikki commit ID bilan <code>git diff</code> ishlatib, ular orasidagi farqni ko'rish mumkin.</p>\n<pre><code class=\"language-bash\">git log --oneline\n# a1b2c3d Add payment feature\n# f4e5d6c Add login feature\n\ngit diff f4e5d6c..a1b2c3d\n# + qo'shilgan qatorlar | added lines (green)\n# - o'chirilgan qatorlar | removed lines (red)\n</code></pre>\n<hr />\n<h2 id=\"23-how-to-recover-a-deleted-file-ochirilgan-faylni-qanday-qaytarish-mumkin\">23. How to recover a deleted file? | O'chirilgan faylni qanday qaytarish mumkin?</h2>\n<p><strong>EN:</strong> If a file was tracked (staged or committed), you can restore it.</p>\n<p><strong>UZ:</strong> Agar fayl track qilingan bo'lsa (staged yoki committed), uni qaytarib olish mumkin.</p>\n<pre><code class=\"language-bash\"># EN: File was deleted accidentally | UZ: Fayl tasodifan o'chirildi\nrm important_file.py\n\ngit checkout -- important_file.py\n\n# Modern way | Zamonaviy usul\ngit restore important_file.py\n</code></pre>\n<hr />\n<h2 id=\"24-how-to-create-a-branch-branch-qanday-yaratiladi\">24. How to create a branch? | Branch qanday yaratiladi?</h2>\n<p><strong>EN:</strong> Use <code>git branch</code> to create a new branch.</p>\n<p><strong>UZ:</strong> Yangi branch yaratish uchun <code>git branch</code> buyrug'i ishlatiladi.</p>\n<pre><code class=\"language-bash\">git branch feature/login\n\ngit branch\n# * main              &lt;- hozirgi branch | current branch\n#   feature/login     &lt;- yangi branch | new branch\n</code></pre>\n<hr />\n<h2 id=\"25-how-to-checkout-to-branch-branchga-qanday-otish-mumkin\">25. How to checkout to branch? | Branchga qanday o'tish mumkin?</h2>\n<p><strong>EN:</strong> Switch to an existing branch with <code>git checkout</code> or the modern <code>git switch</code>.</p>\n<p><strong>UZ:</strong> Mavjud branchga o'tish uchun <code>git checkout</code> yoki zamonaviy <code>git switch</code> ishlatiladi.</p>\n<pre><code class=\"language-bash\">git checkout feature/login\n\n# Modern way | Zamonaviy usul\ngit switch feature/login\n</code></pre>\n<hr />\n<h2 id=\"26-how-to-create-branch-while-checkout-branch-yaratib-bir-vaqtda-otish-qanday\">26. How to create branch while checkout? | Branch yaratib, bir vaqtda o'tish qanday?</h2>\n<p><strong>EN:</strong> Create and switch to a new branch in one command.</p>\n<p><strong>UZ:</strong> Bir buyruq bilan branch yaratib, unga o'tish.</p>\n<pre><code class=\"language-bash\">git checkout -b feature/register\n\n# Modern way | Zamonaviy usul\ngit switch -c feature/register\n</code></pre>\n<hr />\n<h2 id=\"27-how-do-you-rename-the-local-branch-local-branchni-qanday-rename-qilish-mumkin\">27. How do you rename the local branch? | Local branchni qanday rename qilish mumkin?</h2>\n<p><strong>EN:</strong> Use <code>git branch -m</code> to rename a branch.</p>\n<p><strong>UZ:</strong> Branch nomini o'zgartirish uchun <code>git branch -m</code> ishlatiladi.</p>\n<pre><code class=\"language-bash\">git branch -m old-branch-name new-branch-name\n\n# EN: Rename current branch | UZ: Hozirgi branchni rename qilish\ngit branch -m new-branch-name\n</code></pre>\n<hr />\n<h2 id=\"28-how-to-see-the-branch-list-branch-royxatini-qanday-korish-mumkin\">28. How to see the branch list? | Branch ro'yxatini qanday ko'rish mumkin?</h2>\n<p><strong>EN:</strong> List all local branches.</p>\n<p><strong>UZ:</strong> Barcha local branchlarni ko'rish.</p>\n<pre><code class=\"language-bash\">git branch\n# * main              &lt;- active branch | faol branch\n#   feature/login\n#   hotfix/bug-42\n</code></pre>\n<hr />\n<h2 id=\"29-how-to-see-the-remote-branch-list-remote-branch-royxatini-qanday-korish-mumkin\">29. How to see the remote branch list? | Remote branch ro'yxatini qanday ko'rish mumkin?</h2>\n<p><strong>EN:</strong> List all remote branches.</p>\n<p><strong>UZ:</strong> Barcha remote branchlarni ko'rish.</p>\n<pre><code class=\"language-bash\">git branch -r\n# origin/main\n# origin/feature/login\n\n# Detailed view | Batafsil ko'rinish\ngit remote show origin\n</code></pre>\n<hr />\n<h2 id=\"30-how-to-see-the-local-and-remote-branch-list-local-va-remote-branchlarni-birga-qanday-korish-mumkin\">30. How to see the local and remote branch list? | Local va remote branchlarni birga qanday ko'rish mumkin?</h2>\n<p><strong>EN:</strong> Use <code>-a</code> flag to see all branches (local + remote).</p>\n<p><strong>UZ:</strong> Barcha branchlarni (local + remote) ko'rish uchun <code>-a</code> flag ishlatiladi.</p>\n<pre><code class=\"language-bash\">git branch -a\n# * main\n#   feature/login\n#   remotes/origin/main\n#   remotes/origin/feature/login\n</code></pre>\n<hr />\n<h2 id=\"31-how-to-delete-a-branch-branchni-qanday-ochirish-mumkin\">31. How to delete a branch? | Branchni qanday o'chirish mumkin?</h2>\n<p><strong>EN:</strong> <code>-d</code> deletes safely (only if merged), <code>-D</code> forces deletion.</p>\n<p><strong>UZ:</strong> <code>-d</code> xavfsiz o'chiradi (faqat merge qilingan bo'lsa), <code>-D</code> majburiy o'chiradi.</p>\n<pre><code class=\"language-bash\"># Safe delete | Xavfsiz o'chirish (merge bo'lgan bo'lsa)\ngit branch -d feature/login\n\n# Force delete | Majburiy o'chirish\ngit branch -D feature/login\n</code></pre>\n<hr />\n<h2 id=\"32-how-to-delete-a-remote-branch-remote-branchni-qanday-ochirish-mumkin\">32. How to delete a Remote Branch? | Remote Branchni qanday o'chirish mumkin?</h2>\n<p><strong>EN:</strong> Delete a branch from the remote repository.</p>\n<p><strong>UZ:</strong> Remote repositorydan branchni o'chirish.</p>\n<pre><code class=\"language-bash\">git push origin -d feature/login\n\n# Alternative | Muqobil usul\ngit push origin --delete feature/login\n</code></pre>\n<hr />\n<h2 id=\"33-how-to-see-the-difference-between-2-branches-2-branch-orasidagi-farqni-qanday-korish-mumkin\">33. How to see the difference between 2 branches? | 2 branch orasidagi farqni qanday ko'rish mumkin?</h2>\n<p><strong>EN:</strong> Compare what changed between two branches.</p>\n<p><strong>UZ:</strong> Ikki branch orasidagi o'zgarishlarni solishtirish.</p>\n<pre><code class=\"language-bash\">git diff main..feature/login\n# EN: Shows what feature/login has that main doesn't\n# UZ: feature/login'da bor, main'da yo'q narsalarni ko'rsatadi\n</code></pre>\n<hr />\n<h2 id=\"34-what-is-git-push-git-push-nima\">34. What is git push? | git push nima?</h2>\n<p><strong>EN:</strong> Send your local commits to the remote repository.</p>\n<p><strong>UZ:</strong> Local commitlarni remote (GitHub) repoga yuborish.</p>\n<pre><code class=\"language-bash\">git push origin main\n\n# EN: Push with tracking | UZ: Tracking bilan push\ngit push -u origin main\n# Keyingi safar oddiy &quot;git push&quot; ishlaydi | Next time plain &quot;git push&quot; works\n</code></pre>\n<hr />\n<h2 id=\"35-how-do-you-push-the-files-to-master-branch-in-remote-repo-fayllarni-remote-reponing-master-branchiga-qanday-push-qilish-mumkin\">35. How do you push the files to master branch in remote repo? | Fayllarni remote repo'ning master branchiga qanday push qilish mumkin?</h2>\n<p><strong>EN:</strong> Make sure you're on the main/master branch, then push.</p>\n<p><strong>UZ:</strong> main/master branchida turib push qiling.</p>\n<pre><code class=\"language-bash\">git checkout main\ngit push\n\n# yoki aniq ko'rsatish | or explicitly\ngit push origin main\n</code></pre>\n<hr />\n<h2 id=\"36-how-do-you-push-files-from-local-to-particular-branch-localdan-malum-branchga-fayllarni-qanday-push-qilish-mumkin\">36. How do you push files from local to particular branch? | Local'dan ma'lum branchga fayllarni qanday push qilish mumkin?</h2>\n<p><strong>EN:</strong> Specify the branch name when pushing.</p>\n<p><strong>UZ:</strong> Push qilganda branch nomini ko'rsating.</p>\n<pre><code class=\"language-bash\">git push origin feature/login\n\n# Set upstream for future pushes | Keyingi push'lar uchun upstream o'rnatish\ngit push --set-upstream origin feature/login\n# Keyin | Then: git push (enough)\n</code></pre>\n<hr />\n<h2 id=\"37-how-to-push-new-branch-to-remote-yangi-branchni-remotega-qanday-push-qilish-mumkin\">37. How to push new branch to remote? | Yangi branchni remote'ga qanday push qilish mumkin?</h2>\n<p><strong>EN:</strong> Create a branch locally and push it to remote for the first time.</p>\n<p><strong>UZ:</strong> Local'da branch yaratib, birinchi marta remote'ga yuborish.</p>\n<pre><code class=\"language-bash\">git checkout -b feature/payment\n# ... ishlar qilinadi | ... do some work ...\ngit add .\ngit commit -m &quot;Add payment module&quot;\ngit push origin feature/payment\n</code></pre>\n<hr />\n<h2 id=\"38-what-is-git-pull-git-pull-nima\">38. What is git pull? | git pull nima?</h2>\n<p><strong>EN:</strong> Download and merge changes from a remote branch into your local branch. Equivalent to <code>fetch + merge</code>.</p>\n<p><strong>UZ:</strong> Remote branchdagi o'zgarishlarni yuklab, local branchga birlashtirish. <code>fetch + merge</code> ga teng.</p>\n<pre><code class=\"language-bash\">git pull\n# = git fetch + git merge\n\n# EN: If you have local changes, stash first\n# UZ: Local o'zgarishlar bo'lsa, avval stash qiling\ngit stash save &quot;my work&quot;\ngit pull\ngit stash pop\n</code></pre>\n<hr />\n<h2 id=\"39-how-do-you-pull-a-file-from-particular-remote-branch-malum-remote-branchdan-qanday-pull-qilish-mumkin\">39. How do you pull a file from particular remote branch? | Ma'lum remote branchdan qanday pull qilish mumkin?</h2>\n<p><strong>EN:</strong> Specify the remote and branch name.</p>\n<p><strong>UZ:</strong> Remote va branch nomini ko'rsating.</p>\n<pre><code class=\"language-bash\">git pull origin feature/login\n</code></pre>\n<hr />\n<h2 id=\"40-how-do-you-download-a-remote-branch-to-local-without-merge-remote-branchni-merge-qilmasdan-localga-qanday-yuklab-olish-mumkin\">40. How do you download a remote branch to local without merge? | Remote branchni merge qilmasdan local'ga qanday yuklab olish mumkin?</h2>\n<p><strong>EN:</strong> Use <code>git fetch</code> to download without merging, then checkout to that branch.</p>\n<p><strong>UZ:</strong> Merge qilmasdan yuklab olish uchun <code>git fetch</code>, keyin branchga o'tish.</p>\n<pre><code class=\"language-bash\">git fetch origin feature/login\ngit checkout feature/login\n</code></pre>\n<hr />\n<h2 id=\"41-what-is-git-fetch-git-fetch-nima\">41. What is git Fetch? | git Fetch nima?</h2>\n<p><strong>EN:</strong> Downloads new data from remote but doesn't merge it into your local branch. Just provides a view of remote changes.</p>\n<p><strong>UZ:</strong> Remote'dan yangi ma'lumotlarni yuklab oladi, lekin local branchga birlashtirmaydi. Faqat ko'rish imkonini beradi.</p>\n<pre><code class=\"language-bash\">git fetch origin\n# EN: Remote changes downloaded but not applied\n# UZ: Remote o'zgarishlar yuklandi, lekin qo'llanilmadi\n\ngit fetch origin feature/login\ngit checkout feature/login  # O'tish | Switch to it\n</code></pre>\n<hr />\n<h2 id=\"42-what-is-difference-between-git-clone-git-pull-git-clone-va-git-pull-farqi-nima\">42. What is difference between git clone &amp; git pull? | git clone va git pull farqi nima?</h2>\n<p><strong>EN:</strong> Clone is for first-time download; pull is for updating an existing local repo.</p>\n<p><strong>UZ:</strong> Clone — birinchi marta yuklab olish; pull — mavjud local reponi yangilash.</p>\n<table>\n<thead>\n<tr>\n<th></th>\n<th>git clone</th>\n<th>git pull</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>EN</td>\n<td>First time, no local repo</td>\n<td>Repo exists, get updates</td>\n</tr>\n<tr>\n<td>UZ</td>\n<td>Birinchi marta, local repo yo'q</td>\n<td>Repo mavjud, yangilanish olish</td>\n</tr>\n</tbody>\n</table>\n<pre><code class=\"language-bash\"># First time | Birinchi marta\ngit clone https://github.com/username/project.git\n\n# Next time | Keyingi safar\ncd project\ngit pull\n</code></pre>\n<hr />\n<h2 id=\"43-what-is-git-merge-git-merge-nima\">43. What is git merge? | git merge nima?</h2>\n<p><strong>EN:</strong> Combine two branches into one.</p>\n<p><strong>UZ:</strong> Ikki branchni birlashtirish.</p>\n<pre><code class=\"language-bash\">git checkout main           # EN: Switch to target branch | UZ: Target branchga o'tish\ngit merge feature/login     # EN: Bring feature into main | UZ: Feature'ni main'ga olib keling\n\n# EN: Check result | UZ: Natijani ko'rish\ngit log --oneline\n# a1b2c3d Merge branch 'feature/login'\n</code></pre>\n<hr />\n<h2 id=\"44-what-is-git-conflict-git-conflict-nima\">44. What is git conflict? | git conflict nima?</h2>\n<p><strong>EN:</strong> When two people edit the same lines in the same file on different branches, a merge conflict occurs.</p>\n<p><strong>UZ:</strong> Ikkita kishi turli branchlarda bir faylning bir qatorini o'zgartirsa, merge conflict yuzaga keladi.</p>\n<pre><code class=\"language-bash\">git merge feature/login\n# CONFLICT (content): Merge conflict in app.py\n</code></pre>\n<pre><code class=\"language-python\"># app.py — conflict ko'rinishi | conflict view\n&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD (main branch)\ndef login():\n    return &quot;main version&quot;\n=======\ndef login():\n    return &quot;feature version&quot;\n&gt;&gt;&gt;&gt;&gt;&gt;&gt; feature/login\n</code></pre>\n<hr />\n<h2 id=\"45-how-do-you-resolve-merge-conflict-merge-conflictni-qanday-hal-qilish-mumkin\">45. How do you resolve merge conflict? | Merge conflictni qanday hal qilish mumkin?</h2>\n<p><strong>EN:</strong> Edit the conflicting file manually, then stage and commit.</p>\n<p><strong>UZ:</strong> Conflict bo'lgan faylni qo'lda tahrirlang, keyin add va commit qiling.</p>\n<pre><code class=\"language-bash\"># 1. EN: Open file and fix it | UZ: Faylni oching va to'g'rilang\n# 2. EN: Remove &lt;&lt;&lt;&lt;, ====, &gt;&gt;&gt;&gt; markers | UZ: &lt;&lt;&lt;&lt;, ====, &gt;&gt;&gt;&gt; belgilarini o'chiring\n# 3. EN: Keep the correct code | UZ: To'g'ri kodni qoldiring\n\ngit add app.py\ngit commit -m &quot;Resolve merge conflict in app.py&quot;\n</code></pre>\n<hr />\n<h2 id=\"46-how-do-you-skip-from-merge-conflict-merge-conflictdan-qanday-chiqish-mumkin\">46. How do you skip from merge conflict? | Merge conflictdan qanday chiqish mumkin?</h2>\n<p><strong>EN:</strong> Abort the merge to return to the state before it started.</p>\n<p><strong>UZ:</strong> Merge'ni bekor qilib, oldingi holatga qaytish.</p>\n<pre><code class=\"language-bash\">git merge --abort\n# EN: Everything returns to before merge | UZ: Hamma narsa merge oldidagi holatga qaytadi\n</code></pre>\n<hr />\n<h2 id=\"47-what-is-the-function-of-git-rm-git-rm-vazifasi-nima\">47. What is the function of 'git rm'? | 'git rm' vazifasi nima?</h2>\n<p><strong>EN:</strong> Remove a file from the working area and staging area (and disk). Unlike plain <code>rm</code>, it can be reverted with Git.</p>\n<p><strong>UZ:</strong> Faylni working area, staging area va diskdan o'chirish. Oddiy <code>rm</code> dan farqli, Git orqali qaytarib olish mumkin.</p>\n<pre><code class=\"language-bash\">git rm old_file.py\ngit commit -m &quot;Remove old_file.py&quot;\n\n# EN: Remove from tracking only (keep file on disk)\n# UZ: Faqat tracking'dan olib tashlash (fayl diskda qoladi)\ngit rm --cached secret.env\necho &quot;secret.env&quot; &gt;&gt; .gitignore\n</code></pre>\n<hr />\n<h2 id=\"48-how-will-you-know-if-a-branch-has-been-already-merged-branch-merge-qilinganmi-yoki-yoqligini-qanday-bilish-mumkin\">48. How will you know if a branch has been already merged? | Branch merge qilinganmi yoki yo'qligini qanday bilish mumkin?</h2>\n<p><strong>EN:</strong> Use <code>--merged</code> and <code>--no-merged</code> flags.</p>\n<p><strong>UZ:</strong> <code>--merged</code> va <code>--no-merged</code> flaglarini ishlatish.</p>\n<pre><code class=\"language-bash\">git branch --merged\n# * main\n#   feature/login   &lt;- EN: already merged | UZ: allaqachon merge qilingan\n\ngit branch --no-merged\n#   feature/payment &lt;- EN: not yet merged | UZ: hali merge qilinmagan\n</code></pre>\n<hr />\n<h2 id=\"49-what-is-branching-branching-nima\">49. What is branching? | Branching nima?</h2>\n<p><strong>EN:</strong> Branching allows you to work on different versions of a project independently. You can switch between branches without affecting others.</p>\n<p><strong>UZ:</strong> Branching — loyihaning turli versiyalarida mustaqil ishlash imkoniyati. Boshqalarga ta'sir etmasdan branchlar orasida almashish mumkin.</p>\n<pre><code>main         ---A---B---C-----------D (production)\n                         \\         /\nfeature/login             E---F---G (new feature | yangi feature)\n</code></pre>\n<pre><code class=\"language-bash\">git checkout -b feature/login  # Yangi branch | New branch\n# ... ishlash | work ...\ngit checkout main\ngit merge feature/login        # Birlashtirish | Merge\n</code></pre>\n<hr />\n<h2 id=\"50-what-is-the-criteria-to-merge-two-branches-ikki-branchni-merge-qilish-mezoni-nima\">50. What is the criteria to merge two branches? | Ikki branchni merge qilish mezoni nima?</h2>\n<p><strong>EN:</strong> Merge when a feature/module is complete, tested, and reviewed.</p>\n<p><strong>UZ:</strong> Feature/modul to'liq tayyor, test o'tgan va code review bo'lganda merge qilinadi.</p>\n<pre><code class=\"language-bash\"># EN: Typical workflow | UZ: Odatiy ish oqimi\n# 1. feature/login -&gt; development (testing)\n# 2. development -&gt; staging (QA)\n# 3. staging -&gt; main (production)\n\ngit checkout development\ngit merge feature/login\n</code></pre>\n<hr />\n<h2 id=\"51-describe-branching-strategy-you-have-used-qanday-branching-strategiyasini-ishlatgansiz\">51. Describe branching strategy you have used? | Qanday branching strategiyasini ishlatgansiz?</h2>\n<p><strong>EN / UZ:</strong></p>\n<h3 id=\"feature-branching\">Feature Branching</h3>\n<pre><code class=\"language-bash\"># EN: Each feature gets its own branch\n# UZ: Har bir feature o'z branchiga ega\ngit checkout -b feature/user-auth\n# ... ishlash | work ...\ngit merge feature/user-auth  # test o'tgach | after testing\n</code></pre>\n<h3 id=\"task-branching\">Task Branching</h3>\n<pre><code class=\"language-bash\"># EN: Branch name includes task/ticket ID\n# UZ: Branch nomida task/ticket ID bo'ladi\ngit checkout -b TASK-123-fix-login-bug\n# Branch nomidan task ko'rinadi | Task visible in branch name\n</code></pre>\n<h3 id=\"release-branching\">Release Branching</h3>\n<pre><code class=\"language-bash\"># EN: Freeze features, only bugfixes allowed\n# UZ: Featurelar muzlatiladi, faqat bugfix ruxsat beriladi\ngit checkout -b release/v1.0.0\n# ... bugfix, docs ...\ngit checkout main\ngit merge release/v1.0.0\ngit tag -a v1.0.0 -m &quot;Release version 1.0.0&quot;\ngit checkout develop\ngit merge release/v1.0.0  # develop ham yangilanadi | develop updated too\n</code></pre>\n<hr />\n<h2 id=\"52-what-is-git-stash-git-stash-nima\">52. What is git stash? | git stash nima?</h2>\n<p><strong>EN:</strong> Temporarily save uncommitted changes without committing them.</p>\n<p><strong>UZ:</strong> Commit qilmasdan uncommitted o'zgarishlarni vaqtincha saqlash.</p>\n<pre><code class=\"language-bash\">git stash save &quot;login feature - WIP&quot;   # EN: Save | UZ: Saqlash\ngit stash list                          # EN: View all | UZ: Hammasini ko'rish\n# stash@{0}: On main: login feature - WIP\n\ngit stash apply stash@{0}   # EN: Copy to branch (stash stays) | UZ: Nusxa (stash qoladi)\ngit stash pop stash@{0}     # EN: Move to branch (stash removed) | UZ: Ko'chirish (stash o'chadi)\ngit stash drop stash@{0}    # EN: Delete specific | UZ: Aniq birini o'chirish\ngit stash clear              # EN: Delete all | UZ: Hammasini o'chirish\n</code></pre>\n<hr />\n<h2 id=\"53-when-we-use-git-stash-git-stash-qachon-ishlatiladi\">53. When we use git Stash? | git Stash qachon ishlatiladi?</h2>\n<p><strong>EN:</strong> Use stash when you need to switch context without committing your current work.</p>\n<p><strong>UZ:</strong> Hozirgi ishni commit qilmasdan context almashtirish kerak bo'lganda stash ishlatiladi.</p>\n<pre><code class=\"language-bash\"># Case 1 | Holat 1: Branch almashtirishda | When switching branches\ngit stash save &quot;WIP changes&quot;\ngit checkout hotfix/urgent-bug\n# ... fix ...\ngit checkout feature/login\ngit stash pop\n\n# Case 2 | Holat 2: Pull qilishdan oldin | Before pulling\ngit stash save &quot;my local changes&quot;\ngit pull\ngit stash pop\n\n# Case 3 | Holat 3: Merge paytida | During merge\ngit stash save &quot;files not for merge&quot;\ngit merge feature/login\ngit stash pop\n</code></pre>\n<hr />\n<h2 id=\"54-what-is-another-option-for-merging-in-git-gitda-merging-uchun-boshqa-variant-nima\">54. What is another option for merging in git? | Git'da merging uchun boshqa variant nima?</h2>\n<p><strong>EN:</strong> <code>git rebase</code> is an alternative to merging that creates a cleaner, linear history.</p>\n<p><strong>UZ:</strong> <code>git rebase</code> — merge'ga alternativ, toza chiziqli tarix hosil qiladi.</p>\n<pre><code class=\"language-bash\">git checkout feature/login\ngit rebase main\n# EN: Replays feature commits on top of main\n# UZ: Feature commitlarini main ustiga qayta yozadi\n</code></pre>\n<hr />\n<h2 id=\"55-what-is-difference-between-git-merge-and-git-rebase-git-merge-va-git-rebase-farqi-nima\">55. What is difference between git merge and git rebase? | git merge va git rebase farqi nima?</h2>\n<p><strong>EN:</strong> Merge preserves history with a merge commit. Rebase rewrites history for a clean linear log.</p>\n<p><strong>UZ:</strong> Merge tarixni merge commit bilan saqlaydi. Rebase tarixni toza chiziqli qilib qayta yozadi.</p>\n<table>\n<thead>\n<tr>\n<th></th>\n<th>git merge</th>\n<th>git rebase</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>EN</td>\n<td>Adds merge commit</td>\n<td>Rewrites commit history</td>\n</tr>\n<tr>\n<td>UZ</td>\n<td>Merge commit qo'shadi</td>\n<td>Commit tarixini qayta yozadi</td>\n</tr>\n<tr>\n<td>EN</td>\n<td>Preserves full history</td>\n<td>Creates linear history</td>\n</tr>\n<tr>\n<td>UZ</td>\n<td>To'liq tarixni saqlaydi</td>\n<td>Chiziqli tarix hosil qiladi</td>\n</tr>\n</tbody>\n</table>\n<pre><code class=\"language-bash\"># Merge result | Merge natijasi:\n# A---B---C---M (M = merge commit)\n#          \\ /\n#           D---E\n\n# Rebase result | Rebase natijasi:\n# A---B---C---D'---E' (clean line | toza chiziq)\n</code></pre>\n<hr />\n<h2 id=\"56-how-do-you-undo-the-last-commit-oxirgi-commitni-qanday-bekor-qilish-mumkin\">56. How do you undo the last commit? | Oxirgi commitni qanday bekor qilish mumkin?</h2>\n<p><strong>EN:</strong> Use <code>git revert</code> to safely undo a commit by creating a new reverse commit.</p>\n<p><strong>UZ:</strong> <code>git revert</code> — yangi teskari commit yaratib, xavfsiz tarzda commitni bekor qiladi.</p>\n<pre><code class=\"language-bash\">git log --oneline\n# a1b2c3d Bad commit   &lt;- EN: undo this | UZ: buni bekor qilamiz\n# f4e5d6c Good commit\n\ngit revert a1b2c3d\n# EN: Creates a new commit that undoes a1b2c3d\n# UZ: a1b2c3d ni bekor qiluvchi yangi commit yaratadi\n\n# ✅ EN: Safe — doesn't delete history | UZ: Xavfsiz — tarixni o'chirmaydi\n</code></pre>\n<hr />\n<h2 id=\"57-how-to-change-the-url-for-a-remote-git-repository-remote-git-repository-urlini-qanday-ozgartirish-mumkin\">57. How to Change the URL for a remote Git repository? | Remote Git repository URL'ini qanday o'zgartirish mumkin?</h2>\n<p><strong>EN:</strong> Update the remote URL using <code>git remote set-url</code>.</p>\n<p><strong>UZ:</strong> <code>git remote set-url</code> buyrug'i bilan remote URL'ni yangilash.</p>\n<pre><code class=\"language-bash\">git remote -v\n# origin  https://github.com/old/repo.git\n\ngit remote set-url origin https://github.com/new/repo.git\n\ngit remote -v\n# origin  https://github.com/new/repo.git\n</code></pre>\n<hr />\n<h2 id=\"58-what-is-pull-request-pull-request-nima\">58. What is pull request? | Pull request nima?</h2>\n<p><strong>EN:</strong> A request to merge changes from one branch into another, reviewed on GitHub/GitLab before merging.</p>\n<p><strong>UZ:</strong> Bir branchdagi o'zgarishlarni boshqasiga qo'shish so'rovi. GitHub/GitLab'da merge qilishdan oldin ko'rib chiqiladi.</p>\n<pre><code class=\"language-bash\"># 1. EN: Create branch and push | UZ: Branch yaratib push qiling\ngit checkout -b feature/payment\ngit push origin feature/payment\n\n# 2. EN: Go to GitHub → New Pull Request\n# 2. UZ: GitHub'ga o'ting → New Pull Request\n\n# 3. EN: Select: feature/payment → main\n# 3. UZ: Tanlang: feature/payment → main\n\n# 4. EN: Write description → Create PR → Code Review → Merge\n# 4. UZ: Tavsif yozing → PR yarating → Code Review → Merge\n</code></pre>\n<hr />\n<h2 id=\"59-why-git-better-than-subversion-svn-nima-uchun-git-svndan-yaxshi\">59. Why GIT better than Subversion (SVN)? | Nima uchun GIT SVN'dan yaxshi?</h2>\n<p><strong>EN:</strong> Git is faster, supports offline work, has better branching, and every developer has a full backup of the repository.</p>\n<p><strong>UZ:</strong> Git tezroq, oflayn ishlaydi, branching oson va har bir developer to'liq zaxira nusxaga ega.</p>\n<table>\n<thead>\n<tr>\n<th>Feature</th>\n<th>SVN</th>\n<th>GIT</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>EN: Offline work</td>\n<td>❌ No</td>\n<td>✅ Yes</td>\n</tr>\n<tr>\n<td>UZ: Oflayn ishlash</td>\n<td>❌ Yo'q</td>\n<td>✅ Ha</td>\n</tr>\n<tr>\n<td>EN: Speed</td>\n<td>🐢 Slow</td>\n<td>⚡ Fas
