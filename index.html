d): pass\n    def delete(self, id): pass\n\nclass EmailService:            # EN: only email operations\n    def send(self, to, subj, body): pass  # UZB: faqat email operatsiyalari\n\nclass TaxCalculator:           # EN: only tax calculations\n    def calculate(self, amount, rate): pass  # UZB: faqat soliq hisob-kitoblari\n</code></pre>\n<hr />\n<h2 id=\"4-object-patterns-obyekt-patternlari\">4. Object Patterns | Obyekt Patternlari</h2>\n<hr />\n<h3 id=\"29-what-is-a-default-constructor-standart-konstruktor-nima\">29. What is a default constructor? | Standart konstruktor nima?</h3>\n<p><strong>EN:</strong> A constructor that <strong>takes no arguments</strong> — provides default values.</p>\n<p><strong>UZB:</strong> <strong>Argumentsiz</strong> konstruktor — standart qiymatlarni beradi.</p>\n<pre><code class=\"language-python\">class ServerConfig:\n    def __init__(self):              # EN: default constructor | UZB: standart konstruktor\n        self.host = &quot;localhost&quot;\n        self.port = 8000\n        self.debug = False\n        self.workers = 4\n        self.timeout = 30\n\nconfig = ServerConfig()\nprint(config.host)     # localhost\nprint(config.port)     # 8000\nprint(config.workers)  # 4\n</code></pre>\n<hr />\n<h3 id=\"30-what-is-a-parameterized-constructor-parametrli-konstruktor-nima\">30. What is a parameterized constructor? | Parametrli konstruktor nima?</h3>\n<p><strong>EN:</strong> A constructor that <strong>takes arguments</strong> to initialize an object with specific values.</p>\n<p><strong>UZB:</strong> Obyektni aniq qiymatlar bilan ishga tushirish uchun <strong>argumentlar qabul qiluvchi</strong> konstruktor.</p>\n<pre><code class=\"language-python\">class Product:\n    def __init__(self, name: str, price: float, category: str, stock: int = 0):\n        # EN: parameterized — caller provides initial values\n        # UZB: parametrli — chaqiruvchi boshlang'ich qiymatlarni beradi\n        self.name = name\n        self.price = price\n        self.category = category\n        self.stock = stock\n\n    def __repr__(self):\n        return f&quot;Product({self.name}, ${self.price}, stock={self.stock})&quot;\n\nlaptop = Product(&quot;MacBook Pro&quot;, 2499.99, &quot;Electronics&quot;, 10)\nphone = Product(&quot;iPhone 15&quot;, 999.99, &quot;Electronics&quot;)\nprint(laptop)  # Product(MacBook Pro, $2499.99, stock=10)\nprint(phone)   # Product(iPhone 15, $999.99, stock=0)\n</code></pre>\n<hr />\n<h3 id=\"31-what-is-object-cloning-obyektni-klonlash-nima\">31. What is object cloning? | Obyektni klonlash nima?</h3>\n<p><strong>EN:</strong> Creating an <strong>exact copy</strong> of an existing object.</p>\n<p><strong>UZB:</strong> Mavjud obyektning <strong>aniq nusxasini</strong> yaratish.</p>\n<pre><code class=\"language-python\">import copy\n\nclass UserSettings:\n    def __init__(self, theme: str, lang: str, plugins: list):\n        self.theme = theme\n        self.lang = lang\n        self.plugins = plugins\n\noriginal = UserSettings(&quot;dark&quot;, &quot;uz&quot;, [&quot;linter&quot;, &quot;formatter&quot;])\n\n# EN: Shallow copy — plugins list is shared!\n# UZB: Sayoz nusxa — plugins ro'yxati ulashilgan!\nshallow = copy.copy(original)\nshallow.theme = &quot;light&quot;           # EN: ok — independent | UZB: mustaqil\nshallow.plugins.append(&quot;debugger&quot;)  # EN: affects original! | UZB: originalga ta'sir qiladi!\n\nprint(original.theme)    # dark    — o'zgarmadi\nprint(original.plugins)  # [&quot;linter&quot;, &quot;formatter&quot;, &quot;debugger&quot;] — o'zgardi!\n\n# EN: Deep copy — everything independent\n# UZB: Chuqur nusxa — hamma narsa mustaqil\ndeep = copy.deepcopy(original)\ndeep.plugins.append(&quot;profiler&quot;)\nprint(original.plugins)  # hali [&quot;linter&quot;, &quot;formatter&quot;, &quot;debugger&quot;] — ta'sir etmadi\n</code></pre>\n<hr />\n<h3 id=\"32-what-is-deep-copy-chuqur-nusxalash-nima\">32. What is deep copy? | Chuqur nusxalash nima?</h3>\n<p><strong>EN:</strong> Copying an object <strong>along with all its referenced objects</strong> — fully independent copy.</p>\n<p><strong>UZB:</strong> Obyektni <strong>barcha ichki obyektlari bilan birga</strong> nusxalash — to'liq mustaqil nusxa.</p>\n<pre><code class=\"language-python\">import copy\n\nclass Node:\n    def __init__(self, value: int, children: list = None):\n        self.value = value\n        self.children = children or []\n\n    def __repr__(self):\n        return f&quot;Node({self.value}, children={[c.value for c in self.children]})&quot;\n\n# EN: Tree structure\n# UZB: Daraxt tuzilishi\nroot = Node(1, [Node(2, [Node(4), Node(5)]), Node(3)])\n\ndeep_copy = copy.deepcopy(root)\n\n# EN: Modify copy — original untouched\n# UZB: Nusxani o'zgartirish — original ta'sirlanmaydi\ndeep_copy.value = 99\ndeep_copy.children[0].value = 88\n\nprint(root.value)               # 1  — o'zgarmadi\nprint(root.children[0].value)   # 2  — o'zgarmadi\nprint(deep_copy.value)          # 99\n</code></pre>\n<hr />\n<h3 id=\"33-what-is-shallow-copy-sayoz-nusxalash-nima\">33. What is shallow copy? | Sayoz nusxalash nima?</h3>\n<p><strong>EN:</strong> Copying an object <strong>without copying the objects it references</strong> — nested objects are shared.</p>\n<p><strong>UZB:</strong> Obyektni <strong>ichki obyektlarini nusxalamasdan</strong> ko'chirish — ichki obyektlar ulashiladi.</p>\n<pre><code class=\"language-python\">import copy\n\nclass Config:\n    def __init__(self, name: str, rules: list):\n        self.name = name\n        self.rules = rules             # EN: mutable nested object | UZB: o'zgaruvchan ichki obyekt\n\nbase_config = Config(&quot;base&quot;, [&quot;rule1&quot;, &quot;rule2&quot;])\n\n# EN: Shallow copy — name is independent, rules is SHARED\n# UZB: Sayoz nusxa — name mustaqil, rules ULASHILGAN\nchild_config = copy.copy(base_config)\nchild_config.name = &quot;child&quot;          # EN: independent — ok | UZB: mustaqil — yaxshi\nchild_config.rules.append(&quot;rule3&quot;)   # EN: modifies original! | UZB: originalga ta'sir!\n\nprint(base_config.name)    # base     — o'zgarmadi\nprint(base_config.rules)   # ['rule1', 'rule2', 'rule3']  — o'zgardi!\n</code></pre>\n<hr />\n<h3 id=\"34-what-is-a-singleton-class-singleton-klass-nima\">34. What is a singleton class? | Singleton klass nima?</h3>\n<p><strong>EN:</strong> A class that allows <strong>only one instance</strong> — all references point to the same object.</p>\n<p><strong>UZB:</strong> Faqat <strong>bitta nusxasiga ruxsat beradigan</strong> klass — barcha havolalar bir xil obyektni ko'rsatadi.</p>\n<pre><code class=\"language-python\"># EN: Singleton — useful for shared resources (DB pool, config, logger)\n# UZB: Singleton — ulashilgan resurslar uchun foydali (DB pool, konfiguratsiya, logger)\n\nclass DatabasePool:\n    _instance = None\n    _pool = []\n\n    def __new__(cls, max_connections: int = 10):\n        if cls._instance is None:\n            cls._instance = super().__new__(cls)\n            cls._instance.max_connections = max_connections\n            cls._instance._pool = []\n            print(f&quot;EN: Pool created | UZB: Hovuz yaratildi (max={max_connections})&quot;)\n        return cls._instance\n\n    def get_connection(self):\n        if len(self._pool) &lt; self.max_connections:\n            conn = f&quot;conn_{len(self._pool) + 1}&quot;\n            self._pool.append(conn)\n            return conn\n        raise Exception(&quot;EN: Pool exhausted | UZB: Hovuz to'ldi&quot;)\n\npool1 = DatabasePool(5)\npool2 = DatabasePool(5)\n\nprint(pool1 is pool2)          # True — bir xil obyekt!\npool1.get_connection()\nprint(len(pool2._pool))        # 1 — pool2 ham ko'radi\n</code></pre>\n<hr />\n<h3 id=\"35-what-is-an-enum-enum-nima\">35. What is an enum? | Enum nima?</h3>\n<p><strong>EN:</strong> A special data type that defines a <strong>collection of named constants</strong>.</p>\n<p><strong>UZB:</strong> <strong>Nomlangan konstantalar to'plamini</strong> belgilaydigan maxsus ma'lumot turi.</p>\n<pre><code class=\"language-python\">from enum import Enum, auto\n\nclass OrderStatus(Enum):\n    PENDING    = auto()   # EN: waiting | UZB: kutilmoqda\n    CONFIRMED  = auto()   # EN: confirmed | UZB: tasdiqlangan\n    SHIPPING   = auto()   # EN: in transit | UZB: yo'lda\n    DELIVERED  = auto()   # EN: delivered | UZB: yetkazildi\n    CANCELLED  = auto()   # EN: cancelled | UZB: bekor qilindi\n\nclass Order:\n    def __init__(self, order_id: int, product: str):\n        self.order_id = order_id\n        self.product = product\n        self.status = OrderStatus.PENDING\n\n    def update_status(self, new_status: OrderStatus):\n        print(f&quot;Order #{self.order_id}: {self.status.name} → {new_status.name}&quot;)\n        self.status = new_status\n\norder = Order(1001, &quot;MacBook Pro&quot;)\norder.update_status(OrderStatus.CONFIRMED)\norder.update_status(OrderStatus.SHIPPING)\norder.update_status(OrderStatus.DELIVERED)\n</code></pre>\n<hr />\n<h3 id=\"36-what-is-an-inner-class-ichki-klass-nima\">36. What is an inner class? | Ichki klass nima?</h3>\n<p><strong>EN:</strong> A class <strong>defined inside another class</strong> — logically grouped with its outer class.</p>\n<p><strong>UZB:</strong> <strong>Boshqa klass ichida belgilangan</strong> klass — tashqi klassiga mantiqan bog'langan.</p>\n<pre><code class=\"language-python\"># EN: Inner class — encapsulates logic that's only relevant to outer class\n# UZB: Ichki klass — faqat tashqi klassga tegishli mantiqni yashiradi\n\nclass LinkedList:\n    class Node:                          # EN: inner class | UZB: ichki klass\n        def __init__(self, data):\n            self.data = data\n            self.next = None\n\n    def __init__(self):\n        self.head = None\n        self.size = 0\n\n    def append(self, data):\n        new_node = LinkedList.Node(data)  # EN: using inner class | UZB: ichki klassi ishlatish\n        if not self.head:\n            self.head = new_node\n        else:\n            current = self.head\n            while current.next:\n                current = current.next\n            current.next = new_node\n        self.size += 1\n\n    def display(self):\n        elements = []\n        current = self.head\n        while current:\n            elements.append(str(current.data))\n            current = current.next\n        return &quot; → &quot;.join(elements)\n\nll = LinkedList()\nll.append(1); ll.append(2); ll.append(3)\nprint(ll.display())   # 1 → 2 → 3\nprint(f&quot;Size | O'lcham: {ll.size}&quot;)  # 3\n</code></pre>\n<hr />\n<h2 id=\"5-advanced-oop-ilgor-oop\">5. Advanced OOP | Ilg'or OOP</h2>\n<hr />\n<h3 id=\"37-what-is-a-friend-function-dost-funksiya-nima\">37. What is a friend function? | Do'st funksiya nima?</h3>\n<p><strong>EN:</strong> A function that can <strong>access private members</strong> of a class (C++ concept). In Python, simulated via name mangling or trusted access patterns.</p>\n<p><strong>UZB:</strong> Klassning <strong>private a'zolariga kira oladigan</strong> funksiya (C++ tushunchasi). Python'da nom o'zgartirish yoki ishonchli kirish orqali simulyatsiya qilinadi.</p>\n<pre><code class=\"language-python\"># EN: Python simulation of friend function using controlled access\n# UZB: Python'da do'st funksiyani nazorat qilinadigan kirish orqali simulyatsiya\n\nclass SecureVault:\n    def __init__(self, secret: str):\n        self.__secret = secret         # EN: private | UZB: private\n\n    def grant_access(self, accessor_func):\n        # EN: explicitly grant access — like &quot;friendship&quot;\n        # UZB: aniq kirish berish — &quot;do'stlik&quot; kabi\n        return accessor_func(self.__secret)\n\ndef trusted_auditor(secret: str) -&gt; str:\n    # EN: this function gets temporary access to private data\n    # UZB: bu funksiya private ma'lumotga vaqtincha kirish oladi\n    return f&quot;[AUDIT] Verified secret: {secret[:3]}***&quot;\n\nvault = SecureVault(&quot;TOP_SECRET_KEY_2024&quot;)\nprint(vault.grant_access(trusted_auditor))\n# [AUDIT] Verified secret: TOP***\n</code></pre>\n<hr />\n<h3 id=\"38-what-is-an-access-modifier-kirish-modifikatori-nima\">38. What is an access modifier? | Kirish modifikatori nima?</h3>\n<p><strong>EN:</strong> Keywords defining the <strong>visibility of class members</strong> — public, protected, private.</p>\n<p><strong>UZB:</strong> Klass a'zolarining <strong>ko'rinuvchanligini belgilaydigan</strong> kalit so'zlar — public, protected, private.</p>\n<pre><code class=\"language-python\"># EN: Python access modifiers — convention-based\n# UZB: Python kirish modifikatorlari — konventsiyaga asoslangan\n\nclass AccessModifierDemo:\n    def __init__(self):\n        self.public = &quot;Everyone | Hammaga&quot;           # EN: no underscore\n        self._protected = &quot;Subclasses | Subklasslarga&quot;  # EN: single underscore\n        self.__private = &quot;This class only | Faqat bu klass&quot;  # EN: double underscore\n\n    def show_all(self):\n        return {\n            &quot;public&quot;: self.public,\n            &quot;protected&quot;: self._protected,\n            &quot;private&quot;: self.__private\n        }\n\nclass Child(AccessModifierDemo):\n    def access_test(self):\n        print(self.public)       # EN: ok | UZB: ishlaydi\n        print(self._protected)   # EN: works but discouraged | UZB: ishlaydi lekin tavsiya etilmaydi\n        # print(self.__private)  # EN: AttributeError! | UZB: Xatolik!\n\nobj = AccessModifierDemo()\nprint(obj.public)        # Everyone | Hammaga\nprint(obj._protected)    # Subclasses | Subklasslarga  (accessible but shouldn't)\n# print(obj.__private)   # AttributeError!\n</code></pre>\n<hr />\n<h3 id=\"3941-inheritance-types-meros-olish-turlari\">39–41. Inheritance types | Meros olish turlari</h3>\n<p><strong>EN:</strong> <strong>Public</strong> (default in Python) — members remain accessible. <strong>Protected</strong> — members become protected. <strong>Private</strong> — members become private (no native support in Python).</p>\n<p><strong>UZB:</strong> <strong>Public</strong> (Python'da standart) — a'zolar kirish imkoniyatini saqlaydi. <strong>Protected</strong> — protected bo'ladi. <strong>Private</strong> — private bo'ladi (Python'da to'g'ridan-to'g'ri qo'llab-quvvatlanmaydi).</p>\n<pre><code class=\"language-python\">class Base:\n    def public_method(self): return &quot;public&quot;\n    def _protected_method(self): return &quot;protected&quot;\n    def __private_method(self): return &quot;private&quot;\n\n# EN: Public inheritance (Python default)\n# UZB: Public meros olish (Python standart)\nclass PublicChild(Base):\n    def test(self):\n        print(self.public_method())     # EN: accessible | UZB: kirish mumkin\n        print(self._protected_method()) # EN: accessible | UZB: kirish mumkin\n        # self.__private_method()       # EN: not accessible | UZB: kirish mumkin emas\n\n# EN: Simulating protected/private via composition\n# UZB: Kompozitsiya orqali protected/private ni simulyatsiya qilish\nclass PrivateInheritance:\n    &quot;&quot;&quot;EN: Only exposes selected methods | UZB: Faqat tanlangan metodlarni ochadi&quot;&quot;&quot;\n    def __init__(self):\n        self.__base = Base()\n\n    def only_public(self):             # EN: expose only what's needed\n        return self.__base.public_method()  # UZB: faqat kerak narsani ochish\n\nchild = PublicChild()\nchild.test()\npi = PrivateInheritance()\nprint(pi.only_public())\n</code></pre>\n<hr />\n<h3 id=\"42-what-is-multiple-inheritance-mro-kop-meros-olish-mro\">42. What is multiple inheritance? (MRO) | Ko'p meros olish (MRO)?</h3>\n<p><strong>EN:</strong> Python uses <strong>C3 linearization (MRO)</strong> to determine method lookup order in diamond inheritance.</p>\n<p><strong>UZB:</strong> Python olmos shaklida meros olishda metod qidirish tartibini aniqlash uchun <strong>C3 linearizatsiyasidan (MRO)</strong> foydalanadi.</p>\n<pre><code class=\"language-python\"># EN: Diamond problem and how Python solves it with MRO\n# UZB: Olmos muammosi va Python uni MRO bilan qanday hal qiladi\n\nclass A:\n    def greet(self): return &quot;A&quot;\n\nclass B(A):\n    def greet(self): return f&quot;B → {super().greet()}&quot;\n\nclass C(A):\n    def greet(self): return f&quot;C → {super().greet()}&quot;\n\nclass D(B, C):                     # EN: diamond inheritance | UZB: olmos meros\n    def greet(self): return f&quot;D → {super().greet()}&quot;\n\nd = D()\nprint(d.greet())         # D → B → C → A\nprint(D.__mro__)\n# (&lt;class 'D'&gt;, &lt;class 'B'&gt;, &lt;class 'C'&gt;, &lt;class 'A'&gt;, &lt;class 'object'&gt;)\n# EN: MRO ensures A is visited only once | UZB: MRO A faqat bir marta ko'rilishini ta'minlaydi\n</code></pre>\n<hr />\n<h3 id=\"43-what-is-a-virtual-destructor-virtual-destruktor-nima\">43. What is a virtual destructor? | Virtual destruktor nima?</h3>\n<p><strong>EN:</strong> Ensures the <strong>correct destructor</strong> is called for derived class objects through a base class reference.</p>\n<p><strong>UZB:</strong> Asosiy klass havolasi orqali hosila klass obyektlari uchun <strong>to'g'ri destruktor</strong> chaqirilishini ta'minlaydi.</p>\n<pre><code class=\"language-python\">class Resource:\n    def __init__(self, name: str):\n        self.name = name\n        print(f&quot;[CREATE] {name}&quot;)\n\n    def __del__(self):\n        print(f&quot;[BASE DEL] {self.name}&quot;)\n\nclass ManagedResource(Resource):\n    def __init__(self, name: str, data: list):\n        super().__init__(name)\n        self.data = data\n\n    def __del__(self):\n        # EN: derived destructor first, then parent\n        # UZB: avval hosila destruktori, keyin ota\n        self.data.clear()\n        print(f&quot;[DERIVED DEL] {self.name} — data cleared | ma'lumot tozalandi&quot;)\n        super().__del__()\n\nres = ManagedResource(&quot;cache&quot;, [1, 2, 3, 4, 5])\ndel res\n# [CREATE] cache\n# [DERIVED DEL] cache — data cleared | ma'lumot tozalandi\n# [BASE DEL] cache\n</code></pre>\n<hr />\n<h3 id=\"44-what-is-operator-overloading-operator-yuklash-nima\">44. What is operator overloading? | Operator yuklash nima?</h3>\n<p><strong>EN:</strong> Giving <strong>additional meaning to operators</strong> (<code>+</code>, <code>-</code>, <code>*</code>, etc.) for user-defined types.</p>\n<p><strong>UZB:</strong> Foydalanuvchi tomonidan belgilangan turlar uchun operatorlarga <strong>qo'shimcha ma'no berish</strong>.</p>\n<pre><code class=\"language-python\"># EN: Money class — real-world operator overloading example\n# UZB: Pul klassi — operatorni yuklashning haqiqiy misoli\n\nclass Money:\n    def __init__(self, amount: float, currency: str = &quot;UZS&quot;):\n        self.amount = amount\n        self.currency = currency\n\n    def __add__(self, other: 'Money') -&gt; 'Money':       # EN: + operator\n        if self.currency != other.currency:              # UZB: + operatori\n            raise ValueError(&quot;EN: Currency mismatch | UZB: Valyuta mos emas&quot;)\n        return Money(self.amount + other.amount, self.currency)\n\n    def __sub__(self, other: 'Money') -&gt; 'Money':       # EN: - operator\n        return Money(self.amount - other.amount, self.currency)\n\n    def __mul__(self, factor: float) -&gt; 'Money':        # EN: * operator\n        return Money(self.amount * factor, self.currency)\n\n    def __gt__(self, other: 'Money') -&gt; bool:           # EN: &gt; operator\n        return self.amount &gt; other.amount\n\n    def __repr__(self):\n        return f&quot;{self.amount:,.0f} {self.currency}&quot;\n\nsalary = Money(5_000_000, &quot;UZS&quot;)\nbonus  = Money(1_500_000, &quot;UZS&quot;)\ntotal  = salary + bonus\nprint(total)             # 6,500,000 UZS\nprint(total * 1.12)      # 7,280,000.0 UZS  (with tax | soliq bilan)\nprint(salary &gt; bonus)    # True\n</code></pre>\n<hr />\n<h3 id=\"45-what-is-a-friend-class-dost-klass-nima\">45. What is a friend class? | Do'st klass nima?</h3>\n<p><strong>EN:</strong> A class that can <strong>access private members</strong> of another class (C++ concept). Python simulation:</p>\n<p><strong>UZB:</strong> Boshqa klassning <strong>private a'zolariga kira oladigan</strong> klass (C++ tushunchasi). Python simulyatsiyasi:</p>\n<pre><code class=\"language-python\">class Engine:\n    def __init__(self):\n        self.__rpm = 0\n        self.__temperature = 20\n\n    def start(self):\n        self.__rpm = 3000\n        self.__temperature = 90\n\n    class Diagnostics:               # EN: friend class simulation | UZB: do'st klass simulyatsiyasi\n        def __init__(self, engine: 'Engine'):\n            self._engine = engine\n\n        def report(self) -&gt; dict:\n            return {\n                &quot;rpm&quot;: self._engine._Engine__rpm,          # EN: name mangling access\n                &quot;temp&quot;: self._engine._Engine__temperature   # UZB: nom o'zgartirish orqali kirish\n            }\n\nengine = Engine()\nengine.start()\ndiag = Engine.Diagnostics(engine)\nprint(diag.report())   # {'rpm': 3000, 'temp': 90}\n</code></pre>\n<hr />\n<h3 id=\"46-what-is-a-pure-virtual-destructor-sof-virtual-destruktor-nima\">46. What is a pure virtual destructor? | Sof virtual destruktor nima?</h3>\n<p><strong>EN:</strong> A destructor declared pure virtual — base class cleanup is guaranteed but implementation required.</p>\n<p><strong>UZB:</strong> Sof virtual destruktor — asosiy klass tozalash kafolatlanadi, lekin amalga oshirish talab qilinadi.</p>\n<pre><code class=\"language-python\">from abc import ABC, abstractmethod\n\nclass ManagedObject(ABC):\n    @abstractmethod\n    def cleanup(self):\n        &quot;&quot;&quot;EN: Subclass must implement cleanup | UZB: Subklass cleanup ni amalga oshirishi shart&quot;&quot;&quot;\n        pass\n\n    def __del__(self):\n        self.cleanup()             # EN: guaranteed on destruction | UZB: yo'q qilishda kafolatlangan\n\nclass TempFile(ManagedObject):\n    def __init__(self, path: str):\n        self.path = path\n        print(f&quot;[CREATE] {path}&quot;)\n\n    def cleanup(self):\n        print(f&quot;[CLEANUP] Deleting temp file: {self.path} | vaqtinchalik fayl o'chirildi&quot;)\n\ntf = TempFile(&quot;/tmp/upload_abc123.tmp&quot;)\ndel tf\n# [CREATE] /tmp/upload_abc123.tmp\n# [CLEANUP] Deleting temp file: /tmp/upload_abc123.tmp\n</code></pre>\n<hr />\n<h3 id=\"47-what-is-method-hiding-metodni-yashirish-nima\">47. What is method hiding? | Metodni yashirish nima?</h3>\n<p><strong>EN:</strong> Subclass has <strong>same-named method</strong> that does not truly override the parent — shadows it instead.</p>\n<p><strong>UZB:</strong> Subklass <strong>bir xil nomdagi metod</strong>ga ega lekin u ota klassni haqiqiy ma'noda qayta yozmaydi — uni soyalaydi.</p>\n<pre><code class=\"language-python\">class Parent:\n    def show(self) -&gt; str:\n        return &quot;Parent.show() | Ota klass&quot;\n\n    def display(self) -&gt; str:\n        return self.show()    # EN: calls show() — which one? | UZB: show() ni chaqiradi\n\nclass Child(Parent):\n    def show(self) -&gt; str:    # EN: hides parent's show | UZB: ota klassning show'ini yashiradi\n        return &quot;Child.show() | Bola klass&quot;\n\np = Parent()\nc = Child()\nprint(p.show())        # Parent.show() | Ota klass\nprint(c.show())        # Child.show() | Bola klass  — hidden\nprint(p.display())     # Parent.show() | Ota klass\nprint(c.display())     # Child.show() | Bola klass  — polymorphism still works!\n\n# EN: Access parent directly | UZB: Ota klassga to'g'ridan-to'g'ri kirish\nprint(Parent.show(c))  # Parent.show() | Ota klass\n</code></pre>\n<hr />\n<h3 id=\"48-what-is-an-abstract-method-abstrakt-metod-nima\">48. What is an abstract method? | Abstrakt metod nima?</h3>\n<p><strong>EN:</strong> A method <strong>without a body</strong> declared in an abstract class — must be implemented by all subclasses.</p>\n<p><strong>UZB:</strong> Abstrakt klassda e'lon qilingan <strong>tanasiz metod</strong> — barcha subklasslar uni amalga oshirishi shart.</p>\n<pre><code class=\"language-python\">from abc import ABC, abstractmethod\n\nclass DataExporter(ABC):\n    def __init__(self, filename: str):\n        self.filename = filename\n\n    @abstractmethod\n    def export(self, data: list) -&gt; str:\n        &quot;&quot;&quot;EN: Each exporter must implement this | UZB: Har bir eksporter buni amalga oshirishi kerak&quot;&quot;&quot;\n        pass\n\n    @abstractmethod\n    def get_extension(self) -&gt; str:\n        pass\n\n    def save(self, data: list):           # EN: concrete method | UZB: konkret metod\n        content = self.export(data)\n        filepath = f&quot;{self.filename}.{self.get_extension()}&quot;\n        print(f&quot;Saved {len(content)} chars to {filepath}&quot;)\n\nclass CSVExporter(DataExporter):\n    def export(self, data: list) -&gt; str:\n        return &quot;\\n&quot;.join(&quot;,&quot;.join(str(v) for v in row) for row in data)\n\n    def get_extension(self) -&gt; str:\n        return &quot;csv&quot;\n\nexporter = CSVExporter(&quot;report&quot;)\nexporter.save([[&quot;Name&quot;, &quot;Age&quot;], [&quot;Alyorjon&quot;, 25], [&quot;Jasur&quot;, 30]])\n</code></pre>\n<hr />\n<h3 id=\"49-what-is-a-sealed-class-muhrlangan-klass-nima\">49. What is a sealed class? | Muhrlangan klass nima?</h3>\n<p><strong>EN:</strong> A class that <strong>cannot be subclassed</strong> — prevents further inheritance.</p>\n<p><strong>UZB:</strong> Undan <strong>meros olib bo'lmaydigan</strong> klass — keyingi merosni oldini oladi.</p>\n<pre><code class=\"language-python\">class Sealed(type):\n    &quot;&quot;&quot;EN: Metaclass that blocks inheritance | UZB: Merosni blokladigan metaklass&quot;&quot;&quot;\n    def __new__(mcs, name, bases, namespace):\n        for base in bases:\n            if isinstance(base, Sealed) and getattr(base, '__sealed__', False):\n                raise TypeError(\n                    f&quot;EN: '{base.__name__}' is sealed — cannot inherit\\n&quot;\n                    f&quot;UZB: '{base.__name__}' muhrlanган — meros olib bo'lmaydi&quot;\n                )\n        cls = super().__new__(mcs, name, bases, namespace)\n        cls.__sealed__ = True\n        return cls\n\nclass JWTToken(metaclass=Sealed):\n    def __init__(self, payload: dict):\n        self.payload = payload\n\n    def encode(self) -&gt; str:\n        import base64, json\n        return base64.b64encode(json.dumps(self.payload).encode()).decode()\n\ntoken = JWTToken({&quot;user_id&quot;: 1, &quot;role&quot;: &quot;admin&quot;})\nprint(token.encode())\n\n# class MyToken(JWTToken): pass   # TypeError — sealed!\n</code></pre>\n<hr />\n<h3 id=\"50-what-is-delegation-delegatsiya-nima\">50. What is delegation? | Delegatsiya nima?</h3>\n<p><strong>EN:</strong> <strong>Passing the responsibility</strong> of a task to another object instead of implementing it yourself.</p>\n<p><strong>UZB:</strong> Vazifani o'zingiz bajarish o'rniga boshqa obyektga <strong>mas'uliyatni topshirish</strong>.</p>\n<pre><code class=\"language-python\"># EN: Delegation — &quot;has-a&quot; composition-based responsibility transfer\n# UZB: Delegatsiya — &quot;has-a&quot; kompozitsiyaga asoslangan mas'uliyat uzatish\n\nclass Validator:\n    def validate_email(self, email: str) -&gt; bool:\n        return &quot;@&quot; in email and &quot;.&quot; in email.split(&quot;@&quot;)[-1]\n\n    def validate_age(self, age: int) -&gt; bool:\n        return 0 &lt; age &lt; 150\n\nclass Hasher:\n    def hash_password(self, password: str) -&gt; str:\n        import hashlib\n        return hashlib.sha256(password.encode()).hexdigest()[:16] + &quot;...&quot;\n\nclass UserService:\n    def __init__(self):\n        self.validator = Validator()   # EN: delegate validation | UZB: validatsiyani topshirish\n        self.hasher = Hasher()         # EN: delegate hashing | UZB: hashingni topshirish\n\n    def register(self, email: str, password: str, age: int):\n        if not self.validator.validate_email(email):   # EN: delegating | UZB: topshiryapti\n            raise ValueError(&quot;Invalid email | Noto'g'ri email&quot;)\n        if not self.validator.validate_age(age):\n            raise ValueError(&quot;Invalid age | Noto'g'ri yosh&quot;)\n        hashed = self.hasher.hash_password(password)\n        print(f&quot;Registered: {email}, age={age}, hash={hashed}&quot;)\n\nsvc = UserService()\nsvc.register(&quot;a@example.com&quot;, &quot;secret123&quot;, 25)\n</code></pre>\n<hr />\n<h3 id=\"51-what-is-a-mutable-object-ozgaruvchan-obyekt-nima\">51. What is a mutable object? | O'zgaruvchan obyekt nima?</h3>\n<p><strong>EN:</strong> An object whose <strong>state can be changed</strong> after creation.</p>\n<p><strong>UZB:</strong> Yaratilgandan keyin <strong>holati o'zgartirilishi mumkin</strong> bo'lgan obyekt.</p>\n<pre><code class=\"language-python\"># EN: Mutable — list, dict, set, and most custom class instances\n# UZB: O'zgaruvchan — list, dict, set va ko'pchilik maxsus klass nusxalari\n\nclass ShoppingCart:\n    def __init__(self):\n        self.items = []                # EN: mutable state | UZB: o'zgaruvchan holat\n        self.total = 0.0\n\n    def add_item(self, name: str, price: float):\n        self.items.append({&quot;name&quot;: name, &quot;price&quot;: price})  # EN: state changes | UZB: holat o'zgaradi\n        self.total += price\n\n    def remove_item(self, name: str):\n        item = next((i for i in self.items if i[&quot;name&quot;] == name), None)\n        if item:\n            self.items.remove(item)\n            self.total -= item[&quot;price&quot;]\n\n    def __repr__(self):\n        return f&quot;Cart({len(self.items)} items, total={self.total:,.0f} UZS)&quot;\n\ncart = ShoppingCart()\ncart.add_item(&quot;Laptop&quot;, 12_000_000)\ncart.add_item(&quot;Mouse&quot;, 350_000)\nprint(cart)     # Cart(2 items, total=12,350,000 UZS)\ncart.remove_item(&quot;Mouse&quot;)\nprint(cart)     # Cart(1 items, total=12,000,000 UZS)\n</code></pre>\n<hr />\n<h3 id=\"52-what-is-an-immutable-object-ozgarmas-obyekt-nima\">52. What is an immutable object? | O'zgarmas obyekt nima?</h3>\n<p><strong>EN:</strong> An object whose <strong>state cannot be changed</strong> after creation — creates new object instead.</p>\n<p><strong>UZB:</strong> Yaratilgandan keyin <strong>holati o'zgartirila olmaydigan</strong> obyekt — o'rniga yangi obyekt yaratadi.</p>\n<pre><code class=\"language-python\">from dataclasses import dataclass\n\n@dataclass(frozen=True)             # EN: frozen = immutable | UZB: frozen = o'zgarmas\nclass Point:\n    x: float\n    y: float\n\n    def translate(self, dx: float, dy: float) -&gt; 'Point':\n        # EN: returns NEW point — original unchanged\n        # UZB: YANGI point qaytaradi — original o'zgarmaydi\n        return Point(self.x + dx, self.y + dy)\n\n    def distance_to(self, other: 'Point') -&gt; float:\n        return ((self.x - other.x)**2 + (self.y - other.y)**2) ** 0.5\n\np1 = Point(0, 0)\np2 = p1.translate(3, 4)\n\nprint(p1)                  # Point(x=0, y=0) — o'zgarmadi\nprint(p2)                  # Point(x=3, y=4) — yangi obyekt\nprint(p1.distance_to(p2))  # 5.0\n\n# p1.x = 10   # FrozenInstanceError! — immutable\n</code></pre>\n<hr />\n<h3 id=\"53-what-is-object-slicing-obyektni-kesish-nima\">53. What is object slicing? | Obyektni kesish nima?</h3>\n<p><strong>EN:</strong> In C++, assigning derived object to base variable <strong>loses derived attributes</strong>. Python avoids this — objects retain full type.</p>\n<p><strong>UZB:</strong> C++ da hosila obyektini asosiy o'zgaruvchiga tayinlash <strong>hosila atributlarini yo'qotadi</strong>. Python buni oldini oladi — obyektlar to'liq turni saqlaydi.</p>\n<pre><code class=\"language-python\">class Animal:\n    def __init__(self, name: str):\n        self.name = name\n\n    def info(self) -&gt; str:\n        return f&quot;Animal: {self.name}&quot;\n\nclass Dog(Animal):\n    def __init__(self, name: str, breed: str):\n        super().__init__(name)\n        self.breed = breed             # EN: extra attribute | UZB: qo'shimcha atribut\n\n    def info(self) -&gt; str:\n        return f&quot;Dog: {self.name}, Breed: {self.breed}&quot;\n\ndog = Dog(&quot;Rex&quot;, &quot;Labrador&quot;)\n\n# EN: Python keeps full object — NO slicing!\n# UZB: Python to'liq obyektni saqlaydi — kesish YO'Q!\nanimal: Animal = dog               # EN: reference, not a copy | UZB: havola, nusxa emas\nprint(animal.info())               # Dog: Rex, Breed: Labrador — to'liq saqlanadi\nprint(isinstance(animal, Dog))     # True — haqiqiy tur saqlanadi\nprint(hasattr(animal, 'breed'))    # True — atribut bor\n</code></pre>\n<hr />\n<h3 id=\"54-what-is-a-mixin-mixin-nima\">54. What is a mixin? | Mixin nima?</h3>\n<p><strong>EN:</strong> A class that <strong>provides reusable methods</strong> to other classes through multiple inheritance — not meant to be standalone.</p>\n<p><strong>UZB:</strong> Ko'p meros olish orqali boshqa klasslarga <strong>qayta ishlatiladigan metodlar ta'minlaydigan</strong> klass — mustaqil emas.</p>\n<pre><code class=\"language-python\"># EN: Mixins add behavior without inheritance chain\n# UZB: Mixin'lar meros zanjiri olmagan holda xatti-harakat qo'shadi\n\nclass TimestampMixin:\n    &quot;&quot;&quot;EN: Adds created_at/updated_at tracking | UZB: created_at/updated_at kuzatuvini qo'shadi&quot;&quot;&quot;\n    from datetime import datetime\n    created_at: str = &quot;&quot;\n    updated_at: str = &quot;&quot;\n\n    def touch(self):\n        from datetime import datetime\n        self.updated_at = datetime.now().isoformat()\n\nclass SerializeMixin:\n    &quot;&quot;&quot;EN: Adds JSON/dict serialization | UZB: JSON/dict serialization qo'shadi&quot;&quot;&quot;\n    def to_dict(self) -&gt; dict:\n        return {k: v for k, v in self.__dict__.items() if not k.startswith('_')}\n\n    def to_json(self) -&gt; str:\n        import json\n        return json.dumps(self.to_dict(), default=str)\n\nclass ValidateMixin:\n    &quot;&quot;&quot;EN: Adds field validation | UZB: Maydon tekshiruvini qo'shadi&quot;&quot;&quot;\n    def validate(self) -&gt; bool:\n        for key, val in self.__dict__.items():\n            if val is None:\n                raise ValueError(f&quot;EN: '{key}' cannot be None | UZB: '{key}' None bo'lishi mumkin emas&quot;)\n        return True\n\n# EN: Combine mixins with actual model\n# UZB: Mixin'larni haqiqiy model bilan birlashtirish\nclass User(TimestampMixin, SerializeMixin, ValidateMixin):\n    def __init__(self, name: str, email: str):\n        self.name = name\n        self.email = email\n\nu = User(&quot;Alyorjon&quot;, &quot;a@example.com&quot;)\nu.touch()\nprint(u.to_json())\nu.validate()\n</code></pre>\n<hr />\n<h3 id=\"55-what-is-polymorphic-association-polimorfik-assotsiatsiya-nima\">55. What is polymorphic association? | Polimorfik assotsiatsiya nima?</h3>\n<p><strong>EN:</strong> The ability to <strong>associate an object with different types</strong> at runtime.</p>\n<p><strong>UZB:</strong> Runtime'da <strong>obyektni turli turlar bilan bog'lash</strong> qobiliyati.</p>\n<pre><code class=\"language-python\">from typing import Union\n\nclass Post:\n    def __init__(self, title: str):\n        self.title = title\n        self.type = &quot;post&quot;\n\nclass Photo:\n    def __init__(self, url: str):\n        self.url = url\n        self.type = &quot;photo&quot;\n\nclass Video:\n    def __init__(self, duration: int):\n        self.duration = duration\n        self.type = &quot;video&quot;\n\nclass Like:\n    # EN: polymorphic — can be associated with Post, Photo, or Video\n    # UZB: polimorfik — Post, Photo yoki Video bilan bog'lanishi mumkin\n    def __init__(self, user: str, target: Union[Post, Photo, Video]):\n        self.user = user\n        self.target = target\n\n    def describe(self) -&gt; str:\n        return f&quot;{self.user} liked a {self.target.type}&quot;\n\nlikes = [\n    Like(&quot;Alyorjon&quot;, Post(&quot;Python Tips&quot;)),\n    Like(&quot;Jasur&quot;, Photo(&quot;sunset.jpg&quot;)),\n    Like(&quot;Sara&quot;, Video(120)),\n]\nfor like in likes:\n    print(like.describe())\n</code></pre>\n<hr />\n<h3 id=\"56-what-is-a-namespace-namespace-nima\">56. What is a namespace? | Namespace nima?</h3>\n<p><strong>EN:</strong> A <strong>container for identifiers</strong> that prevents naming conflicts.</p>\n<p><strong>UZB:</strong> Nomlar to'qnashuvini oldini oladigan <strong>identifikatorlar konteyner</strong>.</p>\n<pre><code class=\"language-python\"># EN: Python namespaces — built-in, global, local, enclosing\n# UZB: Python namespace'lari — built-in, global, lokal, o'ragan\n\nx = &quot;global&quot;                    # EN: global namespace | UZB: global namespace\n\ndef outer():\n    x = &quot;enclosing&quot;             # EN: enclosing namespace | UZB: o'ragan namespace\n    def inner():\n        x = &quot;local&quot;             # EN: local namespace | UZB: lokal namespace\n        print(x)                # local\n    inner()\n    print(x)                    # enclosing\n\nouter()\nprint(x)                        # global\n\n# EN: Class namespaces — separate per class\n# UZB: Klass namespace'lari — har bir klass uchun alohida\nclass Config:\n    DEBUG = True                # Config.DEBUG\n\nclass TestConfig:\n    DEBUG = True                # TestConfig.DEBUG  — conflict yo'q!\n\nprint(f&quot;App: {Config.DEBUG} | Test: {TestConfig.DEBUG}&quot;)\n</code></pre>\n<hr />\n<h3 id=\"57-what-is-garbage-collection-axlat-yigish-nima\">57. What is garbage collection? | Axlat yig'ish nima?</h3>\n<p><strong>EN:</strong> <strong>Automatic memory management</strong> that frees memory occupied by unreachable objects.</p>\n<p><strong>UZB:</strong> Erisha olmaydigan obyektlar egallagan xotirani bo'shatadigan <strong>avtomatik xotira boshqaruvi</strong>.</p>\n<pre><code class=\"language-python\">import gc\nimport sys\n\nclass HeavyObject:\n    def __init__(self, name: str, size: int):\n        self.name = name\n        self.data = [0] * size\n        print(f&quot;[ALLOC] {name}: {sys.getsizeof(self.data):,} bytes&quot;)\n\n    def __del__(self):\n        print(f&quot;[FREE] {self.name} — garbage collected | axlat yig'ish bilan tozalandi&quot;)\n\nobj1 = HeavyObject(&quot;cache&quot;, 100_000)\nobj2 = HeavyObject(&quot;buffer&quot;, 50_000)\n\nprint(f&quot;EN: Objects alive | UZB: Tirik obyektlar: {len(gc.get_objects())}&quot;)\n\ndel obj1          # [FREE] cache\ndel obj2          # [FREE] buffer\n\ngc.collect()      # EN: force collection | UZB: majburiy yig'ish\nprint(f&quot;GC stats | GC statistikasi: {gc.get_count()}&quot;)\n</code></pre>\n<hr />\n<h3 id=\"58-what-is-a-destructor-destruktor-nima\">58. What is a destructor? | Destruktor nima?</h3>\n<p><strong>EN:</strong> A method (<code>__del__</code>) called <strong>when an object is about to be destroyed</strong> — used for cleanup.</p>\n<p><strong>UZB:</strong> Obyekt <strong>yo'q qilinishidan oldin</strong> chaqiriladigan metod (<code>__del__</code>) — tozalash uchun ishlatiladi.</p>\n<pre><code class=\"language-python\"># EN: Context manager is preferred over __del__ for cleanup in Python\n# UZB: Python'da tozalash uchun __del__ dan ko'ra context manager afzal\n\nclass DatabaseConnection:\n    def __init__(self, url: str):\n        self.url = url\n        self.is_open = True\n        print(f&quot;[CONNECT] {url}&quot;)\n\n    def query(self, sql: str) -&gt; str:\n        if not self.is_open:\n            raise RuntimeError(&quot;EN: Connection closed | UZB: Ulanish yopilgan&quot;)\n        return f&quot;Result of: {sql}&quot;\n\n    def close(self):\n        self.is_open = False\n        print(f&quot;[DISCONNECT] {self.url}&quot;)\n\n    def __del__(self):\n        if self.is_open:\n            self.close()       # EN: safety net | UZB: xavfsizlik to'ri\n\nconn = DatabaseConnection(&quot;postgresql://localhost/app&quot;)\nprint(conn.query(&quot;SELECT 1&quot;))\ndel conn     # [DISCONNECT] — agar yopilmagan bo'lsa\n</code></pre>\n<hr />\n<h3 id=\"59-what-is-the-liskov-substitution-principle-liskov-almashtirish-printsipi-nima\">59. What is the Liskov Substitution Principle? | Liskov almashtirish printsipi nima?</h3>\n<p><strong>EN:</strong> Objects of a subclass should be able to <strong>replace objects of the base class</strong> without breaking the program.</p>\n<p><strong>UZB:</strong> Subklass obyektlari dasturni buzmagan holda <strong>asosiy klass obyektlarini almashtira olishi</strong> kerak.</p>\n<pre><code class=\"language-python\"># EN: LSP violation — then fix\n# UZB: LSP buzilishi — keyin tuzatish\n\n# VIOLATION | BUZILISH\nclass BirdBad:\n    def fly(self): return &quot;Flying!&quot;\n\nclass PenguinBad(BirdBad):\n    def fly(self):\n        raise Exception(&quot;EN: Penguins can't fly! | UZB: Pingvinlar ucha olmaydi!&quot;)\n\n# CORRECT | TO'G'RI — redesign hierarchy\nclass Bird:\n    def __init__(self, name: str):\n        self.name = name\n\n    def move(self) -&gt; str:           # EN: general behavior | UZB: umumiy xatti-harakat\n        return f&quot;{self.name} is moving&quot;\n\nclass FlyingBird(Bird):\n    def move(self) -&gt; str:\n        return f&quot;{self.name} is flying&quot;\n\nclass SwimmingBird(Bird):\n    def move(self) -&gt; str:\n        return f&quot;{self.name} is swimming&quot;\n\n# EN: Substitution works — all birds can move()\n# UZB: Almashtirish ishlaydi — barcha qushlar move() qila oladi\nbirds = [FlyingBird(&quot;Eagle | Burgut&quot;), SwimmingBird(&quot;Penguin | Pingvin&quot;)]\nfor bird in birds:\n    print(bird.move())\n</code></pre>\n<hr />\n<h3 id=\"60-what-is-constructor-chaining-konstruktor-zanjiri-nima\">60. What is constructor chaining? | Konstruktor zanjiri nima?</h3>\n<p><strong>EN:</strong> The process of <strong>calling one constructor from another</strong> — builds initialization chains.</p>\n<p><strong>UZB:</strong> <strong>Bir konstruktordan boshqasini chaqirish</strong> jarayoni — ishga tushirish zanjirlarini quradi.</p>\n<pre><code class=\"language-python\">class Shape:\n    def __init__(self, color: str):\n        self.color = color\n        print(f&quot;Shape created — color: {color}&quot;)\n\nclass Polygon(Shape):\n    def __init__(self, color: str, sides: int):\n        super().__init__(color)      # EN: chain to Shape | UZB: Shape'ga zanjir\n        self.sides = sides\n        print(f&quot;Polygon created — sides: {sides}&quot;)\n\nclass RegularPolygon(Polygon):\n    def __init__(self, color: str, sides: int, side_length: float):\n        super().__init__(color, sides)   # EN: chain to Polygon | UZB: Polygon'ga zanjir\n        self.side_length = side_length\n        print(f&quot;RegularPolygon — side length: {side_length}&quot;)\n\n    def perimeter(self) -&gt; float:\n        return self.sides * self.side_length\n\nhexagon = RegularPolygon(&quot;blue&quot;, 6, 5.0)\nprint(f&quot;Perimeter | Perimetr: {hexagon.perimeter()}&quot;)\n# Shape created — color: blue\n# Polygon created — sides: 6\n# RegularPolygon — side length: 5.0\n# Perimeter | Perimetr: 30.0\n</code></pre>\n<hr />\n<h2 id=\"6-binding-casting-boglash-va-konvertatsiya\">6. Binding &amp; Casting | Bog'lash va Konvertatsiya</h2>\n<hr />\n<h3 id=\"61-what-is-dynamic-binding-dinamik-boglash-nima\">61. What is dynamic binding? | Dinamik bog'lash nima?</h3>\n<p><strong>EN:</strong> Binding that occurs <strong>at runtime</strong> — method resolved based on actual object type.</p>\n<p><strong>UZB:</strong> <strong>Runtime'da</strong> sodir bo'ladigan bog'lash — metod haqiqiy obyekt turiga qarab aniqlanadi.</p>\n<pre><code class=\"language-python\">class Renderer:\n    def render(self, content: str) -&gt; str:\n        return f&quot;&lt;raw&gt;{content}&lt;/raw&gt;&quot;\n\nclass HTMLRenderer(Renderer):\n    def render(self, content: str) -&gt; str:\n        return f&quot;&lt;html&gt;&lt;body&gt;{content}&lt;/body&gt;&lt;/html&gt;&quot;\n\nclass MarkdownRenderer(Renderer):\n    def render(self, content: str) -&gt; str:\n        return f&quot;# {content}\\n---&quot;\n\ndef publish(renderer: Renderer, content: str):\n    # EN: Which render() is called? Determined at RUNTIME\n    # UZB: Qaysi render() chaqiriladi? RUNTIME'da aniqlanadi\n    return renderer.render(content)\n\ntext = &quot;Hello, World! | Salom Dunyo!&quot;\nprint(publish(HTMLRenderer(), text))\nprint(publish(MarkdownRenderer(), text))\n# EN: Same function call, different results — dynamic binding\n# UZB: Bir xil funksiya chaqiruvi, boshqacha natijalar — dinamik bog'lash\n</code></pre>\n<hr />\n<h3 id=\"62-what-is-static-binding-statik-boglash-nima\">62. What is static binding? | Statik bog'lash nima?</h3>\n<p><strong>EN:</strong> Binding that occurs <strong>at compile time</strong> — method is determined before runtime.</p>\n<p><strong>UZB:</strong> <strong>Kompilyatsiya vaqtida</strong> sodir bo'ladigan bog'lash — metod runtime'dan oldin aniqlanadi.</p>\n<pre><code class=\"language-python\">class StringUtils:\n    @staticmethod\n    def reverse(s: str) -&gt; str:    # EN: static — always this method | UZB: statik — doim bu metod\n        return s[::-1]\n\n    @staticmethod\n    def is_palindrome(s: str) -&gt; bool:\n        clean = s.lower().replace(&quot; &quot;, &quot;&quot;)\n        return clean == clean[::-1]\n\n    @classmethod\n    def from_list(cls, words: list) -&gt; str:\n        return &quot; &quot;.join(words)\n\n# EN: Static binding — compiler/interpreter knows which method to call\n# UZB: Statik bog'lash — kompilyator/interpreter qaysi metodni chaqirishni biladi\nprint(StringUtils.reverse(&quot;Python&quot;))        # nohtyP\nprint(StringUtils.is_palindrome(&quot;racecar&quot;)) # True\nprint(StringUtils.from_list([&quot;Hello&quot;, &quot;World&quot;]))  # Hello World\n</code></pre>\n<hr />\n<h3 id=\"63-what-is-method-resolution-metod-aniqlash-nima\">63. What is method resolution? | Metod aniqlash nima?</h3>\n<p><strong>EN:</strong> The process of <strong>determining which method to call</strong> when multiple candidates exist (inheritance, polymorphism).</p>\n<p><strong>UZB:</strong> Bir nechta nomzod bo'lganda <strong>qaysi metodni chaqirishni aniqlash</strong> jarayoni.</p>\n<pre><code class=\"language-python\"># EN: Python MRO — C3 linearization resolves method lookup\n# UZB: Python MRO — C3 linearizatsiyasi metod qidiruvini hal qiladi\n\nclass Mixin1:\n    def process(self): return &quot;Mixin1&quot;\n\nclass Mixin2:\n    def process(self): return &quot;Mixin2&quot;\n\nclass Base:\n    def process(self): return &quot;Base&quot;\n\nclass MyClass(Mixin1, Mixin2, Base):\n    pass\n\nobj = MyClass()\nprint(obj.process())      # Mixin1  — MRO order\nprint(MyClass.__mro__)    # MRO zanjiri\n\n# EN: Use super() to chain through MRO\n# UZB: MRO bo'ylab zanjir uchun super() ishlatish\nclass A:\n    def greet(self): return f&quot;A({super().greet() if hasattr(super(), 'greet') else ''})&quot;\n\nclass B(A):\n    def greet(self): return f&quot;B→{super().greet()}&quot;\n\nclass C(A):\n    def greet(self): return f&quot;C→{super().greet()}&quot;\n\nclass D(B, C):\n    def greet(self): return f&quot;D→{super().greet()}&quot;\n\nprint(D().greet())   # D→B→C→A()\n</code></pre>\n<hr />\n<h3 id=\"64-what-is-downcasting-pastga-kochirish-nima\">64. What is downcasting? | Pastga ko'chirish nima?</h3>\n<p><strong>EN:</strong> Casting an object of a <strong>superclass reference to a subclass</strong> — requires type check.</p>\n<p><strong>UZB:</strong> <strong>Superklass havolasini subklass turiga</strong> o'tkazish — tur tekshiruvi talab qiladi.</p>\n<pre><code class=\"language-python\">class Animal:\n    def __init__(self, name: str):\n        self.name = name\n\n    def speak(self) -&gt; str:\n        return f&quot;{self.name} makes a sound&quot;\n\nclass Dog(Animal):\n    def fetch(self) -&gt; str:           # EN: subclass-specific method | UZB: subklassga xos metod\n        return f&quot;{self.name} fetches the ball!&quot;\n\nclass Cat(Animal):\n    def purr(self) -&gt; str:\n        return f&quot;{self.name} purrs...&quot;\n\nanimals: list[Animal] = [Dog(&quot;Rex&quot;), Cat(&quot;Whiskers&quot;), Dog(&quot;Buddy&quot;)]\n\nfor animal in animals:\n    # EN: Downcast — check type first, then access subclass methods\n    # UZB: Pastga ko'chirish — avval tur tekshir, keyin subklass metodiga kirish\n    if isinstance(animal, Dog):\n        print(animal.fetch())    # Dog-specific method\n    elif isinstance(animal, Cat):\n        print(animal.purr())     # Cat-specific method\n</code></pre>\n<hr />\n<h3 id=\"65-what-is-upcasting-yuqoriga-kochirish-nima\">65. What is upcasting? | Yuqoriga ko'chirish nima?</h3>\n<p><strong>EN:</strong> Casting an object of a <strong>subclass to its superclass</strong> — implicit and safe.</p>\n<p><strong>UZB:</strong> <strong>Subklass obyektini o'z superklass turiga</strong> o'tkazish — yashirin va xavfsiz.</p>\n<pre><code class=\"language-python\">class Shape:\n    def area(self) -&gt; float:\n        return 0.0\n\n    def describe(self) -&gt; str:\n        return f&quot;{type(self).__name__}: area={self.area():.2f}&quot;\n\nclass Circle(Shape):\n    def __init__(self, r: float):\n        self.r = r\n    def area(self) -&gt; float:\n        import math\n        return math.pi * self.r ** 2\n\nclass Square(Shape):\n    def __init__(self, s: float):\n        self.s = s\n    def area(self) -&gt; float:\n        return self.s ** 2\n\n# EN: Upcast — Circle/Square → Shape (implicit, safe)\n# UZB: Yuqoriga ko'chirish — Circle/Square → Shape (yashirin, xavfsiz)\nshapes: list[Shape] = [Circle(5), Square(4), Circle(3)]  # upcast\n\ntotal_area = sum(s.area() for s in shapes)\nprint(f&quot;Total area | Umumiy maydon: {total_area:.2f}&quot;)\n\nfor shape in shapes:\n    print(shape.describe())  # EN: polymorphism works | UZB: polimorfizm ishlaydi\n</code></pre>\n<hr />\n<h3 id=\"66-what-is-a-copy-constructor-nusxa-konstruktori-nima\">66. What is a copy constructor? | Nusxa konstruktori nima?</h3>\n<p><strong>EN:</strong> A constructor that creates a <strong>new object as a copy</strong> of an existing one.</p>\n<p><strong>UZB:</strong> Mavjud obyektning <strong>nusxasi sifatida yangi obyekt</strong> yaratadigan konstruktor.</p>\n<pre><code class=\"language-python\">import copy\n\nclass Matrix:\n    def __init__(self, data=None, source=None):\n        if source is not None:             # EN: copy constructor | UZB: nusxa konstruktori\n            self.data = copy.deepcopy(source.data)\n            self.rows = source.rows\n            self.cols = source.cols\n        else:\n            self.data = data or []\n            self.rows = len(self.data)\n            self.cols = len(self.data[0]) if self.data else 0\n\n    @classmethod\n    def copy_of(cls, other: 'Matrix') -&gt; 'Matrix':\n        return cls(source=other)\n\n    def __repr__(self):\n        return f&quot;Matrix({self.rows}x{self.cols})&quot;\n\nm1 = Matrix([[1, 2, 3], [4, 5, 6]])\nm2 = Matrix.copy_of(m1)           # EN: copy constructor via classmethod\n                                   # UZB: classmethod orqali nusxa konstruktori\n\nm2.data[0][0] = 99\nprint(m1.data[0][0])   # 1   — original o'zgarmadi\nprint(m2.data[0][0])   # 99  — nusxa\n</code></pre>\n<hr />\n<h3 id=\"67-what-is-a-virtual-table-vtable-virtual-jadval-vtable-nima\">67. What is a virtual table (vtable)? | Virtual jadval (vtable) nima?</h3>\n<p><strong>EN:</strong> An internal table used to <strong>resolve virtual method calls</strong> in polymorphic classes. Python uses <code>__dict__</code> and MRO.</p>\n<p><strong>UZB:</strong> Polimorfik klasslarda <strong>virtual metod chaqiruvlarini hal qilish</strong> uchun ishlatiladigan ichki jadval. Python <code>__dict__</code> va MRO ishlatadi.</p>\n<pre><code class=\"language-python\"># EN: Python's &quot;vtable&quot; equivalent — class __dict__ + MRO\n# UZB: Python ning &quot;vtable&quot; ekvivalenti — klass __dict__ + MRO\n\nclass Animal:\n    def speak(self): return &quot;...&quot;\n    def move(self): return &quot;moving&quot;\n\nclass Dog(Animal):\n    def speak(self): return &quot;Woof!&quot;\n\nclass GuideDog(Dog):\n    def guide(self): return &quot;Guiding!&quot;\n\ndog = GuideDog()\n\n# EN: Python resolves methods via __dict__ lookup chain (vtable equivalent)\n# UZB: Python metodlarni __dict__ qidirish zanjiri orqali hal qiladi\n\nprint(&quot;GuideDog vtable (own methods):&quot;, list(GuideDog.__dict__.keys()))\nprint(&quot;Dog vtable:&quot;, list(Dog.__dict__.keys()))\nprint(&quot;Animal vtable:&quot;, list(Animal.__dict__.keys()))\nprint(&quot;MRO (lookup order):&quot;, [c.__name__ for c in GuideDog.__mro__])\nprint(dog.speak())   # Woof! — found in Dog.__dict__\n</code></pre>\n<hr />\n<h3 id=\"68-what-is-multiple-dispatch-kop-chaqirish-nima\">68. What is multiple dispatch? | Ko'p chaqirish nima?</h3>\n<p><strong>EN:</strong> Choosing which function to call based on the <strong>runtime types of more than one argument</strong>.</p>\n<p><strong>UZB:</strong> <strong>Bir nechta argument runtime turlariga</strong> qarab qaysi funksiyani chaqirishni tanlash.</p>\n<pre><code class=\"language-python\">from functools import singledispatch\nfrom typing import Union\n\n# EN: Single dispatch — dispatch on first argument type\n# UZB: Bitta chaqirish — birinchi argument turi bo'yicha\n\n@singledispatch\ndef serialize(obj) -&gt; str:\n    return str(obj)\n\n@serialize.register(int)\ndef _(obj: int) -&gt; str:\n    return f&quot;int:{obj}&quot;\n\n@serialize.register(list)\ndef _(obj: list) -&gt; str:\n    return f&quot;list:[{','.join(str(i) for i in obj)}]&quot;\n\n@serialize.register(dict)\ndef _(obj: dict) -&gt; str:\n    import json\n    return f&quot;dict:{json.dumps(obj)}&quot;\n\nprint(serialize(42))               # int:42\nprint(serialize([1, 2, 3]))        # list:[1,2,3]\nprint(serialize({&quot;a&quot;: 1}))         # dict:{&quot;a&quot;: 1}\nprint(serialize(&quot;hello&quot;))          # hello  — default\n</code></pre>\n<hr />\n<h3 id=\"69-what-is-an-abstract-data-type-adt-abstrakt-malumot-turi-amt-nima\">69. What is an abstract data type (ADT)? | Abstrakt ma'lumot turi (AMT) nima?</h3>\n<p><strong>EN:</strong> A model for data types defined by its <strong>behavior from the user's perspective</strong>, not implementation.</p>\n<p><strong>UZB:</strong> Ma'lumot turining amalga oshirishdan emas, <strong>foydalanuvchi nuqtai nazaridan xatti-harakati</strong> bilan belgilangan modeli.</p>\n<pre><code class=\"language-python\">from abc import ABC, abstractmethod\nfrom typing import Any, Optional\n\n# EN: Stack ADT — defines behavior, not implementation\n# UZB: Stack AMT — amalga oshirishni emas, xatti-harakatni belgilaydi\n\nclass StackADT(ABC):\n    @abstractmethod\n    def push(self, item: Any) -&gt; None: pass\n\n    @abstractmethod\n    def pop(self) -&gt; Any: pass\n\n    @abstractmethod\n    def peek(self) -&gt; Any: pass\n\n    @abstractmethod\n    def is_empty(self) -&gt; bool: pass\n\n    @abstractmethod\n    def size(self) -&gt; int: pass\n\n# EN: Implementation 1 — using list\n# UZB: 1-amalga oshirish — list orqali\nclass ListStack(StackADT):\n    def __init__(self):\n        self._data = []\n    def push(self, item): self._data.append(item)\n    def pop(self): return self._data.pop()\n    def peek(self): return self._data[-1]\n    def is_empty(self): return len(self._data) == 0\n    def size(self): return len(self._data)\n\nstack = ListStack()\nstack.push(1); stack.push(2); stack.push(3)\nprint(stack.peek())  # 3\nprint(stack.pop())   # 3\nprint(stack.size())  # 2\n</code></pre>\n<hr />\n<h3 id=\"70-what-is-an-exception-in-oop-oopda-istisno-nima\">70. What is an exception in OOP? | OOP'da istisno nima?</h3>\n<p><strong>EN:</strong> An event that <strong>disrupts the normal flow</strong> of execution — represented as objects in Python.</p>\n<p><strong>UZB:</strong> Bajarilishning <strong>normal oqimini buzadigan</strong> hodisa — Python'da obyektlar sifatida ifodalanadi.</p>\n<pre><code class=\"language-python\"># EN: Custom exception hierarchy — domain-specific errors\n# UZB: Maxsus istisno ierarxiyasi — domenga xos xatolar\n\nclass AppError(Exception):\n    &quot;&quot;&quot;EN: Base exception | UZB: Asosiy istisno&quot;&quot;&quot;\n    def __init__(self, message: str, code: int = 500):\n        super().__init__(message)\n        self.code = code\n\nclass ValidationError(AppError):\n    def __init__(self, field: str, reason: str):\n        super().__init__(f&quot;Validation failed on '{field}': {reason}&quot;, 400)\n        self.field = field\n\nclass NotFoundError(AppError):\n    def __init__(self, resource: str, id: int):\n        super().__init__(f&quot;'{resource}' with id={id} not found&quot;, 404)\n\nclass AuthError(AppError):\n    def __init__(self):\n        super().__init__(&quot;Unauthorized | Ruxsatsiz&quot;, 401)\n\ndef get_user(user_id: int):\n    if user_id &lt;= 0:\n        raise ValidationError(&quot;user_id&quot;, &quot;must be positive | musbat bo'lishi kerak&quot;)\n    if user_id &gt; 100:\n        raise NotFoundError(&quot;User&quot;, user_id)\n    return {&quot;id&quot;: user_id, &quot;name&quot;: &quot;Alyorjon&quot;}\n\ntry:\n    user = get_user(999)\nexcept ValidationError as e:\n    print(f&quot;[{e.code}] {e}&quot;)\nexcept NotFoundError as e:\n    print(f&quot;[{e.code}] {e}&quot;)   # [404] 'User' with id=999 not found\n</code></pre>\n<hr />\n<h3 id=\"71-what-is-exception-handling-istisnolarni-boshqarish-nima\">71. What is exception handling? | Istisnolarni boshqarish nima?</h3>\n<p><strong>EN:</strong> Responding to exceptions using <strong>try, except, else, and finally</strong> blocks.</p>\n<p><strong>UZB:</strong> <strong>try, except, else va finally</strong> bloklari yordamida istisnolarga javob berish.</p>\n<pre><code class=\"language-python\">import logging\n\nclass APIClient:\n    def __init__(self, base_url: str):\n        self.base_url = base_url\n\n    def fetch(self, endpoint: str) -&gt; dict:\n        import random\n        # EN: Simulate different error scenarios\n        # UZB: Turli xato stsenariylarini simulyatsiya qilish\n        roll = random.random()\n        if roll &lt; 0.3:\n            raise ConnectionError(&quot;EN: Network timeout | UZB: Tarmoq vaqti tugadi&quot;)\n        if roll &lt; 0.5:\n            raise ValueError(&quot;EN: Invalid response | UZB: Noto'g'ri javob&quot;)\n        return {&quot;data&quot;: &quot;success&quot;, &quot;endpoint&quot;: endpoint}\n\ndef safe_fetch(client: APIClient, endpoint: str) -&gt; dict:\n    try:\n        result = client.fetch(endpoint)         # EN: may raise | UZB: istisno qo'zg'atishi mumkin\n    except ConnectionError as e:\n        logging.error(f&quot;Network error: {e}&quot;)\n        return {&quot;error&quot;: &quot;network&quot;, &quot;retry&quot;: True}\n    except ValueError as e:\n        logging.warning(f&quot;Data error: {e}&quot;)\n        return {&quot;error&quot;: &quot;data&quot;, &quot;retry&quot;: False}\n    except Exception as e:\n        logging.critical(f&quot;Unexpected: {e}&quot;)\n        raise                                    # EN: re-raise unknown errors | UZB: noma'lum xatolarni qayta ko'tarish\n    else:\n        print(&quot;EN: Request successful | UZB: So'rov muvaffaqiyatli&quot;)  # EN: runs if no exception\n        return result\n    finally:\n        print(&quot;EN: Request completed | UZB: So'rov yakunlandi&quot;)       # EN: always runs | UZB: har doim ishlaydi\n</code></pre>\n<hr />\n<h3 id=\"72-what-is-the-difference-between-a-class-and-an-interface-klass-va-interfeys-ortasidagi-farq-nima\">72. What is the difference between a class and an interface? | Klass va interfeys o'rtasidagi farq nima?</h3>\n<p><strong>EN:</strong> A class <strong>can contain implementation</strong>; an interface only contains <strong>method signatures</strong> (contract).</p>\n<p><strong>UZB:</strong> Klass <strong>amalga oshirishni o'z ichiga olishi mumkin</strong>; interfeys faqat <strong>metod imzolarini</strong> o'z ichiga oladi (shartnoma).</p>\n<table>\n<thead>\n<tr>\n<th>Feature / Xususiyat</th>\n<th>Class / Klass</th>\n<th>Interface / Interfeys</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Instantiation / Yaratish</td>\n<td>Yes / Ha</td>\n<td>No / Yo'q</td>\n</tr>\n<tr>\n<td>Implementation / Amalga oshirish</td>\n<td>Yes / Ha</td>\n<td>No (Abstract) / Yo'q</td>\n</tr>\n<tr>\n<td>Multiple inherit / Ko'p meros</td>\n<td>Limited / Cheklangan</td>\n<td>Yes / Ha</td>\n</tr>\n<tr>\n<td>State / Holat</td>\n<td>Yes / Ha</td>\n<td>No / Yo'q</td>\n</tr>\n</tbody>\n</table>\n<pre><code class=\"language-python\">from abc import ABC, abstractmethod\n\n# EN: Interface — no state, no implementation\n# UZB: Interfeys — holat yo'q, amalga oshirish yo'q\nclass Drawable(ABC):\n    @abstractmethod\n    def draw(self): pass\n\n    @abstractmethod\n    def get_bounds(self) -&gt; tuple: pass\n\n# EN: Abstract class — has state AND some implementation\n# UZB: Abstrakt klass — holat ham, qisman amalga oshirish ham bor\nclass Widget(ABC):\n    def __init__(self, x: int, y: int):\n        self.x = x                 # EN: state | UZB: holat\n        self.y = y\n\n    def move(self, dx, dy):        # EN: concrete method | UZB: konkret metod\n        self.x += dx\n        self.y += dy\n\n    @abstractmethod\n    def render(self): pass\n\nclass Button(Widget, Drawable):\n    def render(self): print(f&quot;Button at ({self.x},{self.y})&quot;)\n    def draw(self): print(&quot;Drawing button&quot;)\n    def get_bounds(self): return (self.x, self.y, 100, 30)\n</code></pre>\n<hr />\n<h3 id=\"73-what-is-type-casting-in-oop-oopda-tur-ozgartirish-nima\">73. What is type casting in OOP? | OOP'da tur o'zgartirish nima?</h3>\n<p><strong>EN:</strong> Converting one type of <strong>object reference to another</strong>.</p>\n<p><strong>UZB:</strong> Bir turdagi <strong>obyekt havolasini boshqasiga</strong> aylantirish.</p>\n<pre><code class=\"language-python\"># EN: Python type casting — implicit and explicit\n# UZB: Python tur o'zgartirish — yashirin va aniq\n\nclass Animal:\n    def breathe(self): return &quot;breathing&quot;\n\nclass Dog(Animal):\n    def bark(self): return &quot;Woof!&quot;\n\nclass Cat(Animal):\n    def meow(self): return &quot;Meow!&quot;\n\nanimals: list[Animal] = [Dog(), Cat(), Dog()]\n\nfor animal in animals:\n    # EN: Safe casting with isinstance + type narrowing\n    # UZB: isinstance + tur toraytirish bilan xavfsiz o'zgartirish\n    if isinstance(animal, Dog):\n        dog: Dog = animal        # EN: type narrowing | UZB: tur toraytirish\n        print(dog.bark())\n    elif isinstance(animal, Cat):\n        cat: Cat = animal\n        print(cat.meow())\n\n# EN: Built-in type casting\n# UZB: Ichki tur o'zgartirish\nprint(int(&quot;42&quot;))      # str → int\nprint(float(10))      # int → float\nprint(str(3.14))      # float → str\nprint(list((1,2,3)))  # tuple → list\n</code></pre>\n<hr />\n<h3 id=\"74-what-is-a-mixin-class-mixin-klass-nima\">74. What is a mixin class? | Mixin klass nima?</h3>\n<p><em>(See #54 for full example | To'liq misolni #54 da ko'ring)</em></p>\n<p><strong>EN:</strong> A class providing <strong>additional reusable functionality</strong> through multiple inheritance without being a full parent.</p>\n<p><strong>UZB:</strong> Ko'p meros olish orqali to'liq ota klass bo'lmasdan <strong>qo'shimcha qayta ishlatiladigan funksionallik</strong> ta'minlaydigan klass.</p>\n<pre><code class=\"language-python\"># EN: Practical mixin — FastAPI/Django style\n# UZB: Amaliy mixin — FastAPI/Django uslubi\n\nclass CRUDMixin:\n    &quot;&quot;&quot;EN: Reusable CRUD operations for models | UZB: Modellarga qayta ishlatiladigan CRUD&quot;&quot;&quot;\n    _store = {}\n\n    @classmethod\n    def create(cls, **kwargs):\n        obj = cls(**kwargs)\n        cls._store[id(obj)] = obj\n        return obj\n\n    @classmethod\n    def all(cls):\n        return list(cls._store.values())\n\n    def delete(self):\n        self.__class__._store.pop(id(self), None)\n\nclass User(CRUDMixin):\n    def __init__(self, name: str, email: str):\n        self.name = name\n        self.email = email\n\n    def __repr__(self): return f&quot;User({self.name})&quot;\n\nu1 = User.create(name=&quot;Alyorjon&quot;, email=&quot;a@ex.com&quot;)\nu2 = User.create(name=&quot;Jasur&quot;, email=&quot;j@ex.com&quot;)\nprint(User.all())   # [User(Alyorjon), User(Jasur)]\nu1.delete()\nprint(User.all())   # [User(Jasur)]\n</code></pre>\n<hr />\n<h3 id=\"75-what-is-the-isinstance-operator-isinstance-operatori-nima\">75. What is the <code>isinstance</code> operator? | <code>isinstance</code> operatori nima?</h3>\n<p><strong>EN:</strong> Tests whether an object is an <strong>instance of a specific class or its subclass</strong>.</p>\n<p><strong>UZB:</strong> Obyekt <strong>ma'lum bir klass yoki uning subklassining namunasi</strong> ekanligini tekshiradi.</p>\n<pre><code class=\"language-python\">class Vehicle: pass\nclass Car(Vehicle): pass\nclass ElectricCar(Car): pass\n\nev = ElectricCar()\n\n# EN: isinstance checks — hierarchical\n# UZB: isinstance tekshiruvlari — ierarxik\nprint(isinstance(ev, ElectricCar))  # True — o'zi\nprint(isinstance(ev, Car))          # True — ota\nprint(isinstance(ev, Vehicle))      # True — bobosi\nprint(isinstance(ev, str))          # False — bog'liq emas\n\n# EN: type() — exact type only (no hierarchy)\n# UZB: type() — faqat aniq tur (ierarxiya yo'q)\nprint(type(ev) == ElectricCar)  # True\nprint(type(ev) == Car)          # False — faqat aniq tur\n\n# EN: Practical use — safe method dispatch\n# UZB: Amaliy foydalanish — xavfsiz metod chaqirish\ndef process(vehicle: Vehicle):\n    if isinstance(vehicle, ElectricCar):\n        print(&quot;EN: Charge me! | UZB: Meni quvvatlanting!&quot;)\n    elif isinstance(vehicle, Car):\n        print(&quot;EN: Fill gas! | UZB: Benzin soling!&quot;)\n</code></pre>\n<hr />\n<h3 id=\"76-what-is-late-binding-kech-boglash-nima\">76. What is late binding? | Kech bog'lash nima?</h3>\n<p><strong>EN:</strong> Also known as <strong>dynamic binding</strong> — method calls resolved at runtime, not compile time.</p>\n<p><strong>UZB:</strong> <strong>Dinamik bog'lash</strong> deb ham ataladi — metod chaqiruvlari kompilyatsiya vaqtida emas, runtime'da hal qilinadi.</p>\n<pre><code class=\"language-python\"># EN: Late binding — Python's default behavior\n# UZB: Kech bog'lash — Python'ning standart xatti-harakati\n\nclass Plugin:\n    def execute(self) -&gt; str:\n        return &quot;Default plugin&quot;\n\nclass AuthPlugin(Plugin):\n    def execute(self) -&gt; str:\n        return &quot;EN: Authenticating user | UZB: Foydalanuvchini tasdiqlash&quot;\n\nclass CachePlugin(Plugin):\n    def execute(self) -&gt; str:\n        return &quot;EN: Caching response | UZB: Javobni keshlash&quot;\n\nclass LogPlugin(Plugin):\n    def execute(self) -&gt; str:\n        return &quot;EN: Logging request | UZB: So'rovni qayd etish&quot;\n\nclass MiddlewareChain:\n    def __init__(self):\n        self.plugins: list[Plugin] = []\n\n    def add(self, plugin: Plugin) -&gt; 'MiddlewareChain':\n        self.plugins.append(plugin)\n        return self\n\n    def run(self):\n        for plugin in self.plugins:\n            print(plugin.execute())   # EN: late binding — which execute()? runtime!\n                                      # UZB: kech bog'lash — qaysi execute()? runtime!\n\nchain = MiddlewareChain()\nchain.add(AuthPlugin()).add(CachePlugin()).add(LogPlugin()).run()\n</code></pre>\n<hr />\n<h3 id=\"77-what-is-early-binding-erta-boglash-nima\">77. What is early binding? | Erta bog'lash nima?</h3>\n<p><strong>EN:</strong> Also known as <strong>static binding</strong> — resolved at compile/definition time.</p>\n<p><strong>UZB:</strong> <strong>Statik bog'lash</strong> deb ham ataladi — kompilyatsiya/ta'riflash vaqtida hal qilinadi.</p>\n<pre><code class=\"language-python\"># EN: Early binding — static and class methods\n# UZB: Erta bog'lash — statik va klass metodlari\n\nclass MathHelper:\n    PI = 3.14159265358979        # EN: early bound constant | UZB: erta bog'liq konstantA\n\n    @staticmethod                # EN: early binding — always MathHelper.circle_area\n    def circle_area(r: float):   # UZB: erta bog'lash — doim MathHelper.circle_area\n        return MathHelper.PI * r ** 2\n\n    @classmethod                 # EN: early-ish binding via cls\n    def from_diameter(cls, d: float):  # UZB: cls orqali erta bog'lash\n        return cls.circle_area(d / 2)\n\nprint(MathHelper.circle_area(5))    # 78.539...\nprint(MathHelper.from_diameter(10)) # 78.539...\n</code></pre>\n<hr />\n<h3 id=\"78-what-is-a-virtual-base-class-virtual-asosiy-klass-nima\">78. What is a virtual base class? | Virtual asosiy klass nima?</h3>\n<p><strong>EN:</strong> A base class that is <strong>shared (not duplicated)</strong> in diamond inheritance — Python handles this via MRO.</p>\n<p><strong>UZB:</strong> Olmos merosida <strong>ulashiladigan (takrorlanmaydigan)</strong> asosiy klass — Python buni MRO orqali hal qiladi.</p>\n<pre><code class=\"language-python\"># EN: Diamond inheritance — without virtual base (conceptual)\n# UZB: Olmos meros — virtual asosiy klasssiz (tushuncha)\n\nclass Base:\n    def __init__(self, value: int):\n        self.value = value\n        print(f&quot;Base.__init__ called with {value}&quot;)\n\nclass Left(Base):\n    def __init__(self, value: int):\n        super().__init__(value)      # EN: super() uses MRO — Base called once\n        print(&quot;Left.__init__&quot;)       # UZB: super() MRO ishlatadi — Base bir marta\n\nclass Right(Base):\n    def __init__(self, value: int):\n        super().__init__(value)\n        print(&quot;Right.__init__&quot;)\n\nclass Diamond(Left, Right):          # EN: diamond inheritance | UZB: olmos meros\n    def __init__(self, value: int):\n        super().__init__(value)      # EN: Python MRO ensures Base.__init__ runs ONCE\n        print(&quot;Diamond.__init__&quot;)    # UZB: Python MRO Base.__init__ ni bir marta ishlatadi\n\nd = Diamond(42)\n# Base.__init__ called with 42  — bir marta!\n# Right.__init__\n# Left.__init__\n# Diamond.__init__\nprint(d.value)  # 42\n</code></pre>\n<hr />\n<h2 id=\"7-solid-principles-solid-tamoyillar\">7. SOLID Principles | SOLID Tamoyillar</h2>\n<hr />\n<h3 id=\"79-what-is-the-single-responsibility-principle-srp-yagona-masuliyat-tamoyili-nima\">79. What is the Single Responsibility Principle (SRP)? | Yagona Mas'uliyat Tamoyili nima?</h3>\n<p><strong>EN:</strong> A class should have <strong>only one reason to change</strong> — one class, one job.</p>\n<p><strong>UZB:</strong> Klassning <strong>o'zgarish uchun faqat bitta sababi</strong> bo'lishi kerak — bir klass, bir vazifa.</p>\n<pre><code class=\"language-python\"># EN: BEFORE SRP — class does everything (God class)\n# UZB: SRP DAN OLDIN — klass hamma narsani qiladi (Xudo klassi)\n\nclass UserManagerBAD:\n    def create_user(self, data): pass\n    def send_welcome_email(self, user): pass   # EN: email logic here?\n    def save_to_database(self, user): pass     # UZB: email mantig'i bu yerda?\n    def generate_pdf_report(self): pass\n    def validate_user_data(self, data): pass\n\n# EN: AFTER SRP — each class has ONE responsibility\n# UZB: SRP DAN KEYIN — har bir klassning BIR mas'uliyati bor\n\nclass UserRepository:\n    &quot;&quot;&quot;EN: Only handles DB operations | UZB: Faqat DB operatsiyalarini bajaradi&quot;&quot;&quot;\n    def save(self, user: dict) -&gt; int:\n        print(f&quot;[DB] Saving user: {user['name']}&quot;)\n        return 1\n\n    def find_by_email(self, email: str) -&gt; dict:\n        return {&quot;email&quot;: email}\n\nclass EmailService:\n    &quot;&quot;&quot;EN: Only handles emails | UZB: Faqat emaillarni boshqaradi&quot;&quot;&quot;\n    def send_welcome(self, email: str, name: str):\n        print(f&quot;[EMAIL] Welcome {name}! Sent to {email}&quot;)\n\nclass UserValidator:\n    &quot;&quot;&quot;EN: Only validates user data | UZB: Faqat foydalanuvchi ma'lumotlarini tekshiradi&quot;&quot;&quot;\n    def validate(self, data: dict) -&gt; bool:\n        return bool(data.get(&quot;name&quot;) and data.get(&quot;email&quot;))\n\nclass UserService:\n    &quot;&quot;&quot;EN: Coordinates — orchestrates other services | UZB: Muvofiqlashtiради&quot;&quot;&quot;\n    def __init__(self):\n        self.repo = UserRepository()\n        self.email = EmailService()\n        self.validator = UserValidator()\n\n    def register(self, name: str, email: str):\n        data = {&quot;name&quot;: name, &quot;email&quot;: email}\n        if not self.validator.validate(data):\n            raise ValueError(&quot;Invalid user data | Noto'g'ri ma'lumot&quot;)\n        user_id = self.repo.save(data)\n        self.email.send_welcome(email, name)\n        return user_id\n\nsvc = UserService()\nsvc.register(&quot;Alyorjon&quot;, &quot;a@example.com&quot;)\n</code></pre>\n<hr />\n<h3 id=\"80-what-is-the-openclosed-principle-ocp-ochiqyopiq-tamoyil-nima\">80. What is the Open/Closed Principle (OCP)? | Ochiq/Yopiq Tamoyil nima?</h3>\n<p><strong>EN:</strong> Classes should be <strong>open for extension but closed for modification</strong>.</p>\n<p><strong>UZB:</strong> Klasslar <strong>kengaytirish uchun ochiq, lekin o'zgartirish uchun yopiq</strong> bo'lishi kerak.</p>\n<pre><code class=\"language-python\">from abc import ABC, abstractmethod\n\n# EN: OCP — add new behavior without modifying existing code\n# UZB: OCP — mavjud kodni o'zgartirmasdan yangi xatti-harakat qo'shish\n\nclass DiscountStrategy(ABC):\n    @abstractmethod\n    def apply(self, price: float) -&gt; float: pass\n\n    @abstractmethod\n    def description(self) -&gt; str: pass\n\nclass NoDiscount(DiscountStrategy):\n    def apply(self, price): return price\n    def description(self): return &quot;EN: No discount | UZB: Chegirma yo'q&quot;\n\nclass PercentDiscount(DiscountStrategy):\n    def __init__(self, percent: float):\n        self.percent = percent\n    def apply(self, price): return price * (1 - self.percent / 100)\n    def description(self): return f&quot;{self.percent}% off | {self.percent}% chegirma&quot;\n\nclass SeasonalDiscount(DiscountStrategy):     # EN: NEW — no old code changed!\n    def apply(self, price): return price * 0.75  # UZB: YANGI — eski kod o'zgarmadi!\n    def description(self): return &quot;EN: 25% seasonal | UZB: 25% mavsumiy&quot;\n\nclass Order:\n    def __init__(self, items: list, strategy: DiscountStrategy):\n        self.items = items\n        self.strategy = strategy\n\n    def total(self) -&gt; float:\n        subtotal = sum(self.items)\n        discounted = self.strategy.apply(subtotal)\n        print(f&quot;Subtotal: {subtotal:,} | {self.strategy.description()} | Total: {discounted:,}&quot;)\n        return discounted\n\nOrder([100_000, 200_000, 150_000], PercentDiscount(10)).total()\nOrder([100_000, 200_000, 150_000], SeasonalDiscount()).total()\n</code></pre>\n<hr />\n<h3 id=\"81-what-is-the-interface-segregation-principle-isp-interfeys-ajratish-tamoyili-nima\">81. What is the Interface Segregation Principle (ISP)? | Interfeys Ajratish Tamoyili nima?</h3>\n<p><strong>EN:</strong> Clients should <strong>not be forced to depend on interfaces they don't use</strong> — prefer many small interfaces.</p>\n<p><strong>UZB:</strong> Mijozlar <strong>ishlatmaydigan interfeysga bog'liq bo'lishga majburlanmasligi</strong> kerak — ko'p kichik interfeys afzal.</p>\n<pre><code class=\"language-python\">from abc import ABC, abstractmethod\n\n# EN: VIOLATION — fat interface\n# UZB: BUZILISH — yo'g'on interfeys\n\nclass WorkerBAD(ABC):\n    @abstractmethod\n    def work(self): pass\n    @abstractmethod\n    def eat(self): pass        # EN: robots don't eat! | UZB: robotlar ovqatlanmaydi!\n    @abstractmethod\n    def sleep(self): pass      # EN: robots don't sleep! | UZB: robotlar uxlamaydi!\n\n# EN: CORRECT — segregated interfaces\n# UZB: TO'G'RI — ajratilgan interfeyslat\n\nclass Workable(ABC):\n    @abstractmethod\n    def work(self) -&gt; str: pass\n\nclass Eatable(ABC):\n    @abstractmethod\n    def eat(self) -&gt; str: pass\n\nclass Sleepable(ABC):\n    @abstractmethod\n    def sleep(self) -&gt; str: pass\n\nclass HumanWorker(Workable, Eatable, Sleepable):   # EN: all applicable | UZB: hammasi mos\n    def work(self): return &quot;Human working | Inson ishlayapti&quot;\n    def eat(self): return &quot;Human eating | Inson ovqatlanyapti&quot;\n    def sleep(self): return &quot;Human sleeping | Inson uxlayapti&quot;\n\nclass RobotWorker(Workable):                        # EN: only what's applicable!\n    def work(self): return &quot;Robot working 24/7 | Robot 24/7 ishlayapti&quot;  # UZB: faqat tegishli!\n\nhuman = HumanWorker()\nrobot = RobotWorker()\nprint(human.work()); print(human.eat())\nprint(robot.work())  # robot.eat() — AttributeError, correctly!\n</code></pre>\n<hr />\n<h3 id=\"82-what-is-the-dependency-inversion-principle-dip-bogliqlikni-teskari-aylantirish-tamoyili-nima\">82. What is the Dependency Inversion Principle (DIP)? | Bog'liqlikni Teskari Aylantirish Tamoyili nima?</h3>\n<p><strong>EN:</strong> High-level modules should <strong>depend on abstractions</strong>, not on low-level modules.</p>\n<p><strong>UZB:</strong> Yuqori darajali modullar <strong>abstraktsiyalarga bog'liq</strong> bo'lishi kerak, past darajali modullarga emas.</p>\n<pre><code class=\"language-python\">from abc import ABC, abstractmethod\n\n# EN: DIP — both high and low level depend on abstraction\n# UZB: DIP — yuqori va past darajali ham abstraktsiyaga bog'liq\n\nclass NotificationChannel(ABC):    # EN: abstraction | UZB: abstraktsiya\n    @abstractmethod\n    def send(self, to: str, message: str) -&gt; bool: pass\n\nclass EmailChannel(NotificationChannel):   # EN: low-level | UZB: past darajali\n    def send(self, to, message):\n        print(f&quot;[EMAIL → {to}] {message}&quot;)\n        return True\n\nclass SMSChannel(NotificationChannel):\n    def send(self, to, message):\n        print(f&quot;[SMS → {to}] {message}&quot;)\n        return True\n\nclass TelegramChannel(NotificationChannel):\n    def send(self, to, message):\n        print(f&quot;[TELEGRAM → {to}] {message}&quot;)\n        return True\n\nclass OrderService:                 # EN: high-level | UZB: yuqori darajali\n    def __init__(self, channel: NotificationChannel):\n        self.channel = channel      # EN: depends on abstraction | UZB: abstraktsiyaga bog'liq\n\n    def place_order(self, customer: str, item: str):\n        print(f&quot;Order placed: {item} | Buyurtma qabul qilindi: {item}&quot;)\n        self.channel.send(customer, f&quot;Your order '{item}' confirmed | tasdiqlandi!&quot;)\n\n# EN: Easy to swap channels | UZB: Kanallarni oson almashtirish\nOrderService(EmailChannel()).place_order(&quot;a@ex.com&quot;, &quot;Laptop&quot;)\nOrderService(TelegramChannel()).place_order(&quot;@alyorjon&quot;, &quot;Phone&quot;)\n</code></pre>\n<hr />\n<h2 id=\"8-design-patterns-dizayn-patternlar\">8. Design Patterns | Dizayn Patternlar</h2>\n<hr />\n<h3 id=\"83-what-is-an-adapter-pattern-adapter-pattern-nima\">83. What is an adapter pattern? | Adapter pattern nima?</h3>\n<p><strong>EN:</strong> A design pattern that allows <strong>incompatible interfaces to work together</strong>.</p>\n<p><strong>UZB:</strong> <strong>Mos kelmaydigan interfeyslarga birga ishlash</strong> imkonini beradigan dizayn pattern.</p>\n<pre><code class=\"language-python\"># EN: Adapter — like a power plug adapter\n# UZB: Adapter — elektr rozetka adapteri kabi\n\nclass LegacyPaymentSystem:\n    &quot;&quot;&quot;EN: Old system — different interface | UZB: Eski tizim — boshqa interfeys&quot;&quot;&quot;\n    def make_payment_in_tiyin(self, amount_tiyin: int) -&gt; dict:\n        return {&quot;status&quot;: &quot;ok&quot;, &quot;paid&quot;: amount_tiyin, &quot;currency&quot;: &quot;tiyin&quot;}\n\nclass ModernPaymentInterface:\n    &quot;&quot;&quot;EN: New contract | UZB: Yangi shartnoma
