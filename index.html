iralash → sandbox muhitida sinab ko'rish → yangilash ustasini ishga tushirish → barcha modullar va maxsus qo'shimcha dasturlarni tekshirish → foydalanuvchi qabul testi → past trafikli davrda ishga tushirish.</p>\n</blockquote>\n<hr />\n<p><strong>75. Quality Control (Sifat nazorati) SAP B1 da?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP B1 supports QC through: item inspection at goods receipt, serial/batch number tracking, hold/release mechanisms, and integration with third-party QC add-ons for regulated industries.<br />\n<strong>UZ:</strong> SAP B1 QC ni quyidagilar orqali qo'llab-quvvatlaydi: tovar qabulida tovar tekshiruvi, seriya/partiya raqamini kuzatish, ushlab turish/ozod qilish mexanizmlari va tartibga solinadigan sanoat uchun uchinchi tomon QC qo'shimcha dasturlari bilan integratsiya.</p>\n</blockquote>\n<hr />\n<p><strong>76. Batch Number va Serial Number kuzatish?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP B1 supports batch (lot) and serial number tracking for items. Each batch/serial number can be tracked from receipt to delivery, providing full traceability for quality and warranty purposes.<br />\n<strong>UZ:</strong> SAP B1 tovarlar uchun partiya (lot) va seriya raqamini kuzatishni qo'llab-quvvatlaydi. Har bir partiya/seriya raqami qabuldan yetkazib berishgacha kuzatilishi mumkin, sifat va kafolat maqsadlari uchun to'liq kuzatuvchanlikni ta'minlaydi.</p>\n</blockquote>\n<hr />\n<p><strong>77. SAP B1 da Cloud vs On-Premise afzalliklari?</strong></p>\n<table>\n<thead>\n<tr>\n<th></th>\n<th>On-Premise</th>\n<th>Cloud</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Narx</td>\n<td>Bir martalik</td>\n<td>Oylik abonement</td>\n</tr>\n<tr>\n<td>Nazorat</td>\n<td>To'liq</td>\n<td>Cheklangan</td>\n</tr>\n<tr>\n<td>IT xarajat</td>\n<td>Yuqori</td>\n<td>Past</td>\n</tr>\n<tr>\n<td>Yangilanish</td>\n<td>Qo'lda</td>\n<td>Avtomatik</td>\n</tr>\n<tr>\n<td>Xavfsizlik</td>\n<td>Mijoz mas'ul</td>\n<td>SAP mas'ul</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<p><strong>78. SAP B1 mobile ilovalar?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP B1 offers three mobile apps: <strong>SAP Business One App</strong> (managers/overview), <strong>Sales App</strong> (for salespeople - quotations, orders), <strong>Service App</strong> (for technicians - service calls, equipment). All sync via secure internet connection.<br />\n<strong>UZ:</strong> SAP B1 uchta mobil ilova taqdim etadi: <strong>SAP Business One App</strong> (menejerlar/umumiy ko'rinish), <strong>Savdo Ilovasi</strong> (sotuvchilar uchun - takliflar, buyurtmalar), <strong>Xizmat Ilovasi</strong> (texnik xodimlar uchun - xizmat qo'ng'iroqlari, uskunalar).</p>\n</blockquote>\n<hr />\n<p><strong>79. SAP B1 da Consolidation (Konsolidatsiya)?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> For multi-company consolidation in SAP B1, each subsidiary runs its own SAP B1 instance. Consolidation reports are produced by aggregating data using XL Reporter or external BI tools.<br />\n<strong>UZ:</strong> SAP B1 da ko'p kompaniyali konsolidatsiya uchun har bir sho'ba kompaniya o'z SAP B1 nusxasida ishlaydi. Konsolidatsiya hisobotlari XL Reporter yoki tashqi BI vositalari yordamida ma'lumotlarni yig'ish orqali tayyorlanadi.</p>\n</blockquote>\n<hr />\n<p><strong>80. SAP B1 da Archive (Arxivlash) strategiyasi?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Data archiving in SAP B1: archive old closed documents to separate databases, maintain performance of active database, comply with legal retention requirements. SAP provides archiving tools per version.<br />\n<strong>UZ:</strong> SAP B1 da ma'lumotlarni arxivlash: eski yopiq hujjatlarni alohida ma'lumotlar bazalariga arxivlash, faol ma'lumotlar bazasi unumdorligini saqlash, qonuniy saqlash talablariga rioya qilish.</p>\n</blockquote>\n<hr />\n<h2 id=\"4-ekspert-daraja-expert\">4. Ekspert daraja / Expert</h2>\n<p><strong>81. Murakkab intercompany tranzaksiyalarni qanday loyihalash?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Design approach: identify cross-border tax rules per country, set up elimination accounts, use B1iF or custom integration for automatic document creation in counterpart company, implement reconciliation reports.<br />\n<strong>UZ:</strong> Loyihalash yondashuvi: mamlakatlar bo'yicha chegaralararo soliq qoidalarini aniqlash, yo'q qilish hisoblarini sozlash, hamtomon kompaniyada avtomatik hujjat yaratish uchun B1iF yoki maxsus integratsiyadan foydalanish, rekonsilyatsiya hisobotlarini amalga oshirish.</p>\n</blockquote>\n<hr />\n<p><strong>82. SQL so'rovlarini SAP B1 da optimallashtirish?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Optimization: use proper indexes on filtered columns, avoid <code>SELECT *</code>, use covering indexes, rewrite correlated subqueries as JOINs, analyze execution plans in SQL Profiler, use SAP HANA calculation views for aggregation.<br />\n<strong>UZ:</strong> Optimallashtirish: filtrlangan ustunlarda to'g'ri indekslardan foydalanish, <code>SELECT *</code> dan qochish, qoplama indekslardan foydalanish, bog'liq subso'rovlarni JOIN larga qayta yozish, SQL Profiler da bajarish rejalarini tahlil qilish.</p>\n</blockquote>\n<hr />\n<p><strong>83. Seriya raqamini kuzatish WMS bilan integratsiya?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Integration approach: SAP B1 serial number is created at GR; WMS scans and confirms via Service Layer API. On delivery, SAP B1 allocates the serial number; WMS confirms pick and ship in real-time.<br />\n<strong>UZ:</strong> Integratsiya yondashuvi: SAP B1 seriya raqami GR da yaratiladi; WMS Service Layer API orqali skanerlaydi va tasdiqlaydi. Yetkazib berishda SAP B1 seriya raqamini ajratadi; WMS real vaqtda tanlash va jo'natishni tasdiqlaydi.</p>\n</blockquote>\n<hr />\n<p><strong>84. BI yechimini SAP B1 ustida qanday qurish?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Options: SAP HANA Views + Crystal Reports (native), XL Reporter (Excel-based), connect Power BI/Tableau to HANA/SQL Server (read-only), use B1iF to ETL data into a data warehouse.<br />\n<strong>UZ:</strong> Variantlar: SAP HANA Views + Crystal Reports (mahalliy), XL Reporter (Excel-asosli), Power BI/Tableau ni HANA/SQL Server ga ulash (faqat o'qish), ma'lumotlar omboriga ma'lumot ETL qilish uchun B1iF dan foydalanish.</p>\n</blockquote>\n<hr />\n<p><strong>85. DI API orqali avtomatik vazifalarni qanday amalga oshirish?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Use DI API with Windows Service or Task Scheduler: connect to company using <code>SAPbobsCOM.Company</code>, iterate through business objects, handle errors with return code checking (0 = success), log all operations.<br />\n<strong>UZ:</strong> DI API ni Windows Service yoki Task Scheduler bilan ishlatish: <code>SAPbobsCOM.Company</code> yordamida kompaniyaga ulanish, biznes ob'ektlari orqali takrorlash, qaytish kodini tekshirish bilan xatolarni boshqarish (0 = muvaffaqiyat), barcha operatsiyalarni jurnalga kiritish.</p>\n</blockquote>\n<pre><code class=\"language-csharp\">// Misol: DI API orqali hisob-faktura yaratish\nSAPbobsCOM.Company oCompany = new SAPbobsCOM.Company();\noCompany.Server = &quot;SERVER_NAME&quot;;\noCompany.CompanyDB = &quot;DB_NAME&quot;;\noCompany.UserName = &quot;manager&quot;;\noCompany.Password = &quot;password&quot;;\n\nint retCode = oCompany.Connect();\nif (retCode == 0) {\n    SAPbobsCOM.Documents oInvoice = \n        oCompany.GetBusinessObject(SAPbobsCOM.BoObjectTypes.oInvoices);\n    oInvoice.CardCode = &quot;C00001&quot;;\n    oInvoice.Lines.ItemCode = &quot;ITEM001&quot;;\n    oInvoice.Lines.Quantity = 10;\n    oInvoice.Add();\n}\n</code></pre>\n<hr />\n<p><strong>86. Licensing (Litsenziya) turlari?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP B1 licenses: <strong>Professional User</strong> (full access, ~$3,000/year), <strong>Limited User</strong> (read-only/limited modules, cheaper), <strong>Starter Package</strong> (up to 5 users, all modules included, fixed price for very small businesses).<br />\n<strong>UZ:</strong> SAP B1 litsenziyalari: <strong>Professional User</strong> (to'liq kirish, ~$3,000/yil), <strong>Limited User</strong> (faqat o'qish/cheklangan modullar, arzonroq), <strong>Starter Package</strong> (5 foydalanuvchigacha, barcha modullar, juda kichik biznes uchun).</p>\n</blockquote>\n<hr />\n<p><strong>87. Regulated Industry (Tartibga solinadigan sanoat) da SAP B1 qiyinchiliklari?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Challenges: FDA 21 CFR Part 11 compliance (audit trails, electronic signatures), GMP validation documentation, SOX compliance for financial controls, GDPR for data privacy — requires careful configuration and add-on validation.<br />\n<strong>UZ:</strong> Qiyinchiliklar: FDA 21 CFR Part 11 muvofiqligi (audit izlari, elektron imzolar), GMP tekshiruvi hujjatlari, moliyaviy nazorat uchun SOX muvofiqligi, ma'lumotlar maxfiyligi uchun GDPR — ehtiyotkorlik bilan sozlash va qo'shimcha dastur tekshiruvini talab qiladi.</p>\n</blockquote>\n<hr />\n<p><strong>88. Version Control va Deployment SAP B1 add-on uchun?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Best practices: use Git for source code, maintain dev/test/prod SAP B1 instances, use SAP Add-On Registration (.ard file) for deployment, document all customizations, test in sandbox before production deployment.<br />\n<strong>UZ:</strong> Eng yaxshi amaliyotlar: manba kodi uchun Git dan foydalanish, dev/test/prod SAP B1 nusxalarini saqlash, joylashtirish uchun SAP Add-On ro'yxatga olish (.ard fayl) dan foydalanish, barcha sozlashlarni hujjatlashtirish.</p>\n</blockquote>\n<hr />\n<p><strong>89. Peak Hours Performance muammolarini diagnostika qilish?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Tools: SQL Server Activity Monitor, SAP B1 System Log, Windows Performance Monitor, Network monitoring. Common causes: missing indexes, poorly written add-ons, insufficient server RAM, heavy MRP/reporting jobs during business hours.<br />\n<strong>UZ:</strong> Vositalar: SQL Server Activity Monitor, SAP B1 Tizim Jurnali, Windows Performance Monitor, Tarmoq monitoringi. Umumiy sabablar: yo'q indekslar, yomon yozilgan qo'shimcha dasturlar, yetarli bo'lmagan server RAM, ish soatlarida og'ir MRP/hisobot ishlari.</p>\n</blockquote>\n<hr />\n<p><strong>90. On-Premise dan Cloud ga migratsiya qanday?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Steps: assess customizations compatibility → export data → set up cloud environment → restore database → reconfigure add-ons for cloud → test all integrations → cut-over planning → go-live with parallel run period.<br />\n<strong>UZ:</strong> Qadamlar: sozlashlar muvofiqligini baholash → ma'lumotlarni eksport qilish → cloud muhitini sozlash → ma'lumotlar bazasini tiklash → qo'shimcha dasturlarni cloud uchun qayta sozlash → barcha integratsiyalarni sinab ko'rish → o'tish rejalashtirish → parallel ishlash davri bilan ishga tushirish.</p>\n</blockquote>\n<hr />\n<p><strong>91. Data Integrity (Ma'lumot yaxlitligi) ta'minlash?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Strategies: enforce mandatory fields via UDF validation, use approval procedures for critical changes, enable audit trail, implement regular data quality checks via SQL queries, restrict direct database access.<br />\n<strong>UZ:</strong> Strategiyalar: UDF tekshiruvi orqali majburiy maydonlarni joriy qilish, muhim o'zgarishlar uchun tasdiqlash tartiblaridan foydalanish, audit izini yoqish, SQL so'rovlari orqali muntazam ma'lumot sifati tekshiruvlarini amalga oshirish.</p>\n</blockquote>\n<hr />\n<p><strong>92. Intercompany Elimination qanday amalga oshiriladi?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Create dedicated intercompany GL accounts, post intercompany invoices to these accounts, use consolidation add-on or Excel to eliminate intercompany balances when preparing group financial statements.<br />\n<strong>UZ:</strong> Maxsus kompaniyalararo GL hisoblarini yaratish, kompaniyalararo hisob-fakturalarni ushbu hisoblarga joylashtirish, guruh moliyaviy hisobotlarini tayyorlashda kompaniyalararo balanslarni yo'q qilish uchun konsolidatsiya qo'shimcha dasturi yoki Excel dan foydalanish.</p>\n</blockquote>\n<hr />\n<p><strong>93. SAP B1 da Audit Trail (Audit izi) qanday ishlaydi?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP B1 logs changes to documents in the <code>ADOC</code> and change log tables. You can enable Change Log per table in Administration → System Initialization → Change Log. Tracks who changed what and when.<br />\n<strong>UZ:</strong> SAP B1 hujjatlardagi o'zgarishlarni <code>ADOC</code> va o'zgarishlar jurnali jadvallarida qayd etadi. Administration → System Initialization → Change Log da jadval bo'yicha O'zgarishlar Jurnalini yoqish mumkin.</p>\n</blockquote>\n<hr />\n<p><strong>94. Crystal Reports da murakkab hisobotlar qanday yaratiladi?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Advanced Crystal Reports in SAP B1: use subreports for related data, parameter fields for user input, formula fields for calculations, cross-tabs for pivot-style analysis, and linked reports for drill-down.<br />\n<strong>UZ:</strong> SAP B1 da murakkab Crystal Reports: bog'liq ma'lumotlar uchun subhisobotlardan foydalanish, foydalanuvchi kiritishi uchun parametr maydonlari, hisob-kitoblar uchun formula maydonlari, pivot-uslubdagi tahlil uchun cross-tablar.</p>\n</blockquote>\n<hr />\n<p><strong>95. SAP B1 da Interoperability (Boshqa tizimlar bilan mos ishlash)?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP B1 integrates with: Microsoft Office (Excel, Outlook), Crystal Reports, third-party WMS, e-commerce platforms, payment gateways, EDI systems, banking software, and custom ERP components via Service Layer/DI API.<br />\n<strong>UZ:</strong> SAP B1 quyidagilar bilan integratsiyalashadi: Microsoft Office (Excel, Outlook), Crystal Reports, uchinchi tomon WMS, e-commerce platformalari, to'lov shlyuzlari, EDI tizimlari, bank dasturlari va Service Layer/DI API orqali maxsus ERP komponentlari.</p>\n</blockquote>\n<hr />\n<p><strong>96. SAP B1 Implementation metodologiyasi?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP uses <strong>ASAP</strong> (Accelerated SAP) or <strong>SAP Activate</strong> methodology: <strong>Prepare</strong> → <strong>Explore</strong> (BBP - Business Blueprint) → <strong>Realize</strong> (configuration/development) → <strong>Deploy</strong> (UAT, go-live) → <strong>Run</strong> (support).<br />\n<strong>UZ:</strong> SAP <strong>ASAP</strong> (Tezlashtirilgan SAP) yoki <strong>SAP Activate</strong> metodologiyasidan foydalanadi: <strong>Tayyorlash</strong> → <strong>O'rganish</strong> (BBP - Biznes Chizmasi) → <strong>Amalga oshirish</strong> (sozlash/ishlab chiqish) → <strong>Joylashtirish</strong> (UAT, ishga tushirish) → <strong>Ishlatish</strong> (qo'llab-quvvatlash).</p>\n</blockquote>\n<hr />\n<p><strong>97. SAP B1 da Real-time Reporting HANA bilan?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> With SAP HANA: create Calculation Views for complex aggregations, use Analytical Privileges for security, expose data via OData for Power BI/Lumira, eliminate need for period-end batch reports with live data access.<br />\n<strong>UZ:</strong> SAP HANA bilan: murakkab agregatlar uchun Hisoblash Ko'rinishlarini yaratish, xavfsizlik uchun Tahliliy Imtiyozlardan foydalanish, Power BI/Lumira uchun OData orqali ma'lumotlarni ochish, jonli ma'lumotlarga kirish bilan davr oxiri partiya hisobotlariga ehtiyojni yo'q qilish.</p>\n</blockquote>\n<hr />\n<p><strong>98. GDPR va ma'lumotlar maxfiyligi SAP B1 da?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP B1 supports GDPR through: data anonymization tools, consent tracking, right-to-erasure workflows (with limitations for accounting records), data access controls, and audit logging of personal data access.<br />\n<strong>UZ:</strong> SAP B1 GDPR ni quyidagilar orqali qo'llab-quvvatlaydi: ma'lumotlarni anonimlashtirish vositalari, rozilikni kuzatish, o'chirish huquqi ish oqimlari (buxgalteriya yozuvlari uchun cheklovlar bilan), ma'lumotlarga kirish nazorati va shaxsiy ma'lumotlarga kirishning audit jurnali.</p>\n</blockquote>\n<hr />\n<p><strong>99. SAP B1 da eng keng tarqalgan xatolar va yechimlari?</strong></p>\n<table>\n<thead>\n<tr>\n<th>Xato / Error</th>\n<th>Sabab / Cause</th>\n<th>Yechim / Solution</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>\"Business Partner not found\"</td>\n<td>Noto'g'ri CardCode</td>\n<td>Master data tekshirish</td>\n</tr>\n<tr>\n<td>\"Document is locked\"</td>\n<td>Boshqa foydalanuvchi ochiq</td>\n<td>Faol sessiyalarni tekshirish</td>\n</tr>\n<tr>\n<td>\"Period is locked\"</td>\n<td>Yopilgan hisob davri</td>\n<td>Period sozlamalarini ochish</td>\n</tr>\n<tr>\n<td>\"Insufficient quantity\"</td>\n<td>Manfiy zaxira</td>\n<td>Inventar auditini o'tkazish</td>\n</tr>\n<tr>\n<td>DI API return code ≠ 0</td>\n<td>Turli sabab</td>\n<td><code>oCompany.GetLastErrorDescription()</code></td>\n</tr>\n</tbody>\n</table>\n<hr />\n<p><strong>100. SAP B1 bo'yicha yangiliklar va resurslarni qanday kuzatib borish?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Resources: <strong>SAP Community</strong> (community.sap.com), <strong>SAP Help Portal</strong> (help.sap.com), <strong>SAP Business One SDK documentation</strong>, <strong>SAP Notes</strong> (support.sap.com), SAP B1 YouTube channel, partner forums, and SAP certification programs.<br />\n<strong>UZ:</strong> Resurslar: <strong>SAP Community</strong> (community.sap.com), <strong>SAP Help Portal</strong> (help.sap.com), <strong>SAP Business One SDK hujjatlari</strong>, <strong>SAP Eslatmalari</strong> (support.sap.com), SAP B1 YouTube kanali, hamkor forumlar va SAP sertifikatlash dasturlari.</p>\n</blockquote>\n<hr />\n<h2 id=\"tezkor-yol-yoriq-quick-cheatsheet\">📋 Tezkor Yo'l-Yo'riq / Quick Cheatsheet</h2>\n<h3 id=\"sap-b1-asosiy-jadvallar-key-tables\">SAP B1 asosiy jadvallar / Key Tables</h3>\n<pre><code class=\"language-sql\">OCRD  -- Business Partners (Mijoz/Vendor/Lead)\nOITM  -- Item Master Data (Tovarlar)\nORDR  -- Sales Orders (Savdo buyurtmalari)\nOINV  -- AR Invoices (Debitor hisob-fakturalar)\nOPOR  -- Purchase Orders (Xarid buyurtmalari)\nOPCH  -- AP Invoices (Kreditor hisob-fakturalar)\nOIGN  -- Goods Receipt (Tovar qabuli)\nOIGE  -- Goods Issue (Tovar chiqarish)\nOIVL  -- Inventory Transactions (Inventar tranzaksiyalari)\nJDT1  -- Journal Entry Lines (Journal yozuv satrlari)\nOJDT  -- Journal Entry Header (Journal yozuv sarlavhasi)\nOACT  -- Chart of Accounts (Hisoblar rejasi)\nOWHS  -- Warehouses (Omborlar)\n</code></pre>\n<h3 id=\"hujjat-holatlari-document-statuses\">Hujjat holatlari / Document Statuses</h3>\n<table>\n<thead>\n<tr>\n<th>Kod</th>\n<th>Ma'no (UZ)</th>\n<th>English</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>O</code></td>\n<td>Ochiq</td>\n<td>Open</td>\n</tr>\n<tr>\n<td><code>C</code></td>\n<td>Yopiq</td>\n<td>Closed</td>\n</tr>\n<tr>\n<td><code>L</code></td>\n<td>Bekor qilingan</td>\n<td>Cancelled</td>\n</tr>\n<tr>\n<td><code>D</code></td>\n<td>O'chirilgan</td>\n<td>Deleted</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"di-api-return-codes\">DI API Return Codes</h3>\n<table>\n<thead>\n<tr>\n<th>Kod</th>\n<th>Ma'no</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>0</code></td>\n<td>Muvaffaqiyat / Success</td>\n</tr>\n<tr>\n<td><code>-1</code></td>\n<td>Umumiy xato / General error</td>\n</tr>\n<tr>\n<td><code>-2006</code></td>\n<td>Foydalanuvchi avtorizatsiyasi yo'q / No user authorization</td>\n</tr>\n<tr>\n<td><code>-2028</code></td>\n<td>Hujjat yopiq / Document is closed</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<p><em>Tayyorlagan / Prepared by: Alyorjon | Manba / Source: SAP B1 Interview Questions (adaface.com, mindmajix.com, community.sap.com)</em></p>"}, "mind": {"label": "🧠 Mind / Behavioral", "body": "<h1 id=\"70-eng-qiyin-intervyu-savollari-va-javoblari\">70 Eng Qiyin Intervyu Savollari va Javoblari</h1>\n<h1 id=\"70-toughest-interview-questions-and-answers\">70 Toughest Interview Questions and Answers</h1>\n<blockquote>\n<p><strong>Bilingual Guide | Ikki tilli qo'llanma</strong> — English 🇬🇧 + O'zbek 🇺🇿<br />\nHar bir javobda real hayotiy misol keltirilgan.<br />\nEach answer includes a real-life example.</p>\n</blockquote>\n<hr />\n<h2 id=\"1-tell-me-about-yourself-ozingiz-haqingizda-gapiring\">1. Tell me about yourself. / O'zingiz haqingizda gapiring.</h2>\n<p><strong>EN:</strong> Start with your background, then highlight relevant experience, and finish with what you're passionate about.</p>\n<blockquote>\n<p><em>\"I have a Bachelor's degree in Computer Science and 3+ years of experience as a Python backend developer. I've built payment systems, ERP integrations, and Telegram bots. I'm passionate about clean architecture and solving real business problems through automation.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Avval ta'lim fonini, keyin tajribangizni, so'ngra qiziqishlaringizni aytib bering.</p>\n<blockquote>\n<p><em>\"Men kompyuter fanlari bo'yicha bakalavr darajasiga ega bo'lib, 3 yildan ortiq Python backend dasturchi sifatida ishlayman. To'lov tizimlari, ERP integratsiyalari va Telegram botlar yaratganman. Toza arxitektura va avtomatlashtirish orqali biznes muammolarini hal qilish mening qiziqishimdir.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"2-why-should-we-hire-you-nima-uchun-aynan-sizni-ishga-olishimiz-kerak\">2. Why should we hire you? / Nima uchun aynan sizni ishga olishimiz kerak?</h2>\n<p><strong>EN:</strong> Focus on your unique value — technical skills + soft skills + proven results.</p>\n<blockquote>\n<p><em>\"I bring a rare combination of backend development skills (FastAPI, PostgreSQL, Redis) and hands-on SAP B1 ERP experience. I've delivered a multi-database credit scoring system serving 500+ clients. I don't just write code — I understand business processes.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> O'zingizning noyob qiymatinglizga e'tibor qarating — texnik ko'nikmalar + yumshoq ko'nikmalar + natijalar.</p>\n<blockquote>\n<p><em>\"Men backend ko'nikmalari (FastAPI, PostgreSQL, Redis) va SAP B1 ERP tajribasini birlashtiraman. 500+ mijozga xizmat qiluvchi ko'p bazali kredit ballashtirish tizimini yetkazib berdim. Men faqat kod yozib qolmay, biznes jarayonlarni ham tushunaman.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"3-whats-your-greatest-strength-eng-katta-kuchli-tomoningiz-nima\">3. What's your greatest strength? / Eng katta kuchli tomoningiz nima?</h2>\n<p><strong>EN:</strong> Choose a strength directly relevant to the role and back it with an example.</p>\n<blockquote>\n<p><em>\"Adaptability. When our team had to migrate from a monolith to microservices in 2 months, I quickly learned Docker, set up CI/CD pipelines, and guided junior developers — we delivered on time.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Lavozimga bevosita aloqador kuchli tomoningizni tanlang va uni misol bilan tasdiqlang.</p>\n<blockquote>\n<p><em>\"Moslashuvchanlik. Jamoamiz 2 oyda monolitdan mikroxizmatlarga o'tishi kerak bo'lganda, Docker o'rgandim, CI/CD sozladim va yosh dasturchilarni yo'naltirdim — muddatida yetkazib berdik.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"4-whats-your-greatest-weakness-eng-katta-zaif-tomoningiz-nima\">4. What's your greatest weakness? / Eng katta zaif tomoningiz nima?</h2>\n<p><strong>EN:</strong> Be honest but show growth. Pick a real weakness you've actively improved.</p>\n<blockquote>\n<p><em>\"I used to take on too many tasks myself instead of delegating. I've worked on this by creating task templates and trusting teammates with clear ownership — now our team velocity has improved.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Rostini ayting, lekin rivojlanishingizni ko'rsating. Ishlayotgan zaif tomoningizni tanlang.</p>\n<blockquote>\n<p><em>\"Avval vazifalarni o'zimga olish odatim bor edi. Vazifa shablonlari yaratib, jamoaga aniq mas'uliyat topshirishni o'rgandim — hozir jamoamiz samaradorligi oshdi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"5-can-you-describe-a-challenging-situation-you-faced-at-work-and-how-you-handled-it-ishda-duch-kelgan-qiyin-vaziyatni-va-uni-qanday-hal-qilganingizni-aytib-bering\">5. Can you describe a challenging situation you faced at work and how you handled it? / Ishda duch kelgan qiyin vaziyatni va uni qanday hal qilganingizni aytib bering.</h2>\n<p><strong>EN:</strong> Use the <strong>STAR</strong> method — Situation, Task, Action, Result.</p>\n<blockquote>\n<p><em>\"Our production database went down 2 hours before a major client demo. I quickly identified a misconfigured connection pool, rolled back the config, and set up a read replica as backup — demo went smoothly.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> <strong>STAR</strong> usulidan foydalaning — Vaziyat, Vazifa, Harakat, Natija.</p>\n<blockquote>\n<p><em>\"Muhim mijoz namoyishi oldidan 2 soat oldin ishlab chiqarish bazamiz ishlamay qoldi. Noto'g'ri sozlangan ulanish havzasini aniqlab, konfigni orqaga qaytardim va zaxira sifatida o'qish replikasini o'rnatdim — namoyish muammosiz o'tdi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"6-where-do-you-see-yourself-in-five-years-ozingizni-besh-yildan-keyin-qanday-korasiz\">6. Where do you see yourself in five years? / O'zingizni besh yildan keyin qanday ko'rasiz?</h2>\n<p><strong>EN:</strong> Show ambition aligned with the company's growth.</p>\n<blockquote>\n<p><em>\"I see myself as a senior backend architect, leading system design decisions and mentoring a team. I want to specialize deeper in distributed systems and real-time data pipelines.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Kompaniya o'sishi bilan uyg'un ambitsiyangizni ko'rsating.</p>\n<blockquote>\n<p><em>\"O'zimni senior backend arxitektori sifatida ko'raman — tizim dizayni bo'yicha qarorlar qabul qilib, jamoaga rahbarlik qilaman. Taqsimlangan tizimlar va real vaqtli ma'lumotlar yo'nalishida chuqurroq ixtisoslashmoqchiman.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"7-why-did-you-leave-your-last-job-nima-uchun-oxirgi-ishingizdan-ketdingiz\">7. Why did you leave your last job? / Nima uchun oxirgi ishingizdan ketdingiz?</h2>\n<p><strong>EN:</strong> Be positive and forward-looking. Never badmouth your previous employer.</p>\n<blockquote>\n<p><em>\"I grew a lot in that role, but I reached a ceiling in terms of technical challenges. I'm looking for an environment where I can work on more complex systems and have greater impact.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Ijobiy va oldinga qarab gapiring. Oldingi ish beruvchingizni hech qachon yomonlamang.</p>\n<blockquote>\n<p><em>\"U yerda ko'p narsani o'rgandim, lekin texnik jihatdan potentsialim to'lib qoldi. Ko'proq murakkab tizimlarda ishlash va katta ta'sir ko'rsatish imkoniyatini izlamoqdaman.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"8-tell-me-about-a-time-you-failed-and-what-you-learned-from-it-muvaffaqiyatsizligingiz-va-undan-nimani-organganingiz-haqida-gapiring\">8. Tell me about a time you failed and what you learned from it. / Muvaffaqiyatsizligingiz va undan nimani o'rganganingiz haqida gapiring.</h2>\n<p><strong>EN:</strong> Show accountability and learning, not blame-shifting.</p>\n<blockquote>\n<p><em>\"I once underestimated the complexity of a database migration and caused 3 hours of downtime. I learned to always create a rollback plan, test on staging first, and communicate risk to stakeholders in advance.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Aybni boshqaga yuklamasdan, mas'uliyat va o'rganishni ko'rsating.</p>\n<blockquote>\n<p><em>\"Bir marta ma'lumotlar bazasini ko'chirishning murakkabligini kam baholadim va 3 soatlik uzilishga sabab bo'ldim. Har doim orqaga qaytish rejasi tuzishni, avval test muhitida sinashni va xatarlar haqida oldindan xabardor qilishni o'rgandim.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"9-how-do-you-handle-stress-or-pressure-stress-va-bosimni-qanday-boshqarasiz\">9. How do you handle stress or pressure? / Stress va bosimni qanday boshqarasiz?</h2>\n<p><strong>EN:</strong> Show concrete strategies, not just \"I stay calm.\"</p>\n<blockquote>\n<p><em>\"I break down the problem into smaller tasks, prioritize by impact, and communicate blockers early. During a critical API outage, this approach helped me stay focused and resolve the issue in under 90 minutes.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Faqat \"xotirjam qolaman\" emas, aniq strategiyalarni ko'rsating.</p>\n<blockquote>\n<p><em>\"Muammoni kichik vazifalarga bo'laman, ta'sir bo'yicha ustuvorlik qilaman va to'siqlar haqida erta xabar beraman. Kritik API uzilishi paytida bu yondashuv 90 daqiqadan kam vaqtda muammoni hal qilishga yordam berdi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"10-describe-a-situation-where-you-had-to-work-with-a-difficult-coworker-muammoli-hamkor-bilan-ishlagan-vaziyatingizni-tasvirlab-bering\">10. Describe a situation where you had to work with a difficult coworker. / Muammoli hamkor bilan ishlagan vaziyatingizni tasvirlab bering.</h2>\n<p><strong>EN:</strong> Show maturity and professionalism, not conflict.</p>\n<blockquote>\n<p><em>\"A colleague consistently missed deadlines affecting my work. I scheduled a private 1:1, understood their blockers (overload), and we jointly restructured task assignments — collaboration improved significantly.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Ziddiyat emas, yetuklik va professionallikni ko'rsating.</p>\n<blockquote>\n<p><em>\"Bir hamkasbim doimo muddatlarni o'tkazib yuborar, bu ishimga ta'sir qilardi. Xususiy suhbat o'tkazib, ularning to'siqlarini (haddan tashqari yuklanish) tushundim va vazifalarni birgalikda qayta tarqatdik — hamkorlik sezilarli darajada yaxshilandi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"11-whats-your-leadership-style-rahbarlik-uslubingiz-qanday\">11. What's your leadership style? / Rahbarlik uslubingiz qanday?</h2>\n<p><strong>EN:</strong> Be specific — not just \"collaborative.\"</p>\n<blockquote>\n<p><em>\"Collaborative and outcome-driven. I set clear goals, give autonomy, but hold weekly syncs to unblock issues. When I led the SAP B1 implementation, this style helped us finish 2 months ahead of schedule.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Aniq bo'ling — faqat \"hamkorlikchi\" emas.</p>\n<blockquote>\n<p><em>\"Hamkorlikka va natijalarga yo'naltirilgan. Aniq maqsadlar qo'yaman, mustaqillik beraman, lekin haftalik sinxronizatsiyalar o'tkazaman. SAP B1 joriy etishda bu uslub bizga 2 oy muddatdan oldin tugatishga yordam berdi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"12-how-do-you-stay-updated-with-industry-trends-and-developments-soha-yangiliklari-va-tendentsiyalardan-qanday-xabardor-bolasiz\">12. How do you stay updated with industry trends and developments? / Soha yangiliklari va tendentsiyalardan qanday xabardor bo'lasiz?</h2>\n<p><strong>EN:</strong> Name actual sources and communities you use.</p>\n<blockquote>\n<p><em>\"I follow PyCon talks, read the FastAPI and PostgreSQL release notes, participate in Reddit r/Python, and regularly test new tools in pet projects — like when I integrated pgvector for a RAG system.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Foydalanadigan manbalar va hamjamiyatlarni nomlang.</p>\n<blockquote>\n<p><em>\"PyCon ma'ruzalarini kuzataman, FastAPI va PostgreSQL yangiliklari eslatmalarini o'qiyman, Reddit r/Python hamjamiyatida ishtirok etaman va yangi vositalarni shaxsiy loyihalarda sinab ko'raman — masalan, RAG tizimi uchun pgvector integratsiyasini amalga oshirdim.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"13-what-do-you-know-about-our-company-kompaniyamiz-haqida-nima-bilasiz\">13. What do you know about our company? / Kompaniyamiz haqida nima bilasiz?</h2>\n<p><strong>EN:</strong> Research genuinely. Mention specific products, values, or recent news.</p>\n<blockquote>\n<p><em>\"I know you're a leading fintech in Uzbekistan focused on SME lending. Your recent API-first platform launch stood out to me — it aligns perfectly with my backend experience in financial systems.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Haqiqatan tadqiq qiling. Aniq mahsulotlar, qadriyatlar yoki oxirgi yangiliklar haqida gapiring.</p>\n<blockquote>\n<p><em>\"Siz O'zbekistondagi kichik va o'rta biznesga kreditlashga ixtisoslashgan yetakchi fintexsiz. So'nggi API-first platforma ishga tushirishingiz e'tiborimni tortdi — bu moliyaviy tizimlardagi backend tajribam bilan to'liq mos keladi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"14-why-do-you-want-to-work-here-nima-uchun-bu-yerda-ishlashni-xohlaysiz\">14. Why do you want to work here? / Nima uchun bu yerda ishlashni xohlaysiz?</h2>\n<p><strong>EN:</strong> Connect your personal goals with company values — not just \"good salary.\"</p>\n<blockquote>\n<p><em>\"Your engineering culture values developer autonomy and clean code — I saw this in your open-source contributions. I want to grow in an environment that treats backend architecture as a first-class concern.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Shaxsiy maqsadlaringizni kompaniya qadriyatlari bilan bog'lang — faqat \"yaxshi maosh\" emas.</p>\n<blockquote>\n<p><em>\"Muhandislik madaniyatingiz dasturchi mustaqilligini va toza kodni qadrlaydigan — buni ochiq manba hissalaringizda ko'rdim. Backend arxitekturasini birinchi darajali masala sifatida ko'radigan muhitda o'sishni xohlayman.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"15-can-you-provide-an-example-of-a-time-you-had-to-adapt-to-a-change-at-work-ishda-ozgarishga-moslashgan-misolingizni-keltiring\">15. Can you provide an example of a time you had to adapt to a change at work? / Ishda o'zgarishga moslashgan misolingizni keltiring.</h2>\n<p><strong>EN:</strong> Change = opportunity. Show how you led or embraced it.</p>\n<blockquote>\n<p><em>\"When management decided to switch our ORM from raw SQL to SQLAlchemy mid-project, I created a migration guide, converted the first 5 models as examples, and ran a short team workshop — we adapted in 3 days.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> O'zgarish = imkoniyat. Uni qanday qabul qilganingizni ko'rsating.</p>\n<blockquote>\n<p><em>\"Menejment loyiha o'rtasida oddiy SQL'dan SQLAlchemy ORM'ga o'tishga qaror qilganida, ko'chirish qo'llanmasini yaratdim, dastlabki 5 moddelni misol sifatida o'zgartirdim va qisqa jamoa sessiyasi o'tkazdim — 3 kunda moslashdik.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"16-what-motivates-you-in-your-career-karerrangizda-sizni-nima-ragbatlantiradi\">16. What motivates you in your career? / Karerrangizda sizni nima rag'batlantiradi?</h2>\n<p><strong>EN:</strong> Be genuine — interviewers spot generic answers immediately.</p>\n<blockquote>\n<p><em>\"Seeing a system I built handle real load in production. When our payment notification bot processed 10,000 transactions in a day without issues, that was deeply satisfying.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Chin bo'ling — suhbatdoshlar umumiy javoblarni darhol bilib oladi.</p>\n<blockquote>\n<p><em>\"O'zim qurgan tizimning ishlab chiqarishda haqiqiy yukni ko'tarishini ko'rish. To'lov bildirishnomalar botimiz bir kunda 10,000 ta tranzaksiyani muammosiz qayta ishlagan kuni bu juda qoniqarli bo'ldi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"17-describe-a-project-where-you-had-to-meet-tight-deadlines-qattiq-muddatga-rioya-qilish-zarur-bolgan-loyiha-haqida-gapiring\">17. Describe a project where you had to meet tight deadlines. / Qattiq muddatga rioya qilish zarur bo'lgan loyiha haqida gapiring.</h2>\n<p><strong>EN:</strong> Use STAR. Emphasize planning and communication, not just \"working hard.\"</p>\n<blockquote>\n<p><em>\"For a government tender system, we had a strict 6-week deadline. I broke it into 2-week sprints, deployed a CI/CD pipeline from day 1, and held daily standups. We launched 3 days early.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> STAR usulini qo'llang. Faqat \"qattiq ishlash\" emas, rejalashtirish va muloqotni ta'kidlang.</p>\n<blockquote>\n<p><em>\"Davlat tender tizimi uchun qat'iy 6 haftalik muddatimiz bor edi. Uni 2 haftalik sprintlarga bo'ldim, 1-kundan CI/CD yo'nalishini o'rnatdim va kunlik standaplar o'tkazdim. 3 kun avval ishga tushirdik.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"18-what-is-your-preferred-work-style-independently-or-in-a-team-qanday-ish-uslubini-afzal-korasiz-mustaqil-yoki-jamoada\">18. What is your preferred work style: independently or in a team? / Qanday ish uslubini afzal ko'rasiz: mustaqil yoki jamoada?</h2>\n<p><strong>EN:</strong> Show flexibility — both have value in different contexts.</p>\n<blockquote>\n<p><em>\"I thrive in both. Deep backend work — like optimizing queries or designing schemas — needs focused solo time. But system design and API contracts benefit enormously from team discussion.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Moslashuvchanlikni ko'rsating — har ikkalasi turli kontekstlarda qimmatlidir.</p>\n<blockquote>\n<p><em>\"Ikkalasida ham samarali ishlayman. So'rovlarni optimallashtirish yoki sxema dizayni kabi chuqur backend ishi uchun individual diqqat kerak. Lekin tizim dizayni va API shartnomalar jamoaviy muhokamadan katta foyda ko'radi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"19-how-do-you-handle-constructive-criticism-konstruktiv-tanqidni-qanday-qabul-qilasiz\">19. How do you handle constructive criticism? / Konstruktiv tanqidni qanday qabul qilasiz?</h2>\n<p><strong>EN:</strong> Show openness and action, not defensiveness.</p>\n<blockquote>\n<p><em>\"I welcome it. During a code review, a senior developer pointed out my API lacked proper error handling. I didn't just fix it — I created a shared error handling module used across the whole project.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Mudofaakorlik emas, ochiqlik va harakatni ko'rsating.</p>\n<blockquote>\n<p><em>\"Uni xush qabul qilaman. Kod ko'rib chiqishda, senior dasturchi mening API'imda to'g'ri xato boshqaruvi yo'qligini ko'rsatdi. Faqat tuzatib qolmay — butun loyihada ishlatiladigan umumiy xato boshqaruv modulini yaratdim.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"20-can-you-discuss-a-time-you-resolved-a-customers-complaint-mijoz-shikoyatini-hal-qilgan-vaqtingiz-haqida-gapiring\">20. Can you discuss a time you resolved a customer's complaint? / Mijoz shikoyatini hal qilgan vaqtingiz haqida gapiring.</h2>\n<p><strong>EN:</strong> Show empathy first, then solution.</p>\n<blockquote>\n<p><em>\"A client reported their reports weren't loading. I listened, reproduced the issue, identified a Firebird query timeout, optimized it in 2 hours, and called them back personally — they became our biggest reference.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Avval hamdardlik, keyin yechim ko'rsating.</p>\n<blockquote>\n<p><em>\"Bir mijoz hisobotlari yuklanmayotganini bildirdi. Tingladim, muammoni takrorladim, Firebird so'rovi vaqt tugashini aniqladim, 2 soatda optimallashtirdim va shaxsan qayta qo'ng'iroq qildim — ular bizning eng katta tavsiyachimizga aylandi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"21-how-do-you-handle-ambiguity-and-uncertainty-noaniqlik-va-ishonchsizlikni-qanday-boshqarasiz\">21. How do you handle ambiguity and uncertainty? / Noaniqlik va ishonchsizlikni qanday boshqarasiz?</h2>\n<p><strong>EN:</strong> Show structured thinking under unclear conditions.</p>\n<blockquote>\n<p><em>\"When requirements were vague for a new analytics module, I drafted 3 possible interpretations, shared them with the PM, and built the most likely one as an MVP — then iterated based on feedback.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Noaniq sharoitda tuzilgan fikrlashni ko'rsating.</p>\n<blockquote>\n<p><em>\"Yangi analitika moduli uchun talablar noaniq bo'lganda, 3 ta mumkin bo'lgan talqinni yaratdim, PM bilan baham ko'rdim va eng ehtimolli variantni MVP sifatida qurdim — keyin fikr-mulohazalarga asoslanib takomillashtirdim.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"22-what-unique-qualities-would-you-bring-to-this-role-bu-lavozimga-qanday-noyob-fazilatlar-olib-kelasiz\">22. What unique qualities would you bring to this role? / Bu lavozimga qanday noyob fazilatlar olib kelasiz?</h2>\n<p><strong>EN:</strong> Combine rare skills that few candidates have together.</p>\n<blockquote>\n<p><em>\"Few backend developers also understand ERP business logic. I can translate between business requirements and technical implementation without an intermediary — saving days of misunderstanding.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Kam sonli nomzodlarda birgalikda bo'ladigan noyob ko'nikmalarni birlashtiring.</p>\n<blockquote>\n<p><em>\"Kam sonli backend dasturchilar ERP biznes mantiqini ham tushunadi. Men biznes talablari va texnik amalga oshirish o'rtasida vositachisiz tarjima qila olaman — bu noto'g'ri tushunishdagi kunlarni tejaydi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"23-how-do-you-manage-multiple-projects-simultaneously-bir-vaqtda-bir-nechta-loyihani-qanday-boshqarasiz\">23. How do you manage multiple projects simultaneously? / Bir vaqtda bir nechta loyihani qanday boshqarasiz?</h2>\n<p><strong>EN:</strong> Show a concrete system, not just \"I stay organized.\"</p>\n<blockquote>\n<p><em>\"I use a simple priority matrix — urgency vs. impact. I block deep work time in the morning and handle communications in the afternoon. For 3 active projects, I do a 15-min daily review to spot blockers early.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Faqat \"tartibli bo'laman\" emas, aniq tizimni ko'rsating.</p>\n<blockquote>\n<p><em>\"Oddiy ustuvorlik matritsasidan foydalanaman — zudlik va ta'sir. Ertalab chuqur ish vaqtini blokirovka qilaman va tushdan keyin aloqalarni boshqaraman. 3 ta faol loyiha uchun kunlik 15 daqiqalik ko'rib chiqish o'tkazaman.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"24-tell-me-about-a-time-you-exceeded-expectations-kutilganidan-koproq-ish-qilgan-vaqtingiz-haqida-gapiring\">24. Tell me about a time you exceeded expectations. / Kutilganidan ko'proq ish qilgan vaqtingiz haqida gapiring.</h2>\n<p><strong>EN:</strong> Quantify when possible.</p>\n<blockquote>\n<p><em>\"I was asked to build a basic attendance report. I delivered an interactive dashboard with filters, drill-downs, and automated Excel exports — saving the HR team 4 hours per week.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Iloji bo'lsa raqamlar biling.</p>\n<blockquote>\n<p><em>\"Oddiy davomat hisoboti yaratishim so'raldi. Filtrlar, batafsil ma'lumotlar va avtomatlashtirilgan Excel eksporti bilan interaktiv boshqaruv panelini yetkazib berdim — HR jamoasiga haftada 4 soat tejaladigan bo'ldi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"25-how-do-you-deal-with-conflict-at-work-ishda-ziddiyatni-qanday-hal-qilasiz\">25. How do you deal with conflict at work? / Ishda ziddiyatni qanday hal qilasiz?</h2>\n<p><strong>EN:</strong> Address early, focus on the issue not the person.</p>\n<blockquote>\n<p><em>\"When two team members disagreed on DB schema design, I facilitated a structured discussion: each presented trade-offs, we benchmarked both, and chose based on data — both felt heard.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Erta muring, shaxsga emas muammoga e'tibor qarating.</p>\n<blockquote>\n<p><em>\"Ikki jamoa a'zosi DB sxemasi dizayni bo'yicha kelishmaganda, tuzilgan muhokama o'tkazdim: har biri muqobil variantlarni taqdim etdi, ikkalasini ham sinab ko'rdik va ma'lumotlarga asoslanib tanlov qildim — ikkalasi ham eshitilganini his qildi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"26-what-do-you-consider-your-most-significant-professional-achievement-eng-muhim-kasbiy-yutuqingizni-nima-deb-hisoblaysiz\">26. What do you consider your most significant professional achievement? / Eng muhim kasbiy yutuqingizni nima deb hisoblaysiz?</h2>\n<p><strong>EN:</strong> Pick one achievement that demonstrates scale, complexity, or impact.</p>\n<blockquote>\n<p><em>\"Building a multi-database backend integrating Firebird, SAP HANA, PostgreSQL, and Redis — with a credit scoring engine that served 500+ clients. It reduced loan approval time from 3 days to 4 hours.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Miqyos, murakkablik yoki ta'sirni ko'rsatadigan bitta yutuqni tanlang.</p>\n<blockquote>\n<p><em>\"Firebird, SAP HANA, PostgreSQL va Redis'ni birlashtirgan ko'p bazali backend qurish — 500+ mijozga xizmat ko'rsatadigan kredit ballashtirish tizimi bilan. Kredit tasdiqlash vaqtini 3 kundan 4 soatga qisqartirdi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"27-can-you-describe-a-time-you-had-to-deal-with-a-difficult-client-qiyin-mijoz-bilan-ishlagan-vaqtingizni-tasvirlab-bering\">27. Can you describe a time you had to deal with a difficult client? / Qiyin mijoz bilan ishlagan vaqtingizni tasvirlab bering.</h2>\n<p><strong>EN:</strong> Show patience, active listening, and professional resolution.</p>\n<blockquote>\n<p><em>\"A client kept changing requirements weekly. I proposed a bi-weekly requirements freeze with a change log — this gave them control and gave us stability. The relationship improved instantly.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Sabr, faol tinglash va professional yechimni ko'rsating.</p>\n<blockquote>\n<p><em>\"Bir mijoz har hafta talablarni o'zgartirib turdi. O'zgarishlar jurnali bilan ikki haftada bir talablarni muzlatishni taklif qildim — bu ularga nazorat, bizga barqarorlik berdi. Munosabatlar darhol yaxshilandi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"28-how-do-you-handle-failure-or-setbacks-in-a-project-loyihadagi-muvaffaqiyatsizlik-yoki-tosiqlarni-qanday-boshqarasiz\">28. How do you handle failure or setbacks in a project? / Loyihadagi muvaffaqiyatsizlik yoki to'siqlarni qanday boshqarasiz?</h2>\n<p><strong>EN:</strong> Treat it as data, not defeat.</p>\n<blockquote>\n<p><em>\"When our Redis caching layer caused stale data bugs in production, I didn't panic. I ran a post-mortem, documented the root cause, and implemented a cache invalidation strategy — the same bug has never recurred.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Uni mag'lubiyat emas, ma'lumot sifatida qabul qiling.</p>\n<blockquote>\n<p><em>\"Redis keshlash qatlamimiz ishlab chiqarishda eskirgan ma'lumotlar xatolariga olib kelganda, vahimaga tushmadim. Postmortem o'tkazdim, asosiy sababni hujjatladim va kesh bekor qilish strategiyasini joriy etdim — xuddi o'sha xato hech qachon takrorlanmadi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"29-what-role-do-ethics-and-integrity-play-in-your-work-etika-va-halollik-ishingizda-qanday-rol-oynaydi\">29. What role do ethics and integrity play in your work? / Etika va halollik ishingizda qanday rol o'ynaydi?</h2>\n<p><strong>EN:</strong> Give a concrete example, not just statements.</p>\n<blockquote>\n<p><em>\"When I discovered a data access bug that could expose client financial records, I immediately escalated it — even though it delayed our release. Short-term pain for long-term trust.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Faqat bayonotlar emas, aniq misol keltiring.</p>\n<blockquote>\n<p><em>\"Mijoz moliyaviy ma'lumotlarini oshkor qilishi mumkin bo'lgan ma'lumotlarga kirish xatosini topganimda, darhol kattalarimga bildirdim — garchi bu bizning chiqarilishimizni kechiktirgan bo'lsa ham. Uzoq muddatli ishonch uchun qisqa muddatli og'riq.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"30-how-do-you-prioritize-your-work-ishingizni-qanday-ustuvorlashtiriz\">30. How do you prioritize your work? / Ishingizni qanday ustuvorlashtirасiz?</h2>\n<p><strong>EN:</strong> Show a framework, not just intuition.</p>\n<blockquote>\n<p><em>\"I use impact vs. effort matrix. High-impact, low-effort tasks go first. I also align priorities with sprint goals and confirm with my team lead if anything conflicts. I review this every Monday morning.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Faqat sezgi emas, ramkani ko'rsating.</p>\n<blockquote>\n<p><em>\"Ta'sir va kuch matritasasidan foydalanaman. Yuqori ta'sir, kam kuch talab qiladigan vazifalar birinchi bo'ladi. Ustuvorliklarni sprint maqsadlari bilan ham mos qilaman va nizolar bo'lsa jamoa boshlig'im bilan muvofiqlashtirsaman. Har dushanba ertalab ko'rib chiqaman.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"31-how-do-you-approach-problem-solving-muammolarni-hal-qilishga-qanday-yondashasiz\">31. How do you approach problem-solving? / Muammolarni hal qilishga qanday yondashasiz?</h2>\n<p><strong>EN:</strong> Show a repeatable method.</p>\n<blockquote>\n<p><em>\"Define → Reproduce → Hypothesize → Test → Fix → Document. When our async workers were silently dropping tasks, this method helped me pinpoint a missing <code>await</code> in 45 minutes.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Takrorlanadigan usulni ko'rsating.</p>\n<blockquote>\n<p><em>\"Aniqlash → Takrorlash → Faraz qilish → Sinash → Tuzatish → Hujjatlashtirish. Asinxron ishchilarimiz vazifalarni jimgina tushirib yuborayotganda, bu usul 45 daqiqada yetishmayotgan <code>await</code>ni aniqlashga yordam berdi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"32-describe-your-communication-style-muloqot-uslubingizni-tavsiflang\">32. Describe your communication style. / Muloqot uslubingizni tavsiflang.</h2>\n<p><strong>EN:</strong> Tailor to audience — technical with devs, outcomes-focused with management.</p>\n<blockquote>\n<p><em>\"With developers, I'm precise and technical. With managers, I translate to business impact. In one meeting, I explained a DB index issue as 'reports taking 8 seconds instead of 0.3 seconds = clients leave' — budget approved immediately.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Auditoriyaga moslashing — dasturchilar bilan texnik, menejment bilan natijaga yo'naltirilgan.</p>\n<blockquote>\n<p><em>\"Dasturchilar bilan aniq va texnikman. Menejerlar bilan biznes ta'siriga tarjima qilaman. Bir yig'ilishda DB indeks muammosini 'hisobotlar 0.3 o'rniga 8 soniya oladi = mijozlar ketadi' deb tushuntirdim — byudjet darhol tasdiqlandi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"33-what-are-your-salary-expectations-maosh-kutganlaringiz-qanday\">33. What are your salary expectations? / Maosh kutganlaringiz qanday?</h2>\n<p><strong>EN:</strong> Research market rate, give a range, and show flexibility.</p>\n<blockquote>\n<p><em>\"Based on my research and experience level, I'm targeting $X–$Y. That said, the total package — growth opportunities, project complexity, and team quality — matters more to me than the base number.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Bozor narxini o'rganing, diapazon bering va moslashuvchanlik ko'rsating.</p>\n<blockquote>\n<p><em>\"Tadqiqotim va tajriba darajamga asoslanib, $X–$Y ni maqsad qilaman. Shunday bo'lsa-da, umumiy to'plam — o'sish imkoniyatlari, loyiha murakkabligi va jamoa sifati — asosiy raqamdan muhimroq.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"34-how-do-you-define-success-muvaffaqiyatni-qanday-tariflaysiz\">34. How do you define success? / Muvaffaqiyatni qanday ta'riflaysiz?</h2>\n<p><strong>EN:</strong> Go beyond personal achievement — include team and user impact.</p>\n<blockquote>\n<p><em>\"A project is successful when users don't notice it — it just works. And a team is successful when junior members grow into independent contributors. Both happened in my last role.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Shaxsiy yutuqdan tashqariga chiqing — jamoa va foydalanuvchilarga ta'sirni ham kiriting.</p>\n<blockquote>\n<p><em>\"Loyiha foydalanuvchilar uni sezmagan paytda muvaffaqiyatlidir — u shunchaki ishlaydi. Jamoa esa yosh a'zolar mustaqil hissadorlarga aylanganida muvaffaqiyatli. Ikkalasi ham oxirgi ishimda sodir bo'ldi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"35-how-do-you-stay-motivated-ozingizni-qanday-ragbatlantiriz\">35. How do you stay motivated? / O'zingizni qanday rag'batlantirасiz?</h2>\n<p><strong>EN:</strong> Connect motivation to purpose, not just rewards.</p>\n<blockquote>\n<p><em>\"I set weekly micro-goals and track them. When I see a feature I built go from 0 to 1,000 daily active users, that's my fuel. I also stay motivated by mentoring others — teaching solidifies my own understanding.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Motivatsiyani faqat mukofotlarga emas, maqsadga bog'lang.</p>\n<blockquote>\n<p><em>\"Haftalik mikro-maqsadlar qo'yaman va ularga rioya qilaman. Men qurgan xususiyatning 0 dan 1,000 kunlik faol foydalanuvchiga o'sishini ko'rganimda, bu mening yoqilg'imdir. Boshqalarni o'qitish orqali ham rag'batlanaman — o'rgatish o'z tushunishimni mustahkamlaydi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"36-can-you-describe-your-ideal-job-ideal-ishingizni-tavsiflang\">36. Can you describe your ideal job? / Ideal ishingizni tavsiflang.</h2>\n<p><strong>EN:</strong> Be honest but realistic — show you've thought about fit.</p>\n<blockquote>\n<p><em>\"Backend-heavy work with real-scale systems, a team that does code reviews seriously, freedom to propose architectural improvements, and occasional contact with end users to understand real pain points.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Halol bo'ling, lekin realistik — mosligini o'ylaganingizni ko'rsating.</p>\n<blockquote>\n<p><em>\"Haqiqiy miqyosdagi tizimlarda backend-og'ir ish, kod ko'rib chiqishni jiddiy qiladigan jamoa, arxitektura yaxshilanishlarini taklif qilish erkinligi va haqiqiy og'riq nuqtalarini tushunish uchun davri-davri bilan foydalanuvchilar bilan aloqa.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"37-tell-me-about-a-time-you-improved-a-process-jarayonni-yaxshilagan-vaqtingiz-haqida-gapiring\">37. Tell me about a time you improved a process. / Jarayonni yaxshilagan vaqtingiz haqida gapiring.</h2>\n<p><strong>EN:</strong> Quantify the improvement.</p>\n<blockquote>\n<p><em>\"Our deployments took 45 minutes and required manual SSH steps. I introduced GitHub Actions with automated tests and Docker builds — deployment time dropped to 8 minutes with zero manual steps.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Yaxshilanishni raqamlashtiring.</p>\n<blockquote>\n<p><em>\"Joylashtirishlarimiz 45 daqiqa va qo'lda SSH qadamlari talab qilardi. Avtomatlashtirilgan testlar va Docker qurishlari bilan GitHub Actions joriy etdim — joylаshtirish vaqti nol qo'lda qadam bilan 8 daqiqaga tushdi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"38-how-do-you-ensure-quality-in-your-work-ishingizda-sifatni-qanday-taminlaysiz\">38. How do you ensure quality in your work? / Ishingizda sifatni qanday ta'minlaysiz?</h2>\n<p><strong>EN:</strong> Show systematic quality, not just \"I test it.\"</p>\n<blockquote>\n<p><em>\"I write unit tests for business logic, integration tests for API endpoints, and set coverage thresholds in CI. I also do self-review before every PR — catching 80% of issues before they reach teammates.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Faqat \"testlayman\" emas, tizimli sifatni ko'rsating.</p>\n<blockquote>\n<p><em>\"Biznes mantiq uchun birlik testlari, API nuqtalari uchun integratsiya testlari yozaman va CI'da qamrab olish chegaralarini o'rnataman. Har bir PR oldidan o'z-o'zimni ko'rib chiqaman — muammolarning 80 foizini jamoatchilikka yetmasdan ushlayman.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"39-describe-a-time-when-you-went-above-and-beyond-kutilganidan-koproq-harakat-qilgan-vaqtingizni-tasvirlab-bering\">39. Describe a time when you went above and beyond. / Kutilganidan ko'proq harakat qilgan vaqtingizni tasvirlab bering.</h2>\n<p><strong>EN:</strong> Show initiative, not martyrdom.</p>\n<blockquote>\n<p><em>\"After finishing my sprint tasks early, I noticed our API had no rate limiting. I researched options, implemented Redis-based rate limiting, and added it to the PR — it prevented a DDoS incident 3 weeks later.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Fidokorlik emas, tashabbus ko'rsating.</p>\n<blockquote>\n<p><em>\"Sprint vazifalarini erta tugatganimdan so'ng, API'imizda tezlikni cheklash yo'qligini payqadim. Variantlarni o'rgandim, Redis asosidagi tezlik cheklashni amalga oshirdim va PR'ga qo'shdim — 3 hafta keyingi DDoS hodisasiga yo'l qo'ymadi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"40-how-do-you-manage-your-time-effectively-vaqtingizni-samarali-qanday-boshqarasiz\">40. How do you manage your time effectively? / Vaqtingizni samarali qanday boshqarasiz?</h2>\n<p><strong>EN:</strong> Show specific habits and tools.</p>\n<blockquote>\n<p><em>\"I time-block my calendar: 9–12 for deep coding, 12–1 for reviews and async comms, afternoons for meetings. I use Notion for task tracking and review my priorities every Friday for the next week.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Aniq odatlar va vositalarni ko'rsating.</p>\n<blockquote>\n<p><em>\"Taqvimimni blokirovka qilaman: 9–12 chuqur kodlash uchun, 12–1 ko'rib chiqish va asinxron muloqot uchun, tushdan keyin yig'ilishlar uchun. Vazifalarni kuzatish uchun Notion ishlataman va har juma keyingi haftaga ustuvorliklarimni ko'rib chiqaman.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"41-what-do-you-do-if-you-disagree-with-a-manager-menejer-bilan-kelishmasangiz-nima-qilasiz\">41. What do you do if you disagree with a manager? / Menejer bilan kelishmasangiz nima qilasiz?</h2>\n<p><strong>EN:</strong> Show respect + courage — disagree professionally.</p>\n<blockquote>\n<p><em>\"I present my perspective with data: 'Here's my concern and why, here are the alternatives I've considered.' If we still disagree after discussion, I commit to the decision while documenting my position — then I let results speak.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Hurmat + jasoratni ko'rsating — professional ravishda kelishmang.</p>\n<blockquote>\n<p><em>\"Ma'lumotlar bilan o'z nuqtai nazarimni taqdim etaman: 'Mana mening muammom va sababi, ko'rib chiqqan muqobil variantlarim.' Muhokamadan keyin ham kelishmasak, qarorga amal qilaman va o'z pozitsiyamni hujjatlayman — keyin natijalar gapirsin.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"42-how-do-you-encourage-teamwork-jamoaviy-ishni-qanday-ragbatlantiriz\">42. How do you encourage teamwork? / Jamoaviy ishni qanday rag'batlantirасiz?</h2>\n<p><strong>EN:</strong> Show concrete practices, not just intentions.</p>\n<blockquote>\n<p><em>\"I introduced pair programming sessions for complex tasks and public 'wins' shoutouts in team Slack. Within a month, knowledge sharing improved noticeably and team morale went up.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Faqat niyatlar emas, aniq amaliyotlarni ko'rsating.</p>\n<blockquote>\n<p><em>\"Murakkab vazifalar uchun juft dasturlash sessiyalari va jamoa Slack'ida ommaviy 'g'alaba' e'lonlarini joriy etdim. Bir oy ichida bilim almashish sezilarli darajada yaxshilandi va jamoa ruhiyati ko'tarildi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"43-describe-a-situation-where-you-had-to-learn-something-new-quickly-biror-narsani-tezda-organishingiz-kerak-bolgan-vaziyatni-tasvirlab-bering\">43. Describe a situation where you had to learn something new quickly. / Biror narsani tezda o'rganishingiz kerak bo'lgan vaziyatni tasvirlab bering.</h2>\n<p><strong>EN:</strong> Show your learning strategy, not just \"I read docs.\"</p>\n<blockquote>\n<p><em>\"When we integrated with a Telegram Bot API for the first time, I had 1 week. I built a minimal working bot in day 1, read the full docs on day 2, then refactored with proper error handling and webhook setup — delivered in 4 days.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> O'rganish strategiyangizni ko'rsating, faqat \"hujjatlarni o'qidim\" emas.</p>\n<blockquote>\n<p><em>\"Birinchi marta Telegram Bot API bilan integratsiya qilganimizda, 1 haftam bor edi. 1-kuni minimal ishlaydigan bot yaratdim, 2-kuni to'liq hujjatlarni o'qidim, keyin to'g'ri xato boshqaruv va webhook sozlash bilan qayta ishladim — 4 kunda yetkazib berdim.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"44-how-do-you-handle-repetitive-tasks-monoton-vazifalarni-qanday-boshqarasiz\">44. How do you handle repetitive tasks? / Monoton vazifalarni qanday boshqarasiz?</h2>\n<p><strong>EN:</strong> Show automation mindset.</p>\n<blockquote>\n<p><em>\"I automate them. I was manually generating monthly reports from SAP HANA — 2 hours every month. I wrote a Python script that queries, formats, and emails the report automatically — now it takes 0 human hours.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Avtomatlashtirish mentalitetini ko'rsating.</p>\n<blockquote>\n<p><em>\"Ularni avtomatlashtiraman. SAP HANA dan oylik hisobotlarni qo'lda yaratardim — har oyda 2 soat. So'rovlar, formatlash va hisobotni avtomatik yuboradigan Python skripti yozdim — hozir 0 odam soati sarflanadi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"45-how-do-you-measure-your-own-performance-oz-korsatkichlaringizni-qanday-olcha\">45. How do you measure your own performance? / O'z ko'rsatkichlaringizni qanday o'lchaлы?</h2>\n<p><strong>EN:</strong> Use both quantitative and qualitative metrics.</p>\n<blockquote>\n<p><em>\"Quantitatively: PR merge rate, bug escape rate, API response times. Qualitatively: feedback from teammates and the clarity of my documentation. I do a monthly self-review against these.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Miqdoriy va sifat ko'rsatkichlaridan foydalaning.</p>\n<blockquote>\n<p><em>\"Miqdoriy jihatdan: PR birlashtirish darajasi, xato chiqish darajasi, API javob vaqtlari. Sifat jihatdan: jamoatchilik fikr-mulohazasi va hujjatlarimning aniqligi. Bu ko'rsatkichlarga nisbatan oylik o'z-o'zimni ko'rib chiqaman.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"46-tell-me-about-a-time-you-saved-a-company-money-kompaniyaga-pul-tejagan-vaqtingiz-haqida-gapiring\">46. Tell me about a time you saved a company money. / Kompaniyaga pul tejagan vaqtingiz haqida gapiring.</h2>\n<p><strong>EN:</strong> Always attach a number.</p>\n<blockquote>\n<p><em>\"I noticed we were running 4 always-on servers that were idle 18 hours a day. I implemented job scheduling and moved to spot instances — saving $800/month with zero performance loss.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Har doim raqam qo'shing.</p>\n<blockquote>\n<p><em>\"Kuniga 18 soat bekor ishlayotgan 4 ta doimiy server borligini payqadim. Ish rejalashtirish va spot instansiyalarga o'tishni amalga oshirdim — ishlash yo'qotishisiz oyda $800 tejadim.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"47-how-do-you-prepare-for-presentations-taqdimotlarga-qanday-tayyorlaniz\">47. How do you prepare for presentations? / Taqdimotlarga qanday tayyorlanасiz?</h2>\n<p><strong>EN:</strong> Show preparation depth, not just \"I make slides.\"</p>\n<blockquote>\n<p><em>\"I start by defining the decision the audience needs to make. Then I build the narrative backward from that decision. I rehearse once full-speed, once in slow motion for timing. I anticipate 3 hardest questions.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Faqat \"slaydlar yarataman\" emas, tayyorgarlik chuqurligini ko'rsating.</p>\n<blockquote>\n<p><em>\"Auditoriya qabul qilishi kerak bo'lgan qarorni aniqlashdan boshlayman. Keyin shu qarordan orqaga qarab hikoya qurilishini tuzaman. Bir marta to'liq tezlikda, bir marta sekinlatilgan holda mashq qilaman. 3 ta eng qiyin savolni oldindan tayyorlayман.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"48-describe-a-time-when-you-mentored-someone-kimnidir-mentorlik-qilgan-vaqtingizni-tasvirlab-bering\">48. Describe a time when you mentored someone. / Kimnidir mentorlik qilgan vaqtingizni tasvirlab bering.</h2>\n<p><strong>EN:</strong> Show patience and method.</p>\n<blockquote>\n<p><em>\"I mentored a junior who struggled with async Python. We had 30-min weekly sessions where I gave them a small challenge, they solved it, and I reviewed their approach — not just the answer. In 3 months, they were writing production-grade async code independently.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Sabr va usulni ko'rsating.</p>\n<blockquote>\n<p><em>\"Asinxron Python bilan qiynalayotgan yoshga mentorlik qildim. Haftalik 30 daqiqalik sessiyalarimiz bo'ldi: ularga kichik muammo berdim, ular yechdi, men faqat javob emas, yondashuvni ko'rib chiqdim. 3 oyda ular mustaqil ravishda ishlab chiqarishga tayyor asinxron kod yozishdi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"49-how-do-you-balance-multiple-deadlines-bir-nechta-muddatni-qanday-muvozanatlasiztsiz\">49. How do you balance multiple deadlines? / Bir nechta muddatni qanday muvozanatlasiztsiz?</h2>\n<p><strong>EN:</strong> Show proactive management, not reactive firefighting.</p>\n<blockquote>\n<p><em>\"I map all deadlines at the start of the sprint on a Gantt-style view. I identify conflicts early and negotiate scope before crunch time — not during it. Transparent communication with all stakeholders is key.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Reaktiv o't o'chirish emas, proaktiv boshqaruvni ko'rsating.</p>\n<blockquote>\n<p><em>\"Sprint boshida barcha muddatlarni Gantt uslubidagi ko'rinishda xaritalаshtirama. Nizolarni erta aniqlayman va kritik davrdan oldin hajmni muzokarа qilaman — uning davomida emas. Barcha manfaatdor tomonlar bilan shaffof muloqot muhimdir.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"50-what-do-you-enjoy-most-about-your-profession-kasbingizda-eng-yoqtirgan-narsa-nima\">50. What do you enjoy most about your profession? / Kasbingizda eng yoqtirgan narsa nima?</h2>\n<p><strong>EN:</strong> Be specific and passionate — not generic.</p>\n<blockquote>\n<p><em>\"Watching a system handle real load flawlessly. When I see 50,000 API calls per hour go through without a single error on a system I architected — that feeling never gets old.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Aniq va ishtiyoqli bo'ling — umumiy emas.</p>\n<blockquote>\n<p><em>\"Tizimning haqiqiy yukni muammosiz ko'tarishini kuzatish. Men arxitektura qilgan tizimda soatiga 50,000 API chaqiruvi bitta xatosiz o'tishini ko'rganimda — bu his hech qachon eskirmaydi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"51-how-do-you-handle-last-minute-changes-to-a-project-loyihadagi-oxirgi-daqiqa-ozgarishlarini-qanday-boshqarasiz\">51. How do you handle last-minute changes to a project? / Loyihadagi oxirgi daqiqa o'zgarishlarini qanday boshqarasiz?</h2>\n<p><strong>EN:</strong> Show impact assessment, not just compliance.</p>\n<blockquote>\n<p><em>\"First, I assess the scope impact — time, complexity, what needs to be deprioritized. Then I communicate clearly: 'We can do X if we drop Y, or delay launch by Z days.' I never silently absorb scope creep.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Faqat muvofiqlik emas, ta'sir baholashni ko'rsating.</p>\n<blockquote>\n<p><em>\"Avval hajm ta'sirini baholayman — vaqt, murakkablik, nima ustuvorligini yo'qotish kerak. Keyin aniq muloqot qilaman: 'Y'ni tashlab qo'ysak X ni qila olamiz, yoki ishga tushirishni Z kun kechiktiramiz.' Hech qachon jimgina hajm kengayishini qabul qilmayman.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"52-tell-me-about-a-time-you-made-a-mistake-and-how-you-handled-it-xato-qilgan-va-uni-qanday-hal-qilganingiz-haqida-gapiring\">52. Tell me about a time you made a mistake and how you handled it. / Xato qilgan va uni qanday hal qilganingiz haqida gapiring.</h2>\n<p><strong>EN:</strong> Accountability + speed + prevention.</p>\n<blockquote>\n<p><em>\"I deployed a migration that accidentally dropped a column with live data. I immediately rolled back, restored from backup (30 min data loss), informed stakeholders transparently, and added a pre-deployment checklist that's still in use today.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Mas'uliyat + tezlik + oldini olish.</p>\n<blockquote>\n<p><em>\"Jonli ma'lumotlar bilan ustunni tasodifan o'chirgan migratsiyani joylashtirdim. Darhol orqaga qaytdim, zahiradan tiklandim (30 daqiqa ma'lumot yo'qolishi), manfaatdor tomonlarga shaffof ravishda xabar berdim va hozir ham ishlatiladigan joylashtirishdan oldingi tekshirish ro'yxatini qo'shdim.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"53-how-do-you-motivate-others-boshqalarni-qanday-ragbatlantiriz\">53. How do you motivate others? / Boshqalarni qanday rag'batlantirасiz?</h2>\n<p><strong>EN:</strong> Show individual understanding + recognition.</p>\n<blockquote>\n<p><em>\"I learn what drives each person. One teammate was motivated by learning — I gave them R&amp;D tasks. Another by visibility — I made sure their contributions were highlighted in sprint demos. Different fuel for different engines.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Individual tushunish + tan olishni ko'rsating.</p>\n<blockquote>\n<p><em>\"Har bir kishini nima boshqarishini o'rganaman. Bir jamoatchi o'rganish bilan rag'batlanardi — ularga R&amp;D vazifalar berdim. Boshqasi ko'rinuvchanlik bilan — ularning hissalarini sprint demonstratsiyalarida ta'kidladim. Turli dvigatellar uchun turli yoqilg'i.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"54-describe-a-time-you-had-to-persuade-someone-kimnidir-ishontirgan-vaqtingizni-tasvirlab-bering\">54. Describe a time you had to persuade someone. / Kimnidir ishontirgan vaqtingizni tasvirlab bering.</h2>\n<p><strong>EN:</strong> Data + empathy = persuasion.</p>\n<blockquote>\n<p><em>\"My manager wanted to keep a legacy Firebird setup. I built a proof of concept migrating one module to PostgreSQL, showed 60% query speed improvement, and modeled the 2-year cost savings — he approved the migration.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Ma'lumotlar + hamdardlik = ishontirish.</p>\n<blockquote>\n<p><em>\"Menejerim eski Firebird sozlashni saqlamoqchi edi. Bir modulni PostgreSQL'ga ko'chirishning kontseptsiya isbotini yaratdim, 60% so'rov tezligi yaxshilanishini ko'rsatdim va 2 yillik xarajat tejashni modelladim — u migratsiyani ma'qulladi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"55-what-is-your-management-style-menejment-uslubingiz-qanday\">55. What is your management style? / Menejment uslubingiz qanday?</h2>\n<p><strong>EN:</strong> Show context-awareness — different situations need different styles.</p>\n<blockquote>\n<p><em>\"For senior developers, I'm hands-off with clear outcomes. For juniors, I'm more involved with frequent check-ins. In crisis mode, I become directive. I adapt to what the team and moment need.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Kontekst-xabardorlikni ko'rsating — turli vaziyatlar turli uslublarni talab qiladi.</p>\n<blockquote>\n<p><em>\"Senior dasturchilar uchun aniq natijalar bilan aralashmayman. Yoshlar uchun tez-tez muloqotlar bilan ko'proq ishtirokchiman. Inqiroz rejimida yo'riqnoma beraman. Jamoa va lahzaga nima kerakligiga moslashaman.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"56-how-do-you-approach-diversity-and-inclusion-xilma-xillik-va-kiritishga-qanday-yondashiz\">56. How do you approach diversity and inclusion? / Xilma-xillik va kiritishga qanday yondashасiz?</h2>\n<p><strong>EN:</strong> Show active behavior, not passive support.</p>\n<blockquote>\n<p><em>\"I ensure all voices are heard in meetings — specifically calling on quieter teammates. I also advocate for non-native English speakers on international calls by summarizing decisions clearly in writing.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Passiv qo'llab-quvvatlash emas, faol xulq-atvorni ko'rsating.</p>\n<blockquote>\n<p><em>\"Yig'ilishlarda barcha ovozlar eshitilishini ta'minlayman — ayniqsa jimroq jamoatchilarga murojaat qilaman. Shuningdek, xalqaro qo'ng'iroqlarda qarorlarni yozma ravishda aniq xulosalash orqali ona tili inglizcha bo'lmaganlarni himoya qilaman.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"57-tell-me-about-a-project-youre-proud-of-faxrlanadigan-loyiha-haqida-gapiring\">57. Tell me about a project you're proud of. / Faxrlanadigan loyiha haqida gapiring.</h2>\n<p><strong>EN:</strong> Pick one with personal growth + team impact + user benefit.</p>\n<blockquote>\n<p><em>\"The Instagram Analytics API system I built — automated data collection from 20+ accounts via Graph API, stored in PostgreSQL, with APScheduler running hourly syncs. The marketing team went from manual Excel work to real-time dashboards.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Shaxsiy o'sish + jamoa ta'siri + foydalanuvchi foydasi bilan bittasini tanlang.</p>\n<blockquote>\n<p><em>\"Men qurgan Instagram Analytics API tizimi — Graph API orqali 20+ hisobdan avtomatlashtirilgan ma'lumotlar yig'ish, PostgreSQL'da saqlash va soatlik sinxronizatsiyalarda ishlaydigan APScheduler bilan. Marketing jamoasi qo'lda Excel ishidan real vaqtli boshqaruv panellariga o'tdi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"58-how-do-you-handle-underperforming-team-members-past-samarali-jamoa-azolarini-qanday-boshqarasiz\">58. How do you handle underperforming team members? / Past samarali jamoa a'zolarini qanday boshqarasiz?</h2>\n<p><strong>EN:</strong> Show root cause analysis before judgment.</p>\n<blockquote>\n<p><em>\"I first try to understand why. Is it skill gap, personal issues, or unclear expectations? I had a developer missing deadlines — turned out they didn't understand the requirements. After a clear session with examples, their output improved by 40%.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Hukm chiqarishdan oldin asosiy sabab tahlilini ko'rsating.</p>\n<blockquote>\n<p><em>\"Avval nima uchunligini tushunishga harakat qilaman. Ko'nikma bo'shliqmi, shaxsiy masalalarmi yoki noaniq kutishlarmi? Muddatlarni o'tkazib yubora boshlagan dasturchi bor edi — ma'lum bo'ldiki, ular talablarni tushunmagan. Misollar bilan aniq sessiyadan keyin ularning ishi 40% ga yaxshilandi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"59-what-tools-do-you-use-to-stay-organized-tartibli-qolish-uchun-qanday-vositalardan-foydalaniz\">59. What tools do you use to stay organized? / Tartibli qolish uchun qanday vositalardan foydalanасiz?</h2>\n<p><strong>EN:</strong> Name real tools you actually use.</p>\n<blockquote>\n<p><em>\"Notion for project tracking and documentation, GitHub Projects for sprint boards, Obsidian for personal knowledge management, and calendar time-blocking for deep work. I also write a brief end-of-day log.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Haqiqatan foydalanadigan real vositalarni nomlang.</p>\n<blockquote>\n<p><em>\"Loyiha kuzatuvi va hujjatlash uchun Notion, sprint taxtalari uchun GitHub Projects, shaxsiy bilim boshqaruvi uchun Obsidian va chuqur ish uchun taqvim vaqt-blokirovka. Shuningdek, qisqa kun tugash jurnali yozaman.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"60-describe-a-time-you-took-initiative-tashabbus-korsatgan-vaqtingizni-tasvirlab-bering\">60. Describe a time you took initiative. / Tashabbus ko'rsatgan vaqtingizni tasvirlab bering.</h2>\n<p><strong>EN:</strong> Show you don't wait for permission to improve things.</p>\n<blockquote>\n<p><em>\"Our team had no onboarding doc for new developers — everyone learned by asking. I spent a weekend writing a comprehensive setup guide (local env, coding standards, deployment process). New hires now onboard in 1 day instead of 1 week.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Narsalarni yaxshilash uchun ruxsat kutmasligingizni ko'rsating.</p>\n<blockquote>\n<p><em>\"Jamoamizda yangi dasturchilar uchun onboarding hujjati yo'q edi — hamma so'rash orqali o'rganardi. Hafta oxirida to'liq sozlash qo'llanmasini (mahalliy muhit, kodlash standartlari, joylаshtirish jarayoni) yozishga vaqt sarfladim. Yangi ishga kelganlar hozir 1 hafta o'rniga 1 kunda onboarding qilishadi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"61-how-do-you-maintain-work-life-balance-ish-hayot-balansini-qanday-saqlaybsiz\">61. How do you maintain work-life balance? / Ish-hayot balansini qanday saqlaybsiz?</h2>\n<p><strong>EN:</strong> Be honest — show healthy boundaries.</p>\n<blockquote>\n<p><em>\"I have hard stop times — no Slack after 7 PM unless on-call. I also protect weekends for family and hobbies. Sustainable pace means I show up fresh every day, which makes me more productive overall.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Halol bo'ling — sog'lom chegaralarni ko'rsating.</p>\n<blockquote>\n<p><em>\"Qattiq to'xtash vaqtlarim bor — navbatchilik bo'lmasa 19:00 dan keyin Slack yo'q. Shuningdek, hafta oxirini oila va sevimli mashg'ulotlar uchun himoya qilaman. Barqaror sur'at har kuni yangilanib kelishimni ta'minlaydi, bu umumiy samaradorligimni oshiradi.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"62-describe-your-experience-with-remote-work-masofaviy-ish-tajribangizni-tavsiflang\">62. Describe your experience with remote work. / Masofaviy ish tajribangizni tavsiflang.</h2>\n<p><strong>EN:</strong> Show discipline + communication systems.</p>\n<blockquote>\n<p><em>\"I've worked remotely for 2+ years. My system: video standup daily, async-first communication in Slack, shared Notion task board, and over-documentation of decisions. I've found remote work increases my deep work hours by 40%.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Intizom + muloqot tizimlarini ko'rsating.</p>\n<blockquote>\n<p><em>\"2 yildan ortiq masofadan ishlaganman. Mening tizimim: kunlik video standup, Slack'da asinxron-birinchi muloqot, umumiy Notion vazifalar taxtasi va qarorlarni haddan tashqari hujjatlashtirish. Masofaviy ish chuqur ish soatlarimni 40% ga oshirishini aniqladim.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"63-how-do-you-ensure-accountability-in-a-team-jamoada-masuliyatni-qanday-taminlasiz\">63. How do you ensure accountability in a team? / Jamoada mas'uliyatni qanday ta'minlasiz?</h2>\n<p><strong>EN:</strong> Systems over surveillance.</p>\n<blockquote>\n<p><em>\"Clear task ownership in the sprint board, agreed definition of done, and a blame-free retrospective every 2 weeks. When something slips, we ask 'what in our process failed?' — not 'who failed?'\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Nazorat emas, tizimlar.</p>\n<blockquote>\n<p><em>\"Sprint taxtasida aniq vazifa egasi, kelishilgan bajarilganlik ta'rifi va har 2 haftada aybsiz retrospektiva. Biror narsa sirpanib ketganda, 'jarayonimizda nima muvaffaqiyatsiz bo'ldi?' deb so'raymiz — 'kim muvaffaqiyatsiz bo'ldi?' emas.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"64-what-are-your-long-term-career-goals-uzoq-muddatli-karera-maqsadlaringiz-nima\">64. What are your long-term career goals? / Uzoq muddatli karera maqsadlaringiz nima?</h2>\n<p><strong>EN:</strong> Show direction, not just a job title.</p>\n<blockquote>\n<p><em>\"I want to become a Staff Engineer who shapes technical direction across teams — not just in one codebase. I'm also interested in open-source contributions and eventually speaking at PyCon or similar conferences.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Faqat lavozim nomi emas, yo'nalishni ko'rsating.</p>\n<blockquote>\n<p><em>\"Faqat bitta kodebaseda emas, jamoalar bo'ylab texnik yo'nalishni shakllantiradigan Staff Engineer bo'lishni xohlayman. Shuningdek, ochiq manba hissalari va oxir-oqibat PyCon yoki shunga o'xshash konferentsiyalarda nutq so'zlashga qiziqaman.\"</em></p>\n</blockquote>\n<hr />\n<h2 id=\"65-what-do-you-know-about-this-industry-bu-soha-haqida-nima-bilasiz\">65. What do you know about this industry? / Bu soha haqida nima bilasiz?</h2>\n<p><strong>EN:</strong> Show depth, not Wikipedia-level knowledge.</p>\n<blockquote>\n<p><em>\"I've followed Uzbekistan's fintech growth closely — especially the NBU's open banking initiatives. The shift from cash-dominant to digital payments is accelerating, and backend systems handling compliance, KYC, and real-time settlement are becoming critical.\"</em></p>\n</blockquote>\n<p><strong>UZB:</strong> Vikipediya darajasidagi bilim emas, chuqurlikni ko'rsating.</p>\n<blockquote>\n<p><em>\"O'zbekiston fintech o'sishini yaqindan kuzatib kelganman — a
