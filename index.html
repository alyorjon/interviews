 import BaseModel\nfrom datetime import datetime\nimport time\n\napp = FastAPI()\nSTART_TIME = time.time()\n\nclass HealthResponse(BaseModel):\n    status: str\n    uptime: float\n    timestamp: str\n    version: str\n    database: str\n\n@app.get(&quot;/health&quot;, response_model=HealthResponse, tags=[&quot;System&quot;])\nasync def health_check():\n    # DB ulanishini tekshirish | Check DB connection\n    db_status = &quot;ok&quot;\n    try:\n        await db.execute(&quot;SELECT 1&quot;)\n    except Exception:\n        db_status = &quot;error&quot;\n\n    return HealthResponse(\n        status=&quot;ok&quot; if db_status == &quot;ok&quot; else &quot;degraded&quot;,\n        uptime=round(time.time() - START_TIME, 2),\n        timestamp=datetime.utcnow().isoformat(),\n        version=&quot;1.0.0&quot;,\n        database=db_status\n    )\n\n@app.get(&quot;/ping&quot;, tags=[&quot;System&quot;])\nasync def ping():\n    return {&quot;pong&quot;: True}\n</code></pre>\n<hr />\n<h2 id=\"q25-how-to-implement-cors-in-fastapi-fastapida-cors-qanday-amalga-oshiriladi\">Q25. How to implement CORS in FastAPI? | FastAPI'da CORS qanday amalga oshiriladi?</h2>\n<p><strong>EN:</strong> CORS (Cross-Origin Resource Sharing) allows or restricts web browsers from making requests to a different origin.</p>\n<p><strong>UZ:</strong> CORS — brauzerlarning boshqa origindagi resurslarga so'rov yuborishiga ruxsat berish yoki cheklash.</p>\n<pre><code class=\"language-python\">from fastapi import FastAPI\nfrom fastapi.middleware.cors import CORSMiddleware\n\napp = FastAPI()\n\n# Development uchun | For development\napp.add_middleware(\n    CORSMiddleware,\n    allow_origins=[&quot;*&quot;],          # ⚠️ Faqat dev uchun | Only for dev\n    allow_credentials=True,\n    allow_methods=[&quot;*&quot;],\n    allow_headers=[&quot;*&quot;],\n)\n\n# Production uchun | For production\napp.add_middleware(\n    CORSMiddleware,\n    allow_origins=[\n        &quot;https://myapp.com&quot;,\n        &quot;https://app.myapp.com&quot;,\n        &quot;http://localhost:3000&quot;,   # Frontend dev\n    ],\n    allow_credentials=True,\n    allow_methods=[&quot;GET&quot;, &quot;POST&quot;, &quot;PUT&quot;, &quot;PATCH&quot;, &quot;DELETE&quot;],\n    allow_headers=[&quot;Authorization&quot;, &quot;Content-Type&quot;, &quot;X-Requested-With&quot;],\n    expose_headers=[&quot;X-Total-Count&quot;],\n    max_age=3600,                  # OPTIONS preflight kesh | OPTIONS preflight cache\n)\n</code></pre>\n<hr />\n<h1 id=\"pydantic-q26q40\">🟢 PYDANTIC (Q26–Q40)</h1>\n<hr />\n<h2 id=\"q26-what-is-pydantic-pydantic-nima\">Q26. What is Pydantic? | Pydantic nima?</h2>\n<p><strong>EN:</strong> Pydantic is a Python data validation and settings management library using type annotations. FastAPI uses Pydantic for request validation, response serialization, and settings.</p>\n<p><strong>UZ:</strong> Pydantic — type annotatsiyalar yordamida ma'lumotlarni tekshirish va sozlamalarni boshqarish uchun Python kutubxonasi. FastAPI Pydantic'ni so'rov tekshiruvi, javob serializatsiyasi va sozlamalar uchun ishlatadi.</p>\n<pre><code class=\"language-python\">from pydantic import BaseModel, EmailStr, Field\nfrom typing import Optional\nfrom datetime import datetime\n\nclass UserCreate(BaseModel):\n    name: str = Field(..., min_length=2, max_length=50, example=&quot;Ali Valiev&quot;)\n    email: EmailStr = Field(..., example=&quot;ali@example.com&quot;)\n    age: int = Field(..., ge=18, le=120)\n    bio: Optional[str] = Field(None, max_length=500)\n    created_at: datetime = Field(default_factory=datetime.utcnow)\n\n# Avtomatik tekshiruv | Automatic validation\ntry:\n    user = UserCreate(name=&quot;A&quot;, email=&quot;not-email&quot;, age=15)\nexcept Exception as e:\n    print(e)\n# ValidationError:\n# - name: min_length must be &gt;= 2\n# - email: not a valid email\n# - age: must be &gt;= 18\n</code></pre>\n<hr />\n<h2 id=\"q27-what-is-the-difference-between-pydantic-v1-and-v2-pydantic-v1-va-v2-farqi-nima\">Q27. What is the difference between Pydantic V1 and V2? | Pydantic V1 va V2 farqi nima?</h2>\n<p><strong>EN:</strong> Pydantic V2 is a complete rewrite in Rust — much faster (5-50x), with breaking API changes. Key differences: <code>model_dump()</code> instead of <code>dict()</code>, <code>model_validate()</code> instead of <code>from_orm()</code>, <code>ConfigDict</code> instead of class <code>Config</code>.</p>\n<p><strong>UZ:</strong> Pydantic V2 — Rust'da to'liq qayta yozilgan — ancha tezroq (5-50 marta), API o'zgarishlari bilan. Asosiy farqlar: <code>dict()</code> o'rniga <code>model_dump()</code>, <code>from_orm()</code> o'rniga <code>model_validate()</code>, class <code>Config</code> o'rniga <code>ConfigDict</code>.</p>\n<pre><code class=\"language-python\"># Pydantic V1\nfrom pydantic import BaseModel\n\nclass User(BaseModel):\n    name: str\n\n    class Config:\n        orm_mode = True\n\nuser = User(name=&quot;Ali&quot;)\nprint(user.dict())          # V1\nprint(User.from_orm(obj))   # V1\n\n# Pydantic V2\nfrom pydantic import BaseModel, ConfigDict\n\nclass User(BaseModel):\n    model_config = ConfigDict(from_attributes=True)  # orm_mode o'rniga | instead of orm_mode\n    name: str\n\nuser = User(name=&quot;Ali&quot;)\nprint(user.model_dump())           # dict() o'rniga | instead of dict()\nprint(User.model_validate(obj))    # from_orm() o'rniga | instead of from_orm()\n\n# V2 tezroq | V2 is faster (5-50x)\n# V2 Rust core'ga ega | V2 has Rust core\n</code></pre>\n<hr />\n<h2 id=\"q28-what-are-pydantic-field-validators-pydantic-field-validatorlari-nima\">Q28. What are Pydantic Field validators? | Pydantic Field validatorlari nima?</h2>\n<p><strong>EN:</strong> Custom validators add business logic to field validation using <code>@field_validator</code> (V2) or <code>@validator</code> (V1).</p>\n<p><strong>UZ:</strong> Maxsus validatorlar <code>@field_validator</code> (V2) yoki <code>@validator</code> (V1) yordamida maydon tekshiruviga biznes mantiqini qo'shadi.</p>\n<pre><code class=\"language-python\">from pydantic import BaseModel, field_validator, model_validator\nfrom typing import Optional\n\nclass UserCreate(BaseModel):\n    username: str\n    password: str\n    confirm_password: str\n    phone: Optional[str] = None\n\n    # Bitta maydon validatori | Single field validator\n    @field_validator(&quot;username&quot;)\n    @classmethod\n    def username_alphanumeric(cls, v: str) -&gt; str:\n        if not v.isalnum():\n            raise ValueError(&quot;Username faqat harf va raqamlardan iborat bo'lishi kerak&quot;)\n        return v.lower()    # Normalize\n\n    @field_validator(&quot;phone&quot;)\n    @classmethod\n    def validate_phone(cls, v: Optional[str]) -&gt; Optional[str]:\n        if v and not v.startswith(&quot;+&quot;):\n            raise ValueError(&quot;Telefon raqami + bilan boshlanishi kerak&quot;)\n        return v\n\n    # Ko'p maydon validatori | Multi-field validator (model level)\n    @model_validator(mode=&quot;after&quot;)\n    def check_passwords_match(self) -&gt; &quot;UserCreate&quot;:\n        if self.password != self.confirm_password:\n            raise ValueError(&quot;Parollar mos kelmaydi&quot;)\n        return self\n\nuser = UserCreate(\n    username=&quot;Ali123&quot;,\n    password=&quot;secret123&quot;,\n    confirm_password=&quot;secret123&quot;,\n    phone=&quot;+998901234567&quot;\n)\n</code></pre>\n<hr />\n<h2 id=\"q29-what-is-pydantic-basesettings-pydantic-basesettings-nima\">Q29. What is Pydantic BaseSettings? | Pydantic BaseSettings nima?</h2>\n<p><strong>EN:</strong> <code>BaseSettings</code> reads configuration from environment variables and <code>.env</code> files — ideal for managing app settings in different environments.</p>\n<p><strong>UZ:</strong> <code>BaseSettings</code> — muhit o'zgaruvchilari va <code>.env</code> fayllardan konfiguratsiyani o'qiydi — turli muhitlarda ilova sozlamalarini boshqarish uchun ideal.</p>\n<pre><code class=\"language-python\"># pip install pydantic-settings\nfrom pydantic_settings import BaseSettings, SettingsConfigDict\nfrom functools import lru_cache\n\nclass Settings(BaseSettings):\n    model_config = SettingsConfigDict(\n        env_file=&quot;.env&quot;,\n        env_file_encoding=&quot;utf-8&quot;,\n        case_sensitive=False\n    )\n\n    # Database | Ma'lumotlar bazasi\n    database_url: str\n    db_pool_size: int = 10\n    db_max_overflow: int = 20\n\n    # Security | Xavfsizlik\n    secret_key: str\n    algorithm: str = &quot;HS256&quot;\n    access_token_expire_minutes: int = 30\n\n    # App\n    app_name: str = &quot;My FastAPI App&quot;\n    debug: bool = False\n    api_v1_prefix: str = &quot;/api/v1&quot;\n\n# Singleton pattern — faqat bir marta yuklanadi | Loaded only once\n@lru_cache()\ndef get_settings() -&gt; Settings:\n    return Settings()\n\n# FastAPI'da ishlatish | Usage in FastAPI\nfrom fastapi import Depends\nfrom typing import Annotated\n\nSettingsDep = Annotated[Settings, Depends(get_settings)]\n\n# .env fayli | .env file:\n# DATABASE_URL=postgresql+asyncpg://user:pass@localhost/db\n# SECRET_KEY=supersecretkey\n# DEBUG=false\n</code></pre>\n<hr />\n<h2 id=\"q30-how-to-create-nested-pydantic-models-ichma-ich-pydantic-modellarini-qanday-yaratish-mumkin\">Q30. How to create nested Pydantic models? | Ichma-ich Pydantic modellarini qanday yaratish mumkin?</h2>\n<p><strong>EN:</strong> Pydantic models can contain other models as field types, enabling complex nested data structures.</p>\n<p><strong>UZ:</strong> Pydantic modellari boshqa modellarni maydon turi sifatida o'z ichiga olishi mumkin, bu murakkab ichma-ich ma'lumot tuzilmalarini yaratishga imkon beradi.</p>\n<pre><code class=\"language-python\">from pydantic import BaseModel, EmailStr\nfrom typing import List, Optional\n\nclass Address(BaseModel):\n    street: str\n    city: str\n    country: str = &quot;Uzbekistan&quot;\n\nclass ContactInfo(BaseModel):\n    email: EmailStr\n    phone: Optional[str] = None\n    address: Optional[Address] = None\n\nclass Order(BaseModel):\n    product_id: int\n    quantity: int\n    price: float\n\nclass User(BaseModel):\n    id: int\n    name: str\n    contact: ContactInfo\n    orders: List[Order] = []\n\n# Ishlatish | Usage\nuser = User(\n    id=1,\n    name=&quot;Ali&quot;,\n    contact=ContactInfo(\n        email=&quot;ali@example.com&quot;,\n        address=Address(street=&quot;Navoiy ko'chasi 1&quot;, city=&quot;Toshkent&quot;)\n    ),\n    orders=[\n        Order(product_id=10, quantity=2, price=50000.0)\n    ]\n)\n\n# Dict'ga aylantirish | Convert to dict\nprint(user.model_dump())\n# JSON'ga | To JSON\nprint(user.model_dump_json(indent=2))\n</code></pre>\n<hr />\n<h2 id=\"q31-what-is-model_dump-and-its-options-model_dump-va-uning-opsiyalari-nima\">Q31. What is <code>model_dump()</code> and its options? | <code>model_dump()</code> va uning opsiyalari nima?</h2>\n<p><strong>EN:</strong> <code>model_dump()</code> converts a Pydantic model to a dictionary. It has many filtering options.</p>\n<p><strong>UZ:</strong> <code>model_dump()</code> — Pydantic modelni lug'atga aylantiradi. Ko'p filtrlash opsiyalariga ega.</p>\n<pre><code class=\"language-python\">from pydantic import BaseModel\nfrom typing import Optional\n\nclass User(BaseModel):\n    id: int\n    name: str\n    email: str\n    password: str\n    bio: Optional[str] = None\n\nuser = User(id=1, name=&quot;Ali&quot;, email=&quot;ali@ex.com&quot;, password=&quot;secret&quot;)\n\n# Standart | Default\nuser.model_dump()\n# {'id': 1, 'name': 'Ali', 'email': 'ali@ex.com', 'password': 'secret', 'bio': None}\n\n# Faqat o'rnatilganlar | Only set fields\nuser.model_dump(exclude_unset=True)\n# {'id': 1, 'name': 'Ali', 'email': 'ali@ex.com', 'password': 'secret'}\n\n# Chiqarib tashlash | Exclude fields\nuser.model_dump(exclude={&quot;password&quot;})\n# {'id': 1, 'name': 'Ali', 'email': 'ali@ex.com', 'bio': None}\n\n# Faqat shu maydonlar | Only these fields\nuser.model_dump(include={&quot;id&quot;, &quot;name&quot;, &quot;email&quot;})\n# {'id': 1, 'name': 'Ali', 'email': 'ali@ex.com'}\n\n# None maydonlarni chiqarish | Exclude None fields\nuser.model_dump(exclude_none=True)\n# {'id': 1, 'name': 'Ali', 'email': 'ali@ex.com', 'password': 'secret'}\n</code></pre>\n<hr />\n<h2 id=\"q32-how-to-use-pydantic-with-sqlalchemy-orm-pydanticni-sqlalchemy-orm-bilan-qanday-ishlatish-kerak\">Q32. How to use Pydantic with SQLAlchemy ORM? | Pydantic'ni SQLAlchemy ORM bilan qanday ishlatish kerak?</h2>\n<p><strong>EN:</strong> Use <code>model_config = ConfigDict(from_attributes=True)</code> (V2) to allow Pydantic to read data directly from SQLAlchemy ORM objects.</p>\n<p><strong>UZ:</strong> SQLAlchemy ORM ob'ektlaridan Pydantic'ga to'g'ridan-to'g'ri ma'lumot o'qish imkonini berish uchun <code>model_config = ConfigDict(from_attributes=True)</code> (V2) ishlatiladi.</p>\n<pre><code class=\"language-python\">from pydantic import BaseModel, ConfigDict\nfrom sqlalchemy import Column, Integer, String\nfrom sqlalchemy.orm import DeclarativeBase\n\n# SQLAlchemy modeli | SQLAlchemy model\nclass Base(DeclarativeBase):\n    pass\n\nclass UserORM(Base):\n    __tablename__ = &quot;users&quot;\n    id = Column(Integer, primary_key=True)\n    name = Column(String)\n    email = Column(String)\n    hashed_password = Column(String)\n\n# Pydantic schema\nclass UserSchema(BaseModel):\n    model_config = ConfigDict(from_attributes=True)  # ← Muhim! | Important!\n\n    id: int\n    name: str\n    email: str\n    # hashed_password yo'q — yashiriladi | not included — hidden\n\n# ORM → Pydantic\nuser_orm = UserORM(id=1, name=&quot;Ali&quot;, email=&quot;ali@ex.com&quot;, hashed_password=&quot;$hash&quot;)\nuser_schema = UserSchema.model_validate(user_orm)  # ← from_attributes=True kerak | needed\nprint(user_schema.model_dump())\n# {'id': 1, 'name': 'Ali', 'email': 'ali@ex.com'}\n</code></pre>\n<hr />\n<h2 id=\"q33-what-is-pydantic-field-and-its-options-pydantic-field-va-uning-opsiyalari-nima\">Q33. What is Pydantic <code>Field</code> and its options? | Pydantic <code>Field</code> va uning opsiyalari nima?</h2>\n<p><strong>EN:</strong> <code>Field</code> provides metadata and validation rules for individual Pydantic model fields.</p>\n<p><strong>UZ:</strong> <code>Field</code> — Pydantic model maydonlari uchun metadata va tekshiruv qoidalarini ta'minlaydi.</p>\n<pre><code class=\"language-python\">from pydantic import BaseModel, Field\nfrom typing import Optional\nimport re\n\nclass Product(BaseModel):\n    # Majburiy | Required\n    name: str = Field(..., min_length=1, max_length=200, description=&quot;Mahsulot nomi&quot;)\n\n    # Default qiymat | Default value\n    price: float = Field(default=0.0, ge=0.0, description=&quot;Narx (UZS)&quot;)\n\n    # Ixtiyoriy | Optional\n    description: Optional[str] = Field(None, max_length=1000)\n\n    # Regex pattern\n    sku: str = Field(..., pattern=r&quot;^[A-Z]{3}-\\d{6}$&quot;, example=&quot;ABC-123456&quot;)\n\n    # Alias — JSON da boshqa nom | Different name in JSON\n    category_id: int = Field(..., alias=&quot;categoryId&quot;)\n\n    # GT, GE, LT, LE\n    stock: int = Field(default=0, ge=0, le=10000)\n\n    # Float aniqlik | Float precision\n    weight: float = Field(..., gt=0, description=&quot;Og'irligi (kg)&quot;)\n\n    # Swagger uchun misol | Example for Swagger\n    tags: list[str] = Field(default=[], max_length=10, example=[&quot;electronics&quot;, &quot;sale&quot;])\n\n# Alias bilan ishlash | Work with alias\nproduct = Product(\n    name=&quot;Laptop&quot;,\n    price=5000000.0,\n    sku=&quot;LAP-000001&quot;,\n    categoryId=3,    # ← alias\n    weight=2.5\n)\nprint(product.category_id)  # 3\n</code></pre>\n<hr />\n<h2 id=\"q34-how-to-create-custom-types-in-pydantic-pydanticda-custom-typelar-qanday-yaratiladi\">Q34. How to create Custom Types in Pydantic? | Pydantic'da Custom Type'lar qanday yaratiladi?</h2>\n<p><strong>EN:</strong> Create custom types using <code>Annotated</code> with <code>BeforeValidator</code>, <code>AfterValidator</code>, or by subclassing types.</p>\n<p><strong>UZ:</strong> <code>Annotated</code> va <code>BeforeValidator</code>, <code>AfterValidator</code> yordamida yoki type'lardan meros olib maxsus type'lar yaratiladi.</p>\n<pre><code class=\"language-python\">from pydantic import BaseModel, BeforeValidator, AfterValidator\nfrom typing import Annotated\nimport re\n\n# Custom type: UZS telefon raqami | UZ phone number\ndef validate_uz_phone(v: str) -&gt; str:\n    v = v.strip().replace(&quot; &quot;, &quot;&quot;)\n    pattern = r&quot;^\\+998\\d{9}$&quot;\n    if not re.match(pattern, v):\n        raise ValueError(&quot;O'zbekiston telefon raqami formati: +998XXXXXXXXX&quot;)\n    return v\n\nUZPhone = Annotated[str, AfterValidator(validate_uz_phone)]\n\n# Custom type: Katta harf | Uppercase string\ndef to_upper(v: str) -&gt; str:\n    return v.upper()\n\nUpperStr = Annotated[str, BeforeValidator(to_upper)]\n\n# Custom type: Musbat son | Positive float\nPositiveAmount = Annotated[float, Field(gt=0)]\n\nclass Employee(BaseModel):\n    name: UpperStr                  # Avtomatik katta harf | Auto uppercase\n    phone: UZPhone                  # Tekshirilgan telefon | Validated phone\n    salary: PositiveAmount          # Musbat miqdor | Positive amount\n\nemp = Employee(\n    name=&quot;ali valiev&quot;,             # → &quot;ALI VALIEV&quot;\n    phone=&quot;+998 90 123 45 67&quot;,     # → &quot;+998901234567&quot;\n    salary=5000000.0\n)\n</code></pre>\n<hr />\n<h2 id=\"q35-how-to-serialize-pydantic-models-to-json-pydantic-modellarini-jsonga-qanday-serializatsiya-qilish-kerak\">Q35. How to serialize Pydantic models to JSON? | Pydantic modellarini JSON'ga qanday serializatsiya qilish kerak?</h2>\n<p><strong>EN:</strong> Use <code>model_dump_json()</code> for direct JSON string, or <code>model_dump()</code> then <code>json.dumps()</code> for custom options.</p>\n<p><strong>UZ:</strong> To'g'ridan-to'g'ri JSON string uchun <code>model_dump_json()</code>, yoki <code>model_dump()</code> so'ng <code>json.dumps()</code> maxsus opsiyalar uchun.</p>\n<pre><code class=\"language-python\">from pydantic import BaseModel\nfrom datetime import datetime\nfrom decimal import Decimal\n\nclass Order(BaseModel):\n    id: int\n    created_at: datetime\n    total: Decimal\n    status: str\n\norder = Order(\n    id=1,\n    created_at=datetime(2024, 1, 15, 10, 30),\n    total=Decimal(&quot;149999.99&quot;),\n    status=&quot;pending&quot;\n)\n\n# JSON string | JSON satr\njson_str = order.model_dump_json()\nprint(json_str)\n# {&quot;id&quot;:1,&quot;created_at&quot;:&quot;2024-01-15T10:30:00&quot;,&quot;total&quot;:&quot;149999.99&quot;,&quot;status&quot;:&quot;pending&quot;}\n\n# Chiroyli | Pretty print\nprint(order.model_dump_json(indent=2))\n\n# Dict opsiyalar bilan | Dict with options\ndata = order.model_dump(\n    mode=&quot;json&quot;,   # JSON-compatible types\n    exclude={&quot;status&quot;}\n)\n</code></pre>\n<hr />\n<h2 id=\"q36-what-are-pydantic-discriminated-unions-pydantic-discriminated-union-nima\">Q36. What are Pydantic Discriminated Unions? | Pydantic Discriminated Union nima?</h2>\n<p><strong>EN:</strong> Discriminated unions allow a field to accept different model types based on a discriminator field value.</p>\n<p><strong>UZ:</strong> Discriminated union — maydonning diskriminator maydon qiymatiga asoslanib turli model turlarini qabul qilishiga imkon beradi.</p>\n<pre><code class=\"language-python\">from pydantic import BaseModel\nfrom typing import Union, Literal, Annotated\n\nclass CatEvent(BaseModel):\n    type: Literal[&quot;cat&quot;]\n    meow_count: int\n\nclass DogEvent(BaseModel):\n    type: Literal[&quot;dog&quot;]\n    bark_volume: float\n\n# Discriminated Union — type maydoni asosida | Based on type field\nPetEvent = Annotated[\n    Union[CatEvent, DogEvent],\n    Field(discriminator=&quot;type&quot;)\n]\n\nclass EventLog(BaseModel):\n    event: PetEvent\n\n# Ishlatish | Usage\nlog1 = EventLog(event={&quot;type&quot;: &quot;cat&quot;, &quot;meow_count&quot;: 5})\nlog2 = EventLog(event={&quot;type&quot;: &quot;dog&quot;, &quot;bark_volume&quot;: 8.5})\n\nprint(type(log1.event))  # CatEvent\nprint(type(log2.event))  # DogEvent\n</code></pre>\n<hr />\n<h2 id=\"q37-what-are-pydantic-computed-fields-pydantic-computed-field-nima\">Q37. What are Pydantic computed fields? | Pydantic computed field nima?</h2>\n<p><strong>EN:</strong> <code>@computed_field</code> creates read-only properties that are included in model serialization.</p>\n<p><strong>UZ:</strong> <code>@computed_field</code> — model serializatsiyasiga kiritilgan faqat o'qish xususiyatlarini yaratadi.</p>\n<pre><code class=\"language-python\">from pydantic import BaseModel, computed_field\n\nclass Rectangle(BaseModel):\n    width: float\n    height: float\n\n    @computed_field\n    @property\n    def area(self) -&gt; float:\n        return self.width * self.height\n\n    @computed_field\n    @property\n    def perimeter(self) -&gt; float:\n        return 2 * (self.width + self.height)\n\nrect = Rectangle(width=5.0, height=3.0)\nprint(rect.model_dump())\n# {'width': 5.0, 'height': 3.0, 'area': 15.0, 'perimeter': 16.0}\n</code></pre>\n<hr />\n<h2 id=\"q38-how-to-handle-optional-fields-properly-optional-maydonlarni-qanday-togri-boshqarish-kerak\">Q38. How to handle Optional fields properly? | Optional maydonlarni qanday to'g'ri boshqarish kerak?</h2>\n<p><strong>EN:</strong> Distinguish between \"field not provided\" (use <code>exclude_unset</code>) and \"field is None\" (use <code>Optional</code>). For PATCH endpoints, use <code>exclude_unset=True</code>.</p>\n<p><strong>UZ:</strong> \"Maydon berilmagan\" (<code>exclude_unset</code>) va \"maydon None\" (<code>Optional</code>) orasidagi farqni ajrating. PATCH endpointlar uchun <code>exclude_unset=True</code> ishlatiladi.</p>\n<pre><code class=\"language-python\">from pydantic import BaseModel\nfrom typing import Optional\n\nclass UserUpdate(BaseModel):\n    name: Optional[str] = None\n    email: Optional[str] = None\n    bio: Optional[str] = None\n\n# PATCH endpoint — faqat berilgan maydonlarni yangilash | Update only provided fields\n@app.patch(&quot;/users/{user_id}&quot;)\nasync def update_user(\n    user_id: int,\n    user_update: UserUpdate,\n    db: AsyncSession = Depends(get_db)\n):\n    # Faqat berilgan maydonlar | Only provided fields\n    update_data = user_update.model_dump(exclude_unset=True)\n    # PATCH {&quot;name&quot;: &quot;Vali&quot;} → {&quot;name&quot;: &quot;Vali&quot;} (email va bio o'zgartirilmaydi | not changed)\n\n    stmt = (\n        update(User)\n        .where(User.id == user_id)\n        .values(**update_data)\n    )\n    await db.execute(stmt)\n    await db.commit()\n    return {&quot;updated&quot;: update_data}\n</code></pre>\n<hr />\n<h2 id=\"q39-what-is-pydantics-model_config-pydantic-model_config-nima\">Q39. What is Pydantic's <code>model_config</code>? | Pydantic <code>model_config</code> nima?</h2>\n<p><strong>EN:</strong> <code>model_config</code> (V2) / <code>class Config</code> (V1) controls model behavior — ORM mode, extra fields, field aliases, etc.</p>\n<p><strong>UZ:</strong> <code>model_config</code> (V2) / <code>class Config</code> (V1) — model xatti-harakatini boshqaradi: ORM rejimi, qo'shimcha maydonlar, maydon aliasi va boshqalar.</p>\n<pre><code class=\"language-python\">from pydantic import BaseModel, ConfigDict, Field\n\nclass StrictUser(BaseModel):\n    model_config = ConfigDict(\n        from_attributes=True,          # ORM mode — SQLAlchemy bilan | With SQLAlchemy\n        extra=&quot;forbid&quot;,                # Qo'shimcha maydonlarga ruxsat yo'q | No extra fields\n        str_strip_whitespace=True,     # Stringlardan bo'sh joylarni olib tashlash | Strip whitespace\n        str_to_lower=False,            # Stringlarni kichik harfga o'tkazmaslik\n        validate_assignment=True,      # Tayinlashda ham tekshirish | Validate on assignment\n        populate_by_name=True,         # Alias bilan ham to'ldirish | Also populate by name\n        frozen=False,                  # Immutable qilish | Make immutable\n    )\n\n    name: str = Field(..., alias=&quot;full_name&quot;)\n    email: str\n\n# extra=&quot;forbid&quot; — noma'lum maydon bo'lsa xato | Unknown field raises error\ntry:\n    StrictUser(name=&quot;Ali&quot;, email=&quot;ali@ex.com&quot;, unknown=&quot;field&quot;)\nexcept Exception as e:\n    print(e)  # ValidationError: Extra inputs not permitted\n\n# populate_by_name=True — ikkala nom bilan ham yaratish | Create with both names\nuser = StrictUser(full_name=&quot;Ali&quot;, email=&quot;ali@ex.com&quot;)   # alias bilan | with alias\nuser = StrictUser(name=&quot;Ali&quot;, email=&quot;ali@ex.com&quot;)         # ism bilan | with name\n</code></pre>\n<hr />\n<h2 id=\"q40-how-to-use-pydantic-for-environment-specific-configuration-pydanticni-muhitga-xos-konfiguratsiya-uchun-qanday-ishlatish-kerak\">Q40. How to use Pydantic for environment-specific configuration? | Pydantic'ni muhitga xos konfiguratsiya uchun qanday ishlatish kerak?</h2>\n<p><strong>EN:</strong> Use multiple settings classes or environment variables to manage dev/staging/production configs.</p>\n<p><strong>UZ:</strong> Dev/staging/production konfiguratsiyalarini boshqarish uchun bir nechta settings klasslari yoki muhit o'zgaruvchilaridan foydalanish.</p>\n<pre><code class=\"language-python\">from pydantic_settings import BaseSettings, SettingsConfigDict\nfrom enum import Enum\n\nclass Environment(str, Enum):\n    DEV = &quot;development&quot;\n    STAGING = &quot;staging&quot;\n    PROD = &quot;production&quot;\n\nclass Settings(BaseSettings):\n    model_config = SettingsConfigDict(env_file=&quot;.env&quot;)\n\n    ENV: Environment = Environment.DEV\n    DATABASE_URL: str\n    SECRET_KEY: str\n    DEBUG: bool = False\n    LOG_LEVEL: str = &quot;INFO&quot;\n\n    # DB pool hajmi muhitga qarab | DB pool size by environment\n    @property\n    def db_pool_size(self) -&gt; int:\n        return {\n            Environment.DEV: 5,\n            Environment.STAGING: 10,\n            Environment.PROD: 20\n        }[self.ENV]\n\n    @property\n    def is_production(self) -&gt; bool:\n        return self.ENV == Environment.PROD\n\nsettings = Settings()\n\n# .env.development\n# ENV=development\n# DATABASE_URL=postgresql+asyncpg://user:pass@localhost/devdb\n# SECRET_KEY=devsecret\n# DEBUG=true\n\n# .env.production\n# ENV=production\n# DATABASE_URL=postgresql+asyncpg://user:pass@prod-server/proddb\n# SECRET_KEY=supersecretkey\n# DEBUG=false\n</code></pre>\n<hr />\n<h1 id=\"sqlalchemy-q41q55\">🔵 SQLALCHEMY (Q41–Q55)</h1>\n<hr />\n<h2 id=\"q41-what-is-sqlalchemy-sqlalchemy-nima\">Q41. What is SQLAlchemy? | SQLAlchemy nima?</h2>\n<p><strong>EN:</strong> SQLAlchemy is a Python SQL toolkit and ORM (Object-Relational Mapper). It has two components: <strong>Core</strong> (SQL Expression Language — low level) and <strong>ORM</strong> (high level — maps Python classes to DB tables).</p>\n<p><strong>UZ:</strong> SQLAlchemy — Python SQL vositalar to'plami va ORM (Ob'ekt-Relatsion Mapper). Ikki komponentdan iborat: <strong>Core</strong> (SQL Expression Language — past daraja) va <strong>ORM</strong> (yuqori daraja — Python klasslarini DB jadvallarga moslashtiradi).</p>\n<pre><code class=\"language-python\">from sqlalchemy.ext.asyncio import create_async_engine, AsyncSession, async_sessionmaker\nfrom sqlalchemy.orm import DeclarativeBase\n\n# Async engine yaratish | Create async engine\nengine = create_async_engine(\n    &quot;postgresql+asyncpg://user:password@localhost/dbname&quot;,\n    pool_size=10,\n    max_overflow=20,\n    pool_pre_ping=True,     # Ulanishni tekshirish | Check connection\n    echo=False,             # SQL loglarini ko'rsatmaslik | Don't show SQL logs\n)\n\n# Session factory | Session fabrikasi\nAsyncSessionLocal = async_sessionmaker(\n    engine,\n    class_=AsyncSession,\n    expire_on_commit=False  # Commit dan keyin expire bo'lmaslik | Don't expire after commit\n)\n\n# Base klass | Base class\nclass Base(DeclarativeBase):\n    pass\n</code></pre>\n<hr />\n<h2 id=\"q42-how-to-define-sqlalchemy-models-sqlalchemy-modellarini-qanday-aniqlash-kerak\">Q42. How to define SQLAlchemy models? | SQLAlchemy modellarini qanday aniqlash kerak?</h2>\n<p><strong>EN:</strong> Define models as Python classes inheriting from <code>DeclarativeBase</code>. Each class represents a table.</p>\n<p><strong>UZ:</strong> Modellar <code>DeclarativeBase</code>dan meros olgan Python klasslari sifatida aniqlanadi. Har bir klass bitta jadvalni ifodalaydi.</p>\n<pre><code class=\"language-python\">from sqlalchemy import Column, Integer, String, Float, Boolean, DateTime, ForeignKey, Text\nfrom sqlalchemy.orm import relationship, DeclarativeBase\nfrom datetime import datetime\n\nclass Base(DeclarativeBase):\n    pass\n\nclass User(Base):\n    __tablename__ = &quot;users&quot;\n\n    id = Column(Integer, primary_key=True, index=True)\n    name = Column(String(100), nullable=False)\n    email = Column(String(255), unique=True, nullable=False, index=True)\n    hashed_password = Column(String(255), nullable=False)\n    is_active = Column(Boolean, default=True, nullable=False)\n    created_at = Column(DateTime, default=datetime.utcnow, nullable=False)\n    updated_at = Column(DateTime, default=datetime.utcnow, onupdate=datetime.utcnow)\n\n    # Relationship | Munosabat\n    orders = relationship(&quot;Order&quot;, back_populates=&quot;user&quot;, lazy=&quot;selectin&quot;)\n\n    def __repr__(self):\n        return f&quot;&lt;User id={self.id} email={self.email}&gt;&quot;\n\nclass Order(Base):\n    __tablename__ = &quot;orders&quot;\n\n    id = Column(Integer, primary_key=True)\n    user_id = Column(Integer, ForeignKey(&quot;users.id&quot;, ondelete=&quot;CASCADE&quot;), nullable=False)\n    total = Column(Float, nullable=False)\n    status = Column(String(50), default=&quot;pending&quot;)\n    created_at = Column(DateTime, default=datetime.utcnow)\n\n    user = relationship(&quot;User&quot;, back_populates=&quot;orders&quot;)\n</code></pre>\n<hr />\n<h2 id=\"q43-what-are-sqlalchemy-relationships-sqlalchemy-relationships-nima\">Q43. What are SQLAlchemy Relationships? | SQLAlchemy Relationships nima?</h2>\n<p><strong>EN:</strong> Relationships define how models are connected. Types: One-to-Many, Many-to-One, One-to-One, Many-to-Many.</p>\n<p><strong>UZ:</strong> Relationships — modellar qanday bog'liqligini belgilaydi. Turlari: One-to-Many, Many-to-One, One-to-One, Many-to-Many.</p>\n<pre><code class=\"language-python\">from sqlalchemy import Column, Integer, String, ForeignKey, Table\nfrom sqlalchemy.orm import relationship, DeclarativeBase\n\nclass Base(DeclarativeBase):\n    pass\n\n# Many-to-Many uchun oraliq jadval | Association table for Many-to-Many\npost_tags = Table(\n    &quot;post_tags&quot;, Base.metadata,\n    Column(&quot;post_id&quot;, Integer, ForeignKey(&quot;posts.id&quot;), primary_key=True),\n    Column(&quot;tag_id&quot;, Integer, ForeignKey(&quot;tags.id&quot;), primary_key=True),\n)\n\nclass User(Base):\n    __tablename__ = &quot;users&quot;\n    id = Column(Integer, primary_key=True)\n    name = Column(String)\n\n    # One-to-Many: bir user → ko'p post | One user → many posts\n    posts = relationship(&quot;Post&quot;, back_populates=&quot;author&quot;, cascade=&quot;all, delete-orphan&quot;)\n\n    # One-to-One: bir user → bir profil | One user → one profile\n    profile = relationship(&quot;Profile&quot;, back_populates=&quot;user&quot;, uselist=False)\n\nclass Post(Base):\n    __tablename__ = &quot;posts&quot;\n    id = Column(Integer, primary_key=True)\n    user_id = Column(Integer, ForeignKey(&quot;users.id&quot;))\n    title = Column(String)\n\n    # Many-to-One | Ko'p post → bir user\n    author = relationship(&quot;User&quot;, back_populates=&quot;posts&quot;)\n\n    # Many-to-Many: ko'p post ↔ ko'p tag | Many posts ↔ many tags\n    tags = relationship(&quot;Tag&quot;, secondary=post_tags, back_populates=&quot;posts&quot;)\n\nclass Tag(Base):\n    __tablename__ = &quot;tags&quot;\n    id = Column(Integer, primary_key=True)\n    name = Column(String)\n    posts = relationship(&quot;Post&quot;, secondary=post_tags, back_populates=&quot;tags&quot;)\n</code></pre>\n<hr />\n<h2 id=\"q44-what-is-the-n1-query-problem-and-how-to-solve-it-n1-query-muammosi-nima-va-uni-qanday-hal-qilish-mumkin\">Q44. What is the N+1 Query Problem and how to solve it? | N+1 Query muammosi nima va uni qanday hal qilish mumkin?</h2>\n<p><strong>EN:</strong> N+1 happens when fetching N records triggers N additional queries for related data. Solved with eager loading: <code>selectinload</code> or <code>joinedload</code>.</p>\n<p><strong>UZ:</strong> N+1 — N ta yozuv olish N ta qo'shimcha so'rovni keltirib chiqarganda yuz beradi. Eager loading bilan hal qilinadi: <code>selectinload</code> yoki <code>joinedload</code>.</p>\n<pre><code class=\"language-python\">from sqlalchemy.orm import selectinload, joinedload\nfrom sqlalchemy import select\n\n# ❌ N+1 muammo | N+1 Problem\nasync def get_users_bad(db: AsyncSession):\n    result = await db.execute(select(User))\n    users = result.scalars().all()\n    for user in users:\n        print(user.orders)  # ← Har bir user uchun alohida so'rov! | Separate query for each!\n    # 1 + N ta so'rov | 1 + N queries\n\n# ✅ selectinload — one-to-many uchun tavsiya | Recommended for one-to-many\nasync def get_users_good(db: AsyncSession):\n    result = await db.execute(\n        select(User).options(selectinload(User.orders))\n    )\n    users = result.scalars().all()\n    # Faqat 2 ta so'rov! | Only 2 queries!\n    # SELECT * FROM users;\n    # SELECT * FROM orders WHERE user_id IN (1, 2, 3, ...);\n\n# ✅ joinedload — one-to-one yoki many-to-one uchun | For one-to-one or many-to-one\nasync def get_orders_with_user(db: AsyncSession):\n    result = await db.execute(\n        select(Order).options(joinedload(Order.user))\n    )\n    # Bitta JOIN so'rov | Single JOIN query\n    # SELECT orders.*, users.* FROM orders JOIN users ON ...\n\n# ✅ Ko'p darajali yuklash | Multi-level loading\nresult = await db.execute(\n    select(User).options(\n        selectinload(User.orders).selectinload(Order.items)\n    )\n)\n</code></pre>\n<hr />\n<h2 id=\"q45-how-to-perform-crud-operations-with-sqlalchemy-async-sqlalchemy-async-bilan-crud-operatsiyalarini-qanday-bajarish-kerak\">Q45. How to perform CRUD operations with SQLAlchemy async? | SQLAlchemy async bilan CRUD operatsiyalarini qanday bajarish kerak?</h2>\n<p><strong>EN:</strong> Use <code>AsyncSession</code> methods to create, read, update, and delete records asynchronously.</p>\n<p><strong>UZ:</strong> Yozuvlarni asinxron yaratish, o'qish, yangilash va o'chirish uchun <code>AsyncSession</code> metodlaridan foydalaning.</p>\n<pre><code class=\"language-python\">from sqlalchemy.ext.asyncio import AsyncSession\nfrom sqlalchemy import select, update, delete\nfrom sqlalchemy.orm import selectinload\n\n# CREATE | Yaratish\nasync def create_user(db: AsyncSession, name: str, email: str) -&gt; User:\n    user = User(name=name, email=email)\n    db.add(user)\n    await db.commit()\n    await db.refresh(user)  # ID ni olish | Get generated ID\n    return user\n\n# READ — bitta | Single\nasync def get_user(db: AsyncSession, user_id: int) -&gt; User | None:\n    result = await db.execute(\n        select(User)\n        .where(User.id == user_id)\n        .options(selectinload(User.orders))\n    )\n    return result.scalar_one_or_none()\n\n# READ — ro'yxat | List\nasync def get_users(db: AsyncSession, skip: int = 0, limit: int = 10):\n    result = await db.execute(\n        select(User)\n        .where(User.is_active == True)\n        .order_by(User.created_at.desc())\n        .offset(skip)\n        .limit(limit)\n    )\n    return result.scalars().all()\n\n# UPDATE\nasync def update_user(db: AsyncSession, user_id: int, **kwargs) -&gt; User | None:\n    await db.execute(\n        update(User)\n        .where(User.id == user_id)\n        .values(**kwargs)\n    )\n    await db.commit()\n    return await get_user(db, user_id)\n\n# DELETE\nasync def delete_user(db: AsyncSession, user_id: int) -&gt; bool:\n    result = await db.execute(\n        delete(User).where(User.id == user_id)\n    )\n    await db.commit()\n    return result.rowcount &gt; 0\n</code></pre>\n<hr />\n<h2 id=\"q46-what-is-sqlalchemy-session-and-how-does-it-work-sqlalchemy-session-nima-va-u-qanday-ishlaydi\">Q46. What is SQLAlchemy Session and how does it work? | SQLAlchemy Session nima va u qanday ishlaydi?</h2>\n<p><strong>EN:</strong> Session is the main interface for database operations. It tracks changes to ORM objects and syncs them with the DB on <code>commit()</code>. Use <code>yield</code> in FastAPI deps for proper lifecycle management.</p>\n<p><strong>UZ:</strong> Session — ma'lumotlar bazasi operatsiyalari uchun asosiy interfeys. ORM ob'ektlaridagi o'zgarishlarni kuzatadi va <code>commit()</code> da DB bilan sinxronlaydi. FastAPI deps'da <code>yield</code> ishlatib to'g'ri lifecycle boshqarish uchun.</p>\n<pre><code class=\"language-python\">from sqlalchemy.ext.asyncio import AsyncSession, async_sessionmaker, create_async_engine\nfrom fastapi import Depends\nfrom typing import AsyncGenerator\n\nengine = create_async_engine(&quot;postgresql+asyncpg://...&quot;)\nAsyncSessionLocal = async_sessionmaker(engine, expire_on_commit=False)\n\n# FastAPI dependency | FastAPI bog'liqlik\nasync def get_db() -&gt; AsyncGenerator[AsyncSession, None]:\n    async with AsyncSessionLocal() as session:\n        try:\n            yield session\n            # EN: If no exception, commit happens automatically\n            # UZ: Istisno bo'lmasa, commit avtomatik bo'ladi\n        except Exception:\n            await session.rollback()\n            raise\n        finally:\n            await session.close()\n\n# Session holatlari | Session states\n# transient   → ob'ekt yaratilgan, session'ga qo'shilmagan | created, not added to session\n# pending     → session'ga qo'shilgan, commit bo'lmagan | added, not committed\n# persistent  → DB'da bor, session kuzatyapti | in DB, session tracking\n# detached    → session'dan ajratilgan | detached from session\n</code></pre>\n<hr />\n<h2 id=\"q47-what-is-the-difference-between-scalar-scalars-all-first-one-ular-orasida-qanday-farq-bor\">Q47. What is the difference between <code>scalar()</code>, <code>scalars()</code>, <code>all()</code>, <code>first()</code>, <code>one()</code>? | Ular orasida qanday farq bor?</h2>\n<p><strong>EN:</strong> These methods control how query results are fetched and returned.</p>\n<p><strong>UZ:</strong> Bu metodlar so'rov natijalari qanday olinishi va qaytarilishini boshqaradi.</p>\n<pre><code class=\"language-python\">from sqlalchemy import select\n\nresult = await db.execute(select(User))\n\n# .all() → barcha qatorlar ro'yxati | List of all rows (tuples)\nrows = result.all()            # [(User,), (User,), ...]\n\n# .scalars().all() → barcha ORM ob'ektlari | All ORM objects\nusers = result.scalars().all() # [User, User, ...]\n\n# .scalar_one() → bitta natija, aks holda xato | Single result, error if not exactly one\nuser = result.scalar_one()     # ValueError if 0 or &gt;1 results\n\n# .scalar_one_or_none() → bitta yoki None | Single or None\nuser = result.scalar_one_or_none()  # None if not found, error if &gt;1\n\n# .first() → birinchi qator yoki None | First row or None\nrow = result.first()           # (User,) | tuple or None\n\n# .scalars().first() → birinchi ORM ob'ekt | First ORM object\nuser = result.scalars().first()  # User | or None\n\n# Amaliy | Practical usage\nasync def get_user_by_email(db: AsyncSession, email: str) -&gt; User | None:\n    result = await db.execute(\n        select(User).where(User.email == email)\n    )\n    return result.scalar_one_or_none()  # ← Eng keng tarqalgan | Most common\n</code></pre>\n<hr />\n<h2 id=\"q48-how-to-handle-transactions-in-sqlalchemy-sqlalchemyda-transaksiyalarni-qanday-boshqarish-kerak\">Q48. How to handle transactions in SQLAlchemy? | SQLAlchemy'da transaksiyalarni qanday boshqarish kerak?</h2>\n<p><strong>EN:</strong> SQLAlchemy sessions automatically manage transactions. Use <code>begin()</code> for explicit transactions or <code>rollback()</code> on errors.</p>\n<p><strong>UZ:</strong> SQLAlchemy sessionlari tranzaksiyalarni avtomatik boshqaradi. Aniq tranzaksiyalar uchun <code>begin()</code> yoki xatolarda <code>rollback()</code> ishlatiladi.</p>\n<pre><code class=\"language-python\">from sqlalchemy.ext.asyncio import AsyncSession\n\n# 1. Avtomatik tranzaksiya | Automatic transaction\nasync def transfer_money(db: AsyncSession, from_id: int, to_id: int, amount: float):\n    try:\n        # Ikki operatsiya bitta tranzaksiyada | Two ops in one transaction\n        await db.execute(\n            update(Account).where(Account.id == from_id).values(balance=Account.balance - amount)\n        )\n        await db.execute(\n            update(Account).where(Account.id == to_id).values(balance=Account.balance + amount)\n        )\n        await db.commit()           # Ikkalasi ham muvaffaqiyatli | Both succeed\n    except Exception as e:\n        await db.rollback()         # Ikkalasi ham bekor qilinadi | Both rolled back\n        raise e\n\n# 2. Nested transactions (savepoint)\nasync def with_savepoint(db: AsyncSession):\n    async with db.begin_nested() as nested:\n        try:\n            db.add(User(name=&quot;Ali&quot;))\n            await nested.commit()\n        except Exception:\n            await nested.rollback()  # Faqat bu bo'lak | Only this part rolled back\n\n# 3. Explicit begin\nasync with db.begin():\n    db.add(User(name=&quot;Vali&quot;))\n    # Avtomatik commit yoki rollback | Auto commit or rollback\n</code></pre>\n<hr />\n<h2 id=\"q49-what-are-sqlalchemy-indexes-and-constraints-sqlalchemy-indeks-va-cheklovlari-nima\">Q49. What are SQLAlchemy indexes and constraints? | SQLAlchemy indeks va cheklovlari nima?</h2>\n<p><strong>EN:</strong> Indexes speed up queries. Constraints ensure data integrity at the database level.</p>\n<p><strong>UZ:</strong> Indekslar so'rovlarni tezlashtiradi. Cheklovlar ma'lumotlar bazasi darajasida ma'lumotlar yaxlitligini ta'minlaydi.</p>\n<pre><code class=\"language-python\">from sqlalchemy import Column, Integer, String, Index, UniqueConstraint, CheckConstraint\nfrom sqlalchemy.orm import DeclarativeBase\n\nclass Base(DeclarativeBase):\n    pass\n\nclass Employee(Base):\n    __tablename__ = &quot;employees&quot;\n\n    id = Column(Integer, primary_key=True)\n    first_name = Column(String(50), nullable=False)\n    last_name = Column(String(50), nullable=False)\n    email = Column(String(255), nullable=False)\n    salary = Column(Integer, nullable=False)\n    department = Column(String(50))\n\n    __table_args__ = (\n        # Unique constraint | Noyob cheklov\n        UniqueConstraint(&quot;email&quot;, name=&quot;uq_employee_email&quot;),\n\n        # Composite unique | Birlashtirilgan noyob\n        UniqueConstraint(&quot;first_name&quot;, &quot;last_name&quot;, &quot;department&quot;,\n                         name=&quot;uq_employee_name_dept&quot;),\n\n        # Check constraint | Tekshiruv cheklovi\n        CheckConstraint(&quot;salary &gt; 0&quot;, name=&quot;ck_positive_salary&quot;),\n\n        # Composite index | Birlashtirilgan indeks\n        Index(&quot;ix_employee_dept_name&quot;, &quot;department&quot;, &quot;last_name&quot;),\n    )\n\n# Alohida indeks | Separate index\nIndex(&quot;ix_email_lower&quot;, Employee.email)\n</code></pre>\n<hr />\n<h2 id=\"q50-what-is-sqlalchemy-core-vs-orm-sqlalchemy-core-va-orm-farqi-nima\">Q50. What is SQLAlchemy Core vs ORM? | SQLAlchemy Core va ORM farqi nima?</h2>\n<p><strong>EN:</strong> <strong>Core</strong> uses SQL Expression Language — direct SQL-like queries. <strong>ORM</strong> maps Python objects to tables — higher abstraction. For complex queries or bulk operations, Core is better. For CRUD on models, ORM is easier.</p>\n<p><strong>UZ:</strong> <strong>Core</strong> — SQL Expression Language — to'g'ridan-to'g'ri SQL-ga o'xshash so'rovlar. <strong>ORM</strong> — Python ob'ektlarini jadvallarga moslashtiradi — yuqori abstraktsiya. Murakkab so'rovlar yoki bulk operatsiyalar uchun Core yaxshiroq. Modellardagi CRUD uchun ORM osonroq.</p>\n<pre><code class=\"language-python\">from sqlalchemy import text, select, insert, update, delete\nfrom sqlalchemy.ext.asyncio import AsyncSession\n\n# ═══ CORE ═══\nasync def core_example(db: AsyncSession):\n    # Raw SQL | To'g'ri SQL\n    result = await db.execute(\n        text(&quot;SELECT * FROM users WHERE id = :id&quot;),\n        {&quot;id&quot;: 1}\n    )\n\n    # SQL Expression Language\n    result = await db.execute(\n        select(User.id, User.name)\n        .where(User.is_active == True)\n        .order_by(User.name)\n    )\n\n    # Bulk insert (tez | fast)\n    await db.execute(\n        insert(User),\n        [{&quot;name&quot;: &quot;Ali&quot;, &quot;email&quot;: &quot;ali@ex.com&quot;},\n         {&quot;name&quot;: &quot;Vali&quot;, &quot;email&quot;: &quot;vali@ex.com&quot;}]\n    )\n\n# ═══ ORM ═══\nasync def orm_example(db: AsyncSession):\n    # ORM ob'ektlari | ORM objects\n    user = User(name=&quot;Ali&quot;, email=&quot;ali@ex.com&quot;)\n    db.add(user)\n    await db.commit()\n    await db.refresh(user)\n\n    # Relationship'lar bilan ishlash | Work with relationships\n    result = await db.execute(\n        select(User).options(selectinload(User.orders))\n    )\n    users = result.scalars().all()\n    for user in users:\n        print(user.orders)  # Oldindan yuklangan | Pre-loaded\n```# 🚀 FastAPI · SQLAlchemy · Pydantic · Alembic\n# Interview Questions &amp; Answers | Intervyu Savol va Javoblari\n## Part 2 of 2 — Questions 51–100\n\n---\n\n# 🔵 SQLALCHEMY (davomi | continued) (Q51–Q55)\n\n---\n\n## Q51. What is SQLAlchemy `hybrid_property`? | SQLAlchemy `hybrid_property` nima?\n\n**EN:** `hybrid_property` works both at the Python instance level and SQL query level — allows computed properties that translate to SQL expressions.\n\n**UZ:** `hybrid_property` — Python instance darajasida ham, SQL so'rov darajasida ham ishlaydi — SQL ifodalarga tarjimon bo'ladigan hisoblangan xususiyatlarga imkon beradi.\n\n```python\nfrom sqlalchemy.ext.hybrid import hybrid_property\nfrom sqlalchemy import Column, Integer, String, Float\n\nclass Employee(Base):\n    __tablename__ = &quot;employees&quot;\n    id = Column(Integer, primary_key=True)\n    first_name = Column(String)\n    last_name = Column(String)\n    salary_uzs = Column(Float)\n\n    # Python darajasida | Python level\n    @hybrid_property\n    def full_name(self) -&gt; str:\n        return f&quot;{self.first_name} {self.last_name}&quot;\n\n    # SQL darajasida | SQL level (filter uchun | for filtering)\n    @full_name.expression\n    @classmethod\n    def full_name(cls):\n        return cls.first_name + &quot; &quot; + cls.last_name\n\n    @hybrid_property\n    def salary_usd(self) -&gt; float:\n        return self.salary_uzs / 12800  # UZS → USD\n\n# Python'da ishlatish | Python usage\nemp = Employee(first_name=&quot;Ali&quot;, last_name=&quot;Valiev&quot;, salary_uzs=5_000_000)\nprint(emp.full_name)     # &quot;Ali Valiev&quot;\nprint(emp.salary_usd)    # ~390 USD\n\n# SQL filtrlash | SQL filtering\nresult = await db.execute(\n    select(Employee).where(Employee.full_name == &quot;Ali Valiev&quot;)\n)\n</code></pre>\n<hr />\n<h2 id=\"q52-what-is-sqlalchemy-event-system-sqlalchemy-event-tizimi-nima\">Q52. What is SQLAlchemy <code>event</code> system? | SQLAlchemy <code>event</code> tizimi nima?</h2>\n<p><strong>EN:</strong> SQLAlchemy events allow you to hook into ORM lifecycle events like <code>before_insert</code>, <code>after_update</code>, <code>before_delete</code>. Useful for auditing, auto-timestamps, soft delete.</p>\n<p><strong>UZ:</strong> SQLAlchemy eventlari ORM lifecycle eventlariga (<code>before_insert</code>, <code>after_update</code>, <code>before_delete</code>) ulanish imkonini beradi. Audit, avtomatik timestamp, soft delete uchun foydali.</p>\n<pre><code class=\"language-python\">from sqlalchemy import event\nfrom datetime import datetime\n\n# Avtomatik timestamp | Auto-timestamp\n@event.listens_for(Base, &quot;before_update&quot;, propagate=True)\ndef set_updated_at(mapper, connection, target):\n    if hasattr(target, &quot;updated_at&quot;):\n        target.updated_at = datetime.utcnow()\n\n# Soft delete pattern\n@event.listens_for(Session, &quot;before_flush&quot;)\ndef soft_delete_listener(session, flush_context, instances):\n    for obj in session.deleted:\n        if hasattr(obj, &quot;is_deleted&quot;):\n            obj.is_deleted = True\n            obj.deleted_at = datetime.utcnow()\n            session.expunge(obj)  # Haqiqiy o'chirishni oldini olish | Prevent real delete\n            session.add(obj)\n\n# After insert event\n@event.listens_for(User, &quot;after_insert&quot;)\ndef after_user_insert(mapper, connection, target):\n    print(f&quot;New user created: {target.email}&quot;)\n</code></pre>\n<hr />\n<h2 id=\"q53-how-to-implement-soft-delete-with-sqlalchemy-sqlalchemy-bilan-soft-delete-qanday-amalga-oshiriladi\">Q53. How to implement Soft Delete with SQLAlchemy? | SQLAlchemy bilan Soft Delete qanday amalga oshiriladi?</h2>\n<p><strong>EN:</strong> Soft delete marks records as deleted instead of removing them from the database.</p>\n<p><strong>UZ:</strong> Soft delete — yozuvlarni ma'lumotlar bazasidan o'chirish o'rniga o'chirilgan deb belgilaydi.</p>\n<pre><code class=\"language-python\">from sqlalchemy import Column, Boolean, DateTime, select\nfrom sqlalchemy.orm import DeclarativeBase, declared_attr\nfrom datetime import datetime\n\nclass SoftDeleteMixin:\n    is_deleted: bool = Column(Boolean, default=False, nullable=False)\n    deleted_at: datetime = Column(DateTime, nullable=True)\n\n    def soft_delete(self):\n        self.is_deleted = True\n        self.deleted_at = datetime.utcnow()\n\nclass TimestampMixin:\n    created_at: datetime = Column(DateTime, default=datetime.utcnow, nullable=False)\n    updated_at: datetime = Column(DateTime, default=datetime.utcnow, onupdate=datetime.utcnow)\n\nclass User(Base, SoftDeleteMixin, TimestampMixin):\n    __tablename__ = &quot;users&quot;\n    id = Column(Integer, primary_key=True)\n    name = Column(String)\n\n# Soft delete ishlatish | Using soft delete\nasync def delete_user(db: AsyncSession, user_id: int):\n    user = await get_user(db, user_id)\n    user.soft_delete()           # is_deleted = True, deleted_at set\n    await db.commit()\n\n# Faqat faollarni olish | Get only active records\nasync def get_active_users(db: AsyncSession):\n    result = await db.execute(\n        select(User).where(User.is_deleted == False)\n    )\n    return result.scalars().all()\n</code></pre>\n<hr />\n<h2 id=\"q54-what-is-expire_on_commit-in-sqlalchemy-sqlalchemyda-expire_on_commit-nima\">Q54. What is <code>expire_on_commit</code> in SQLAlchemy? | SQLAlchemy'da <code>expire_on_commit</code> nima?</h2>\n<p><strong>EN:</strong> By default, after <code>commit()</code>, all ORM objects expire (attributes become lazy-loaded on next access). Set <code>expire_on_commit=False</code> in async contexts to avoid <code>MissingGreenlet</code> errors.</p>\n<p><strong>UZ:</strong> Standart bo'yicha, <code>commit()</code> dan keyin barcha ORM ob'ektlari expire bo'ladi (atributlar keyingi kirishda lazy-load bo'ladi). Async kontekstlarda <code>MissingGreenlet</code> xatolarini oldini olish uchun <code>expire_on_commit=False</code> o'rnating.</p>\n<pre><code class=\"language-python\"># ❌ Muammo | Problem\nAsyncSessionLocal = async_sessionmaker(engine)  # expire_on_commit=True (default)\n\nasync def create_user(db: AsyncSession, name: str):\n    user = User(name=name)\n    db.add(user)\n    await db.commit()\n    print(user.name)  # ← MissingGreenlet xatosi! | Error in async!\n                      # Chunki commit dan keyin expire bo'ldi | Expired after commit\n\n# ✅ Yechim | Solution\nAsyncSessionLocal = async_sessionmaker(\n    engine,\n    expire_on_commit=False  # ← Async uchun muhim! | Important for async!\n)\n\nasync def create_user(db: AsyncSession, name: str):\n    user = User(name=name)\n    db.add(user)\n    await db.commit()\n    await db.refresh(user)  # ID va boshqa DB generatsiya qilingan qiymatlarni olish | Get DB-generated values\n    print(user.name)        # ✅ Ishlaydi | Works\n    return user\n</code></pre>\n<hr />\n<h2 id=\"q55-how-to-implement-full-text-search-with-sqlalchemy-sqlalchemy-bilan-toliq-matn-qidiruvini-qanday-amalga-oshirish-kerak\">Q55. How to implement full-text search with SQLAlchemy? | SQLAlchemy bilan to'liq matn qidiruvini qanday amalga oshirish kerak?</h2>\n<p><strong>EN:</strong> Use PostgreSQL's <code>tsvector</code> and <code>tsquery</code> via SQLAlchemy for full-text search. Or use <code>ILIKE</code> for simple case-insensitive search.</p>\n<p><strong>UZ:</strong> To'liq matn qidiruvi uchun SQLAlchemy orqali PostgreSQL'ning <code>tsvector</code> va <code>tsquery</code> ishlatiladi. Yoki oddiy katta-kichik harfga sezgir bo'lmagan qidirish uchun <code>ILIKE</code>.</p>\n<pre><code class=\"language-python\">from sqlalchemy import select, func, cast\nfrom sqlalchemy.dialects.postgresql import TSVECTOR\n\n# Oddiy qidirish | Simple search with ILIKE\nasync def search_users_simple(db: AsyncSession, query: str):\n    pattern = f&quot;%{query}%&quot;\n    result = await db.execute(\n        select(User).where(\n            or_(\n                User.name.ilike(pattern),\n                User.email.ilike(pattern)\n            )\n        )\n    )\n    return result.scalars().all()\n\n# PostgreSQL Full-text search\nasync def search_products_fts(db: AsyncSession, query: str):\n    result = await db.execute(\n        select(Product).where(\n            func.to_tsvector(&quot;english&quot;, Product.name + &quot; &quot; + Product.description)\n            .op(&quot;@@&quot;)(func.plainto_tsquery(&quot;english&quot;, query))\n        ).order_by(\n            func.ts_rank(\n                func.to_tsvector(&quot;english&quot;, Product.name),\n                func.plainto_tsquery(&quot;english&quot;, query)\n            ).desc()\n        )\n    )\n    return result.scalars().all()\n</code></pre>\n<hr />\n<h1 id=\"alembic-q56q65\">🟡 ALEMBIC (Q56–Q65)</h1>\n<hr />\n<h2 id=\"q56-what-is-alembic-alembic-nima\">Q56. What is Alembic? | Alembic nima?</h2>\n<p><strong>EN:</strong> Alembic is a database migration tool for SQLAlchemy. It tracks schema changes over time using migration scripts, similar to how Git tracks code changes.</p>\n<p><strong>UZ:</strong> Alembic — SQLAlchemy uchun ma'lumotlar bazasi migratsiya vositasi. Migratsiya skriptlari yordamida schema o'zgarishlarini vaqt bo'yicha kuzatadi — Git kod o'zgarishlarini kuzatganiga o'xshash.</p>\n<pre><code class=\"language-bash\"># O'rnatish | Install\npip install alembic\n\n# Alembic boshlash | Initialize Alembic\nalembic init alembic\n\n# Bu tuzilmani yaratadi | Creates this structure:\n# alembic/\n#   env.py          ← Konfiguratsiya | Configuration\n#   script.py.mako  ← Migratsiya shabloni | Migration template\n#   versions/       ← Migratsiya fayllar | Migration files\n# alembic.ini       ← Asosiy konfiguratsiya | Main config\n</code></pre>\n<hr />\n<h2 id=\"q57-how-to-configure-alembic-for-async-sqlalchemy-alembicni-async-sqlalchemy-uchun-qanday-sozlash-kerak\">Q57. How to configure Alembic for async SQLAlchemy? | Alembic'ni async SQLAlchemy uchun qanday sozlash kerak?</h2>\n<p><strong>EN:</strong> Async SQLAlchemy requires special Alembic configuration to run migrations asynchronously.</p>\n<p><strong>UZ:</strong> Async SQLAlchemy migratsiyalarni asinxron bajarish uchun maxsus Alembic konfiguratsiyasini talab qiladi.</p>\n<pre><code class=\"language-python\"># alembic/env.py — Async versiya | Async version\n\nimport asyncio\nfrom logging.config import fileConfig\nfrom sqlalchemy.ext.asyncio import create_async_engine\nfrom alembic import context\nfrom app.database import Base\nfrom app.models import *   # Barcha modellarni import qiling | Import all models!\n\nconfig = context.config\nfileConfig(config.config_file_name)\ntarget_metadata = Base.metadata\n\ndef get_url():\n    from app.config import get_settings\n    return get_settings().DATABASE_URL\n\nasync def run_migrations_online():\n    connectable = create_async_engine(get_url())\n    async with connectable.connect() as connection:\n        await connection.run_sync(do_run_migrations)\n    await connectable.dispose()\n\ndef do_run_migrations(connection):\n    context.configure(\n        connection=connection,\n        target_metadata=target_metadata,\n        compare_type=True,       # Ustun turlarini solishtirish | Compare column types\n        compare_server_default=True,\n    )\n    with context.begin_transaction():\n        context.run_migrations()\n\ndef run_migrations_offline():\n    context.configure(\n        url=get_url(),\n        target_metadata=target_metadata,\n        literal_binds=True,\n        dialect_opts={&quot;paramstyle&quot;: &quot;named&quot;},\n    )\n    with context.begin_transaction():\n        context.run_migrations()\n\nif context.is_offline_mode():\n    run_migrations_offline()\nelse:\n    asyncio.run(run_migrations_online())\n</code></pre>\n<hr />\n<h2 id=\"q58-how-to-create-and-apply-alembic-migrations-alembic-migratsiyalarini-qanday-yaratish-va-qollash-kerak\">Q58. How to create and apply Alembic migrations? | Alembic migratsiyalarini qanday yaratish va qo'llash kerak?</h2>\n<p><strong>EN:</strong> Use <code>alembic revision</code> to create migration scripts and <code>alembic upgrade</code> to apply them.</p>\n<p><strong>UZ:</strong> Migratsiya skriptlarini yaratish uchun <code>alembic revision</code>, ularni qo'llash uchun <code>alembic upgrade</code> ishlatiladi.</p>\n<pre><code class=\"language-bash\"># 1. Avtomatik migratsiya yaratish (model o'zgarishiga asoslanib)\n# Auto-generate migration (based on model changes)\nalembic revision --autogenerate -m &quot;Add users table&quot;\n\n# 2. Qo'lda migratsiya yaratish | Manual migration\nalembic revision -m &quot;Add custom function&quot;\n\n# 3. Migratsiyalarni qo'llash | Apply migrations\nalembic upgrade head        # Eng oxirigacha | To latest\nalembic upgrade +1          # Bir qadam oldinga | One step forward\nalembic upgrade abc123def   # Aniq versiyagacha | To specific version\n\n# 4. Orqaga qaytarish | Rollback\nalembic downgrade -1        # Bir qadam orqaga | One step back\nalembic downgrade base      # Hammasini bekor qilish | Undo all\n\n# 5. Holat tekshirish | Check status\nalembic current             # Hozirgi versiya | Current version\nalembic history --verbose   # Barcha migratsiyalar | All migrations\nalembic heads               # Oxirgi versiyalar | Latest versions\n\n# 6. SQL skript yaratish (execute qilmasdan) | Generate SQL without executing\nalembic upgrade head --sql &gt; migration.sql\n</code></pre>\n<hr />\n<h2 id=\"q59-what-does-a-migration-file-look-like-migratsiya-fayli-qanday-korinadi\">Q59. What does a migration file look like? | Migratsiya fayli qanday ko'rinadi?</h2>\n<p><strong>EN:</strong> Each migration file has <code>upgrade()</code> and <code>downgrade()</code> functions. <code>upgrade()</code> applies changes, <code>downgrade()</code> reverts them.</p>\n<p><strong>UZ:</strong> Har bir migratsiya fayli <code>upgrade()</code> va <code>downgrade()</code> funksiyalariga ega. <code>upgrade()</code> o'zgarishlarni qo'llaydi, <code>downgrade()</code> ularni bekor qiladi.</p>\n<pre><code class=\"language-python\"># alembic/versions/a1b2c3d4_add_users_table.py\n\n&quot;&quot;&quot;Add users table\n\nRevision ID: a1b2c3d4e5f6\nRevises: None\nCreate Date: 2024-01-15 10:30:00.000000\n&quot;&quot;&quot;\nfrom alembic import op\nimport sqlalchemy as sa\n\nrevision = 'a1b2c3d4e5f6'\ndown_revision = None    # Oldingi migratsiya | Previous migration\nbranch_labels = None\ndepends_on = None\n\ndef upgrade() -&gt; None:\n    # Jadval yaratish | Create table\n    op.create_table(\n        &quot;users&quot;,\n        sa.Column(&quot;id&quot;, sa.Integer(), primary_key=True, nullable=False),\n        sa.Column(&quot;name&quot;, sa.String(100), nullable=False),\n        sa.Column(&quot;email&quot;, sa.String(255), nullable=False),\n        sa.Column(&quot;is_active&quot;, sa.Boolean(), default=True, nullable=False),\n        sa.Column(&quot;created_at&quot;, sa.DateTime(), nullable=False),\n    )\n    op.create_index(&quot;ix_users_email&quot;, &quot;users&quot;, [&quot;email&quot;], unique=True)\n\ndef downgrade() -&gt; None:\n    # Bekor qilish | Revert\n    op.drop_index(&quot;ix_users_email&quot;, table_name=&quot;users&quot;)\n    op.drop_table(&quot;users&quot;)\n</code></pre>\n<pre><code class=\"language-python\"># Ustun qo'shish migratsiyasi | Add column migration\n&quot;&quot;&quot;Add bio to users\n\nRevision ID: b2c3d4e5f6a1\nRevises: a1b2c3d4e5f6\n&quot;&quot;&quot;\nfrom alembic import op\nimport sqlalchemy as sa\n\ndef upgrade() -&gt; None:\n    op.add_column(&quot;users&quot;, sa.Column(&quot;bio&quot;, sa.Text(), nullable=True))\n    op.add_column(&quot;users&quot;, sa.Column(&quot;avatar_url&quot;, sa.String(500), nullable=True))\n\ndef downgrade() -&gt; None:\n    op.drop_column(&quot;users&quot;, &quot;bio&quot;)\n    op.drop_column(&quot;users&quot;, &quot;avatar_url&quot;)\n</code></pre>\n<hr />\n<h2 id=\"q60-how-to-handle-data-migrations-in-alembic-alembicda-malumot-migratsiyalarini-qanday-boshqarish-kerak\">Q60. How to handle data migrations in Alembic? | Alembic'da ma'lumot migratsiyalarini qanday boshqarish kerak?</h2>\n<p><strong>EN:</strong> Data migrations modify existing data (not schema). Use <code>op.get_bind()</code> or <code>op.execute()</code> inside migration files.</p>\n<p><strong>UZ:</strong> Ma'lumot migratsiyalari mavjud ma'lumotlarni o'zgartiradi (sxema emas). Migratsiya fayllarida <code>op.get_bind()</code> yoki <code>op.execute()</code> ishlatiladi.</p>\n<pre><code class=\"language-python\"># Ma'lumot migratsiyasi | Data migration\n\nfrom alembic import op\nimport sqlalchemy as sa\nfrom sqlalchemy.sql import table, column\n\ndef upgrade() -&gt; None:\n    # 1. Yangi ustun qo'shish | Add new column\n    op.add_column(&quot;users&quot;, sa.Column(&quot;full_name&quot;, sa.String(200), nullable=True))\n\n    # 2. Mavjud ma'lumotlarni o'zgartirish | Modify existing data\n    users_table = table(\n        &quot;users&quot;,\n        column(&quot;id&quot;, sa.Integer),\n        column(&quot;first_name&quot;, sa.String),\n        column(&quot;last_name&quot;, sa.String),\n        column(&quot;full_name&quot;, sa.String),\n    )\n    conn = op.get_bind()\n    users = conn.execute(sa.select(users_table)).fetchall()\n\n    for user in users:\n        conn.execute(\n            users_table.update()\n            .where(users_table.c.id == user.id)\n            .values(full_name=f&quot;{user.first_name} {user.last_name}&quot;)\n        )\n\n    # 3. NOT NULL qilish | Make NOT NULL\n    op.alter_column(&quot;users&quot;, &quot;full_name&quot;, nullable=False)\n\ndef downgrade() -&gt; None:\n    op.drop_column(&quot;users&quot;, &quot;full_name&quot;)\n</code></pre>\n<hr />\n<h2 id=\"q61-how-to-handle-alembic-migrations-in-production-productionda-alembic-migratsiyalarini-qanday-boshqarish-kerak\">Q61. How to handle Alembic migrations in production? | Production'da Alembic migratsiyalarini qanday boshqarish kerak?</h2>\n<p><strong>EN:</strong> Run migrations as part of your CI/CD pipeline or at application startup. Always backup before migrating in production.</p>\n<p><strong>UZ:</strong> Migratsiyalarni CI/CD pipeline yoki ilova ishga tushganda bajaring. Production'da migratsiyadan oldin doim zaxira nusxa oling.</p>\n<pre><code class=\"language-python\"># main.py — Startup'da migratsiya | Migration on startup\nfrom fastapi import FastAPI\nfrom alembic.config import Config\nfrom alembic import command\nimport asyncio\n\nasync def run_migrations():\n    alembic_cfg = Config(&quot;alembic.ini&quot;)\n    await asyncio.to_thread(command.upgrade, alembic_cfg, &quot;head&quot;)\n\n@asynccontextmanager\nasync def lifespan(app: FastAPI):\n    # EN: Run migrations before accepting requests\n    # UZ: So'rovlarni qabul qilishdan oldin migratsiyalarni bajaring\n    await run_migrations()\n    yield\n\napp = FastAPI(lifespan=lifespan)\n</code></pre>\n<pre><code class=\"language-bash\"># CI/CD pipeline (GitHub Actions / GitLab CI)\n# .github/workflows/deploy.yml\n\ndeploy:\n  steps:\n    - name: Run migrations\n      run: |\n        # Backup first | Avval zaxira\n        pg_dump $DATABASE_URL &gt; backup_$(date +%Y%m%d).sql\n        # Migrate\n        alembic upgrade head\n    - name: Deploy app\n      run: docker compose up -d\n</code></pre>\n<hr />\n<h2 id=\"q62-what-is-alembic-autogenerate-and-its-limitations-alembic-autogenerate-va-uning-cheklovlari-nima\">Q62. What is Alembic <code>--autogenerate</code> and its limitations? | Alembic <code>--autogenerate</code> va uning cheklovlari nima?</h2>\n<p><strong>EN:</strong> <code>--autogenerate</code> compares your SQLAlchemy models with the current DB schema and generates migration scripts. But it has limitations — it can't detect everything.</p>\n<p><strong>UZ:</strong> <code>--autogenerate</code> — SQLAlchemy modellaringizni joriy DB sxemasi bilan solishtirib, migratsiya skriptlarini avtomatik yaratadi. Lekin u hamma narsani aniqlay olmaydi.</p>\n<pre><code class=\"language-python\"># ✅ Autogenerate aniqlaydi | Autogenerate detects:\n# - Jadval qo'shish/o'chirish | Add/remove tables\n# - Ustun qo'shish/o'chirish | Add/remove columns\n# - Ustun turi o'zgarishi | Column type changes\n# - Nullable o'zgarishi | Nullable changes\n# - Unique constraint o'zgarishi | Unique constraint changes\n# - Indeks o'zgarishi | Index changes\n\n# ❌ Autogenerate aniqlamaydi | Autogenerate does NOT detect:\n# - Stored procedures va functions\n# - Views | Ko'rinishlar\n# - Trigger'lar\n# - Sequences (ba'zan | sometimes)\n# - CHECK constraints (bazi DB lar uchun | for some DBs)\n\n# Shuning uchun har doim ko'rib chiqing! | Always review generated migrations!\nalembic revision --autogenerate -m &quot;my change&quot;\n# Yaratilgan faylni tekshiring! | Check the generated file!\ncat alembic/versions/xxxxx_my_change.py\n</code></pre>\n<hr />\n<h2 id=\"q63-how-to-work-with-multiple-databases-in-alembic-alembicda-bir-nechta-malumotlar-bazalari-bilan-qanday-ishlash-kerak\">Q63. How to work with multiple databases in Alembic? | Alembic'da bir nechta ma'lumotlar bazalari bilan qanday ishlash kerak?</h2>\n<p><strong>EN:</strong> Use Alembic's multi-database feature with separate version directories for each database.</p>\n<p><strong>UZ:</strong> Har bir ma'lumotlar bazasi uchun alohida versiya kataloglari bilan Alembic'ning ko'p ma'lumotlar bazasi xususiyatidan foydalaning.</p>\n<pre><code class=\"language-python\"># alembic.ini\n# [alembic]\n# script_location = alembic\n# version_locations = %(here)s/alembic/versions_db1 %(here)s/alembic/versions_db2\n\n# env.py — Multi-DB konfiguratsiya\nfrom alembic import context\n\ndb_configs = {\n    &quot;db1&quot;: &quot;postgresql+asyncpg://user:pass@host1/db1&quot;,\n    &quot;db2&quot;: &quot;postgresql+asyncpg://user:pass@host2/db2&quot;,\n}\n\ndef run_migrations_for(db_name: str):\n    engine = create_async_engine(db_configs[db_name])\n    # ...\n\n# Alohida migratsiya yaratish | Create separate migration\nalembic revision --autogenerate -m &quot;Add users&quot; --version-path alembic/versions_db1\n</code></pre>\n<hr />\n<h2 id=\"q64-what-is-alembic-branch-and-how-to-merge-branches-alembic-branch-nima-va-ularni-qanday-birlashtirish-kerak\">Q64. What is Alembic <code>branch</code> and how to merge branches? | Alembic <code>branch</code> nima va ularni qanday birlashtirish kerak?</h2>\n<p><strong>EN:</strong> Alembic supports branching like Git — parallel migration paths. Use <code>alembic merge</code> to combine branches.</p>\n<p><strong>UZ:</strong> Alembic Git kabi branchlashni qo'llab-quvvatlaydi — parallel migratsiya yo'llari. Branchlarni birlashtirish uchun <code>alembic merge</code> ishlatiladi.</p>\n<pre><code class=\"language-bash\"># Branch holati | Branch situation\nalembic history --verbose\n# a1b2c3 (head) ← Branch 1: add users table\n# d4e5f6 (head) ← Branch 2: add products table\n# g7h8i9          ← Umumiy asos | Common base\n\n# Branchlarni birlashtirish | Merge branches\nalembic merge -m &quot;Merge users and products&quot; a1b2c3 d4e5f6\n\n# Yangi migratsiya fayli | New migration file created:\n# Revision ID: j0k1l2\n# Revises: a1b2c3, d4e5f6  (ikkala asos | both parents)\n# down_revision = ('a1b2c3', 'd4e5f6')\n\nalembic upgrade head\n</code></pre>\n<hr />\n<h2 id=\"q65-how-to-stamp-alembic-version-without-running-migrations-migratsiyalarni-bajarmasdan-alembic-versiyasini-qanday-belgilash-kerak\">Q65. How to stamp Alembic version without running migrations? | Migratsiyalarni bajarmasdan Alembic versiyasini qanday belgilash kerak?</h2>\n<p><strong>EN:</strong> <code>alembic stamp</code> marks the DB at a specific revision without actually running migrations — useful when the DB already has the correct schema.</p>\n<p><strong>UZ:</strong> <code>alembic stamp</code> — migratsiyalarni haqiqatda bajarmasdan DB ni ma'lum versiyada belgilaydi — DB allaqachon to'g'ri sxemaga ega bo'lganda foydali.</p>\n<pre><code class=\"language-bash\"># Mavjud DB uchun | For existing database (already has correct schema)\nalembic stamp head        # Eng oxirgi versiyada belgilash | Mark at latest\nalembic stamp a1b2c3d4   # Aniq versiyada | At specific revision\nalembic stamp base        # Boshlang'ich holatga qaytarish | Reset to base\n\n# Amaliy holat | Practical scenario:\n# 1. Yangi muhitga ko'chirish | Moving to new environment\n# 2. Dastlab schema to'g'ri | Schema already correct initially\n# 3. Alembic tarixini boshlash | Start Alembic history\nalembic stamp head\n# Endi oddiy migratsiyalar ishlaydi | Now regular migrations work\n</code></pre>\n<hr />\n<h1 id=\"async-performance-q66q75\">⚡ ASYNC &amp; PERFORMANCE (Q66–Q75)</h1>\n<hr />\n<h2 id=\"q66-how-does-pythons-asyncio-event-loop-work-python-asyncio-event-loop-qanday-ishlaydi\">Q66. How does Python's asyncio event loop work? | Python asyncio event loop qanday ishlaydi?</h2>\n<p><strong>EN:</strong> The event loop runs coroutines cooperatively. When a coroutine hits <code>await</code>, it yields control to the loop, which runs other coroutines until the awaited operation completes.</p>\n<p><strong>UZ:</strong> Event loop koroutinlarni kooperativ tarzda bajaradi. Koroutin <code>await</code> ga yetganda, boshqaruvni loop'ga beradi, loop kutilayotgan operatsiya tugamaguncha boshqa koroutinlarni bajaradi.</p>\n<pre><code class=\"language-python\">import asyncio\nimport time\n\n# Sinxron | Sync — ketma-ket, 3 soniya | Sequential, 3 seconds\ndef sync_main():\n    time.sleep(1)\n    time.sleep(1)\n    time.sleep(1)\n    print(&quot;Done in 3 seconds&quot;)\n\n# Asinxron | Async — parallel, ~1 soniya | Concurrent, ~1 second\nasync def fetch_data(name: str, delay: float):\n    print(f&quot;{name} boshlandi | started&quot;)\n    await asyncio.sleep(delay)   # ← Boshqaruvni beradi | Yields control\n    print(f&quot;{name} tugadi | finished&quot;)\n    return f&quot;{name} result&quot;\n\nasync def async_main():\n    start = time.time()\n    # Parallel bajarish | Run concurrently\n    results = await asyncio.gather(\n        fetch_data(&quot;Task1&quot;, 1.0),\n        fetch_data(&quot;Task2&quot;, 1.0),\n        fetch_data(&quot;Task3&quot;, 1.0),\n    )\n    print(f&quot;Done in {time.time()-start:.2f}s&quot;)  # ~1.00s\n    return results\n\nasyncio.run(async_main())\n\n# FastAPI event loop | FastAPI's event loop managed by Uvicorn\n# Bir eventloop'da yuzlab parallel so'rovlar | Hundreds of concurrent requests per event loop\n</code></pre>\n<hr />\n<h2 id=\"q67-what-is-asynciogather-vs-asynciowait-asynciogather-va-asynciowait-farqi-nima\">Q67. What is <code>asyncio.gather()</code> vs <code>asyncio.wait()</code>? | <code>asyncio.gather()</code> va <code>asyncio.wait()</code> farqi nima?</h2>\n<p><strong>EN:</strong> <code>gather()</code> runs coroutines concurrently and returns results in order. <code>wait()</code> gives more control (returns done/pending sets). Use <code>gather()</code> most of the time.</p>\n<p><strong>UZ:</strong> <code>gather()</code> — koroutinlarni parallel bajarib, natijalarni tartib bo'yicha qaytaradi. <code>wait()</code> ko'proq nazorat beradi (done/pending to'plamlarini qaytaradi). Ko'p hollarda <code>gather()</code> ishlatiladi.</p>\n<pre><code class=\"language-python\">import asyncio\n\nasync def task(n: int) -&gt; int:\n    await asyncio.sleep(n * 0.1)\n    return n * 2\n\n# asyncio.gather — natijalar kiritish tartibida | Results in input order\nasync def use_gather():\n    results = await asyncio.gather(task(1), task(2), task(3))\n    print(results)  # [2, 4, 6] ← Tartib kafolatlangan | Order guaranteed\n\n    # Xato boshqarish | Error handling\n    results = await asyncio.gather(\n        task(1), failing_task(), task(3),\n        return_exceptions=True  # Xato ham qaytariladi | Errors returned too\n    )\n\n# asyncio.wait — ko'proq nazorat | More control\nasync def use_wait():\n    tasks = [asyncio.create_task(task(n)) for n in range(5)]\n    done, pending = await asyncio.wait(tasks, timeout=0.5)\n    print(f&quot;Done: {len(done)}, Pending: {len(pending)}&quot;)\n    # Pending tasklarni bekor qilish | Cancel pending\n    for t in pending:\n        t.cancel()\n\n# FastAPI'da amaliy ishlatish | Practical usage in FastAPI\n@app.get(&quot;/dashboard/{user_id}&quot;)\nasync def dashboard(user_id: int, db: AsyncSession = Depends(get_db)):\n    # Parallel DB so'rovlar | Parallel DB queries\n    user, orders, notifications = await asyncio.gather(\n        get_user(db, user_id),\n        get_user_orders(db, user_id),\n        get_notifications(db, user_id)\n    )\n    return {&quot;user&quot;: user, &quot;orders&quot;: orders, &quot;notifications&quot;: notifications}\n</code></pre>\n<hr />\n<h2 id=\"q68-what-is-connection-pooling-connection-pooling-nima\">Q68. What is Connection Pooling? | Connection Pooling nima?</h2>\n<p><strong>EN:</strong> Connection pooling maintains a pool of reusable DB connections instead of creating new ones for each request. Critical for performance.</p>\n<p><strong>UZ:</strong> Connection pooling — har bir so'rov uchun yangi ulanish yaratish o'rniga qayta ishlatilishi mumkin bo'lgan DB ulanishlar hovuzini saqlaydi. Unumdorlik uchun muhim.</p>\n<pre><code class=\"language-python\">from sqlalchemy.ext.asyncio import create_async_engine\n\nengine = create_async_engine(\n    &quot;postgresql+asyncpg://user:pass@localhost/db&quot;,\n\n    # Pool sozlamalari | Pool settings\n    pool_size=10,        # Doimiy ulanishlar soni | Permanent connections\n    max_overflow=20,     # Qo'shimcha ulanishlar | Additional connections under load\n    pool_timeout=30,     # Ulanish kutish vaqti (s) | Wait for connection (s)\n    pool_recycle=3600,   # Ulanishni yangilash (s) | Recycle connection (s)\n    pool_pre_ping=True,  # Eskirgan ulanishni tekshirish | Check stale connections\n\n    # Debug uchun | For debugging\n    echo=False,          # SQL loglarini ko'rsatish | Show SQL logs\n    echo_pool=False,     # Pool loglarini ko'rsatish | Show pool logs\n)\n\n# Pool statistikasi | Pool statistics\nprint(engine.pool.status())\n# Pool size: 10  Connections in pool: 8  Current overflow: 2  Current checked out: 5\n</code></pre>\n<hr />\n<h2 id=\"q69-how-to-handle-long-running-tasks-in-fastapi-fastapida-uzoq-davom-etadigan-tasklarni-qanday-boshqarish-kerak\">Q69. How to handle long-running tasks in FastAPI? | FastAPI'da uzoq davom etadigan tasklarni qanday boshqarish kerak?</h2>\n<p><strong>EN:</strong> For tasks longer than a few seconds: use Celery + Redis/RabbitMQ for background processing. Return a task ID immediately and let clients poll for status.</p>\n<p><strong>UZ:</strong> Bir necha soniyadan ko'p davom etadigan tasklar uchun: background processing uchun Celery + Redis/RabbitMQ ishlatiladi. Darhol task ID qaytarilib, clientlar status uchun polling qiladi.</p>\n<pre><code class=\"language-python\"># celery_app.py\nfrom celery import Celery\n\ncelery = Celery(\n    &quot;tasks&quot;,\n    broker=&quot;redis://localhost:6379/0&quot;,\n    backend=&quot;redis://localhost:6379/1&quot;\n)\n\n@celery.task(bind=True)\ndef process_report(self, user_id: int, date_range: dict):\n    try:\n        self.update_state(state=&quot;PROGRESS&quot;, meta={&quot;progress&quot;: 0})\n        # ... og'ir hisob-kitob | heavy computation\n        self.update_state(state=&quot;PROGRESS&quot;, meta={&quot;progress&quot;: 50})\n        # ... davom etadi | continues\n        return {&quot;report_url&quot;: &quot;/reports/output.xlsx&quot;}\n    except Exception as exc:\n        raise self.retry(exc=exc, max_retries=3)\n\n# FastAPI endpoint\n@app.post(&quot;/reports/&quot;)\nasync def create_report(user_id: int):\n    task = process_report.delay(user_id, {&quot;start&quot;: &quot;2024-01&quot;, &quot;end&quot;: &quot;2024-12&quot;})\n    return {&quot;task_id&quot;: task.id, &quot;status&quot;: &quot;queued&quot;}\n\n@app.get(&quot;/reports/{task_id}/status&quot;)\nasync def get_report_status(task_id: str):\n    task = process_report.AsyncResult(task_id)\n    return {\n        &quot;task_id&quot;: task_id,\n        &quot;status&quot;: task.status,    # PENDING, PROGRESS, SUCCESS, FAILURE\n        &quot;result&quot;: task.result if task.successful() else None,\n        &quot;meta&quot;: task.info\n    }\n</code></pre>\n<hr />\n<h2 id=\"q70-how-to-optimize-fastapi-performance-fastapi-unumdorligini-qanday-optimallashtirish-mumkin\">Q70. How to optimize FastAPI performance? | FastAPI unumdorligini qanday optimallashtirish mumkin?</h2>\n<p><strong>EN:</strong> Key optimizations: async I/O, connection pooling, caching, avoiding N+1, proper indexing, compression.</p>\n<p><strong>UZ:</strong> Asosiy optimallashtirishlar: async I/O, connection pooling, caching, N+1 ni oldini olish, to'g'ri indekslash, siqish.</p>\n<pre><code class=\"language-python\"># 1. GZip siqish | GZip compression\nfrom fastapi.middleware.gzip import GZipMiddleware\napp.add_middleware(GZipMiddleware, minimum_size=1000)\n\n# 2. Response caching\nfrom fastapi_cache.decorator import cache\n@app.get(&quot;/products/&quot;)\n@cache(expire=300)  # 5 daqiqa | 5 minutes\nasync def list_products(): ...\n\n# 3. Database query optimizatsiyasi | DB query optimization\n# ❌ N+1\nusers = await get_all_users(db)\nfor u in users:\n    orders = await get_orders(db, u.id)  # N ta so'rov | N queries\n\n# ✅ Eager loading\nusers = await db.execute(\n    select(User).options(selectinload(User.orders))\n)\n\n# 4. Background tasks uchun Celery\n# 5. Redis caching\n# 6. Nginx reverse proxy + load balancing\n# 7. Uvicorn workers soni | Number of Uvicorn workers\n# gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app\n# workers = 2 * CPU_cores + 1\n\n# 8. Response model — keraksiz maydonlarni chiqarish | Exclude unnecessary fields\n@app.get(&quot;/users/&quot;, response_model=UserPublic)  # Password yashiriladi | Password hidden\nasync def list_users(): ...\n\n# 9. Pagination — barcha yozuvlarni qaytarmaslik | Don't return all records\n@app.get(&quot;/items/&quot;)\nasync def list_items(skip: int = 0, limit: int = 20): ...\n</code></pre>\n<hr />\n<h2 id=\"q71-what-is-anyio-and-how-does-fastapi-use-it-anyio-nima-va-fastapi-uni-qanday-ishlatadi\">Q71. What is <code>anyio</code> and how does FastAPI use it? | <code>anyio</code>
