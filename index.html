python\"># setup.py — build uchun\nfrom setuptools import setup, Extension\n\next = Extension(\n    'mymodule',\n    sources=['mymodule.c'],\n)\n\nsetup(\n    name='mymodule',\n    ext_modules=[ext],\n)\n\n# Qurilish / Build:\n# python setup.py build_ext --inplace\n\n# Ishlatish / Usage:\n# import mymodule\n# result = mymodule.fast_sum([1, 2, 3, 4, 5])\n# print(result)  # 15\n\n# Muqobil: Cython / Alternative: Cython\n# pip install cython\n# .pyx fayl yozib, ko'proq Python-like sintaksis bilan C darajasidagi tezlik\n</code></pre>\n<hr />\n<h2 id=\"88-pythonda-__class__-va-runtime-tip-manipulyatsiya-runtime-type-manipulation\">88. Python'da <code>__class__</code> va runtime tip manipulyatsiya / Runtime type manipulation</h2>\n<p><strong>EN:</strong> Python allows dynamic class creation, modification, and introspection at runtime.</p>\n<p><strong>UZB:</strong> Python ish vaqtida dinamik klass yaratish, o'zgartirish va introspeksiyaga imkon beradi.</p>\n<pre><code class=\"language-python\"># Dinamik klass yaratish / Dynamic class creation\ndef create_model(name: str, fields: dict):\n    &quot;&quot;&quot;SQLAlchemy-like model factory&quot;&quot;&quot;\n\n    def __init__(self, **kwargs):\n        for field_name, field_type in fields.items():\n            value = kwargs.get(field_name)\n            if value is not None and not isinstance(value, field_type):\n                raise TypeError(f&quot;{field_name} {field_type.__name__} bo'lishi kerak&quot;)\n            setattr(self, field_name, value)\n\n    def __repr__(self):\n        attrs = &quot;, &quot;.join(f&quot;{k}={getattr(self, k)!r}&quot; for k in fields)\n        return f&quot;{name}({attrs})&quot;\n\n    def to_dict(self):\n        return {k: getattr(self, k) for k in fields}\n\n    return type(name, (object,), {\n        '__init__': __init__,\n        '__repr__': __repr__,\n        'to_dict': to_dict,\n        '_fields': fields\n    })\n\nUser = create_model(&quot;User&quot;, {&quot;name&quot;: str, &quot;age&quot;: int, &quot;email&quot;: str})\nProduct = create_model(&quot;Product&quot;, {&quot;title&quot;: str, &quot;price&quot;: float})\n\nuser = User(name=&quot;Ali&quot;, age=25, email=&quot;ali@example.com&quot;)\nprint(user)  # User(name='Ali', age=25, email='ali@example.com')\nprint(user.to_dict())\n\nproduct = Product(title=&quot;Laptop&quot;, price=1500.0)\nprint(product)\n\n# Klassni o'zgartirish / Modifying class at runtime\ndef add_method(cls, name, func):\n    setattr(cls, name, func)\n\nadd_method(User, 'greet', lambda self: f&quot;Salom, {self.name}!&quot;)\nprint(user.greet())  # Salom, Ali!\n\n# __class__ almashtirish (ehtiyotkorlik bilan!)\nclass OldAPI:\n    def process(self): return &quot;eski&quot;\n\nclass NewAPI:\n    def process(self): return &quot;yangi&quot;\n    def new_feature(self): return &quot;yangi funksiya&quot;\n\nobj = OldAPI()\nobj.__class__ = NewAPI  # O'zgartirish\nprint(obj.process())      # yangi\nprint(obj.new_feature())  # yangi funksiya\n</code></pre>\n<hr />\n<h2 id=\"89-pythonda-memory-mapped-files-memory-mapped-files\">89. Python'da <code>memory mapped files</code> / Memory-mapped files</h2>\n<p><strong>EN:</strong> Memory-mapped files allow treating file contents as if they're in memory, enabling fast random access.</p>\n<p><strong>UZB:</strong> Xotiraga aks ettirish fayllari fayl mazmunini xotiradagiday ko'rishga imkon beradi, tez tasodifiy kirishni ta'minlaydi.</p>\n<pre><code class=\"language-python\">import mmap\nimport struct\nimport os\nimport time\n\n# Yozish / Writing\nwith open(&quot;large_data.bin&quot;, &quot;wb&quot;) as f:\n    for i in range(100_000):\n        f.write(struct.pack('I', i))  # 4 bytes per int\n\n# Oddiy o'qish vs mmap o'qish tezligi\n# O'qish / Regular read\nstart = time.time()\nwith open(&quot;large_data.bin&quot;, &quot;rb&quot;) as f:\n    data = f.read()\nprint(f&quot;Oddiy o'qish: {time.time()-start:.4f}s&quot;)\n\n# mmap bilan o'qish\nstart = time.time()\nwith open(&quot;large_data.bin&quot;, &quot;r+b&quot;) as f:\n    mm = mmap.mmap(f.fileno(), 0)\n\n    # 50000-elementni o'qish / Read 50000th element\n    offset = 50000 * 4  # 4 bytes per int\n    mm.seek(offset)\n    value = struct.unpack('I', mm.read(4))[0]\n    print(f&quot;50000-element: {value}&quot;)  # 50000\n\n    # Qidirish / Search\n    mm.seek(0)\n    target = struct.pack('I', 42)\n    pos = mm.find(target)\n    print(f&quot;42 topilgan joy: {pos // 4}&quot;)  # 42\n\n    mm.close()\nprint(f&quot;mmap o'qish: {time.time()-start:.4f}s&quot;)\n\n# Matn fayli bilan / With text file\nwith open(&quot;text_data.txt&quot;, &quot;w&quot;) as f:\n    f.write(&quot;Hello, World!\\n&quot; * 10000)\n\nwith open(&quot;text_data.txt&quot;, &quot;r+b&quot;) as f:\n    mm = mmap.mmap(f.fileno(), 0)\n    print(mm.read(13))    # b'Hello, World!'\n    mm.seek(0)\n    count = 0\n    while mm.find(b&quot;Hello&quot;) != -1:\n        mm.seek(mm.find(b&quot;Hello&quot;) + 5)\n        count += 1\n    print(f&quot;'Hello' soni: {count}&quot;)\n    mm.close()\n\nos.remove(&quot;large_data.bin&quot;)\nos.remove(&quot;text_data.txt&quot;)\n</code></pre>\n<hr />\n<h2 id=\"90-pythonda-concurrentfutures-va-threadprocess-pool-thread-and-process-pools\">90. Python'da <code>concurrent.futures</code> va Thread/Process Pool / Thread and Process pools</h2>\n<p><strong>EN:</strong> <code>concurrent.futures</code> provides a high-level interface for async execution with thread and process pools.</p>\n<p><strong>UZB:</strong> <code>concurrent.futures</code> thread va jarayon havzalari bilan async bajarish uchun yuqori darajali interfeys taqdim etadi.</p>\n<pre><code class=\"language-python\">from concurrent.futures import (\n    ThreadPoolExecutor,\n    ProcessPoolExecutor,\n    as_completed,\n    wait,\n    FIRST_COMPLETED,\n    ALL_COMPLETED\n)\nimport time\nimport requests  # pip install requests\n\n# ThreadPoolExecutor — I/O bound\ndef download_page(url: str) -&gt; tuple:\n    start = time.time()\n    time.sleep(0.1)  # I/O simulation\n    return url, len(url), time.time() - start\n\nurls = [f&quot;https://example.com/page/{i}&quot; for i in range(20)]\n\nwith ThreadPoolExecutor(max_workers=10) as executor:\n    # map — ketma-ket natijalar / Sequential results\n    results = list(executor.map(download_page, urls))\n\n    # submit + as_completed — birinchi tayyor bo'lgan / As they complete\n    futures = {executor.submit(download_page, url): url for url in urls[:5]}\n\n    for future in as_completed(futures):\n        url = futures[future]\n        result = future.result()\n        print(f&quot;✅ {url}: {result[2]:.3f}s&quot;)\n\n# ProcessPoolExecutor — CPU bound\ndef prime_check(n: int) -&gt; tuple:\n    if n &lt; 2: return n, False\n    for i in range(2, int(n**0.5) + 1):\n        if n % i == 0:\n            return n, False\n    return n, True\n\nnumbers = range(1, 100)\n\nwith ProcessPoolExecutor(max_workers=4) as executor:\n    primes = [\n        n for n, is_prime in executor.map(prime_check, numbers)\n        if is_prime\n    ]\n    print(f&quot;Tub sonlar: {primes}&quot;)\n\n# wait bilan / With wait\nwith ThreadPoolExecutor(max_workers=5) as executor:\n    futures = [executor.submit(time.sleep, 0.1) for _ in range(5)]\n    done, not_done = wait(futures, return_when=ALL_COMPLETED)\n    print(f&quot;Tugagan: {len(done)}, Kutilmoqda: {len(not_done)}&quot;)\n</code></pre>\n<hr />\n<h2 id=\"91-pythonda-__subclasshook__-va-virtual-subclassing-virtual-subclasses\">91. Python'da <code>__subclasshook__</code> va virtual subclassing / Virtual subclasses</h2>\n<p><strong>EN:</strong> <code>__subclasshook__</code> enables ABCs to recognize classes as subclasses without inheritance.</p>\n<p><strong>UZB:</strong> <code>__subclasshook__</code> ABClarga meros olmagan klasslarni pastki klasslar sifatida tanishga imkon beradi.</p>\n<pre><code class=\"language-python\">from abc import ABC, abstractmethod\n\nclass Drawable(ABC):\n    @abstractmethod\n    def draw(self) -&gt; str: ...\n\n    @classmethod\n    def __subclasshook__(cls, C):\n        &quot;&quot;&quot;draw metodi bo'lgan har qanday klass Drawable deb hisoblanadi&quot;&quot;&quot;\n        if cls is Drawable:\n            if any(&quot;draw&quot; in B.__dict__ for B in C.__mro__):\n                return True\n        return NotImplemented\n\n# Bu klass Drawable ni inherit qilmadi!\nclass ThirdPartyWidget:\n    def draw(self) -&gt; str:\n        return &quot;Widget chizildi&quot;\n\nclass NoDrawWidget:\n    def render(self) -&gt; str:\n        return &quot;Render qilindi&quot;\n\nprint(isinstance(ThirdPartyWidget(), Drawable))   # True!\nprint(isinstance(NoDrawWidget(), Drawable))        # False\n\n# register — virtual subclass\nclass LegacyShape:\n    def draw(self):\n        return &quot;Eski shakl&quot;\n\nDrawable.register(LegacyShape)\nprint(issubclass(LegacyShape, Drawable))  # True\nprint(isinstance(LegacyShape(), Drawable)) # True\n\n# Amaliy: iterable tekshiruvi\nclass IterableChecker(ABC):\n    @classmethod\n    def __subclasshook__(cls, C):\n        if cls is IterableChecker:\n            if hasattr(C, '__iter__') or hasattr(C, '__getitem__'):\n                return True\n        return NotImplemented\n\nprint(isinstance([], IterableChecker))      # True\nprint(isinstance(&quot;hello&quot;, IterableChecker)) # True\nprint(isinstance(42, IterableChecker))      # False\n</code></pre>\n<hr />\n<h2 id=\"92-pythonda-proxy-naqshi-proxy-pattern-in-python\">92. Python'da <code>Proxy</code> naqshi / Proxy pattern in Python</h2>\n<p><strong>EN:</strong> Proxy objects intercept attribute access and method calls, useful for logging, caching, and access control.</p>\n<p><strong>UZB:</strong> Proksi ob'ektlar atributlarga kirish va metod chaqiruvlarini ushlab qoladi, logging, keshlash va kirishni boshqarish uchun foydali.</p>\n<pre><code class=\"language-python\">from typing import Any, Callable\nimport functools\nimport time\n\nclass LazyProxy:\n    &quot;&quot;&quot;Kechiktirilgan hisoblash / Lazy evaluation proxy&quot;&quot;&quot;\n    def __init__(self, factory: Callable):\n        object.__setattr__(self, '_factory', factory)\n        object.__setattr__(self, '_obj', None)\n        object.__setattr__(self, '_initialized', False)\n\n    def _ensure_initialized(self):\n        if not object.__getattribute__(self, '_initialized'):\n            factory = object.__getattribute__(self, '_factory')\n            object.__setattr__(self, '_obj', factory())\n            object.__setattr__(self, '_initialized', True)\n            print(&quot;✅ Ob'ekt yaratildi (kechiktirilgan)&quot;)\n\n    def __getattr__(self, name: str) -&gt; Any:\n        self._ensure_initialized()\n        obj = object.__getattribute__(self, '_obj')\n        return getattr(obj, name)\n\n    def __setattr__(self, name: str, value: Any):\n        self._ensure_initialized()\n        obj = object.__getattribute__(self, '_obj')\n        setattr(obj, name, value)\n\nclass ExpensiveService:\n    def __init__(self):\n        print(&quot;💫 ExpensiveService yaratilmoqda (sekin)...&quot;)\n        time.sleep(0.1)  # Sekin initializatsiya\n        self.data = &quot;qimmat ma'lumot&quot;\n\n    def process(self):\n        return f&quot;Qayta ishlandi: {self.data}&quot;\n\n# Hozir yaratilmaydi / Not created yet\nservice = LazyProxy(lambda: ExpensiveService())\nprint(&quot;Proksi yaratildi&quot;)  # ExpensiveService yaratilmadi!\n\n# Birinchi marta ishlatganda yaratiladi\nprint(service.process())   # Bu yerda yaratiladi\n\nclass LoggingProxy:\n    &quot;&quot;&quot;Logging proxy&quot;&quot;&quot;\n    def __init__(self, target, logger=print):\n        object.__setattr__(self, '_target', target)\n        object.__setattr__(self, '_logger', logger)\n\n    def __getattr__(self, name):\n        target = object.__getattribute__(self, '_target')\n        logger = object.__getattribute__(self, '_logger')\n        attr = getattr(target, name)\n\n        if callable(attr):\n            @functools.wraps(attr)\n            def logged(*args, **kwargs):\n                logger(f&quot;📞 {type(target).__name__}.{name}({args}, {kwargs})&quot;)\n                result = attr(*args, **kwargs)\n                logger(f&quot;↩️ {name} → {result}&quot;)\n                return result\n            return logged\n        return attr\n\nimport math\nlogged_math = LoggingProxy(math)\nlogged_math.sqrt(16)   # 📞 module.sqrt ... ↩️ sqrt → 4.0\nlogged_math.pi         # pi — bu callable emas, to'g'ridan-to'g'ri\n</code></pre>\n<hr />\n<h2 id=\"93-pythonda-__array_ufunc__-va-numpy-integratsiya-numpy-integration\">93. Python'da <code>__array_ufunc__</code> va NumPy integratsiya / NumPy integration</h2>\n<p><strong>EN:</strong> Implementing <code>__array_ufunc__</code> and <code>__array_function__</code> allows custom objects to work seamlessly with NumPy.</p>\n<p><strong>UZB:</strong> <code>__array_ufunc__</code> va <code>__array_function__</code> ni amalga oshirish maxsus ob'ektlarga NumPy bilan muammosiz ishlash imkonini beradi.</p>\n<pre><code class=\"language-python\">try:\n    import numpy as np\n\n    class PhysicalQuantity:\n        &quot;&quot;&quot;Birlikli fizikaviy kattalik / Physical quantity with units&quot;&quot;&quot;\n\n        def __init__(self, value, unit: str):\n            self.value = np.asarray(value)\n            self.unit = unit\n\n        def __array_ufunc__(self, ufunc, method, *inputs, **kwargs):\n            &quot;&quot;&quot;NumPy universal funksiyalarini qo'llab-quvvatlash&quot;&quot;&quot;\n            raw_inputs = []\n            units = []\n            for inp in inputs:\n                if isinstance(inp, PhysicalQuantity):\n                    raw_inputs.append(inp.value)\n                    units.append(inp.unit)\n                else:\n                    raw_inputs.append(inp)\n                    units.append(None)\n\n            result = getattr(ufunc, method)(*raw_inputs, **kwargs)\n\n            # Birlik logikasin oddiy ko'rsatish\n            if ufunc in (np.add, np.subtract):\n                if len(set(u for u in units if u)) &gt; 1:\n                    raise ValueError(f&quot;Birliklar mos emas: {units}&quot;)\n                result_unit = next(u for u in units if u)\n            elif ufunc == np.multiply:\n                result_unit = &quot;*&quot;.join(u for u in units if u) or None\n            else:\n                result_unit = units[0]\n\n            return PhysicalQuantity(result, result_unit) if result_unit else result\n\n        def __repr__(self):\n            return f&quot;PhysicalQuantity({self.value} {self.unit})&quot;\n\n    # Ishlatish\n    distance = PhysicalQuantity([1.0, 2.0, 3.0], &quot;m&quot;)\n    time_arr = PhysicalQuantity([1.0, 2.0, 3.0], &quot;s&quot;)\n\n    # NumPy universal funksiyalari ishlaydi\n    doubled = np.multiply(distance, 2)\n    print(doubled)  # PhysicalQuantity([2. 4. 6.] m)\n\n    speed = np.divide(distance, time_arr)\n    # Bu oddiy array qaytaradi chunki divide uchun birlik logikasi yo'q\n\n    # sqrt ishlatish\n    areas = PhysicalQuantity([4.0, 9.0, 16.0], &quot;m^2&quot;)\n    sides = np.sqrt(areas)\n    print(sides)  # PhysicalQuantity([2. 3. 4.] m^2)\n\nexcept ImportError:\n    print(&quot;pip install numpy&quot;)\n    print(&quot;# NumPy o'rnatilmagan, misol ko'rsatilmaydi&quot;)\n</code></pre>\n<hr />\n<h2 id=\"94-pythonda-cython-va-numba-tezlashtirish-performance-with-cython-and-numba\">94. Python'da <code>Cython</code> va <code>Numba</code> tezlashtirish / Performance with Cython and Numba</h2>\n<p><strong>EN:</strong> Cython compiles Python to C; Numba uses JIT compilation for numerical code.</p>\n<p><strong>UZB:</strong> Cython Python ni C ga kompilyatsiya qiladi; Numba raqamli kod uchun JIT kompilyatsiyasini ishlatadi.</p>\n<pre><code class=\"language-python\"># Numba misoli (pip install numba)\ntry:\n    from numba import jit, njit\n    import numpy as np\n    import time\n\n    # JIT-kompilyatsiya qilinmagan\n    def pure_python_sum(arr):\n        total = 0.0\n        for x in arr:\n            total += x\n        return total\n\n    # JIT-kompilyatsiya qilingan\n    @njit  # nopython mode — eng tez\n    def numba_sum(arr):\n        total = 0.0\n        for x in arr:\n            total += x\n        return total\n\n    arr = np.random.random(10_000_000)\n\n    # Isitish / Warmup\n    numba_sum(arr[:10])\n\n    start = time.time()\n    r1 = pure_python_sum(arr)\n    t1 = time.time() - start\n\n    start = time.time()\n    r2 = numba_sum(arr)\n    t2 = time.time() - start\n\n    print(f&quot;Python: {t1:.3f}s&quot;)    # ~3.0s\n    print(f&quot;Numba: {t2:.4f}s&quot;)     # ~0.02s\n    print(f&quot;Tezlanish: {t1/t2:.0f}x&quot;)\n\n    # Parallel ishlov\n    from numba import prange\n\n    @njit(parallel=True)\n    def parallel_sum(arr):\n        total = 0.0\n        for i in prange(len(arr)):  # parallel range\n            total += arr[i]\n        return total\n\nexcept ImportError:\n    print(&quot;pip install numba&quot;)\n\n# Cython — .pyx fayl misoli\ncython_code = '''\n# my_module.pyx\n# cython: language_level=3\nimport cython\n\n@cython.boundscheck(False)\n@cython.wraparound(False)\ndef fast_sum(double[:] arr):\n    cdef double total = 0.0\n    cdef int n = len(arr)\n    cdef int i\n    for i in range(n):\n        total += arr[i]\n    return total\n'''\nprint(&quot;Cython kodi (kompilatsiya talab qilinadi):&quot;)\nprint(cython_code)\n</code></pre>\n<hr />\n<h2 id=\"95-pythonda-dis-va-bytecode-optimizatsiya-bytecode-optimization\">95. Python'da <code>dis</code> va bytecode optimizatsiya / Bytecode optimization</h2>\n<p><strong>EN:</strong> Understanding Python bytecode helps write more efficient code and understand interpreter behavior.</p>\n<p><strong>UZB:</strong> Python bayt kodini tushunish yanada samarali kod yozish va interpreter xatti-harakatini tushunishga yordam beradi.</p>\n<pre><code class=\"language-python\">import dis\nimport time\n\n# Nega ba'zi kodlar tezroq / Why some code is faster\ndef version1(n):\n    result = []\n    for i in range(n):\n        result.append(i * i)\n    return result\n\ndef version2(n):\n    return [i * i for i in range(n)]\n\ndef version3(n):\n    return list(map(lambda x: x*x, range(n)))\n\n# Bayt kodlarni taqqoslash / Compare bytecodes\nprint(&quot;=== Version 1 ===&quot;)\ndis.dis(version1)\nprint(&quot;\\n=== Version 2 ===&quot;)\ndis.dis(version2)\n\n# Tezlikni o'lchash / Measure speed\nimport timeit\n\nt1 = timeit.timeit(lambda: version1(1000), number=10000)\nt2 = timeit.timeit(lambda: version2(1000), number=10000)\nt3 = timeit.timeit(lambda: version3(1000), number=10000)\n\nprint(f&quot;\\nFor loop: {t1:.3f}s&quot;)\nprint(f&quot;List comp: {t2:.3f}s → {t1/t2:.1f}x tez&quot;)\nprint(f&quot;Map: {t3:.3f}s&quot;)\n\n# Constant folding tekshiruvi\nimport py_compile\n\ndef check_constant_folding():\n    x = 2 * 3 * 4    # Python bu ni compile vaqtida 24 ga aylantiradi\n    y = &quot;hello &quot; * 3  # Kompilyatsiya vaqtida &quot;hello hello hello &quot;\n    return x, y\n\ndis.dis(check_constant_folding)\n# LOAD_CONST 24 (2*3*4 emas, allaqachon hisoblangan!)\n\n# Global vs local o'zgaruvchi tezligi\nimport math\n\ndef using_global():\n    return [math.sqrt(i) for i in range(1000)]\n\ndef using_local():\n    sqrt = math.sqrt  # local o'zgaruvchiga olish\n    return [sqrt(i) for i in range(1000)]\n\ntg = timeit.timeit(using_global, number=10000)\ntl = timeit.timeit(using_local, number=10000)\nprint(f&quot;\\nGlobal: {tg:.3f}s, Local: {tl:.3f}s → {tg/tl:.1f}x tez&quot;)\n</code></pre>\n<hr />\n<h2 id=\"96-pythonda-type-checking-va-mypy-static-type-checking\">96. Python'da <code>type checking</code> va <code>mypy</code> / Static type checking</h2>\n<p><strong>EN:</strong> MyPy performs static type analysis without running the code, catching type errors early.</p>\n<p><strong>UZB:</strong> MyPy kodni ishga tushirmasdan statik tip tahlilini amalga oshiradi, tip xatolarini erta aniqlaydi.</p>\n<pre><code class=\"language-python\"># mypy -- strict faylni tekshirish uchun\n# pip install mypy\n# mypy --strict myfile.py\n\nfrom typing import (\n    TypeVar, Generic, Protocol, runtime_checkable,\n    overload, Final, Literal, TypedDict, ClassVar,\n    TYPE_CHECKING\n)\n\nif TYPE_CHECKING:\n    from typing import NoReturn\n\n# TypedDict — dict uchun qat'iy schema\nclass UserConfig(TypedDict):\n    name: str\n    age: int\n    email: str\n    role: Literal[&quot;admin&quot;, &quot;user&quot;, &quot;moderator&quot;]\n\ndef process_config(config: UserConfig) -&gt; str:\n    return f&quot;{config['name']} ({config['role']})&quot;\n\nconfig: UserConfig = {\n    &quot;name&quot;: &quot;Ali&quot;,\n    &quot;age&quot;: 25,\n    &quot;email&quot;: &quot;ali@example.com&quot;,\n    &quot;role&quot;: &quot;admin&quot;\n}\n\n# Final — o'zgarmas konstantalar\nMAX_RETRIES: Final = 3\nAPI_VERSION: Final[str] = &quot;v2&quot;\n\n# Overload — ko'p qaytarish turlari\n@overload\ndef process(value: int) -&gt; int: ...\n@overload\ndef process(value: str) -&gt; str: ...\n@overload\ndef process(value: list) -&gt; list: ...\n\ndef process(value):\n    if isinstance(value, int):\n        return value * 2\n    elif isinstance(value, str):\n        return value.upper()\n    elif isinstance(value, list):\n        return [process(v) for v in value]\n\n# ClassVar — klass atributi (instans emas)\nclass Config:\n    MAX_SIZE: ClassVar[int] = 100\n    debug: ClassVar[bool] = False\n\n    def __init__(self, name: str) -&gt; None:\n        self.name = name\n\n# Never/NoReturn\ndef raise_error(msg: str) -&gt; &quot;NoReturn&quot;:\n    raise RuntimeError(msg)\n\ndef divide(a: float, b: float) -&gt; float:\n    if b == 0:\n        raise_error(&quot;Nolga bo'lish mumkin emas!&quot;)\n    return a / b  # mypy biladi bu erga hech qachon yetib kelmasligini\n</code></pre>\n<hr />\n<h2 id=\"97-pythonda-reactive-programming-reactive-programming\">97. Python'da <code>Reactive Programming</code> / Reactive Programming</h2>\n<p><strong>EN:</strong> Reactive programming with observables and streams enables declarative async data flow.</p>\n<p><strong>UZB:</strong> Kuzatuvchilar va oqimlar bilan reaktiv dasturlash deklarativ async ma'lumotlar oqimini ta'minlaydi.</p>\n<pre><code class=\"language-python\">from typing import Callable, TypeVar, Generic, List, Optional\nfrom dataclasses import dataclass, field\nimport asyncio\n\nT = TypeVar('T')\n\nclass Observable(Generic[T]):\n    &quot;&quot;&quot;Oddiy Observable implementatsiya / Simple Observable implementation&quot;&quot;&quot;\n\n    def __init__(self):\n        self._observers: List[Callable[[T], None]] = []\n        self._error_handlers: List[Callable[[Exception], None]] = []\n        self._complete_handlers: List[Callable[[], None]] = []\n\n    def subscribe(\n        self,\n        on_next: Callable[[T], None],\n        on_error: Optional[Callable[[Exception], None]] = None,\n        on_complete: Optional[Callable[[], None]] = None\n    ) -&gt; 'Subscription':\n        self._observers.append(on_next)\n        if on_error:\n            self._error_handlers.append(on_error)\n        if on_complete:\n            self._complete_handlers.append(on_complete)\n        return Subscription(self, on_next)\n\n    def emit(self, value: T):\n        for observer in self._observers:\n            try:\n                observer(value)\n            except Exception as e:\n                for handler in self._error_handlers:\n                    handler(e)\n\n    def error(self, exception: Exception):\n        for handler in self._error_handlers:\n            handler(exception)\n\n    def complete(self):\n        for handler in self._complete_handlers:\n            handler()\n\n    def map(self, transform: Callable[[T], any]) -&gt; 'Observable':\n        new_obs = Observable()\n        self.subscribe(lambda v: new_obs.emit(transform(v)))\n        return new_obs\n\n    def filter(self, predicate: Callable[[T], bool]) -&gt; 'Observable':\n        new_obs = Observable()\n        self.subscribe(lambda v: new_obs.emit(v) if predicate(v) else None)\n        return new_obs\n\nclass Subscription:\n    def __init__(self, observable: Observable, handler):\n        self.observable = observable\n        self.handler = handler\n\n    def unsubscribe(self):\n        if self.handler in self.observable._observers:\n            self.observable._observers.remove(self.handler)\n\n# Ishlatish / Usage\nprices = Observable[float]()\n\n# Pipeline\nalerts = (\n    prices\n    .filter(lambda p: p &gt; 100)       # 100 dan katta\n    .map(lambda p: f&quot;🚨 Narx: ${p:.2f}&quot;)  # formatlash\n)\n\nsubscription = alerts.subscribe(\n    on_next=print,\n    on_error=lambda e: print(f&quot;Xato: {e}&quot;),\n    on_complete=lambda: print(&quot;Oqim tugadi&quot;)\n)\n\nprices.emit(50.0)     # filtered out\nprices.emit(150.0)    # 🚨 Narx: $150.00\nprices.emit(75.0)     # filtered out\nprices.emit(200.0)    # 🚨 Narx: $200.00\nprices.complete()     # Oqim tugadi\n\nsubscription.unsubscribe()\nprices.emit(300.0)    # hech kim ko'rmaydi\n</code></pre>\n<hr />\n<h2 id=\"98-pythonda-__reduce__-va-maxsus-seriallashtirish-custom-serialization\">98. Python'da <code>__reduce__</code> va maxsus seriallashtirish / Custom serialization</h2>\n<p><strong>EN:</strong> <code>__reduce__</code> and <code>__reduce_ex__</code> control how objects are pickled for serialization.</p>\n<p><strong>UZB:</strong> <code>__reduce__</code> va <code>__reduce_ex__</code> ob'ektlarning seriallashtirish uchun qanday pickle qilinishini boshqaradi.</p>\n<pre><code class=\"language-python\">import pickle\nimport copy\n\nclass SecureData:\n    &quot;&quot;&quot;Maxfiy ma'lumotlarni pickle qilmaslik / Don't pickle sensitive data&quot;&quot;&quot;\n\n    def __init__(self, public_data: str, secret: str):\n        self.public_data = public_data\n        self._secret = secret  # Bu pickle qilinmaydi!\n\n    def __getstate__(self):\n        &quot;&quot;&quot;Pickle uchun holat / State for pickling&quot;&quot;&quot;\n        state = self.__dict__.copy()\n        del state['_secret']     # maxfiy ma'lumotni o'chirish\n        state['_secret_hash'] = hash(self._secret)  # faqat hash\n        return state\n\n    def __setstate__(self, state):\n        &quot;&quot;&quot;Unpickle paytida / During unpickling&quot;&quot;&quot;\n        self.__dict__.update(state)\n        self._secret = None  # Secret tiklanmaydi\n\n    def __reduce__(self):\n        &quot;&quot;&quot;Boshqa pickler uchun / For custom picklers&quot;&quot;&quot;\n        return (\n            self.__class__,        # factory funksiya\n            (self.public_data, &quot;&quot;),  # argumentlar\n            self.__getstate__()      # qo'shimcha holat\n        )\n\ndata = SecureData(&quot;Ommaviy ma'lumot&quot;, &quot;super_secret_123&quot;)\nprint(f&quot;Original secret: {data._secret}&quot;)\n\n# Pickle\nserialized = pickle.dumps(data)\nrestored = pickle.loads(serialized)\n\nprint(f&quot;Restored public: {restored.public_data}&quot;)\nprint(f&quot;Restored secret: {restored._secret}&quot;)  # None!\n\n# Deepcopy boshqaruvi\nclass ManagedResource:\n    def __init__(self, name: str):\n        self.name = name\n        self.connection = f&quot;conn_to_{name}&quot;  # Kopiyalab bo'lmaydi\n\n    def __copy__(self):\n        new = ManagedResource(self.name + &quot;_copy&quot;)\n        return new\n\n    def __deepcopy__(self, memo):\n        new = ManagedResource(self.name + &quot;_deep_copy&quot;)\n        memo[id(self)] = new\n        return new\n\nr = ManagedResource(&quot;database&quot;)\nr_copy = copy.copy(r)\nr_deep = copy.deepcopy(r)\nprint(r.name, r_copy.name, r_deep.name)\n# database  database_copy  database_deep_copy\n</code></pre>\n<hr />\n<h2 id=\"99-pythonda-pep-695-type-parameter-syntax-python-312-new-style-generics\">99. Python'da <code>PEP 695</code> — Type Parameter Syntax (Python 3.12+) / New style generics</h2>\n<p><strong>EN:</strong> Python 3.12 introduces new syntax for type parameters, making generics more readable.</p>\n<p><strong>UZB:</strong> Python 3.12 tip parametrlari uchun yangi sintaksis kiritadi, genericslarni yanada o'qiluvchan qiladi.</p>\n<pre><code class=\"language-python\"># Python 3.12+ yangi sintaksis / New syntax\n# Eski usul / Old style:\nfrom typing import TypeVar, Generic\nT = TypeVar('T')\nclass Stack(Generic[T]): ...\n\n# Yangi usul / New style (Python 3.12+):\n# class Stack[T]:\n#     def push(self, item: T) -&gt; None: ...\n#     def pop(self) -&gt; T: ...\n\n# TypeAlias (Python 3.12)\n# type Point = tuple[float, float]\n# type Matrix = list[list[float]]\n\n# Hozirgi versiyalarda / Current versions (3.9+)\nfrom typing import TypeAlias\n\nPoint: TypeAlias = tuple[float, float]\nMatrix: TypeAlias = list[list[float]]\n\ndef dot_product(a: Point, b: Point) -&gt; float:\n    return a[0] * b[0] + a[1] * b[1]\n\ndef matrix_multiply(a: Matrix, b: Matrix) -&gt; Matrix:\n    rows_a = len(a)\n    cols_a = len(a[0])\n    cols_b = len(b[0])\n\n    result = [[0.0] * cols_b for _ in range(rows_a)]\n\n    for i in range(rows_a):\n        for j in range(cols_b):\n            for k in range(cols_a):\n                result[i][j] += a[i][k] * b[k][j]\n\n    return result\n\np1: Point = (3.0, 4.0)\np2: Point = (1.0, 2.0)\nprint(dot_product(p1, p2))  # 11.0\n\nm1: Matrix = [[1, 2], [3, 4]]\nm2: Matrix = [[5, 6], [7, 8]]\nresult = matrix_multiply(m1, m2)\nprint(result)  # [[19.0, 22.0], [43.0, 50.0]]\n\n# ParamSpec — decorator uchun / For decorators\nfrom typing import ParamSpec, Concatenate\nP = ParamSpec('P')\n</code></pre>\n<hr />\n<h2 id=\"100-pythonda-arxitektura-naqshlari-domain-driven-design-ddd-in-python\">100. Python'da arxitektura naqshlari: Domain-Driven Design / DDD in Python</h2>\n<p><strong>EN:</strong> Domain-Driven Design organizes code around business domain concepts — Entities, Value Objects, Aggregates, Repositories, and Domain Services.</p>\n<p><strong>UZB:</strong> Domain-Driven Design kodni biznes domain tushunchalari atrofida tashkil qiladi — Sushcheliklar, Qiymat Ob'ektlari, Agregatlar, Repozitoriylar va Domain Xizmatlari.</p>\n<pre><code class=\"language-python\">from __future__ import annotations\nfrom dataclasses import dataclass, field\nfrom typing import List, Optional\nfrom datetime import datetime\nfrom uuid import UUID, uuid4\nfrom abc import ABC, abstractmethod\nfrom enum import Enum\n\n# Value Objects — o'zgarmas, identifikatsiyasiz\n@dataclass(frozen=True)\nclass Money:\n    amount: float\n    currency: str = &quot;UZS&quot;\n\n    def __add__(self, other: Money) -&gt; Money:\n        if self.currency != other.currency:\n            raise ValueError(&quot;Valyutalar mos emas!&quot;)\n        return Money(self.amount + other.amount, self.currency)\n\n    def __mul__(self, factor: float) -&gt; Money:\n        return Money(self.amount * factor, self.currency)\n\n    def __str__(self):\n        return f&quot;{self.amount:,.0f} {self.currency}&quot;\n\n@dataclass(frozen=True)\nclass CustomerId:\n    value: UUID = field(default_factory=uuid4)\n\n# Domain Events\n@dataclass\nclass DomainEvent:\n    occurred_at: datetime = field(default_factory=datetime.now)\n\n@dataclass\nclass OrderPlaced(DomainEvent):\n    order_id: UUID = field(default_factory=uuid4)\n    customer_id: CustomerId = None\n    total: Money = None\n\n@dataclass\nclass OrderCancelled(DomainEvent):\n    order_id: UUID = field(default_factory=uuid4)\n    reason: str = &quot;&quot;\n\n# Entity — identifikatsiyali ob'ekt\nclass OrderStatus(Enum):\n    PENDING = &quot;pending&quot;\n    CONFIRMED = &quot;confirmed&quot;\n    SHIPPED = &quot;shipped&quot;\n    DELIVERED = &quot;delivered&quot;\n    CANCELLED = &quot;cancelled&quot;\n\n@dataclass\nclass OrderItem:\n    product_id: UUID\n    product_name: str\n    quantity: int\n    unit_price: Money\n\n    @property\n    def subtotal(self) -&gt; Money:\n        return self.unit_price * self.quantity\n\nclass Order:\n    &quot;&quot;&quot;Aggregate Root&quot;&quot;&quot;\n\n    def __init__(self, customer_id: CustomerId):\n        self.id = uuid4()\n        self.customer_id = customer_id\n        self._items: List[OrderItem] = []\n        self._status = OrderStatus.PENDING\n        self._events: List[DomainEvent] = []\n        self._created_at = datetime.now()\n\n    def add_item(self, product_id: UUID, name: str, qty: int, price: Money):\n        if self._status != OrderStatus.PENDING:\n            raise ValueError(&quot;Tasdiqlangan buyurtmaga mahsulot qo'shib bo'lmaydi!&quot;)\n        self._items.append(OrderItem(product_id, name, qty, price))\n\n    def confirm(self):\n        if not self._items:\n            raise ValueError(&quot;Bo'sh buyurtmani tasdiqlab bo'lmaydi!&quot;)\n        self._status = OrderStatus.CONFIRMED\n        self._events.append(\n            OrderPlaced(\n                order_id=self.id,\n                customer_id=self.customer_id,\n                total=self.total\n            )\n        )\n\n    def cancel(self, reason: str):\n        if self._status in (OrderStatus.DELIVERED, OrderStatus.SHIPPED):\n            raise ValueError(&quot;Yetkazilgan buyurtmani bekor qilib bo'lmaydi!&quot;)\n        self._status = OrderStatus.CANCELLED\n        self._events.append(OrderCancelled(order_id=self.id, reason=reason))\n\n    @property\n    def total(self) -&gt; Money:\n        if not self._items:\n            return Money(0)\n        result = self._items[0].subtotal\n        for item in self._items[1:]:\n            result = result + item.subtotal\n        return result\n\n    @property\n    def status(self) -&gt; OrderStatus:\n        return self._status\n\n    def collect_events(self) -&gt; List[DomainEvent]:\n        events = self._events.copy()\n        self._events.clear()\n        return events\n\n# Repository Interface\nclass OrderRepository(ABC):\n    @abstractmethod\n    async def save(self, order: Order) -&gt; None: ...\n\n    @abstractmethod\n    async def find_by_id(self, order_id: UUID) -&gt; Optional[Order]: ...\n\n    @abstractmethod\n    async def find_by_customer(self, customer_id: CustomerId) -&gt; List[Order]: ...\n\n# Domain Service\nclass OrderService:\n    def __init__(self, repo: OrderRepository):\n        self._repo = repo\n\n    async def place_order(\n        self,\n        customer_id: CustomerId,\n        items: List[dict]\n    ) -&gt; Order:\n        order = Order(customer_id)\n        for item in items:\n            order.add_item(\n                uuid4(),\n                item[&quot;name&quot;],\n                item[&quot;quantity&quot;],\n                Money(item[&quot;price&quot;])\n            )\n        order.confirm()\n        await self._repo.save(order)\n        return order\n\n# Demo\nasync def demo():\n    # In-memory repository\n    class InMemoryOrderRepo(OrderRepository):\n        def __init__(self):\n            self._store = {}\n\n        async def save(self, order: Order):\n            self._store[order.id] = order\n\n        async def find_by_id(self, order_id):\n            return self._store.get(order_id)\n\n        async def find_by_customer(self, customer_id):\n            return [o for o in self._store.values()\n                    if o.customer_id == customer_id]\n\n    repo = InMemoryOrderRepo()\n    service = OrderService(repo)\n\n    customer = CustomerId()\n    order = await service.place_order(customer, [\n        {&quot;name&quot;: &quot;Laptop&quot;, &quot;quantity&quot;: 1, &quot;price&quot;: 1_500_000},\n        {&quot;name&quot;: &quot;Mouse&quot;, &quot;quantity&quot;: 2, &quot;price&quot;: 50_000},\n    ])\n\n    print(f&quot;Buyurtma ID: {order.id}&quot;)\n    print(f&quot;Jami: {order.total}&quot;)          # 1,600,000 UZS\n    print(f&quot;Holat: {order.status.value}&quot;)  # confirmed\n\n    events = order.collect_events()\n    for event in events:\n        print(f&quot;📢 Event: {type(event).__name__}&quot;)\n\nimport asyncio\nasyncio.run(demo())\n</code></pre>\n<hr />\n<h2 id=\"xulosa-summary\">📊 Xulosa / Summary</h2>\n<table>\n<thead>\n<tr>\n<th>Daraja / Level</th>\n<th>Mavzular / Topics</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>🟢 <strong>Basic (1-25)</strong></td>\n<td>Tiplar, OOP, Fayllar, Lambda, Exceptions</td>\n</tr>\n<tr>\n<td>🟡 <strong>Intermediate (26-55)</strong></td>\n<td>Decorators, Generators, asyncio, dataclasses, typing</td>\n</tr>\n<tr>\n<td>🔴 <strong>Advanced (56-80)</strong></td>\n<td>GIL, Metaclass, Descriptors, AST, Pattern Matching</td>\n</tr>\n<tr>\n<td>⚫ <strong>Expert (81-100)</strong></td>\n<td>CPython internals, DDD, Event Sourcing, C Extensions</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h2 id=\"interview-uchun-maslahatlar-interview-tips\">🎯 Interview uchun maslahatlar / Interview Tips</h2>\n<pre><code class=\"language-python\"># 1. STAR metodini ishlating / Use STAR method\n# Vaziyat → Vazifa → Harakat → Natija\n\n# 2. Kodni voz ovoz gapiring / Think out loud\ndef solve(problem):\n    # &quot;Avval muammoni tushunaman...&quot;\n    # &quot;Ikkita yechim ko'ryapman...&quot;\n    # &quot;Birinchisini tanlashim sababi...&quot;\n    pass\n\n# 3. Edge caselarni eslatib o'ting / Mention edge cases\ndef safe_divide(a, b):\n    # Edge cases: b=0, float, string input\n    if not isinstance(a, (int, float)) or not isinstance(b, (int, float)):\n        raise TypeError(&quot;Son bo'lishi kerak&quot;)\n    if b == 0:\n        raise ZeroDivisionError(&quot;Nolga bo'lish mumkin emas&quot;)\n    return a / b\n\n# 4. Big O ni bilib oling / Know your Big O\n# list.append() → O(1)\n# list.insert(0, x) → O(n)\n# dict.get() → O(1) average\n# set.add() → O(1) average\n# sorted() → O(n log n)\n</code></pre>\n<hr />\n<p><em>Muvaffaqiyat tilayman, dasturchi! / Good luck, developer!</em> 🐍🚀</p>\n<blockquote>\n<p><strong>GitHub uchun:</strong> Bu faylni <code>python_interview_qa.md</code> sifatida repongizga qo'shing.<br />\n<code>git add python_interview_qa.md &amp;&amp; git commit -m \"Add Python interview Q&amp;A bilingual guide (100 questions)\"</code></p>\n</blockquote>"}, "oop": {"label": "🔷 OOP", "body": "<h1 id=\"100-oop-interview-questions-answers-savol-va-javoblar\">100 OOP Interview Questions &amp; Answers | Savol va Javoblar</h1>\n<h3 id=\"english-ozbek-python-examples\">English + O'zbek | Python Examples</h3>\n<hr />\n<h2 id=\"table-of-contents-mundarija\">📌 Table of Contents | Mundarija</h2>\n<ol>\n<li><a href=\"#1-core-concepts--asosiy-tushunchalar\">Core Concepts | Asosiy Tushunchalar (1–12)</a></li>\n<li><a href=\"#2-keywords--methods--kalit-sozlar\">Keywords &amp; Methods | Kalit So'zlar (13–16)</a></li>\n<li><a href=\"#3-inheritance--relations--meros-va-munosabatlar\">Inheritance &amp; Relations | Meros va Munosabatlar (17–28)</a></li>\n<li><a href=\"#4-object-patterns--obyekt-patternlari\">Object Patterns | Obyekt Patternlari (29–36)</a></li>\n<li><a href=\"#5-advanced-oop--ilgor-oop\">Advanced OOP | Ilg'or OOP (37–60)</a></li>\n<li><a href=\"#6-binding--casting--boglash-va-konvertatsiya\">Binding &amp; Casting | Bog'lash va Konvertatsiya (61–78)</a></li>\n<li><a href=\"#7-solid-principles--solid-tamoyillar\">SOLID Principles | SOLID Tamoyillar (79–82)</a></li>\n<li><a href=\"#8-design-patterns--dizayn-patternlar\">Design Patterns | Dizayn Patternlar (83–94)</a></li>\n<li><a href=\"#9-other-concepts--boshqa-tushunchalar\">Other Concepts | Boshqa Tushunchalar (95–100)</a></li>\n</ol>\n<hr />\n<h2 id=\"1-core-concepts-asosiy-tushunchalar\">1. Core Concepts | Asosiy Tushunchalar</h2>\n<hr />\n<h3 id=\"1-what-is-oop-oop-nima\">1. What is OOP? | OOP nima?</h3>\n<p><strong>EN:</strong> A programming paradigm based on <strong>objects</strong> and <strong>classes</strong> that models real-world entities.</p>\n<p><strong>UZB:</strong> Haqiqiy dunyodagi narsalarni <strong>obyektlar</strong> va <strong>klasslar</strong> orqali modellaydigan dasturlash paradigmasi.</p>\n<pre><code class=\"language-python\"># EN: Modeling a real-world Car using OOP\n# UZB: Haqiqiy avtomobilni OOP orqali modellash\n\nclass Car:\n    def __init__(self, brand, speed):\n        self.brand = brand   # EN: attribute | UZB: xususiyat\n        self.speed = speed\n\n    def drive(self):\n        # EN: method — defines behavior\n        # UZB: metod — xatti-harakatni belgilaydi\n        print(f&quot;{self.brand} is driving at {self.speed} km/h&quot;)\n\ncar = Car(&quot;Tesla&quot;, 200)\ncar.drive()  # Tesla is driving at 200 km/h\n</code></pre>\n<hr />\n<h3 id=\"2-what-are-the-four-pillars-of-oop-oop-ning-tort-ustuni-nima\">2. What are the four pillars of OOP? | OOP ning to'rt ustuni nima?</h3>\n<p><strong>EN:</strong> <strong>Encapsulation, Inheritance, Polymorphism, Abstraction.</strong></p>\n<p><strong>UZB:</strong> <strong>Inkapsulatsiya, Meros olish, Polimorfizm, Abstraktsiya.</strong></p>\n<pre><code class=\"language-python\"># EN: All four pillars in one example\n# UZB: To'rt ustunning bir misoldagi ko'rinishi\n\nfrom abc import ABC, abstractmethod\n\nclass Animal(ABC):           # Abstraction | Abstraktsiya\n    def __init__(self, name):\n        self.__name = name   # Encapsulation | Inkapsulatsiya (private)\n\n    def get_name(self):\n        return self.__name\n\n    @abstractmethod\n    def speak(self):         # Polymorphism | Polimorfizm (abstract)\n        pass\n\nclass Dog(Animal):           # Inheritance | Meros olish\n    def speak(self):\n        return f&quot;{self.get_name()} says: Woof!&quot;\n\nclass Cat(Animal):\n    def speak(self):\n        return f&quot;{self.get_name()} says: Meow!&quot;\n\nanimals = [Dog(&quot;Rex&quot;), Cat(&quot;Whiskers&quot;)]\nfor a in animals:\n    print(a.speak())\n# Rex says: Woof!\n# Whiskers says: Meow!\n</code></pre>\n<hr />\n<h3 id=\"3-what-is-a-class-klass-nima\">3. What is a class? | Klass nima?</h3>\n<p><strong>EN:</strong> A <strong>blueprint</strong> for creating objects — defines attributes and methods.</p>\n<p><strong>UZB:</strong> Obyektlar yaratish uchun <strong>qolip</strong> — atributlar va metodlarni belgilaydi.</p>\n<pre><code class=\"language-python\"># EN: Class is like a cookie cutter — the cutter is the class, cookies are objects\n# UZB: Klass — pechenye qolipiga o'xshaydi, qolip = klass, pechenye = obyekt\n\nclass Person:\n    # EN: class variable — shared by all instances\n    # UZB: klass o'zgaruvchisi — barcha obyektlar uchun umumiy\n    species = &quot;Homo sapiens&quot;\n\n    def __init__(self, name: str, age: int):\n        # EN: instance variables — unique to each object\n        # UZB: instance o'zgaruvchilari — har bir obyektga xos\n        self.name = name\n        self.age = age\n\n    def greet(self) -&gt; str:\n        return f&quot;Hi, I'm {self.name}, age {self.age}&quot;\n\np1 = Person(&quot;Alyorjon&quot;, 25)\np2 = Person(&quot;Jasur&quot;, 30)\n\nprint(p1.greet())          # Hi, I'm Alyorjon, age 25\nprint(p2.greet())          # Hi, I'm Jasur, age 30\nprint(Person.species)      # Homo sapiens\n</code></pre>\n<hr />\n<h3 id=\"4-what-is-an-object-obyekt-nima\">4. What is an object? | Obyekt nima?</h3>\n<p><strong>EN:</strong> An <strong>instance</strong> of a class — a concrete entity created from a blueprint.</p>\n<p><strong>UZB:</strong> Klassning <strong>namunasi</strong> — qolipdan yaratilgan aniq narsa.</p>\n<pre><code class=\"language-python\"># EN: Each object has its own state but shares the class structure\n# UZB: Har bir obyekt o'z holatiga ega, lekin klass tuzilishini ulashadi\n\nclass Book:\n    def __init__(self, title: str, pages: int):\n        self.title = title\n        self.pages = pages\n        self.current_page = 0        # EN: object state | UZB: obyekt holati\n\n    def read(self, n: int):\n        self.current_page = min(self.current_page + n, self.pages)\n        return f&quot;Read to page {self.current_page}/{self.pages}&quot;\n\n# EN: Two independent objects from the same class\n# UZB: Bir xil klassdan ikki mustaqil obyekt\nbook1 = Book(&quot;Clean Code&quot;, 431)\nbook2 = Book(&quot;The Pragmatic Programmer&quot;, 352)\n\nprint(book1.read(50))   # Read to page 50/431\nprint(book2.read(100))  # Read to page 100/352\nprint(book1.current_page)  # 50  — mustaqil holat\n</code></pre>\n<hr />\n<h3 id=\"5-what-is-encapsulation-inkapsulatsiya-nima\">5. What is encapsulation? | Inkapsulatsiya nima?</h3>\n<p><strong>EN:</strong> Bundling <strong>data and methods</strong> into a single unit and <strong>restricting direct access</strong> to internal state.</p>\n<p><strong>UZB:</strong> <strong>Ma'lumot va metodlarni</strong> bitta birlikka jamlash va ichki holatga <strong>to'g'ridan-to'g'ri kirishni cheklash</strong>.</p>\n<pre><code class=\"language-python\"># EN: Bank account — classic encapsulation example\n# UZB: Bank hisobi — klassik inkapsulatsiya misoli\n\nclass BankAccount:\n    def __init__(self, owner: str, balance: float):\n        self.owner = owner\n        self.__balance = balance     # EN: private — hidden from outside\n                                     # UZB: private — tashqaridan yashirilgan\n\n    def deposit(self, amount: float):\n        # EN: controlled access through methods\n        # UZB: metodlar orqali nazorat qilinadigan kirish\n        if amount &lt;= 0:\n            raise ValueError(&quot;Amount must be positive | Summa musbat bo'lishi kerak&quot;)\n        self.__balance += amount\n        return self.__balance\n\n    def withdraw(self, amount: float):\n        if amount &gt; self.__balance:\n            raise ValueError(&quot;Insufficient funds | Mablag' yetarli emas&quot;)\n        self.__balance -= amount\n\n    @property\n    def balance(self) -&gt; float:      # EN: getter | UZB: getter\n        return self.__balance\n\nacc = BankAccount(&quot;Alyorjon&quot;, 1_000_000)\nacc.deposit(500_000)\nprint(acc.balance)       # 1500000\n# acc.__balance          # AttributeError! — encapsulation ishlayapti\n</code></pre>\n<hr />\n<h3 id=\"6-what-is-inheritance-meros-olish-nima\">6. What is inheritance? | Meros olish nima?</h3>\n<p><strong>EN:</strong> A mechanism where one class <strong>acquires properties and behavior</strong> from another class.</p>\n<p><strong>UZB:</strong> Bir klassning boshqa klassdan <strong>xususiyat va xatti-harakatlarni o'zlashtirishi</strong> mexanizmi.</p>\n<pre><code class=\"language-python\"># EN: Vehicle hierarchy — inheritance chain\n# UZB: Transport ierarxiyasi — meros zanjiri\n\nclass Vehicle:\n    def __init__(self, brand: str, speed: int):\n        self.brand = brand\n        self.speed = speed\n\n    def move(self) -&gt; str:\n        return f&quot;{self.brand} moves at {self.speed} km/h&quot;\n\nclass Car(Vehicle):                  # EN: inherits from Vehicle | UZB: Vehicle'dan meros oladi\n    def __init__(self, brand, speed, doors):\n        super().__init__(brand, speed)  # EN: call parent | UZB: parent'ni chaqirish\n        self.doors = doors\n\n    def honk(self) -&gt; str:\n        return f&quot;{self.brand}: Beep beep!&quot;\n\nclass ElectricCar(Car):              # EN: multi-level inheritance | UZB: ko'p darajali meros\n    def __init__(self, brand, speed, doors, battery_kwh):\n        super().__init__(brand, speed, doors)\n        self.battery_kwh = battery_kwh\n\n    def charge_info(self) -&gt; str:\n        return f&quot;Battery: {self.battery_kwh} kWh&quot;\n\ntesla = ElectricCar(&quot;Tesla&quot;, 250, 4, 100)\nprint(tesla.move())         # Tesla moves at 250 km/h  (Vehicle dan)\nprint(tesla.honk())         # Tesla: Beep beep!        (Car dan)\nprint(tesla.charge_info())  # Battery: 100 kWh         (ElectricCar dan)\n</code></pre>\n<hr />\n<h3 id=\"7-what-is-polymorphism-polimorfizm-nima\">7. What is polymorphism? | Polimorfizm nima?</h3>\n<p><strong>EN:</strong> The ability to take <strong>many forms</strong> — one interface behaves differently based on the object.</p>\n<p><strong>UZB:</strong> <strong>Ko'p shakl</strong> olish qobiliyati — bir interfeys obyektga qarab boshqacha ishlaydi.</p>\n<pre><code class=\"language-python\"># EN: Same method name, different behavior — runtime polymorphism\n# UZB: Bir xil metod nomi, boshqacha xatti-harakat — runtime polimorfizmi\n\nimport math\n\nclass Shape:\n    def area(self) -&gt; float:\n        raise NotImplementedError\n\nclass Circle(Shape):\n    def __init__(self, radius: float):\n        self.radius = radius\n\n    def area(self) -&gt; float:\n        return math.pi * self.radius ** 2\n\nclass Rectangle(Shape):\n    def __init__(self, width: float, height: float):\n        self.width = width\n        self.height = height\n\n    def area(self) -&gt; float:\n        return self.width * self.height\n\nclass Triangle(Shape):\n    def __init__(self, base: float, height: float):\n        self.base = base\n        self.height = height\n\n    def area(self) -&gt; float:\n        return 0.5 * self.base * self.height\n\n# EN: One function works with all shapes — polymorphism\n# UZB: Bir funksiya barcha shakllar bilan ishlaydi — polimorfizm\nshapes: list[Shape] = [Circle(5), Rectangle(4, 6), Triangle(3, 8)]\nfor shape in shapes:\n    print(f&quot;{type(shape).__name__}: area = {shape.area():.2f}&quot;)\n# Circle: area = 78.54\n# Rectangle: area = 24.00\n# Triangle: area = 12.00\n</code></pre>\n<hr />\n<h3 id=\"8-what-is-abstraction-abstraktsiya-nima\">8. What is abstraction? | Abstraktsiya nima?</h3>\n<p><strong>EN:</strong> <strong>Hiding complex implementation details</strong> and showing only the essential features to the user.</p>\n<p><strong>UZB:</strong> <strong>Murakkab amalga oshirish tafsilotlarini yashirish</strong> va foydalanuvchiga faqat muhim xususiyatlarni ko'rsatish.</p>\n<pre><code class=\"language-python\"># EN: User doesn't know HOW it works, only WHAT it does\n# UZB: Foydalanuvchi QANDAY ishlashini emas, NIMA qilishini biladi\n\nfrom abc import ABC, abstractmethod\n\nclass PaymentProcessor(ABC):         # EN: abstract interface | UZB: abstrakt interfeys\n    @abstractmethod\n    def charge(self, amount: float) -&gt; bool:\n        pass\n\n    @abstractmethod\n    def refund(self, transaction_id: str) -&gt; bool:\n        pass\n\n    def process_payment(self, amount: float):\n        # EN: template method — uses abstract methods internally\n        # UZB: shablon metod — ichida abstrakt metodlardan foydalanadi\n        print(f&quot;Processing ${amount}...&quot;)\n        success = self.charge(amount)\n        return &quot;Success | Muvaffaqiyatli&quot; if success else &quot;Failed | Xatolik&quot;\n\nclass StripeProcessor(PaymentProcessor):\n    def charge(self, amount):\n        print(f&quot;[Stripe] Charged ${amount}&quot;)   # EN: complex API hidden\n        return True                             # UZB: murakkab API yashirilgan\n\n    def refund(self, transaction_id):\n        print(f&quot;[Stripe] Refunded {transaction_id}&quot;)\n        return True\n\nstripe = StripeProcessor()\nprint(stripe.process_payment(99.99))\n# Processing $99.99...\n# [Stripe] Charged $99.99\n# Success | Muvaffaqiyatli\n</code></pre>\n<hr />\n<h3 id=\"9-what-is-method-overloading-metod-yuklash-nima\">9. What is method overloading? | Metod yuklash nima?</h3>\n<p><strong>EN:</strong> Multiple methods with the <strong>same name but different parameters</strong> in the same class. Python simulates this with default args or <code>*args</code>.</p>\n<p><strong>UZB:</strong> Bir xil klassda <strong>bir xil nom lekin boshqa parametrlar</strong> bilan bir nechta metod. Python buni default argumentlar yoki <code>*args</code> bilan simulyatsiya qiladi.</p>\n<pre><code class=\"language-python\"># EN: Python doesn't natively support overloading — we simulate it\n# UZB: Python overloading'ni bevosita qo'llab-quvvatlamaydi — simulyatsiya qilamiz\n\nclass Calculator:\n    # EN: Approach 1 — default arguments\n    # UZB: 1-usul — standart argumentlar\n    def add(self, a: float, b: float = 0, c: float = 0) -&gt; float:\n        return a + b + c\n\n    # EN: Approach 2 — *args for variable count\n    # UZB: 2-usul — o'zgaruvchan sondagi argumentlar uchun *args\n    def multiply(self, *args: float) -&gt; float:\n        result = 1\n        for n in args:\n            result *= n\n        return result\n\ncalc = Calculator()\nprint(calc.add(5))          # 5   — bitta argument\nprint(calc.add(5, 3))       # 8   — ikki argument\nprint(calc.add(5, 3, 2))    # 10  — uch argument\nprint(calc.multiply(2, 3, 4))  # 24\n</code></pre>\n<hr />\n<h3 id=\"10-what-is-method-overriding-metodni-qayta-yozish-nima\">10. What is method overriding? | Metodni qayta yozish nima?</h3>\n<p><strong>EN:</strong> A <strong>subclass redefines</strong> a method inherited from its superclass to provide specific behavior.</p>\n<p><strong>UZB:</strong> <strong>Subklass</strong> ota klassdan meros olgan metodini o'ziga xos xatti-harakat berish uchun <strong>qayta ta'riflashi</strong>.</p>\n<pre><code class=\"language-python\"># EN: Override — subclass gives its own implementation\n# UZB: Override — subklass o'zining amalga oshirishini beradi\n\nclass Notification:\n    def send(self, message: str) -&gt; str:\n        return f&quot;[BASE] Sending: {message}&quot;\n\nclass EmailNotification(Notification):\n    def __init__(self, email: str):\n        self.email = email\n\n    def send(self, message: str) -&gt; str:   # EN: overriding | UZB: qayta yozish\n        return f&quot;[EMAIL → {self.email}] {message}&quot;\n\nclass SMSNotification(Notification):\n    def __init__(self, phone: str):\n        self.phone = phone\n\n    def send(self, message: str) -&gt; str:\n        return f&quot;[SMS → {self.phone}] {message}&quot;\n\nnotifications = [\n    EmailNotification(&quot;a@example.com&quot;),\n    SMSNotification(&quot;+998901234567&quot;),\n    Notification()\n]\n\nfor n in notifications:\n    print(n.send(&quot;Order confirmed | Buyurtma tasdiqlandi&quot;))\n</code></pre>\n<hr />\n<h3 id=\"11-what-is-a-constructor-konstruktor-nima\">11. What is a constructor? | Konstruktor nima?</h3>\n<p><strong>EN:</strong> A special method (<code>__init__</code>) automatically called when an object is created to <strong>initialize</strong> it.</p>\n<p><strong>UZB:</strong> Obyekt yaratilganda avtomatik chaqiriladigan va uni <strong>ishga tushiradigan</strong> maxsus metod (<code>__init__</code>).</p>\n<pre><code class=\"language-python\"># EN: Constructor sets up the initial state of an object\n# UZB: Konstruktor obyektning boshlang'ich holatini o'rnatadi\n\nclass DatabaseConnection:\n    _connection_count = 0  # EN: class variable | UZB: klass o'zgaruvchisi\n\n    def __init__(self, host: str, port: int, db_name: str):\n        # EN: initialize all required attributes\n        # UZB: barcha kerakli atributlarni ishga tushirish\n        self.host = host\n        self.port = port\n        self.db_name = db_name\n        self.connected = False\n        DatabaseConnection._connection_count += 1\n        print(f&quot;Connection #{DatabaseConnection._connection_count} created to {host}:{port}&quot;)\n\n    def connect(self):\n        self.connected = True\n        return f&quot;Connected to {self.db_name}&quot;\n\nconn1 = DatabaseConnection(&quot;localhost&quot;, 5432, &quot;myapp&quot;)\nconn2 = DatabaseConnection(&quot;prod.server.com&quot;, 5432, &quot;production&quot;)\n# Connection #1 created to localhost:5432\n# Connection #2 created to prod.server.com:5432\n</code></pre>\n<hr />\n<h3 id=\"12-what-is-a-destructor-destruktor-nima\">12. What is a destructor? | Destruktor nima?</h3>\n<p><strong>EN:</strong> A special method (<code>__del__</code>) invoked <strong>when an object is destroyed</strong> or garbage collected.</p>\n<p><strong>UZB:</strong> Obyekt <strong>yo'q qilinganda</strong> yoki xotira tozalaganda chaqiriladigan maxsus metod (<code>__del__</code>).</p>\n<pre><code class=\"language-python\"># EN: Destructor ensures cleanup — closing files, connections, etc.\n# UZB: Destruktor tozalashni ta'minlaydi — fayllar, ulanishlarni yopish\n\nclass FileManager:\n    def __init__(self, filename: str):\n        self.filename = filename\n        self.file = open(filename, 'w')\n        print(f&quot;[OPEN] {filename}&quot;)\n\n    def write(self, data: str):\n        self.file.write(data)\n\n    def __del__(self):\n        # EN: guaranteed cleanup when object is destroyed\n        # UZB: obyekt yo'q qilinganda kafolatlangan tozalash\n        if not self.file.closed:\n            self.file.close()\n            print(f&quot;[CLOSE] {self.filename}&quot;)\n\nfm = FileManager(&quot;output.txt&quot;)\nfm.write(&quot;Hello, World!&quot;)\ndel fm\n# [OPEN] output.txt\n# [CLOSE] output.txt\n</code></pre>\n<hr />\n<h2 id=\"2-keywords-methods-kalit-sozlar\">2. Keywords &amp; Methods | Kalit So'zlar</h2>\n<hr />\n<h3 id=\"13-what-is-this-keyword-this-kalit-soz-nima\">13. What is <code>this</code> keyword? | <code>this</code> kalit so'z nima?</h3>\n<p><strong>EN:</strong> In Python it's <strong><code>self</code></strong> — refers to the <strong>current object instance</strong> inside a method.</p>\n<p><strong>UZB:</strong> Python'da bu <strong><code>self</code></strong> — metod ichida <strong>joriy obyektning o'zini</strong> ko'rsatadi.</p>\n<pre><code class=\"language-python\"># EN: self always refers to the specific object calling the method\n# UZB: self har doim metodni chaqirayotgan aniq obyektni ko'rsatadi\n\nclass Counter:\n    def __init__(self, start: int = 0):\n        self.count = start           # EN: self.count = this object's count\n                                     # UZB: self.count = bu obyektning count'i\n\n    def increment(self):\n        self.count += 1\n        return self                  # EN: return self for method chaining\n                                     # UZB: method chaining uchun self qaytarish\n\n    def reset(self):\n        self.count = 0\n        return self\n\n    def __repr__(self):\n        return f&quot;Counter({self.count})&quot;\n\nc = Counter(0)\n# EN: Method chaining — possible because each method returns self\n# UZB: Method chaining — har bir metod self qaytargani uchun mumkin\nresult = c.increment().increment().increment().reset().increment()\nprint(result)  # Counter(1)\n</code></pre>\n<hr />\n<h3 id=\"14-what-is-super-keyword-super-kalit-soz-nima\">14. What is <code>super</code> keyword? | <code>super</code> kalit so'z nima?</h3>\n<p><strong>EN:</strong> <code>super()</code> refers to the <strong>parent class</strong> — used to call parent methods and constructor.</p>\n<p><strong>UZB:</strong> <code>super()</code> <strong>ota klassni</strong> ko'rsatadi — ota klass metodlari va konstruktorini chaqirish uchun ishlatiladi.</p>\n<pre><code class=\"language-python\"># EN: super() is essential when extending parent class behavior\n# UZB: super() ota klass xatti-harakatini kengaytirganda muhim\n\nclass Animal:\n    def __init__(self, name: str, sound: str):\n        self.name = name\n        self.sound = sound\n        print(f&quot;Animal created: {name}&quot;)\n\n    def describe(self) -&gt; str:\n        return f&quot;{self.name} makes '{self.sound}' sound&quot;\n\nclass Dog(Animal):\n    def __init__(self, name: str, breed: str):\n        super().__init__(name, &quot;Woof&quot;)   # EN: call parent __init__\n                                          # UZB: ota klass __init__'ni chaqirish\n        self.breed = breed\n        print(f&quot;Dog breed: {breed}&quot;)\n\n    def describe(self) -&gt; str:\n        base = super().describe()        # EN: extend parent method\n                                          # UZB: ota klass metodini kengaytirish\n        return f&quot;{base} | Breed: {self.breed}&quot;\n\ndog = Dog(&quot;Rex&quot;, &quot;Labrador&quot;)\nprint(dog.describe())\n# Animal created: Rex\n# Dog breed: Labrador\n# Rex makes 'Woof' sound | Breed: Labrador\n</code></pre>\n<hr />\n<h3 id=\"15-what-is-a-static-method-statik-metod-nima\">15. What is a static method? | Statik metod nima?</h3>\n<p><strong>EN:</strong> A method that <strong>belongs to the class</strong>, not to any specific instance — no <code>self</code> or <code>cls</code> parameter.</p>\n<p><strong>UZB:</strong> <strong>Klassga tegishli</strong> metod, alohida obyektga emas — <code>self</code> yoki <code>cls</code> parametri yo'q.</p>\n<pre><code class=\"language-python\"># EN: Static methods — utility functions logically related to the class\n# UZB: Statik metodlar — klassga mantiqan bog'liq yordamchi funksiyalar\n\nclass TemperatureConverter:\n    @staticmethod\n    def celsius_to_fahrenheit(c: float) -&gt; float:\n        return (c * 9/5) + 32\n\n    @staticmethod\n    def fahrenheit_to_celsius(f: float) -&gt; float:\n        return (f - 32) * 5/9\n\n    @staticmethod\n    def celsius_to_kelvin(c: float) -&gt; float:\n        return c + 273.15\n\n# EN: Call without creating an instance\n# UZB: Obyekt yaratmasdan chaqirish\nprint(TemperatureConverter.celsius_to_fahrenheit(100))  # 212.0\nprint(TemperatureConverter.fahrenheit_to_celsius(98.6)) # 37.0\nprint(TemperatureConverter.celsius_to_kelvin(0))        # 273.15\n</code></pre>\n<hr />\n<h3 id=\"16-what-is-a-final-class-final-klass-nima\">16. What is a final class? | Final klass nima?</h3>\n<p><strong>EN:</strong> A class that <strong>cannot be inherited</strong> from. Python simulates this with <code>__init_subclass__</code>.</p>\n<p><strong>UZB:</strong> Undan <strong>meros olib bo'lmaydigan</strong> klass. Python buni <code>__init_subclass__</code> bilan simulyatsiya qiladi.</p>\n<pre><code class=\"language-python\"># EN: Final class — prevents unintended subclassing\n# UZB: Final klass — noto'g'ri meros olishni oldini oladi\n\nclass FinalMeta(type):\n    &quot;&quot;&quot;EN: Metaclass that prevents inheritance | UZB: Merosni bloklaydi&quot;&quot;&quot;\n    def __new__(mcs, name, bases, namespace):\n        for base in bases:\n            if getattr(base, '_is_final', False):\n                raise TypeError(\n                    f&quot;EN: Cannot inherit from final class '{base.__name__}'\\n&quot;\n                    f&quot;UZB: '{base.__name__}' final klassidan meros olib bo'lmaydi&quot;\n                )\n        return super().__new__(mcs, name, bases, namespace)\n\nclass AppConfig(metaclass=FinalMeta):\n    _is_final = True\n\n    def __init__(self):\n        self.debug = False\n        self.version = &quot;1.0.0&quot;\n\nconfig = AppConfig()\nprint(config.version)   # 1.0.0\n\n# class MyConfig(AppConfig): pass  # TypeError!\n</code></pre>\n<hr />\n<h2 id=\"3-inheritance-relations-meros-va-munosabatlar\">3. Inheritance &amp; Relations | Meros va Munosabatlar</h2>\n<hr />\n<h3 id=\"17-what-is-multiple-inheritance-kop-meros-olish-nima\">17. What is multiple inheritance? | Ko'p meros olish nima?</h3>\n<p><strong>EN:</strong> A class <strong>inheriting from more than one parent class</strong> simultaneously.</p>\n<p><strong>UZB:</strong> Bir klassning <strong>bir vaqtning o'zida bir nechta ota klassdan meros olishi</strong>.</p>\n<pre><code class=\"language-python\"># EN: Multiple inheritance — useful for mixins and combining behaviors\n# UZB: Ko'p meros olish — mixin va xatti-harakatlarni birlashtirish uchun foydali\n\nclass Flyable:\n    def fly(self) -&gt; str:\n        return f&quot;{self.__class__.__name__} is flying!&quot;\n\nclass Swimmable:\n    def swim(self) -&gt; str:\n        return f&quot;{self.__class__.__name__} is swimming!&quot;\n\nclass Runnable:\n    def run(self) -&gt; str:\n        return f&quot;{self.__class__.__name__} is running!&quot;\n\nclass Duck(Flyable, Swimmable, Runnable):  # EN: 3 parents | UZB: 3 ota klass\n    def quack(self) -&gt; str:\n        return &quot;Quack! | Vak-vak!&quot;\n\nduck = Duck()\nprint(duck.fly())    # Duck is flying!\nprint(duck.swim())   # Duck is swimming!\nprint(duck.run())    # Duck is running!\nprint(duck.quack())  # Quack! | Vak-vak!\nprint(Duck.__mro__)  # EN: MRO order | UZB: MRO tartibi\n</code></pre>\n<hr />\n<h3 id=\"18-what-is-an-abstract-class-abstrakt-klass-nima\">18. What is an abstract class? | Abstrakt klass nima?</h3>\n<p><strong>EN:</strong> A class that <strong>cannot be instantiated</strong> and may contain abstract methods that subclasses must implement.</p>\n<p><strong>UZB:</strong> <strong>Yaratib bo'lmaydigan</strong> klass; subklasslar amalga oshirishi kerak bo'lgan abstrakt metodlarni o'z ichiga olishi mumkin.</p>\n<pre><code class=\"language-python\"># EN: Abstract class — defines contract for subclasses\n# UZB: Abstrakt klass — subklasslar uchun shartnoma belgilaydi\n\nfrom abc import ABC, abstractmethod\n\nclass ReportGenerator(ABC):\n    def __init__(self, title: str):\n        self.title = title\n\n    @abstractmethod\n    def fetch_data(self) -&gt; list:\n        pass                    # EN: must implement | UZB: amalga oshirish shart\n\n    @abstractmethod\n    def format_output(self, data: list) -&gt; str:\n        pass\n\n    def generate(self) -&gt; str:  # EN: concrete method using abstract ones\n                                 # UZB: abstrakt metodlarni ishlatuvchi konkret metod\n        data = self.fetch_data()\n        return self.format_output(data)\n\nclass SalesReport(ReportGenerator):\n    def fetch_data(self) -&gt; list:\n        return [(&quot;Jan&quot;, 1200), (&quot;Feb&quot;, 1800), (&quot;Mar&quot;, 2100)]\n\n    def format_output(self, data: list) -&gt; str:\n        rows = &quot;\\n&quot;.join(f&quot;  {m}: ${v}&quot; for m, v in data)\n        return f&quot;=== {self.title} ===\\n{rows}&quot;\n\n# ReportGenerator(&quot;test&quot;)  # TypeError! — abstrakt klass\nreport = SalesReport(&quot;Q1 Sales | Q1 Savdolari&quot;)\nprint(report.generate())\n</code></pre>\n<hr />\n<h3 id=\"19-what-is-an-interface-interfeys-nima\">19. What is an interface? | Interfeys nima?</h3>\n<p><strong>EN:</strong> A <strong>contract</strong> that defines a set of methods with no implementation — all methods must be implemented by classes.</p>\n<p><strong>UZB:</strong> Amalga oshiruvchi metodlarsiz <strong>shartnoma</strong> — barcha metodlar klasslar tomonidan amalga oshirilishi kerak.</p>\n<pre><code class=\"language-python\"># EN: Interface — pure contract, no implementation details\n# UZB: Interfeys — sof shartnoma, amalga oshirish tafsilotlari yo'q\n\nfrom abc import ABC, abstractmethod\n\nclass Serializable(ABC):           # EN: interface | UZB: interfeys\n    @abstractmethod\n    def to_json(self) -&gt; str: pass\n\n    @abstractmethod\n    def to_dict(self) -&gt; dict: pass\n\nclass Cacheable(ABC):\n    @abstractmethod\n    def cache_key(self) -&gt; str: pass\n\n    @abstractmethod\n    def ttl(self) -&gt; int: pass\n\n# EN: Implement multiple interfaces\n# UZB: Bir nechta interfeys amalga oshirish\nclass UserProfile(Serializable, Cacheable):\n    def __init__(self, user_id: int, name: str):\n        self.user_id = user_id\n        self.name = name\n\n    def to_json(self) -&gt; str:\n        import json\n        return json.dumps(self.to_dict())\n\n    def to_dict(self) -&gt; dict:\n        return {&quot;id&quot;: self.user_id, &quot;name&quot;: self.name}\n\n    def cache_key(self) -&gt; str:\n        return f&quot;user:{self.user_id}&quot;\n\n    def ttl(self) -&gt; int:\n        return 3600  # EN: 1 hour | UZB: 1 soat\n\nuser = UserProfile(1, &quot;Alyorjon&quot;)\nprint(user.to_json())       # {&quot;id&quot;: 1, &quot;name&quot;: &quot;Alyorjon&quot;}\nprint(user.cache_key())     # user:1\n</code></pre>\n<hr />\n<h3 id=\"20-what-is-a-virtual-function-virtual-funksiya-nima\">20. What is a virtual function? | Virtual funksiya nima?</h3>\n<p><strong>EN:</strong> A function that <strong>can be overridden</strong> in a derived class. In Python, all methods are virtual by default.</p>\n<p><strong>UZB:</strong> Hosila klassda <strong>qayta yozilishi mumkin</strong> bo'lgan funksiya. Python'da barcha metodlar standart holda virtualdir.</p>\n<pre><code class=\"language-python\"># EN: In Python every method is virtual — subclass can always override\n# UZB: Python'da har bir metod virtual — subklass har doim qayta yoza oladi\n\nclass Logger:\n    def log(self, level: str, message: str):    # EN: virtual | UZB: virtual\n        print(f&quot;[{level.upper()}] {message}&quot;)\n\nclass FileLogger(Logger):\n    def __init__(self, filepath: str):\n        self.filepath = filepath\n\n    def log(self, level: str, message: str):    # EN: overriding | UZB: qayta yozish\n        with open(self.filepath, 'a') as f:\n            f.write(f&quot;[{level.upper()}] {message}\\n&quot;)\n\nclass ColorLogger(Logger):\n    COLORS = {&quot;info&quot;: &quot;\\033[32m&quot;, &quot;error&quot;: &quot;\\033[31m&quot;, &quot;reset&quot;: &quot;\\033[0m&quot;}\n\n    def log(self, level: str, message: str):\n        color = self.COLORS.get(level, &quot;&quot;)\n        print(f&quot;{color}[{level.upper()}] {message}{self.COLORS['reset']}&quot;)\n\ndef process(logger: Logger, msg: str):\n    logger.log(&quot;info&quot;, msg)        # EN: which log() is called? runtime decides\n                                    # UZB: qaysi log() chaqiriladi? runtime hal qiladi\n\nprocess(Logger(), &quot;Server started | Server ishga tushdi&quot;)\nprocess(ColorLogger(), &quot;User logged in | Foydalanuvchi kirdi&quot;)\n</code></pre>\n<hr />\n<h3 id=\"21-what-is-a-pure-virtual-function-sof-virtual-funksiya-nima\">21. What is a pure virtual function? | Sof virtual funksiya nima?</h3>\n<p><strong>EN:</strong> A function that <strong>must be overridden</strong> — has no implementation in the base class (<code>@abstractmethod</code>).</p>\n<p><strong>UZB:</strong> <strong>Qayta yozilishi shart</strong> — asosiy klassda amalga oshirilmagan (<code>@abstractmethod</code>).</p>\n<pre><code class=\"language-python\">from abc import ABC, abstractmethod\n\nclass StorageBackend(ABC):\n    @abstractmethod                        # EN: pure virtual | UZB: sof virtual\n    def read(self, key: str) -&gt; bytes:\n        &quot;&quot;&quot;EN: Must implement in subclass | UZB: Subklassda amalga oshirish shart&quot;&quot;&quot;\n        pass\n\n    @abstractmethod\n    def write(self, key: str, data: bytes) -&gt; bool:\n        pass\n\n    @abstractmethod\n    def delete(self, key: str) -&gt; bool:\n        pass\n\nclass RedisStorage(StorageBackend):\n    def read(self, key: str) -&gt; bytes:\n        print(f&quot;[Redis] Reading: {key}&quot;)\n        return b&quot;data&quot;\n\n    def write(self, key: str, data: bytes) -&gt; bool:\n        print(f&quot;[Redis] Writing {len(data)} bytes to {key}&quot;)\n        return True\n\n    def delete(self, key: str) -&gt; bool:\n        print(f&quot;[Redis] Deleting: {key}&quot;)\n        return True\n\nredis = RedisStorage()\nredis.write(&quot;session:123&quot;, b&quot;user_data&quot;)\nprint(redis.read(&quot;session:123&quot;))\n</code></pre>\n<hr />\n<h3 id=\"22-what-is-dynamic-method-dispatch-dinamik-metod-chaqirish-nima\">22. What is dynamic method dispatch? | Dinamik metod chaqirish nima?</h3>\n<p><strong>EN:</strong> The process of <strong>resolving which method to call at runtime</strong> based on the actual object type.</p>\n<p><strong>UZB:</strong> Haqiqiy obyekt turiga qarab <strong>qaysi metod chaqirilishini runtime'da hal qilish</strong> jarayoni.</p>\n<pre><code class=\"language-python\"># EN: Python resolves method calls at runtime — dynamic dispatch\n# UZB: Python metod chaqiruvlarini runtime'da hal qiladi — dinamik chaqirish\n\nclass TaxCalculator:\n    def calculate(self, amount: float) -&gt; float:\n        return amount * 0.10    # EN: 10% default | UZB: 10% standart\n\nclass UzbekTax(TaxCalculator):\n    def calculate(self, amount: float) -&gt; float:\n        return amount * 0.12    # UZB: O'zbekiston QQS 12%\n\nclass EUTax(TaxCalculator):\n    def calculate(self, amount: float) -&gt; float:\n        return amount * 0.20    # EN: EU VAT 20% | UZB: Evropa QQS 20%\n\ndef process_order(calculator: TaxCalculator, price: float):\n    # EN: Which calculate() runs? Decided at runtime based on actual type\n    # UZB: Qaysi calculate() ishlaydi? Haqiqiy turga qarab runtime'da aniqlanadi\n    tax = calculator.calculate(price)\n    print(f&quot;Price: ${price:.2f} | Tax: ${tax:.2f} | Total: ${price + tax:.2f}&quot;)\n\nprocess_order(UzbekTax(), 100_000)   # Uzbek tax\nprocess_order(EUTax(), 100_000)      # EU tax\n</code></pre>\n<hr />\n<h3 id=\"23-what-is-composition-in-oop-oopda-kompozitsiya-nima\">23. What is composition in OOP? | OOP'da kompozitsiya nima?</h3>\n<p><strong>EN:</strong> A design where a class <strong>contains objects of other classes</strong> — \"has-a\" relationship. Preferred over inheritance.</p>\n<p><strong>UZB:</strong> Klass <strong>boshqa klasslar obyektlarini o'z ichiga oladi</strong> — \"has-a\" munosabati. Merosdan ustun ko'riladi.</p>\n<pre><code class=\"language-python\"># EN: Composition — build complex objects from simpler ones\n# UZB: Kompozitsiya — murakkab obyektlarni oddiylaridan qurish\n\nclass Engine:\n    def __init__(self, horsepower: int):\n        self.horsepower = horsepower\n\n    def start(self) -&gt; str:\n        return f&quot;Engine ({self.horsepower}hp) started | dvigatel ishga tushdi&quot;\n\nclass GPS:\n    def navigate(self, destination: str) -&gt; str:\n        return f&quot;Navigating to {destination} | {destination} ga yo'l ko'rsatilmoqda&quot;\n\nclass MusicPlayer:\n    def play(self, song: str) -&gt; str:\n        return f&quot;Playing: {song}&quot;\n\nclass SmartCar:\n    # EN: SmartCar HAS-A Engine, GPS, MusicPlayer — composition\n    # UZB: SmartCar Engine, GPS, MusicPlayer GA EGA — kompozitsiya\n    def __init__(self, brand: str):\n        self.brand = brand\n        self.engine = Engine(300)\n        self.gps = GPS()\n        self.music = MusicPlayer()\n\n    def trip(self, destination: str, song: str):\n        print(self.engine.start())\n        print(self.gps.navigate(destination))\n        print(self.music.play(song))\n\ncar = SmartCar(&quot;BMW&quot;)\ncar.trip(&quot;Tashkent&quot;, &quot;Lo'licha&quot;)\n</code></pre>\n<hr />\n<h3 id=\"24-what-is-aggregation-agregatsiya-nima\">24. What is aggregation? | Agregatsiya nima?</h3>\n<p><strong>EN:</strong> A <strong>weak form of association</strong> — one class uses another, but they can <strong>exist independently</strong>.</p>\n<p><strong>UZB:</strong> <strong>Zaif assotsiatsiya shakli</strong> — bir klass boshqasini ishlatadi, lekin ular <strong>mustaqil mavjud bo'la oladi</strong>.</p>\n<pre><code class=\"language-python\"># EN: Aggregation — objects can live without each other\n# UZB: Agregatsiya — obyektlar bir-birisiz yashay oladi\n\nclass Address:\n    def __init__(self, city: str, street: str):\n        self.city = city\n        self.street = street\n\n    def __str__(self):\n        return f&quot;{self.street}, {self.city}&quot;\n\nclass Employee:\n    def __init__(self, name: str, address: 'Address'):\n        self.name = name\n        self.address = address    # EN: aggregation — Address can exist without Employee\n                                  # UZB: agregatsiya — Address Employee'siz yashay oladi\n\n# EN: Address exists independently\n# UZB: Address mustaqil mavjud\nhome = Address(&quot;Tashkent&quot;, &quot;Amir Temur ko'chasi 1&quot;)\noffice = Address(&quot;Tashkent&quot;, &quot;Yunusobod 7&quot;)\n\nemp1 = Employee(&quot;Alyorjon&quot;, home)\nemp2 = Employee(&quot;Jasur&quot;, home)      # EN: same address — shared object\n                                     # UZB: bir xil manzil — ulashilgan obyekt\n\ndel emp1                             # EN: deleting employee doesn't delete address\n                                     # UZB: xodimni o'chirsak manzil yo'qolmaydi\nprint(home)                          # Amir Temur ko'chasi 1, Tashkent — hali mavjud\n</code></pre>\n<hr />\n<h3 id=\"25-what-is-association-assotsiatsiya-nima\">25. What is association? | Assotsiatsiya nima?</h3>\n<p><strong>EN:</strong> A relationship where <strong>one class uses or interacts with another</strong>.</p>\n<p><strong>UZB:</strong> Bir klass <strong>boshqasini ishlata olishi yoki u bilan o'zaro ta'sir qilishi</strong> munosabati.</p>\n<pre><code class=\"language-python\"># EN: Association — two classes interact but neither owns the other\n# UZB: Assotsiatsiya — ikki klass o'zaro ta'sir qiladi, lekin biri ikkinchisiga tegishli emas\n\nclass Teacher:\n    def __init__(self, name: str, subject: str):\n        self.name = name\n        self.subject = subject\n\n    def teach(self, student: 'Student') -&gt; str:\n        return f&quot;{self.name} teaches {self.subject} to {student.name}&quot;\n\nclass Student:\n    def __init__(self, name: str):\n        self.name = name\n        self.grades = {}\n\n    def receive_grade(self, subject: str, grade: float):\n        self.grades[subject] = grade\n        print(f&quot;{self.name} got {grade} in {subject}&quot;)\n\n# EN: Teacher and Student are associated — they interact\n# UZB: O'qituvchi va talaba bog'liq — ular o'zaro ta'sir qiladi\nteacher = Teacher(&quot;Sardor&quot;, &quot;Python&quot;)\nstudent = Student(&quot;Alyorjon&quot;)\n\nprint(teacher.teach(student))\nstudent.receive_grade(&quot;Python&quot;, 95)\n</code></pre>\n<hr />\n<h3 id=\"2627-what-is-coupling-qovushish-nima\">26–27. What is coupling? | Qovushish nima?</h3>\n<p><strong>EN:</strong> The degree to which <strong>one class is dependent on another</strong>. Low coupling = flexible, maintainable code.</p>\n<p><strong>UZB:</strong> Bir klassning <strong>boshqasiga bog'liqligi darajasi</strong>. Past qovushish = moslashuvchan, qo'llab-quvvatlanadigan kod.</p>\n<pre><code class=\"language-python\"># EN: HIGH coupling — bad, tightly dependent\n# UZB: YUQORI qovushish — yomon, qat'iy bog'liq\n\nclass MySQLDatabaseBAD:\n    def query(self, sql):\n        return f&quot;MySQL: {sql}&quot;\n\nclass UserServiceBAD:\n    def __init__(self):\n        self.db = MySQLDatabaseBAD()    # EN: hard dependency — can't swap DB\n                                         # UZB: qattiq bog'liqlik — DB'ni almashtirb bo'lmaydi\n\n# EN: LOW coupling — good, depends on abstraction\n# UZB: PAST qovushish — yaxshi, abstraktsiyaga bog'liq\n\nfrom abc import ABC, abstractmethod\n\nclass Database(ABC):\n    @abstractmethod\n    def query(self, sql: str) -&gt; str: pass\n\nclass PostgreSQL(Database):\n    def query(self, sql: str) -&gt; str:\n        return f&quot;[PostgreSQL] {sql}&quot;\n\nclass SQLite(Database):\n    def query(self, sql: str) -&gt; str:\n        return f&quot;[SQLite] {sql}&quot;\n\nclass UserService:\n    def __init__(self, db: Database):   # EN: dependency injection | UZB: bog'liqlik kiritish\n        self.db = db\n\n    def get_user(self, user_id: int):\n        return self.db.query(f&quot;SELECT * FROM users WHERE id={user_id}&quot;)\n\n# EN: Easy to swap database | UZB: DB'ni oson almashtirish\nsvc = UserService(PostgreSQL())\nprint(svc.get_user(1))\nsvc2 = UserService(SQLite())\nprint(svc2.get_user(1))\n</code></pre>\n<hr />\n<h3 id=\"28-what-is-cohesion-koheziya-nima\">28. What is cohesion? | Koheziya nima?</h3>\n<p><strong>EN:</strong> The measure of how <strong>closely related the responsibilities</strong> of a class are. High cohesion = one class, one purpose.</p>\n<p><strong>UZB:</strong> Klass mas'uliyatlarining <strong>qanchalik yaqin bog'liqligi</strong> o'lchovi. Yuqori koheziya = bir klass, bir maqsad.</p>\n<pre><code class=\"language-python\"># EN: LOW cohesion — class does too many unrelated things\n# UZB: PAST koheziya — klass juda ko'p bog'liq bo'lmagan ishlarni qiladi\n\nclass MessyClass:              # EN: God class — anti-pattern!\n    def save_user(self): pass  # UZB: Xudo klassi — anti-pattern!\n    def send_email(self): pass\n    def generate_pdf(self): pass\n    def calculate_tax(self): pass\n    def resize_image(self): pass\n\n# EN: HIGH cohesion — each class has single, clear responsibility\n# UZB: YUQORI koheziya — har bir klassning bir aniq mas'uliyati bor\n\nclass UserRepository:          # EN: only user DB operations\n    def save(self, user): pass # UZB: faqat foydalanuvchi DB operatsiyalari\n    def find(self, i
