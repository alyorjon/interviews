D ga, eski ma'lumotlarni HDD ga joylashtirish imkonini beradi.<br />\n<strong>EN:</strong> Tablespace defines the physical storage location for database objects. Allows placing hot tables on SSD and cold data on HDD.</p>\n</blockquote>\n<pre><code class=\"language-sql\">CREATE TABLESPACE fast_ssd LOCATION '/mnt/ssd/pg_data';\nCREATE TABLE hot_table (...) TABLESPACE fast_ssd;\nCREATE INDEX idx_hot ON hot_table(id) TABLESPACE fast_ssd;\n</code></pre>\n<hr />\n<p><strong>60. PostgreSQL konfiguratsiya asosiy parametrlari?</strong></p>\n<table>\n<thead>\n<tr>\n<th>Parametr</th>\n<th>Tavsiya</th>\n<th>Izoh / Note</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>shared_buffers</code></td>\n<td>RAM ning 25%</td>\n<td>Kesh hajmi / Cache size</td>\n</tr>\n<tr>\n<td><code>work_mem</code></td>\n<td>4MB–64MB</td>\n<td>Sort/hash uchun / Per sort/hash</td>\n</tr>\n<tr>\n<td><code>maintenance_work_mem</code></td>\n<td>256MB+</td>\n<td>VACUUM, index uchun</td>\n</tr>\n<tr>\n<td><code>max_connections</code></td>\n<td>100–200</td>\n<td>PgBouncer bilan kamroq</td>\n</tr>\n<tr>\n<td><code>wal_buffers</code></td>\n<td>16MB</td>\n<td>WAL keshi / WAL cache</td>\n</tr>\n<tr>\n<td><code>checkpoint_completion_target</code></td>\n<td>0.9</td>\n<td>Yumshoq checkpoint</td>\n</tr>\n<tr>\n<td><code>effective_cache_size</code></td>\n<td>RAM ning 75%</td>\n<td>Planner uchun hint</td>\n</tr>\n<tr>\n<td><code>random_page_cost</code></td>\n<td>SSD: 1.1, HDD: 4.0</td>\n<td>Index tanlov uchun</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<p><strong>61. Index Bloat va Table Bloat nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Bloat — MVCC tufayli yig'ilib qolgan o'lik tuple lar va bo'sh indeks sahifalari. <code>VACUUM</code> oddiy bloatni tozalaydi, <code>VACUUM FULL</code> jadvalni to'liq qayta yozadi (lock talab qiladi). <code>pgstattuple</code> kengaytmasi bloatni o'lchaydi.<br />\n<strong>EN:</strong> Bloat is accumulated dead tuples and empty index pages due to MVCC. <code>VACUUM</code> cleans regular bloat; <code>VACUUM FULL</code> rewrites tables (requires lock). Measure with <code>pgstattuple</code>.</p>\n</blockquote>\n<hr />\n<p><strong>62. pg_partman kengaytmasi nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>pg_partman</code> — PostgreSQL partition larini avtomatik yaratish va boshqarish kengaytmasi. Yangi oy/hafta/kun boshlanishida avtomatik yangi partition yaratadi va eskilarini arxivlaydi.<br />\n<strong>EN:</strong> <code>pg_partman</code> automates partition creation and management — automatically creates new time-based partitions and archives old ones.</p>\n</blockquote>\n<hr />\n<p><strong>63. Logical Decoding va Change Data Capture (CDC)?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Logical Decoding — WAL oqimini inson o'qiy oladigan formatga (JSON, Avro) aylantirishga imkon beradi. CDC uchun ishlatiladi. <code>wal2json</code>, <code>pgoutput</code> kabi plugin lar bilan Kafka, Debezium bilan integratsiya qilinadi.<br />\n<strong>EN:</strong> Logical Decoding transforms the WAL stream into human-readable formats (JSON, Avro) for CDC. Integrates with Kafka, Debezium via plugins like <code>wal2json</code>, <code>pgoutput</code>.</p>\n</blockquote>\n<hr />\n<p><strong>64. PostGIS kengaytmasi nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>PostGIS</code> — PostgreSQL uchun geografik ob'ektlar qo'llab-quvvatlash kengaytmasi. Nuqta, chiziq, ko'pburchak va boshqa geometrik turlar. Masofani hisoblash, kesishma, koordinata bo'yicha qidirish imkonlari bor.<br />\n<strong>EN:</strong> <code>PostGIS</code> adds geographic object support to PostgreSQL — points, lines, polygons. Supports distance calculation, intersection, coordinate-based search.</p>\n</blockquote>\n<pre><code class=\"language-sql\">CREATE EXTENSION postgis;\n\nCREATE TABLE locations (\n    id   SERIAL PRIMARY KEY,\n    name TEXT,\n    geom GEOMETRY(Point, 4326)  -- WGS 84 koordinatasi\n);\n\n-- 5 km ichidagi joylar / Places within 5km\nSELECT name\nFROM locations\nWHERE ST_DWithin(\n    geom::geography,\n    ST_MakePoint(69.2401, 41.2995)::geography,  -- Toshkent\n    5000  -- metr\n);\n</code></pre>\n<hr />\n<p><strong>65. Foreign Data Wrapper (FDW) nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> FDW — PostgreSQL dan boshqa ma'lumotlar manbalari (boshqa PostgreSQL, MySQL, Oracle, CSV, REST API) ga SQL orqali murojaat qilish imkonini beruvchi mexanizm.<br />\n<strong>EN:</strong> FDW allows querying external data sources (other PostgreSQL, MySQL, Oracle, CSV, REST API) via SQL from within PostgreSQL.</p>\n</blockquote>\n<pre><code class=\"language-sql\">CREATE EXTENSION postgres_fdw;\n\nCREATE SERVER remote_db FOREIGN DATA WRAPPER postgres_fdw\nOPTIONS (host '192.168.1.100', dbname 'analytics');\n\nCREATE USER MAPPING FOR current_user\nSERVER remote_db OPTIONS (user 'reader', password 'secret');\n\nCREATE FOREIGN TABLE remote_sales (...)\nSERVER remote_db OPTIONS (schema_name 'public', table_name 'sales');\n\nSELECT * FROM remote_sales WHERE date &gt; '2025-01-01';\n</code></pre>\n<hr />\n<p><strong>66. pgvector kengaytmasi nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>pgvector</code> — PostgreSQL da vektor o'xshashlik qidiruvini (vector similarity search) qo'shuvchi kengaytma. AI/ML ilovalar, embedding qidirish, RAG (Retrieval-Augmented Generation) uchun ishlatiladi.<br />\n<strong>EN:</strong> <code>pgvector</code> adds vector similarity search to PostgreSQL — used for AI/ML apps, embedding search, and RAG (Retrieval-Augmented Generation).</p>\n</blockquote>\n<pre><code class=\"language-sql\">CREATE EXTENSION vector;\n\nCREATE TABLE documents (\n    id        SERIAL PRIMARY KEY,\n    content   TEXT,\n    embedding VECTOR(1536)  -- OpenAI embedding o'lchami\n);\n\nCREATE INDEX ON documents USING ivfflat (embedding vector_cosine_ops);\n\n-- Eng o'xshash hujjatlarni topish / Find most similar documents\nSELECT content, embedding &lt;=&gt; '[0.1, 0.2, ...]'::vector AS distance\nFROM documents\nORDER BY distance\nLIMIT 5;\n</code></pre>\n<hr />\n<p><strong>67. Row Level Security (RLS) nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> RLS — jadval darajasida foydalanuvchiga ko'ra qatorlarni filtrlash. Har bir foydalanuvchi faqat o'ziga tegishli ma'lumotlarni ko'radi. Multi-tenant ilovalar uchun ideal.<br />\n<strong>EN:</strong> RLS filters table rows based on the current user — each user sees only their own data. Ideal for multi-tenant applications.</p>\n</blockquote>\n<pre><code class=\"language-sql\">ALTER TABLE orders ENABLE ROW LEVEL SECURITY;\n\n-- Foydalanuvchi faqat o'z buyurtmalarini ko'radi\nCREATE POLICY user_orders ON orders\n    USING (user_id = current_setting('app.current_user_id')::INT);\n\n-- Admin hamma narsani ko'radi\nCREATE POLICY admin_all ON orders\n    TO admin_role\n    USING (TRUE);\n</code></pre>\n<hr />\n<p><strong>68. Asynchronous PostgreSQL (asyncpg) Python da?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>asyncpg</code> — Python uchun eng tez async PostgreSQL driver. FastAPI bilan birgalikda ishlatiladi. <code>SQLAlchemy 2.0</code> ham async rejimni <code>asyncpg</code> orqali qo'llab-quvvatlaydi.<br />\n<strong>EN:</strong> <code>asyncpg</code> is the fastest async PostgreSQL driver for Python. Used with FastAPI. SQLAlchemy 2.0 also supports async mode via <code>asyncpg</code>.</p>\n</blockquote>\n<pre><code class=\"language-python\">import asyncpg\n\nasync def main():\n    conn = await asyncpg.connect(\n        host='localhost', database='mydb',\n        user='postgres', password='secret'\n    )\n    rows = await conn.fetch(\n        'SELECT * FROM users WHERE is_active = $1', True\n    )\n    await conn.close()\n\n# SQLAlchemy async\nfrom sqlalchemy.ext.asyncio import create_async_engine, AsyncSession\n\nengine = create_async_engine(\n    &quot;postgresql+asyncpg://user:pass@localhost/db&quot;,\n    pool_size=10, max_overflow=20\n)\n</code></pre>\n<hr />\n<p><strong>69. Explain output ni qanday o'qish?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> EXPLAIN chiqishidagi asosiy atamalar:\n- <strong>Seq Scan</strong> — to'liq jadval skaneri (indeks yo'q yoki undan foydalanilmayapti)\n- <strong>Index Scan</strong> — indeks orqali qidirish\n- <strong>Index Only Scan</strong> — faqat indeksdan javob (covering index)\n- <strong>Bitmap Heap Scan</strong> — bir nechta indeks natijalarini birlashtirish\n- <strong>Hash Join / Nested Loop / Merge Join</strong> — JOIN strategiyalari\n- <strong>cost=X..Y</strong> — X: birinchi qatorga qiymati, Y: barcha qatorlarga qiymati<br />\n<strong>EN:</strong> Key EXPLAIN terms: <strong>Seq Scan</strong> (full scan, no index), <strong>Index Scan</strong> (uses index), <strong>Index Only Scan</strong> (answer from index alone), <strong>Bitmap Heap Scan</strong> (combines multiple index results), <strong>cost=X..Y</strong> (X: startup, Y: total).</p>\n</blockquote>\n<hr />\n<p><strong>70. pg_dump va pg_restore nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>pg_dump</code> — ma'lumotlar bazasining zaxira nusxasini yaratadi (SQL yoki custom format). <code>pg_restore</code> — custom format zaxiralarni tiklaydi. <code>pg_dumpall</code> — barcha MB larni zaxiralaydi.<br />\n<strong>EN:</strong> <code>pg_dump</code> creates database backups (SQL or custom format). <code>pg_restore</code> restores custom format backups. <code>pg_dumpall</code> backs up all databases.</p>\n</blockquote>\n<pre><code class=\"language-bash\"># Custom format (siqilgan / compressed)\npg_dump -h localhost -U postgres -Fc mydb &gt; mydb.dump\n\n# Tiklash / Restore\npg_restore -h localhost -U postgres -d mydb_new mydb.dump\n\n# SQL format\npg_dump -h localhost -U postgres mydb &gt; mydb.sql\n\n# Parallel tiklash (8 ta jarayon / 8 processes)\npg_restore -j 8 -d mydb_new mydb.dump\n</code></pre>\n<hr />\n<p><strong>71. Monitoring uchun muhim PostgreSQL ko'rinishlari?</strong></p>\n<pre><code class=\"language-sql\">-- Faol so'rovlar / Active queries\nSELECT pid, now() - pg_stat_activity.query_start AS duration, query\nFROM pg_stat_activity\nWHERE state = 'active'\nORDER BY duration DESC;\n\n-- Jadval statistikasi / Table statistics\nSELECT schemaname, tablename, n_live_tup, n_dead_tup,\n       last_vacuum, last_autovacuum\nFROM pg_stat_user_tables ORDER BY n_dead_tup DESC;\n\n-- Indeks ishlatilishi / Index usage\nSELECT indexrelname, idx_scan, idx_tup_read\nFROM pg_stat_user_indexes\nORDER BY idx_scan ASC;  -- Kam ishlatiladigan indekslar / Unused indexes\n\n-- Kesh samaradorligi / Cache hit ratio\nSELECT sum(heap_blks_hit) / (sum(heap_blks_hit) + sum(heap_blks_read)) AS ratio\nFROM pg_statio_user_tables;\n-- &gt; 0.99 bo'lishi kerak / Should be &gt; 0.99\n</code></pre>\n<hr />\n<p><strong>72. Unlogged Table nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>UNLOGGED TABLE</code> — WAL ga yozmaydigan jadval. Yozish 10x tezroq, lekin server ishlamay qolsa ma'lumotlar yo'qoladi. Vaqtinchalik ma'lumotlar, kesh jadvallar, test uchun mos.<br />\n<strong>EN:</strong> <code>UNLOGGED TABLE</code> skips WAL writes — 10x faster writes but data is lost on server crash. Good for temporary data, caches, and testing.</p>\n</blockquote>\n<pre><code class=\"language-sql\">CREATE UNLOGGED TABLE temp_calculations (\n    id    SERIAL,\n    value NUMERIC,\n    result NUMERIC\n);\n</code></pre>\n<hr />\n<p><strong>73. PostgreSQL da Sharding nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Sharding — ma'lumotlarni bir nechta PostgreSQL server o'rtasida gorizontal taqsimlash. PostgreSQL nativ sharding ni to'liq qo'llab-quvvatlamaydi — buning uchun <code>Citus</code>, <code>pg_shard</code>, yoki tashqi middleware ishlatiladi.<br />\n<strong>EN:</strong> Sharding distributes data horizontally across multiple PostgreSQL servers. PostgreSQL doesn't natively support full sharding — use <code>Citus</code>, <code>pg_shard</code>, or external middleware.</p>\n</blockquote>\n<hr />\n<p><strong>74. Hot Standby va Streaming Replication sozlash?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Primary da <code>wal_level = replica</code>, <code>max_wal_senders &gt;= 1</code>, <code>hot_standby = on</code> sozlanadi. Standby da <code>primary_conninfo</code> belgilanadi. Standby faqat o'qish (read-only) uchun so'rovlarni qabul qiladi.<br />\n<strong>EN:</strong> On primary: <code>wal_level = replica</code>, <code>max_wal_senders &gt;= 1</code>. On standby: configure <code>primary_conninfo</code>. Standby accepts read-only queries.</p>\n</blockquote>\n<hr />\n<p><strong>75. Expression Index (Ifoda indeksi) nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Expression Index — ustun qiymatidan ko'ra funksiya yoki ifoda natijasiga yaratilgan indeks. So'rovda ham xuddi shu ifoda ishlatilganda indeks qo'llaniladi.<br />\n<strong>EN:</strong> Expression Index is built on a function or expression result, not just a column. The query must use the same expression to use the index.</p>\n</blockquote>\n<pre><code class=\"language-sql\">-- Katta-kichik harfga bog'liq bo'lmagan email qidirish\nCREATE INDEX idx_lower_email ON users(LOWER(email));\n\n-- Bu so'rov indeksdan foydalanadi / This query uses the index:\nSELECT * FROM users WHERE LOWER(email) = 'ali@example.com';\n\n-- Yil bo'yicha indeks / Index by year\nCREATE INDEX idx_order_year ON orders(EXTRACT(YEAR FROM created_at));\n</code></pre>\n<hr />\n<p><strong>76. Alembic bilan PostgreSQL Migration?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>Alembic</code> — SQLAlchemy uchun ma'lumotlar bazasi migratsiya vositasi. FastAPI + PostgreSQL proyektlarida keng ishlatiladi. <code>alembic revision --autogenerate</code> model o'zgarishlarini avtomatik migratsiyaga aylantiradi.<br />\n<strong>EN:</strong> <code>Alembic</code> is a database migration tool for SQLAlchemy, widely used in FastAPI + PostgreSQL projects. <code>alembic revision --autogenerate</code> auto-generates migrations from model changes.</p>\n</blockquote>\n<pre><code class=\"language-bash\">alembic init alembic\nalembic revision --autogenerate -m &quot;add users table&quot;\nalembic upgrade head\nalembic downgrade -1\n</code></pre>\n<hr />\n<p><strong>77. pg_bouncer sozlash?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> PgBouncer connection pooler sozlamalarining asosiy parametrlari:\n- <code>pool_mode</code>: <code>session</code> (har bir session uchun), <code>transaction</code> (tranzaksiya uchun — eng ommabop), <code>statement</code> (bayonot uchun)\n- <code>max_client_conn</code>: maksimal client ulanishlari\n- <code>default_pool_size</code>: har bir DB/user juftligi uchun ulanishlar soni<br />\n<strong>EN:</strong> Key PgBouncer settings: <code>pool_mode</code> (<code>transaction</code> most popular), <code>max_client_conn</code> (max client connections), <code>default_pool_size</code> (connections per DB/user pair).</p>\n</blockquote>\n<hr />\n<p><strong>78. TOAST nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> TOAST (The Oversized-Attribute Storage Technique) — PostgreSQL da katta qiymatlarni (8KB dan katta) saqlash mexanizmi. Katta TEXT, BYTEA, JSONB qiymatlarini alohida TOAST jadvalida siqib saqlaydi.<br />\n<strong>EN:</strong> TOAST (The Oversized-Attribute Storage Technique) handles large values (&gt;8KB) by compressing and storing them in a separate TOAST table — for TEXT, BYTEA, JSONB.</p>\n</blockquote>\n<hr />\n<p><strong>79. Event Trigger nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Event Trigger — DDL hodisalarida (<code>CREATE</code>, <code>ALTER</code>, <code>DROP</code>) ishga tushadigan trigger. Oddiy trigger DML (INSERT/UPDATE/DELETE) uchun, Event Trigger DDL uchun.<br />\n<strong>EN:</strong> Event Trigger fires on DDL events (<code>CREATE</code>, <code>ALTER</code>, <code>DROP</code>), unlike regular triggers which fire on DML (INSERT/UPDATE/DELETE).</p>\n</blockquote>\n<pre><code class=\"language-sql\">CREATE OR REPLACE FUNCTION log_ddl()\nRETURNS event_trigger AS $$\nBEGIN\n    INSERT INTO ddl_audit_log(event, command, executed_at)\n    VALUES (tg_event, tg_tag, NOW());\nEND;\n$$ LANGUAGE plpgsql;\n\nCREATE EVENT TRIGGER ddl_logger\nON ddl_command_end\nEXECUTE FUNCTION log_ddl();\n</code></pre>\n<hr />\n<p><strong>80. pg_upgrade nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>pg_upgrade</code> — PostgreSQL major versiyasini (masalan, 14 → 16) ma'lumotlarni to'liq dump/restore qilmasdan yangilash vositasi. <code>--link</code> rejimi juda tez, lekin eski versiyaga qaytish imkonsiz.<br />\n<strong>EN:</strong> <code>pg_upgrade</code> upgrades PostgreSQL major versions (e.g., 14→16) without full dump/restore. <code>--link</code> mode is very fast but prevents rollback to old version.</p>\n</blockquote>\n<hr />\n<h2 id=\"4-ekspert-daraja-expert\">4. Ekspert daraja / Expert</h2>\n<p><strong>81. Index Scan vs Bitmap Heap Scan vs Sequential Scan qachon qo'llaniladi?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Planner tanlovini belgilovchi omillar: <strong>Seq Scan</strong> — kichik jadvallar yoki ko'p qator qaytarilganda (&gt;15-20% jadval); <strong>Index Scan</strong> — kam qator, random access; <strong>Bitmap Heap Scan</strong> — o'rta miqdordagi qatorlar, bir nechta indeks natijalarini birlashtirish.<br />\n<strong>EN:</strong> <strong>Seq Scan</strong> — small tables or returning many rows (&gt;15-20% of table). <strong>Index Scan</strong> — few rows, random access. <strong>Bitmap Heap Scan</strong> — medium rows, combining multiple index results.</p>\n</blockquote>\n<hr />\n<p><strong>82. Planner nega indeksni ishlatmayapti?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Sabablari: statistika eskirgan (ANALYZE kerak), so'rovda funksiya ishlatilgan (<code>WHERE UPPER(name) = 'ALI'</code> — expression index kerak), indeks ustuni implicit cast bilan ishlatilgan, juda ko'p qator qaytarilishi kutilmoqda, <code>random_page_cost</code> noto'g'ri sozlangan.<br />\n<strong>EN:</strong> Reasons: stale statistics (run ANALYZE), function used on column (needs expression index), implicit type cast, too many rows expected, misconfigured <code>random_page_cost</code>.</p>\n</blockquote>\n<pre><code class=\"language-sql\">-- random_page_cost ni SSD uchun tuzatish\nSET random_page_cost = 1.1;\n\n-- Yoki postgresql.conf da\n-- random_page_cost = 1.1\n</code></pre>\n<hr />\n<p><strong>83. N+1 muammosi nima va qanday hal qilish?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> N+1 — 1 ta asosiy so'rov + N ta qo'shimcha so'rov (har bir natija uchun). ORM da ko'p uchraydi. Yechim: <code>JOIN</code> bilan bitta so'rovga birlashtirish, <code>SELECT IN</code>, ORM da eager loading (<code>joinedload</code>, <code>selectinload</code>).<br />\n<strong>EN:</strong> N+1: 1 main query + N additional queries (one per result). Common in ORMs. Fix: combine with <code>JOIN</code>, <code>SELECT IN</code>, or ORM eager loading (<code>joinedload</code>, <code>selectinload</code>).</p>\n</blockquote>\n<pre><code class=\"language-python\"># SQLAlchemy da N+1 / N+1 in SQLAlchemy\n# YOMON / BAD:\nusers = session.query(User).all()\nfor user in users:\n    print(user.orders)  # Har bir user uchun yangi so'rov / New query per user\n\n# YAXSHI / GOOD:\nfrom sqlalchemy.orm import selectinload\nusers = session.query(User).options(selectinload(User.orders)).all()\n</code></pre>\n<hr />\n<p><strong>84. Sharding vs Partitioning farqi?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <strong>Partitioning</strong> — bitta PostgreSQL serverida jadvalni bo'laklarga ajratish (mantiqiy va fizik). <strong>Sharding</strong> — ma'lumotlarni bir nechta PostgreSQL server (node) o'rtasida taqsimlash. Sharding gorizontal kengayish (horizontal scaling) uchun.<br />\n<strong>EN:</strong> <strong>Partitioning</strong> — splitting a table within one PostgreSQL server. <strong>Sharding</strong> — distributing data across multiple PostgreSQL servers for horizontal scaling.</p>\n</blockquote>\n<hr />\n<p><strong>85. LISTEN/NOTIFY nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>LISTEN</code>/<code>NOTIFY</code> — PostgreSQL ning o'rnatilgan async xabar almashish mexanizmi. Bir sessiya <code>LISTEN channel</code> qiladi, boshqasi <code>NOTIFY channel, 'payload'</code> yuboradi. Real-time ogohlantirish, pub/sub uchun ishlatiladi.<br />\n<strong>EN:</strong> <code>LISTEN</code>/<code>NOTIFY</code> is PostgreSQL's built-in async messaging. One session <code>LISTEN</code>s, another <code>NOTIFY</code>s. Used for real-time notifications and pub/sub.</p>\n</blockquote>\n<pre><code class=\"language-sql\">-- Bir sessiyada / In one session:\nLISTEN order_updates;\n\n-- Boshqa sessiyada / In another session:\nNOTIFY order_updates, '{&quot;order_id&quot;: 42, &quot;status&quot;: &quot;shipped&quot;}';\n</code></pre>\n<pre><code class=\"language-python\"># asyncpg bilan / with asyncpg\nasync def listen_notifications():\n    conn = await asyncpg.connect(...)\n    await conn.add_listener('order_updates', callback)\n</code></pre>\n<hr />\n<p><strong>86. pg_logical va Debezium CDC integratsiyasi?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>pg_logical</code> kengaytmasi yoki PostgreSQL 10+ dagi <code>pgoutput</code> plugin bilan Debezium CDC ni sozlash: <code>wal_level = logical</code> qo'yish, replikatsiya sloti yaratish, Debezium PostgreSQL connectorini sozlash, Kafka topic larida o'zgarishlarni olish.<br />\n<strong>EN:</strong> Configure CDC via <code>pg_logical</code> or <code>pgoutput</code> (PG 10+): set <code>wal_level = logical</code>, create replication slot, configure Debezium PostgreSQL connector, receive changes in Kafka topics.</p>\n</blockquote>\n<hr />\n<p><strong>87. Vakuum agressivligi va bloat boshqaruvi?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Muammolar: <code>n_dead_tup</code> yuqori bo'lsa → autovacuum etmayapti. Yechim: <code>autovacuum_vacuum_scale_factor</code> ni kamaytirish, katta jadvallar uchun <code>autovacuum_vacuum_threshold</code> ni sozlash, <code>pg_repack</code> kengaytmasi bilan lock qilmasdan bloatni tozalash.<br />\n<strong>EN:</strong> Problem: high <code>n_dead_tup</code> → autovacuum not keeping up. Fix: lower <code>autovacuum_vacuum_scale_factor</code>, tune <code>autovacuum_vacuum_threshold</code> for large tables, use <code>pg_repack</code> to clean bloat without locks.</p>\n</blockquote>\n<hr />\n<p><strong>88. TimescaleDB nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>TimescaleDB</code> — PostgreSQL uchun vaqt qatorlari ma'lumotlari (time-series) kengaytmasi. Hypertable, continuous aggregation, data retention policies va boshqalar. IoT, monitoring, metrik ma'lumotlar uchun ideal.<br />\n<strong>EN:</strong> <code>TimescaleDB</code> is a PostgreSQL extension for time-series data. Features: hypertables, continuous aggregations, data retention policies. Ideal for IoT, monitoring, metrics.</p>\n</blockquote>\n<pre><code class=\"language-sql\">CREATE EXTENSION timescaledb;\n\nCREATE TABLE metrics (\n    time   TIMESTAMPTZ NOT NULL,\n    device TEXT,\n    value  DOUBLE PRECISION\n);\n\nSELECT create_hypertable('metrics', 'time');\n\n-- Continuous aggregate / Uzluksiz agregat\nCREATE MATERIALIZED VIEW hourly_avg\nWITH (timescaledb.continuous) AS\nSELECT time_bucket('1 hour', time) AS hour, device, AVG(value)\nFROM metrics GROUP BY 1, 2;\n</code></pre>\n<hr />\n<p><strong>89. Patroni nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>Patroni</code> — PostgreSQL uchun yuqori mavjudlik (High Availability) framework. Avtomatik failover, leader election (etcd/ZooKeeper/Consul orqali), configuration management. Kubernetes bilan ham yaxshi ishlaydi.<br />\n<strong>EN:</strong> <code>Patroni</code> is a High Availability framework for PostgreSQL. Provides automatic failover, leader election via etcd/ZooKeeper/Consul, and configuration management. Works well with Kubernetes.</p>\n</blockquote>\n<hr />\n<p><strong>90. PostgreSQL Security hardening?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Asosiy xavfsizlik choralari: <code>pg_hba.conf</code> da IP filtrlash, SSL majburiy qilish (<code>ssl = on</code>), <code>superuser</code> uchun alohida hisob, minimal imtiyoz tamoyili, <code>public</code> schemani o'chirish, <code>pg_audit</code> kengaytmasi bilan audit, parollarni <code>scram-sha-256</code> bilan shifrlash.<br />\n<strong>EN:</strong> Key security measures: IP filtering in <code>pg_hba.conf</code>, enforce SSL (<code>ssl = on</code>), separate superuser account, least privilege principle, revoke <code>public</code> schema, audit with <code>pg_audit</code>, use <code>scram-sha-256</code> for passwords.</p>\n</blockquote>\n<pre><code class=\"language-sql\">-- Public schema dan foydalanishni cheklash\nREVOKE CREATE ON SCHEMA public FROM PUBLIC;\nREVOKE ALL ON DATABASE mydb FROM PUBLIC;\n\n-- Minimal imtiyozli foydalanuvchi yaratish\nCREATE USER app_user WITH PASSWORD 'strong_password';\nGRANT CONNECT ON DATABASE mydb TO app_user;\nGRANT USAGE ON SCHEMA public TO app_user;\nGRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO app_user;\n</code></pre>\n<hr />\n<p><strong>91. Write-Ahead Log (WAL) arxivlash va PITR sozlash?</strong></p>\n<pre><code class=\"language-bash\"># postgresql.conf\nwal_level = replica\narchive_mode = on\narchive_command = 'cp %p /mnt/wal_archive/%f'\nrestore_command = 'cp /mnt/wal_archive/%f %p'\n\n# Ma'lum vaqtga tiklash / Restore to specific time\nrecovery_target_time = '2025-03-15 14:30:00'\nrecovery_target_action = 'promote'\n</code></pre>\n<hr />\n<p><strong>92. Hyper-optimized so'rov yozish qoidalari?</strong></p>\n<pre><code class=\"language-sql\">-- ❌ YOMON / BAD\nSELECT * FROM orders WHERE EXTRACT(YEAR FROM created_at) = 2025;\n\n-- ✅ YAXSHI / GOOD (indeksdan foydalanadi / uses index)\nSELECT * FROM orders\nWHERE created_at &gt;= '2025-01-01' AND created_at &lt; '2026-01-01';\n\n-- ❌ YOMON / BAD (har qator uchun subquery / subquery per row)\nSELECT name, (SELECT COUNT(*) FROM orders WHERE user_id = u.id) AS cnt\nFROM users u;\n\n-- ✅ YAXSHI / GOOD\nSELECT u.name, COUNT(o.id) AS cnt\nFROM users u LEFT JOIN orders o ON u.id = o.user_id\nGROUP BY u.id, u.name;\n\n-- ❌ YOMON / BAD (IN subquery katta bo'lsa sekin / slow for large IN)\nSELECT * FROM products WHERE id IN (SELECT product_id FROM cart WHERE user_id = 5);\n\n-- ✅ YAXSHI / GOOD\nSELECT p.* FROM products p\nJOIN cart c ON p.id = c.product_id WHERE c.user_id = 5;\n</code></pre>\n<hr />\n<p><strong>93. Fizik va Mantiqiy Replikatsiya farqi?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <strong>Fizik (Streaming)</strong> — butun klaster WAL bloklari ko'rinishida replikatsiya qilinadi, standby faqat o'qish uchun. <strong>Mantiqiy (Logical)</strong> — jadval darajasida, ikki yo'nalishli ham mumkin, version upgradelar orasida ham ishlaydi, selektiv jadvallar tanlanadi.<br />\n<strong>EN:</strong> <strong>Physical (Streaming)</strong> — entire cluster replicated as WAL blocks, standby is read-only. <strong>Logical</strong> — table-level, can be bidirectional, works across versions, selective tables.</p>\n</blockquote>\n<hr />\n<p><strong>94. PostgreSQL da Cursor nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Cursor — katta natija to'plamini qismlarga bo'lib olish imkonini beradi. Butun natijani xotiraga yuklamasdan qatorlarni bittadan yoki batch da olish mumkin.<br />\n<strong>EN:</strong> A cursor allows fetching large result sets in chunks without loading everything into memory at once.</p>\n</blockquote>\n<pre><code class=\"language-sql\">BEGIN;\nDECLARE my_cursor CURSOR FOR\n    SELECT id, name FROM large_table ORDER BY id;\n\nFETCH 100 FROM my_cursor;  -- 100 ta qator olish / Fetch 100 rows\nFETCH 100 FROM my_cursor;  -- Keyingi 100 ta / Next 100\n\nCLOSE my_cursor;\nCOMMIT;\n</code></pre>\n<hr />\n<p><strong>95. pg_stat_bgwriter nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>pg_stat_bgwriter</code> — background writer va checkpoint statistikasini ko'rsatadi. <code>buffers_clean</code> / <code>buffers_alloc</code> nisbati kesh samaradorligini ko'rsatadi. <code>checkpoints_req</code> ko'p bo'lsa, <code>checkpoint_completion_target</code> yoki <code>max_wal_size</code> ni oshirish kerak.<br />\n<strong>EN:</strong> <code>pg_stat_bgwriter</code> shows background writer and checkpoint stats. High <code>checkpoints_req</code> means you need to increase <code>checkpoint_completion_target</code> or <code>max_wal_size</code>.</p>\n</blockquote>\n<pre><code class=\"language-sql\">SELECT checkpoints_timed, checkpoints_req,\n       buffers_checkpoint, buffers_clean,\n       buffers_alloc\nFROM pg_stat_bgwriter;\n</code></pre>\n<hr />\n<p><strong>96. Constraint Exclusion nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>constraint_exclusion</code> — Planner jadval yoki partition da CHECK constraint bo'lsa va so'rov shartiga mos kelmasa, o'sha partition ni butunlay o'tkazib yuboradi. Partition pruning uchun muhim.<br />\n<strong>EN:</strong> <code>constraint_exclusion</code> allows the planner to skip partitions whose CHECK constraint cannot match the query conditions — key for partition pruning.</p>\n</blockquote>\n<pre><code class=\"language-sql\">SET constraint_exclusion = on;\n\n-- Planner faqat mos partition larni skanerlaydi\nSELECT * FROM orders WHERE created_at &gt;= '2025-01-01';\n</code></pre>\n<hr />\n<p><strong>97. Fillfactor nima?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> <code>fillfactor</code> — jadval sahifasining qancha foizi yangi ma'lumot bilan to'ldirish kerakligini belgilaydi. Default: 100. <code>UPDATE</code> ko'p bo'lgan jadvallarda 70-80 qo'yish HOT (Heap Only Tuple) yangilanishlarini tezlashtiradi.<br />\n<strong>EN:</strong> <code>fillfactor</code> sets what percentage of a page to fill with new data (default 100). Setting 70-80 for frequently updated tables enables HOT (Heap Only Tuple) updates — faster updates.</p>\n</blockquote>\n<pre><code class=\"language-sql\">CREATE TABLE orders (...) WITH (fillfactor = 80);\nALTER TABLE orders SET (fillfactor = 80);\nVACUUM FULL orders;  -- Yangi fillfactor bilan qayta yaratish\n</code></pre>\n<hr />\n<p><strong>98. Multi-tenant arxitektura PostgreSQL da?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Uchta yondashuv:\n1. <strong>Alohida MB</strong> — har tenant uchun (eng kuchli izolyatsiya, lekin boshqarish qiyin)\n2. <strong>Alohida Schema</strong> — bitta MB, har tenant uchun schema (o'rta izolyatsiya)\n3. <strong>Shared Tables + RLS</strong> — bitta schema, <code>tenant_id</code> ustuni + Row Level Security (eng ommabop)<br />\n<strong>EN:</strong> Three approaches: 1. <strong>Separate DB</strong> per tenant (strongest isolation, hardest to manage). 2. <strong>Separate Schema</strong> per tenant in one DB. 3. <strong>Shared Tables + RLS</strong> with <code>tenant_id</code> column (most popular).</p>\n</blockquote>\n<pre><code class=\"language-sql\">-- RLS bilan multi-tenant / Multi-tenant with RLS\nALTER TABLE orders ENABLE ROW LEVEL SECURITY;\n\nCREATE POLICY tenant_isolation ON orders\n    USING (tenant_id = current_setting('app.tenant_id')::INT);\n\n-- Har so'rov oldidan / Before each query:\nSET app.tenant_id = 42;\nSELECT * FROM orders;  -- Faqat tenant 42 ning buyurtmalari\n</code></pre>\n<hr />\n<p><strong>99. PostgreSQL 16/17 yangiliklari?</strong></p>\n<blockquote>\n<p><strong>UZ:</strong> Muhim yangiliklar:\n- <strong>PG 16:</strong> Logical replication from standby, <code>pg_stat_io</code>, parallel <code>FULL</code> va <code>RIGHT</code> join, <code>COPY FROM</code> WHERE, <code>VACUUM SKIP_DATABASE_STATS</code>\n- <strong>PG 17:</strong> <code>MERGE</code> RETURNING, <code>COPY</code> progress reporting, <code>VACUUM</code> improvements, <code>JSON_TABLE</code>, yaxshilangan <code>EXPLAIN</code> format<br />\n<strong>EN:</strong> PG 16: logical replication from standby, <code>pg_stat_io</code>, parallel FULL/RIGHT joins, <code>COPY FROM WHERE</code>. PG 17: <code>MERGE</code> RETURNING, <code>COPY</code> progress, improved <code>VACUUM</code>, <code>JSON_TABLE</code>, better <code>EXPLAIN</code>.</p>\n</blockquote>\n<hr />\n<p><strong>100. PostgreSQL da eng yaxshi amaliyotlar (Best Practices)?</strong></p>\n<pre><code class=\"language-sql\">-- ✅ 1. Har doim timestamptz ishlatish (UTC saqlash)\ncreated_at TIMESTAMPTZ DEFAULT NOW()\n\n-- ✅ 2. Katta jadvallar uchun partial index\nCREATE INDEX idx_pending ON orders(created_at) WHERE status = 'pending';\n\n-- ✅ 3. Tranzaksiya ichida DDL\nBEGIN;\nALTER TABLE users ADD COLUMN phone TEXT;\nUPDATE users SET phone = 'N/A' WHERE phone IS NULL;\nALTER TABLE users ALTER COLUMN phone SET NOT NULL;\nCOMMIT;\n\n-- ✅ 4. EXPLAIN ANALYZE ni muntazam ishlatish\nEXPLAIN (ANALYZE, BUFFERS, FORMAT JSON) SELECT ...;\n\n-- ✅ 5. Connection timeout va statement timeout\nSET statement_timeout = '30s';\nSET lock_timeout = '5s';\n\n-- ✅ 6. Indeks yaratishda CONCURRENTLY ishlatish (lock yo'q)\nCREATE INDEX CONCURRENTLY idx_new ON large_table(column);\n\n-- ✅ 7. Katta jadvallarni partition qilish\n-- ✅ 8. pg_stat_statements bilan sekin so'rovlarni monitoring\n-- ✅ 9. PgBouncer yoki pgpool-II bilan connection pooling\n-- ✅ 10. WAL arxivlash + PITR sozlash\n</code></pre>\n<hr />\n<h2 id=\"tezkor-yol-yoriq-quick-cheatsheet\">📋 Tezkor Yo'l-Yo'riq / Quick Cheatsheet</h2>\n<h3 id=\"tizim-korinishlari-system-views\">Tizim ko'rinishlari / System Views</h3>\n<pre><code class=\"language-sql\">pg_stat_activity      -- Faol sessiyalar / Active sessions\npg_stat_user_tables   -- Jadval statistikasi / Table stats\npg_stat_user_indexes  -- Indeks statistikasi / Index stats\npg_statio_user_tables -- Kesh statistikasi / Cache stats\npg_stat_statements    -- So'rov statistikasi / Query stats\npg_locks              -- Joriy locklar / Current locks\npg_stat_bgwriter      -- Background writer stats\npg_stat_replication   -- Replikatsiya holati / Replication status\n</code></pre>\n<h3 id=\"muhim-konfiguratsiya-fayllari-key-config-files\">Muhim konfiguratsiya fayllari / Key Config Files</h3>\n<pre><code>postgresql.conf   -- Asosiy konfiguratsiya / Main config\npg_hba.conf       -- Autentifikatsiya qoidalari / Auth rules\npg_ident.conf     -- Foydalanuvchi xaritalash / User mapping\nrecovery.conf     -- Tiklash (PG 12 gacha) / Recovery (pre-PG 12)\n</code></pre>\n<h3 id=\"keng-ishlatiladigan-kengaytmalar-popular-extensions\">Keng ishlatiladigan kengaytmalar / Popular Extensions</h3>\n<pre><code class=\"language-sql\">pg_stat_statements  -- So'rov monitoring / Query monitoring\npgcrypto            -- Kriptografiya / Cryptography\nuuid-ossp           -- UUID generatsiya / UUID generation\npg_trgm             -- Trigram qidirish / Trigram search\npostgis             -- Geografik ma'lumot / Geographic data\npgvector            -- Vektor qidirish / Vector search\ntimescaledb         -- Vaqt qatorlari / Time-series\npg_cron             -- Vazifa rejalashtirish / Job scheduling\npg_partman          -- Partition boshqaruvi / Partition management\npg_repack           -- Bloatsiz defrag / Bloat-free defrag\n</code></pre>\n<h3 id=\"foydali-buyruqlar-useful-commands\">Foydali buyruqlar / Useful Commands</h3>\n<pre><code class=\"language-bash\">psql -h host -U user -d dbname   # Ulanish / Connect\n\\l                                 # MB lar ro'yxati / List DBs\n\\dt                                # Jadvallar / Tables\n\\di                                # Indekslar / Indexes\n\\d tablename                       # Jadval tuzilmasi / Table structure\n\\timing                            # So'rov vaqtini ko'rsatish / Show query time\n\\copy                              # COPY psql orqali / COPY via psql\n\\x                                 # Kengaytirilgan ko'rinish / Expanded view\n</code></pre>\n<hr />\n<p><em>Tayyorlagan / Prepared by: Alyorjon | PostgreSQL 16/17 ga asoslanib</em></p>"}, "sap": {"label": "🏢 SAP B1", "body": "<h1 id=\"sap-business-one-sap-b1-100-interview-questions\">🏢 SAP Business One (SAP B1) — 100 Interview Questions</h1>\n<h3 id=\"ikki-tilli-qollanma-bilingual-reference\">Ikki tilli qo'llanma / Bilingual Reference</h3>\n<blockquote>\n<p><strong>Daraja / Level:</strong> Boshlang'ich → O'rta → Ilg'or → Ekspert<br />\n<strong>Tillar / Languages:</strong> O'zbek 🇺🇿 | English 🇬🇧<br />\n<strong>Maqsad / Goal:</strong> SAP B1 intervyusiga to'liq tayyorgarlik</p>\n</blockquote>\n<hr />\n<h2 id=\"mundarija-table-of-contents\">📚 Mundarija / Table of Contents</h2>\n<ol>\n<li><a href=\"#1-asosiy-tushunchalar--basics\">Asosiy tushunchalar / Basics (1–30)</a></li>\n<li><a href=\"#2-orta-daraja--intermediate\">O'rta daraja / Intermediate (31–55)</a></li>\n<li><a href=\"#3-ilgor-daraja--advanced\">Ilg'or daraja / Advanced (56–80)</a></li>\n<li><a href=\"#4-ekspert-daraja--expert\">Ekspert daraja / Expert (81–100)</a></li>\n</ol>\n<hr />\n<h2 id=\"1-asosiy-tushunchalar-basics\">1. Asosiy tushunchalar / Basics</h2>\n<h3 id=\"sap-b1-nima-what-is-sap-b1\">🔵 SAP B1 nima? / What is SAP B1?</h3>\n<p><strong>1. SAP Business One nima va kimlar uchun mo'ljallangan?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP Business One is an ERP solution designed for small and medium-sized enterprises (SMEs). It helps manage financials, sales, CRM, inventory, manufacturing, and purchasing in a single unified platform.<br />\n<strong>UZ:</strong> SAP Business One — kichik va o'rta korxonalar (SME) uchun mo'ljallangan ERP yechimi. Moliya, savdo, CRM, inventar, ishlab chiqarish va xaridlarni bitta platformada boshqaradi.</p>\n</blockquote>\n<hr />\n<p><strong>2. SAP B1 ning asosiy modullari qanday?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Key modules include: Financial Management, Sales &amp; CRM, Purchasing &amp; Procurement, Inventory &amp; Distribution, Production &amp; MRP, Project Management, Service Management, HR, and Reporting &amp; Analytics.<br />\n<strong>UZ:</strong> Asosiy modullar: Moliyaviy boshqaruv, Savdo va CRM, Xarid va ta'minot, Inventar va taqsimlash, Ishlab chiqarish va MRP, Loyiha boshqaruvi, Xizmat boshqaruvi, HR, Hisobot va tahlil.</p>\n</blockquote>\n<hr />\n<p><strong>3. SAP B1 da \"Business Partner\" nima va turlari qanday?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> A Business Partner is any entity the company does business with. Types: <strong>Customer</strong> (sotib oluvchi), <strong>Vendor</strong> (yetkazib beruvchi), <strong>Lead</strong> (potensial mijoz).<br />\n<strong>UZ:</strong> Business Partner — kompaniya ish olib boradigan har qanday tashkilot yoki shaxs. Turlari: <strong>Mijoz (Customer)</strong>, <strong>Yetkazib beruvchi (Vendor)</strong>, <strong>Potensial mijoz (Lead)</strong>.</p>\n</blockquote>\n<hr />\n<p><strong>4. SAP B1 qanday arxitekturada ishlaydi?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP B1 operates on a <strong>two-layer architecture</strong>: the database layer (MS SQL Server or SAP HANA) stores all data, and the client layer (fat client) handles business logic and the graphical user interface.<br />\n<strong>UZ:</strong> SAP B1 <strong>ikki qatlamli arxitekturada</strong> ishlaydi: ma'lumotlar bazasi qatlami (MS SQL Server yoki SAP HANA) barcha ma'lumotlarni saqlaydi, mijoz qatlami (fat client) biznes mantig'i va grafik interfeysni boshqaradi.</p>\n</blockquote>\n<hr />\n<p><strong>5. SAP B1 ni qanday usullar bilan joylashtiriladi (deployment)?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP B1 can be deployed <strong>On-Premise</strong> (client's own servers) or in the <strong>Cloud</strong> (via Amazon AWS or Microsoft Azure). On-premise gives full control; cloud reduces IT costs and infrastructure needs.<br />\n<strong>UZ:</strong> SAP B1 ni <strong>On-Premise</strong> (mijozning o'z serverlari) yoki <strong>Cloud</strong> (Amazon AWS yoki Microsoft Azure) orqali joylashtirish mumkin. On-premise to'liq nazorat beradi; cloud IT xarajatlarini kamaytiradi.</p>\n</blockquote>\n<hr />\n<p><strong>6. SAP B1 va SAP ERP (S/4HANA) o'rtasidagi farq nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP B1 is for SMEs (up to ~250 employees), simpler to implement and lower cost. SAP S/4HANA is for large enterprises with complex needs, much higher cost and complexity.<br />\n<strong>UZ:</strong> SAP B1 kichik/o'rta biznes uchun (~250 xodiygacha), sodda va arzonroq. SAP S/4HANA yirik korxonalar uchun, murakkab va qimmat.</p>\n</blockquote>\n<hr />\n<p><strong>7. SAP HANA nima va SAP B1 bilan qanday bog'liq?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP HANA is an in-memory database platform. SAP B1 can run on HANA for faster analytics, real-time reporting, and big data capabilities — significantly faster than MS SQL Server.<br />\n<strong>UZ:</strong> SAP HANA — xotirada ishlovchi (in-memory) ma'lumotlar bazasi platformasi. SAP B1 HANA ustida ishlasa, tahlillar tezroq, real-time hisobotlar va katta ma'lumotlar imkoniyatlari bo'ladi.</p>\n</blockquote>\n<hr />\n<p><strong>8. Master Data nima va nima uchun muhim?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Master Data is the core reference data used across all modules — Business Partners, Items, Chart of Accounts, Warehouses, Employees. Accurate master data is critical for all transactions.<br />\n<strong>UZ:</strong> Master Data — barcha modullar bo'ylab ishlatiladigan asosiy ma'lumotnoma: Business Partners, Tovarlar, Hisoblar rejasi, Omborlar, Xodimlar. To'g'ri master data barcha tranzaksiyalar uchun muhim.</p>\n</blockquote>\n<hr />\n<p><strong>9. SAP B1 da \"Item Master Data\" nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Item Master Data stores all information about products/services: item code, description, price, unit of measure, inventory settings, purchasing and sales data, and accounting information.<br />\n<strong>UZ:</strong> Item Master Data mahsulot/xizmat haqida barcha ma'lumotlarni saqlaydi: kod, tavsif, narx, o'lchov birligi, inventar sozlamalari, xarid/savdo ma'lumotlari va buxgalteriya.</p>\n</blockquote>\n<hr />\n<p><strong>10. SAP B1 da sotish jarayoni (Sales Cycle) qanday?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Sales Cycle: <strong>Sales Quotation</strong> → <strong>Sales Order</strong> → <strong>Delivery</strong> → <strong>A/R Invoice</strong> → <strong>Payment</strong>. Each step can be copied from the previous document, maintaining full traceability.<br />\n<strong>UZ:</strong> Savdo jarayoni: <strong>Savdo taklifi</strong> → <strong>Savdo buyurtmasi</strong> → <strong>Yetkazib berish</strong> → <strong>Debitor hisob-faktura</strong> → <strong>To'lov</strong>. Har bir bosqich oldingi hujjatdan ko'chiriladi, to'liq kuzatuvchanlik ta'minlanadi.</p>\n</blockquote>\n<hr />\n<h3 id=\"moliya-finance\">🔵 Moliya / Finance</h3>\n<p><strong>11. General Ledger (GL) nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> The General Ledger is the central repository of all financial transactions in SAP B1. It records all debits and credits and forms the basis for financial statements (Balance Sheet, P&amp;L).<br />\n<strong>UZ:</strong> Bosh daftar — SAP B1 dagi barcha moliyaviy tranzaksiyalarning markaziy ombori. Barcha debet/kredit yozuvlarini saqlaydi va moliyaviy hisobotlar (Balans, Daromad-zararlar) asosini tashkil qiladi.</p>\n</blockquote>\n<hr />\n<p><strong>12. Chart of Accounts (Hisoblar rejasi) nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Chart of Accounts is a structured list of all GL accounts used by a company. In SAP B1 it supports multiple currencies and can be configured for local accounting regulations.<br />\n<strong>UZ:</strong> Hisoblar rejasi — kompaniya foydalanadigan barcha GL hisoblarining tuzilgan ro'yxati. SAP B1 da bir nechta valyutani qo'llab-quvvatlaydi va mahalliy buxgalteriya qoidalariga moslashtiriladi.</p>\n</blockquote>\n<hr />\n<p><strong>13. Accounts Receivable (AR) va Accounts Payable (AP) farqi?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> <strong>AR (Debitor)</strong> — money customers owe the company (Sales invoices). <strong>AP (Kreditor)</strong> — money the company owes vendors (Purchase invoices).<br />\n<strong>UZ:</strong> <strong>AR (Debitor)</strong> — mijozlar kompaniyaga qarzdor bo'lgan pul (Savdo hisob-fakturalari). <strong>AP (Kreditor)</strong> — kompaniya yetkazib beruvchilarga qarzdor bo'lgan pul (Xarid hisob-fakturalari).</p>\n</blockquote>\n<hr />\n<p><strong>14. Journal Entry nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> A Journal Entry is a manual accounting record that directly posts debits and credits to GL accounts. Used for adjustments, corrections, or entries that don't have a dedicated document.<br />\n<strong>UZ:</strong> Journal Entry — GL hisoblarga to'g'ridan-to'g'ri debet/kredit yozadigan qo'lda buxgalteriya yozuvi. Tuzatishlar, korreksiyalar yoki maxsus hujjati bo'lmagan yozuvlar uchun ishlatiladi.</p>\n</blockquote>\n<hr />\n<p><strong>15. SAP B1 da ko'p valyuta qanday boshqariladi?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP B1 supports multi-currency transactions. Each document can be in a foreign currency; the system automatically converts to the local currency using exchange rates defined in the system.<br />\n<strong>UZ:</strong> SAP B1 ko'p valyutali tranzaksiyalarni qo'llab-quvvatlaydi. Har bir hujjat chet el valyutasida bo'lishi mumkin; tizim avtomatik ravishda tizimda belgilangan kurs bo'yicha mahalliy valyutaga o'tkazadi.</p>\n</blockquote>\n<hr />\n<h3 id=\"inventar-xarid-inventory-purchasing\">🔵 Inventar &amp; Xarid / Inventory &amp; Purchasing</h3>\n<p><strong>16. Xarid jarayoni (Purchase Cycle) qanday?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Purchase Cycle: <strong>Purchase Request</strong> → <strong>Purchase Quotation</strong> → <strong>Purchase Order</strong> → <strong>Goods Receipt PO</strong> → <strong>A/P Invoice</strong> → <strong>Payment</strong>.<br />\n<strong>UZ:</strong> Xarid jarayoni: <strong>Xarid so'rovi</strong> → <strong>Xarid taklifi</strong> → <strong>Xarid buyurtmasi</strong> → <strong>Tovar qabuli (GRPO)</strong> → <strong>Kreditor hisob-faktura</strong> → <strong>To'lov</strong>.</p>\n</blockquote>\n<hr />\n<p><strong>17. Goods Receipt PO (GRPO) nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Goods Receipt PO is the document that records the physical receipt of goods from a vendor against a Purchase Order. It updates inventory levels and creates accounting entries.<br />\n<strong>UZ:</strong> GRPO — Xarid buyurtmasiga muvofiq yetkazib beruvchidan tovarlarning jismoniy qabul qilinishini qayd etuvchi hujjat. Inventar darajasini yangilaydi va buxgalteriya yozuvlarini yaratadi.</p>\n</blockquote>\n<hr />\n<p><strong>18. Inventory Valuation usullari qanday?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP B1 supports: <strong>Moving Average (MA)</strong>, <strong>FIFO</strong> (First In, First Out), <strong>Standard Price</strong>. The valuation method is set per item in Item Master Data and affects COGS calculations.<br />\n<strong>UZ:</strong> SAP B1 quyidagilarni qo'llab-quvvatlaydi: <strong>Ko'chma o'rtacha (MA)</strong>, <strong>FIFO</strong> (birinchi kelgan — birinchi ketgan), <strong>Standart narx</strong>. Baholash usuli Item Master Data da har bir tovar uchun belgilanadi.</p>\n</blockquote>\n<hr />\n<p><strong>19. Warehouse (Ombor) boshqaruvi qanday ishlaydi?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP B1 supports multiple warehouses. Inventory can be transferred between warehouses using Inventory Transfer documents. Each warehouse can have separate stock levels and valuation.<br />\n<strong>UZ:</strong> SAP B1 bir nechta omborni qo'llab-quvvatlaydi. Tovarlar Inventar ko'chirish hujjatlari yordamida omborlar o'rtasida ko'chirilishi mumkin. Har bir ombor alohida zaxira darajasi va baholashga ega.</p>\n</blockquote>\n<hr />\n<p><strong>20. Price List (Narx ro'yxati) nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Price Lists in SAP B1 define selling prices for items. Multiple price lists can be created and assigned to specific customers, groups, or territories. They support discounts and special pricing.<br />\n<strong>UZ:</strong> Narx ro'yxatlari SAP B1 da tovarlar uchun sotuv narxlarini belgilaydi. Bir nechta narx ro'yxatlari yaratilishi va muayyan mijozlar, guruhlar yoki hududlarga tayinlanishi mumkin.</p>\n</blockquote>\n<hr />\n<p><strong>21. Landed Costs nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Landed Costs are additional import-related expenses (freight, customs, insurance) allocated to purchased goods, affecting their inventory valuation cost.<br />\n<strong>UZ:</strong> Landed Costs — import bilan bog'liq qo'shimcha xarajatlar (yuk tashish, bojxona, sug'urta) bo'lib, sotib olingan tovarlarga taqsimlanadi va ularning inventar baholash xarajatiga ta'sir qiladi.</p>\n</blockquote>\n<hr />\n<p><strong>22. Blanket Agreement nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> A Blanket Agreement is a long-term supply contract with a customer or vendor defining items, quantities, and prices over a period. It automatically applies agreed terms to future orders.<br />\n<strong>UZ:</strong> Blanket Agreement — mijoz yoki yetkazib beruvchi bilan ma'lum davr uchun tovarlar, miqdorlar va narxlarni belgilaydigan uzoq muddatli ta'minot shartnomasi. Kelajakdagi buyurtmalarga avtomatik kelishilgan shartlarni qo'llaydi.</p>\n</blockquote>\n<hr />\n<p><strong>23. Dunning Wizard nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Dunning Wizard automates the process of sending reminder letters to customers with overdue invoices. It can be configured with multiple dunning levels and escalation rules.<br />\n<strong>UZ:</strong> Dunning Wizard — muddati o'tgan hisob-fakturaları bo'lgan mijozlarga eslatma xatlar yuborishni avtomatlashtiradi. Bir nechta dunning darajalari va eskalatsiya qoidalari bilan sozlanishi mumkin.</p>\n</blockquote>\n<hr />\n<p><strong>24. Approval Procedure (Tasdiqlash tartibi) nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Approval Procedures ensure certain transactions (purchase orders, sales orders above a threshold) go through a review and approval workflow before being finalized.<br />\n<strong>UZ:</strong> Tasdiqlash tartibi — ma'lum tranzaksiyalar (xarid buyurtmalari, belgilangan chegaradan yuqori savdo buyurtmalari) yakunlanishdan oldin ko'rib chiqish va tasdiqlash jarayonidan o'tishini ta'minlaydi.</p>\n</blockquote>\n<hr />\n<p><strong>25. Alert Management nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Alert Management in SAP B1 automatically notifies users of specific events or conditions (e.g., low stock, overdue invoices, large transactions) via internal messages or email.<br />\n<strong>UZ:</strong> SAP B1 dagi Ogohlantirish boshqaruvi foydalanuvchilarga muayyan hodisalar yoki shartlar haqida (masalan, kam zaxira, muddati o'tgan hisob-fakturalar, katta tranzaksiyalar) ichki xabarlar yoki email orqali avtomatik xabar beradi.</p>\n</blockquote>\n<hr />\n<p><strong>26. SAP B1 da Tax (Soliq) qanday boshqariladi?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP B1 handles tax through Tax Codes configured per country/region. Tax codes are assigned to Business Partners and Items. The system auto-calculates tax on all relevant transactions.<br />\n<strong>UZ:</strong> SAP B1 da soliq, mamlakat/mintaqaga qarab sozlangan Soliq kodlari orqali boshqariladi. Soliq kodlari Business Partners va Tovarlarga tayinlanadi. Tizim barcha tegishli tranzaksiyalarda soliqni avtomatik hisoblaydi.</p>\n</blockquote>\n<hr />\n<p><strong>27. SAP B1 da Fixed Assets (Asosiy vositalar) qanday boshqariladi?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Fixed Assets module manages company assets: acquisition, depreciation, retirement, and transfer. It integrates with the GL for automatic depreciation postings.<br />\n<strong>UZ:</strong> Asosiy vositalar moduli kompaniya aktivlarini boshqaradi: sotib olish, amortizatsiya, chiqarib tashlash va ko'chirish. Avtomatik amortizatsiya yozuvlari uchun GL bilan integratsiyalashgan.</p>\n</blockquote>\n<hr />\n<p><strong>28. SAP B1 da Service Module nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> The Service Module manages after-sales service: service contracts, service calls (customer complaints/requests), equipment tracking, and technician scheduling.<br />\n<strong>UZ:</strong> Xizmat moduli sotuvdan keyingi xizmatni boshqaradi: xizmat shartnomalari, xizmat qo'ng'iroqlari (mijoz shikoyatlari/so'rovlari), uskunalarni kuzatish va texnik xodimlarni rejalashtirish.</p>\n</blockquote>\n<hr />\n<p><strong>29. User Roles va Permissions qanday ishlaydi?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP B1 has predefined user types: <strong>Superuser</strong> (full access), <strong>Professional User</strong> (full module access), <strong>Limited User</strong> (read-only or limited functions). Permissions can be configured per module, form, and action.<br />\n<strong>UZ:</strong> SAP B1 da oldindan belgilangan foydalanuvchi turlari: <strong>Superuser</strong> (to'liq kirish), <strong>Professional User</strong> (to'liq modul kirishi), <strong>Limited User</strong> (faqat o'qish yoki cheklangan funksiyalar). Ruxsatlar modul, forma va amal bo'yicha sozlanishi mumkin.</p>\n</blockquote>\n<hr />\n<p><strong>30. Crystal Reports SAP B1 bilan qanday bog'liq?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Crystal Reports is integrated into SAP B1 as the standard reporting tool. It allows creating custom reports with complex layouts, formulas, and drill-down capabilities based on SAP B1 data.<br />\n<strong>UZ:</strong> Crystal Reports SAP B1 ga standart hisobot vositasi sifatida integratsiyalashgan. SAP B1 ma'lumotlari asosida murakkab formatlar, formulalar va drill-down imkoniyatlari bilan maxsus hisobotlar yaratishga imkon beradi.</p>\n</blockquote>\n<hr />\n<h2 id=\"2-orta-daraja-intermediate\">2. O'rta daraja / Intermediate</h2>\n<p><strong>31. UDF (User-Defined Field) va UDT (User-Defined Table) farqi?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> <strong>UDF</strong> adds custom fields to existing SAP B1 forms/tables (e.g., adding a \"Region\" field to the sales order). <strong>UDT</strong> creates entirely new custom tables for storing data that doesn't fit existing structures.<br />\n<strong>UZ:</strong> <strong>UDF</strong> mavjud SAP B1 forma/jadvallariga maxsus maydonlar qo'shadi (masalan, savdo buyurtmasiga \"Hudud\" maydoni). <strong>UDT</strong> mavjud tuzilmalarga to'g'ri kelmaydigan ma'lumotlarni saqlash uchun butunlay yangi maxsus jadvallar yaratadi.</p>\n</blockquote>\n<hr />\n<p><strong>32. Formatted Search (FMS) nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Formatted Search is a SAP B1 feature that links SQL queries to form fields, automatically populating values based on predefined logic. It eliminates manual data entry and reduces errors.<br />\n<strong>UZ:</strong> Formatted Search — SAP B1 xususiyati bo'lib, SQL so'rovlarini forma maydonlariga bog'laydi va oldindan belgilangan mantiq asosida qiymatlarni avtomatik to'ldiradi. Qo'lda ma'lumot kiritishni yo'q qiladi.</p>\n</blockquote>\n<hr />\n<p><strong>33. DTW (Data Transfer Workbench) nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> DTW is SAP B1's built-in data migration tool. It allows importing large volumes of master data and transactions from Excel/CSV files into SAP B1 using predefined templates.<br />\n<strong>UZ:</strong> DTW — SAP B1 ning o'rnatilgan ma'lumotlarni migratsiya qilish vositasi. Oldindan belgilangan shablonlar yordamida Excel/CSV fayllardan SAP B1 ga ko'p miqdorda master data va tranzaksiyalarni import qilishga imkon beradi.</p>\n</blockquote>\n<hr />\n<p><strong>34. MRP (Material Requirements Planning) qanday ishlaydi?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> MRP in SAP B1 analyzes inventory levels, open orders, and demand forecasts to automatically generate purchase/production recommendations to ensure material availability.<br />\n<strong>UZ:</strong> SAP B1 dagi MRP inventar darajalarini, ochiq buyurtmalarni va talab prognozlarini tahlil qilib, materiallar mavjudligini ta'minlash uchun avtomatik xarid/ishlab chiqarish tavsiyalarini yaratadi.</p>\n</blockquote>\n<hr />\n<p><strong>35. Bill of Materials (BOM) nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> BOM defines the components and quantities needed to produce a finished product. In SAP B1, BOM is used in production orders and MRP to calculate raw material requirements.<br />\n<strong>UZ:</strong> BOM — tayyor mahsulot ishlab chiqarish uchun zarur komponentlar va miqdorlarni belgilaydi. SAP B1 da BOM ishlab chiqarish buyurtmalari va MRP da xom ashyo talablarini hisoblash uchun ishlatiladi.</p>\n</blockquote>\n<hr />\n<p><strong>36. Production Order nima va bosqichlari?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Production Order tracks manufacturing from start to finish. Stages: <strong>Planned</strong> → <strong>Released</strong> → <strong>Closed</strong>. It consumes raw materials from inventory and produces finished goods.<br />\n<strong>UZ:</strong> Ishlab chiqarish buyurtmasi ishlab chiqarishni boshidan oxirigacha kuzatadi. Bosqichlar: <strong>Rejalashtirilgan</strong> → <strong>Chiqarilgan</strong> → <strong>Yopilgan</strong>. Inventardan xom ashyo sarflaydi va tayyor mahsulot ishlab chiqaradi.</p>\n</blockquote>\n<hr />\n<p><strong>37. Inventory Counting (Inventarizatsiya) qanday amalga oshiriladi?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP B1 provides Inventory Counting documents. Process: freeze inventory → count physically → enter counted quantities → post the difference as inventory adjustment. Supports cycle counts and full physical counts.<br />\n<strong>UZ:</strong> SAP B1 Inventar sanash hujjatlarini taqdim etadi. Jarayon: inventarni muzlatish → jismonan sanash → hisoblangan miqdorlarni kiritish → farqni inventar tuzatmasi sifatida joylashtirish.</p>\n</blockquote>\n<hr />\n<p><strong>38. Bank Reconciliation (Bank saldosini tekshirish) qanday?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP B1's Bank Reconciliation tool compares bank statements with internal SAP transactions to identify discrepancies, uncleared items, and timing differences.<br />\n<strong>UZ:</strong> SAP B1 ning Bank Reconciliation vositasi bank ko'chirmalarini ichki SAP tranzaksiyalari bilan solishtiradi, tafovutlarni, tozalanmagan elementlarni va vaqt farqlarini aniqlaydi.</p>\n</blockquote>\n<hr />\n<p><strong>39. Recurring Postings nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Recurring Postings automate regular journal entries (rent, insurance, depreciation) by defining a template that SAP B1 automatically posts at configured intervals (monthly, quarterly, etc.).<br />\n<strong>UZ:</strong> Recurring Postings muntazam journal yozuvlarini (ijara, sug'urta, amortizatsiya) avtomatlashtiradi — shablon belgilanadi va SAP B1 sozlangan intervallarda (oylik, choraklik va h.k.) uni avtomatik joylashtiradi.</p>\n</blockquote>\n<hr />\n<p><strong>40. Sales Analysis hisobotlari qanday?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP B1 provides built-in sales analysis reports: sales by customer, item, salesperson, period, or territory. Can be visualized as charts and drilled down to individual transactions.<br />\n<strong>UZ:</strong> SAP B1 o'rnatilgan savdo tahlil hisobotlarini taqdim etadi: mijoz, tovar, sotuvchi, davr yoki hudud bo'yicha savdo. Diagrammalar sifatida vizuallashtirilishi va alohida tranzaksiyalargacha chuqurlashtirilishi mumkin.</p>\n</blockquote>\n<hr />\n<p><strong>41. Partial Payment (Qisman to'lov) qanday qayd etiladi?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> In SAP B1, partial payments are recorded in the Incoming/Outgoing Payment document. The payment is matched against the specific invoice, leaving the remaining balance open.<br />\n<strong>UZ:</strong> SAP B1 da qisman to'lovlar Kiruvchi/Chiquvchi To'lov hujjatida qayd etiladi. To'lov muayyan hisob-fakturaga nisbatan moslanadi, qolgan balans ochiq qoladi.</p>\n</blockquote>\n<hr />\n<p><strong>42. Credit Memo (Kredit yozuvi) nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> A Credit Memo is issued when goods are returned or an invoice needs to be corrected. It reduces the customer's/vendor's balance and reverses inventory and accounting entries.<br />\n<strong>UZ:</strong> Kredit yozuvi tovarlar qaytarilganda yoki hisob-fakturani tuzatish kerak bo'lganda beriladi. U mijoz/yetkazib beruvchi balansini kamaytiradi va inventar va buxgalteriya yozuvlarini bekor qiladi.</p>\n</blockquote>\n<hr />\n<p><strong>43. Goods Return (Tovar qaytarish) jarayoni?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Customer Return Process: <strong>Return</strong> document (reverses Delivery) → <strong>A/R Credit Memo</strong> (reverses Invoice) → refund payment if needed. Each step is linked for full audit trail.<br />\n<strong>UZ:</strong> Mijoz tovar qaytarish jarayoni: <strong>Qaytarish</strong> hujjati (Yetkazib berishni bekor qiladi) → <strong>Debitor Kredit Yozuvi</strong> (Hisob-fakturani bekor qiladi) → kerak bo'lsa to'lovni qaytarish.</p>\n</blockquote>\n<hr />\n<p><strong>44. Intercompany Transactions nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Intercompany transactions are financial transactions between subsidiaries of the same parent company. SAP B1 handles these through inter-company module or manual journal entries with elimination accounts.<br />\n<strong>UZ:</strong> Kompaniyalararo tranzaksiyalar — bir xil ona kompaniyaning sho'ba korxonalari o'rtasidagi moliyaviy tranzaksiyalar. SAP B1 buni kompaniyalararo modul yoki yo'q qilish hisoblari bilan qo'lda journal yozuvlari orqali boshqaradi.</p>\n</blockquote>\n<hr />\n<p><strong>45. Route Management nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Route Management in SAP B1 allows defining delivery routes, assigning customers to routes, and planning delivery schedules — useful for distribution businesses.<br />\n<strong>UZ:</strong> SAP B1 dagi Route Management yetkazib berish marshrutlarini belgilash, mijozlarni marshrutlarga tayinlash va yetkazib berish jadvallarini rejalashtirishga imkon beradi — distribyutor bizneslar uchun foydali.</p>\n</blockquote>\n<hr />\n<p><strong>46. G/L Account Determination nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> G/L Account Determination defines which GL accounts are automatically used for specific transaction types (inventory, COGS, revenue, tax). Configured in Administration → Setup → Financials.<br />\n<strong>UZ:</strong> G/L Account Determination muayyan tranzaksiya turlari uchun (inventar, COGS, daromad, soliq) qaysi GL hisoblar avtomatik ishlatilishini belgilaydi. Administration → Setup → Financials da sozlanadi.</p>\n</blockquote>\n<hr />\n<p><strong>47. Document Numbering (Hujjat raqamlash) qanday?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP B1 allows configuring automatic numbering series for each document type (invoices, orders, receipts). Multiple series can be defined per document type for different periods or users.<br />\n<strong>UZ:</strong> SAP B1 har bir hujjat turi uchun (hisob-fakturalar, buyurtmalar, kvitansiyalar) avtomatik raqamlash seriyalarini sozlashga imkon beradi. Har bir hujjat turi uchun turli davrlar yoki foydalanuvchilar uchun bir nechta seriya belgilanishi mumkin.</p>\n</blockquote>\n<hr />\n<p><strong>48. Inventory Transfer nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Inventory Transfer is a SAP B1 document that moves stock from one warehouse to another without any financial impact — only inventory quantities are updated.<br />\n<strong>UZ:</strong> Inventar Ko'chirish — SAP B1 hujjati bo'lib, zaxirani bir ombordan ikkinchisiga moliyaviy ta'sersiz ko'chiradi — faqat inventar miqdorlari yangilanadi.</p>\n</blockquote>\n<hr />\n<p><strong>49. Non-Inventory Item va Inventory Item farqi?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> <strong>Inventory Item</strong> tracks stock levels in SAP B1 (physical goods). <strong>Non-Inventory Item</strong> does not affect stock (services, one-time items). An item can only be switched between types when stock = 0 and no open documents exist.<br />\n<strong>UZ:</strong> <strong>Inventar Tovar</strong> SAP B1 da zaxira darajalarini kuzatadi (jismoniy tovarlar). <strong>Inventarsiz Tovar</strong> zaxiraga ta'sir qilmaydi (xizmatlar, bir martalik elementlar). Tovar faqat zaxira = 0 va ochiq hujjatlar yo'q bo'lganda turlar o'rtasida almashtirilishi mumkin.</p>\n</blockquote>\n<hr />\n<p><strong>50. Sadece o'qish (Read-Only) rejimida hujjatlar?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> In SAP B1, once a document is fully closed (paid/delivered/cancelled), it becomes read-only. To make corrections, reversal documents (credit memo, return) must be used instead of editing.<br />\n<strong>UZ:</strong> SAP B1 da hujjat to'liq yopilgandan (to'langan/yetkazilgan/bekor qilingan) keyin u faqat o'qish uchun bo'ladi. Tuzatishlar kiritish uchun tahrirlash o'rniga teskari hujjatlar (kredit yozuvi, qaytarish) ishlatilishi kerak.</p>\n</blockquote>\n<hr />\n<p><strong>51. SAP B1 da CRM imkoniyatlari?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP B1 CRM includes: activity management (calls, meetings, tasks), opportunity tracking (sales pipeline), campaign management, and customer service history — all linked to Business Partner records.<br />\n<strong>UZ:</strong> SAP B1 CRM quyidagilarni o'z ichiga oladi: faoliyat boshqaruvi (qo'ng'iroqlar, uchrashuvlar, vazifalar), imkoniyatlarni kuzatish (savdo quvuri), kampaniyalarni boshqarish va mijozlarga xizmat ko'rsatish tarixi.</p>\n</blockquote>\n<hr />\n<p><strong>52. Profit Center (Foyda markazi) qanday ishlaydi?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Profit Centers in SAP B1 allow tracking income and expenses by business unit, department, or project — enabling profitability analysis at a granular level without separate company codes.<br />\n<strong>UZ:</strong> SAP B1 dagi Foyda Markazlari biznes bo'linmasi, bo'lim yoki loyiha bo'yicha daromad va xarajatlarni kuzatishga imkon beradi — alohida kompaniya kodlarisiz batafsil darajada rentabellik tahlilini ta'minlaydi.</p>\n</blockquote>\n<hr />\n<p><strong>53. Period-End Closing (Davr yopish) jarayoni?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Period-end closing in SAP B1 includes: running depreciation, bank reconciliation, inventory valuation, posting accruals, generating financial statements, and locking the period to prevent further postings.<br />\n<strong>UZ:</strong> SAP B1 da davr yopish quyidagilarni o'z ichiga oladi: amortizatsiyani hisoblash, bank saldosini tekshirish, inventar baholash, hisoblangan xarajatlarni joylashtirish, moliyaviy hisobotlarni yaratish va keyingi yozuvlarni oldini olish uchun davrni bloklash.</p>\n</blockquote>\n<hr />\n<p><strong>54. SAP B1 da qanday hisobot vositalari mavjud?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP B1 reporting tools: <strong>Crystal Reports</strong> (custom formatted reports), <strong>XL Reporter</strong> (Excel-based), <strong>SAP HANA Analytics</strong> (real-time), <strong>Financial Report Wizard</strong>, and <strong>Query Manager</strong> (SQL-based).<br />\n<strong>UZ:</strong> SAP B1 hisobot vositalari: <strong>Crystal Reports</strong> (maxsus formatlangan hisobotlar), <strong>XL Reporter</strong> (Excel asosli), <strong>SAP HANA Analytics</strong> (real-time), <strong>Moliyaviy Hisobot Ustasi</strong> va <strong>Query Manager</strong> (SQL asosli).</p>\n</blockquote>\n<hr />\n<p><strong>55. Authorization (Ruxsat) tizimi qanday sozlanadi?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Authorizations in SAP B1 are configured via Administration → System Initialization → Authorizations. You can grant/restrict access per module, form, specific actions (add/edit/delete), and reports.<br />\n<strong>UZ:</strong> SAP B1 da ruxsatlar Administration → System Initialization → Authorizations orqali sozlanadi. Modul, forma, muayyan amallar (qo'shish/tahrirlash/o'chirish) va hisobotlar bo'yicha kirish huquqi berilishi/cheklanishi mumkin.</p>\n</blockquote>\n<hr />\n<h2 id=\"3-ilgor-daraja-advanced\">3. Ilg'or daraja / Advanced</h2>\n<p><strong>56. DI API (Data Interface API) nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> DI API is the programmatic interface for SAP B1 that allows external applications to create, update, and delete SAP B1 business objects (orders, invoices, partners) via COM-based objects.<br />\n<strong>UZ:</strong> DI API — tashqi ilovalar SAP B1 biznes ob'ektlarini (buyurtmalar, hisob-fakturalar, sheriklarni) COM-asosli ob'ektlar orqali yaratish, yangilash va o'chirishiga imkon beruvchi SAP B1 uchun dasturlash interfeysi.</p>\n</blockquote>\n<hr />\n<p><strong>57. UI API (User Interface API) nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> UI API allows developers to interact with SAP B1 forms and controls — adding custom buttons, handling events, modifying form behavior. Uses <code>Interop.SAPbouiCOM.dll</code>.<br />\n<strong>UZ:</strong> UI API dasturchilarga SAP B1 forma va boshqaruv elementlari bilan o'zaro ta'sir qilishga imkon beradi — maxsus tugmalar qo'shish, hodisalarni boshqarish, forma xulq-atvorini o'zgartirish. <code>Interop.SAPbouiCOM.dll</code> dan foydalanadi.</p>\n</blockquote>\n<hr />\n<p><strong>58. SAP B1 SDK ikki asosiy DLL nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> <code>Interop.SAPbouiCOM.dll</code> — for UI/form controls (labels, grids, buttons). <code>Interop.SAPbobsCOM.dll</code> — for business objects (items, orders, invoices) via DI API.<br />\n<strong>UZ:</strong> <code>Interop.SAPbouiCOM.dll</code> — UI/forma boshqaruvlari uchun (labellar, gridlar, tugmalar). <code>Interop.SAPbobsCOM.dll</code> — DI API orqali biznes ob'ektlari uchun (tovarlar, buyurtmalar, hisob-fakturalar).</p>\n</blockquote>\n<hr />\n<p><strong>59. Screen Painter nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Screen Painter is an SAP add-on tool for designing custom forms in SAP B1 SDK. Created files have <code>.srf</code> extension and must be renamed to <code>.xml</code> before deployment.<br />\n<strong>UZ:</strong> Screen Painter — SAP B1 SDK da maxsus formalarni loyihalash uchun SAP qo'shimcha vositasi. Yaratilgan fayllar <code>.srf</code> kengaytmasiga ega va joylashtirishdan oldin <code>.xml</code> ga o'zgartirilishi kerak.</p>\n</blockquote>\n<hr />\n<p><strong>60. Event Logger nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP B1 Event Logger tracks all UI events fired in the application. Run simultaneously with SAP B1, it shows event types and sequences — essential for add-on development and debugging.<br />\n<strong>UZ:</strong> SAP B1 Event Logger ilovada yoqilgan barcha UI hodisalarini kuzatadi. SAP B1 bilan bir vaqtda ishga tushirilib, hodisa turlari va ketma-ketliklarini ko'rsatadi — qo'shimcha dasturlarni ishlab chiqish va disk raskadrovka uchun muhim.</p>\n</blockquote>\n<hr />\n<p><strong>61. Service Layer nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP B1 Service Layer is a RESTful API based on OData protocol, available from SAP B1 version 9.0+. It allows modern web/mobile applications to integrate with SAP B1 without installing the SDK locally.<br />\n<strong>UZ:</strong> SAP B1 Service Layer — OData protokoliga asoslangan RESTful API bo'lib, SAP B1 9.0+ versiyasidan boshlab mavjud. U zamonaviy veb/mobil ilovalarning SDK ni mahalliy o'rnatmasdan SAP B1 bilan integratsiyasiga imkon beradi.</p>\n</blockquote>\n<hr />\n<p><strong>62. Stored Procedures SAP B1 da qanday ishlatiladi?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Stored Procedures in SAP B1 (MS SQL/HANA) improve performance for complex reports, formatted searches, and batch operations. SAP warns against modifying standard SAP tables directly via stored procedures.<br />\n<strong>UZ:</strong> SAP B1 da Stored Procedures (MS SQL/HANA) murakkab hisobotlar, formatlangan qidiruvlar va partiya operatsiyalari uchun unumdorlikni yaxshilaydi. SAP stored procedures orqali standart SAP jadvallarini to'g'ridan-to'g'ri o'zgartirishdan ogohlantiradi.</p>\n</blockquote>\n<hr />\n<p><strong>63. Add-On nima va qanday ishlab chiqiladi?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> An Add-On is a custom application developed using SAP B1 SDK that extends SAP B1 functionality. Developed in .NET (C#/VB.NET), deployed via Add-On Registration and Add-On Manager.<br />\n<strong>UZ:</strong> Add-On — SAP B1 funksiyalarini kengaytiradigan SAP B1 SDK yordamida ishlab chiqilgan maxsus ilova. .NET (C#/VB.NET) da ishlab chiqiladi, Add-On ro'yxatga olish va Add-On Manager orqali joylashtiriladi.</p>\n</blockquote>\n<hr />\n<p><strong>64. SAP B1 da qanday ma'lumotlarni bevosita SQL bilan olish mumkin?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Key SAP B1 tables: <code>OCRD</code> (Business Partners), <code>OITM</code> (Items), <code>ORDR</code> (Sales Orders), <code>OINV</code> (AR Invoices), <code>OPCH</code> (AP Invoices), <code>OIVL</code> (Inventory Transactions), <code>JDT1</code> (Journal Entries).<br />\n<strong>UZ:</strong> Asosiy SAP B1 jadvallari: <code>OCRD</code> (Business Partners), <code>OITM</code> (Tovarlar), <code>ORDR</code> (Savdo buyurtmalari), <code>OINV</code> (AR hisob-fakturalar), <code>OPCH</code> (AP hisob-fakturalar), <code>OIVL</code> (Inventar tranzaksiyalari), <code>JDT1</code> (Journal yozuvlari).</p>\n</blockquote>\n<pre><code class=\"language-sql\">-- Misol: Barcha ochiq savdo buyurtmalarini olish\nSELECT T0.DocNum, T0.CardName, T0.DocTotal, T0.DocDate\nFROM ORDR T0\nWHERE T0.DocStatus = 'O'  -- O = Open\nORDER BY T0.DocDate DESC;\n</code></pre>\n<hr />\n<p><strong>65. SAP B1 integratsiya usullari qanday?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Integration methods: <strong>DI API</strong> (COM-based, local), <strong>Service Layer</strong> (REST/OData, remote), <strong>DTW</strong> (bulk data import), <strong>B1iF</strong> (B1 Integration Framework for middleware), <strong>Direct SQL</strong> (read-only, not recommended for writes).<br />\n<strong>UZ:</strong> Integratsiya usullari: <strong>DI API</strong> (COM-asosli, mahalliy), <strong>Service Layer</strong> (REST/OData, masofaviy), <strong>DTW</strong> (ommaviy ma'lumot importi), <strong>B1iF</strong> (middleware uchun B1 Integratsiya Tizimi), <strong>To'g'ridan-to'g'ri SQL</strong> (faqat o'qish uchun).</p>\n</blockquote>\n<hr />\n<p><strong>66. Volume Discounts va Customer-Specific Pricing qanday sozlanadi?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> In SAP B1, volume discounts are set up via Discount Groups or Special Prices per Business Partner. Customer-specific pricing uses Price Lists with override prices per item per customer.<br />\n<strong>UZ:</strong> SAP B1 da hajm chegirmalari Chegirma Guruhlari yoki Business Partner bo'yicha Maxsus Narxlar orqali sozlanadi. Mijozga xos narxlash har bir mijoz uchun tovar bo'yicha narxlarni bekor qiladigan Narx Ro'yxatlaridan foydalanadi.</p>\n</blockquote>\n<hr />\n<p><strong>67. SAP B1 ni sekinlashuvini qanday diagnostika qilish?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Steps: check server resources (CPU/RAM), analyze slow queries via SQL Profiler, review index fragmentation, check network latency, examine add-ons running, review SAP B1 log files for errors.<br />\n<strong>UZ:</strong> Qadamlar: server resurslarini tekshirish (CPU/RAM), SQL Profiler orqali sekin so'rovlarni tahlil qilish, indeks parchalanishini ko'rib chiqish, tarmoq kechikishini tekshirish, ishlaydigan qo'shimcha dasturlarni ko'rib chiqish, xatolar uchun SAP B1 jurnal fayllarini ko'rib chiqish.</p>\n</blockquote>\n<hr />\n<p><strong>68. SAP B1 ga ma'lumot migratsiyasi (Data Migration) qanday amalga oshiriladi?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Data migration process: <strong>Analyze</strong> legacy data → <strong>Map</strong> to SAP B1 fields → <strong>Cleanse</strong> data → <strong>Load</strong> via DTW or DI API → <strong>Validate</strong> in SAP B1 → <strong>Go-live</strong>. Critical to migrate master data first, then open transactions.<br />\n<strong>UZ:</strong> Ma'lumotlarni migratsiya qilish jarayoni: eski ma'lumotlarni <strong>tahlil qilish</strong> → SAP B1 maydonlariga <strong>xaritalash</strong> → ma'lumotlarni <strong>tozalash</strong> → DTW yoki DI API orqali <strong>yuklash</strong> → SAP B1 da <strong>tekshirish</strong> → <strong>Ishga tushirish</strong>.</p>\n</blockquote>\n<hr />\n<p><strong>69. Security Model (Xavfsizlik modeli) eng yaxshi amaliyotlari?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Best practices: principle of least privilege, role-based access, separate admin accounts, regular authorization reviews, password policies, audit logging enabled, restrict direct database access.<br />\n<strong>UZ:</strong> Eng yaxshi amaliyotlar: minimal imtiyoz tamoyili, rol-asosli kirish, alohida admin hisoblar, muntazam ruxsat ko'rib chiqishlari, parol siyosatlari, audit jurnalini yoqish, to'g'ridan-to'g'ri ma'lumotlar bazasiga kirishni cheklash.</p>\n</blockquote>\n<hr />\n<p><strong>70. SAP B1 backup strategiyasi qanday?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> SAP B1 backup strategy: daily full SQL Server backups, transaction log backups every few hours, test restores regularly, store backups offsite/cloud, document recovery procedures.<br />\n<strong>UZ:</strong> SAP B1 zaxira strategiyasi: kunlik to'liq SQL Server zaxiralari, bir necha soatda bir tranzaksiya jurnali zaxiralari, muntazam ravishda tiklashlarni sinab ko'rish, zaxiralarni tashqarida/cloudda saqlash, tiklash tartiblarini hujjatlashtirish.</p>\n</blockquote>\n<hr />\n<p><strong>71. Consignment Inventory (Konsignatsiya inventari) nima?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Consignment inventory means goods are held by a customer/warehouse but owned by the vendor until sold. SAP B1 handles this via special warehouses and inventory transfers upon sale.<br />\n<strong>UZ:</strong> Konsignatsiya inventari — tovarlar mijoz/omborda saqlanadi, lekin sotilgunga qadar yetkazib beruvchiga tegishli. SAP B1 buni maxsus omborlar va sotish paytida inventar ko'chirish orqali boshqaradi.</p>\n</blockquote>\n<hr />\n<p><strong>72. SAP B1 da e-commerce integratsiyasi?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> E-commerce (Shopify, Magento, WooCommerce) integration with SAP B1 uses the Service Layer or B1iF middleware. Key sync points: product catalog, inventory levels, orders, customer data, payments.<br />\n<strong>UZ:</strong> E-commerce (Shopify, Magento, WooCommerce) bilan SAP B1 integratsiyasi Service Layer yoki B1iF middleware dan foydalanadi. Asosiy sinxronizatsiya nuqtalari: mahsulot katalogi, inventar darajalari, buyurtmalar, mijoz ma'lumotlari, to'lovlar.</p>\n</blockquote>\n<hr />\n<p><strong>73. KPI (Key Performance Indicators) monitoring SAP B1 da?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Key KPIs tracked in SAP B1: Revenue vs Target, Gross Margin %, Inventory Turnover, DSO (Days Sales Outstanding), DPO (Days Payable Outstanding), Order Fulfillment Rate, Customer Satisfaction.<br />\n<strong>UZ:</strong> SAP B1 da kuzatiladigan asosiy KPI lar: Daromad va Maqsad, Yalpi Marj %, Inventar aylanmasi, DSO (Savdo debitor kunlari), DPO (Kreditor to'lov kunlari), Buyurtmani bajarish darajasi, Mijoz qoniqishi.</p>\n</blockquote>\n<hr />\n<p><strong>74. SAP B1 versiyasini yangilash (Upgrade) jarayoni?</strong></p>\n<blockquote>\n<p><strong>EN:</strong> Upgrade process: backup current system → test in sandbox environment → run upgrade wizard → validate all modules and custom add-ons → user acceptance testing → go-live during low-traffic period.<br />\n<strong>UZ:</strong> Yangilash jarayoni: joriy tizimni zax
